# =============================================================================
# ks-rhel-family-dynamic.cfg — dynamic kickstart for RHEL / Oracle Linux /
# AlmaLinux / Rocky, EL8 / EL9 / EL10.
#
# Goals:
#   * LVM with the PV grown to fill the WHOLE disk, but fixed-size LVs — so all
#     spare capacity stays as FREE extents in the VG. Grow any mount online
#     later with `lvextend -r` instead of rebuilding the machine.
#   * Auto-detect the target disk (nvme/sda/vda), firmware (UEFI/BIOS) and NIC.
#   * Come up on a known static IP (boot-arg overridable, .250 fallback) so
#     Ansible can take over immediately, then a playbook gives it its real IP.
#   * One file, no per-distro branching — works on physical and VMs.
#
# The dynamic bits (disk/firmware/NIC detection, sizing, boot-arg parsing) live
# in %pre, which WRITES the partition + network directives into include files
# that the main section pulls in via %include.
#
# Two placeholders to fill before use:
#   __ROOTPW_HASH__  — a SHA-512 crypt hash; generate with `openssl passwd -6`
#                      (inject it at build time from your secrets manager rather
#                      than committing it).
#   the ssh-ed25519 key in %post — your Ansible automation account's PUBLIC key.
# =============================================================================

# ── Install mode & source ────────────────────────────────────────────────────
text
cdrom
eula --agreed
firstboot --disable

# ── Localisation ─────────────────────────────────────────────────────────────
keyboard --vckeymap=us --xlayouts='us'
lang en_US.UTF-8
timezone Etc/UTC --utc

# ── Security ─────────────────────────────────────────────────────────────────
# Root password hash — inject at build time (see README). Root SSH login is
# disabled in %post; this password is for console/break-glass only.
rootpw --iscrypted __ROOTPW_HASH__
selinux --enforcing
firewall --enabled --service=ssh
services --enabled=sshd,chronyd

# ── Network (generated by %pre: static IP, detected NIC, boot-arg override) ───
%include /tmp/network.ks

# ── Storage (generated by %pre: detected disk, firmware, LVM + free headroom) ─
%include /tmp/partitions.ks

# ── Finish ───────────────────────────────────────────────────────────────────
# poweroff (not reboot) so the build tooling can detach the install media before
# the first real boot — deterministic, no risk of re-running the installer.
poweroff

# =============================================================================
# %pre — dynamic detection. Writes /tmp/network.ks and /tmp/partitions.ks.
# =============================================================================
%pre --interpreter=/bin/bash --log=/tmp/kickstart-pre.log --erroronfail

set -u

# ---- Tunable layout: mount | LV name | size (NN GiB, or NN% of VG) | mount opts
# Separate filesystems (CIS/STIG) keep nodev,nosuid everywhere (cheap, no downside).
# DEVELOPER-FRIENDLY + ANSIBLE/RPM-SAFE default: noexec is applied ONLY to the log
# dirs (/var/log, /var/log/audit) where nothing should ever execute. It is deliberately
# NOT applied to:
#   /home    — developers run scripts/binaries from their home dir
#   /tmp     — devs run ad-hoc scripts; Ansible's world-readable temp fallback (used
#              when become_user is a non-root user) executes modules from here
#   /var/tmp — RPM/dnf scriptlets execute here; Ansible can also fall back here
#   /var     — RPM scriptlets (dnf stages into /var/tmp)
# For a locked-down STIG host, add "noexec" back to /tmp and /var/tmp here and set
# Ansible remote_tmp (and rpm _tmppath) to a non-noexec path accordingly.
mounts=(/      /var          /var/log              /var/log/audit        /var/tmp        /tmp            /home)
lvnames=(root  var           varlog                varlogaudit           vartmp          tmp             home)
sizes=(12      6             3                     2                     2               3               2)
fsopts=(defaults "nodev,nosuid" "nodev,nosuid,noexec" "nodev,nosuid,noexec" "nodev,nosuid" "nodev,nosuid" "nodev,nosuid")
BOOT_MB=1024
EFI_MB=600
SWAP_CAP_MB=4096
ROOT_FLOOR_MB=10240
VG=vg_system

# Hardcoded staging network (RFC5737 documentation range — replace with your own).
# Override per-build with kernel args: ksip= ksgw= ksdns= kshostname=
DEF_IP=192.0.2.250
DEF_CIDR=24
DEF_GW=192.0.2.1
DEF_DNS=192.0.2.1
DEF_HOST=staging
DOMAIN=example.com

log(){ echo "[ks-pre] $*"; }

# ---- 1. Detect target disk (prefer nvme > vd > sd > hd; skip removable/ro) ---
mapfile -t disks < <(lsblk -dn -o NAME,TYPE,RM,RO 2>/dev/null | awk '$2=="disk" && $3==0 && $4==0 {print $1}')
disk=""
for pat in '^nvme' '^vd' '^sd' '^hd'; do
  for d in "${disks[@]:-}"; do
    [[ $d =~ $pat ]] && { disk=$d; break 2; }
  done
done
[ -z "$disk" ] && disk="${disks[0]:-}"
[ -z "$disk" ] && { log "FATAL: no usable disk found"; exit 1; }
log "target disk: $disk"

# ---- 2. Detect firmware ------------------------------------------------------
if [ -d /sys/firmware/efi ]; then fw=uefi; else fw=bios; fi
log "firmware: $fw"

# ---- 3. Disk size (MiB) ------------------------------------------------------
sectors=$(cat /sys/block/$disk/size 2>/dev/null || echo 0)
disk_mib=$(( sectors / 2048 ))                       # 512B sectors -> MiB
log "disk size: ${disk_mib} MiB"

# ---- 4. Swap from RAM (RHEL table, capped) -----------------------------------
ram_kb=$(awk '/MemTotal/{print $2}' /proc/meminfo)
ram_mib=$(( ram_kb / 1024 ))
if   [ $ram_mib -le 2048 ]; then swap_mib=$(( ram_mib * 2 ))
elif [ $ram_mib -le 8192 ]; then swap_mib=$ram_mib
else                             swap_mib=$SWAP_CAP_MB
fi
[ $swap_mib -gt $SWAP_CAP_MB ] && swap_mib=$SWAP_CAP_MB
log "ram: ${ram_mib} MiB -> swap: ${swap_mib} MiB"

# ---- 5. Plan VG + LV sizes (fixed or percent), with small-disk scaling -------
reserved=$BOOT_MB
[ "$fw" = uefi ] && reserved=$(( reserved + EFI_MB ))
vg_mib=$(( disk_mib - reserved - 2 ))                # PV --grow ~= this

declare -a lv_mib
sum=0
for i in "${!mounts[@]}"; do
  s=${sizes[$i]}
  if [[ $s == *% ]]; then
    m=$(( vg_mib * ${s%\%} / 100 ))
  else
    m=$(( s * 1024 ))
  fi
  lv_mib[$i]=$m
  sum=$(( sum + m ))
done
needed=$(( sum + swap_mib ))
target=$(( vg_mib - 512 ))                           # keep >=512 MiB free

if [ $needed -gt $target ]; then
  log "WARN: ${needed} MiB requested > ${target} MiB available; scaling to fit"
  root_new=${lv_mib[0]}
  [ $root_new -gt $ROOT_FLOOR_MB ] && root_new=$ROOT_FLOOR_MB
  lv_mib[0]=$root_new
  nonroot=0
  for i in "${!mounts[@]}"; do [ $i -eq 0 ] && continue; nonroot=$(( nonroot + lv_mib[i] )); done
  nonroot=$(( nonroot + swap_mib ))
  rem=$(( target - root_new ))
  if [ $rem -lt $nonroot ] && [ $nonroot -gt 0 ]; then
    for i in "${!mounts[@]}"; do
      [ $i -eq 0 ] && continue
      lv_mib[$i]=$(( lv_mib[i] * rem / nonroot ))
      [ ${lv_mib[$i]} -lt 512 ] && lv_mib[$i]=512
    done
    swap_mib=$(( swap_mib * rem / nonroot ))
    [ $swap_mib -lt 256 ] && swap_mib=256
  fi
fi

# ---- 6. Write partition include ---------------------------------------------
P=/tmp/partitions.ks
{
  echo "ignoredisk --only-use=$disk"
  echo "zerombr"
  echo "clearpart --all --initlabel --drives=$disk"
  if [ "$fw" = uefi ]; then
    echo "part /boot/efi --fstype=efi --size=$EFI_MB --ondisk=$disk --fsoptions=\"umask=0077,shortname=winnt\""
  else
    echo "part biosboot --fstype=biosboot --size=1 --ondisk=$disk"
  fi
  echo "part /boot --fstype=xfs --size=$BOOT_MB --ondisk=$disk --fsoptions=\"nodev,nosuid,noexec\""
  echo "part pv.system --grow --ondisk=$disk"
  echo "volgroup $VG pv.system"
  for i in "${!mounts[@]}"; do
    if [ "${fsopts[$i]}" = defaults ]; then
      echo "logvol ${mounts[$i]} --vgname=$VG --name=${lvnames[$i]} --fstype=xfs --size=${lv_mib[$i]}"
    else
      echo "logvol ${mounts[$i]} --vgname=$VG --name=${lvnames[$i]} --fstype=xfs --size=${lv_mib[$i]} --fsoptions=\"${fsopts[$i]}\""
    fi
  done
  echo "logvol swap --vgname=$VG --name=swap --fstype=swap --size=$swap_mib"
  # No crashkernel=auto here — invalid on EL9+. kdump is set via %addon below.
  echo "bootloader --boot-drive=$disk"
} > "$P"
log "wrote $P:"; cat "$P" | sed 's/^/[ks-pre]   /'

# ---- 7. Write network include (boot-arg override, .250 fallback) ------------
get_arg(){ tr ' ' '\n' < /proc/cmdline | sed -n "s/^$1=//p" | head -1; }
ksip=$(get_arg ksip); ksgw=$(get_arg ksgw); ksdns=$(get_arg ksdns); kshost=$(get_arg kshostname)

if [ -n "$ksip" ]; then
  case "$ksip" in
    */*) ip=${ksip%/*}; cidr=${ksip#*/};;
    *)   ip=$ksip; cidr=$DEF_CIDR;;
  esac
else
  ip=$DEF_IP; cidr=$DEF_CIDR
fi
gw=${ksgw:-$DEF_GW}
dns=${ksdns:-$DEF_DNS}
host=${kshost:-$DEF_HOST}

cidr2mask(){
  local i full=$(( $1/8 )) rem=$(( $1%8 )) m=""
  for i in 1 2 3 4; do
    if   [ "$i" -le "$full" ]; then m+="255"
    elif [ "$i" -eq $((full+1)) ]; then m+="$(( 256 - 2**(8-rem) ))"
    else m+="0"; fi
    [ "$i" -lt 4 ] && m+="."
  done
  echo "$m"
}
mask=$(cidr2mask "$cidr")

# first link-up physical NIC; fall back to first physical NIC
nic=""
for n in /sys/class/net/*; do
  name=$(basename "$n"); [ "$name" = lo ] && continue
  [ -e "$n/device" ] || continue
  [ "$(cat "$n/carrier" 2>/dev/null || echo 0)" = 1 ] && { nic=$name; break; }
done
if [ -z "$nic" ]; then
  for n in /sys/class/net/*; do
    name=$(basename "$n"); [ "$name" = lo ] && continue
    [ -e "$n/device" ] || continue
    nic=$name; break
  done
fi
[ -z "$nic" ] && nic="link"      # last resort: anaconda picks first linked device
log "nic: $nic  ip: $ip/$cidr ($mask)  gw: $gw  dns: $dns  host: $host"

echo "network --bootproto=static --device=$nic --ip=$ip --netmask=$mask --gateway=$gw --nameserver=$dns --hostname=${host}.${DOMAIN} --activate --onboot=on" > /tmp/network.ks
log "wrote /tmp/network.ks"

%end

# =============================================================================
# %packages
# =============================================================================
%packages
@^minimal-environment
openssh-server
sudo
python3
chrony
dnf-plugins-core
qemu-guest-agent
open-vm-tools
# server-useless bloat (no wifi/HBA firmware, no audio, no boot splash)
-iwl*-firmware
-iprutils
-aic94xx-firmware
-alsa-*
-plymouth
%end

# =============================================================================
# %addon kdump — portable crash-dump reservation across EL8/9/10.
# Replaces the EL8-only 'crashkernel=auto' cmdline (REMOVED on EL9+, where it
# makes kdump fail). --reserve-mb=auto lets Anaconda compute the right value.
# =============================================================================
%addon com_redhat_kdump --enable --reserve-mb='auto'
%end

# =============================================================================
# %post — Ansible handoff: ansible user + key + passwordless sudo; harden sshd.
# =============================================================================
%post --interpreter=/bin/bash --log=/var/log/kickstart-post.log --erroronfail

# ansible service account: passwordless sudo, key-only login
id ansible &>/dev/null || useradd -m -s /bin/bash ansible
echo 'ansible ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/ansible
chmod 0440 /etc/sudoers.d/ansible

install -d -m 0700 -o ansible -g ansible /home/ansible/.ssh
cat > /home/ansible/.ssh/authorized_keys <<'KEY'
ssh-ed25519 AAAAREPLACE_WITH_YOUR_ANSIBLE_AUTOMATION_PUBLIC_KEY ansible@example.com
KEY
chmod 0600 /home/ansible/.ssh/authorized_keys
chown -R ansible:ansible /home/ansible/.ssh
restorecon -R /home/ansible/.ssh 2>/dev/null || true

# Harden sshd: no root login, key-only (ansible account has no password set)
sed -ri 's/^#?\s*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
sed -ri 's/^#?\s*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config

# Remove the saved kickstart copies — they contain the root password hash.
shred -u /root/anaconda-ks.cfg 2>/dev/null || rm -f /root/anaconda-ks.cfg
rm -f /root/original-ks.cfg

%end
