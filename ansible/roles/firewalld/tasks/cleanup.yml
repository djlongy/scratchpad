---
- name: Remove orphaned firewalld service XML files
  become: true  # root: removes files under /etc/firewalld/services/
  ansible.builtin.file:
    path: "/etc/firewalld/services/{{ item }}.xml"
    state: absent
  loop: "{{ firewalld_services_remove }}"
  loop_control:
    label: "{{ item }}"
  notify: Reload firewalld

- name: Remove orphaned firewalld zone XML files
  become: true  # root: removes files under /etc/firewalld/zones/
  ansible.builtin.file:
    path: "/etc/firewalld/zones/{{ item }}.xml"
    state: absent
  loop: "{{ firewalld_zones_remove }}"
  loop_control:
    label: "{{ item }}"
  notify: Reload firewalld
