---
- name: Bind interfaces to zones
  ansible.posix.firewalld:
    zone: "{{ item.zone }}"
    interface: "{{ item.interface }}"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ firewalld_interface_zone_bindings }}"
  loop_control:
    label: "{{ item.interface }} -> {{ item.zone }}"
