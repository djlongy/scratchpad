---
- name: Get the current default zone
  become: true  # root: firewall-cmd talks to firewalld over privileged D-Bus
  ansible.builtin.command: firewall-cmd --get-default-zone
  register: _firewalld_current_default_zone
  changed_when: false

- name: Set the default zone
  become: true  # root: firewall-cmd talks to firewalld over privileged D-Bus
  ansible.builtin.command: "firewall-cmd --set-default-zone={{ firewalld_default_zone }}"
  when: _firewalld_current_default_zone.stdout | trim != firewalld_default_zone
  changed_when: true
