---
# roles/certificate_authority/tasks/resolve_credentials.yml
#
# Shared passphrase resolution. Contract: declared Ansible-Vault var
# FIRST, HashiCorp Vault as an OPTIONAL fallback — so the role runs in any
# environment, including one that only uses Ansible Vault (no HashiCorp Vault
# reachable).
#   1. A declared variable (certificate_authority_<scope>_key_passphrase), typically
#      set from an Ansible-Vault-encrypted group_var, is the PRIMARY source.
#   2. HashiCorp Vault (certificate_authority_vault_secret) is used ONLY when that var
#      is empty AND a KV path is configured. The Jinja `A if C else B` is lazy, so
#      when the var is set the community.hashi_vault lookup is never evaluated and
#      need not be installed.
#   3. If neither source is present the play fails with a clear, actionable message.
# Include with:
#   - ansible.builtin.include_tasks: resolve_credentials.yml
#     vars: { _ca_resolve: [root, intermediate] }   # any of: root, intermediate, wildcard
# Sets _ca_root_key_passphrase / _ca_intermediate_key_passphrase /
# _ca_wildcard_key_passphrase; cached for the rest of the play so repeated phases
# don't re-resolve. Every task here is no_log — passphrases must never hit output.

- name: Assert a root key passphrase source is configured (Ansible Vault var or HashiCorp Vault path)
  ansible.builtin.assert:
    that:
      - >-
        (certificate_authority_root_key_passphrase | default('') | length > 0)
        or (certificate_authority_vault_secret | default('') | length > 0)
    fail_msg: >-
      No root key passphrase source configured. Set
      certificate_authority_root_key_passphrase (typically from an Ansible-Vault
      group_var) or set certificate_authority_vault_secret to the KV path holding it.
    quiet: true
  when:
    - "'root' in _ca_resolve"
    - _ca_root_key_passphrase is not defined

- name: Resolve root key passphrase (Ansible Vault var first, HashiCorp Vault fallback)
  ansible.builtin.set_fact:
    _ca_root_key_passphrase: >-
      {{ certificate_authority_root_key_passphrase
         if (certificate_authority_root_key_passphrase | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + certificate_authority_vault_secret
            + ':' + certificate_authority_root_key_passphrase_field) }}
  when:
    - "'root' in _ca_resolve"
    - _ca_root_key_passphrase is not defined
  no_log: true
  delegate_to: localhost
  become: false

- name: Assert an intermediate key passphrase source is configured (Ansible Vault var or HashiCorp Vault path)
  ansible.builtin.assert:
    that:
      - >-
        (certificate_authority_intermediate_key_passphrase | default('') | length > 0)
        or (certificate_authority_vault_secret | default('') | length > 0)
    fail_msg: >-
      No intermediate key passphrase source configured. Set
      certificate_authority_intermediate_key_passphrase (typically from an
      Ansible-Vault group_var) or set certificate_authority_vault_secret.
    quiet: true
  when:
    - "'intermediate' in _ca_resolve"
    - _ca_intermediate_key_passphrase is not defined

- name: Resolve intermediate key passphrase (Ansible Vault var first, HashiCorp Vault fallback)
  ansible.builtin.set_fact:
    _ca_intermediate_key_passphrase: >-
      {{ certificate_authority_intermediate_key_passphrase
         if (certificate_authority_intermediate_key_passphrase | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + certificate_authority_vault_secret
            + ':' + certificate_authority_intermediate_key_passphrase_field) }}
  when:
    - "'intermediate' in _ca_resolve"
    - _ca_intermediate_key_passphrase is not defined
  no_log: true
  delegate_to: localhost
  become: false

- name: Assert a wildcard key passphrase source is configured (Ansible Vault var or HashiCorp Vault path)
  ansible.builtin.assert:
    that:
      - >-
        (certificate_authority_wildcard_key_passphrase | default('') | length > 0)
        or (certificate_authority_vault_secret | default('') | length > 0)
    fail_msg: >-
      No wildcard key passphrase source configured. Set
      certificate_authority_wildcard_key_passphrase (typically from an Ansible-Vault
      group_var) or set certificate_authority_vault_secret.
    quiet: true
  when:
    - "'wildcard' in _ca_resolve"
    - _ca_wildcard_key_passphrase is not defined

- name: Resolve wildcard key passphrase (Ansible Vault var first, HashiCorp Vault fallback)
  ansible.builtin.set_fact:
    _ca_wildcard_key_passphrase: >-
      {{ certificate_authority_wildcard_key_passphrase
         if (certificate_authority_wildcard_key_passphrase | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + certificate_authority_vault_secret
            + ':' + certificate_authority_wildcard_key_passphrase_field) }}
  when:
    - "'wildcard' in _ca_resolve"
    - _ca_wildcard_key_passphrase is not defined
  no_log: true
  delegate_to: localhost
  become: false
