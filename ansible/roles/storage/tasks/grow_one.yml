---
# storage/tasks/grow_one.yml — resize one existing volume. `vol` is the
# resolved volume entry. Each step is idempotent and only reports changed
# when it actually enlarged something.

- name: "{{ vol.name }} | select backing device"
  ansible.builtin.set_fact:
    _g_dev: "{{ vol._pv if vol.lvm | bool else vol._part_dev }}"
    _g_has_part: "{{ (not vol.lvm | bool) or (vol.lvm | bool and vol.partition | bool) }}"

- name: "{{ vol.name }} | find parent disk of {{ _g_dev }}"
  ansible.builtin.command: "lsblk -ndo PKNAME {{ _g_dev }}"
  register: _g_pk
  changed_when: false
  failed_when: false
  check_mode: false

- name: "{{ vol.name }} | resolve disk to rescan"
  ansible.builtin.set_fact:
    _g_disk_name: "{{ _g_pk.stdout | trim if (_g_pk.stdout | trim | length > 0) else (_g_dev | basename) }}"

- name: "{{ vol.name }} | rescan disk for size change"
  ansible.builtin.shell: "echo 1 > /sys/class/block/{{ _g_disk_name }}/device/rescan"
  changed_when: false
  failed_when: false

- name: "{{ vol.name }} | grow partition {{ vol.partition_number }}"
  ansible.builtin.command: "growpart /dev/{{ _g_disk_name }} {{ vol.partition_number }}"
  register: _g_growpart
  changed_when: "'CHANGED' in _g_growpart.stdout"
  failed_when:
    - _g_growpart.rc != 0
    - "'NOCHANGE' not in (_g_growpart.stdout + _g_growpart.stderr)"
  when: _g_has_part | bool

- name: "{{ vol.name }} | resize physical volume"
  # pvresize always reports "resized or updated" even on a no-op, so it is
  # not a reliable change signal; actual growth surfaces via lvextend below.
  ansible.builtin.command: "pvresize {{ vol._pv }}"
  register: _g_pvresize
  changed_when: false
  when: vol.lvm | bool

# LVM resolves percentage sizes differently by suffix, so grow must match:
#   *FREE (100%FREE, 50%FREE) → free-relative, ADD with `-l +<size>`
#   *VG/*PVS (50%VG, 100%VG)  → absolute target with `-l <size>` (grows to it)
#   absolute (40G, 500M)      → absolute target with `-L <size>`
# All only grow (lvextend refuses to shrink → rc 3/5 = no-op).
- name: "{{ vol.name }} | extend logical volume (free-relative +{{ vol.size }})"
  ansible.builtin.command: "lvextend -l +{{ vol.size }} {{ vol.vg }}/{{ vol.lv }}"
  register: _g_lvextend_free
  changed_when: _g_lvextend_free.rc == 0
  failed_when: _g_lvextend_free.rc not in [0, 3, 5]
  when:
    - vol.lvm | bool
    - "'%' in vol.size"
    - vol.size | upper is search('FREE$')

- name: "{{ vol.name }} | extend logical volume to {{ vol.size }}"
  ansible.builtin.command: "lvextend -l {{ vol.size }} {{ vol.vg }}/{{ vol.lv }}"
  register: _g_lvextend_vg
  changed_when: _g_lvextend_vg.rc == 0
  failed_when: _g_lvextend_vg.rc not in [0, 3, 5]
  when:
    - vol.lvm | bool
    - "'%' in vol.size"
    - not (vol.size | upper is search('FREE$'))

- name: "{{ vol.name }} | extend logical volume to {{ vol.size }}"
  ansible.builtin.command: "lvextend -L {{ vol.size }} {{ vol.vg }}/{{ vol.lv }}"
  register: _g_lvextend_abs
  changed_when: _g_lvextend_abs.rc == 0
  failed_when: _g_lvextend_abs.rc not in [0, 3, 5]
  when:
    - vol.lvm | bool
    - "'%' not in vol.size"

- name: "{{ vol.name }} | grow xfs filesystem"
  ansible.builtin.command: "xfs_growfs {{ vol.mount }}"
  register: _g_xfs
  changed_when: "'data blocks changed' in (_g_xfs.stdout | default(''))"
  when:
    - vol.fstype == 'xfs'
    - vol.mount | length > 0

- name: "{{ vol.name }} | grow ext4 filesystem"
  ansible.builtin.command: "resize2fs {{ vol._dm_dev }}"
  register: _g_ext4
  changed_when: "'Nothing to do' not in (_g_ext4.stdout + _g_ext4.stderr)"
  when: vol.fstype == 'ext4'
