---
# storage/tasks/discover.yml
#
# Read-only discovery. Resolves each volume's disk selector to a concrete
# device and derives partition/dm names without assuming any layout, then
# records whether the volume's stack already exists. Output: _storage_resolved
# (each input volume + _disk, _part_dev, _pv, _dm_dev, _exists, _vg_exists).

# ── Reset accumulators (MUST be first) ───────────────────────────────────
# _storage_disks / _storage_pv_map / _storage_resolved are built by APPENDING
# (x | default([]) + [item]). set_fact values persist across plays for a host,
# so a SECOND invocation of this role in the same playbook run (e.g. an explicit
# storage play followed by baseline's own storage phase) would append to the
# PREVIOUS run's lists — re-introducing a stale volume entry whose _exists was
# computed when the disk was still blank, which then trips the FRESH guard on an
# already-provisioned disk. Reset here so every invocation starts clean.
- name: Reset per-run discovery accumulators
  ansible.builtin.set_fact:
    _storage_disks: []
    _storage_pv_map: []
    _storage_resolved: []
    _storage_disk_report: {}

# ── Root disk(s) — always excluded from auto-selection / provisioning ────
- name: Identify the physical disk(s) backing /
  become: true  # root: inspects block-device topology
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      src="$(findmnt -n -o SOURCE /)"
      lsblk -rsno NAME,TYPE "$src" 2>/dev/null | awk '$2=="disk"{print "/dev/"$1}' | sort -u
    executable: /bin/bash
  register: _storage_root_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: Record root disks
  ansible.builtin.set_fact:
    _storage_root_disks: "{{ _storage_root_raw.stdout_lines | map('trim') | list }}"

# ── Block-device inventory (JSON, sizes in bytes) ────────────────────────
- name: Gather block-device inventory
  become: true  # root: lsblk needs root to read SERIAL/WWN
  ansible.builtin.command: lsblk -pbJ -o NAME,TYPE,SIZE,SERIAL,WWN,FSTYPE,MOUNTPOINT
  register: _storage_lsblk_raw
  changed_when: false
  check_mode: false

- name: Parse block-device inventory
  ansible.builtin.set_fact:
    _storage_lsblk: "{{ _storage_lsblk_raw.stdout | from_json }}"

- name: Build non-root disk catalogue (for selectors)
  ansible.builtin.set_fact:
    _storage_disks: "{{ _storage_disks | default([]) + [_d] }}"
  vars:
    _d:
      name: "{{ item.name }}"
      size_bytes: "{{ item.size | int }}"
      size_gib: "{{ ((item.size | int) / 1073741824) | round(0, 'common') | int }}"
      serial: "{{ item.serial | default('') | default('', true) }}"
      wwn: "{{ item.wwn | default('') | default('', true) }}"
  loop: "{{ _storage_lsblk.blockdevices | selectattr('type', 'equalto', 'disk') | rejectattr('name', 'in', _storage_root_disks) | list }}"
  loop_control:
    label: "{{ item.name }}"

# Per-disk blank/why-not report for diagnostics: a disk is only a blank
# candidate when lsblk shows no fstype, no mountpoint and no children.
- name: Build per-disk blank-candidacy report
  ansible.builtin.set_fact:
    _storage_disk_report: "{{ _storage_disk_report | default({}) | combine({item.name: _why}) }}"
  vars:
    _why: >-
      {{ 'has partitions: ' ~ (item.children | map(attribute='name') | join(', '))
         if (item.children is defined)
         else 'mounted at ' ~ item.mountpoint if item.mountpoint
         else 'carries fstype ' ~ item.fstype if item.fstype
         else 'candidate' }}
  loop: "{{ _storage_lsblk.blockdevices | selectattr('type', 'equalto', 'disk') | rejectattr('name', 'in', _storage_root_disks) | list }}"
  loop_control:
    label: "{{ item.name }}"

# A disk is blank when it has no filesystem signature, no child partitions,
# and is not mounted (null fstype/mountpoint, no 'children' key in lsblk).
- name: Identify candidate blank disks (lsblk view)
  ansible.builtin.set_fact:
    _storage_blank_candidates: >-
      {{ _storage_lsblk.blockdevices
         | selectattr('type', 'equalto', 'disk')
         | rejectattr('name', 'in', _storage_root_disks)
         | rejectattr('children', 'defined')
         | selectattr('fstype', 'none')
         | selectattr('mountpoint', 'none')
         | map(attribute='name') | list }}

# lsblk's FSTYPE comes from the udev/blkid cache and can miss a deep
# whole-disk signature (e.g. iso9660) that `blkid -p` finds. Probe each
# candidate directly so `auto` never selects a disk that would later fail the
# FRESH guard — a disk counts as blank only if blkid -p reports nothing (rc 2).
- name: Probe candidate disks for hidden signatures
  become: true  # root: blkid -p opens the raw device
  ansible.builtin.command: "blkid -p -o value -s TYPE {{ item }}"
  loop: "{{ _storage_blank_candidates }}"
  register: _storage_blank_probe
  changed_when: false
  failed_when: false
  check_mode: false

- name: Keep only genuinely empty disks as blank
  ansible.builtin.set_fact:
    _storage_blank_disks: "{{ _storage_blank_probe.results | selectattr('rc', 'equalto', 2) | map(attribute='item') | list }}"

# Fold the probe verdicts into the report (a candidate with a deep signature
# is disqualified here, invisibly to lsblk — name the signature).
- name: Record hidden-signature probe verdicts
  ansible.builtin.set_fact:
    _storage_disk_report: >-
      {{ _storage_disk_report | default({})
         | combine({item.item: ('BLANK' if item.rc == 2
                                else 'hidden signature: ' ~ (item.stdout | trim | default('unknown', true))
                                     ~ ' (wipefs after manual inspection to reuse)')}) }}
  loop: "{{ _storage_blank_probe.results }}"
  loop_control:
    label: "{{ item.item }}"

# Flat list of devices that already carry a real filesystem (for plain
# volume existence checks). LVM2_member PVs are not filesystems.
- name: Build filesystem-bearing device list
  ansible.builtin.set_fact:
    _storage_fs_devices: >-
      {{ (_disks + _parts)
         | selectattr('fstype', 'defined') | selectattr('fstype')
         | rejectattr('fstype', 'equalto', 'LVM2_member')
         | map(attribute='name') | list }}
  vars:
    _disks: "{{ _storage_lsblk.blockdevices | selectattr('type', 'equalto', 'disk') | list }}"
    _parts: "{{ _storage_lsblk.blockdevices | selectattr('type', 'equalto', 'disk') | map(attribute='children') | select('defined') | flatten(levels=1) | list }}"

# ── Existing LVM state ───────────────────────────────────────────────────
# Activate any inactive VGs first: a data disk REATTACHED from a previous OS
# install (e.g. an OL8→OL9 rebuild) may not be auto-activated yet — without
# this, vgs/lvs would miss it, the volume would look absent, and an `auto`
# selector could grab a different blank disk instead of adopting the old one.
- name: Activate any inactive volume groups (reattached-disk safety)
  become: true  # root: LVM vgchange
  ansible.builtin.command: vgchange -ay
  changed_when: false
  failed_when: false
  check_mode: false

- name: Get existing volume groups
  become: true  # root: LVM vgs
  ansible.builtin.command: vgs --noheadings -o vg_name
  register: _storage_vgs_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: Get existing logical volumes
  become: true  # root: LVM lvs
  ansible.builtin.command: lvs --noheadings -o vg_name,lv_name
  register: _storage_lvs_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: Get physical-volume to volume-group mapping
  become: true  # root: LVM pvs
  ansible.builtin.command: pvs --noheadings -o pv_name,vg_name
  register: _storage_pvs_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: Parse LVM volume-group / logical-volume state
  ansible.builtin.set_fact:
    _storage_existing_vgs: "{{ _storage_vgs_raw.stdout_lines | map('trim') | select | list }}"
    _storage_existing_lvs: "{{ _storage_lvs_raw.stdout_lines | map('trim') | map('split') | map('join', '/') | list }}"

- name: Build physical-volume to volume-group mapping
  ansible.builtin.set_fact:
    _storage_pv_map: "{{ (_storage_pv_map | default([])) + [{'pv': (item.split() | first), 'vg': (item.split() | last)}] }}"
  loop: "{{ _storage_pvs_raw.stdout_lines | map('trim') | select | list }}"
  loop_control:
    label: "{{ item }}"

# by-size matches BOTH size conventions: '50G' is accepted as 50 GiB (binary,
# human_to_bytes) AND as 50 GB (decimal, 50e9 B ≈ 47 GiB) — hypervisors and
# clouds disagree on which a "50G disk" is, and a convention mismatch used to
# make the selector silently match nothing.
# by-size safety: refuse an AMBIGUOUS pin — two BLANK disks matching the pinned
# size means the role could build on the wrong one. Disambiguate with
# by-serial:/by-wwn: or an explicit /dev path. (Skipped once the VG exists —
# adoption never touches a disk, so ambiguity is harmless then.)
- name: Assert by-size selectors match at most one blank disk
  ansible.builtin.assert:
    that: (_bysize_blank_matches | length) <= 1
    fail_msg: >-
      Volume '{{ item.name }}' pins disk {{ item.disk }} but
      {{ _bysize_blank_matches | length }} blank disks match
      ({{ _bysize_blank_matches | join(', ') }}). Disambiguate with
      by-serial:/by-wwn: or an explicit /dev path.
    quiet: true
  vars:
    _bysize_sel: "{{ item.disk | regex_replace('^by-size:', '') | trim }}"
    _bysize_number: "{{ _bysize_sel | regex_replace('[^0-9.]', '') }}"
    _bysize_unit: "{{ (_bysize_sel | regex_replace('[^A-Za-z]', '') | upper)[:1] | default('G', true) }}"
    _bysize_dec_bytes: >-
      {{ (_bysize_number | float)
         * ({'K': 10**3, 'M': 10**6, 'G': 10**9, 'T': 10**12}.get(_bysize_unit, 10**9)) }}
    # compared as STRINGS on both sides — whether set_fact preserved size_gib as
    # int or str varies across ansible-core versions, and int-vs-str never matches
    _bysize_gib_targets: >-
      {{ [((_bysize_sel | human_to_bytes) / 1073741824) | round(0, 'common') | int,
          ((_bysize_dec_bytes | float) / 1073741824) | round(0, 'common') | int]
         | unique | map('string') | list }}
    _bysize_blank_matches: >-
      {{ (_storage_disks | map(attribute='name') | list)
         | zip(_storage_disks | map(attribute='size_gib') | map('string') | list)
         | selectattr('1', 'in', _bysize_gib_targets)
         | map(attribute='0')
         | select('in', _storage_blank_disks) | list }}
  loop: "{{ _storage_input | selectattr('disk', 'defined')
            | selectattr('disk', 'match', '^by-size:') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: not ((item.lvm | default(true) | bool) and (item.vg | default('') in _storage_existing_vgs))

# ── Resolve each volume ──────────────────────────────────────────────────
- name: Resolve volume selectors and derive device names
  ansible.builtin.set_fact:
    _storage_resolved: "{{ (_storage_resolved | default([])) + [_entry] }}"
  vars:
    _consumed: "{{ (_storage_resolved | default([])) | map(attribute='_disk') | reject('equalto', '') | list }}"
    _vg_exists: "{{ (item.lvm | bool) and (item.vg in _storage_existing_vgs) }}"
    _lv_exists: "{{ (item.lvm | bool) and ((item.vg ~ '/' ~ item.lv) in _storage_existing_lvs) }}"
    _existing_pv: "{{ (_storage_pv_map | selectattr('vg', 'equalto', item.vg) | map(attribute='pv') | list | first) | default('') }}"
    _sel: "{{ item.disk | default('') }}"
    _free_blank: "{{ _storage_blank_disks | difference(_consumed) }}"
    # by-size matches on rounded GiB, accepting BOTH size conventions: the
    # binary reading (human_to_bytes: 50G = 50 GiB) AND the decimal one
    # (50G = 50e9 B ≈ 47 GiB) — hypervisors disagree on what a "50G disk" is.
    _size_sel: "{{ (_sel | regex_replace('^by-size:', '') | trim) if _sel.startswith('by-size:') else '' }}"
    _size_number: "{{ _size_sel | regex_replace('[^0-9.]', '') if _size_sel else '0' }}"
    _size_unit: "{{ (_size_sel | regex_replace('[^A-Za-z]', '') | upper)[:1] | default('G', true) }}"
    _size_dec_bytes: >-
      {{ (_size_number | float)
         * ({'K': 10**3, 'M': 10**6, 'G': 10**9, 'T': 10**12}.get(_size_unit, 10**9)) }}
    # compared as STRINGS on both sides — set_fact int/str preservation varies
    # across ansible-core versions, and int-vs-str silently never matches
    _size_gib_targets: >-
      {{ ([((_size_sel | human_to_bytes) / 1073741824) | round(0, 'common') | int,
           ((_size_dec_bytes | float) / 1073741824) | round(0, 'common') | int]
          | unique | map('string') | list)
         if _size_sel else [] }}
    _match_size: >-
      {{ (((_storage_disks | map(attribute='name') | list)
           | zip(_storage_disks | map(attribute='size_gib') | map('string') | list)
           | selectattr('1', 'in', _size_gib_targets)
           | map(attribute='0') | list
           | difference(_consumed) | first) | default(''))
         if _sel.startswith('by-size:') else '' }}
    _match_serial: "{{ ((_storage_disks | selectattr('serial', 'equalto', _sel | regex_replace('^by-serial:', '')) | map(attribute='name') | difference(_consumed) | first) | default('')) if _sel.startswith('by-serial:') else '' }}"
    _match_wwn: "{{ ((_storage_disks | selectattr('wwn', 'equalto', _sel | regex_replace('^by-wwn:', '')) | map(attribute='name') | difference(_consumed) | first) | default('')) if _sel.startswith('by-wwn:') else '' }}"
    _resolved_disk: >-
      {{ '' if (_vg_exists | bool)
         else _sel if _sel.startswith('/dev/')
         else _match_size if _sel.startswith('by-size:')
         else _match_serial if _sel.startswith('by-serial:')
         else _match_wwn if _sel.startswith('by-wwn:')
         else (_free_blank | first | default('')) if (_sel == 'auto' or _sel == '')
         else '' }}
    _part_dev: >-
      {{ '' if (_resolved_disk | length == 0)
         else (_resolved_disk ~ 'p' ~ (item.partition_number | string))
              if (_resolved_disk | basename is match('(nvme|mmcblk|loop|nbd)'))
         else (_resolved_disk ~ (item.partition_number | string)) }}
    _pv: >-
      {{ _existing_pv if ((_vg_exists | bool) and (_existing_pv | length > 0))
         else _part_dev if (item.partition | bool)
         else _resolved_disk }}
    _dm_dev: "{{ ('/dev/mapper/' ~ item.vg ~ '-' ~ item.lv) if (item.lvm | bool) else _part_dev }}"
    _exists: "{{ (_lv_exists | bool) if (item.lvm | bool) else (_part_dev in _storage_fs_devices) }}"
    _entry: "{{ item | combine({'_disk': _resolved_disk, '_part_dev': _part_dev, '_pv': _pv, '_dm_dev': _dm_dev, '_exists': _exists | bool, '_vg_exists': _vg_exists | bool}) }}"
  loop: "{{ _storage_volumes }}"
  loop_control:
    label: "{{ item.name }}"

# ── Resilience guards — a volume must never silently dead-end ─────────────
# VGs whose PVs live on a root disk (e.g. 'ol' on /dev/sda3, 'rl', 'vg00').
- name: Identify volume groups living on the root disk(s)
  ansible.builtin.set_fact:
    _storage_root_vgs: >-
      {{ [] if (_storage_root_disks | length == 0)
         else (_storage_pv_map | default([])
               | selectattr('pv', 'match', '^(' ~ (_storage_root_disks | map('regex_escape') | join('|')) ~ ')')
               | map(attribute='vg') | unique | list) }}

# Naming a PENDING volume's vg after the OS volume group makes the VG-adoption
# path adopt the ROOT VG: disk resolution is skipped (the blank data disk is
# ignored), the LV is never created, and mount ends "no filesystem yet".
# The vg does NOT need to match anything existing — it names the NEW VG the
# role creates on the resolved data disk. (EXISTING stacks in the root VG are
# fine — growing the root LV is a supported use; only creation is refused.)
- name: Refuse to CREATE data volumes inside the OS root volume group
  ansible.builtin.assert:
    that: item.vg not in _storage_root_vgs
    fail_msg: >-
      Volume '{{ item.name }}' declares vg '{{ item.vg }}', which is the OS ROOT
      volume group ({{ _storage_pv_map | default([]) | selectattr('vg', 'equalto', item.vg)
      | map(attribute='pv') | join(', ') }} on the root disk). The role never carves
      NEW data volumes out of the root VG. Give the data disk its OWN vg name — it
      does not need to match any existing VG; the role creates it on the resolved
      disk (e.g. vg: vg_{{ item.name }}).
    quiet: true
  loop: "{{ _storage_resolved | selectattr('lvm') | selectattr('provision') | rejectattr('_exists') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: storage_provision | bool

# Full diagnostic dump — printed ONLY when a pending volume failed to resolve,
# so the assert below never fails without the complete picture on screen.
- name: Dump discovery diagnostics for unresolved volumes
  ansible.builtin.debug:
    msg:
      - "UNRESOLVED volumes: {{ _unresolved | map(attribute='name') | list }}"
      - "Root disk(s): {{ _storage_root_disks }} (root VGs: {{ _storage_root_vgs }})"
      - >-
        Non-root disks:
        {{ _storage_disks | default([])
           | map(attribute='name')
           | zip(_storage_disks | default([]) | map(attribute='size_bytes'),
                 _storage_disks | default([]) | map(attribute='size_gib'),
                 _storage_disks | default([]) | map(attribute='serial')) | list }}
        (name, bytes, rounded GiB, serial)
      - "Blank verdicts: {{ _storage_disk_report | default({}) }}"
      - "Blank disks usable by selectors: {{ _storage_blank_disks }}"
      - "Existing VGs: {{ _storage_existing_vgs }}; PV map: {{ _storage_pv_map | default([]) }}"
      - >-
        Per-volume resolution:
        {{ _storage_resolved
           | map(attribute='name')
           | zip(_storage_resolved | map(attribute='disk'),
                 _storage_resolved | map(attribute='_disk'),
                 _storage_resolved | map(attribute='_vg_exists'),
                 _storage_resolved | map(attribute='_exists')) | list }}
        (name, selector, resolved disk, vg_exists, exists)
      - >-
        by-size hint: '50G' is tried as BOTH 50 GiB (binary) and 50 GB
        (decimal ≈ 47 GiB) — compare with the rounded-GiB column above; a disk
        whose GiB matches neither needs the selector adjusted (or use
        by-serial:/an explicit /dev path).
  vars:
    _unresolved: >-
      {{ _storage_resolved | selectattr('provision') | rejectattr('_exists')
         | selectattr('_disk', 'equalto', '') | list }}
  when:
    - storage_provision | bool
    - _unresolved | length > 0

# Anything still pending (provision-enabled, does not exist) MUST have a
# resolved target — otherwise provision.yml would skip it silently and mount
# would report "no filesystem yet" with no explanation.
- name: Assert every pending volume resolved a target (no silent dead ends)
  ansible.builtin.assert:
    that: (item._exists | bool) or (item._disk | length > 0)
    fail_msg: >-
      Volume '{{ item.name }}' cannot be provisioned:
      {% if item._vg_exists | bool -%}
      vg '{{ item.vg }}' already exists (PVs: {{ _storage_pv_map | default([])
      | selectattr('vg', 'equalto', item.vg) | map(attribute='pv') | join(', ') }})
      but LV '{{ item.lv }}' is missing — the VG-adoption path expects a reattached
      disk already carrying the full stack. Create the LV manually, remove/rename
      the stray VG, or use a different vg name so the role provisions a blank disk
      fresh.
      {%- else -%}
      disk selector '{{ item.disk | default('auto', true) }}' matched no available
      blank disk. Blank disks: {{ _storage_blank_disks | join(', ') | default('none', true) }};
      non-root disks: {{ _storage_disks | default([]) | map(attribute='name') | join(', ') }}
      (sizes: {{ _storage_disks | default([]) | map(attribute='size_gib') | join(', ') }} GiB).
      Check the size/serial, and that the disk is truly empty (an old signature
      blocks blank detection — wipefs it after manual inspection).
      {%- endif %}
    quiet: true
  loop: "{{ _storage_resolved | selectattr('provision') | rejectattr('_exists') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: storage_provision | bool

- name: Show discovery results
  ansible.builtin.debug:
    msg:
      - "Root disks: {{ _storage_root_disks }}"
      - "Blank disks: {{ _storage_blank_disks }}"
      - "Existing VGs: {{ _storage_existing_vgs }} (root: {{ _storage_root_vgs }})"
      - "Resolved: {{ _storage_resolved | map(attribute='name') | zip(_storage_resolved | map(attribute='_disk'), _storage_resolved | map(attribute='_exists')) | list }}"
  when: storage_debug | bool
