---
# Pin version to avoid GitHub API rate limits during fleet-wide deploys.
# To upgrade: bump this version, then re-run the role.
node_exporter_version: "1.10.2"

node_exporter_user: node_exporter
node_exporter_group: node_exporter
node_exporter_port: 9100
node_exporter_install_dir: /usr/local/bin
node_exporter_textfile_dir: /var/lib/node_exporter/textfile_collector

# Architecture map: ansible_architecture -> node_exporter arch string
node_exporter_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armv7
