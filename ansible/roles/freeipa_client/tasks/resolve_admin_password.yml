---
# roles/freeipa_client/tasks/resolve_admin_password.yml
# Resolve the IPA admin password into the internal fact _freeipa_client_admin_pw,
# declared-var-first with a HashiCorp Vault fallback (ADR-0011). Reusable: any phase
# that needs admin creds includes this (enroll, dns). The `is not defined` guard makes
# it resolve exactly once — a full run resolves in enroll and later includes no-op;
# a tag-isolated run (e.g. `--tags dns`) resolves standalone. Callers gate the include
# itself for the admin-join-only condition (skipped for OTP joins, which have no creds).

- name: Resolve admin password (declared var first, HashiCorp Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_client_admin_pw: >-
      {{ freeipa_client_admin_password
         if (freeipa_client_admin_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_client_vault_secret
            + ':' + freeipa_client_admin_password_field) }}
  no_log: true
  delegate_to: localhost
  become: false
  when: _freeipa_client_admin_pw is not defined
