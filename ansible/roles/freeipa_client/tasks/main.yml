---
# roles/freeipa_client/tasks/main.yml
#
# Phase order (a no-tag run executes everything):
#   preflight  → hostname/time guards + stale-enrolment detection & cleanup
#   enroll     → upstream ipaclient join (idempotent; re-joins if preflight found stale)
#   dns        → seed this host's A/PTR record server-side (on by default; admin-join only)
#   configure  → post-join client config (automount homes, verification)
#   resilience → ensure login survives IPA/storage outages (SSSD cache + SSH keys)

# Server guard — runs on EVERY invocation regardless of --tags selection.
# Must live here (not in a tag-gated phase file) and carry `always`, otherwise a
# tag-limited run (e.g. --tags configure) skips the guard but still executes the
# other phases against a FreeIPA server host that happens to be in the target group.
- name: End host — this host is a FreeIPA server, not a client
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} is in the '{{ freeipa_client_server_group }}'
      inventory group (FreeIPA servers). Ending host — the client role must not
      run on a server. Set freeipa_client_on_master=true only for the deliberate
      configure-a-client-on-a-master case.
  when:
    - inventory_hostname in (groups[freeipa_client_server_group] | default([]))
    - not (freeipa_client_on_master | bool)
  tags: [always]

- name: End play for FreeIPA server hosts
  ansible.builtin.meta: end_host
  when:
    - inventory_hostname in (groups[freeipa_client_server_group] | default([]))
    - not (freeipa_client_on_master | bool)
  tags: [always]

- name: Ensure network facts are present (tag-isolated / gather_facts:false runs)
  # Self-heals ansible_default_ipv4 for any phase (dns, configure) when a --tags run
  # or a gather_facts:false caller skipped fact-gathering. No-ops on a normal run.
  ansible.builtin.setup:
    gather_subset: ['!all', '!min', 'network']
  when: ansible_default_ipv4 is not defined
  tags: [always]

- name: Run FreeIPA client preflight (incl. stale-rejoin cleanup)
  ansible.builtin.import_tasks: preflight.yml
  tags: [preflight]

- name: Enrol the host as a FreeIPA client
  ansible.builtin.import_tasks: enroll.yml
  tags: [enroll, install]

- name: Seed this host's DNS record server-side
  ansible.builtin.import_tasks: dns.yml
  when:
    - freeipa_client_seed_dns_record | bool
    - not (freeipa_client_use_otp | bool)   # server-side write needs admin creds
  tags: [dns]

- name: Configure post-join client integration
  ansible.builtin.import_tasks: configure.yml
  tags: [configure]

- name: Apply offline-resilience guards (login independent of IPA/NFS)
  ansible.builtin.import_tasks: resilience.yml
  when: freeipa_client_offline_resilient | bool
  tags: [resilience]
