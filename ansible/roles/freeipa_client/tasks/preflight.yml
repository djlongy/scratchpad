---
# roles/freeipa_client/tasks/preflight.yml
# Hostname/time guards + stale-enrolment detection and cleanup. This is what makes
# rejoining stale machines reliable: an existing enrolment is health-checked
# (realm match + host-keytab kinit), and a broken or realm-mismatched one is
# uninstalled so enroll.yml can cleanly re-join. A healthy, correct enrolment is
# left untouched (idempotent — enroll.yml then no-ops).

# Note: the FreeIPA-server guard (end_host) lives at the top of main.yml, tagged
# `always`, so it fires on every invocation — including tag-limited runs that skip
# this preflight phase. Do not reinstate it here (it would only carry the `preflight`
# tag and be bypassed under, e.g., --tags configure).

- name: Install preflight tooling (ipa-client, krb5, chrony, bind-utils)
  ansible.builtin.dnf:
    name: "{{ freeipa_client_packages }}"
    state: present
  become: true                           # package install requires root
  when: ansible_os_family == 'RedHat'

- name: Set the system hostname to the client FQDN
  ansible.builtin.hostname:
    name: "{{ freeipa_client_fqdn }}"
  become: true                           # hostnamectl/hostname change requires root
  when: freeipa_client_set_hostname | bool

- name: Ensure chrony is synchronised (Kerberos needs < 5 min skew)
  ansible.builtin.command: chronyc tracking
  register: _freeipa_client_chrony
  changed_when: false
  failed_when: false

- name: Warn if time sync is not healthy
  ansible.builtin.debug:
    msg: >-
      WARNING: chrony not tracking (rc={{ _freeipa_client_chrony.rc }}). Kerberos
      enrolment fails above ~5 min clock skew — fix NTP if join fails.
  when: _freeipa_client_chrony.rc != 0

- name: Check whether the host is already IPA-enrolled
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: _freeipa_client_conf

- name: Read current enrolment config (if enrolled)
  ansible.builtin.slurp:
    src: /etc/ipa/default.conf
  register: _freeipa_client_conf_raw
  when: _freeipa_client_conf.stat.exists

- name: Parse current enrolment realm
  ansible.builtin.set_fact:
    _freeipa_client_current_realm: >-
      {{ (_freeipa_client_conf_raw.content | b64decode
          | regex_search('realm\s*=\s*(\S+)', '\1') | first | default('')) | trim }}
  when: _freeipa_client_conf.stat.exists

# A FAILURE HERE UNINSTALLS THE ENROLMENT, so it must not trigger on a blip.
# One unlucky kinit — a KDC restart, a moment of clock skew, crypto state still
# settling right after a FIPS reboot — would otherwise tear down a perfectly
# healthy client and force a full re-enrol, which destabilises krb5 for every
# task that follows. Retry before concluding the enrolment is genuinely broken.
- name: Health-check existing enrolment via host-keytab kinit
  ansible.builtin.command: "kinit -k host/{{ freeipa_client_fqdn }}@{{ freeipa_client_realm }}"
  register: _freeipa_client_kinit
  until: _freeipa_client_kinit.rc == 0
  retries: 3
  delay: 5
  changed_when: false
  failed_when: false
  become: true                           # /etc/krb5.keytab is root-only; non-root → "no suitable keys"
  when:
    - _freeipa_client_conf.stat.exists
    - freeipa_client_rejoin_stale | bool

- name: Destroy health-check ticket
  ansible.builtin.command: kdestroy
  changed_when: false
  failed_when: false
  become: true                           # clear the root ccache the kinit above created
  when:
    - _freeipa_client_conf.stat.exists
    - freeipa_client_rejoin_stale | bool

- name: Decide whether the enrolment is stale and needs a rejoin
  ansible.builtin.set_fact:
    _freeipa_client_stale: >-
      {{ (freeipa_client_force_rejoin | bool)
         or (_freeipa_client_conf.stat.exists and freeipa_client_rejoin_stale | bool and (
              (_freeipa_client_current_realm | default('')) != freeipa_client_realm
              or (_freeipa_client_kinit.rc | default(1)) != 0
         )) }}

- name: Report enrolment state
  ansible.builtin.debug:
    msg: >-
      enrolled={{ _freeipa_client_conf.stat.exists }}
      current_realm={{ _freeipa_client_current_realm | default('none') }}
      target_realm={{ freeipa_client_realm }}
      host_keytab_kinit_rc={{ _freeipa_client_kinit.rc | default('n/a') }}
      needs_rejoin={{ _freeipa_client_stale }}

# Packages are installed above, but a half-enrolled host (leftover /etc/ipa
# without ipa-client) or a tag-limited run that skipped the dnf task can still
# reach here. Without a binary check, ansible.builtin.command dies with
# [Errno 2] No such file or directory — opaque and non-actionable.
- name: Locate ipa-client-install before stale uninstall
  ansible.builtin.command: command -v ipa-client-install
  register: _freeipa_client_ipa_bin
  changed_when: false
  failed_when: false
  when:
    - _freeipa_client_conf.stat.exists
    - _freeipa_client_stale | bool

- name: Fail if stale enrolment needs uninstall but ipa-client-install is missing
  ansible.builtin.fail:
    msg: >-
      /etc/ipa/default.conf exists and enrolment is stale
      (needs_rejoin=true), but ipa-client-install is not on PATH. Install the
      freeipa-client package (or re-run without skipping the preflight package
      task) before rejoining.
  when:
    - _freeipa_client_conf.stat.exists
    - _freeipa_client_stale | bool
    - (_freeipa_client_ipa_bin.rc | default(1)) != 0

- name: Uninstall stale enrolment before rejoin
  ansible.builtin.command: ipa-client-install --uninstall --unattended
  register: _freeipa_client_uninstall
  changed_when: _freeipa_client_uninstall.rc == 0
  become: true                           # ipa-client-install --uninstall requires root
  failed_when:
    - _freeipa_client_uninstall.rc != 0
    - "'not configured' not in (_freeipa_client_uninstall.stdout | default('') ~ _freeipa_client_uninstall.stderr | default(''))"
  when:
    - _freeipa_client_conf.stat.exists
    - _freeipa_client_stale | bool
    - (_freeipa_client_ipa_bin.rc | default(1)) == 0
