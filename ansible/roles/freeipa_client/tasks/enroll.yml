---
# roles/freeipa_client/tasks/enroll.yml
# Wrap freeipa.ansible_freeipa.ipaclient to enrol the host. Idempotent: on an
# already-enrolled healthy host the upstream role no-ops; preflight will have
# uninstalled a stale enrolment so this re-joins cleanly.
#
# `omit` does NOT work for include_role vars (it leaks the placeholder string),
# so required inputs are set via set_fact and optional ones only when provided.

- name: Validate enrolment inputs
  ansible.builtin.assert:
    that:
      - freeipa_client_domain | length > 0
      - freeipa_client_realm | length > 0
      - >-
          (freeipa_client_use_otp | bool)
          or (freeipa_client_admin_password | default('') | length > 0)
          or (freeipa_client_vault_secret | default('') | length > 0)
      - (not (freeipa_client_use_otp | bool)) or (freeipa_client_otp | default('') | length > 0)
    fail_msg: >-
      Need freeipa_client_domain + freeipa_client_realm, and either an admin
      password for admin-join (freeipa_client_admin_password declared, or
      freeipa_client_vault_secret for the HashiCorp Vault fallback) or
      freeipa_client_use_otp=true with freeipa_client_otp set.

- name: Resolve admin password for enrolment (admin-join only)
  ansible.builtin.include_tasks: resolve_admin_password.yml
  when: not (freeipa_client_use_otp | bool)

- name: Map required ipaclient inputs
  ansible.builtin.set_fact:
    ipaclient_domain: "{{ freeipa_client_domain }}"
    ipaclient_realm: "{{ freeipa_client_realm }}"
    ipaclient_hostname: "{{ freeipa_client_fqdn }}"
    ipaclient_servers: "{{ freeipa_client_servers }}"
    ipaclient_force_join: "{{ (freeipa_client_force_join | bool) or (_freeipa_client_stale | default(false) | bool) }}"
    ipaclient_kinit_attempts: "{{ freeipa_client_kinit_attempts | int }}"
    ipaclient_no_dns_lookup: "{{ freeipa_client_no_dns_lookup }}"
    ipaclient_on_master: "{{ freeipa_client_on_master }}"
    ipaclient_mkhomedir: "{{ freeipa_client_mkhomedir }}"
    ipaclient_no_sudo: "{{ freeipa_client_no_sudo }}"
    ipaclient_subid: "{{ freeipa_client_subid }}"
    ipaclient_all_ip_addresses: "{{ freeipa_client_all_ip_addresses }}"
    ipasssd_enable_dns_updates: "{{ freeipa_client_enable_dns_updates }}"
    ipaclient_no_dns_sshfp: "{{ freeipa_client_no_dns_sshfp }}"
    ipaclient_ssh_trust_dns: "{{ freeipa_client_ssh_trust_dns }}"
    ipaclient_no_ssh: "{{ freeipa_client_no_ssh }}"
    ipaclient_no_sshd: "{{ freeipa_client_no_sshd }}"
    ipaclient_no_dnssec_validation: "{{ freeipa_client_no_dnssec_validation }}"
    ipaclient_configure_dns_resolver: "{{ freeipa_client_configure_dns_resolver }}"
    ipaclient_no_ntp: "{{ freeipa_client_no_ntp }}"
    ipaclient_ntp_servers: "{{ freeipa_client_ntp_servers }}"
  no_log: true

- name: Map admin-join credentials
  ansible.builtin.set_fact:
    ipaadmin_principal: "{{ freeipa_client_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_client_admin_pw }}"
  no_log: true
  when: not (freeipa_client_use_otp | bool)

- name: Map OTP-join credential
  ansible.builtin.set_fact:
    ipaclient_otp: "{{ freeipa_client_otp }}"
  no_log: true
  when: freeipa_client_use_otp | bool

- name: Map optional NTP pool when provided
  ansible.builtin.set_fact:
    ipaclient_ntp_pool: "{{ freeipa_client_ntp_pool }}"
  when: freeipa_client_ntp_pool | default('') | length > 0

- name: Map optional NFS home automount location when provided
  ansible.builtin.set_fact:
    ipaclient_automount_location: "{{ freeipa_client_automount_location }}"
  when: freeipa_client_automount_location | default('') | length > 0

- name: Enrol via the upstream ipaclient role
  ansible.builtin.import_role:            # static import so task-level become propagates to the role's tasks
    name: freeipa.ansible_freeipa.ipaclient
  vars:
    state: present
  become: true                           # ipaclient writes /etc/ipa, sssd and krb5 config — root-only

- name: Refresh local IPA certificate stores (ipa-certupdate)
  ansible.builtin.command: ipa-certupdate
  become: true                           # writes to the system NSS/CA trust store — root-only
  changed_when: false
