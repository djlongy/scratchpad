---
# roles/freeipa_client/tasks/certs.yml
# Request FreeIPA-issued (Dogtag CA) service certificates via certmonger, so a
# service on this enrolled host (e.g. Vault) can serve a cert that chains to the
# estate CA — auto-renewing, no self-signed trust.
#
# Uses this host's OWN Kerberos identity (host/<fqdn>@REALM in /etc/krb5.keytab,
# created at enrolment) — so NO server-side admin is needed here (a host may
# request a cert for its own principal). Each entry in freeipa_client_service_certs:
#   {cert_path, key_path, dnsname, principal(optional), postsave(optional)}
# Idempotent: skips a cert already tracked by certmonger for that cert_path.

- name: "Certs | Install certmonger + IPA cert helper"
  ansible.builtin.package:
    name: "{{ freeipa_client_cert_packages }}"
    state: present
  become: true

- name: "Certs | Ensure certmonger is enabled and running"
  ansible.builtin.service:
    name: certmonger
    state: started
    enabled: true
  become: true

- name: "Certs | Ensure each cert's output directory exists"
  ansible.builtin.file:
    path: "{{ item.cert_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ freeipa_client_service_certs }}"
  loop_control:
    label: "{{ item.cert_path | dirname }}"
  become: true

# certmonger tracks by request; getcert list -f <cert> is non-zero/empty when the
# cert is not yet tracked. This is the idempotency probe (never changes state).
- name: "Certs | Check which certs certmonger already tracks"
  ansible.builtin.command:
    cmd: "getcert list -f {{ item.cert_path }}"
  loop: "{{ freeipa_client_service_certs }}"
  loop_control:
    label: "{{ item.cert_path }}"
  register: _freeipa_client_getcert_list
  changed_when: false
  failed_when: false
  become: true

# -w waits for issuance so the cert EXISTS on return (before any consumer starts).
# -K uses this host's principal by default (self-managed; no admin needed).
- name: "Certs | Request each service certificate via ipa-getcert"
  ansible.builtin.command:
    cmd: >-
      ipa-getcert request -w
      -f {{ item.item.cert_path }}
      -k {{ item.item.key_path }}
      -K {{ item.item.principal | default('host/' ~ freeipa_client_fqdn ~ '@' ~ freeipa_client_realm) }}
      -D {{ item.item.dnsname | default(freeipa_client_fqdn) }}
      -N CN={{ item.item.dnsname | default(freeipa_client_fqdn) }}
      {{ ('-C ' ~ item.item.postsave) if (item.item.postsave | default('')) else '' }}
  loop: "{{ _freeipa_client_getcert_list.results }}"
  loop_control:
    label: "{{ item.item.cert_path }}"
  when: >-
    item.rc != 0
    or ('No request found' in (item.stdout | default('') ~ item.stderr | default('')))
    or (item.stdout | default('') | trim | length == 0)
  register: _freeipa_client_getcert_req
  changed_when: "'New signing request' in (_freeipa_client_getcert_req.stdout | default(''))
                 or 'Submitting' in (_freeipa_client_getcert_req.stdout | default(''))"
  become: true

- name: "Certs | Verify each certificate was issued (MONITORING/tracked)"
  ansible.builtin.command:
    cmd: "getcert list -f {{ item.cert_path }}"
  loop: "{{ freeipa_client_service_certs }}"
  loop_control:
    label: "{{ item.cert_path }}"
  register: _freeipa_client_getcert_verify
  changed_when: false
  failed_when: >-
    _freeipa_client_getcert_verify.rc != 0
    or 'status: MONITORING' not in _freeipa_client_getcert_verify.stdout
  become: true
