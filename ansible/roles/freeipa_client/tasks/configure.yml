---
# roles/freeipa_client/tasks/configure.yml
# Post-join verification. The heavy lifting (SSSD with id/sudo/hbac providers,
# CA trust in /etc/ipa/ca.crt + the system trust store, krb5.conf, mkhomedir via
# oddjob, SSHFP/ssh config, NTP) is done by the upstream ipaclient role during
# enrol. This phase confirms the result and surfaces what must be done elsewhere.
#
# SERVER-SIDE (NOT here — a client cannot self-assign these; need admin):
#   - Host-group membership  -> freeipa_server IAM `freeipa_iam_hostgroups`
#                               (host lists) or a host-management play
#   - HBAC rules             -> freeipa_server IAM `freeipa_iam_hbac_rules`
#                               (SSSD on this client enforces them automatically)
#   - sudo rules             -> freeipa_server IAM `freeipa_iam_sudo_rules`
#                               (this client runs them via the SSSD sudo provider)
#   - DNS zones/records beyond this host's own auto-registered A/SSHFP records

- name: Ensure SSSD is enabled and running
  ansible.builtin.service:
    name: sssd
    state: started
    enabled: true
  become: true                           # systemd unit management needs root

- name: Confirm IPA CA cert is present in the system trust
  ansible.builtin.stat:
    path: /etc/ipa/ca.crt
  register: _freeipa_client_cacrt
  failed_when: not _freeipa_client_cacrt.stat.exists

- name: Verify the host can authenticate with its keytab (kinit -k)
  ansible.builtin.command: "kinit -k host/{{ freeipa_client_fqdn }}@{{ freeipa_client_realm }}"
  register: _freeipa_client_verify
  changed_when: false
  failed_when: false
  become: true                           # /etc/krb5.keytab is root-only; non-root → "no suitable keys"

# When kinit -k fails (commonly "no suitable keys for host/<fqdn>@<realm>" — a principal/realm
# mismatch between what the role builds and what is actually in the keytab), gather the keytab
# contents + host identity so the failure is ACTIONABLE instead of a bare non-zero rc. All
# read-only and tolerant; the play still fails (with the enriched message) on a real mismatch.
- name: Diagnose keytab on kinit -k failure
  when: (_freeipa_client_verify.rc | default(1)) != 0
  become: true                           # klist -kt/-ke read the root-only keytab
  block:
    - name: Diag | List host keytab principals (klist -kt)
      ansible.builtin.command: "klist -kt /etc/krb5.keytab"
      register: _freeipa_client_klist
      changed_when: false
      failed_when: false

    - name: Diag | List host keytab encryption types (klist -ke)
      ansible.builtin.command: "klist -ke /etc/krb5.keytab"
      register: _freeipa_client_klist_enc
      changed_when: false
      failed_when: false

    - name: Diag | Resolve the host's actual FQDN
      ansible.builtin.command: "hostname -f"
      register: _freeipa_client_hostnamef
      changed_when: false
      failed_when: false

    - name: Fail with enriched kinit -k diagnostics
      ansible.builtin.fail:
        msg: |-
          kinit -k FAILED for the principal this role built:
            tried principal : host/{{ freeipa_client_fqdn }}@{{ freeipa_client_realm }}
            kinit rc        : {{ _freeipa_client_verify.rc | default('n/a') }}
            kinit stderr    : {{ _freeipa_client_verify.stderr | default('') | trim }}
          Host identity (compare against the keytab below):
            freeipa_client_fqdn  : {{ freeipa_client_fqdn }}
            freeipa_client_realm : {{ freeipa_client_realm }}
            hostname -f          : {{ _freeipa_client_hostnamef.stdout | default('?') | trim }}
          Keytab principals — klist -kt /etc/krb5.keytab:
          {{ _freeipa_client_klist.stdout | default('(klist failed: ' ~ (_freeipa_client_klist.stderr | default('') | trim) ~ ')') }}
          Keytab enctypes — klist -ke:
          {{ _freeipa_client_klist_enc.stdout | default('') }}
          Most common cause: the keytab holds host/<fqdn>@<REALM> with a DIFFERENT realm or
          FQDN than the role built (a FreeIPA realm is independent of the DNS domain). Set
          freeipa_client_realm / freeipa_client_fqdn to match the principal shown above, then
          re-run. (Paste this block back for help.)

- name: Destroy verification ticket
  ansible.builtin.command: kdestroy
  changed_when: false
  failed_when: false
  become: true                           # clear the root ccache the kinit above created

- name: Verify SSSD resolves an IPA identity (admin)
  ansible.builtin.command: id "admin@{{ freeipa_client_domain }}"
  register: _freeipa_client_idcheck
  changed_when: false
  failed_when: false

- name: Force DNS A-record sync to the host IP on drift (opt-in)
  when:
    - freeipa_client_enable_dns_updates | bool
    - freeipa_client_sync_dns_record | bool
    - freeipa_client_servers | length > 0   # need an explicit server for the authoritative query
  block:
    - name: Ensure dig is available for the authoritative A-record check
      # Installed cross-OS here because preflight's package install is RedHat-only —
      # this keeps the drift self-heal working on Debian/Ubuntu clients too.
      ansible.builtin.package:
        name: "{{ 'bind-utils' if ansible_os_family == 'RedHat' else 'dnsutils' }}"
        state: present
      become: true                           # package install requires root

    - name: Query the authoritative A record from the IPA DNS server
      # dig @server bypasses /etc/hosts and the SSSD cache (unlike getent).
      ansible.builtin.command: >-
        dig +short +time=3 +tries=1 A {{ freeipa_client_fqdn }}
        @{{ freeipa_client_servers | first }}
      register: _freeipa_client_dns_a
      changed_when: false
      failed_when: false

    - name: Restart SSSD to push a dyndns update when the A record has drifted
      # Fail-safe: only act when we got a definitive answer AND it differs from
      # the host's current primary IP — idempotent (no-op once in sync).
      ansible.builtin.service:
        name: sssd
        state: restarted
      become: true                           # systemd unit management needs root
      when:
        - (_freeipa_client_dns_a.rc | default(1)) == 0
        - ansible_default_ipv4.address not in (_freeipa_client_dns_a.stdout | default(''))

- name: Report client integration status
  ansible.builtin.debug:
    msg: >-
      realm={{ freeipa_client_realm }} ca_cert={{ _freeipa_client_cacrt.stat.exists }}
      host_kinit_rc={{ _freeipa_client_verify.rc }}
      sssd_id_admin_rc={{ _freeipa_client_idcheck.rc }}
      mkhomedir={{ freeipa_client_mkhomedir }} sudo={{ not (freeipa_client_no_sudo | bool) }}
      automount={{ freeipa_client_automount_location | default('') | ternary(freeipa_client_automount_location, 'disabled') }}
