[defaults]
# Make vsphere_vm, ssh_agent_key, storage, baseline, firewalld, docker discoverable
# from this example dir.
roles_path = ../../../
inventory = inventory.yml
host_key_checking = False
# The VM's ansible user authenticates via the ssh-agent key unlocked in play 1 —
# no key file on disk. Set remote_user here (or ansible_user per host).
remote_user = ansible

[ssh_connection]
# Keep the unlocked key off disk end-to-end (see the ssh_agent_key role).
pipelining = True
