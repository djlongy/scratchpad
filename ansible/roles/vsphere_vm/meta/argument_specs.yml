---
argument_specs:
  main:
    short_description: Create and destroy vCenter VMs from templates.
    options:
      vsphere_vm_server:
        type: str
        required: true
        description: vCenter hostname/FQDN.
      vsphere_vm_username:
        type: str
        required: false
        description: vCenter username.
      vsphere_vm_vault_secret:
        type: str
        required: false
        description: Vault path holding the vCenter password (unless vsphere_vm_password is set).
      vsphere_vm_password_field:
        type: str
        required: false
        description: Field within vsphere_vm_vault_secret holding the password.
      vsphere_vm_password:
        type: str
        required: false
        description: vCenter password (bypasses the Vault lookup when set).
      vsphere_vm_validate_certs:
        type: bool
        required: false
        description: Validate the vCenter TLS certificate.
      vsphere_vm_datacenter:
        type: str
        required: true
        description: Target datacenter.
      vsphere_vm_cluster:
        type: str
        required: false
        description: Target DRS cluster (use this OR vsphere_vm_esxi_host).
      vsphere_vm_esxi_host:
        type: str
        required: false
        description: Target standalone ESXi host (no DRS cluster).
      vsphere_vm_resource_pool:
        type: str
        required: false
        description: Resource pool path.
      vsphere_vm_folder:
        type: str
        required: false
        description: Inventory folder for new VMs.
      vsphere_vm_datastore:
        type: str
        required: false
        description: Default datastore for clones.
      vsphere_vm_cpu:
        type: int
        required: false
        description: vCPU count (becomes hardware.num_cpus).
      vsphere_vm_memory:
        type: int
        required: false
        description: Memory in MB (becomes hardware.memory_mb).
      vsphere_vm_hardware:
        type: dict
        required: false
        description: >-
          EXTRA native community.vmware.vmware_guest `hardware` keys
          (boot_firmware, scsi, hotadd_cpu, and any other key the module
          accepts), merged over the cpu/memory pair — a num_cpus/memory_mb key
          here wins. Keys never set inherit from the source template.
      vsphere_vm_disk:
        type: list
        elements: dict
        required: false
        description: >-
          Disk list — NATIVE vmware_guest `disk` dicts (size_gb, type,
          datastore, ...), primary disk first (>= the template's size). Host/group
          values replace the role default wholesale.
      vsphere_vm_state:
        type: str
        required: false
        choices: [poweredon, present, poweredoff, absent]
        description: Default state for created guests.
      vsphere_vm_wait_for_ip:
        type: bool
        required: false
        description: >-
          Wait for the guest to report an IP after power-on. Only takes effect while
          vsphere_vm_connect_nics is true — the wait lives inside the reconnect phase.
      vsphere_vm_connect_nics:
        type: bool
        required: false
        description: >-
          Run the post-build NIC reconnect phase (bounded multi-pass reconnect plus IP
          wait) that heals the clone+customize NIC-disconnect. Set false to trust vCenter
          to settle the NIC on its own; the whole phase is then skipped as a single task.
      vsphere_vm_scsi_type:
        type: str
        required: false
        choices: [paravirtual, lsilogic, lsilogicsas, buslogic]
        description: >-
          SCSI controller type the disks hang off, used by the disk-grow step
          (vmware_guest_disk). Default paravirtual; match your template's controller.
      vsphere_vm_wait_for_ssh:
        type: bool
        required: false
        description: >-
          Opt-in handoff for chaining on-guest roles in the same play. After the
          VM is built, wait until the guest answers SSH (poll, not a fixed sleep)
          then gather its facts, so `roles: [vsphere_vm, storage]` works. Requires
          gather_facts: false at the play, an ansible SSH user/key in the template,
          and host-key checking off for the fresh host.
      vsphere_vm_ssh_timeout:
        type: int
        required: false
        description: Max seconds to wait for the fresh guest to answer SSH (vsphere_vm_wait_for_ssh).
      vsphere_vm_force_destroy:
        type: bool
        required: false
        description: >-
          DESTRUCTIVE. When true and state is absent, delete the VM (and its
          disks). On a normal untagged play other roles continue; --tags destroy
          is optional scoping only. Default false.
      vsphere_vm_force_redeploy:
        type: bool
        required: false
        description: >-
          DESTRUCTIVE. When true, wipe this host's VM (and disks) then rebuild
          from the template before create. On a normal untagged play the rest of
          the daisy chain continues; --tags redeploy is optional scoping only.
          Default false.
      vsphere_vm_hostname:
        type: str
        required: false
        description: Guest OS hostname (decoupled from the vCenter VM name; default canonical/inventory hostname).
      vsphere_vm_network:
        type: str
        required: false
        description: Default dvPortGroup/network for the auto-derived static NIC.
      vsphere_vm_netmask:
        type: str
        required: false
        description: Default netmask for the auto-derived static NIC.
      vsphere_vm_gateway:
        type: str
        required: false
        description: >-
          Gateway for the auto-derived static NIC. Unset = no gateway (an unrouted
          data/storage NIC). An explicit value always wins over vsphere_vm_gateway_auto.
      vsphere_vm_gateway_auto:
        type: bool
        required: false
        description: >-
          When true and vsphere_vm_gateway is unset, derive the gateway as the first
          usable address of the host's subnet from ansible_host + netmask (respects
          /25../27). Off by default (unset gateway stays unrouted).
      vsphere_vm_dns:
        type: list
        elements: str
        required: false
        description: Default DNS servers for auto-derived guest customization.
      vsphere_vm_provision_via_guestinfo:
        type: bool
        required: false
        description: >-
          Provision via the cloud-init VMware GuestInfo datasource instead of a
          vSphere GOSC customization spec. Clones with no customization (so the NIC
          never async-disconnects) and injects hostname + static network (all NICs)
          as base64 guestinfo.metadata. Requires a GuestInfo-ready template. Reads
          the same per-guest fields as the GOSC path; each NIC may set `interface`
          (default ens192/ens224/ens256… in vmware slot order).
      vsphere_vm_tags:
        type: dict
        required: false
        description: >-
          vCenter tags applied to the created VM as a {Category: tag} map (e.g.
          tenant/environment). The role ensures each category + tag exists then
          associates them. Set per host or group.
