---
# One reconnect+poll pass. Clears _vsphere_connect_pending when IP appears.

- name: Connect | Reconcile NICs ({{ _vsphere_guest.name }})
  when: _vsphere_connect_pending | bool
  block:
    - name: Connect | Gather network adapters
      community.vmware.vmware_guest_network:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
        gather_network_info: true
      register: _vsphere_nics
      retries: "{{ vsphere_vm_create_retries }}"
      delay: "{{ vsphere_vm_create_delay }}"
      until: _vsphere_nics is succeeded
      delegate_to: localhost
      become: false

    - name: Connect | Force every NIC connected + start-connected
      community.vmware.vmware_guest_network:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
        mac_address: "{{ item.mac_address }}"
        connected: true
        start_connected: true
        state: present
      loop: "{{ _vsphere_nics.network_info | default([]) }}"
      loop_control:
        label: "{{ item.mac_address }}"
      delegate_to: localhost
      become: false
  rescue:
    - name: Connect | Warn that NIC reconnect raised an error (continuing)
      ansible.builtin.debug:
        msg: >-
          NIC reconnect raised an error on {{ _vsphere_guest.name }} this pass.
          Continuing — the next pass / the bounded IP poll surfaces any real
          problem rather than hanging the play.
      delegate_to: localhost
      become: false

- name: Connect | Poll for the guest IP (short, bounded)
  community.vmware.vmware_guest_info:
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ _vsphere_guest.name }}"
  register: _vsphere_ipwait
  retries: "{{ vsphere_vm_connect_pass_retries }}"
  delay: "{{ vsphere_vm_connect_pass_delay }}"
  # default('', true) so None ipv4 does not break | length
  until: (_vsphere_ipwait.instance.ipv4 | default('', true)) | length > 0
  failed_when: false
  when:
    - vsphere_vm_wait_for_ip | bool
    - _vsphere_connect_pending | bool
  delegate_to: localhost
  become: false

- name: Connect | Clear the pending flag once the VM has an IP
  ansible.builtin.set_fact:
    _vsphere_connect_pending: "{{ (_vsphere_ipwait.instance.ipv4 | default('', true)) | length == 0 }}"
  when:
    - vsphere_vm_wait_for_ip | bool
    - _vsphere_connect_pending | bool
  delegate_to: localhost
  become: false
