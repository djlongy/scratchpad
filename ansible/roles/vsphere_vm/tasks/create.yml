---
# roles/vsphere_vm/tasks/create.yml
# Build only the guests the plan (state.yml) found MISSING — Terraform-style
# "create if it doesn't exist". Existing VMs are left untouched. Runs on the
# controller against vCenter.

- name: Create | Build missing VMs ({{ _vsphere_to_create | map(attribute='name') | list }})
  community.vmware.vmware_guest:
    hostname: "{{ vsphere_vm_server }}"
    username: "{{ vsphere_vm_username }}"
    password: "{{ vsphere_vm_password }}"
    validate_certs: "{{ vsphere_vm_validate_certs }}"
    datacenter: "{{ vsphere_vm_datacenter }}"
    cluster: "{{ vsphere_vm_cluster | default(omit) }}"
    esxi_hostname: "{{ vsphere_vm_esxi_host | default(omit) }}"
    resource_pool: "{{ vsphere_vm_resource_pool | default(omit) }}"
    folder: "{{ item.folder | default(vsphere_vm_folder) }}"
    name: "{{ item.name }}"
    template: "{{ item.template }}"
    datastore: "{{ item.datastore | default(vsphere_vm_datastore) | default(omit, true) }}"
    state: "{{ item.state | default(vsphere_vm_state) }}"
    hardware:
      num_cpus: "{{ item.cpus | default(vsphere_vm_cpus) }}"
      memory_mb: "{{ item.memory_mb | default(vsphere_vm_memory_mb) }}"
      boot_firmware: "{{ item.firmware | default(vsphere_vm_firmware) }}"
      scsi: "{{ item.scsi | default(vsphere_vm_scsi) }}"
    # Primary disk first, then any per-guest extra_disks (native vmware_guest
    # disk dicts, e.g. {size_gb: 50, type: thin}) for secondary data volumes.
    disk: >-
      {{ [{'size_gb': item.disk_gb | default(vsphere_vm_disk_gb),
           'type': item.disk_type | default(vsphere_vm_disk_type)}]
         + (item.extra_disks | default([])) }}
    # Force NICs connected + start-connected: clone+customize otherwise leaves
    # the NIC disconnected (known vSphere bug), so the guest never gets an IP.
    networks: >-
      {{ (item.networks | map('combine', {'connected': true, 'start_connected': true}) | list)
         if (item.networks is defined) else omit }}
    customization: "{{ item.customization | default(omit) }}"
    # IP waiting is DEFERRED to connect.yml (which runs after the NIC reconnect).
    # Waiting here would block for 20+ minutes whenever clone+customize leaves the
    # NIC disconnected (a known vSphere bug) — the IP would never arrive. Clone
    # returns as soon as the guest is built; the bounded wait happens next.
    wait_for_ip_address: false
  register: _vsphere_created
  retries: "{{ vsphere_vm_create_retries }}"
  delay: "{{ vsphere_vm_create_delay }}"
  until: _vsphere_created is succeeded
  loop: "{{ _vsphere_to_create }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  # run_once: the guest list is global (one create pass for the whole inventory).
  # Without it, a play that targets a HOST GROUP (the from_inventory model) runs
  # this once PER HOST, so every host delegates to localhost and races to clone
  # the SAME VMs — vCenter then rejects the duplicates with "name already exists"
  # and the task burns its retries. One pass total is correct and race-free.
  run_once: true

# The clone+customize NIC-disconnect bug + bounded IP wait are handled here so a
# disconnected NIC can never hang the play.
- name: Create | Reconnect NICs and wait for IP
  ansible.builtin.import_tasks: connect.yml
  when: (_vsphere_to_create | length > 0)
