---
# roles/vsphere_vm/tasks/create.yml
# Ensure THIS host's VM (main.yml imports this whenever the host's state ≠ absent).
# GOSC mode makes ONE cheap per-VM existence probe (vmware_guest_info) to split
# "staged create" from "reconcile" — a fresh clone must be powered on in a separate
# call from the clone (see the GOSC block), while an existing VM must never be
# power-cycled by that staging. Still no whole-inventory gather: the probe, like
# every call here, is per-VM and hosts run in parallel on the controller.
#
# Two provisioning modes (_vsphere_guest.provision_via_guestinfo), both reading
# the same spec fields (networks[*].{name,ip,netmask,gateway,interface},
# customization):
#
#   GOSC (default) → STAGED: clone powered off with the GOSC spec, assert every
#     vNIC connected+start-connected while off, then power on. The NIC enters
#     first boot live and never disconnects (one-call clone+power-on loses the
#     connect flags and orphans the NIC — see the block comment below).
#     connect.yml stays as defense-in-depth and short-circuits on its IP pre-check.
#
#   GuestInfo → clone with NO networks + NO customization, so vmware_guest attaches
#     NO GOSC spec and the NIC is never disconnected. Each vNIC's portgroup is set
#     natively with vmware_guest_network (also no GOSC), then the guest is powered
#     on with the NIC already live, so cloud-init reads guestinfo.metadata at first
#     boot and applies the static network. All native community.vmware modules — no
#     govc, no GOSC, and connect.yml converges on its first pass. See the role README
#     "Known vSphere quirk" + "cloud-init GuestInfo" sections.

# ─── Folder tree ──────────────────────────────────────────────────────────────
# Ensure this VM's (possibly NESTED) folder path exists before placing it.
# community.vmware.vcenter_folder is single-level, so vmware.vmware.folder is used —
# it creates the WHOLE path in one call (e.g. swarm/alma → /<DC>/vm/swarm/alma).
# folder_path is already the DC-relative dialect this module wants (spec.yml derives
# it); an empty value means the DC VM root, which needs no creating.
# throttle: 1 — parallel hosts often share a folder path; serialize the (idempotent)
# create so concurrent same-path calls can't race.
- name: Create | Ensure this VM's (nested) folder path exists
  vmware.vmware.folder:
    hostname: "{{ vsphere_vm_server }}"
    username: "{{ vsphere_vm_username }}"
    password: "{{ vsphere_vm_password }}"
    validate_certs: "{{ vsphere_vm_validate_certs }}"
    datacenter: "{{ vsphere_vm_datacenter }}"
    relative_path: "{{ _vsphere_guest.folder_path }}"
    folder_type: vm
    state: present
  when: _vsphere_guest.folder_path | length > 0
  throttle: 1
  delegate_to: localhost
  become: false

# ─── GOSC mode (default) — STAGED power-on ────────────────────────────────────
# vmware_guest's one-call clone+customize+power-on creates the vNIC
# connected=false/startConnected=false (the flags in `networks` do not survive that
# path), and a NIC that enters FIRST power-on disconnected is never reconnected by
# any layer: vpxd only restores NICs it disconnected itself, and the guest's
# deployPkg enable-nics either no-ops (guestId outside the GOSC matrix) or is
# reverted when vCenter reasserts its authoritative device state after the GOSC
# reboot. Live-proven 2026-07-23 (findings.md at the repo root of this branch + .agent/TASK_LOG.md 2026/07/23).
#
# The fix is SEQUENCING: clone powered OFF with the GOSC spec attached, assert
# every NIC connected+start-connected while the VM is off, then power on. The NIC
# then enters first boot already start-connected and stays connected through
# customization and the GOSC reboot — static IP in ~80-90 s, no heal needed
# (proven 5/5, on correct AND wrong template guestIds).
#
# An existing VM must never be power-cycled by the staged path, so a cheap per-VM
# existence probe splits create (staged) from reconcile (plain vmware_guest with
# the declared state, exactly the old behaviour).
- name: Create | Build the VM — GOSC, staged power-on
  when: not _vsphere_guest.provision_via_guestinfo
  delegate_to: localhost
  become: false
  block:
    - name: Create | Probe whether this VM already exists
      community.vmware.vmware_guest_info:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
      register: _vsphere_probe
      failed_when: false

    # A successful probe returns `instance`; a failed one only `msg`. Missing
    # `instance` = the VM does not exist yet → run the staged create below.
    - name: Create | Mark whether the staged create is needed
      ansible.builtin.set_fact:
        _vsphere_vm_absent: "{{ _vsphere_probe.instance is not defined }}"

    # Step 1: clone POWERED OFF with the full spec (GOSC customization included —
    # the imc package is attached at clone time and fires at first power-on).
    - name: Create | Clone powered-off with the GOSC spec ({{ _vsphere_guest.name }})
      community.vmware.vmware_guest:
        datacenter: "{{ vsphere_vm_datacenter }}"
        cluster: "{{ vsphere_vm_cluster | default(omit) }}"
        esxi_hostname: "{{ vsphere_vm_esxi_host | default(omit) }}"
        resource_pool: "{{ vsphere_vm_resource_pool | default(omit) }}"
        folder: "{{ _vsphere_guest.folder }}"
        name: "{{ _vsphere_guest.name }}"
        template: "{{ _vsphere_guest.template }}"
        datastore: "{{ _vsphere_guest.datastore | default(omit, true) }}"
        state: poweredoff
        hardware: "{{ _vsphere_guest.hardware }}"
        disk: "{{ _vsphere_guest.disk }}"
        networks: "{{ _vsphere_guest.networks }}"
        customization: "{{ _vsphere_guest.customization }}"
      register: _vsphere_created
      retries: "{{ vsphere_vm_create_retries }}"
      delay: "{{ vsphere_vm_create_delay }}"
      until: _vsphere_created is succeeded
      when: _vsphere_vm_absent | bool

    # Step 2: assert every vNIC connected + start-connected WHILE POWERED OFF.
    # This is what the one-call path loses; with it set, the NIC enters first
    # power-on live and vSphere never disconnects it.
    - name: Create | Assert each vNIC start-connected before first power-on
      community.vmware.vmware_guest_network:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
        label: "Network adapter {{ _vsphere_guest.networks.index(item) + 1 }}"
        network_name: "{{ item.name }}"
        connected: true
        start_connected: true
        state: present
      loop: "{{ _vsphere_guest.networks }}"
      loop_control:
        label: "nic{{ _vsphere_guest.networks.index(item) + 1 }} → {{ item.name }}"
      when: _vsphere_vm_absent | bool

    # Step 3: first power-on (only when the declared state wants it). GOSC runs
    # with the NIC connected; connect.yml's IP pre-check then short-circuits.
    - name: Create | Power on (staged first boot)
      community.vmware.vmware_guest_powerstate:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
        state: powered-on
      when:
        - _vsphere_vm_absent | bool
        - _vsphere_guest.state == 'poweredon'

    # Reconcile path: the VM already exists — plain idempotent vmware_guest with
    # the declared state (never the staged power-off, which would bounce a live
    # guest). Spec drift (cpu/memory/disk/networks) converges here.
    - name: Create | Reconcile the existing VM ({{ _vsphere_guest.name }})
      community.vmware.vmware_guest:
        datacenter: "{{ vsphere_vm_datacenter }}"
        cluster: "{{ vsphere_vm_cluster | default(omit) }}"
        esxi_hostname: "{{ vsphere_vm_esxi_host | default(omit) }}"
        resource_pool: "{{ vsphere_vm_resource_pool | default(omit) }}"
        folder: "{{ _vsphere_guest.folder }}"
        name: "{{ _vsphere_guest.name }}"
        template: "{{ _vsphere_guest.template }}"
        datastore: "{{ _vsphere_guest.datastore | default(omit, true) }}"
        state: "{{ _vsphere_guest.state }}"
        hardware: "{{ _vsphere_guest.hardware }}"
        disk: "{{ _vsphere_guest.disk }}"
        networks: "{{ _vsphere_guest.networks }}"
        wait_for_ip_address: false
      register: _vsphere_reconciled
      retries: "{{ vsphere_vm_create_retries }}"
      delay: "{{ vsphere_vm_create_delay }}"
      until: _vsphere_reconciled is succeeded
      when: not (_vsphere_vm_absent | bool)

# ─── GuestInfo mode ───────────────────────────────────────────────────────────
- name: Create | Build the VM — GuestInfo, no GOSC ({{ _vsphere_guest.name }})
  when: _vsphere_guest.provision_via_guestinfo
  delegate_to: localhost
  become: false
  block:
    # Step 1: clone powered-OFF with NO networks + NO customization (→ no GOSC spec).
    # deploy_folder_template has NO customization surface — GOSC-proof by
    # construction (vmware_guest attaches a GOSC spec to template clones even
    # without customization:, which re-disconnects the NIC). Field-verified.
    # NOTE: vmware.vmware modules are outside the community.vmware module_defaults
    # group → explicit connection args. On a standalone host, resource_pool must be
    # the host's ROOT pool MOID (e.g. resgroup-362) if the name is ambiguous.
    - name: Create | Clone powered-off — GuestInfo
      vmware.vmware.deploy_folder_template:
        hostname: "{{ vsphere_vm_server }}"
        username: "{{ vsphere_vm_username }}"
        password: "{{ vsphere_vm_password }}"
        validate_certs: "{{ vsphere_vm_validate_certs }}"
        datacenter: "{{ vsphere_vm_datacenter }}"
        cluster: "{{ vsphere_vm_cluster | default(omit) }}"
        esxi_host: "{{ vsphere_vm_esxi_host | default(omit) }}"
        resource_pool: "{{ vsphere_vm_resource_pool | default(omit) }}"
        datastore: "{{ _vsphere_guest.datastore | default(omit, true) }}"
        vm_folder: "{{ _vsphere_guest.folder }}"
        template_name: "{{ _vsphere_guest.template }}"
        vm_name: "{{ _vsphere_guest.name }}"
        power_on_after_deploy: false
      register: _vsphere_gi_cloned
      retries: "{{ vsphere_vm_create_retries }}"
      delay: "{{ vsphere_vm_create_delay }}"
      until: _vsphere_gi_cloned is succeeded

    # Step 1b: hardware/disk as a plain RECONFIGURE of the existing powered-off VM
    # (no clone → vmware_guest attaches no GOSC spec here).
    - name: Create | Reconfigure hardware/disk — GuestInfo
      community.vmware.vmware_guest:
        datacenter: "{{ vsphere_vm_datacenter }}"
        folder: "{{ _vsphere_guest.folder }}"
        name: "{{ _vsphere_guest.name }}"
        state: poweredoff
        hardware: "{{ _vsphere_guest.hardware }}"
        disk: "{{ _vsphere_guest.disk }}"

    # Step 1c: inject the cloud-init GuestInfo extraConfig. MUST use
    # vmware.vmware.vm_advanced_settings — community.vmware.vmware_guest's
    # advanced_settings is a SILENT NO-OP on a reconfigure of an existing VM (it only
    # applies during clone/create), so the guestinfo keys never persist and the guest
    # DHCPs. vm_advanced_settings takes a settings DICT and reliably sets extraConfig.
    - name: Create | Inject cloud-init GuestInfo extraConfig
      vmware.vmware.vm_advanced_settings:
        hostname: "{{ vsphere_vm_server }}"
        username: "{{ vsphere_vm_username }}"
        password: "{{ vsphere_vm_password }}"
        validate_certs: "{{ vsphere_vm_validate_certs }}"
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
        state: present
        settings: >-
          {{ {'guestinfo.metadata': (lookup('template', 'guestinfo_metadata.yaml.j2') | b64encode),
              'guestinfo.metadata.encoding': 'base64'}
             | combine({'guestinfo.userdata': (_vsphere_guest.guestinfo_userdata | b64encode),
                        'guestinfo.userdata.encoding': 'base64'}
                       if (_vsphere_guest.guestinfo_userdata | length > 0) else {}) }}

    # Step 2: set each vNIC's portgroup + start-connected natively (no GOSC). One call
    # per NIC; NIC 0 modifies the template's adapter, 1+ add new adapters, in list
    # order — the same order the guest names ens192/ens224/ens256 in the metadata.
    - name: Create | Set each vNIC portgroup + start-connected (native)
      community.vmware.vmware_guest_network:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
        label: "Network adapter {{ _vsphere_guest.networks.index(item) + 1 }}"
        network_name: "{{ item.name }}"
        connected: true
        start_connected: true
        state: present
      loop: "{{ _vsphere_guest.networks }}"
      loop_control:
        label: "nic{{ _vsphere_guest.networks.index(item) + 1 }} → {{ item.name }}"

    # Step 3: power on. The NIC is start-connected, so it is live at first boot and
    # cloud-init applies the static network from guestinfo.metadata (no reconnect race).
    - name: Create | Power on
      community.vmware.vmware_guest_powerstate:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
        state: powered-on

# ─── Ensure disk sizes (grow) ───────────────────────────────────────────────────
# community.vmware.vmware_guest does NOT resize existing disks on a reconfigure (it
# returns ok/no-change), so the create paths above can create disks but never GROW
# them. vmware_guest_disk is the dedicated module that reliably resizes a vmdk on an
# existing VM by SCSI controller + unit. Idempotent: a no-op when every disk already
# matches; grows (never shrinks — vSphere forbids it) when vsphere_vm_disk was bumped.
# Maps vsphere_vm_disk 1:1 onto controller 0, units 0,1,2,… (unit 7 is the controller,
# so it is skipped). Runs in BOTH modes; community.vmware.* inherit the vCenter
# connection from main.yml's module_defaults.
- name: Create | Ensure each disk is at its declared size (grow)
  community.vmware.vmware_guest_disk:
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ _vsphere_guest.name }}"
    disk: "{{ _vsphere_disk_spec }}"
  vars:
    _vsphere_disk_spec: >-
      {%- set out = [] -%}
      {%- for d in _vsphere_guest.disk -%}
      {%-   set _u = loop.index0 if loop.index0 < 7 else loop.index0 + 1 -%}
      {%-   set _ = out.append({'scsi_controller': 0, 'unit_number': _u,
              'size_gb': d.size_gb, 'type': (d.type | default('thin')),
              'scsi_type': vsphere_vm_scsi_type}) -%}
      {%- endfor -%}
      {{ out }}
  delegate_to: localhost
  become: false

# ─── Tags ─────────────────────────────────────────────────────────────────────
# Apply this host's vSphere tags (vsphere_vm_tags {Category: tag}) — e.g. tenant/env.
# Ensure the category and tag exist, then associate. throttle: 1 on the ensure
# steps — parallel hosts usually share categories/tags; serialize the idempotent
# creates so concurrent same-name calls can't race.
# community.vmware.* inherit the vCenter connection from main.yml's module_defaults.
- name: Create | Apply vSphere tags ({{ _vsphere_guest.name }})
  when: _vsphere_guest.tags | length > 0
  delegate_to: localhost
  become: false
  block:
    - name: Create | Ensure tag categories exist
      community.vmware.vmware_category:
        category_name: "{{ item.key }}"
        category_cardinality: single
        state: present
      loop: "{{ _vsphere_guest.tags | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      throttle: 1

    - name: Create | Look up tag category IDs
      community.vmware.vmware_category_info:
      register: _vsphere_catinfo

    - name: Create | Ensure each tag exists in its category
      community.vmware.vmware_tag:
        tag_name: "{{ item.value }}"
        category_id: "{{ (_vsphere_catinfo.tag_category_info | selectattr('category_name', 'eq', item.key) | first).category_id }}"
        state: present
      loop: "{{ _vsphere_guest.tags | dict2items }}"
      loop_control:
        label: "{{ item.key }}:{{ item.value }}"
      throttle: 1

    - name: Create | Associate tags with the VM
      community.vmware.vmware_tag_manager:
        object_name: "{{ _vsphere_guest.name }}"
        object_type: VirtualMachine
        tag_names: "{{ (_vsphere_guest.tags.keys() | list) | zip(_vsphere_guest.tags.values() | list) | map('join', ':') | list }}"
        state: present

# NOTE: NIC reconnect + bounded IP wait is its own phase (connect.yml, imported
# from main.yml). It uses vmware_guest_network (never a GOSC-triggering path), so it
# is safe in both modes: under GOSC it heals the disconnect; under GuestInfo the NIC
# is already up, so it converges on its first pass and just confirms the IP.
