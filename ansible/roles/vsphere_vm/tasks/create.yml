---
# roles/vsphere_vm/tasks/create.yml
# Build only the guests the plan (state.yml) found MISSING — Terraform-style
# "create if it doesn't exist". Existing VMs are left untouched. Runs on the
# controller against vCenter.
#
# Two provisioning modes (vsphere_vm_provision_via_guestinfo), both reading the
# same per-guest fields (item.networks[*].{name,ip,netmask,gateway,interface},
# item.customization):
#
#   GOSC (default) → ONE vmware_guest call clones + customizes + powers on. The
#     customization spec makes vSphere fire an async first-boot event that
#     disconnects the NIC (a known quirk) — healed afterwards by connect.yml.
#
#   GuestInfo → clone with NO networks + NO customization, so vmware_guest attaches
#     NO GOSC spec and the NIC is never disconnected. Each vNIC's portgroup is set
#     natively with vmware_guest_network (also no GOSC), then the guest is powered
#     on with the NIC already live, so cloud-init reads guestinfo.metadata at first
#     boot and applies the static network. All native community.vmware modules — no
#     govc, no GOSC, and connect.yml converges on its first pass. See the role README
#     + the the role README references"GOSC / cloud-init GuestInfo" note.

# ─── Per-guest mode split ─────────────────────────────────────────────────────
# Each guest may set provision_via_guestinfo (derive.yml resolves it per host);
# unset falls back to the role-wide vsphere_vm_provision_via_guestinfo flag.
- name: Create | Split guests by provisioning mode
  ansible.builtin.set_fact:
    _vsphere_create_gi: >-
      {{ (_vsphere_to_create | selectattr('provision_via_guestinfo', 'defined')
          | selectattr('provision_via_guestinfo') | list)
         + ((_vsphere_to_create | rejectattr('provision_via_guestinfo', 'defined') | list)
            if (vsphere_vm_provision_via_guestinfo | bool) else []) }}
    _vsphere_create_gosc: >-
      {{ (_vsphere_to_create | selectattr('provision_via_guestinfo', 'defined')
          | rejectattr('provision_via_guestinfo') | list)
         + ((_vsphere_to_create | rejectattr('provision_via_guestinfo', 'defined') | list)
            if not (vsphere_vm_provision_via_guestinfo | bool) else []) }}
  run_once: true
  delegate_to: localhost
  become: false

# ─── GOSC mode (default) ──────────────────────────────────────────────────────
- name: Create | Build missing VMs — GOSC ({{ _vsphere_create_gosc | map(attribute='name') | list }})
  vars:
    # Force NICs connected + start-connected. Necessary-but-not-sufficient under
    # GOSC (the async customize re-disconnects — connect.yml heals it).
    _gosc_networks: >-
      {{ item.networks | default([]) | map('combine', {'connected': true, 'start_connected': true}) | list }}
  community.vmware.vmware_guest:
    datacenter: "{{ vsphere_vm_datacenter }}"
    cluster: "{{ vsphere_vm_cluster | default(omit) }}"
    esxi_hostname: "{{ vsphere_vm_esxi_host | default(omit) }}"
    resource_pool: "{{ vsphere_vm_resource_pool | default(omit) }}"
    folder: "{{ item.folder | default(vsphere_vm_folder) }}"
    name: "{{ item.name }}"
    template: "{{ item.template }}"
    datastore: "{{ item.datastore | default(vsphere_vm_datastore) | default(omit, true) }}"
    state: "{{ item.state | default(vsphere_vm_state) }}"
    hardware:
      num_cpus: "{{ item.cpus | default(vsphere_vm_cpus) }}"
      memory_mb: "{{ item.memory_mb | default(vsphere_vm_memory_mb) }}"
      boot_firmware: "{{ item.firmware | default(vsphere_vm_firmware) }}"
      scsi: "{{ item.scsi | default(vsphere_vm_scsi) }}"
    disk: >-
      {{ [{'size_gb': item.disk_gb | default(vsphere_vm_disk_gb),
           'type': item.disk_type | default(vsphere_vm_disk_type)}]
         + (item.extra_disks | default([])) }}
    networks: "{{ _gosc_networks if (item.networks is defined) else omit }}"
    customization: "{{ item.customization | default(omit) }}"
    # IP waiting is deferred to connect.yml (after the NIC reconnect); waiting here
    # would block for 20+ minutes while the NIC is GOSC-disconnected.
    wait_for_ip_address: false
  register: _vsphere_created
  retries: "{{ vsphere_vm_create_retries }}"
  delay: "{{ vsphere_vm_create_delay }}"
  until: _vsphere_created is succeeded
  loop: "{{ _vsphere_create_gosc }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  run_once: true

# ─── GuestInfo mode ───────────────────────────────────────────────────────────
# Step 1: clone powered-OFF with NO networks + NO customization (→ no GOSC spec),
# injecting the cloud-init metadata as guestinfo advanced settings.
- name: Create | Clone missing VMs powered-off — GuestInfo, no GOSC ({{ _vsphere_create_gi | map(attribute='name') | list }})
  # deploy_folder_template has NO customization surface — GOSC-proof by
  # construction (vmware_guest attaches a GOSC spec to template clones even
  # without customization:, which re-disconnects the NIC). Field-verified.
  # NOTE: vmware.vmware modules are outside the community.vmware module_defaults
  # group → explicit connection args. On a standalone host, resource_pool must be
  # the host's ROOT pool MOID (e.g. resgroup-123) if the name is ambiguous.
  vmware.vmware.deploy_folder_template:
    hostname: "{{ vsphere_vm_server }}"
    username: "{{ vsphere_vm_username }}"
    password: "{{ vsphere_vm_password }}"
    validate_certs: "{{ vsphere_vm_validate_certs }}"
    datacenter: "{{ vsphere_vm_datacenter }}"
    cluster: "{{ vsphere_vm_cluster | default(omit) }}"
    esxi_host: "{{ vsphere_vm_esxi_host | default(omit) }}"
    resource_pool: "{{ vsphere_vm_resource_pool | default(omit) }}"
    datastore: "{{ item.datastore | default(vsphere_vm_datastore) | default(omit, true) }}"
    vm_folder: "{{ item.folder | default(vsphere_vm_folder) }}"
    template_name: "{{ item.template }}"
    vm_name: "{{ item.name }}"
    power_on_after_deploy: false
  register: _vsphere_gi_cloned
  retries: "{{ vsphere_vm_create_retries }}"
  delay: "{{ vsphere_vm_create_delay }}"
  until: _vsphere_gi_cloned is succeeded
  loop: "{{ _vsphere_create_gi }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  run_once: true

# Step 1b: hardware/disk + guestinfo injection as a plain RECONFIGURE of the
# existing powered-off VM (no clone → vmware_guest attaches no GOSC spec here).
- name: Create | Reconfigure hardware + inject cloud-init GuestInfo
  community.vmware.vmware_guest:
    datacenter: "{{ vsphere_vm_datacenter }}"
    folder: "{{ item.folder | default(vsphere_vm_folder) }}"
    name: "{{ item.name }}"
    state: poweredoff
    hardware:
      num_cpus: "{{ item.cpus | default(vsphere_vm_cpus) }}"
      memory_mb: "{{ item.memory_mb | default(vsphere_vm_memory_mb) }}"
      boot_firmware: "{{ item.firmware | default(vsphere_vm_firmware) }}"
      scsi: "{{ item.scsi | default(vsphere_vm_scsi) }}"
    disk: >-
      {{ [{'size_gb': item.disk_gb | default(vsphere_vm_disk_gb),
           'type': item.disk_type | default(vsphere_vm_disk_type)}]
         + (item.extra_disks | default([])) }}
  loop: "{{ _vsphere_create_gi }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  run_once: true

# Step 1c: inject the cloud-init GuestInfo. NOTE: community.vmware.vmware_guest
# advanced_settings is a SILENT NO-OP on a reconfigure of an existing VM (keys
# never persist) — use the purpose-built vm_advanced_settings module instead.
# Acceptance check: govc object.collect -s <vm> 'config.extraConfig["guestinfo.metadata"]'
# | base64 -d must show the rendered metadata BEFORE power-on.
- name: Create | Inject cloud-init GuestInfo (persists on existing VM)
  vmware.vmware.vm_advanced_settings:
    hostname: "{{ vsphere_vm_server }}"
    username: "{{ vsphere_vm_username }}"
    password: "{{ vsphere_vm_password }}"
    validate_certs: "{{ vsphere_vm_validate_certs }}"
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ item.name }}"
    state: present
    settings: >-
      {{ {'guestinfo.metadata': (lookup('template', 'guestinfo_metadata.yaml.j2') | b64encode),
          'guestinfo.metadata.encoding': 'base64'}
         | combine({'guestinfo.userdata': (item.guestinfo_userdata | default('') | b64encode),
                    'guestinfo.userdata.encoding': 'base64'}
                   if (item.guestinfo_userdata | default('') | length > 0) else {}) }}
  loop: "{{ _vsphere_create_gi }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  run_once: true

# Step 2: set each vNIC's portgroup + start-connected natively (no GOSC). One call
# per (guest, NIC); NIC 0 modifies the template's adapter, 1+ add new adapters, in
# list order — the same order the guest names ens192/ens224/ens256 in the metadata.
- name: Create | Set each vNIC portgroup + start-connected — GuestInfo (native)
  community.vmware.vmware_guest_network:
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ item.0.name }}"
    label: "Network adapter {{ item.0.networks.index(item.1) + 1 }}"
    network_name: "{{ item.1.name }}"
    connected: true
    start_connected: true
    state: present
  loop: "{{ _vsphere_create_gi | subelements('networks', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} nic{{ item.0.networks.index(item.1) + 1 }} → {{ item.1.name }}"
  delegate_to: localhost
  become: false
  run_once: true

# Step 3: power on. The NIC is start-connected, so it is live at first boot and
# cloud-init applies the static network from guestinfo.metadata (no reconnect race).
- name: Create | Power on — GuestInfo ({{ _vsphere_create_gi | map(attribute='name') | list }})
  community.vmware.vmware_guest_powerstate:
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ item.name }}"
    state: powered-on
  loop: "{{ _vsphere_create_gi }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  run_once: true

# NOTE: NIC reconnect + bounded IP wait is its own phase (connect.yml, imported
# from main.yml). It uses vmware_guest_network (never a GOSC-triggering path), so it
# is safe in both modes: under GOSC it heals the disconnect; under GuestInfo the NIC
# is already up, so it converges on its first pass and just confirms the IP.
