---
# Wait for guest SSH + gather facts so on-guest roles can follow in the same play.

- name: Handoff | Wait for the new guest to answer SSH
  ansible.builtin.wait_for_connection:
    timeout: "{{ vsphere_vm_ssh_timeout }}"
  become: false

- name: Handoff | Gather guest facts for downstream on-guest roles
  ansible.builtin.setup:
  become: false
