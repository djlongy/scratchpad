---
# roles/vsphere_vm/tasks/state.yml
# Terraform-style reconcile, per host: ONE shared vCenter inventory read for the
# whole play (run_once — registered results propagate to every host), then each
# host computes ITS OWN plan booleans against its _vsphere_guest spec.
# Read-only — runs for both create and destroy so the plan is always available.

- name: State | Gather current VM inventory from vCenter (once for the play)
  community.vmware.vmware_vm_info:
  register: _vsphere_vm_info
  run_once: true
  delegate_to: localhost
  become: false

- name: State | Compute this host's plan
  ansible.builtin.set_fact:
    _vsphere_exists: "{{ _vsphere_guest.name in (_vsphere_vm_info.virtual_machines | map(attribute='guest_name') | list) }}"
    _vsphere_desired_absent: "{{ _vsphere_guest.state == 'absent' }}"
  delegate_to: localhost
  become: false

- name: State | Derive this host's plan actions
  ansible.builtin.set_fact:
    _vsphere_to_create: "{{ not _vsphere_exists and not _vsphere_desired_absent }}"
    _vsphere_desired_present: "{{ not _vsphere_desired_absent }}"
    _vsphere_to_destroy: "{{ _vsphere_exists and _vsphere_desired_absent }}"
  delegate_to: localhost
  become: false

- name: State | Plan
  ansible.builtin.debug:
    msg: >-
      {{ _vsphere_guest.name }}:
      {{ 'CREATE' if _vsphere_to_create
         else ('DESTROY (with --tags destroy + allow_destroy)' if _vsphere_to_destroy
         else ('absent as desired' if _vsphere_desired_absent else 'present')) }}
  delegate_to: localhost
  become: false

# Make the destroy CONTRACT explicit when something is marked absent — otherwise
# a plain run silently no-ops (the destroy phase is `never`-tagged) and the
# operator just sees changed=0 with no clue why.
- name: State | Advise how to remove a VM marked absent
  ansible.builtin.debug:
    msg: >-
      {{ _vsphere_guest.name }} is marked state:absent but still exists. It is removed
      ONLY when you run with --tags destroy AND set vsphere_vm_allow_destroy=true.
      A normal run leaves it untouched (changed=0) by design.
  when: _vsphere_to_destroy | bool
  delegate_to: localhost
  become: false
