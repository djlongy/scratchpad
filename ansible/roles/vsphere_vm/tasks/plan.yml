---
# roles/vsphere_vm/tasks/plan.yml
# PURELY INVENTORY-DERIVED plan, per host — NO vCenter read. The desired state is
# whatever the host declares (_vsphere_guest.state); vmware_guest /
# deploy_folder_template are idempotent, so we go straight to create/destroy and
# let the module reconcile (an existing VM = a fast per-VM no-op) instead of
# gathering the WHOLE vCenter inventory up front (vmware_vm_info) just to test
# existence — that gather was the slow part and told us nothing the module can't
# resolve itself, cheaper, by name.
#
# All set_fact only → no module_defaults / vCenter connection needed here.

- name: Plan | Derive this host's plan from its declared state (no vCenter read)
  ansible.builtin.set_fact:
    # absent → destroy (opt-in); anything else → ensure present (idempotent create).
    _vsphere_desired_absent: "{{ _vsphere_guest.state == 'absent' }}"
    _vsphere_desired_present: "{{ _vsphere_guest.state != 'absent' }}"
    _vsphere_to_create: "{{ _vsphere_guest.state != 'absent' }}"
    _vsphere_to_destroy: "{{ _vsphere_guest.state == 'absent' }}"
  delegate_to: localhost
  become: false

# Consolidated pre-build report — printed ONCE (run_once) before any VM is touched,
# so the operator can see EVERYTHING about to be built across the whole play: vCenter
# object name, guest OS hostname, IP/mask/gateway, template, placement, hardware,
# disks and provisioning mode, per host. Reads each host's already-built _vsphere_guest
# from hostvars (spec.yml ran for every host first). Hosts build CONCURRENTLY (bounded
# by `forks`), so this is your one chance to eyeball the plan before it fans out.
- name: Plan | Report everything about to be built (all hosts)
  run_once: true
  delegate_to: localhost
  become: false
  ansible.builtin.debug:
    # Build the report as a LIST of lines (debug prints one per line). Deterministic —
    # avoids block-scalar whitespace/newline pitfalls with the per-NIC inner loop.
    msg: >-
      {%- set L = ['===== vSphere build plan — ' ~ (ansible_play_hosts | length) ~
                   ' host(s), built concurrently (forks) ====='] -%}
      {%- for h in ansible_play_hosts -%}
      {%-   set g = hostvars[h]._vsphere_guest -%}
      {%-   set tgt = hostvars[h].vsphere_vm_cluster
                      | default(hostvars[h].vsphere_vm_esxi_host | default('-')) -%}
      {%-   set _ = L.append('• ' ~ h ~ '  →  [' ~
              ('DESTROY' if g.state == 'absent' else 'BUILD / ENSURE') ~ ']') -%}
      {%-   set _ = L.append('    vCenter VM name : ' ~ g.name) -%}
      {%-   set _ = L.append('    guest hostname  : ' ~ (g.customization.hostname | default('(none)'))) -%}
      {%-   set _ = L.append('    template        : ' ~ g.template) -%}
      {%-   set _ = L.append('    nics (' ~ (g.networks | length) ~ '):') -%}
      {%-   for n in g.networks -%}
      {%-     set _if = n.interface | default('ens' ~ (192 + 32 * loop.index0)) -%}
      {%-     set _gw = (n.gateway | default('')) or '(unrouted)' -%}
      {%-     set _ = L.append('      - ' ~ _if ~ ' · ' ~ (n.name | default('-')) ~ ' · ' ~
                (n.ip | default('dhcp')) ~ '/' ~ (n.netmask | default('-')) ~ ' · gw ' ~ _gw) -%}
      {%-   endfor -%}
      {%-   set _ = L.append('    placement       : dc=' ~ hostvars[h].vsphere_vm_datacenter ~
              ' · host=' ~ tgt ~ ' · ds=' ~ (g.datastore | default('(template default)'))) -%}
      {%-   set _ = L.append('    folder          : ' ~ g.folder ~
              ' (vsphere_vm_folder=' ~ (g.folder_path or '(DC VM root)') ~ ')') -%}
      {%-   set _ = L.append('    hardware        : ' ~ (g.hardware.num_cpus | default('(template)')) ~
              ' vCPU / ' ~ (g.hardware.memory_mb | default('(template)')) ~ ' MB') -%}
      {%-   set _ = L.append('    disks           : ' ~
              (g.disk | map(attribute='size_gb') | join(' GB, ')) ~ ' GB') -%}
      {%-   set _ = L.append('    mode            : ' ~
              ('GuestInfo (cloud-init)' if g.provision_via_guestinfo else 'GOSC')) -%}
      {%- endfor -%}
      {%- set _ = L.append('=' * 84) -%}
      {{ L }}

# Make the destroy CONTRACT explicit when something is marked absent — otherwise
# a plain run silently no-ops (destroy is var/tag-gated) and the operator just
# sees changed=0 with no clue why.
- name: Plan | Advise how to remove a VM marked absent
  ansible.builtin.debug:
    msg: >-
      {{ _vsphere_guest.name }} is marked state:absent. It is removed ONLY when you
      set vsphere_vm_force_destroy=true (full play continues; optional --tags destroy
      for a vsphere-only pass). A normal ensure run leaves it untouched (changed=0)
      by design.
  when:
    - _vsphere_to_destroy | bool
    - not (vsphere_vm_force_destroy | default(false) | bool)
  delegate_to: localhost
  become: false
