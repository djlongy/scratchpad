---
# roles/vsphere_vm/tasks/plan.yml
# PURELY INVENTORY-DERIVED plan, per host — NO vCenter read. The desired state is
# whatever the host declares (_vsphere_guest.state); vmware_guest /
# deploy_folder_template are idempotent, so we go straight to create/destroy and
# let the module reconcile (an existing VM = a fast per-VM no-op) instead of
# gathering the WHOLE vCenter inventory up front (vmware_vm_info) just to test
# existence — that gather was the slow part and told us nothing the module can't
# resolve itself, cheaper, by name.
#
# All set_fact only → no module_defaults / vCenter connection needed here.

- name: Plan | Derive this host's plan from its declared state (no vCenter read)
  ansible.builtin.set_fact:
    # absent → destroy (opt-in); anything else → ensure present (idempotent create).
    _vsphere_desired_absent: "{{ _vsphere_guest.state == 'absent' }}"
    _vsphere_desired_present: "{{ _vsphere_guest.state != 'absent' }}"
    _vsphere_to_create: "{{ _vsphere_guest.state != 'absent' }}"
    _vsphere_to_destroy: "{{ _vsphere_guest.state == 'absent' }}"
  delegate_to: localhost
  become: false

- name: Plan
  ansible.builtin.debug:
    msg: >-
      {{ _vsphere_guest.name }}:
      {{ 'DESTROY (with --tags destroy + allow_destroy)' if _vsphere_to_destroy
         else 'ENSURE PRESENT (idempotent — create/reconcile)' }}
  delegate_to: localhost
  become: false

# Make the destroy CONTRACT explicit when something is marked absent — otherwise
# a plain run silently no-ops (the destroy phase is `never`-tagged) and the
# operator just sees changed=0 with no clue why.
- name: Plan | Advise how to remove a VM marked absent
  ansible.builtin.debug:
    msg: >-
      {{ _vsphere_guest.name }} is marked state:absent. It is removed ONLY when you
      run with --tags destroy AND set vsphere_vm_allow_destroy=true. A normal run
      leaves it untouched (changed=0) by design.
  when: _vsphere_to_destroy | bool
  delegate_to: localhost
  become: false
