---
# roles/vsphere_vm/tasks/preflight.yml
# Validate the connection inputs and resolve the vCenter password (Vault unless
# vsphere_vm_password was supplied directly). Runs per host on the controller —
# facts (incl. the resolved password consumed by main.yml's module_defaults) must
# exist on EVERY play host, and a run_once set_fact would land on the first host
# only. The hashi_vault lookup executes on the controller either way.

- name: Preflight | Assert required connection + placement inputs are set
  ansible.builtin.assert:
    that:
      - vsphere_vm_server | default('') | length > 0
      - vsphere_vm_datacenter | default('') | length > 0
      - (vsphere_vm_password | default('') | length > 0) or
        (vsphere_vm_vault_secret | default('') | length > 0)
    fail_msg: >-
      Set vsphere_vm_server, vsphere_vm_datacenter, and either vsphere_vm_password
      or vsphere_vm_vault_secret in inventory.
    quiet: true
  delegate_to: localhost
  become: false

# Credential contract: Ansible Vault var FIRST (vsphere_vm_password, e.g. from an encrypted
# group_var), HashiCorp Vault only as a fallback. Fail clearly when neither is configured
# instead of proceeding with an empty password (cryptic vCenter auth error downstream).
- name: Preflight | Assert a vCenter password source is configured (declared var or Vault path)
  ansible.builtin.assert:
    that:
      - >-
        (vsphere_vm_password | default('') | length > 0)
        or (vsphere_vm_vault_secret | default('') | length > 0)
    fail_msg: >-
      No vCenter password source configured. Set vsphere_vm_password (recommended: from an
      Ansible-Vault-encrypted var) or vsphere_vm_vault_secret (HashiCorp Vault KV path).
  delegate_to: localhost
  become: false

- name: Preflight | Resolve vCenter password from Vault (fallback when no declared var)
  ansible.builtin.set_fact:
    vsphere_vm_password: >-
      {{ lookup('community.hashi_vault.hashi_vault',
         'secret=' + vsphere_vm_vault_secret + ':' + vsphere_vm_password_field) }}
  no_log: true
  delegate_to: localhost
  become: false
  when:
    - vsphere_vm_password | default('') | length == 0
    - vsphere_vm_vault_secret | default('') | length > 0
