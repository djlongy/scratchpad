---
# Assert connection inputs; resolve password (declared var first, Vault fallback).

- name: Preflight | Assert required connection + placement inputs are set
  ansible.builtin.assert:
    that:
      - vsphere_vm_server | default('') | length > 0
      - vsphere_vm_datacenter | default('') | length > 0
      - (vsphere_vm_password | default('') | length > 0) or
        (vsphere_vm_vault_secret | default('') | length > 0)
    fail_msg: >-
      Set vsphere_vm_server, vsphere_vm_datacenter, and either vsphere_vm_password
      (recommended: from an Ansible-Vault-encrypted var) or vsphere_vm_vault_secret
      (HashiCorp Vault KV path) in inventory.
    quiet: true
  delegate_to: localhost
  become: false

- name: Preflight | Resolve vCenter password from Vault (fallback when no declared var)
  ansible.builtin.set_fact:
    vsphere_vm_password: >-
      {{ lookup('community.hashi_vault.hashi_vault',
         'secret=' + vsphere_vm_vault_secret + ':' + vsphere_vm_password_field) }}
  no_log: true
  delegate_to: localhost
  become: false
  when:
    - vsphere_vm_password | default('') | length == 0
    - vsphere_vm_vault_secret | default('') | length > 0
