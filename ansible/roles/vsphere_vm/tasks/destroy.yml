---
# roles/vsphere_vm/tasks/destroy.yml
# DESTRUCTIVE: remove THIS host's VM when the plan marked it to-destroy
# (state: absent). Opt-in via a single gate on main.yml:
#   vsphere_vm_force_destroy=true
# Optional --tags destroy scopes the run to vsphere phases only.

- name: Destroy | Remove {{ _vsphere_guest.name }}
  community.vmware.vmware_guest:
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ _vsphere_guest.name }}"
    # Match by NAME across the datacenter — folder omitted. Pinning the CREATE
    # placement folder meant a VM living anywhere else (moved after build, or at
    # the datacenter root) silently failed to match: vmware_guest treats it as
    # already-absent and returns changed=0 instead of deleting it. Names are
    # unique in this role's model, so name alone is a safe, folder-drift-proof
    # match.
    state: absent
    force: true
  delegate_to: localhost
  become: false
