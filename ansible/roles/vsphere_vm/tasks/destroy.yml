---
# roles/vsphere_vm/tasks/destroy.yml
# DESTRUCTIVE: remove THIS host's VM when the plan marked it to-destroy
# (state: absent). Opt-in (main.yml when:):
#   • vsphere_vm_destroy=true on a normal untagged play, OR
#   • --tags destroy (vsphere-only pass)
# Both paths also require vsphere_vm_allow_destroy=true (safety).

- name: Destroy | Refuse unless vsphere_vm_allow_destroy is true
  ansible.builtin.assert:
    that:
      - vsphere_vm_allow_destroy | bool
    fail_msg: >-
      Refusing to destroy {{ _vsphere_guest.name }}. Set BOTH
      vsphere_vm_destroy=true (or --tags destroy) AND
      vsphere_vm_allow_destroy=true to remove guests marked state: absent.
    quiet: true
  when: _vsphere_to_destroy | bool
  delegate_to: localhost
  become: false

- name: Destroy | Remove {{ _vsphere_guest.name }}
  community.vmware.vmware_guest:
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ _vsphere_guest.name }}"
    # Match by NAME across the datacenter — folder omitted. Pinning the CREATE
    # placement folder meant a VM living anywhere else (moved after build, or at
    # the datacenter root) silently failed to match: vmware_guest treats it as
    # already-absent and returns changed=0 instead of deleting it. Names are
    # unique in this role's model, so name alone is a safe, folder-drift-proof
    # match.
    state: absent
    force: true
  when:
    - _vsphere_to_destroy | bool
    - vsphere_vm_allow_destroy | bool
  delegate_to: localhost
  become: false
