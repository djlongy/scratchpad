---
# Delete then create rebuilds from template. Gate: vsphere_vm_force_redeploy=true.

- name: Redeploy | Resolve the VM before deleting it
  ansible.builtin.include_tasks:
    file: identify.yml
    apply:
      tags: [vsphere_vm, redeploy]

# UUID not in the task name — names render for skipped tasks before identify runs.
- name: Redeploy | Delete the VM so create rebuilds it from scratch — {{ _vsphere_guest.name }}
  community.vmware.vmware_guest:
    datacenter: "{{ vsphere_vm_datacenter }}"
    uuid: "{{ _vsphere_existing_uuid }}"
    use_instance_uuid: true
    state: absent
    force: true
  when: _vsphere_existing_uuid | length > 0
  delegate_to: localhost
  become: false
