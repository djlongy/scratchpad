---
# roles/vsphere_vm/tasks/connect.yml
# PERMANENT, SELF-HEALING, RACE-PROOF fix for the clone+customize NIC-disconnect
# bug. After a VM is built, vSphere clears the NIC's "connect at power on", so the
# guest boots with a dead NIC and never gets an IP. Worse, the disconnect is a
# ONE-TIME event applied during the guest's ASYNC first-boot customization, which
# can re-disconnect the vNIC AFTER a single up-front reconnect — so one reconnect
# loses the race and a single long IP wait just times out.
#
# Runs per host over ITS OWN VM (freshly created AND already present — main.yml
# gates on _vsphere_desired_present), so a plain re-run heals a NIC an earlier
# run left disconnected, not just fresh clones. It is a bounded MULTI-PASS
# poll-and-reconnect (connect_pass.yml): each pass re-asserts every
# still-disconnected NIC then briefly polls for an IP, repeating until the VM
# has an IP or vsphere_vm_connect_passes is exhausted. Whichever pass lands just
# after customization finishes makes the reconnect stick, so recovery is ~one
# pass-interval rather than a single long timeout. Every pass is idempotent and
# bounded; gated by vsphere_vm_connect_nics.

- name: Connect | Reconnect this VM's NICs (bounded multi-pass)
  when: vsphere_vm_connect_nics | bool
  block:
    - name: Connect | Mark this VM as needing an IP
      ansible.builtin.set_fact:
        _vsphere_connect_pending: true
      delegate_to: localhost
      become: false

    # Each include is one reconnect+poll pass; connect_pass.yml clears
    # _vsphere_connect_pending once the VM has an IP, so later passes no-op.
    - name: Connect | Multi-pass reconnect until the VM has an IP
      ansible.builtin.include_tasks: connect_pass.yml
      loop: "{{ range(0, vsphere_vm_connect_passes | int) | list }}"
      # loop_var: _pass so the outer pass counter never collides with the `item`
      # the looped tasks inside connect_pass.yml use.
      loop_control:
        loop_var: _pass
        label: "pass {{ _pass + 1 }}/{{ vsphere_vm_connect_passes }} ({{ _vsphere_guest.name if _vsphere_connect_pending else 'done' }})"

    - name: Connect | Report if the VM never reported an IP (after all passes)
      ansible.builtin.debug:
        msg: >-
          {{ _vsphere_guest.name }} did not report an IPv4 after
          {{ vsphere_vm_connect_passes }} reconnect passes
          (~{{ vsphere_vm_connect_passes * vsphere_vm_connect_pass_retries * vsphere_vm_connect_pass_delay }}s).
          The VM is built; check the NIC portgroup + guest customization (wrong
          network, or the guest never DHCP/static-bound).
      when:
        - vsphere_vm_wait_for_ip | bool
        - _vsphere_connect_pending | bool
      delegate_to: localhost
      become: false
