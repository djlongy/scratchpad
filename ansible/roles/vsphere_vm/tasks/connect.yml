---
# Multi-pass NIC reconnect + IP wait. Pre-check short-circuits healthy VMs.
# Connection args on the block (module_defaults cannot ride TaskInclude).

- name: Connect | Reconnect this VM's NICs (bounded multi-pass)
  module_defaults:
    group/community.vmware.vmware:
      hostname: "{{ vsphere_vm_server }}"
      username: "{{ vsphere_vm_username }}"
      password: "{{ vsphere_vm_password }}"
      validate_certs: "{{ vsphere_vm_validate_certs }}"
  block:
    - name: Connect | Pre-check whether this VM already has an IP
      community.vmware.vmware_guest_info:
        datacenter: "{{ vsphere_vm_datacenter }}"
        name: "{{ _vsphere_guest.name }}"
      register: _vsphere_ip_precheck
      failed_when: false
      delegate_to: localhost
      become: false

    # failed_when:false → missing instance is the error signal (not `is failed`).
    - name: Connect | Warn that the IP pre-check could not query the VM
      ansible.builtin.debug:
        msg: >-
          vCenter lookup FAILED for {{ _vsphere_guest.name }} — the reconnect
          passes below cannot see this VM's IP and will burn their whole budget.
          Check vsphere_vm_datacenter / the VM name / credentials. vCenter said:
          {{ _vsphere_ip_precheck.msg | default('(no message)') }}
      when: _vsphere_ip_precheck.instance is not defined
      delegate_to: localhost
      become: false

    - name: Connect | Mark this VM as needing an IP (only when it has none yet)
      ansible.builtin.set_fact:
        _vsphere_connect_pending: >-
          {{ (not (vsphere_vm_wait_for_ip | bool))
             or ((_vsphere_ip_precheck.instance.ipv4 | default('', true)) | length == 0) }}
      delegate_to: localhost
      become: false

    - name: Connect | Multi-pass reconnect until the VM has an IP
      ansible.builtin.include_tasks: connect_pass.yml
      when: _vsphere_connect_pending | bool
      loop: "{{ range(0, vsphere_vm_connect_passes | int) | list }}"
      loop_control:
        loop_var: _pass
        label: "pass {{ _pass + 1 }}/{{ vsphere_vm_connect_passes }} ({{ _vsphere_guest.name if _vsphere_connect_pending else 'done' }})"

    - name: Connect | Report if the VM never reported an IP (after all passes)
      ansible.builtin.debug:
        msg: >-
          {{ _vsphere_guest.name }} did not report an IPv4 after
          {{ vsphere_vm_connect_passes }} reconnect passes
          (~{{ vsphere_vm_connect_passes * vsphere_vm_connect_pass_retries * vsphere_vm_connect_pass_delay }}s).
          The VM is built; check the NIC portgroup + guest customization (wrong
          network, or the guest never DHCP/static-bound).
      when:
        - vsphere_vm_wait_for_ip | bool
        - _vsphere_connect_pending | bool
      delegate_to: localhost
      become: false
