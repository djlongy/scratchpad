---
# roles/vsphere_vm/tasks/connect.yml
# PERMANENT, SELF-HEALING fix for the clone+customize NIC-disconnect bug. After a
# VM is built, vSphere frequently clears the NIC's "connect at power on", so the
# guest boots with a dead NIC and never gets an IP. Worse, guest customization is
# applied ASYNCHRONOUSLY on first boot and can re-disconnect the vNIC AFTER a
# naive one-shot reconnect — so a single connect+wait can still lose the race.
#
# This runs over EVERY desired-present VM (freshly created AND already present,
# via _vsphere_to_connect), so a plain re-run heals any VM an earlier run left
# disconnected — the reconnect is no longer limited to fresh clones. It makes two
# passes:
#   Pass 1 — reconcile NICs + bounded IP wait over all targets.
#   Pass 2 — for any VM STILL without an IP, re-assert the NIC + wait again. By
#            now async customization has settled, so this catches the race.
# Both passes are idempotent (an already-connected NIC is a no-op) and bounded
# (they never hang). Gated by vsphere_vm_connect_nics.

- name: Connect | Skip (vsphere_vm_connect_nics is false or no targets)
  ansible.builtin.debug:
    msg: "NIC reconnect skipped (connect_nics false or no managed VMs)."
  when: >-
    not (vsphere_vm_connect_nics | bool)
    or (_vsphere_to_connect | default([]) | length) == 0
  run_once: true
  delegate_to: localhost
  become: false

- name: Connect | Reconnect NICs for all managed VMs
  when:
    - vsphere_vm_connect_nics | bool
    - (_vsphere_to_connect | default([]) | length) > 0
  block:
    - name: Connect | Pass 1 — reconcile NICs + wait for IP
      ansible.builtin.include_tasks: connect_pass.yml
      vars:
        _connect_targets: "{{ _vsphere_to_connect }}"

    - name: Connect | Identify VMs still without an IP after pass 1
      ansible.builtin.set_fact:
        # Keep the original guest dicts whose wait result reported no IPv4
        # (None or ''). These are the customization-race / slow stragglers.
        _vsphere_no_ip: >-
          {{ _vsphere_ipwait.results | default([])
             | rejectattr('instance.ipv4', 'truthy')
             | map(attribute='item') | list }}
      run_once: true
      delegate_to: localhost
      become: false
      when: vsphere_vm_wait_for_ip | bool

    - name: Connect | Pass 2 — re-assert NICs for VMs still without an IP
      ansible.builtin.include_tasks: connect_pass.yml
      vars:
        _connect_targets: "{{ _vsphere_no_ip }}"
      when:
        - vsphere_vm_wait_for_ip | bool
        - (_vsphere_no_ip | default([]) | length) > 0

    - name: Connect | Report any VM that never reported an IP (after both passes)
      ansible.builtin.debug:
        msg: >-
          {{ item.item.name }} did not report an IPv4 within the bounded wait
          across two reconnect passes. The VM is built; check the NIC portgroup +
          guest customization (wrong network, or the guest never DHCP/static-bound).
      loop: "{{ _vsphere_ipwait.results | default([]) }}"
      loop_control:
        label: "{{ item.item.name | default('') }}"
      when:
        - vsphere_vm_wait_for_ip | bool
        - (item.instance.ipv4 | default('', true)) | length == 0
      run_once: true
      delegate_to: localhost
      become: false
