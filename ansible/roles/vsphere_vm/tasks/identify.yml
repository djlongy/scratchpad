---
# Resolve VM → instance UUID by name+folder (multi-tenant safe). Used by destroy/redeploy.
# Explicit connection args — include_tasks does not inherit main.yml module_defaults.

- name: Identify | Resolve the VM by name + folder — {{ _vsphere_guest.name }}
  community.vmware.vmware_guest_info:
    hostname: "{{ vsphere_vm_server }}"
    username: "{{ vsphere_vm_username }}"
    password: "{{ vsphere_vm_password }}"
    validate_certs: "{{ vsphere_vm_validate_certs }}"
    datacenter: "{{ vsphere_vm_datacenter }}"
    name: "{{ _vsphere_guest.name }}"
    folder: "{{ _vsphere_guest.folder }}"
  register: _vsphere_existing
  # Module fails on missing VM — absorb so destroy/redeploy stay idempotent.
  failed_when: false
  changed_when: false
  check_mode: false
  delegate_to: localhost
  become: false

- name: Identify | Record name / folder / instance UUID from the folder-scoped lookup
  ansible.builtin.set_fact:
    _vsphere_existing_uuid: "{{ _vsphere_existing.instance.instance_uuid | default('') }}"
    _vsphere_existing_name: "{{ _vsphere_existing.instance.hw_name | default('') }}"
    _vsphere_existing_folder: "{{ _vsphere_existing.instance.hw_folder | default('') }}"
    _vsphere_existing_resource_pool: ""
  delegate_to: localhost
  become: false

- name: Identify | Refuse a lookup result that does not match inventory name + folder
  ansible.builtin.assert:
    that:
      - _vsphere_existing_name == _vsphere_guest.name
      - (_vsphere_existing_folder | trim('/') ) == (_vsphere_guest.folder | trim('/') )
    fail_msg: >-
      Identify found a VM but it does not match inventory placement — refusing to
      pin a delete. expected name={{ _vsphere_guest.name }} folder={{ _vsphere_guest.folder }};
      found name={{ _vsphere_existing_name }} folder={{ _vsphere_existing_folder }}
      uuid={{ _vsphere_existing_uuid }}. Fix inventory (vsphere_vm_name / vsphere_vm_folder)
      or the live placement; do not delete by bare name.
    quiet: true
  when: _vsphere_existing_uuid | length > 0
  delegate_to: localhost
  become: false

# resourcePool is not a filter on vmware_guest_info — re-read by UUID when inventory sets a pool.
- name: Identify | Verify resource pool when inventory declares one
  when:
    - _vsphere_existing_uuid | length > 0
    - (vsphere_vm_resource_pool | default('') | length) > 0
  delegate_to: localhost
  become: false
  block:
    - name: Identify | Fetch resourcePool.name for the pinned instance UUID
      community.vmware.vmware_guest_info:
        hostname: "{{ vsphere_vm_server }}"
        username: "{{ vsphere_vm_username }}"
        password: "{{ vsphere_vm_password }}"
        validate_certs: "{{ vsphere_vm_validate_certs }}"
        datacenter: "{{ vsphere_vm_datacenter }}"
        uuid: "{{ _vsphere_existing_uuid }}"
        use_instance_uuid: true
        schema: vsphere
        properties:
          - name
          - config.instanceUuid
          - resourcePool.name
      register: _vsphere_existing_pool
      failed_when: false
      changed_when: false
      check_mode: false

    - name: Identify | Extract the live resource pool name
      ansible.builtin.set_fact:
        _vsphere_existing_resource_pool: >-
          {{ _vsphere_existing_pool.instance['resourcePool.name']
             | default(_vsphere_existing_pool.instance.resourcePool.name
                       | default('', true), true) }}

    - name: Identify | Refuse a UUID whose resource pool does not match inventory
      ansible.builtin.assert:
        that:
          - >-
            (_vsphere_existing_resource_pool | length) > 0
            and (
              _vsphere_existing_resource_pool == vsphere_vm_resource_pool
              or _vsphere_existing_resource_pool == (vsphere_vm_resource_pool | basename)
              or (vsphere_vm_resource_pool | basename) == _vsphere_existing_resource_pool
            )
        fail_msg: >-
          Identify resolved {{ _vsphere_guest.name }} to instance UUID
          {{ _vsphere_existing_uuid }} in folder {{ _vsphere_existing_folder }}, but its
          resource pool is '{{ _vsphere_existing_resource_pool }}' — inventory expects
          '{{ vsphere_vm_resource_pool }}'. Refusing to delete the wrong compute
          placement. Align vsphere_vm_resource_pool or the live VM before destroy/redeploy.
        quiet: true

- name: Identify | Report what the delete will target
  ansible.builtin.debug:
    msg: >-
      {{ _vsphere_guest.name }} resolved to instance UUID {{ _vsphere_existing_uuid }}
      (folder={{ _vsphere_existing_folder }}{{
        ', resource_pool=' ~ _vsphere_existing_resource_pool
        if (_vsphere_existing_resource_pool | length) > 0 else ''
      }}) — the delete is pinned to this object.
  when: _vsphere_existing_uuid | length > 0
  delegate_to: localhost
  become: false

- name: Identify | Report that there is nothing to delete
  ansible.builtin.debug:
    msg: >-
      {{ _vsphere_guest.name }} not found at folder {{ _vsphere_guest.folder }}
      in {{ vsphere_vm_datacenter }} — skipping the delete (already in the desired
      state, or the VM was moved; update vsphere_vm_folder if it still exists
      elsewhere).
  when: _vsphere_existing_uuid | length == 0
  delegate_to: localhost
  become: false
