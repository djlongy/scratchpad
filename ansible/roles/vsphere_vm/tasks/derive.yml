---
# roles/vsphere_vm/tasks/derive.yml
# Build vsphere_vm_guests from the inventory hosts in vsphere_vm_inventory_group
# — each host IS a VM. Reads hostvars[host], which is the MERGED view of inline
# inventory vars + host_vars + group_vars, so it doesn't matter where the per-VM
# vars live. Role defaults fill any gaps; ansible_host becomes the static IP
# unless the host defines vsphere_vm_networks. Runs once on the controller.

- name: Derive | Assert the inventory group is set and non-empty
  ansible.builtin.assert:
    that:
      - vsphere_vm_inventory_group | length > 0
      - groups[vsphere_vm_inventory_group] | default([]) | length > 0
    fail_msg: "vsphere_vm_from_inventory is true but vsphere_vm_inventory_group is unset or empty."
    quiet: true
  run_once: true
  delegate_to: localhost
  become: false

# The per-host contract is native vmware_guest too — refuse the retired flat
# host_vars loudly instead of silently ignoring them (they'd otherwise fall back
# to role defaults and shrink a VM on the next reconcile).
- name: Derive | Refuse retired flat hardware host_vars (migrated to native vmware_guest dicts)
  ansible.builtin.assert:
    that:
      - hostvars[item].vsphere_vm_cpus is not defined
      - hostvars[item].vsphere_vm_memory_mb is not defined
      - hostvars[item].vsphere_vm_disk_gb is not defined
      - hostvars[item].vsphere_vm_disk_type is not defined
      - hostvars[item].vsphere_vm_extra_disks is not defined
      - hostvars[item].vsphere_vm_firmware is not defined
      - hostvars[item].vsphere_vm_scsi is not defined
    fail_msg: >-
      {{ item }} sets retired vsphere_vm_* flat hardware vars. Migrate:
      vsphere_vm_cpus/_memory_mb/_firmware/_scsi → vsphere_vm_hardware: {num_cpus, memory_mb,
      boot_firmware, scsi}; vsphere_vm_disk_gb/_disk_type/_extra_disks →
      vsphere_vm_disk: [{size_gb, type}, ...] (primary first).
    quiet: true
  loop: "{{ groups[vsphere_vm_inventory_group] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true
  delegate_to: localhost
  become: false

- name: Derive | Seed from any explicitly-listed guests
  ansible.builtin.set_fact:
    _vsphere_inv_guests: "{{ vsphere_vm_guests | default([]) }}"
  run_once: true
  delegate_to: localhost
  become: false

- name: Derive | Append one guest per inventory host
  ansible.builtin.set_fact:
    _vsphere_inv_guests: "{{ _vsphere_inv_guests + [_guest] }}"
  vars:
    _hv: "{{ hostvars[item] }}"
    _guest:
      name: "{{ _hv.vsphere_vm_name | default(_hv.canonical_hostname | default(item)) }}"
      template: "{{ _hv.vsphere_vm_template }}"
      # Native vmware_guest dicts: a host-level hardware merges over the role
      # default; a host-level disk list replaces it.
      hardware: "{{ vsphere_vm_hardware | combine(_hv.vsphere_vm_hardware | default({})) }}"
      disk: "{{ _hv.vsphere_vm_disk | default(vsphere_vm_disk) }}"
      folder: "{{ _hv.vsphere_vm_folder | default(vsphere_vm_folder) }}"
      datastore: "{{ _hv.vsphere_vm_datastore | default(vsphere_vm_datastore) }}"
      state: "{{ _hv.vsphere_vm_state | default(vsphere_vm_state) }}"
      networks: "{{ _hv.vsphere_vm_networks | default([_derived_nic]) }}"
      customization: "{{ _hv.vsphere_vm_customization | default(_derived_cust) }}"
      provision_via_guestinfo: "{{ _hv.vsphere_vm_provision_via_guestinfo | default(vsphere_vm_provision_via_guestinfo) | bool }}"
      tags: "{{ _hv.vsphere_vm_tags | default({}) }}"
    _derived_nic:
      name: "{{ _hv.vsphere_vm_network | default(vsphere_vm_network) }}"
      type: static
      ip: "{{ _hv.ansible_host }}"
      netmask: "{{ _hv.vsphere_vm_netmask | default(vsphere_vm_netmask) }}"
      gateway: "{{ _hv.vsphere_vm_gateway | default((_hv.ansible_host.split('.')[:3] | join('.')) ~ '.1') }}"
    _derived_cust:
      # Guest OS hostname is INDEPENDENT of the vCenter VM name (item.name):
      # the VM name may be tenant-scoped/globally-unique while the OS hostname
      # stays clean/canonical.
      hostname: "{{ _hv.vsphere_vm_hostname | default(_hv.canonical_hostname | default(item)) }}"
      domain: "{{ _hv.domain | default('') }}"
      dns_servers: "{{ _hv.vsphere_vm_dns | default(vsphere_vm_dns) }}"
  loop: "{{ groups[vsphere_vm_inventory_group] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true
  delegate_to: localhost
  become: false

- name: Derive | Adopt the inventory-derived guest list
  ansible.builtin.set_fact:
    vsphere_vm_guests: "{{ _vsphere_inv_guests }}"
  run_once: true
  delegate_to: localhost
  become: false
