---
# roles/vsphere_vm/tasks/spec.yml
# Build THIS host's guest spec from its own vars — the host IS the inventory item,
# so no group loop and no hostvars[] indirection: plain var references resolve in
# this host's own context (inline inventory + host_vars + group_vars merged).
# Role defaults fill any gaps; ansible_host becomes the static IP unless the host
# defines vsphere_vm_networks. The result is the single dict _vsphere_guest.

- name: Spec | Assert the template is set
  ansible.builtin.assert:
    that:
      - vsphere_vm_template | default('') | length > 0
    fail_msg: >-
      {{ inventory_hostname }} has no vsphere_vm_template — set it in host_vars or the
      group's group_vars (it is the source template to clone).
    quiet: true
  delegate_to: localhost
  become: false

- name: Spec | Build this host's guest spec
  ansible.builtin.set_fact:
    _vsphere_guest:
      name: "{{ vsphere_vm_name | default(canonical_hostname | default(inventory_hostname)) }}"
      template: "{{ vsphere_vm_template }}"
      # Native vmware_guest dicts — normal Ansible precedence: a host/group-level
      # vsphere_vm_hardware / vsphere_vm_disk replaces the role default wholesale.
      # Keys omitted from hardware (e.g. boot_firmware, scsi) inherit from the
      # source template, which is what you want for clones.
      hardware: "{{ vsphere_vm_hardware }}"
      disk: "{{ vsphere_vm_disk }}"
      folder: "{{ vsphere_vm_folder }}"
      datastore: "{{ vsphere_vm_datastore }}"
      state: "{{ vsphere_vm_state }}"
      networks: "{{ vsphere_vm_networks | default([_derived_nic]) }}"
      customization: "{{ vsphere_vm_customization | default(_derived_cust) }}"
      provision_via_guestinfo: "{{ vsphere_vm_provision_via_guestinfo | bool }}"
      guestinfo_userdata: "{{ vsphere_vm_guestinfo_userdata | default('') }}"
      tags: "{{ vsphere_vm_tags }}"
  vars:
    _derived_nic:
      name: "{{ vsphere_vm_network }}"
      type: static
      ip: "{{ ansible_host }}"
      netmask: "{{ vsphere_vm_netmask }}"
      gateway: "{{ vsphere_vm_gateway | default((ansible_host.split('.')[:3] | join('.')) ~ '.1') }}"
    _derived_cust:
      # Guest OS hostname is INDEPENDENT of the vCenter VM name (_vsphere_guest.name):
      # the VM name may be tenant-scoped/globally-unique while the OS hostname
      # stays clean/canonical.
      hostname: "{{ vsphere_vm_hostname | default(canonical_hostname | default(inventory_hostname)) }}"
      domain: "{{ domain | default('') }}"
      dns_servers: "{{ vsphere_vm_dns }}"
  delegate_to: localhost
  become: false
