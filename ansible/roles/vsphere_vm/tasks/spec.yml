---
# roles/vsphere_vm/tasks/spec.yml
# Build THIS host's guest spec from its own vars — the host IS the inventory item,
# so no group loop and no hostvars[] indirection: plain var references resolve in
# this host's own context (inline inventory + host_vars + group_vars merged).
# Role defaults fill any gaps; ansible_host becomes the static IP unless the host
# defines vsphere_vm_networks. The result is the single dict _vsphere_guest.

- name: Spec | Assert the template is set
  ansible.builtin.assert:
    that:
      - vsphere_vm_template | default('') | length > 0
    fail_msg: >-
      {{ inventory_hostname }} has no vsphere_vm_template — set it in host_vars or the
      group's group_vars (it is the source template to clone).
    quiet: true
  delegate_to: localhost
  become: false

- name: Spec | Build this host's guest spec
  ansible.builtin.set_fact:
    _vsphere_guest:
      name: "{{ vsphere_vm_name | default(canonical_hostname | default(inventory_hostname)) }}"
      template: "{{ vsphere_vm_template }}"
      # Native community.vmware.vmware_guest `hardware` dict (num_cpus,
      # memory_mb, …), passed 1:1. Optional deprecated aliases vsphere_vm_cpu /
      # vsphere_vm_memory fold on top when inventory still sets them.
      hardware: >-
        {{ vsphere_vm_hardware
           | combine({'num_cpus': vsphere_vm_cpu | int}
                     if (vsphere_vm_cpu is defined) else {})
           | combine({'memory_mb': vsphere_vm_memory | int}
                     if (vsphere_vm_memory is defined) else {}) }}
      disk: "{{ vsphere_vm_disk }}"
      # The two vSphere modules want different dialects of the SAME location:
      #   folder      → community.vmware.vmware_guest `folder:`      — ABSOLUTE
      #                 inventory path, datacenter included
      #   folder_path → vmware.vmware.folder `relative_path:`        — RELATIVE
      #                 to this datacenter's VM root
      # Both are BUILT here by concatenation from the one declared
      # vsphere_vm_folder, never by parsing one back out of the other: a prefix
      # strip half-matches when vsphere_vm_datacenter and the declared path
      # disagree, and silently creates a junk nested folder tree.
      folder: "/{{ vsphere_vm_datacenter }}/vm{{ ('/' ~ vsphere_vm_folder) if vsphere_vm_folder else '' }}"
      folder_path: "{{ vsphere_vm_folder }}"
      datastore: "{{ vsphere_vm_datastore }}"
      state: "{{ vsphere_vm_state }}"
      networks: "{{ vsphere_vm_networks | default([_derived_nic]) }}"
      customization: "{{ vsphere_vm_customization | default(_derived_cust) }}"
      provision_via_guestinfo: "{{ vsphere_vm_provision_via_guestinfo | bool }}"
      guestinfo_userdata: "{{ vsphere_vm_guestinfo_userdata | default('') }}"
      tags: "{{ vsphere_vm_tags }}"
  vars:
    # Static NIC derived from ansible_host. Gateway precedence:
    #   1. explicit vsphere_vm_gateway            → use it
    #   2. else vsphere_vm_gateway_auto: true      → FIRST USABLE of this host's subnet,
    #      computed from ansible_host + netmask (block = 256 - mask_last_octet; net = ip -
    #      ip%block; gw = net + 1 — respects /25../27, e.g. .65 on a /26)
    #   3. else                                    → NO gateway (unrouted data/storage NIC)
    # The gateway key is omitted entirely in case 3, exactly like leaving `gateway` off a
    # custom vsphere_vm_networks entry. Opt into the auto compute per host or group.
    _base_nic:
      name: "{{ vsphere_vm_network }}"
      type: static
      ip: "{{ ansible_host }}"
      netmask: "{{ vsphere_vm_netmask }}"
    _auto_gw: >-
      {{ ((ansible_host.split('.')[:3] | join('.')) ~ '.' ~
          ((ansible_host.split('.')[3] | int)
           - ((ansible_host.split('.')[3] | int) % (256 - (vsphere_vm_netmask.split('.')[3] | int)))
           + 1)) if (vsphere_vm_gateway_auto | default(false) | bool) else '' }}
    _eff_gw: "{{ (vsphere_vm_gateway | default('')) or _auto_gw }}"
    _derived_nic: >-
      {{ _base_nic | combine({'gateway': _eff_gw} if (_eff_gw | length > 0) else {}) }}
    _derived_cust:
      # Guest OS hostname is INDEPENDENT of the vCenter VM name (_vsphere_guest.name):
      # the VM name may be tenant-scoped/globally-unique while the OS hostname
      # stays clean/canonical.
      hostname: "{{ vsphere_vm_hostname | default(canonical_hostname | default(inventory_hostname)) }}"
      domain: "{{ domain | default('') }}"
      dns_servers: "{{ vsphere_vm_dns }}"
  delegate_to: localhost
  become: false
