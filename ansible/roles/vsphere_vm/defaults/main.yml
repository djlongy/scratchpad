---
# vsphere_vm defaults — behavioural only. Env values (vCenter, Vault, placement) live in inventory.

# ── vCenter connection ───────────────────────────────────────────────────────
# vsphere_vm_server: "vcenter.example.com"
# vsphere_vm_vault_secret: "kv-<env>/data/platform/vsphere/vcenter/runtime"
vsphere_vm_username: "administrator@vsphere.local"
vsphere_vm_password_field: "admin_password"
vsphere_vm_password: ""                        # non-empty bypasses Vault lookup
vsphere_vm_validate_certs: false

# ── Placement ────────────────────────────────────────────────────────────────
# vsphere_vm_datacenter: "Datacenter"
# vsphere_vm_cluster: "Cluster"               # OR vsphere_vm_esxi_host
# vsphere_vm_esxi_host: "192.0.2.11"
# vsphere_vm_resource_pool: "Resources"       # pool name (not path)
# Folder relative to DC VM root — no leading slash, no /DC/vm prefix. Nested ok.
vsphere_vm_folder: ""
vsphere_vm_datastore: ""

# ── Hardware (native vmware_guest `hardware` dict, 1:1) ──────────────────────
# Unset keys inherit from the template. Inventory replaces the whole dict.
# Optional aliases: vsphere_vm_cpu → num_cpus, vsphere_vm_memory → memory_mb
vsphere_vm_hardware:
  num_cpus: 2
  memory_mb: 4096
vsphere_vm_disk:
  - size_gb: 40                                  # primary; must be >= template
    type: thin                                   # thin | thick | eagerzeroedthick
vsphere_vm_wait_for_ip: true
vsphere_vm_state: poweredon
vsphere_vm_scsi_type: paravirtual                # for disk-grow (vmware_guest_disk)

# ── Guest SSH handoff (chain on-guest roles in the same play) ────────────────
# Play needs gather_facts: false; template must bake ansible user+key;
# ANSIBLE_HOST_KEY_CHECKING=False for the new host.
vsphere_vm_wait_for_ssh: false
vsphere_vm_ssh_timeout: 300

# ── NIC reconnect (defense-in-depth after staged GOSC create) ────────────────
# Staged create keeps NIC connected on first boot. This multi-pass heals VMs
# left disconnected by older runs / power events. false = skip whole phase.
# Budget = connect_passes × connect_pass_retries × connect_pass_delay seconds.
vsphere_vm_connect_nics: true
vsphere_vm_create_retries: 3
vsphere_vm_create_delay: 15
vsphere_vm_connect_passes: 8
vsphere_vm_connect_pass_retries: 10
vsphere_vm_connect_pass_delay: 10

# ── GOSC (default) vs GuestInfo (cloud-init; no NIC disconnect race) ─────────
# GuestInfo needs a template with VMware datasource + disable_vmware_customization.
# Same inventory fields as GOSC (networks/hostname/dns). Multi-NIC: name each
# guest device (default ens192/ens224/…); override with interface: when needed.
vsphere_vm_provision_via_guestinfo: false

# ── Per-host identity (host-centric: each play host builds its own VM) ───────
# Optional except template. Defaults computed per host when unset:
#   vsphere_vm_name     → vCenter object (canonical_hostname / inventory_hostname)
#   vsphere_vm_hostname → guest OS hostname (same default; independent of name)
vsphere_vm_network: ""
vsphere_vm_netmask: "255.255.255.0"
# vsphere_vm_gateway: ""       # UNSET = no gateway. Explicit value always wins.
vsphere_vm_gateway_auto: false # true + no gateway → first usable of ansible_host subnet
vsphere_vm_dns: []

# ── Tags {Category: tag} — role ensures category/tag then associates ─────────
vsphere_vm_tags: {}

# ── Destructive gates (never leave true in inventory; pass via -e) ───────────
# -e vsphere_vm_force_redeploy=true           # wipe + rebuild, play continues
# -e vsphere_vm_state=absent -e vsphere_vm_force_destroy=true
# --tags redeploy|destroy only narrows scope; force_* still required.
vsphere_vm_force_redeploy: false
vsphere_vm_force_destroy: false
