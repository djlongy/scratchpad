---
# roles/vsphere_vm/defaults/main.yml
#
# Portable vCenter VM lifecycle role: create (clone from template) and destroy
# VMs via community.vmware.vmware_guest. All modules run on the control node
# (delegate_to: localhost). Driven by the vsphere_vm_guests list. Idempotent —
# vmware_guest reconciles to the declared state.
#
# Behavioural defaults live here; env-specific values (vCenter address, Vault
# path, datacenter/cluster/datastore) are commented out for discoverability and
# MUST be set in inventory.

# ── vCenter connection ───────────────────────────────────────────────────────
# ENV-SPECIFIC — set in inventory:
# vsphere_vm_server: "vcenter.example.com"
# vsphere_vm_vault_secret: "kv-<env>/data/platform/vsphere/vcenter/runtime"
vsphere_vm_username: "administrator@vsphere.local"
vsphere_vm_password_field: "admin_password"   # field within vsphere_vm_vault_secret
vsphere_vm_password: ""                        # set directly to bypass the Vault lookup
vsphere_vm_validate_certs: false               # labs use self-signed vCenter certs

# ── Placement (ENV-SPECIFIC — set in inventory) ──────────────────────────────
# vsphere_vm_datacenter: "Datacenter"
# vsphere_vm_cluster: "Cluster"               # OR vsphere_vm_esxi_host for standalone
# vsphere_vm_esxi_host: "192.0.2.11"          # standalone host (no DRS cluster)
# vsphere_vm_resource_pool: "Resources"       # pool NAME (not a path); standalone host default is "Resources"
vsphere_vm_folder: "/vm"                       # inventory folder for new VMs
vsphere_vm_datastore: ""                       # default datastore for clones

# ── Per-VM hardware defaults (overridable per guest) ─────────────────────────
vsphere_vm_cpus: 2
vsphere_vm_memory_mb: 4096
vsphere_vm_disk_gb: 40
vsphere_vm_disk_type: thin                      # thin | thick | eagerzeroedthick
vsphere_vm_firmware: efi                         # efi | bios
vsphere_vm_scsi: paravirtual
vsphere_vm_wait_for_ip: true
vsphere_vm_state: poweredon                      # default state for created guests

# ── Robust spin-up (NIC reconnect + bounded waits) ───────────────────────────
# After a clone+customize, vSphere leaves the NIC disconnected (a known bug), so
# the guest never gets an IP. Critically, the disconnect is a ONE-TIME event
# applied during the guest's first-boot customization — which runs ASYNC and can
# re-disconnect the NIC AFTER a single up-front reconnect. So one reconnect can
# lose the race.
#
# The role therefore runs a bounded MULTI-PASS poll-and-reconnect: each pass
# re-asserts every still-disconnected NIC, then briefly waits for an IP; it
# repeats until every VM has an IP or the passes run out. Whichever pass lands
# just after customization finishes makes the reconnect stick — so recovery is
# ~one pass-interval, not a single long timeout. Bounded total =
# connect_passes * connect_pass_retries * connect_pass_delay seconds.
vsphere_vm_connect_nics: true                    # force NICs connected post-build
vsphere_vm_create_retries: 3                     # retry transient vCenter create/gather errors
vsphere_vm_create_delay: 15
# Multi-pass reconnect cadence. Default: 8 passes x (5 polls x 10s) = up to 400s
# total, re-asserting every disconnected NIC about once per ~60s — tight enough
# to catch the customization re-disconnect quickly.
vsphere_vm_connect_passes: 8                     # reconnect+wait cycles before giving up
vsphere_vm_connect_pass_retries: 5               # IP polls per pass
vsphere_vm_connect_pass_delay: 10                # seconds between polls within a pass

# ── Provisioning mode: GOSC (default) vs cloud-init GuestInfo ─────────────────
# The NIC-disconnect above is caused by vSphere Guest OS Customization (GOSC) —
# the clone-time `customization:` spec that sets the static IP/hostname ALSO fires
# an async first-boot event that drops the NIC. The multi-pass reconnect heals it.
#
# GuestInfo mode is the DURABLE CURE: clone with NO customization spec and hand the
# hostname + static network to cloud-init via the guestinfo.metadata advanced
# setting instead. No GOSC → the NIC never disconnects → the reconnect phase above
# becomes a fast no-op. It consumes the SAME per-guest fields the GOSC path does
# (ansible_host/hostname/gateway/dns/netmask/network), so flipping this flag needs
# no new inventory. See the role README.
#
# REQUIRES a GuestInfo-ready template: cloud-init with the VMware datasource
# (`datasource_list: [VMware, ...]`, `allow_raw_data: true`) and
# `disable_vmware_customization: true`. Verify on a host with
# `cloud-init query platform` → must return `vmware`.
vsphere_vm_provision_via_guestinfo: false
# GuestInfo networking is MULTI-NIC: every entry in a guest's `networks` becomes a
# cloud-init ethernet keyed by an EXPLICIT guest device name. cloud-init's RHEL/
# NetworkManager renderer ignores netplan `match:` globs (an unmatched block is
# dropped and the NIC DHCPs), so each NIC names its device. The default names
# follow the VMware VMXNET3 slot order — ens192, ens224, ens256, … in list order —
# so a single-NIC guest needs nothing extra. Override per NIC with `interface:`
# when the template uses different names (eth0, ens160, …):
#   networks:
#     - {name: "VLAN10-MGT",     interface: ens192, ip: 192.0.2.10,  netmask: 255.255.255.0, gateway: 192.0.2.1}
#     - {name: "VLAN30-STORAGE", interface: ens224, ip: 10.0.30.10,  netmask: 255.255.255.0}   # no gateway
#     - {name: "VLAN40-ACCESS",  interface: ens256, ip: 10.0.40.10,  netmask: 255.255.255.0}
# The primary NIC (first one with a gateway; else NIC 0) carries the resolvers.
# Per-NIC firewalld zones/services/rules are NOT this role's job — a firewalld/
# baseline role wires those post-provision, keyed off these interface names.
# Optional per-guest raw #cloud-config user-data: set item.guestinfo_userdata on a
# guest to inject guestinfo.userdata alongside the metadata (packages, users, an
# authoritative resolv.conf, …). Left unset → only metadata (network + hostname).
# ── Guests to manage ─────────────────────────────────────────────────────────
# Each item (only name + template are required; the rest fall back to the
# hardware defaults above):
#   - name: web01
#     template: linux-almalinux-9-main          # source template to clone
#     cpus: 2
#     memory_mb: 4096
#     disk_gb: 40
#     extra_disks:                              # optional secondary disks (e.g. /opt)
#       - size_gb: 50                            # native vmware_guest disk dicts
#         type: thin
#     networks:                                 # vmware_guest-native network dicts
#       - name: "VLAN10-SVC"                     # dvPortGroup / network name
#         type: static
#         ip: 192.0.2.50
#         netmask: 255.255.255.0
#         gateway: 192.0.2.1
#     customization:                            # vmware_guest-native customization
#       hostname: web01
#       domain: example.com
#       dns_servers: [192.0.2.53]
#     state: poweredon                          # poweredon | present | poweredoff | absent
vsphere_vm_guests: []

# ── Inventory-derived guests (the preferred model) ───────────────────────────
# Instead of curating vsphere_vm_guests by hand, derive one guest per host in an
# inventory group — each host IS a VM, its spec lives in host_vars. Set
# vsphere_vm_from_inventory: true and point at the group. Per-host vars (all
# optional except the template; they fall back to the role defaults above):
#   vsphere_vm_template (required), vsphere_vm_name (default: inventory_hostname),
#   vsphere_vm_cpus/_memory_mb/_disk_gb/_state/_folder/_datastore,
#   vsphere_vm_networks (else derived from ansible_host + the vars below),
#   vsphere_vm_customization (else derived from hostname/domain/dns).
#
# The vCenter VM NAME and the guest OS HOSTNAME are decoupled (important for a
# shared/multi-tenant vCenter — see README "Multi-tenant vCenter naming"):
#   vsphere_vm_name     → vCenter object name. Default: canonical_hostname, else
#                         inventory_hostname. Override (usually in group_vars) to a
#                         globally-unique, tenant-scoped name, e.g.
#                         "{{ tenant }}-{{ env }}-{{ canonical_hostname }}".
#   vsphere_vm_hostname → guest OS hostname. Default: canonical_hostname, else
#                         inventory_hostname. Stays clean/canonical regardless of
#                         the vCenter name.
# Both are intentionally NOT defaulted here (their default is computed per host).
vsphere_vm_from_inventory: false
vsphere_vm_inventory_group: ""               # e.g. "vmware_vms"
# Defaults for the auto-derived static NIC (override per host/group as needed):
vsphere_vm_network: ""                        # dvPortGroup / network name
vsphere_vm_netmask: "255.255.255.0"
# vsphere_vm_gateway: ""                       # default: .1 of the host's /24
vsphere_vm_dns: []                            # DNS servers for guest customization

# ── Destroy safety ───────────────────────────────────────────────────────────
# Destroying (state: absent) is refused unless this is true — a guard against
# accidental mass-deletion. Combine with the `destroy` tag (see tasks/main.yml).
vsphere_vm_allow_destroy: false
