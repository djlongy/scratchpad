---
# Write each managed repository. yum_repository is idempotent and owns the file
# it writes (default <name>.repo, or a shared <file>.repo when `file` is set).

- name: Configure the managed YUM/DNF repositories
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    file: "{{ item.file | default(item.name) }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: "{{ item.enabled | default(true) }}"
    gpgcheck: "{{ item.gpgcheck | default(true) }}"
    gpgkey: "{{ item.gpgkey | default(omit) }}"
    sslverify: "{{ item.sslverify | default(omit) }}"
    priority: "{{ item.priority | default(omit) }}"
    module_hotfixes: "{{ item.module_hotfixes | default(omit) }}"
    metadata_expire: "{{ item.metadata_expire | default(omit) }}"
    mode: "0644"
    state: "{{ item.state | default('present') }}"
  loop: "{{ yum_repos_repos }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.file | default(item.name) }}.repo"
  notify: Refresh dnf metadata cache
