---
# The sweep: remove every .repo file that is neither one we manage nor in the
# yum_repos_keep allowlist, leaving the directory holding exactly the desired
# set. Runs after configure.yml so the managed files already exist on disk.

# Managed basenames (no .repo suffix) that must survive: every effective repo's
# name, plus any explicit `file` override. Use _yum_repos_effective so a host
# only preserves the repos for ITS major (an el8 host does not keep el9-only
# basenames). Single-expression set_fact (recomputed each run).
- name: Compute the managed repo basenames (these survive the sweep)
  ansible.builtin.set_fact:
    _yum_repos_managed: >-
      {{ (_yum_repos_effective | map(attribute='name') | list)
         + (_yum_repos_effective | selectattr('file', 'defined') | map(attribute='file') | list) }}

- name: Find every .repo file currently on disk
  ansible.builtin.find:
    paths: "{{ yum_repos_dir }}"
    patterns: "*.repo"
    file_type: file
  register: _yum_repos_present

- name: Remove unmanaged .repo files (keep managed set + yum_repos_keep)
  become: true  # root: removes files under /etc/yum.repos.d
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _yum_repos_present.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  vars:
    _basename: "{{ item.path | basename | regex_replace('\\.repo$', '') }}"
  when:
    - _basename not in _yum_repos_managed
    - _basename not in yum_repos_keep
  notify: Refresh dnf metadata cache
