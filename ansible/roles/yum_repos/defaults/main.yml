---
# yum_repos — declaratively own /etc/yum.repos.d on EL-family hosts.
# Writes a managed set of repositories (typically internal Artifactory/Nexus
# mirrors) and, optionally, sweeps away every other .repo file so the directory
# ends up containing exactly the repos you declare (plus an allowlist).
#
# EL-family only (RHEL / AlmaLinux / Rocky). Supported majors: 8, 9, 10.
# Non-EL hosts skip the role. Pick repos per major via yum_repos_by_major (map)
# or the flat yum_repos_repos list (optional per-entry majors filter).

# Master toggle. Set false to skip the role entirely.
yum_repos_enabled: true

# The repository directory this role owns.
yum_repos_dir: /etc/yum.repos.d

# Host majors this role will manage. Anything outside fails the resolve assert.
yum_repos_supported_majors: ["8", "9", "10"]

# ── The managed repositories ─────────────────────────────────────────────────
# Prefer the multi-EL map when a fleet mixes majors (GPG keys and sometimes paths
# differ per major). Keys MUST be strings matching ansible_distribution_major_version.
# When the map is non-empty it is authoritative for every host — each major the
# play hits needs a key. Leave the map empty to use the flat list instead.
#
# yum_repos_by_major:
#   "8":
#     - name: baseos
#       description: "AlmaLinux 8 BaseOS (Artifactory mirror)"
#       baseurl: "https://artifactory.example.com/artifactory/almalinux-baseos/$releasever/BaseOS/$basearch/os/"
#       gpgcheck: true
#       gpgkey: "https://artifactory.example.com/artifactory/almalinux-baseos/RPM-GPG-KEY-AlmaLinux-8"
#     - name: appstream
#       description: "AlmaLinux 8 AppStream (Artifactory mirror)"
#       baseurl: "https://artifactory.example.com/artifactory/almalinux-appstream/$releasever/AppStream/$basearch/os/"
#       gpgcheck: true
#       gpgkey: "https://artifactory.example.com/artifactory/almalinux-baseos/RPM-GPG-KEY-AlmaLinux-8"
#   "9":
#     - name: baseos
#       description: "AlmaLinux 9 BaseOS (Artifactory mirror)"
#       baseurl: "https://artifactory.example.com/artifactory/almalinux-baseos/$releasever/BaseOS/$basearch/os/"
#       gpgcheck: true
#       gpgkey: "https://artifactory.example.com/artifactory/almalinux-baseos/RPM-GPG-KEY-AlmaLinux-9"
#     - name: appstream
#       description: "AlmaLinux 9 AppStream (Artifactory mirror)"
#       baseurl: "https://artifactory.example.com/artifactory/almalinux-appstream/$releasever/AppStream/$basearch/os/"
#       gpgcheck: true
#       gpgkey: "https://artifactory.example.com/artifactory/almalinux-baseos/RPM-GPG-KEY-AlmaLinux-9"
#   "10":
#     - name: baseos
#       description: "AlmaLinux 10 BaseOS (Artifactory mirror)"
#       baseurl: "https://artifactory.example.com/artifactory/almalinux-baseos/$releasever/BaseOS/$basearch/os/"
#       gpgcheck: true
#       gpgkey: "https://artifactory.example.com/artifactory/almalinux-baseos/RPM-GPG-KEY-AlmaLinux-10"
#
# Flat list (used when yum_repos_by_major is empty). Optional per-entry
# `majors: [8, 9]` limits that entry to those majors (int or string). Entries
# without `majors` apply to every supported host. $releasever still expands on
# the host. Example:
#
# yum_repos_repos:
#   - name: baseos
#     description: "AlmaLinux BaseOS (Artifactory mirror)"
#     baseurl: "https://artifactory.example.com/artifactory/almalinux-baseos/$releasever/BaseOS/$basearch/os/"
#     gpgcheck: true
#     gpgkey: "https://artifactory.example.com/artifactory/almalinux-baseos/RPM-GPG-KEY-AlmaLinux-{{ ansible_distribution_major_version }}"
#   - name: appstream
#     description: "AlmaLinux AppStream (Artifactory mirror)"
#     baseurl: "https://artifactory.example.com/artifactory/almalinux-appstream/$releasever/AppStream/$basearch/os/"
#     gpgcheck: true
#     gpgkey: "https://artifactory.example.com/artifactory/almalinux-baseos/RPM-GPG-KEY-AlmaLinux-{{ ansible_distribution_major_version }}"
#   - name: extras
#     file: almalinux-extras          # groups into almalinux-extras.repo
#     majors: [8, 9]                  # extras layout differs on some majors
#     baseurl: "https://artifactory.example.com/artifactory/almalinux-extras/$releasever/extras/$basearch/os/"
#     gpgcheck: false
#
# Supported per-entry keys (all optional except name + baseurl):
#   name, baseurl, file, description, enabled, gpgcheck, gpgkey, sslverify,
#   priority, module_hotfixes, metadata_expire, state, majors
yum_repos_by_major: {}
yum_repos_repos: []

# ── The sweep — remove .repo files that aren't ours ──────────────────────────
# true  → after writing the managed repos, delete every *.repo file that is
#         neither managed nor in yum_repos_keep. End state = exactly your repos
#         (+ allowlist). This is the "replace all" behaviour.
# false → additive: leave existing repos in place, only add/update the managed
#         set.
yum_repos_remove_unmanaged: true

# Basenames (WITHOUT the .repo suffix) to preserve during the sweep, e.g.
# ['epel', 'epel-modular']. The managed repos above are always preserved.
yum_repos_keep: []

# ── Safety: snapshot the pristine directory before the first sweep ───────────
# Copies yum_repos_dir to yum_repos_backup_dir once (guarded so re-runs never
# overwrite the original snapshot). Restore with: cp -a <backup>/. <dir>/
yum_repos_backup: true
yum_repos_backup_dir: /etc/yum.repos.d.orig

# ── Validation: refresh the dnf metadata cache after changes ─────────────────
# true → run `dnf makecache` when repos change; a broken/unreachable managed
#        repo then fails the run loudly instead of surfacing on the next install.
yum_repos_makecache: true
