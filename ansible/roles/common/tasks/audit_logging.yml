---
# roles/common/tasks/audit_logging.yml
#
# Ansible Audit Logging Framework
# Collects execution metadata and routes to one or more logging backends.
#
# ── Single-play playbooks ────────────────────────────────────────────────────
# Call this once in post_tasks. It captures the current play's context.
#
# ── Multi-play (monolithic) playbooks ────────────────────────────────────────
# Call audit_accumulate.yml in EACH play's post_tasks to park per-play
# metadata into a cross-play buffer. Then call this task ONLY in the final
# play's post_tasks to write one consolidated audit log entry covering all
# plays in the run.
#
# This task detects the buffer automatically — no configuration required.
#
# Usage:
#   post_tasks:
#     - name: Write audit log
#       ansible.builtin.include_role:
#         name: common
#         tasks_from: audit_logging.yml
#       apply:
#         tags: always
#       tags: always
#
# Configure logging backends via the `audit_loggers` list variable:
#   audit_loggers:
#     - file
#     - syslog
#     - elasticsearch
#     - fluentd
#     - splunk
#     - cloudwatch
#     - rsyslog

- name: Ansible Audit Logging
  block:

    #### Gather Audit Metadata ####

    - name: Get ansible-playbook CLI arguments
      get_cli_args:
      register: cli_args
      changed_when: false
      # Custom action plugin - see action_plugins/get_cli_args/get_cli_args.py
      # Returns: ansible_playbook_argv, ansible_playbook_cmd, semaphore_vars, git_status

    - name: Get local username
      ansible.builtin.command: /usr/bin/whoami
      register: local_user
      changed_when: false

    - name: Get control node hostname
      ansible.builtin.command: hostname
      register: control_node_hostname
      changed_when: false

    #### Resolve multi-play buffer (if present) ####

    # When audit_accumulate.yml has been called per play, __audit_buffer__
    # holds the accumulated history. Fall back to the current play's context
    # for single-play playbooks so this task works in both modes.
    - name: Resolve accumulated play buffer
      ansible.builtin.set_fact:
        _audit_buffer:     "{{ hostvars['__audit_buffer__'] | default({}) }}"
        _current_play_entry:
          play_name: "{{ ansible_play_name | default('unnamed') }}"
          hosts:     "{{ ansible_play_hosts | default([]) }}"
          roles:     "{{ ansible_play_role_names | default([]) }}"

    - name: Build consolidated plays list
      ansible.builtin.set_fact:
        # Multi-play mode: use buffer + append final play.
        # Single-play mode: buffer is empty, just wrap current play.
        _audit_plays: >-
          {{
            ((_audit_buffer.audit_plays | default([])) + [_current_play_entry])
            if (_audit_buffer.audit_plays | default([]) | length > 0)
            else [_current_play_entry]
          }}

    - name: Build consolidated roles list
      ansible.builtin.set_fact:
        _audit_roles_all: >-
          {{
            ((_audit_buffer.audit_roles_all | default([]))
            | union(ansible_play_role_names | default([])))
            | unique | sort
          }}

    - name: Build consolidated hosts list
      ansible.builtin.set_fact:
        _audit_hosts_all: >-
          {{
            _audit_plays
            | map(attribute='hosts')
            | flatten
            | unique
            | sort
            | list
          }}

    #### Build Structured Audit Log ####

    - name: Build JSON audit log payload
      ansible.builtin.set_fact:
        audit_log_json: "{{ audit_log_data | to_json }}"
        audit_log_data: "{{ audit_log_data }}"
      vars:
        audit_log_data:
          # Auto-selects source: uses ansible_date_time when facts are gathered,
          # falls back to a shell lookup when gather_facts: false.
          # To pin one method, comment out the auto line and uncomment the explicit one.
          timestamp:           "{{ ansible_date_time.iso8601 if ansible_date_time is defined else lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
          # gather_facts: true  (explicit): "{{ ansible_date_time.iso8601 }}"
          # gather_facts: false (explicit): "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
          user:                "{{ local_user.stdout }}"
          control_node:        "{{ control_node_hostname.stdout }}"
          # playbook: name of the first play (or the single play for single-play runs)
          playbook:            "{{ _audit_plays[0].play_name | default('unnamed') }}"
          # plays: full per-play breakdown — name, hosts, roles for each play
          plays:               "{{ _audit_plays }}"
          play_count:          "{{ _audit_plays | length }}"
          # roles: deduplicated union of all roles across all plays
          roles:               "{{ _audit_roles_all | join(', ') }}"
          # hosts: deduplicated union of all target hosts across all plays
          hosts:               "{{ _audit_hosts_all }}"
          status:              "{{ audit_status | default('success') }}"
          ansible_command:     "{{ cli_args.ansible_playbook_cmd | default('unknown') }}"
          semaphore_vars:      "{{ cli_args.semaphore_vars | default(omit) }}"
          run_tags:            "{{ ansible_run_tags | default('all') }}"
          skip_tags:           "{{ ansible_skip_tags | default([]) | join(', ') }}"
          git_branch:          "{{ cli_args.git_status.branch | default('unknown') }}"
          git_commit:          "{{ cli_args.git_status.commit | default('unknown') }}"
          git_tag:             "{{ cli_args.git_status.tag | default('unknown') }}"
          git_is_clean:        "{{ cli_args.git_status.is_clean | default(true) }}"
          git_modified_files:  "{{ cli_args.git_status.modified | default([]) }}"
          git_staged_files:    "{{ cli_args.git_status.staged | default([]) }}"
          git_untracked_files: "{{ cli_args.git_status.untracked | default([]) }}"

    #### Logger Backend Selection ####

    - name: Send to CloudWatch Logs
      ansible.builtin.include_tasks: loggers/cloudwatch.yml
      when: audit_loggers is defined and 'cloudwatch' in audit_loggers

    - name: Send to Syslog
      ansible.builtin.include_tasks: loggers/syslog.yml
      when: audit_loggers is defined and 'syslog' in audit_loggers

    - name: Send to Fluentd
      ansible.builtin.include_tasks: loggers/fluentd.yml
      when: audit_loggers is defined and 'fluentd' in audit_loggers

    - name: Send to Elasticsearch
      ansible.builtin.include_tasks: loggers/elasticsearch.yml
      when: audit_loggers is defined and 'elasticsearch' in audit_loggers

    - name: Send to Splunk
      ansible.builtin.include_tasks: loggers/splunk.yml
      when: audit_loggers is defined and 'splunk' in audit_loggers

    - name: Send to Local File
      ansible.builtin.include_tasks: loggers/file.yml
      when: audit_loggers is defined and 'file' in audit_loggers

    - name: Send to rsyslog
      ansible.builtin.include_tasks: loggers/rsyslog.yml
      when: audit_loggers is defined and 'rsyslog' in audit_loggers

  delegate_to: localhost
  become: false
  run_once: true
  # no_log: true  # Uncomment if playbook handles sensitive data
