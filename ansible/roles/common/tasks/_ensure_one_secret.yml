---
# Per-entry helper for ensure_secrets.yml. Receives the entry as
# `_msec` via include_tasks loop_control. Sets fact vars[_msec.var]
# (or vars[_msec.name] if `var` is omitted) on success.
#
# Phases:
#   0. derive helpers, reset per-iteration scratch state
#   1. read existing secret from HashiCorp Vault (if not in scope)
#   2. capture Vault read result
#   3. generate passphrase (only if neither scope nor Vault had it)
#   4. write generated passphrase to Vault (merged with other fields)
#   5. bind final value to vars[_msec_var]

# ── Phase 0 ────────────────────────────────────────────────────────
# Derive helpers + reset every fact this loop iteration writes to,
# so values from prior iterations can't leak into the bind step.
- name: Init iteration state
  ansible.builtin.set_fact:
    _msec_var:    "{{ _msec.var | default(_msec.name) }}"
    _msec_field:  "{{ _msec.vault_field | default(_msec.name) }}"
    _msec_mount:  "{{ _msec.vault_mount | default('kv') }}"
    _msec_in_scope: "{{ (vars[_msec.var | default(_msec.name)] | default('') | length) > 0 }}"
    _msec_vault_value: ''
    _msec_vault_existing_data: {}
    _msec_vault_existing_version: 0
    passphrase: ''
  no_log: true

# ── Phase 1 ────────────────────────────────────────────────────────
- name: "[{{ _msec.name }}] read from HashiCorp Vault"
  community.hashi_vault.vault_kv2_get:
    path: "{{ _msec.vault_path }}"
    engine_mount_point: "{{ _msec_mount }}"
  register: _msec_vault_get
  failed_when: false
  no_log: true
  when: not _msec_in_scope
  delegate_to: localhost
  become: false

# ── Phase 2 ────────────────────────────────────────────────────────
# If the read succeeded AND returned data, capture the value of our
# field plus the existing data + version (used to merge on write).
- name: "[{{ _msec.name }}] capture Vault read result"
  ansible.builtin.set_fact:
    _msec_vault_value: "{{ _msec_vault_get.data.data[_msec_field] | default('') }}"
    _msec_vault_existing_data: "{{ _msec_vault_get.data.data | default({}) }}"
    _msec_vault_existing_version: "{{ _msec_vault_get.data.metadata.version | default(0) }}"
  no_log: true
  when:
    - not _msec_in_scope
    - _msec_vault_get is succeeded
    - _msec_vault_get.data is defined

# ── Phase 3 ────────────────────────────────────────────────────────
- name: "[{{ _msec.name }}] generate fresh passphrase"
  ansible.builtin.include_tasks: generate_passphrase.yml
  when:
    - not _msec_in_scope
    - (_msec_vault_value | length) == 0

# ── Phase 4 ────────────────────────────────────────────────────────
# Read-merge-write so adding one new field doesn't blow away other
# fields at the same path. cas pins us to the version we just read,
# so a concurrent writer would surface as a CAS error rather than a
# silent lost update.
- name: "[{{ _msec.name }}] write generated passphrase to HashiCorp Vault"
  community.hashi_vault.vault_kv2_write:
    path: "{{ _msec.vault_path }}"
    engine_mount_point: "{{ _msec_mount }}"
    cas: "{{ _msec_vault_existing_version | int }}"
    data: "{{ _msec_vault_existing_data | combine({_msec_field: passphrase}) }}"
  no_log: true
  when:
    - not _msec_in_scope
    - (_msec_vault_value | length) == 0
  delegate_to: localhost
  become: false

# ── Phase 5 ────────────────────────────────────────────────────────
# Compute the resolved value into a single scalar first, then assign
# it to the dynamic fact name. Splitting the steps keeps set_fact's
# dynamic-key behaviour predictable across Ansible versions.
- name: "[{{ _msec.name }}] resolve final value"
  ansible.builtin.set_fact:
    _msec_resolved: >-
      {{ vars[_msec_var]
         if _msec_in_scope
         else (_msec_vault_value
               if (_msec_vault_value | length) > 0
               else passphrase) }}
  no_log: true

- name: "[{{ _msec.name }}] expose value as '{{ _msec_var }}'"
  ansible.builtin.set_fact:
    "{{ _msec_var }}": "{{ _msec_resolved }}"
  no_log: true

- name: "[{{ _msec.name }}] origin"
  ansible.builtin.debug:
    msg: >-
      {{ _msec.name }} →
      {{ 'scope' if _msec_in_scope
         else ('vault' if (_msec_vault_value | length) > 0
               else 'generated') }}
