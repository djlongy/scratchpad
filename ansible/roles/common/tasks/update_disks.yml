    - name: Extend lv_opt to use all free space in vg_data
      command: lvextend -l +100%FREE /dev/vg_data/lv_opt
      register: lv_opt_extend_result
      changed_when: "'Size of logical volume' in (lv_opt_extend_result.stdout | default(''))"
      failed_when: lv_opt_extend_result.rc not in [0, 5]
      when: data_pvresize_result.changed | default(false)

    - name: Grow XFS filesystem on /opt
      command: xfs_growfs /opt
      register: opt_xfs_result
      changed_when: "'data blocks changed' in (opt_xfs_result.stdout | default(''))"
      when: (lv_opt_extend_result.rc | default(-1)) == 0

    - name: Check the size has updated
      command: df -Th
      register: df_result
      changed_when: false

    - name: Display the result of df
      debug:
        var: df_result.stdout_lines
