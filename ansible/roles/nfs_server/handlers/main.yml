---
- name: Reload nfs exports
  ansible.builtin.command: exportfs -ra
  changed_when: true
  listen: Reload nfs exports
  when: nfs_server_manage_service | bool

- name: Restart nfs idmapd
  ansible.builtin.service:
    name: nfs-idmapd
    state: restarted
  when: nfs_server_manage_service | bool
