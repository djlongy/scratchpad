---
# roles/nfs_server/tasks/export_kerberos.yml — Kerberized exports (sec=krb5p).
# The host must be FreeIPA-enrolled (host keytab + nfs/<fqdn> principal); run the
# freeipa_client role before this. Mutually exclusive with export_sys.yml.
- name: Set the NFSv4 idmapd domain (must match clients)
  community.general.ini_file:
    path: /etc/idmapd.conf
    section: General
    option: Domain
    value: "{{ nfs_server_idmapd_domain }}"
    mode: "0644"
    no_extra_spaces: false
  notify: Restart nfs idmapd

- name: Write Kerberized (sec=krb5p) exports
  ansible.builtin.template:
    src: exports_krb5.j2
    dest: /etc/exports.d/nfs_server.exports
    owner: root
    group: root
    mode: "0644"
  notify: Reload NFS exports
