---
# roles/nfs_server/tasks/install.yml — universal NFS plumbing (both security modes).
- name: Install NFS server package
  ansible.builtin.package:
    name: "{{ 'nfs-utils' if ansible_os_family == 'RedHat' else 'nfs-kernel-server' }}"
    state: present

- name: Force NFSv4-only (disable v3 → firewall surface is just tcp/2049)
  community.general.ini_file:
    path: /etc/nfs.conf
    section: nfsd
    option: "{{ item.opt }}"
    value: "{{ item.val }}"
    mode: "0644"
    no_extra_spaces: false
  loop:
    - {opt: vers3, val: "n"}
    - {opt: vers4, val: "y"}
  loop_control:
    label: "{{ item.opt }}={{ item.val }}"
  notify: Reload NFS exports

- name: Allow NFS exports under SELinux
  ansible.posix.seboolean:
    name: "{{ item }}"
    state: true
    persistent: true
  loop:
    - nfs_export_all_rw
    - nfs_export_all_ro
  when:
    - nfs_server_manage_selinux | bool
    - ansible_selinux.status | default('disabled') == 'enabled'

- name: Open the NFS firewall port (NFSv4, tcp/2049)
  ansible.posix.firewalld:
    service: nfs
    permanent: true
    immediate: true
    state: enabled
  when:
    - nfs_server_manage_firewall | bool
    - ansible_os_family == 'RedHat'

- name: Enable and start the NFS server
  ansible.builtin.service:
    name: "{{ 'nfs-server' if ansible_os_family == 'RedHat' else 'nfs-kernel-server' }}"
    enabled: true
    state: started
  when: nfs_server_manage_service | bool
