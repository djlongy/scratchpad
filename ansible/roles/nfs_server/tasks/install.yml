---
# roles/nfs_server/tasks/install.yml — packages, service, protocol, idmapd, SELinux.
- name: Install NFS server packages
  ansible.builtin.package:
    name: "{{ nfs_server_effective_packages }}"
    state: present

- name: Configure NFSv4-only (disable v3) when requested
  community.general.ini_file:
    path: /etc/nfs.conf
    section: nfsd
    option: "{{ item.opt }}"
    value: "{{ item.val }}"
    mode: "0644"
    no_extra_spaces: false
  loop:
    - {opt: vers3, val: "n"}
    - {opt: vers4, val: "y"}
  loop_control:
    label: "{{ item.opt }}={{ item.val }}"
  when: nfs_server_v4_only | bool
  notify: Reload nfs exports

- name: Set the NFSv4 idmapd domain (Kerberos; must match clients)
  community.general.ini_file:
    path: /etc/idmapd.conf
    section: General
    option: Domain
    value: "{{ nfs_server_idmapd_domain }}"
    mode: "0644"
    no_extra_spaces: false
  when: nfs_server_kerberos | bool
  notify: Restart nfs idmapd

- name: Allow NFS exports under SELinux
  ansible.posix.seboolean:
    name: "{{ item }}"
    state: true
    persistent: true
  loop:
    - nfs_export_all_rw
    - nfs_export_all_ro
  when:
    - nfs_server_manage_selinux | bool
    - ansible_selinux.status | default('disabled') == 'enabled'

- name: Enable and start nfs-server
  ansible.builtin.systemd:
    name: nfs-server
    state: started
    enabled: true
    daemon_reload: true
  when: nfs_server_manage_service | bool
