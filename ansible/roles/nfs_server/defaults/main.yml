---
# roles/nfs_server/defaults/main.yml
#
# One NFS server role for a dual-purpose storage host: generic exports (e.g.
# docker_swarm app data) AND per-user/shared user storage. Every export source is
# a list, so config scales out from inventory. Backward compatible with the
# generic export list — new features default off.

# ── Master switch ─────────────────────────────────────────────────────────────
nfs_server_enabled: true

# ── Storage location ──────────────────────────────────────────────────────────
nfs_server_export_base: /srv/nfs              # canonical export root (what clients reference)
nfs_server_bind_mount_enabled: false          # bind-mount storage_path → export_base (storage on a data disk)
nfs_server_storage_path: /opt/nfs             # real storage path (used when bind_mount_enabled)

# ── Security / protocol ───────────────────────────────────────────────────────
# allowed_cidr is the sec=sys client ACL: it scopes the generic exports and, in
# non-Kerberos mode, the per-user/shared exports too. Required whenever any sec=sys
# export exists; leave empty only for a pure-krb5p server.
nfs_server_allowed_cidr: ""
# Kerberos toggle for the per-user/shared exports: true → sec=krb5p (client '*',
# per-user Kerberos identity, NFSv4); false → sec=sys (scoped by allowed_cidr).
# Generic nfs_server_exports always use their own options string (unaffected).
nfs_server_kerberos: false
nfs_server_realm_domain: ""                   # NFSv4 idmapd Domain (krb5p); default: global `domain`
# This host's FQDN, used to name the nfs/<fqdn> Kerberos service principal.
nfs_server_fqdn: "{{ inventory_hostname }}.{{ domain | default(ansible_domain | default(''), true) }}"
# IPA admin credential to create the nfs/<fqdn> service principal (krb5p only).
# Declared-var-first: set nfs_server_ipa_admin_password (e.g. ansible-vault) for a
# HashiCorp-free deploy; else nfs_server_vault_secret is the HashiCorp fallback.
nfs_server_ipa_admin_principal: admin
nfs_server_ipa_admin_password: ""             # declared/ansible-vault admin password (wins)
nfs_server_ipa_admin_password_field: admin_password
# nfs_server_vault_secret: "kv/data/platform/freeipa/runtime"   # HashiCorp fallback
# NFSv4-only: disable v3/rpcbind and trim the firewall to just nfs (tcp/2049).
# Default false preserves the v3-capable behaviour existing exports rely on.
nfs_server_v4_only: false

# ── Export sources (compose freely; all default empty) ────────────────────────
# 1. Generic exports — arbitrary path + full options string (docker_swarm data,
#    app volumes, …). Rendered as: <path> <allowed_cidr>(<options>)
#      - {path: /srv/nfs/app-data, options: "rw,sync,no_subtree_check,no_root_squash"}
nfs_server_exports: []
# 2. Per-user private storage → <base>/users/<name> (0700, owned <name>:<name>)
#      - {name: alice}
nfs_server_users: []
# 3. Shared/group storage → <base>/share/<name> (setgid, owned root:<group>)
#      - {name: ops, group: ops-admins, mode: "2770"}
nfs_server_shares: []

# ── Defaults applied to generated (user/share) export dirs + lines ────────────
nfs_server_export_dir_mode: "0755"            # generic export dir default mode
nfs_server_export_options_default: "rw,sync,no_subtree_check"   # user/share export options (sec appended)

# ── Packages / firewall / SELinux / service ───────────────────────────────────
nfs_server_packages: [nfs-utils, rpcbind]     # rpcbind auto-dropped when v4_only
nfs_server_firewalld_services: [nfs, rpc-bind, mountd]   # trimmed to [nfs] when v4_only
nfs_server_manage_firewall: true
nfs_server_manage_selinux: true
nfs_server_manage_service: true               # enable/start nfs-server + run exportfs (disable in CI)
