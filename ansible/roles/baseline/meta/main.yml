---
galaxy_info:
  role_name: baseline
  author: user
  description: >-
    Distro-agnostic SOE Linux baseline, ordered for speed and idempotence:
    identity, storage (via the storage role), CA trust, outbound proxy (Squid
    client), repos (RHSM/EPEL/CRB + Artifactory/internal mirrors), crypto policy
    & FIPS, package baseline (required/optional/version-locked + on-demand
    troubleshooting tools + enforced-absent), OS tuning sysctls, SSH server
    engine (keepalive/forwarding/bastion), network, firewall, bastion conduit
    (SSH jump + Prometheus scrape-through routing), chrony, SELinux state +
    fcontexts, fapolicyd, CIS hardening (OpenSCAP/SSG + upstream role hook +
    custom org controls + patch files), login banner, logging & auditd,
    breakglass local-admin, and optional observability/security agents
    (node_exporter, velociraptor, splunk_forwarder, stroom_agent, clamav) each
    gated by an enable_* toggle. Distro-aware (AlmaLinux / RHEL / Ubuntu).
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: [all]
    - name: Ubuntu
      versions: [all]
  galaxy_tags:
    - baseline
    - hardening
    - system
dependencies: []
