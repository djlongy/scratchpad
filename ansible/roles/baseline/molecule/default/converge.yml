---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    base_task_name: "Configure OS"
    dnf_packages:
      - htop
      - nano
      - git
      - wget
      - vim
      - ncdu
      - rsync
      - bind-utils
    pip_packages:
      - requests

  tasks:
    # --- Hostname and timezone (container-safe: no systemd D-Bus) ---
    - name: Set hostname in /etc/hostname
      ansible.builtin.copy:
        content: "{{ inventory_hostname }}\n"
        dest: /etc/hostname
        mode: "0644"

    - name: Set timezone via symlink
      ansible.builtin.file:
        src: /usr/share/zoneinfo/Australia/Sydney
        dest: /etc/localtime
        state: link
        force: true

    # --- OS-specific package installation (from redhat.yml) ---
    - name: Install EPEL repository
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: Install DNF packages
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: present
      loop: "{{ dnf_packages }}"

    - name: Ensure Python3 and pip3 are installed
      ansible.builtin.package:
        name: python3-pip
        state: present

    - name: Install pip packages
      ansible.builtin.pip:
        name: "{{ item }}"
        executable: pip3
      loop: "{{ pip_packages }}"

    - name: Set vm.max_map_count to 262144 (skip in containers)
      ansible.builtin.sysctl:
        name: vm.max_map_count
        value: 262144
        state: present
        reload: true
      become: true
      ignore_errors: true

    # --- Breakglass user (mock password, no Vault) ---
    - name: Ensure breakglass local admin account exists
      ansible.builtin.user:
        name: breakglass
        comment: "Breakglass emergency local admin"
        groups: wheel
        append: true
        shell: /bin/bash
        create_home: true
        password: "{{ 'molecule-test-password' | password_hash('sha512', 'fixedsalt') }}"
        password_lock: false

    - name: Ensure breakglass sudoers file is present
      ansible.builtin.copy:
        content: "breakglass ALL=(ALL) NOPASSWD: ALL\n"
        dest: /etc/sudoers.d/breakglass
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s
