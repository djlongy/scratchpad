---
# roles/baseline/tasks/cis_custom.yml
# Pragmatic, distro-agnostic subset of CIS Level-1 controls PLUS this repo's
# organisation-specific controls. NOT a certifiable benchmark — for that, enable
# the upstream role via baseline_cis_upstream_enabled. Every control is
# overridable. DELIBERATELY NO FIPS here (FIPS lives in crypto.yml).

# ── Kernel network hardening (CIS 3.x) ───────────────────────────────────────
- name: CIS custom | Apply network sysctl hardening
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/60-cis-hardening.conf
    state: present
    reload: true
  loop: "{{ baseline_cis_sysctl }}"
  loop_control:
    label: "{{ item.name }}"

# ── Restrict core dumps (CIS 1.5) ────────────────────────────────────────────
- name: CIS custom | Disable core dumps via limits
  ansible.builtin.copy:
    content: "* hard core 0\n"
    dest: /etc/security/limits.d/60-cis-coredump.conf
    owner: root
    group: root
    mode: "0644"

- name: CIS custom | Disable setuid core dumps
  ansible.posix.sysctl:
    name: fs.suid_dumpable
    value: "0"
    sysctl_file: /etc/sysctl.d/60-cis-hardening.conf
    state: present
    reload: true

# ── Disable unused/insecure kernel modules (CIS 1.1.1) + org usb-storage ─────
- name: CIS custom | Compute the effective module blacklist
  ansible.builtin.set_fact:
    _baseline_cis_modules: >-
      {{ (baseline_cis_blacklist_modules
          + (['usb-storage'] if (baseline_cis_disable_usb_storage | bool) else []))
         | unique }}

- name: CIS custom | Blacklist unused/insecure kernel modules
  ansible.builtin.copy:
    content: |
      {% for mod in _baseline_cis_modules %}
      install {{ mod }} /bin/false
      blacklist {{ mod }}
      {% endfor %}
    dest: /etc/modprobe.d/60-cis-blacklist.conf
    owner: root
    group: root
    mode: "0644"

# ── Password quality (CIS 5.4) ───────────────────────────────────────────────
- name: CIS custom | Ensure pam_pwquality is installed
  ansible.builtin.package:
    name: "{{ 'libpam-pwquality' if ansible_os_family == 'Debian' else 'libpwquality' }}"
    state: present

- name: CIS custom | Enforce password quality requirements
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^#?\\s*{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
    state: present
    create: true
    owner: root
    group: root
    mode: "0644"
  loop: "{{ baseline_cis_pwquality }}"
  loop_control:
    label: "{{ item.key }}"

# ── Password aging (CIS 5.5) ─────────────────────────────────────────────────
- name: CIS custom | Set password aging policy in login.defs
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "^#?\\s*{{ item.key }}\\b"
    line: "{{ item.key }}\t{{ item.value }}"
    state: present
  loop: "{{ baseline_cis_login_defs }}"
  loop_control:
    label: "{{ item.key }}"

# ── World-writable files (CIS 6.1.x) — opt-in remediation ────────────────────
# Excludes paths that legitimately hold world-writable (perm 0002) entries —
# notably /var/lib/docker (container overlay storage).
- name: CIS custom | Build the world-writable exclude expression
  ansible.builtin.set_fact:
    _baseline_ww_excl: >-
      {{ baseline_cis_world_writable_excludes
         | map('regex_replace', '^(.*)$', "-not -path '\\1/*' -not -path '\\1'")
         | join(' ') }}
  when: baseline_cis_fix_world_writable | bool

- name: CIS custom | Find world-writable files
  ansible.builtin.shell: >-
    set -o pipefail;
    find / -xdev -type f -perm -0002 ! -perm -1000 {{ _baseline_ww_excl }} -print 2>/dev/null || true
  register: _baseline_world_writable
  changed_when: false
  when: baseline_cis_fix_world_writable | bool

- name: CIS custom | Report world-writable files
  ansible.builtin.debug:
    msg: "World-writable files found: {{ _baseline_world_writable.stdout_lines | default([]) }}"
  when:
    - baseline_cis_fix_world_writable | bool
    - (_baseline_world_writable.stdout_lines | default([])) | length > 0

- name: CIS custom | Remove the world-writable bit
  ansible.builtin.file:
    path: "{{ item }}"
    mode: o-w
  loop: "{{ _baseline_world_writable.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when:
    - baseline_cis_fix_world_writable | bool
    - (_baseline_world_writable.stdout_lines | default([])) | length > 0
