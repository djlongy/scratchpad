---
# roles/baseline/tasks/main.yml
# Distro-agnostic SOE Linux baseline. Phases run in a deliberate dependency
# order so the playbook is fast and idempotent:
#
#   identity (hostname/tz)
#     -> storage (disks/mounts)
#       -> CA trust            (trust corp PKI before talking to mirrors)
#         -> repos             (RHSM/EPEL/CRB + internal mirrors)
#           -> crypto/FIPS     (uses tooling from the repos above)
#             -> packages      (update -> required/optional -> versionlock)
#               -> OS tuning   (sysctls: map_count, keepalive, ipv6)
#                 -> distro specifics (users/sudo/keys, fail2ban, pip)
#                   -> ssh -> network -> firewall -> chrony
#                     -> selinux -> fapolicyd -> CIS -> logging
#                       -> breakglass -> agents -> backup
#
# Each phase is import_tasks (compile-time, so --tags propagate into the
# included tasks). No-tags runs everything; tags only *narrow* the run.

# ── Identity ────────────────────────────────────────────────────────────────
# Owned by this role (tasks/hostname.yml), not borrowed from `common` — baseline
# stays self-contained and portable, and import_tasks keeps --tags propagating.
- name: Set hostname and timezone
  ansible.builtin.import_tasks: hostname.yml
  tags: [baseline, hostname]

# NOTE: baseline does NOT create or chmod /opt. Disks and mountpoints belong to
# the `storage` role, which runs as its own playbook-level role BEFORE this one
# and already creates each mountpoint with that volume's own owner/group/mode.
# A baseline task forcing /opt to root:root would fight a volume that declares a
# different owner, and on a host where /opt is NOT a volume it is a no-op — the
# distro's filesystem package already ships /opt as 0755 root:root.

# ── Authorized keys (EARLY — before any hardening can restrict key algorithms) ─
# Guarantees a FIPS-approved automation key is authorised before crypto/FIPS and
# CIS/OpenSCAP land, so hardening can't lock automation out.
- name: Ensure automation/operator SSH keys are authorised
  ansible.builtin.include_tasks:
    file: authorized_keys.yml
    apply:
      tags: [baseline, authorized_keys, ssh]
  when: baseline_authorized_keys | length > 0
  tags: [baseline, authorized_keys, ssh]

# ── CA trust (before repos: internal mirrors are often corp-CA-signed) ───────
- name: Install trusted CA certificates
  ansible.builtin.include_tasks:
    file: ca_trust.yml
    apply:
      tags: [baseline, ca_trust]
  when: (baseline_trusted_cas | length > 0) or (baseline_trusted_ca_urls | length > 0)
  tags: [baseline, ca_trust]

# ── Outbound proxy (Squid client) — before repos so package ops can reach it ─
- name: Configure the outbound HTTP(S) proxy
  ansible.builtin.include_tasks:
    file: proxy.yml
    apply:
      tags: [baseline, proxy]
  when: baseline_proxy_url | length > 0
  tags: [baseline, proxy]

# ── Repositories (RHSM / EPEL / CRB + custom mirrors, air-gap disables) ──────
- name: Configure package repositories
  ansible.builtin.include_tasks:
    file: repos.yml
    apply:
      tags: [baseline, repos]
  when: ansible_os_family in ['RedHat', 'Debian']
  tags: [baseline, repos]

# NOTE: crypto policy & FIPS runs LATE (after CIS) — see below. OpenSCAP/CIS
# rewrites the crypto-policy, and FIPS initramfs must regenerate after the kernel
# upgrade, so crypto has to be the LAST word.

# ── Package baseline (update -> required/optional -> versionlock -> tools) ────
- name: Install the package baseline
  ansible.builtin.include_tasks:
    file: packages.yml
    apply:
      tags: [baseline, packages]
  tags: [baseline, packages]

# ── OS tuning (sysctls) ──────────────────────────────────────────────────────
- name: Apply OS tuning sysctls
  ansible.builtin.include_tasks:
    file: os_tuning.yml
    apply:
      tags: [baseline, tuning, sysctl, ipv6]
  tags: [baseline, tuning, sysctl, ipv6]

# ── Distro specifics (users/sudo/keys, fail2ban, pip mirror) ─────────────────
- name: "{{ base_task_name }}"
  ansible.builtin.include_tasks:
    file: "{{ ansible_distribution | lower }}.yml"
    apply:
      tags: [baseline, users, sudo, ssh_keys]
  when: ansible_distribution in ['Ubuntu', 'RedHat', 'AlmaLinux']
  tags: [baseline, users, sudo, ssh_keys]

# ── SSH server engine ────────────────────────────────────────────────────────
- name: Configure the SSH server
  ansible.builtin.include_tasks:
    file: ssh.yml
    apply:
      tags: [baseline, ssh]
  when: baseline_ssh_manage | bool
  tags: [baseline, ssh]

# ── pip index + packages (internal PyPI mirror) ──────────────────────────────
- name: Configure pip index and packages
  ansible.builtin.include_tasks:
    file: pip.yml
    apply:
      tags: [baseline, pip]
  when: (baseline_pip_index_url | default('') | length > 0) or (baseline_pip_packages | length > 0)
  tags: [baseline, pip]

# ── Network (IP/DNS via NetworkManager; opt-in) ──────────────────────────────
- name: Configure network (IP/DNS, dynamic interface)
  ansible.builtin.include_tasks:
    file: network.yml
    apply:
      tags: [baseline, network]
  when: baseline_network_manage | bool
  tags: [baseline, network]

# ── Firewall (firewalld zones/services; opt-in) ──────────────────────────────
- name: Configure firewall zones/services
  ansible.builtin.include_tasks:
    file: firewall.yml
    apply:
      tags: [baseline, firewall]
  when: baseline_firewall_manage | bool
  tags: [baseline, firewall]

# ── Bastion conduit (router for SSH jump + monitoring; opt-in per group) ─────
- name: Configure bastion routing and monitoring conduit
  ansible.builtin.include_tasks:
    file: bastion.yml
    apply:
      tags: [baseline, bastion]
  when: baseline_bastion_enabled | bool
  tags: [baseline, bastion]

# ── Time sync (chrony) ───────────────────────────────────────────────────────
- name: Configure chrony time sync
  ansible.builtin.include_tasks:
    file: chrony.yml
    apply:
      tags: [baseline, chrony, ntp]
  when: baseline_ntp_manage | bool
  tags: [baseline, chrony, ntp]

# ── SELinux (EL; opt-in by setting a state) ──────────────────────────────────
- name: Manage SELinux state and file contexts (EL)
  ansible.builtin.include_tasks:
    file: selinux.yml
    apply:
      tags: [baseline, selinux]
  when:
    - ansible_os_family == "RedHat"
    - (baseline_selinux_state | default('') | length > 0) or (baseline_selinux_fcontexts | length > 0)
  tags: [baseline, selinux]

# ── fapolicyd (EL; opt-in) ───────────────────────────────────────────────────
- name: Configure fapolicyd (EL)
  ansible.builtin.include_tasks:
    file: fapolicyd.yml
    apply:
      tags: [baseline, fapolicyd]
  when:
    - baseline_fapolicyd_enabled | bool
    - ansible_os_family == "RedHat"
  tags: [baseline, fapolicyd]

# ── CIS hardening (upstream role hook + custom org controls) ─────────────────
- name: Apply CIS hardening
  ansible.builtin.include_tasks:
    file: cis.yml
    apply:
      tags: [baseline, cis, hardening]
  when: (baseline_cis_upstream_enabled | bool) or (baseline_cis_custom_enabled | bool)
  tags: [baseline, cis, hardening]

# ── Crypto policy & FIPS (EL) — LAST hardening word, reconciles over OpenSCAP ─
# Deliberately AFTER CIS: OpenSCAP/CIS rewrites the system crypto-policy, so FIPS
# must run last to win. crypto.yml is idempotent (checks state before acting).
# Tagged with cis + hardening as well as crypto/fips, so ANY hardening-scoped run
# (--tags cis | fips | crypto | hardening, or a full run) re-asserts the policy
# and can't leave the host in a half-FIPS state.
- name: Configure crypto policy and FIPS mode
  ansible.builtin.include_tasks:
    file: crypto.yml
    apply:
      tags: [baseline, crypto, fips, cis, hardening]
  when:
    - ansible_os_family == "RedHat"
    - fips_enabled | bool or (baseline_crypto_policy | length > 0)
  tags: [baseline, crypto, fips, cis, hardening]

# ── Login banner (all hosts) ─────────────────────────────────────────────────
- name: Configure login banner
  ansible.builtin.include_tasks:
    file: banner.yml
    apply:
      tags: [baseline, banner]
  when: baseline_banner_enabled | bool
  tags: [baseline, banner]

# ── Logging baseline (journald / logrotate / auditd) ─────────────────────────
- name: Apply logging baseline
  ansible.builtin.include_tasks:
    file: logging.yml
    apply:
      tags: [baseline, logging]
  tags: [baseline, logging]

# ── Breakglass emergency local-admin (opt-in) ────────────────────────────────
- name: Configure breakglass admin account
  ansible.builtin.include_tasks:
    file: breakglass.yml
    apply:
      tags: [baseline, breakglass]
  when: (baseline_breakglass_password | length > 0) or (baseline_breakglass_vault_secret | length > 0)
  tags: [baseline, breakglass]

# ── Observability / security agents (separate roles, gated by enable_*) ──────
- name: Manage observability and security agents
  ansible.builtin.include_tasks:
    file: agents.yml
    apply:
      tags: [baseline, agents]
  tags: [baseline, agents]

# ── Backup capability ────────────────────────────────────────────────────────
- name: Configure borg backup capabilities
  ansible.builtin.include_tasks:
    file: borg_backup.yml
    apply:
      tags: [baseline, backup]
  tags: [baseline, backup]

# ── Explicit reboot (opt-in only) ────────────────────────────────────────────
- name: Reboot system
  become: true  # root: reboots the host
  ansible.builtin.reboot:
    msg: "Rebooting the system to apply changes."
    reboot_timeout: 300
  # Guard against tag cascade: a co-tag inherited from the caller can defeat
  # `never`, so only reboot when `reboot` was explicitly passed via --tags.
  when: "'reboot' in ansible_run_tags"
  tags: [never, reboot]
