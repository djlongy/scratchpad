---
# roles/baseline/tasks/chrony.yml
# Time sync via chrony. Small enough to live in the baseline. When no servers
# or pools are configured, chrony is still installed and running on the distro
# default config (we never clobber it with an empty source list).

- name: Chrony | Resolve distro paths
  ansible.builtin.set_fact:
    _baseline_chrony_service: "{{ 'chronyd' if ansible_os_family == 'RedHat' else 'chrony' }}"
    _baseline_chrony_conf: "{{ '/etc/chrony.conf' if ansible_os_family == 'RedHat' else '/etc/chrony/chrony.conf' }}"

- name: Chrony | Install chrony
  become: true  # root: package install
  ansible.builtin.package:
    name: chrony
    state: present

- name: Chrony | Deploy the managed chrony.conf
  become: true  # root: writes the system chrony.conf
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ _baseline_chrony_conf }}"
    owner: root
    group: root
    mode: "0644"
  when: (baseline_ntp_servers | length > 0) or (baseline_ntp_pools | length > 0)
  notify: Restart chrony

- name: Chrony | Ensure chrony is enabled and started
  become: true  # root: manages the chrony service
  ansible.builtin.service:
    name: "{{ _baseline_chrony_service }}"
    state: started
    enabled: true
