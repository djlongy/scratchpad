---
# roles/baseline/tasks/banner.yml
# Interactive login banner (all hosts) — tells whoever logs in which environment
# they've landed in (so nobody fat-fingers prod thinking it's dev), the host FQDN,
# and who they're logged in as. The FQDN is baked from inventory (baseline_banner_fqdn);
# $USER still resolves at login. /etc/issue covers the pre-auth console/SSH banner.

- name: Banner | Deploy the interactive login banner
  become: true  # root: writes /etc/profile.d/
  ansible.builtin.template:
    src: login-banner.sh.j2
    dest: /etc/profile.d/00-baseline-banner.sh
    owner: root
    group: root
    mode: "0644"

- name: Banner | Set the pre-auth issue banner
  become: true  # root: writes /etc/issue and /etc/issue.net
  ansible.builtin.template:
    src: issue-banner.j2
    dest: "{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - /etc/issue
    - /etc/issue.net
