---
# roles/baseline/tasks/repos.yml
# All package-repository setup, ordered so it runs BEFORE the package baseline:
#   1. RHSM registration (RHEL, when an activation key is provided)
#   2. EPEL + CodeReady Builder / crb enablement (EL)
#   3. Custom internal mirrors (Artifactory / Nexus) + air-gap stock disables
# Each block is a no-op when its inputs are empty, so this file is safe to run
# on every host.

# ── 1. RHSM registration (RHEL only; AlmaLinux/Rocky skip) ───────────────────
- name: Repos | Register with Red Hat Subscription Management
  become: true  # root: registers the host with RHSM
  community.general.redhat_subscription:
    state: present
    activationkey: "{{ rhsm_activationkey }}"
    org_id: "{{ rhsm_org_id | default(omit) }}"
  register: _baseline_rhsm
  when:
    - ansible_distribution == "RedHat"
    - rhsm_activationkey is defined

- name: Repos | Enable the CodeReady Builder repository (RHEL)
  become: true  # root: enables a subscription-manager repo
  ansible.builtin.command: >-
    subscription-manager repos
    --enable codeready-builder-for-rhel-{{ ansible_distribution_major_version }}-x86_64-rpms
  register: _baseline_crb_rhel
  changed_when: "'enabled for this system' in _baseline_crb_rhel.stdout"
  failed_when: _baseline_crb_rhel.rc != 0
  when:
    - ansible_distribution == "RedHat"
    - rhsm_activationkey is defined
    - baseline_crb_enabled | bool

# ── 2. EPEL + CRB on AlmaLinux/Rocky (no subscription) ───────────────────────
- name: Repos | Check whether crb is already enabled (AlmaLinux/Rocky)
  become: true  # root: dnf reads repo metadata/cache
  ansible.builtin.command: dnf repolist --enabled
  register: _baseline_repolist
  changed_when: false
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution != "RedHat"
    - baseline_crb_enabled | bool

- name: Repos | Enable the crb repository (AlmaLinux/Rocky)
  # config-manager ships in dnf-plugins-core (present on EL9) and is portable
  # across minimal GenericCloud images, unlike the `crb` helper.
  become: true  # root: enables a dnf repository
  ansible.builtin.command: dnf config-manager --set-enabled crb
  register: _baseline_crb_alma
  changed_when: _baseline_crb_alma.rc == 0
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution != "RedHat"
    - baseline_crb_enabled | bool
    - "'crb' not in (_baseline_repolist.stdout | default(''))"

- name: Repos | Import the EPEL GPG key (EL)
  become: true  # root: imports an RPM GPG key
  ansible.builtin.rpm_key:
    key: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
    state: present
  when:
    - ansible_os_family == "RedHat"
    - baseline_epel_enabled | bool

- name: Repos | Install the EPEL release package (EL)
  become: true  # root: package install
  ansible.builtin.dnf:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
    state: present
  when:
    - ansible_os_family == "RedHat"
    - baseline_epel_enabled | bool

# ── 3. Custom internal mirrors (air-gap → Artifactory / Nexus) ───────────────
- name: Repos | Configure DNF repositories (EL)
  become: true  # root: writes /etc/yum.repos.d/
  ansible.builtin.yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description | default(item.name) }}"
    baseurl: "{{ item.baseurl }}"
    enabled: "{{ item.enabled | default(true) }}"
    gpgcheck: "{{ item.gpgcheck | default(true) }}"
    gpgkey: "{{ item.gpgkey | default(omit) }}"
    sslverify: "{{ item.sslverify | default(omit) }}"
    module_hotfixes: "{{ item.module_hotfixes | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ baseline_dnf_repos }}"
  loop_control:
    label: "{{ item.name }}"
  when: ansible_os_family == "RedHat"

- name: Repos | Disable named stock DNF repos (air-gap)
  become: true  # root: disables a dnf repository
  ansible.builtin.command: "dnf config-manager --set-disabled {{ item }}"
  loop: "{{ baseline_dnf_repos_disable }}"
  register: _baseline_repo_disable
  changed_when: "'No matching repo' not in _baseline_repo_disable.stderr"
  when:
    - ansible_os_family == "RedHat"
    - baseline_dnf_repos_disable | length > 0

- name: Repos | Configure APT repositories (Debian)
  become: true  # root: writes APT repo config
  ansible.builtin.apt_repository:
    repo: "{{ item.repo }}"
    filename: "{{ item.filename | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    update_cache: true
  loop: "{{ baseline_apt_repos }}"
  loop_control:
    label: "{{ item.repo }}"
  when: ansible_os_family == "Debian"
