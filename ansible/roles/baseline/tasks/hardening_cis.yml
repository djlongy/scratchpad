---
# roles/baseline/tasks/hardening_cis.yml
# CIS-aligned hardening baseline (opt-in via baseline_cis_hardening). This is a
# pragmatic, distro-agnostic subset of common CIS Level-1 controls — NOT a full,
# certifiable benchmark. For full CIS certification use ansible-lockdown
# (RHEL9-CIS / UBUNTU22-CIS). Every control here is overridable.
#
# DELIBERATELY NO FIPS: this role never runs fips-mode-setup / sets fips=1.

# ── Kernel network hardening (CIS 3.x) ───────────────────────────────────────
- name: CIS | Apply network sysctl hardening
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/60-cis-hardening.conf
    state: present
    reload: true
  loop: "{{ baseline_cis_sysctl }}"
  loop_control:
    label: "{{ item.name }}"

# ── Restrict core dumps (CIS 1.5) ────────────────────────────────────────────
- name: CIS | Disable core dumps via limits
  ansible.builtin.copy:
    content: "* hard core 0\n"
    dest: /etc/security/limits.d/60-cis-coredump.conf
    owner: root
    group: root
    mode: "0644"

- name: CIS | Disable setuid core dumps
  ansible.posix.sysctl:
    name: fs.suid_dumpable
    value: "0"
    sysctl_file: /etc/sysctl.d/60-cis-hardening.conf
    state: present
    reload: true

# ── Disable unused/insecure kernel modules (CIS 1.1.1) ───────────────────────
- name: CIS | Blacklist unused filesystem/protocol modules
  ansible.builtin.copy:
    content: |
      {% for mod in baseline_cis_blacklist_modules %}
      install {{ mod }} /bin/false
      blacklist {{ mod }}
      {% endfor %}
    dest: /etc/modprobe.d/60-cis-blacklist.conf
    owner: root
    group: root
    mode: "0644"

# ── Password quality (CIS 5.4) ───────────────────────────────────────────────
- name: CIS | Ensure pam_pwquality is installed
  ansible.builtin.package:
    name: "{{ 'libpam-pwquality' if ansible_os_family == 'Debian' else 'libpwquality' }}"
    state: present

- name: CIS | Enforce password quality requirements
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^#?\\s*{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
    state: present
    create: true
    owner: root
    group: root
    mode: "0644"
  loop: "{{ baseline_cis_pwquality }}"
  loop_control:
    label: "{{ item.key }}"

# ── Password aging (CIS 5.5) ─────────────────────────────────────────────────
- name: CIS | Set password aging policy in login.defs
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "^#?\\s*{{ item.key }}\\b"
    line: "{{ item.key }}\t{{ item.value }}"
    state: present
  loop: "{{ baseline_cis_login_defs }}"
  loop_control:
    label: "{{ item.key }}"
