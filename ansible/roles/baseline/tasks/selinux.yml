---
# roles/baseline/tasks/selinux.yml
# SELinux state + file contexts (EL only). Opt-in: only changes state when
# baseline_selinux_state is set (enforcing | permissive | disabled).
#
# SINGLE-PASS DESIGN
# ──────────────────────────────────────────────────────────────────────────
# A change to/from 'disabled' needs a reboot + a full filesystem relabel. This
# phase does NOT reboot inline — it sets the desired state, writes every
# fcontext mapping into the policy store (semanage works fine while SELinux is
# disabled — it edits files, not the running kernel), schedules a relabel with
# /.autorelabel, and notifies the SHARED deferred reboot handler. That same
# handler is notified by the FIPS phase, so a full hardening converge reboots
# exactly ONCE, at the end of the play, and the single boot applies the relabel
# (correct labels first) AND FIPS together. No permissive-staging detour, no
# second pass: disabled → enforcing in one converge.
#
# Why this is safe from 'disabled': /.autorelabel runs during early boot and
# relabels the whole filesystem from the policy's file_contexts BEFORE services
# start, so nothing comes up mislabelled on the first enforcing boot. Custom
# fcontexts written below are part of that same relabel.

- name: SELinux | Manage SELinux state
  ansible.posix.selinux:
    policy: "{{ baseline_selinux_policy }}"
    state: "{{ baseline_selinux_state }}"
  register: _baseline_selinux
  when:
    - ansible_os_family == "RedHat"
    - baseline_selinux_state | default('') | length > 0
  # Defer the reboot into the ONE shared end-of-play handler (also notified by
  # FIPS), so a full hardening pass reboots exactly once. The handler is itself
  # gated by baseline_allow_reboot, so notifying here is always safe.
  notify: Reboot to apply baseline changes

- name: SELinux | Schedule a filesystem relabel when enabling from disabled
  # Touch /.autorelabel so the next (single, deferred) boot relabels everything
  # from the policy — including the custom fcontexts written below — before any
  # service starts under enforcing.
  ansible.builtin.file:
    path: /.autorelabel
    state: touch
    mode: "0644"
  when:
    - _baseline_selinux is changed
    - (ansible_selinux.status | default('disabled')) == 'disabled'
    - baseline_selinux_state in ['enforcing', 'permissive']

- name: SELinux | Warn a reboot is required but baseline_allow_reboot is false
  ansible.builtin.debug:
    msg: >-
      SELinux state changed to '{{ baseline_selinux_state }}' but
      baseline_allow_reboot is false — reboot + autorelabel is required to fully
      apply it. Reboot manually (or re-run with --tags reboot), then the host
      comes up in the requested state with a relabelled filesystem.
  when:
    - _baseline_selinux is changed
    - _baseline_selinux.reboot_required | default(false)
    - not (baseline_allow_reboot | bool)

# ── File contexts (fcontext) — written into the policy store ─────────────────
# Each entry: {path: <fcontext target/regex>, setype: <type>, restore: <dir>}.
# semanage works whether SELinux is enabled or disabled, so these are written in
# the same pass regardless of current state. When SELinux is already active they
# also get restorecon'd live (below); when it is being enabled from disabled the
# pending /.autorelabel applies them on the deferred boot.
# To let containers use storage under /opt, label a dedicated subtree as
# container_file_t (NOT all of /opt — that would mislabel unrelated apps):
#   baseline_selinux_fcontexts:
#     - {path: "/opt/containers(/.*)?", setype: container_file_t, restore: /opt/containers}
- name: SELinux | Apply SELinux file contexts (policy store)
  community.general.sefcontext:
    target: "{{ item.path }}"
    setype: "{{ item.setype }}"
    ftype: "{{ item.ftype | default('a') }}"
    state: present
  loop: "{{ baseline_selinux_fcontexts }}"
  loop_control:
    label: "{{ item.path }} -> {{ item.setype }}"
  register: _baseline_fcontext
  when:
    - ansible_os_family == "RedHat"
    - baseline_selinux_fcontexts | length > 0
  # Tolerate a setype that isn't defined yet — container types (container_var_lib_t,
  # container_file_t) only exist once container-selinux is installed (it ships with
  # the container runtime). The valid fcontexts still apply; re-run after the
  # runtime lands to pick up the container ones.
  failed_when:
    - _baseline_fcontext is failed
    - "'must be a file or device type' not in (_baseline_fcontext.msg | default(''))"

- name: SELinux | Restore contexts where the fcontext changed (when active)
  # Only meaningful when SELinux is already active. When it is being enabled from
  # disabled, the pending /.autorelabel relabels these paths on the deferred boot,
  # so an inline restorecon here would be a no-op — skip it.
  # -i ignores paths that don't exist yet (e.g. labelling /opt/docker before the
  # docker role creates it — new files still inherit the recorded fcontext).
  ansible.builtin.command: "restorecon -R -i {{ item.item.restore | default(item.item.path) }}"
  loop: "{{ _baseline_fcontext.results | default([]) }}"
  loop_control:
    label: "{{ item.item.path | default('') }}"
  when:
    - item.changed | default(false)
    - (ansible_selinux.status | default('disabled')) == 'enabled'
  changed_when: true

# ── SELinux booleans (persistent) — e.g. container_manage_cgroup for Docker ───
# setsebool needs SELinux loaded, so booleans are applied only when SELinux is
# already active. On a disabled→enforcing pass, set service-specific booleans
# from the owning service role (which runs once SELinux is active), or re-run
# this phase after the host comes up enforcing.
- name: SELinux | Set SELinux booleans (when active)
  ansible.posix.seboolean:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
    persistent: true
  loop: "{{ baseline_selinux_booleans }}"
  loop_control:
    label: "{{ item.name }}={{ item.state }}"
  register: _baseline_seboolean
  when:
    - ansible_os_family == "RedHat"
    - baseline_selinux_booleans | length > 0
    - (ansible_selinux.status | default('disabled')) == 'enabled'
  # Tolerate a boolean that isn't defined yet (e.g. container_manage_cgroup needs
  # container-selinux, installed with the runtime) — re-run afterwards.
  failed_when:
    - _baseline_seboolean is failed
    - "'not defined' not in (_baseline_seboolean.msg | default('') | lower)"
    - "'failed to find' not in (_baseline_seboolean.msg | default('') | lower)"

- name: SELinux | Note booleans deferred until SELinux is active
  ansible.builtin.debug:
    msg: >-
      {{ baseline_selinux_booleans | length }} SELinux boolean(s) requested but
      SELinux is not active yet (being enabled this pass) — they will be set on a
      re-run once the host is up enforcing, or by the owning service role.
  when:
    - baseline_selinux_booleans | length > 0
    - (ansible_selinux.status | default('disabled')) != 'enabled'
