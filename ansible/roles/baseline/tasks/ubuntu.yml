---
# roles/baseline/tasks/ubuntu.yml
# Debian/Ubuntu distro specifics not covered by the generic baseline phases.
- name: Ubuntu distro specifics
  when: ansible_os_family == "Debian"
  block:
    - name: Install CIFS utils on Debian
      ansible.builtin.apt:
        name: cifs-utils
        state: present

    - name: Install ufw on Ubuntu
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Ensure ufw is in the configured default state
      community.general.ufw:
        state: disabled
        policy: allow

    - name: Install Fail2Ban
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: Ensure the Fail2Ban service is enabled and started
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true

    - name: Deploy fail2ban jail.local
      ansible.builtin.template:
        src: jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: "0644"
      notify: Restart Fail2Ban
