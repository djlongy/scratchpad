---
# splunk_config — capture a live Splunk estate into a committable, re-appliable
# snapshot, and apply it back. Reaches Splunk THROUGH the containers
# (docker exec / docker cp), auto-detects topology, and scrubs every secret
# before anything is written to the repo. See docs/designs/2026-07-04-splunk-config-iac.md.
#
# TWO-MODE TOOL. Unlike a normal reconcile role, a bare run does nothing useful —
# pick a mode explicitly:
#   --tags export   capture the live estate → snapshot on the control node
#   --tags apply    place a snapshot back + reseed secrets + trigger bundle pushes
# Both modes are `never`-gated (sanctioned enablement exception) so neither fires
# by accident on a full converge.
#
# Export is the bare-minimum path: no HashiCorp Vault required, no admin
# credentials required for container capture, no applyable topology required.
# Secrets default to flat files under files/secrets/ (gitignored). Vault is an
# optional backend only.

# ── Discovery ────────────────────────────────────────────────────────────────
# Primary docker ps name filter (stack prefix). Swarm prefixes service
# containers with "<stack>_". Override per estate when the stack is not "splunk".
splunk_config_stack: splunk

# Extra name filters (OR'd with the stack). Use for foreign estates where
# containers are not named with the stack prefix (compose project names,
# short service names, etc.). Empty = stack only.
splunk_config_name_filters: []

# Optional image-substring filters (OR'd). Match containers whose Image column
# contains any of these strings — catches estates where the container name is
# opaque but the image is clearly Splunk. Examples:
#   ["splunk/splunk", "splunk/universalforwarder"]
# Empty = name filters only.
splunk_config_image_filters: []

# Path to Splunk's config root INSIDE the container (used on apply placement).
# Export auto-detects /opt/splunk/etc vs /opt/splunkforwarder/etc per container.
splunk_config_container_etc: /opt/splunk/etc

# Splunk binary inside the container (used for bundle-push / reload on apply).
splunk_config_container_splunk_bin: /opt/splunk/bin/splunk

# owner:group applied to config placed into a container on apply.
splunk_config_container_owner: splunk:splunk

# The `etc/` subtrees harvested from each container. `apps` is handled specially
# (see below); the rest are copied wholesale when present. Non-existent paths are
# skipped per container (a search head has no manager-apps, etc.).
splunk_config_capture_paths:
  - system/local
  - apps
  - users
  - manager-apps
  - shcluster/apps
  - deployment-apps
  - auth/splunk.secret
  - passwd

# Stock-app globs for CONTAINER capture (docker tar). API/scrub stock rules live
# in the surface lists below (splunk_config_stock_app_names / _prefixes).
splunk_config_stock_app_globs:
  - "splunk_*"
  - "Splunk_*"
  - "TA-*"
  - "SA-*"
  - "DA-ITSI-*"
  - search
  - launcher
  - learned
  - legacy
  - framework
  - gettingstarted
  - appsbrowser
  - user-prefs
  - SplunkForwarder
  - SplunkLightForwarder

# ── Snapshot location (control node) ─────────────────────────────────────────
# Committed reference snapshot. Override to an inventory-managed path to keep a
# per-environment capture outside the role.
splunk_config_snapshot_dir: "{{ role_path }}/files/snapshots/{{ splunk_config_stack }}"

# Scratch dir on the control node for the raw (pre-scrub) capture. Kept out of
# the repo; cleaned unless splunk_config_keep_raw is true (debugging only).
splunk_config_raw_dir: "/tmp/splunk_config_raw/{{ splunk_config_stack }}"
splunk_config_keep_raw: false

# ── Export transport ─────────────────────────────────────────────────────────
# api       — management REST only (:8089). Work use case: unknown production
#             config → recreate in a test environment. No Docker, no mounts.
# container — docker exec/cp (+ host-volume fallback). Homelab Swarm / when you
#             own the hosts and want on-disk local/ trees.
# Dedicated playbook for the work path: playbooks/ops_splunk_config_export.yml
splunk_config_export_transport: container

# ── API transport (when export_transport=api) ────────────────────────────────
# Management base URL — NOT the web UI reverse-proxy host (use :8089).
splunk_config_api_url: ""
splunk_config_api_user: admin
# Password resolution order (first non-empty wins):
#   1. splunk_config_api_password
#   2. contents of splunk_config_api_password_file
#   3. <secrets_dir>/api_password  (flat file written by operator)
splunk_config_api_password: ""
splunk_config_api_password_file: ""
splunk_config_api_verify_tls: false
splunk_config_api_label: standalone
splunk_config_api_include_disabled_apps: false

# ── Capture / apply SURFACE (edit here — not the Python engines) ─────────────
# Python under files/ only does HTTP + conf I/O. The *what* to pull or push is
# these lists. Materialised to JSON (splunk_config_surface_json) before scripts
# run. To add a conf type for API export/apply:
#   1. Append the conf base name (no .conf) to the right list or its _extra list
#   2. Re-run export / apply
# See README → "Extending the capture surface".
#
# conf_files: system/local + custom apps (full knowledge + settings surface)
splunk_config_api_conf_files:
  - server
  - web
  - indexes
  - inputs
  - outputs
  - props
  - transforms
  - authentication
  - authorize
  - limits
  - distsearch
  - collections
  - alert_actions
  - savedsearches
  - eventtypes
  - tags
  - fields
  - macros
  - workflow_actions
  - health
  - serverclass
  - ui-prefs
  - app
  - audit
# Operator append-only (inventory / -e); never edit Python to add confs.
splunk_config_api_conf_files_extra: []

# stock_conf_files: knowledge objects only for Splunk-shipped apps
splunk_config_api_stock_conf_files:
  - savedsearches
  - eventtypes
  - tags
  - macros
  - props
  - transforms
  - inputs
  - indexes
  - app
  - ui-prefs
  - workflow_actions
splunk_config_api_stock_conf_files_extra: []

# Apps treated as stock (local/ only in scrubber; limited conf set on API export)
splunk_config_stock_app_names:
  - search
  - launcher
  - learned
  - legacy
  - sample_app
  - framework
  - gettingstarted
  - introspection_generator_addon
  - appsbrowser
  - user-prefs
  - alert_logevent
  - alert_webhook
  - splunk_httpinput
  - SplunkForwarder
  - SplunkLightForwarder
  - splunk_gdi
  - splunk_enterprise_on_docker
  - journald_input
  - audit_trail
  - splunk_archiver
  - splunk_ingest_actions
  - splunk_internal_metrics
splunk_config_stock_app_names_extra: []

splunk_config_stock_app_prefixes:
  - "splunk_"
  - "Splunk_"
  - "DA-ITSI-"
  - "SA-"
  - "TA-"
  - "splunk-"
  - "SplunkDeployment"
splunk_config_stock_app_prefixes_extra: []

# Apply via API: never POST these key names (scrubbed values are also skipped).
splunk_config_api_apply_forbidden_keys:
  - sslPassword
  - pass4SymmKey
  - password
  - auth_password
  - bindDNpassword
  - secret
  - token
  - accessKey
  - secret_key
splunk_config_api_apply_forbidden_keys_extra: []

splunk_config_api_capture_views_custom: true
splunk_config_api_capture_views_stock: false

# Where Ansible writes the merged surface JSON for Python (--surface).
splunk_config_surface_json: "/tmp/splunk_config_surface_{{ splunk_config_stack | default('splunk') }}.json"

# ── Docker storage root (host-side volume paths) ─────────────────────────────
# Docker's data-root. Named volumes (including local-driver + type=nfs) appear
# under <root>/volumes/<name>/_data on the node, even when the backend is NFS —
# you do not need the NFS server path to retrieve config. Export probes
# `docker info` per node and falls back to this default when the probe fails.
splunk_config_docker_root: /var/lib/docker

# When true, export also considers stopped containers (docker ps -a) so a
# scaled-down service can still be retrieved from its volume mountpoints.
splunk_config_export_include_stopped: true

# When a container is not running (or has no reachable etc), fall back to the
# host-side volume/bind Source under Docker's data-root (or the bind path).
splunk_config_export_host_volume_fallback: true

# ── Export resilience (bare-minimum retrieve) ────────────────────────────────
# When true, a single container capture failure does not abort the export —
# remaining containers are still scrubbed into the snapshot.
splunk_config_export_ignore_capture_errors: true

# When true, export fails if no Splunk containers were found on any host.
# Default false: write an empty snapshot + warn so a dry inventory still produces
# a usable (empty) artifact rather than a hard fail.
splunk_config_export_fail_on_empty: false

# When true, fail the export if any secret pattern survives the scrub. Keep true
# for anything that may land in git. Set false only for private forensics dumps.
splunk_config_export_fail_on_secret_leak: true

# Record docker mount metadata (type, source, destination, name, driver) into
# each instance's _capture.json → manifest. Helps identify NFS-backed volumes
# vs bind mounts. Sources are typically under splunk_config_docker_root.
splunk_config_export_record_mounts: true

# ── Secrets backend (HashiCorp Vault is NOT required) ────────────────────────
# file  — flat files under splunk_config_secrets_dir (default; gitignored)
# vault — optional HashiCorp KV v2 (only if you already run Vault)
# none  — do not store/restore secrets (config snapshot only)
splunk_config_secrets_backend: file

# Directory for flat-file secrets (splunk.secret.*, secrets.yml, api_password).
# Role ships files/secrets/.gitignore so contents are never committed.
splunk_config_secrets_dir: "{{ role_path }}/files/secrets/{{ splunk_config_stack }}"

# Store captured secrets on export (to the selected backend).
splunk_config_export_store_secrets: true

# Optional Vault settings — only used when secrets_backend=vault.
# Prefer leaving these empty; set only if you explicitly choose Vault.
splunk_config_vault_addr: "{{ vault_addr | default('') }}"
splunk_config_vault_mount: "{{ vault_kv_mount | default('') }}"
splunk_config_vault_path: apps/splunk/config

# Legacy alias kept for callers that still set the old flag name.
# Prefer splunk_config_export_store_secrets.
splunk_config_export_push_splunk_secret: "{{ splunk_config_export_store_secrets }}"

# ── Apply behaviour ──────────────────────────────────────────────────────────
# Apply transport: container | api. Empty → same as splunk_config_export_transport.
splunk_config_apply_transport: "{{ splunk_config_export_transport | default('container') }}"

# API apply scope (when apply_transport=api):
#   custom_apps — only non-stock apps (safest on a live box; default)
#   system      — system-local conf only
#   all         — system-local + every app in the snapshot
splunk_config_api_apply_scope: custom_apps
splunk_config_api_apply_dry_run: false
splunk_config_api_apply_max_errors: 50
splunk_config_api_apply_allow_secret_keys: false
splunk_config_api_apply_fail_on_errors: true

# Reseed scrubbed secrets from the secrets backend during apply. Soft-skips
# when secrets are missing — placement still runs. (Container transport only;
# API apply skips <SCRUBBED> values and never POSTs secret key names by default.)
splunk_config_apply_reseed_secrets: true

# Trigger each tier's bundle push after placing config. Off = stage the files
# but let an operator push manually (safer first apply against a live estate).
# Container transport only.
splunk_config_apply_push_bundles: true

# Restart non-control instances (search head / indexer / standalone) after
# placing config so system/local + apps take effect. Off by default — restarts
# interrupt; enable once you've reviewed a first apply.
splunk_config_apply_restart_instances: false

# Admin credential for CLI bundle-push / reload auth (container transport).
# Resolution: var → password file → <secrets_dir>/admin_password.
# Empty → pushes are SKIPPED with a warning (safe first-apply default).
# API apply uses splunk_config_api_password / _file / secrets_dir/api_password.
splunk_config_admin_password: ""
splunk_config_admin_password_file: ""

# ── Inventory must provide (no safe defaults) ────────────────────────────────
# The nodes to scan for Splunk containers are simply the hosts this role
# runs against — target them via the playbook's `hosts:` (e.g. swarm_managers +
# swarm_workers, or a dedicated splunk group). See README.
