---
argument_specs:
  main:
    short_description: Capture and re-apply Splunk configuration as IaC.
    description:
      - >-
        Two-mode tool. With export tags it harvests Splunk config (container or
        API transport), scrubs secrets, and writes a snapshot. With apply tags
        it places a snapshot back and optionally reseeds secrets.
      - >-
        HashiCorp Vault is never required. Secrets default to flat files under
        files/secrets/. Vault is an optional backend only.
    options:
      splunk_config_export_transport:
        type: str
        default: container
        description: Capture transport — container or api.
      splunk_config_api_url:
        type: str
        description: Management base URL for API transport (https://host:8089).
      splunk_config_api_user:
        type: str
        default: admin
        description: Splunk admin username for API transport.
      splunk_config_api_password:
        type: str
        description: Splunk admin password (or use api_password_file / secrets_dir).
      splunk_config_api_password_file:
        type: str
        description: Path to a one-line password file for API auth.
      splunk_config_secrets_backend:
        type: str
        default: file
        description: Secrets store — file (default), vault (optional), or none.
      splunk_config_secrets_dir:
        type: str
        description: Directory for flat-file secrets (default files/secrets/<stack>).
      splunk_config_export_store_secrets:
        type: bool
        default: true
        description: Persist captured secrets to the secrets backend on export.
      splunk_config_apply_transport:
        type: str
        required: false
        description: Apply transport — container or api (defaults with export transport).
      splunk_config_api_apply_scope:
        type: str
        required: false
        description: API apply scope — custom_apps, system, or all.
      splunk_config_api_apply_dry_run:
        type: bool
        required: false
        description: Count stanzas without POSTing when true.
      splunk_config_apply_reseed_secrets:
        type: bool
        default: true
        description: Restore secrets from the secrets backend on apply.
      splunk_config_stack:
        type: str
        default: splunk
        description: Primary docker ps name filter (container transport).
      splunk_config_snapshot_dir:
        type: str
        description: Control-node directory for the scrubbed snapshot.
      splunk_config_apply_push_bundles:
        type: bool
        default: true
        description: Trigger tier bundle push after placing config on apply.
      splunk_config_admin_password:
        type: str
        default: ""
        description: Estate admin password for CLI pushes; empty skips pushes.
