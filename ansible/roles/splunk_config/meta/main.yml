---
galaxy_info:
  role_name: splunk_config
  author: longy
  description: >-
    Capture the entire live configuration of a Splunk estate running on Docker
    Swarm into a declarative, version-controlled snapshot (manifest + native app
    bundles), and re-apply it deterministically to reproduce the estate. Reaches
    Splunk through the containers, auto-detects topology (cluster manager / SHC
    deployer / deployment server / search head / indexer), and scrubs every
    secret before it touches git — re-seeding from HashiCorp Vault on apply.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: [all]
    - name: Ubuntu
      versions: [all]
    - name: Debian
      versions: [all]
  galaxy_tags:
    - splunk
    - logging
    - iac
    - config
    - docker

dependencies: []
