---
# Export orchestrator — capture the live Splunk estate into a committable
# snapshot on the control node.
#
# Two transports (splunk_config_export_transport):
#   container — discover containers on play hosts, docker exec/cp (+ host
#               volume fallback under Docker data-root)
#   api       — management REST API on the control node (no docker/mounts)
#
# Flow: reset raw dir → capture (container or API) → scrub + manifest +
# optional secrets store (flat files by default).

- name: Export | Reset the control-node raw capture dir (once)
  ansible.builtin.file:
    path: "{{ splunk_config_raw_dir }}"
    state: "{{ item }}"
    mode: "0750"
  loop: [absent, directory]
  delegate_to: localhost
  become: false
  run_once: true

# ── API transport ───────────────────────────────────────────────────────────
- name: Export | Capture via management REST API (once)
  ansible.builtin.include_tasks: export/capture_api.yml
  run_once: true
  when: (splunk_config_export_transport | default('container')) == 'api'

# ── Container transport ─────────────────────────────────────────────────────
- name: Export | Discover Splunk containers on this node
  ansible.builtin.include_tasks: export/detect_containers.yml
  when: (splunk_config_export_transport | default('container')) == 'container'

- name: Export | Capture each Splunk container's config
  ansible.builtin.include_tasks: export/capture_container.yml
  loop: "{{ _splunk_containers | default([]) }}"
  loop_control:
    loop_var: _container
    label: "{{ _container.label }}"
  when: (splunk_config_export_transport | default('container')) == 'container'

- name: Export | Count containers discovered across the estate (once)
  ansible.builtin.set_fact:
    _splunk_export_container_count: >-
      {{ ansible_play_hosts
         | map('extract', hostvars)
         | map(attribute='_splunk_containers', default=[])
         | map('length')
         | sum }}
  run_once: true
  when: (splunk_config_export_transport | default('container')) == 'container'

- name: Export | Fail when no containers found and fail_on_empty is set
  ansible.builtin.assert:
    that:
      - (_splunk_export_container_count | int) > 0
    fail_msg: >-
      No Splunk containers matched on any host in this play
      (stack={{ splunk_config_stack }},
      name_filters={{ splunk_config_name_filters | default([]) }},
      image_filters={{ splunk_config_image_filters | default([]) }}).
      Widen the filters, set splunk_config_export_fail_on_empty=false, or use
      splunk_config_export_transport=api against the management port.
  run_once: true
  when:
    - (splunk_config_export_transport | default('container')) == 'container'
    - splunk_config_export_fail_on_empty | bool

- name: Export | Warn when no containers found (empty snapshot will be written)
  ansible.builtin.debug:
    msg: >-
      No Splunk containers matched on any host. Writing an empty snapshot to
      {{ splunk_config_snapshot_dir }}. Widen filters or use
      splunk_config_export_transport=api if this is unexpected.
  run_once: true
  when:
    - (splunk_config_export_transport | default('container')) == 'container'
    - not (splunk_config_export_fail_on_empty | bool)
    - (_splunk_export_container_count | int) == 0

# ── Scrub + manifest (both transports) ──────────────────────────────────────
- name: Export | Scrub, classify, render the snapshot, optional Vault push (once)
  ansible.builtin.include_tasks: export/scrub_manifest.yml
  run_once: true
