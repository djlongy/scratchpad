---
# Export orchestrator — capture the live Splunk estate into a committable
# snapshot on the control node.
#
# Runs against the swarm nodes (the play's hosts). Ansible executes each task
# across ALL hosts before the next, so every node's containers are captured
# before the run_once scrub/manifest step aggregates them on the control node.
#
# Flow: reset control-node raw dir (once) → discover Splunk containers on each
# node → tar each container's etc subtree out and fetch it → scrub + classify +
# render manifest + optional Vault push of splunk.secret (once).
#
# Bare-minimum retrieve: export does not require Vault, admin credentials, or
# an applyable topology. Soft-fails individual container captures and optional
# Vault writes so a partial snapshot still lands.

- name: Export | Reset the control-node raw capture dir (once)
  ansible.builtin.file:
    path: "{{ splunk_config_raw_dir }}"
    state: "{{ item }}"
    mode: "0750"
  loop: [absent, directory]
  delegate_to: localhost
  become: false
  run_once: true

- name: Export | Discover Splunk containers on this node
  ansible.builtin.include_tasks: export/detect_containers.yml

- name: Export | Capture each Splunk container's config
  ansible.builtin.include_tasks: export/capture_container.yml
  loop: "{{ _splunk_containers | default([]) }}"
  loop_control:
    loop_var: _container
    label: "{{ _container.label }}"

# Aggregate discovery counts after every host has run detect + capture.
# hostvars is safe here: the prior tasks ran on every play host.
- name: Export | Count containers discovered across the estate (once)
  ansible.builtin.set_fact:
    _splunk_export_container_count: >-
      {{ ansible_play_hosts
         | map('extract', hostvars)
         | map(attribute='_splunk_containers', default=[])
         | map('length')
         | sum }}
  run_once: true

- name: Export | Fail when no containers found and fail_on_empty is set
  ansible.builtin.assert:
    that:
      - (_splunk_export_container_count | int) > 0
    fail_msg: >-
      No Splunk containers matched on any host in this play
      (stack={{ splunk_config_stack }},
      name_filters={{ splunk_config_name_filters | default([]) }},
      image_filters={{ splunk_config_image_filters | default([]) }}).
      Widen the filters or set splunk_config_export_fail_on_empty=false to
      write an empty snapshot.
  run_once: true
  when: splunk_config_export_fail_on_empty | bool

- name: Export | Warn when no containers found (empty snapshot will be written)
  ansible.builtin.debug:
    msg: >-
      No Splunk containers matched on any host. Writing an empty snapshot to
      {{ splunk_config_snapshot_dir }}. Widen splunk_config_stack /
      splunk_config_name_filters / splunk_config_image_filters if this is
      unexpected.
  run_once: true
  when:
    - not (splunk_config_export_fail_on_empty | bool)
    - (_splunk_export_container_count | int) == 0

- name: Export | Scrub, classify, render the snapshot, optional Vault push (once)
  ansible.builtin.include_tasks: export/scrub_manifest.yml
  run_once: true
