---
# Place one container's config from the snapshot: its instance-local apps,
# system/local, users — plus, when this container owns a control-plane tier, the
# matching bundle-staging dir (manager-apps / shcluster/apps / deployment-apps).
# Matched to the snapshot by service name.

- name: Apply | {{ _container.label }} — resolve snapshot instance entry
  ansible.builtin.set_fact:
    _entry: >-
      {{ (splunk_config_snapshot.tiers.instances
          | selectattr('service', 'equalto', _container.service)
          | list | first) | default({}) }}

- name: Apply | {{ _container.label }} — no snapshot entry, skipping
  ansible.builtin.debug:
    msg: "no snapshot entry for service {{ _container.service }} — skipping placement"
  when: _entry | length == 0

- name: Apply | {{ _container.label }} — place bundles
  when: _entry | length > 0
  vars:
    _inst_dir: "{{ splunk_config_snapshot_dir }}/instance-{{ _entry.role }}-{{ _container.service }}"
    _stage_base: "/tmp/splunk_apply/{{ _container.label }}"
  block:
    - name: Apply | {{ _container.label }} — place instance apps
      ansible.builtin.include_tasks: apply/cp_into_container.yml
      vars:
        _cp_name: apps
        _cp_src: "{{ _inst_dir }}/apps"
        _cp_dest: "{{ splunk_config_container_etc }}/apps"
        _cp_stage: "{{ _stage_base }}/apps"

    - name: Apply | {{ _container.label }} — place system/local
      ansible.builtin.include_tasks: apply/cp_into_container.yml
      vars:
        _cp_name: system-local
        _cp_src: "{{ _inst_dir }}/system-local"
        _cp_dest: "{{ splunk_config_container_etc }}/system/local"
        _cp_stage: "{{ _stage_base }}/system-local"

    - name: Apply | {{ _container.label }} — place users
      ansible.builtin.include_tasks: apply/cp_into_container.yml
      vars:
        _cp_name: users
        _cp_src: "{{ _inst_dir }}/users"
        _cp_dest: "{{ splunk_config_container_etc }}/users"
        _cp_stage: "{{ _stage_base }}/users"

    - name: Apply | {{ _container.label }} — place manager-apps (cluster manager)
      ansible.builtin.include_tasks: apply/cp_into_container.yml
      vars:
        _cp_name: manager-apps
        _cp_src: "{{ splunk_config_snapshot_dir }}/manager-apps"
        _cp_dest: "{{ splunk_config_container_etc }}/manager-apps"
        _cp_stage: "{{ _stage_base }}/manager-apps"
      when: _entry.role == 'cluster_manager'

    - name: Apply | {{ _container.label }} — place shcluster/apps (SHC deployer)
      ansible.builtin.include_tasks: apply/cp_into_container.yml
      vars:
        _cp_name: shcluster-apps
        _cp_src: "{{ splunk_config_snapshot_dir }}/shcluster-apps"
        _cp_dest: "{{ splunk_config_container_etc }}/shcluster/apps"
        _cp_stage: "{{ _stage_base }}/shcluster-apps"
      when: _entry.role == 'shc_deployer'

    - name: Apply | {{ _container.label }} — place deployment-apps (deployment server)
      ansible.builtin.include_tasks: apply/cp_into_container.yml
      vars:
        _cp_name: deployment-apps
        _cp_src: "{{ splunk_config_snapshot_dir }}/deployment-apps"
        _cp_dest: "{{ splunk_config_container_etc }}/deployment-apps"
        _cp_stage: "{{ _stage_base }}/deployment-apps"
      when: _entry.role == 'deployment_server'
