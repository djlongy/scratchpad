---
# Restore each local container's splunk.secret from Vault BEFORE config is
# placed/pushed, so $7$-encrypted conf values in the snapshot stay decryptable.
# The map was written on export (field secret_<service>). No-op for a service
# with no stored secret.
#
# Soft-skip: when Vault is not configured or the read fails, placement still
# proceeds — apply is best-effort on top of a prior retrieve.

- name: Reseed | Skip when Vault is not configured
  ansible.builtin.debug:
    msg: >-
      Apply reseed of splunk.secret skipped — vault_addr or
      splunk_config_vault_mount is empty. Config placement will still run;
      $7$-encrypted conf values may not decrypt without a restored
      splunk.secret.
  when: >-
    (vault_addr | default('') | length) == 0
    or (splunk_config_vault_mount | default('') | length) == 0

- name: Reseed | Read and restore from Vault
  when:
    - (vault_addr | default('') | length) > 0
    - (splunk_config_vault_mount | default('') | length) > 0
  block:
    # Module (not lookup) so a missing path / auth failure is a soft task
    # result rather than a template-time hard fail.
    - name: Reseed | Read splunk.secret map from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        engine_mount_point: "{{ splunk_config_vault_mount }}"
        path: "{{ splunk_config_vault_path }}"
      delegate_to: localhost
      become: false
      no_log: true
      register: _reseed_kv
      failed_when: false

    - name: Reseed | Warn when Vault read failed
      ansible.builtin.debug:
        msg: >-
          Vault read of {{ splunk_config_vault_path }} soft-failed
          ({{ _reseed_kv.msg | default('no secret data') }}).
          Continuing apply without reseeding splunk.secret.
      when: >-
        (_reseed_kv.failed | default(false))
        or (_reseed_kv.secret is not defined)

    - name: Reseed | Materialise secret map
      ansible.builtin.set_fact:
        _splunk_secret_map: "{{ _reseed_kv.secret | default({}) }}"
      no_log: true
      when:
        - not (_reseed_kv.failed | default(false))
        - _reseed_kv.secret is defined

    - name: Reseed | Restore splunk.secret into local containers
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          CID=$(docker ps -q --filter name={{ item.name | quote }} | head -1)
          [ -n "$CID" ] || exit 0
          ETC=$(docker exec "$CID" sh -c 'for e in /opt/splunk/etc /opt/splunkforwarder/etc; do [ -d "$e" ] && echo "$e" && break; done')
          [ -n "$ETC" ] || exit 0
          printf '%s' {{ _secret_val | quote }} \
            | docker exec -i -u 0 "$CID" sh -c \
              "cat > \"${ETC}/auth/splunk.secret\"
               chmod 600 \"${ETC}/auth/splunk.secret\"
               chown {{ splunk_config_container_owner }} \"${ETC}/auth/splunk.secret\""
        executable: /bin/bash
      become: true
      loop: "{{ _splunk_containers | default([]) }}"
      loop_control:
        loop_var: item
        label: "{{ item.service }}"
      vars:
        _secret_val: "{{ (_splunk_secret_map | default({}))['secret_' + item.service] | default('') }}"
      when:
        - _splunk_secret_map is defined
        - _secret_val | length > 0
      changed_when: true
      no_log: true
