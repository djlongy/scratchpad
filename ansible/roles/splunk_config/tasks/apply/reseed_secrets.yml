---
# Restore each local container's splunk.secret BEFORE config is placed/pushed
# so $7$-encrypted conf values stay decryptable.
#
# Backend is vault-agnostic (splunk_config_secrets_backend):
#   file  — read secrets.yml / splunk.secret.* under splunk_config_secrets_dir
#   vault — optional HashiCorp KV read (soft-fail; not required)
#   none  — skip
#
# Placement still runs when reseed is skipped or secrets are missing.

- name: Reseed | Skip when secrets backend is none or reseed disabled
  ansible.builtin.debug:
    msg: >-
      Apply reseed skipped
      (backend={{ splunk_config_secrets_backend | default('file') }},
      reseed={{ splunk_config_apply_reseed_secrets | bool }}).
  when: >-
    not (splunk_config_apply_reseed_secrets | bool)
    or (splunk_config_secrets_backend | default('file')) == 'none'

- name: Reseed | Load secrets from flat files
  when:
    - splunk_config_apply_reseed_secrets | bool
    - (splunk_config_secrets_backend | default('file')) == 'file'
  block:
    - name: Reseed | Stat secrets.yml
      ansible.builtin.stat:
        path: "{{ splunk_config_secrets_dir }}/secrets.yml"
      delegate_to: localhost
      become: false
      register: _secrets_yml_stat

    - name: Reseed | Load secrets.yml when present
      ansible.builtin.include_vars:
        file: "{{ splunk_config_secrets_dir }}/secrets.yml"
        name: _secrets_file
      delegate_to: localhost
      become: false
      no_log: true
      when: _secrets_yml_stat.stat.exists | default(false)

    - name: Reseed | Materialise map from secrets.yml
      ansible.builtin.set_fact:
        _splunk_secret_map: "{{ _secrets_file.splunk_secrets | default({}) }}"
      no_log: true
      when:
        - _secrets_yml_stat.stat.exists | default(false)
        - _secrets_file is defined

    - name: Reseed | Fall back to per-label files when secrets.yml missing
      when: not (_secrets_yml_stat.stat.exists | default(false))
      block:
        - name: Reseed | Find per-label splunk.secret.* files
          ansible.builtin.find:
            paths: "{{ splunk_config_secrets_dir }}"
            patterns: "splunk.secret.*"
          delegate_to: localhost
          become: false
          register: _secret_label_files
          failed_when: false

        - name: Reseed | Read per-label files
          ansible.builtin.slurp:
            src: "{{ item.path }}"
          loop: "{{ _secret_label_files.files | default([]) }}"
          loop_control:
            label: "{{ item.path | basename }}"
          register: _secret_label_blobs
          delegate_to: localhost
          become: false
          no_log: true
          when: (_secret_label_files.files | default([])) | length > 0

        - name: Reseed | Assemble map from per-label files
          ansible.builtin.set_fact:
            _splunk_secret_map: >-
              {{ dict(
                   (_secret_label_blobs.results | default([])
                      | selectattr('content', 'defined')
                      | map(attribute='item.path')
                      | map('basename')
                      | map('regex_replace', '^splunk\\.secret\\.', 'secret_')
                      | list)
                   | zip(
                       _secret_label_blobs.results | default([])
                         | selectattr('content', 'defined')
                         | map(attribute='content')
                         | map('b64decode') | map('trim') | list
                     )
                 ) }}
          no_log: true
          when: (_secret_label_files.files | default([])) | length > 0

    - name: Reseed | Warn when no file-backend secrets found
      ansible.builtin.debug:
        msg: >-
          No secrets under {{ splunk_config_secrets_dir }} — placement continues
          without reseeding splunk.secret. Re-run export (secrets_backend=file)
          or place secrets.yml manually.
      when: (_splunk_secret_map | default({})) | length == 0

- name: Reseed | Load secrets from HashiCorp Vault (optional)
  when:
    - splunk_config_apply_reseed_secrets | bool
    - (splunk_config_secrets_backend | default('file')) == 'vault'
    - (splunk_config_vault_addr | default('') | length) > 0
    - (splunk_config_vault_mount | default('') | length) > 0
  block:
    - name: Reseed | vault_kv2_get
      community.hashi_vault.vault_kv2_get:
        url: "{{ splunk_config_vault_addr }}"
        engine_mount_point: "{{ splunk_config_vault_mount }}"
        path: "{{ splunk_config_vault_path }}"
      delegate_to: localhost
      become: false
      no_log: true
      register: _reseed_kv
      failed_when: false

    - name: Reseed | Materialise map from Vault
      ansible.builtin.set_fact:
        _splunk_secret_map: "{{ _reseed_kv.secret | default({}) }}"
      no_log: true
      when:
        - not (_reseed_kv.failed | default(false))
        - _reseed_kv.secret is defined

    - name: Reseed | Warn when Vault read failed
      ansible.builtin.debug:
        msg: >-
          Vault reseed soft-failed — continuing without splunk.secret restore.
          Prefer secrets_backend=file when HashiCorp Vault is not available.
      when: >-
        (_reseed_kv.failed | default(false))
        or (_reseed_kv.secret is not defined)

- name: Reseed | Restore splunk.secret into local containers
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      CID=$(docker ps -q --filter name={{ item.name | quote }} | head -1)
      [ -n "$CID" ] || exit 0
      ETC=$(docker exec "$CID" sh -c 'for e in /opt/splunk/etc /opt/splunkforwarder/etc; do [ -d "$e" ] && echo "$e" && break; done')
      [ -n "$ETC" ] || exit 0
      printf '%s' {{ _secret_val | quote }} \
        | docker exec -i -u 0 "$CID" sh -c \
          "cat > \"${ETC}/auth/splunk.secret\"
           chmod 600 \"${ETC}/auth/splunk.secret\"
           chown {{ splunk_config_container_owner }} \"${ETC}/auth/splunk.secret\""
    executable: /bin/bash
  become: true
  loop: "{{ _splunk_containers | default([]) }}"
  loop_control:
    loop_var: item
    label: "{{ item.service }}"
  vars:
    _secret_val: "{{ (_splunk_secret_map | default({}))['secret_' + item.service] | default('') }}"
  when:
    - splunk_config_apply_reseed_secrets | bool
    - (splunk_config_secrets_backend | default('file')) != 'none'
    - (_splunk_secret_map | default({})) | length > 0
    - _secret_val | length > 0
  changed_when: true
  no_log: true
