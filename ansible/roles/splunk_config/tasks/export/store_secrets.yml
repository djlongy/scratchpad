---
# Persist captured secret material after scrub.
# Backend is vault-agnostic:
#   file  (default) — flat files under splunk_config_secrets_dir
#   vault           — optional HashiCorp KV v2 write (soft-fail)
#   none            — discard (config snapshot only)
#
# File layout (mode 0600, directory 0700):
#   <secrets_dir>/
#     secrets.yml          # map of secret_<label> → value (+ optional creds)
#     splunk.secret.<label>  # one file per instance (same bytes as etc/auth)

- name: Secrets | Find captured splunk.secret files in the raw tree
  ansible.builtin.find:
    paths: "{{ splunk_config_raw_dir }}"
    patterns: splunk.secret
    recurse: true
  delegate_to: localhost
  become: false
  register: _secret_files

- name: Secrets | Read each splunk.secret
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  delegate_to: localhost
  become: false
  loop: "{{ _secret_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | regex_replace('^.*/([^/]+)/etc/.*$', '\\1') }}"
  register: _secret_blobs
  no_log: true
  when: (_secret_files.files | default([])) | length > 0

- name: Secrets | Assemble label → secret map
  ansible.builtin.set_fact:
    _splunk_secret_data: >-
      {{ dict(
           (_secret_blobs.results | default([])
              | selectattr('content', 'defined')
              | map(attribute='item.path')
              | map('regex_replace', '^.*/([^/]+)/etc/.*$', 'secret_\\1')
              | list)
           | zip(
               _secret_blobs.results | default([])
                 | selectattr('content', 'defined')
                 | map(attribute='content')
                 | map('b64decode') | map('trim') | list
             )
         ) }}
  no_log: true
  when: (_secret_files.files | default([])) | length > 0

- name: Secrets | Nothing to store
  ansible.builtin.debug:
    msg: "No splunk.secret files found in the raw capture — secrets store skipped."
  when: (_secret_files.files | default([])) | length == 0

# ── file backend ────────────────────────────────────────────────────────────
- name: Secrets | Write flat-file secret store
  when:
    - (splunk_config_secrets_backend | default('file')) == 'file'
    - (_splunk_secret_data | default({})) | length > 0
  block:
    - name: Secrets | Ensure secrets directory
      ansible.builtin.file:
        path: "{{ splunk_config_secrets_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Secrets | Write secrets.yml map
      ansible.builtin.copy:
        dest: "{{ splunk_config_secrets_dir }}/secrets.yml"
        mode: "0600"
        content: |
          # Auto-written by roles/splunk_config on export.
          # Do NOT commit. Restore with --tags apply (secrets_backend=file).
          ---
          # splunk.secret values keyed by secret_<instance-label>
          {{ {'splunk_secrets': _splunk_secret_data} | to_nice_yaml(indent=2) }}
      delegate_to: localhost
      become: false
      no_log: true

    - name: Secrets | Write per-label splunk.secret files
      ansible.builtin.copy:
        dest: "{{ splunk_config_secrets_dir }}/{{ item.key | regex_replace('^secret_', 'splunk.secret.') }}"
        content: "{{ item.value }}"
        mode: "0600"
      loop: "{{ _splunk_secret_data | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      delegate_to: localhost
      become: false
      no_log: true

    - name: Secrets | Report file store location
      ansible.builtin.debug:
        msg: >-
          Stored {{ _splunk_secret_data | length }} splunk.secret value(s) under
          {{ splunk_config_secrets_dir }} (flat files; not for git).

# ── vault backend (optional; soft-fail; no collection required at parse time) ─
- name: Secrets | Write HashiCorp Vault store (optional)
  when:
    - (splunk_config_secrets_backend | default('file')) == 'vault'
    - (_splunk_secret_data | default({})) | length > 0
    - (splunk_config_vault_addr | default('') | length) > 0
    - (splunk_config_vault_mount | default('') | length) > 0
  block:
    - name: Secrets | vault_kv2_write
      community.hashi_vault.vault_kv2_write:
        url: "{{ splunk_config_vault_addr }}"
        engine_mount_point: "{{ splunk_config_vault_mount }}"
        path: "{{ splunk_config_vault_path }}"
        data: "{{ _splunk_secret_data }}"
      delegate_to: localhost
      become: false
      no_log: true
      register: _vault_secret_write
      ignore_errors: true

    - name: Secrets | Warn when Vault write failed
      ansible.builtin.debug:
        msg: >-
          Vault write soft-failed
          ({{ _vault_secret_write.msg | default('see previous task') }}).
          Snapshot export still succeeded. Set secrets_backend=file to use flat files.
      when: _vault_secret_write is failed

- name: Secrets | Vault backend missing endpoint
  ansible.builtin.debug:
    msg: >-
      secrets_backend=vault but splunk_config_vault_addr / vault_mount empty —
      secrets not stored. Use secrets_backend=file (default) for flat files.
  when:
    - (splunk_config_secrets_backend | default('file')) == 'vault'
    - (_splunk_secret_data | default({})) | length > 0
    - (splunk_config_vault_addr | default('') | length) == 0
      or (splunk_config_vault_mount | default('') | length) == 0
