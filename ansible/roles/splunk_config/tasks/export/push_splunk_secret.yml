---
# Collect every captured splunk.secret and write them to Vault in ONE full PUT
# (all secret_<label> fields at once, on a dedicated path → no partial-clobber
# risk). Restored on apply so $7$-encrypted conf values stay decryptable.
#
# Soft-fail: a Vault outage or permission error must not abort export — the
# scrubbed snapshot is still the primary retrieve artifact.

- name: Secret | Find captured splunk.secret files
  ansible.builtin.find:
    paths: "{{ splunk_config_raw_dir }}"
    patterns: splunk.secret
    recurse: true
  delegate_to: localhost
  become: false
  register: _secret_files

- name: Secret | Read each splunk.secret
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  delegate_to: localhost
  become: false
  loop: "{{ _secret_files.files }}"
  loop_control:
    label: "{{ item.path | regex_replace('^.*/([^/]+)/etc/.*$', '\\1') }}"
  register: _secret_blobs
  no_log: true
  when: (_secret_files.files | default([])) | length > 0

- name: Secret | Assemble the label→secret map
  ansible.builtin.set_fact:
    _splunk_secret_data: >-
      {{ dict(_secret_blobs.results
              | selectattr('content', 'defined')
              | map(attribute='item.path')
              | map('regex_replace', '^.*/([^/]+)/etc/.*$', 'secret_\\1')
              | zip(_secret_blobs.results
                    | selectattr('content', 'defined')
                    | map(attribute='content')
                    | map('b64decode') | map('trim'))) }}
  no_log: true
  when: (_secret_files.files | default([])) | length > 0

- name: Secret | Write splunk.secret map to Vault
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_addr }}"
    engine_mount_point: "{{ splunk_config_vault_mount }}"
    path: "{{ splunk_config_vault_path }}"
    data: "{{ _splunk_secret_data }}"
  delegate_to: localhost
  become: false
  no_log: true
  register: _vault_secret_write
  # Soft-fail: export must still complete when Vault is down/unreachable.
  ignore_errors: true
  when:
    - (_splunk_secret_data | default({})) | length > 0

- name: Secret | Warn when Vault write failed
  ansible.builtin.debug:
    msg: >-
      Vault write of splunk.secret soft-failed
      ({{ _vault_secret_write.msg | default('see previous task') }}).
      Snapshot export still succeeded; re-run export once Vault is reachable
      or push secrets manually before apply reseed.
  when:
    - (_splunk_secret_data | default({})) | length > 0
    - _vault_secret_write is defined
    - _vault_secret_write is failed
