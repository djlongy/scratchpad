---
- name: Run FreeIPA health check before IDAM operations
  ansible.builtin.include_tasks:
    file: idam_health_check.yml
    apply:
      tags: [freeipa_server, freeipa, idam, health_check]
  tags: [freeipa_server, freeipa, idam, health_check]

# Re-entry guard. The facts below are built with loop accumulators
# (set_fact: x = "{{ (x | default([])) + [item] }}"). If idam.yml is ever included
# twice in one play, a second pass would APPEND onto the first pass's list instead of
# rebuilding — duplicating every group/user and tripping the module's "X used more than
# once" check. Reset them to [] up front so each invocation rebuilds from empty; harmless
# on the normal single-include path. (The playbook should not include idam.yml twice;
# this makes the task file self-defending.)
- name: Reset IDAM accumulator facts (re-entry safe)
  ansible.builtin.set_fact:
    _freeipa_users_roled: []
    freeipa_idam_user_group_pairs: []
    freeipa_idam_usergroups_effective: []
    freeipa_idam_users_effective: []

# Fail fast on gross TYPE errors BEFORE any task consumes these vars — the RBAC
# expander, the service/break-glass merge, the role lookup and the item-level scan
# all iterate these and assume real lists. `is iterable` is NOT enough: a bare
# string and a dict are both iterable in Python, so `freeipa_idam_users: "oops"`
# (or a base list passed as `-e key=value`, which arrives as a STRING) would slip
# through and then blow up later with a cryptic, no_log-censored error. Require an
# actual list: a sequence that is neither a string nor a mapping. Runs BEFORE the
# expander so malformed BASE input is caught with a clear message first; the RBAC
# inputs are checked too (default([]) so undefined is fine). Reports all at once.
- name: Validate IDAM list variables are well-formed (must be lists)
  vars:
    _idam_typed_vars:
      freeipa_idam_users: "{{ freeipa_idam_users }}"
      freeipa_idam_usergroups: "{{ freeipa_idam_usergroups }}"
      freeipa_idam_roles: "{{ freeipa_idam_roles }}"
      freeipa_idam_hostgroups: "{{ freeipa_idam_hostgroups }}"
      freeipa_idam_hbacsvcs: "{{ freeipa_idam_hbacsvcs }}"
      freeipa_idam_hbacsvcgroups: "{{ freeipa_idam_hbacsvcgroups }}"
      freeipa_idam_hbac_rules: "{{ freeipa_idam_hbac_rules }}"
      freeipa_idam_sudo_commands: "{{ freeipa_idam_sudo_commands }}"
      freeipa_idam_sudocmdgroups: "{{ freeipa_idam_sudocmdgroups }}"
      freeipa_idam_sudo_rules: "{{ freeipa_idam_sudo_rules }}"
      freeipa_idam_permissions: "{{ freeipa_idam_permissions }}"
      freeipa_idam_privileges: "{{ freeipa_idam_privileges }}"
      freeipa_idam_iparoles: "{{ freeipa_idam_iparoles }}"
      freeipa_idam_pwpolicies: "{{ freeipa_idam_pwpolicies }}"
      freeipa_idam_service_accounts: "{{ freeipa_idam_service_accounts }}"
      freeipa_idam_breakglass_accounts: "{{ freeipa_idam_breakglass_accounts }}"
      freeipa_idam_password_expiration_floors: "{{ freeipa_idam_password_expiration_floors }}"
    # A real list = sequence AND NOT string AND NOT mapping. Collect the names of
    # any var that fails that (non-sequences via reject, strings + dicts via select).
    _idam_bad_types: >-
      {{ (
           (_idam_typed_vars | dict2items | rejectattr('value', 'sequence') | map(attribute='key') | list)
         + (_idam_typed_vars | dict2items | selectattr('value', 'string')   | map(attribute='key') | list)
         + (_idam_typed_vars | dict2items | selectattr('value', 'mapping')  | map(attribute='key') | list)
         ) | unique }}
  ansible.builtin.assert:
    that:
      - freeipa_idam_managed_group | length > 0
      - _idam_bad_types | length == 0
    fail_msg: >-
      These freeipa_idam_* variables must be LISTS but are not: {{ _idam_bad_types | join(', ') }}.
      A bare string or a single dict is the usual cause — wrap single items in a list ([ ... ]).
      Note: base lists passed via `-e key=value` arrive as strings; use group_vars/vars_files
      or JSON extra-vars (`-e '{"var": [ ... ]}'`).
    quiet: true

# Accept bare-string shorthand for the name-only object lists: a `cockpit` entry is
# normalized to `{name: cockpit}` so terse input (and older exports) work alongside the
# full `{name: ..., description: ...}` form — without crashing the downstream
# `map(attribute='name')` validation with "'str object' has no attribute 'name'".
# Runs AFTER the list-type guard above (so non-lists are already rejected) and BEFORE the
# validation/create tasks that read these by `.name`.
- name: Normalize name-only IDAM lists (accept bare-string shorthand)
  ansible.builtin.set_fact:
    freeipa_idam_hbacsvcs: "{{ freeipa_idam_hbacsvcs | freeipa_idam_named }}"
    freeipa_idam_sudo_commands: "{{ freeipa_idam_sudo_commands | freeipa_idam_named }}"

# Fold the separate account-type lists into the working user set so they flow
# through the SAME validation/create/group/marker pipeline — but with their
# distinguishing attributes. Service accounts get the nologin shell. Break-glass
# accounts stay login-enabled and are auto-added to freeipa_idam_protected_users
# (never deleted/archived). Kept as separate INPUT lists purely for explicit intent.
#
# Writes the INTERNAL fact _freeipa_idam_users_base (never the public
# freeipa_idam_users) so the merge holds even when users are supplied via
# extra-vars, which outrank set_fact — same robustness contract as the role-
# expanded _freeipa_idam_users below. Always defined (base == users when no
# service/break-glass accounts), so every downstream reader can rely on it.
- name: Merge service + break-glass accounts into the working user set
  ansible.builtin.set_fact:
    _freeipa_idam_users_base: >-
      {{ freeipa_idam_users
         + (freeipa_idam_service_accounts | map('combine', {'shell': freeipa_idam_nologin_shell}) | list)
         + freeipa_idam_breakglass_accounts }}
    freeipa_idam_protected_users: >-
      {{ (freeipa_idam_protected_users
          + (freeipa_idam_breakglass_accounts | map(attribute='name') | list)) | unique }}
  no_log: true

# Roles matrix: a role is a named bundle of groups, and a user references the
# roles it belongs to instead of a long flat group list. Here we expand each
# user's `roles` into concrete group memberships (merged with any direct
# `groups`) and drop the `roles` key, so every task below sees the familiar
# users-with-groups shape — no other change needed. A user's effective groups =
# the union of all its roles' groups.
- name: Build role -> groups lookup
  ansible.builtin.set_fact:
    _freeipa_role_groups: >-
      {{ dict(freeipa_idam_roles | map(attribute='name')
              | zip(freeipa_idam_roles | map(attribute='groups'))) }}
  when: freeipa_idam_roles | length > 0

# DEPRECATED-SCHEMA GUARD. The group/service/cmd field names were renamed to match
# the (unambiguous) community module params, and the top-level list is now
# freeipa_idam_usergroups. Fail LOUDLY on any old name so a stale snapshot can't
# silently drop HBAC/sudo members and change access. Re-export to migrate (the
# exporter now emits the new names), or rename in place per the fail_msg.
- name: Reject deprecated IDAM field/var names (renamed for disambiguation)
  ansible.builtin.assert:
    that:
      - freeipa_idam_groups is not defined
      - freeipa_idam_hbac_rules | selectattr('group', 'defined') | list | length == 0
      - freeipa_idam_hbac_rules | selectattr('hbacsvc', 'defined') | list | length == 0
      - freeipa_idam_hbac_rules | selectattr('hbacsvcgroup', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('group', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('allow_sudocmd', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('deny_sudocmd', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('allow_sudocmdgroup', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('deny_sudocmdgroup', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('sudooption', 'defined') | list | length == 0
      - freeipa_idam_iparoles | selectattr('group', 'defined') | list | length == 0
    fail_msg: >-
      Deprecated FreeIPA IDAM field/var names detected. Schema was renamed to match
      the community module params (singular, unambiguous): top-level
      freeipa_idam_groups -> freeipa_idam_usergroups; rule fields group -> usergroup,
      hbacsvc -> service, hbacsvcgroup -> servicegroup, allow_sudocmd -> cmd,
      deny_sudocmd -> deny_cmd, allow_sudocmdgroup -> cmdgroup,
      deny_sudocmdgroup -> deny_cmdgroup, sudooption -> sudoopt. Re-export the
      snapshot or rename in place.

# SURGICAL VALIDATION: collect EVERY referential/structural problem in one pass and
# report them all at once at the end — so a bad item 2000 lines into a large dict
# shows up as a precise, complete bullet list, instead of one assert you have to
# scroll up through the log to find. Accepts first/givenname and last/sn (ipauser
# aliases); protected users (admin) are exempt from the first/last requirement
# because their attributes cannot be set (see the payload task below).
- name: Collect all IDAM validation problems
  ansible.builtin.set_fact:
    _freeipa_idam_problems: "{{ (_freeipa_idam_problems_yaml | from_yaml) or [] }}"
  vars:
    _gnames: "{{ freeipa_idam_usergroups | map(attribute='name') | list }}"
    _rnames: "{{ freeipa_idam_roles | map(attribute='name') | list }}"
    _unames: "{{ _freeipa_idam_users_base | map(attribute='name', default='(unnamed)') | list }}"
    # Foundation object names a rule may reference. HBAC services include the stock
    # set (sshd, sudo, ...) that always exist; the rest must be declared. These are
    # the dependencies FreeIPA HARD-REJECTS ("hbacsvc/sudocmd ...: no such entry"), so
    # catch them here with a clear message instead of a cryptic module failure.
    _hbacsvc_names: "{{ (freeipa_server_export_hbacsvc_stock | default([])) + (freeipa_idam_hbacsvcs | map(attribute='name') | list) }}"
    _hbacsvcgrp_names: "{{ freeipa_idam_hbacsvcgroups | map(attribute='name') | list }}"
    _sudocmd_names: "{{ freeipa_idam_sudo_commands | map(attribute='name') | list }}"
    _sudocmdgrp_names: "{{ freeipa_idam_sudocmdgroups | map(attribute='name') | list }}"
    _freeipa_idam_problems_yaml: |-
      {% for r in freeipa_idam_roles %}
      {% for g in (r.groups | default([])) %}
      {% if g not in _gnames %}
      - "role '{{ r.name }}' references unknown group '{{ g }}'"
      {% endif %}
      {% endfor %}{% endfor %}
      {% for u in _freeipa_idam_users_base %}
      {% if u.name is not defined %}
      - "a user entry is missing 'name'"
      {% else %}
      {% if (u.name not in freeipa_idam_unmodifiable_users) and (u.first is not defined) and (u.givenname is not defined) %}
      - "user '{{ u.name }}' is missing a first name (first/givenname)"
      {% endif %}
      {% if (u.name not in freeipa_idam_unmodifiable_users) and (u.last is not defined) and (u.sn is not defined) %}
      - "user '{{ u.name }}' is missing a surname (last/sn)"
      {% endif %}
      {% if (u.groups | default([]) | length == 0) and (u.roles | default([]) | length == 0) %}
      - "user '{{ u.name }}' has no groups and no roles (must belong to at least one)"
      {% endif %}
      {% for rn in (u.roles | default([])) %}
      {% if rn not in _rnames %}
      - "user '{{ u.name }}' references unknown role '{{ rn }}'"
      {% endif %}
      {% endfor %}
      {% for g in (u.groups | default([])) %}
      {% if g not in _gnames %}
      - "user '{{ u.name }}' references unknown group '{{ g }}'"
      {% endif %}
      {% endfor %}
      {% endif %}
      {% endfor %}
      {% for n in (_unames | unique) %}
      {% if (_unames | select('equalto', n) | list | length) > 1 %}
      - "duplicate username '{{ n }}' ({{ _unames | select('equalto', n) | list | length }} entries)"
      {% endif %}
      {% endfor %}
      {% for g in freeipa_idam_usergroups %}
      {% if (g.state | default('present')) == 'absent' and g.name in freeipa_idam_protected_groups %}
      - "group '{{ g.name }}' is a protected FreeIPA built-in — refusing state: absent (would delete core schema)"
      {% endif %}
      {% endfor %}
      {% for h in freeipa_idam_hbac_rules %}
      {% for s in (h.service | default([])) %}
      {% if s not in _hbacsvc_names %}
      - "HBAC rule '{{ h.name }}' references HBAC service '{{ s }}' that is not stock and not in freeipa_idam_hbacsvcs"
      {% endif %}
      {% endfor %}
      {% for sg in (h.servicegroup | default([])) %}
      {% if sg not in _hbacsvcgrp_names %}
      - "HBAC rule '{{ h.name }}' references service group '{{ sg }}' not in freeipa_idam_hbacsvcgroups"
      {% endif %}
      {% endfor %}{% endfor %}
      {% for s in freeipa_idam_sudo_rules %}
      {% for c in (s.cmd | default([])) + (s.deny_cmd | default([])) %}
      {% if c not in _sudocmd_names %}
      - "sudo rule '{{ s.name }}' references sudo command '{{ c }}' not in freeipa_idam_sudo_commands"
      {% endif %}
      {% endfor %}
      {% for cg in (s.cmdgroup | default([])) + (s.deny_cmdgroup | default([])) %}
      {% if cg not in _sudocmdgrp_names %}
      - "sudo rule '{{ s.name }}' references sudo command group '{{ cg }}' not in freeipa_idam_sudocmdgroups"
      {% endif %}
      {% endfor %}{% endfor %}
  no_log: true

- name: Report all IDAM validation problems at once
  ansible.builtin.assert:
    that: _freeipa_idam_problems | length == 0
    quiet: true
    fail_msg: |-
      FreeIPA IDAM validation failed — fix these {{ _freeipa_idam_problems | length }} item(s):
      {% for p in _freeipa_idam_problems %}
        - {{ p }}
      {% endfor %}

- name: Expand user roles into group memberships
  ansible.builtin.set_fact:
    _freeipa_users_roled: >-
      {{ (_freeipa_users_roled | default([])) + [
           (item | dict2items | rejectattr('key', 'equalto', 'roles') | items2dict)
           | combine({'groups': (
               (item.groups | default([]))
               + (item.roles | default([]) | map('extract', _freeipa_role_groups) | flatten)
             ) | unique })
         ] }}
  loop: "{{ _freeipa_idam_users_base }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_roles | length > 0
  no_log: true

# Downstream tasks consume this internal fact (never the public freeipa_idam_users)
# so that role expansion holds even when users are supplied via extra-vars, which
# outrank set_fact. role-expanded when roles are used, else the users as given.
# Pick the role-expanded set ONLY when roles are actually used. NB: must test
# freeipa_idam_roles length, NOT `_freeipa_users_roled | default(...)` — the re-entry
# guard resets _freeipa_users_roled to [] (defined-but-empty), and default() only
# substitutes on UNDEFINED, so the old default() form collapsed users to [] whenever no
# roles were declared (the common case, incl. every matrix run) and silently processed
# zero users.
- name: Resolve effective users (role-expanded when roles are used)
  ansible.builtin.set_fact:
    _freeipa_idam_users: "{{ _freeipa_users_roled if (freeipa_idam_roles | length > 0) else _freeipa_idam_users_base }}"

- name: Build desired FreeIPA username list
  ansible.builtin.set_fact:
    freeipa_idam_desired_usernames: "{{ _freeipa_idam_users | map(attribute='name') | list | unique }}"

- name: Build declarative FreeIPA group name list
  ansible.builtin.set_fact:
    freeipa_idam_group_names: "{{ freeipa_idam_usergroups | map(attribute='name') | list | unique }}"

- name: Build requested user->group memberships from user entries
  ansible.builtin.set_fact:
    freeipa_idam_user_group_pairs: "{{ (freeipa_idam_user_group_pairs | default([])) + [ {'user': item.0.name, 'group': item.1} ] }}"
  loop: "{{ _freeipa_idam_users | subelements('groups', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} -> {{ item.1 }}"
  no_log: true

- name: Build effective FreeIPA groups with merged memberships
  ansible.builtin.set_fact:
    freeipa_idam_usergroups_effective: "{{ (freeipa_idam_usergroups_effective | default([])) + [item | combine(_freeipa_idam_group_user_block, recursive=True)] }}"
  vars:
    _freeipa_idam_users_from_group_entry: "{{ item.user | default([]) }}"
    _freeipa_idam_users_from_user_entries: >-
      {{
        (freeipa_idam_user_group_pairs | default([]))
        | selectattr('group', 'equalto', item.name)
        | map(attribute='user')
        | list
      }}
    _freeipa_idam_merged_users: "{{ (_freeipa_idam_users_from_group_entry + _freeipa_idam_users_from_user_entries) | unique }}"
    _freeipa_idam_group_user_block: "{{ {'user': _freeipa_idam_merged_users} if (_freeipa_idam_merged_users | length > 0) else {} }}"
  loop: "{{ freeipa_idam_usergroups }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_usergroups | length > 0
  no_log: true

# Build the two BULK ipagroup payloads — one `groups:` list to create the group
# OBJECTS (name/description/gidnumber/posix), one to set MEMBERSHIP (user/group/
# membermanager). Splitting create from member keeps the dependency order intact
# (groups must exist before HBAC rules reference them; membership needs users to
# exist) while collapsing two per-group LOOPS into two single module calls — the
# speedup. gidnumber: a group's own value wins, else the freeipa_idam_group_gids
# map (deterministic GIDs), else IPA auto-assigns.
- name: Build bulk ipagroup create + membership payloads
  ansible.builtin.set_fact:
    _freeipa_idam_usergroups_create: "{{ (_fc_yaml | from_yaml) or [] }}"
    _freeipa_idam_usergroups_members: "{{ (_fm_yaml | from_yaml) or [] }}"
  vars:
    _fc_yaml: |-
      {% for g in (freeipa_idam_usergroups_effective | default([])) %}
      {% if (g.state | default('present')) != 'absent' %}
      {% set _gid = g.gidnumber | default(freeipa_idam_group_gids[g.name] | default('')) %}
      - {name: "{{ g.name }}"{% if g.description is defined %}, description: "{{ g.description }}"{% endif %}{% if _gid | string | length > 0 %}, gidnumber: {{ _gid }}{% endif %}{% if g.posix is defined %}, posix: {{ g.posix | to_json }}{% endif %}{% if g.nonposix is defined %}, nonposix: {{ g.nonposix | to_json }}{% endif %}}
      {% endif %}
      {% endfor %}
    _fm_yaml: |-
      {% for g in (freeipa_idam_usergroups_effective | default([])) %}
      {% if (g.state | default('present')) != 'absent' and ((g.user | default([]) | length > 0) or (g.group | default([]) | length > 0) or (g.membermanager_user | default([]) | length > 0) or (g.membermanager_group | default([]) | length > 0)) %}
      - {name: "{{ g.name }}"{% if g.user | default([]) | length > 0 %}, user: {{ g.user | to_json }}{% endif %}{% if g.group | default([]) | length > 0 %}, group: {{ g.group | to_json }}{% endif %}{% if g.membermanager_user | default([]) | length > 0 %}, membermanager_user: {{ g.membermanager_user | to_json }}{% endif %}{% if g.membermanager_group | default([]) | length > 0 %}, membermanager_group: {{ g.membermanager_group | to_json }}{% endif %}}
      {% endif %}
      {% endfor %}
  no_log: true

# Protected/system users (admin) are EXCLUDED from the create/mod payload: the
# `admin` entry lacks the inetOrgPerson objectClass, so FreeIPA refuses to set
# givenName on it ("attribute givenName not allowed") and the whole ipauser task
# fails. Their GROUP memberships are still applied — that happens via the group
# tasks (ipagroup action: member), independent of user-mod — so you can still add
# admin to groups, you just never try to modify admin's identity attributes.
- name: Build FreeIPA users payload without local-only keys (skip protected users)
  ansible.builtin.set_fact:
    freeipa_idam_users_effective: >-
      {{ (freeipa_idam_users_effective | default([]))
         + [ (item | dict2items | rejectattr('key', 'equalto', 'groups')
                   | rejectattr('key', 'equalto', 'roles') | items2dict)
             | combine(_freeipa_idam_email_default) | combine(_freeipa_idam_pw_default) ] }}
  vars:
    # Default email = <name>@<email_domain> only when the user gave no explicit one.
    _freeipa_idam_email_default: >-
      {{ {} if (item.email is defined)
         else {'email': [item.name ~ '@' ~ freeipa_idam_email_domain]} }}
    # Default create-time password (update_password: on_create never resets existing).
    _freeipa_idam_pw_default: >-
      {{ {} if (item.password is defined or (freeipa_idam_default_user_password | length == 0))
         else {'password': freeipa_idam_default_user_password} }}
  loop: "{{ _freeipa_idam_users | rejectattr('name', 'in', freeipa_idam_unmodifiable_users) | list }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  no_log: true

- name: Resolve FreeIPA admin password (declared var first, Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_server_admin_password: >-
      {{ freeipa_server_admin_password
         if (freeipa_server_admin_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_server_vault_secret + ':' + freeipa_server_admin_password_field) }}
  no_log: true
  delegate_to: localhost
  become: false

# Reactivate (undel) any DECLARED user that currently exists only as a PRESERVED (archived)
# entry. Without this, re-declaring a previously-removed user is a no-op at create time (the
# name still "exists" in cn=deleted), and the later membership add fails hard with
# "no such entry" — blocking the whole run. Bounded + idempotent: only undeletes preserved
# users whose name is back in the desired set. Needs the IPA CLI, so a short kinit window.
- name: Reactivate declared-but-preserved users (re-onboard safety)
  when:
    - freeipa_idam_reactivate_preserved | bool
    - freeipa_idam_desired_usernames | length > 0
  block:
    - name: Acquire Kerberos ticket to find preserved users
      ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}"
      args:
        stdin: "{{ _freeipa_server_admin_password }}"
      changed_when: false
      check_mode: false
      no_log: true

    - name: Find currently-preserved (archived) users
      ansible.builtin.command: "ipa user-find --preserved=true --pkey-only --sizelimit=0"
      register: _freeipa_idam_preserved_find
      changed_when: false
      check_mode: false
      failed_when: false

    - name: Compute declared users that are currently preserved
      ansible.builtin.set_fact:
        _freeipa_idam_to_reactivate: >-
          {{ (_freeipa_idam_preserved_find.stdout_lines | default([]) | map('trim')
              | select('match', '^User login:')
              | map('regex_replace', '^User login: ', '') | list)
             | intersect(freeipa_idam_desired_usernames) }}

    - name: Reactivate (undel) preserved users that are re-declared
      ansible.builtin.command: "ipa user-undel {{ item | quote }}"
      loop: "{{ _freeipa_idam_to_reactivate }}"
      loop_control:
        label: "{{ item }}"
      changed_when: true

    - name: Destroy reactivation Kerberos ticket
      ansible.builtin.command: kdestroy
      changed_when: false
      check_mode: false
      failed_when: false

# BULK create — one ipagroup call for ALL groups (name/description/gidnumber/posix),
# replacing the per-group loop. Runs before HBAC/sudo so rules can reference groups.
- name: Ensure declarative FreeIPA groups are present (bulk create)
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    groups: "{{ _freeipa_idam_usergroups_create }}"
    state: present
  when: (_freeipa_idam_usergroups_create | default([])) | length > 0
  register: _freeipa_idam_changed_groups
  no_log: true

# Users are created HERE — before any HBAC/sudo rule-membership task that
# references them. On a fresh server they would otherwise not exist yet and the
# membership tasks fail with "user ...: no such entry". Group memberships are
# still applied later (once both users and groups exist).
- name: Ensure declarative users are present
  freeipa.ansible_freeipa.ipauser:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    users: "{{ freeipa_idam_users_effective | default([]) }}"
    update_password: on_create
    state: present
  when: (freeipa_idam_users_effective | default([])) | length > 0
  register: _freeipa_idam_changed_users
  no_log: true

- name: Ensure declarative FreeIPA password policies are present
  freeipa.ansible_freeipa.ipapwpolicy:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    maxlife: "{{ item.maxlife | default(omit) }}"
    minlife: "{{ item.minlife | default(omit) }}"
    history: "{{ item.history | default(omit) }}"
    minclasses: "{{ item.minclasses | default(omit) }}"
    minlength: "{{ item.minlength | default(omit) }}"
    priority: "{{ item.priority | default(omit) }}"
    maxfail: "{{ item.maxfail | default(omit) }}"
    failinterval: "{{ item.failinterval | default(omit) }}"
    lockouttime: "{{ item.lockouttime | default(omit) }}"
    gracelimit: "{{ item.gracelimit | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_pwpolicies }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_pwpolicies | length > 0
  no_log: true

- name: Ensure declarative FreeIPA hostgroups are present
  freeipa.ansible_freeipa.ipahostgroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    host: "{{ item.host | default(omit) }}"
    hostgroup: "{{ item.hostgroup | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_hostgroups }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_hostgroups | length > 0
  no_log: true

# Seed CUSTOM HBAC services before any rule membership references them. Stock
# services (sshd, sudo, …) already exist on every server; custom ones do not, so
# on a fresh server the membership task would fail with "hbacsvc ...: no such
# entry". Idempotent — re-declaring an existing service is a no-op.
- name: Ensure custom HBAC services are present
  freeipa.ansible_freeipa.ipahbacsvc:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_hbacsvcs }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_hbacsvcs | length > 0
  no_log: true

# HBAC service GROUPS — bundle custom/stock services (e.g. docker + xrdp-sesman +
# sshd → "remote-access") so an HBAC rule can grant a whole bundle via servicegroup
# instead of listing each service. Created AFTER the services above, BEFORE the
# rules below that reference them. Rich-dict: name + hbacsvc members in one call;
# default action reconciles membership (declarative). Field names = ipahbacsvcgroup
# params (hbacsvc).
- name: Ensure declarative HBAC service groups are present (group + members in one pass)
  freeipa.ansible_freeipa.ipahbacsvcgroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    hbacsvc: "{{ item.hbacsvc | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_hbacsvcgroups }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_hbacsvcgroups | length > 0
  no_log: true

# ONE rich-dict call per rule. With the default action ('hbacrule') and
# state: present, the module creates the rule AND reconciles its members in the
# same call — it builds add+del lists, so membership is fully declarative
# (undeclared members are removed), exactly like the hostgroup task above.
# Category rules (usercategory: all, …) simply omit the member lists. Member
# principals (users/groups/hostgroups/hbacsvcs) are all created in earlier tasks,
# so they resolve here. Operational state (enabled/disabled) is a separate pass
# below: the module forbids member params alongside states enabled/disabled.
- name: Ensure declarative HBAC rules are present (rule + members in one pass)
  freeipa.ansible_freeipa.ipahbacrule:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    usercategory: "{{ item.usercategory | default(omit) }}"
    hostcategory: "{{ item.hostcategory | default(omit) }}"
    servicecategory: "{{ item.servicecategory | default(omit) }}"
    user: "{{ item.user | default(omit) }}"
    group: "{{ item.usergroup | default(omit) }}"
    host: "{{ item.host | default(omit) }}"
    hostgroup: "{{ item.hostgroup | default(omit) }}"
    hbacsvc: "{{ item.service | default(omit) }}"
    hbacsvcgroup: "{{ item.servicegroup | default(omit) }}"
    state: "{{ 'absent' if (item.state | default('present')) == 'absent' else 'present' }}"
  loop: "{{ freeipa_idam_hbac_rules }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_hbac_rules | length > 0
  no_log: true

- name: Ensure declarative HBAC rule operational states
  freeipa.ansible_freeipa.ipahbacrule:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    state: "{{ item.state }}"
  loop: "{{ freeipa_idam_hbac_rules }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when:
    - freeipa_idam_hbac_rules | length > 0
    - item.state is defined
    - item.state in ['enabled', 'disabled']
  no_log: true

# Disable named HBAC rules (e.g. the stock allow_all / allow_all_hosts) — agnostic,
# list-driven, reversible (state: disabled, not deleted). Runs AFTER the declarative
# rules above so required access exists first. Lockout guard: refuses if no managed
# policy is declared (disabling the default allow rules on an empty policy locks
# everyone out). To EMPTY a rule's members instead, declare it with user: [] above.
- name: Disable named HBAC rules (opt-in hardening)
  when: freeipa_idam_hbac_rules_disable | length > 0
  block:
    - name: Refuse to disable HBAC rules without a declared access policy
      ansible.builtin.assert:
        that:
          - freeipa_idam_hbac_rules | length > 0
        fail_msg: >-
          Refusing to disable {{ freeipa_idam_hbac_rules_disable | join(', ') }}:
          no HBAC rules are declared in freeipa_idam_hbac_rules, so disabling the
          stock allow rules would lock everyone out. Declare your access policy first.
    - name: Disable each listed HBAC rule (reversible — state disabled)
      freeipa.ansible_freeipa.ipahbacrule:
        ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
        ipaadmin_password: "{{ _freeipa_server_admin_password }}"
        name: "{{ item }}"
        state: disabled
      loop: "{{ freeipa_idam_hbac_rules_disable }}"
      loop_control:
        label: "{{ item }}"
      no_log: true

- name: Ensure declarative sudo commands are present
  freeipa.ansible_freeipa.ipasudocmd:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_sudo_commands }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_sudo_commands | length > 0
  no_log: true

# Sudo command GROUPS — bundle commands so a sudo rule can grant a whole set via
# cmdgroup/deny_cmdgroup instead of listing each. Created AFTER the commands above,
# BEFORE the rules below that reference them. Rich-dict: name + sudocmd members in
# one call (declarative reconcile). Field names = ipasudocmdgroup params (sudocmd).
- name: Ensure declarative sudo command groups are present (group + members in one pass)
  freeipa.ansible_freeipa.ipasudocmdgroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    sudocmd: "{{ item.sudocmd | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_sudocmdgroups }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_sudocmdgroups | length > 0
  no_log: true

# ONE rich-dict call per rule, same pattern as the HBAC rules above: the default
# action ('sudorule') with state: present creates the rule AND reconciles its
# members (hosts, users, allow/deny cmds, options, runas) in the same call —
# declarative add+del. cmds referenced via allow/deny_sudocmd are created in the
# sudo-commands task above, so they resolve here. Operational state
# (enabled/disabled) is a separate pass below.
- name: Ensure declarative sudo rules are present (rule + members in one pass)
  freeipa.ansible_freeipa.ipasudorule:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    usercategory: "{{ item.usercategory | default(omit) }}"
    hostcategory: "{{ item.hostcategory | default(omit) }}"
    cmdcategory: "{{ item.cmdcategory | default(omit) }}"
    runasusercategory: "{{ item.runasusercategory | default(omit) }}"
    runasgroupcategory: "{{ item.runasgroupcategory | default(omit) }}"
    host: "{{ item.host | default(omit) }}"
    hostgroup: "{{ item.hostgroup | default(omit) }}"
    user: "{{ item.user | default(omit) }}"
    group: "{{ item.usergroup | default(omit) }}"
    allow_sudocmd: "{{ item.cmd | default(omit) }}"
    deny_sudocmd: "{{ item.deny_cmd | default(omit) }}"
    allow_sudocmdgroup: "{{ item.cmdgroup | default(omit) }}"
    deny_sudocmdgroup: "{{ item.deny_cmdgroup | default(omit) }}"
    sudooption: "{{ item.sudoopt | default(omit) }}"
    order: "{{ item.order | default(omit) }}"
    runasuser: "{{ item.runasuser | default(omit) }}"
    runasgroup: "{{ item.runasgroup | default(omit) }}"
    state: "{{ 'absent' if (item.state | default('present')) == 'absent' else 'present' }}"
  loop: "{{ freeipa_idam_sudo_rules }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_sudo_rules | length > 0
  no_log: true

- name: Ensure declarative sudo rule operational states
  freeipa.ansible_freeipa.ipasudorule:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    state: "{{ item.state }}"
  loop: "{{ freeipa_idam_sudo_rules }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when:
    - freeipa_idam_sudo_rules | length > 0
    - item.state is defined
    - item.state in ['enabled', 'disabled']
  no_log: true

- name: Ensure managed marker group exists
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ freeipa_idam_managed_group }}"
    description: "Users managed declaratively from Git"
    state: present
  no_log: true

# DECLARATIVE GROUP-EXISTENCE reconcile (opt-in: freeipa_server_authoritative). The
# additive `ipagroup state: present` create above never deletes a group you remove from
# freeipa_idam_usergroups. To make group existence declarative we nest every declared
# group into a CONTAINER marker group here; later (in the kinit window below) we read the
# container's members and delete any that are no longer declared — exactly mirroring the
# user-marker archival. Enrollment excludes protected built-ins (never tracked/deleted).
- name: Ensure managed-groups container exists (group-existence reconcile marker)
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ freeipa_idam_managed_groups_group }}"
    description: "Container marker — groups managed declaratively from Git (group-existence reconcile)"
    state: present
  when: freeipa_server_authoritative | bool
  no_log: true

- name: Enroll declared groups into the managed-groups container (membership marker)
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ freeipa_idam_managed_groups_group }}"
    action: member
    group: "{{ _freeipa_idam_enrollable_groups }}"
    state: present
  vars:
    _freeipa_idam_enrollable_groups: "{{ freeipa_idam_group_names | difference(freeipa_idam_protected_groups) }}"
  when:
    - freeipa_server_authoritative | bool
    - _freeipa_idam_enrollable_groups | length > 0
  no_log: true

# Membership reconcile. Default = ADDITIVE (ipagroup action: member) for ALL groups —
# adds declared members, never strips, so out-of-band/system memberships (e.g. admin's)
# are safe. Opt in to DECLARATIVE with freeipa_server_authoritative: true (or with
# freeipa_idam_reconcile_memberships_only: true — SAME membership behaviour, but it
# suppresses every object/user deletion below: the safe nightly drift-revoke mode). For
# non-protected managed groups it then reconciles membership to EXACTLY what is declared —
# a user/nested-group no longer in code is REMOVED, a group with zero declared members is
# emptied. Protected/built-in groups always stay additive (never stripped).
#
# Split the desired members into the two modes. The DECLARATIVE payload is built straight
# from freeipa_idam_usergroups_effective so it includes every non-protected managed group
# (even with empty member lists → those get fully cleared); the default ipagroup action
# (group) then uses gen_add_del_lists to remove undeclared user + nested-group members
# (membermanager is left out of this payload → managers are not stripped).
- name: Build membership reconcile payloads (additive / declarative)
  ansible.builtin.set_fact:
    # Strip undeclared members when EITHER authoritative OR the membership-only mode is on.
    _freeipa_idam_strip_memberships: "{{ (freeipa_server_authoritative | bool) or (freeipa_idam_reconcile_memberships_only | bool) }}"
    _freeipa_members_protected: >-
      {{ _freeipa_idam_usergroups_members
         | selectattr('name', 'in', freeipa_idam_protected_groups | default([])) | list }}
    _freeipa_members_declarative: "{{ (_mdecl_yaml | from_yaml) or [] }}"
  vars:
    _mdecl_yaml: |-
      {% for g in (freeipa_idam_usergroups_effective | default([])) %}
      {% if (g.state | default('present')) != 'absent' and g.name not in (freeipa_idam_protected_groups | default([])) %}
      - {name: "{{ g.name }}", user: {{ g.user | default([]) | to_json }}, group: {{ g.group | default([]) | to_json }}}
      {% endif %}
      {% endfor %}
  no_log: true

- name: Ensure group memberships present — ADDITIVE (protected always; all when not declarative)
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    groups: "{{ _members_additive }}"
    action: member
    state: present
  vars:
    _members_additive: "{{ _freeipa_idam_strip_memberships | ternary(_freeipa_members_protected, _freeipa_idam_usergroups_members) }}"
  when: _members_additive | length > 0
  register: _freeipa_idam_changed_members_add
  no_log: true

- name: Reconcile group memberships DECLARATIVELY — non-protected managed groups (removes undeclared)
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    groups: "{{ _freeipa_members_declarative }}"
    # default action (group) → gen_add_del_lists reconciles user + nested-group membership
    state: present
  when:
    - _freeipa_idam_strip_memberships
    - _freeipa_members_declarative | length > 0
  register: _freeipa_idam_changed_members_decl
  no_log: true

# RBAC daisychain bottom-up: permission → privilege → role. Custom PERMISSIONS
# first (the atomic "can do X to Y" grants), then PRIVILEGES that bundle them, then
# the delegation roles below reference the privileges. Field names = ipapermission /
# ipaprivilege params. Built-in permissions/privileges are never declared here —
# only custom ones you define.
- name: Ensure declarative IPA permissions are present
  freeipa.ansible_freeipa.ipapermission:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    right: "{{ item.right | default(omit) }}"
    attrs: "{{ item.attrs | default(omit) }}"
    bindtype: "{{ item.bindtype | default(omit) }}"
    object_type: "{{ item.object_type | default(omit) }}"
    subtree: "{{ item.subtree | default(omit) }}"
    extra_target_filter: "{{ item.extra_target_filter | default(omit) }}"
    memberof: "{{ item.memberof | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_permissions }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_permissions | length > 0
  no_log: true

- name: Ensure declarative IPA privileges are present (privilege + permissions in one pass)
  freeipa.ansible_freeipa.ipaprivilege:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    permission: "{{ item.permission | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_privileges }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_privileges | length > 0
  no_log: true

# Native IPA DELEGATION roles (privileges + members) — distinct from the group-
# bundle freeipa_idam_roles. One iparole call per role (the module has no bulk
# `roles:` list), but delegation roles are few so the loop is cheap. Runs AFTER
# users + groups so user/group members resolve.
- name: Ensure native IPA delegation roles are present
  freeipa.ansible_freeipa.iparole:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ item.name }}"
    privilege: "{{ item.privilege | default(omit) }}"
    user: "{{ item.user | default(omit) }}"
    group: "{{ item.usergroup | default(omit) }}"
    host: "{{ item.host | default(omit) }}"
    hostgroup: "{{ item.hostgroup | default(omit) }}"
    service: "{{ item.service | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_idam_iparoles }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_idam_iparoles | length > 0
  no_log: true

# Break-glass accounts join the break-glass group (default: admins) for full access.
# Done as a direct membership add (the group is a built-in, not in freeipa_idam_usergroups)
# so it bypasses the declared-group validation. They stay login-enabled + protected.
- name: Add break-glass accounts to the break-glass group
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ freeipa_idam_breakglass_group }}"
    action: member
    user: "{{ freeipa_idam_breakglass_accounts | map(attribute='name') | list }}"
    state: present
  when: freeipa_idam_breakglass_accounts | length > 0
  no_log: true

# Account state controls (opt-in, list-driven, agnostic — broad over single-purpose):
#   freeipa_idam_nologin_accounts  → force an EXISTING account to the nologin shell:
#       interactive login OFF, account stays ACTIVE for API/kinit (admin keeps its powers,
#       just no shell login). freeipa_idam_nologin_shell is the shell VALUE applied.
#   freeipa_idam_disabled_accounts → ipa user-disable: the account is fully OFF and cannot
#       authenticate at all.
# Lockout guards: never fully DISABLE admin (you'd lose API admin), and only set admin to
# nologin once a break-glass account exists (else interactive admin is locked out with no
# alternative).
- name: Manage account login / enabled state (opt-in, list-driven)
  vars:
    _freeipa_idam_nologin_effective: "{{ freeipa_idam_nologin_accounts | default([]) | unique }}"
  when: (_freeipa_idam_nologin_effective | length > 0)
        or ((freeipa_idam_disabled_accounts | default([])) | length > 0)
  block:
    - name: Guard account-state changes against admin lockout
      ansible.builtin.assert:
        that:
          - "'admin' not in (freeipa_idam_disabled_accounts | default([]))"
          - >-
            ('admin' not in _freeipa_idam_nologin_effective)
            or ((freeipa_idam_breakglass_accounts | default([])) | length > 0)
        fail_msg: >-
          Refusing account-state change — never fully DISABLE 'admin' (you'd lose API
          admin), and only set 'admin' to nologin once at least one
          freeipa_idam_breakglass_account is declared (else interactive admin is locked
          out with no alternative).
        quiet: true

    - name: Force existing accounts to a nologin shell (login off, account active)
      freeipa.ansible_freeipa.ipauser:
        ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
        ipaadmin_password: "{{ _freeipa_server_admin_password }}"
        name: "{{ item }}"
        shell: "{{ freeipa_idam_nologin_shell }}"
        state: present
      loop: "{{ _freeipa_idam_nologin_effective }}"
      loop_control:
        label: "{{ item }}"
      when: _freeipa_idam_nologin_effective | length > 0
      no_log: true

    - name: Disable accounts entirely (cannot authenticate)
      freeipa.ansible_freeipa.ipauser:
        ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
        ipaadmin_password: "{{ _freeipa_server_admin_password }}"
        name: "{{ item }}"
        state: disabled
      loop: "{{ freeipa_idam_disabled_accounts | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: (freeipa_idam_disabled_accounts | default([])) | length > 0
      no_log: true

- name: Ensure managed users are members of marker group
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ freeipa_idam_managed_group }}"
    action: member
    user: "{{ freeipa_idam_desired_usernames }}"
    state: present
  when: freeipa_idam_desired_usernames | length > 0
  no_log: true

- name: Acquire Kerberos ticket for current membership discovery
  ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}"
  args:
    stdin: "{{ _freeipa_server_admin_password }}\n"
  changed_when: false
  no_log: true

- name: Read current members of marker group
  ansible.builtin.command: "ipa group-show {{ freeipa_idam_managed_group }} --all --raw"
  register: _freeipa_idam_managed_group
  changed_when: false

# `ipa group-show --all --raw` returns members as raw LDAP `member:` DN lines
# (member: uid=<user>,cn=users,...), NOT a friendly `member_user:` attribute — so
# the old `member_user:` regex matched nothing and the delete was a silent no-op.
# Select the user-DN lines by the literal `uid=` (skips nested group members,
# which are cn=...,cn=groups) and pull out the uid. NB: avoid `\s`/`\d`-style
# regex classes here — in a folded (>-) scalar YAML does not unescape them, so they
# reach the regex as a literal backslash; stick to literal text + `[^,]`.
- name: Build current marker-group user list
  ansible.builtin.set_fact:
    freeipa_idam_current_managed_users: >-
      {{ _freeipa_idam_managed_group.stdout_lines | map('trim')
         | select('search', 'uid=')
         | map('regex_replace', '.*uid=([^,]+).*', '\1') | list }}

- name: Build declarative user delete list
  ansible.builtin.set_fact:
    freeipa_idam_users_to_remove: >-
      {{
        freeipa_idam_current_managed_users
        | difference(freeipa_idam_desired_usernames)
        | difference(freeipa_idam_protected_users)
      }}
  when: not (freeipa_idam_reconcile_memberships_only | bool)   # membership-only mode never archives users

# Archive (don't destroy) users removed from declarative config: bulk ipauser with
# preserve=true → user-del --preserve (deactivated + retained, recoverable). Set
# freeipa_idam_preserve_archived=false to hard-delete instead. One bulk call.
- name: Archive (preserve) users removed from declarative config
  freeipa.ansible_freeipa.ipauser:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ freeipa_idam_users_to_remove }}"
    state: absent
    preserve: "{{ freeipa_idam_preserve_archived | bool }}"
  when:
    - not (freeipa_idam_reconcile_memberships_only | bool)
    - freeipa_idam_users_to_remove | default([]) | length > 0
  no_log: true

# ── Declarative GROUP-EXISTENCE reconcile (opt-in) ───────────────────────────
# Same ticket as the user-marker discovery above. Read the container's nested-group
# members, then DELETE any that are no longer declared in freeipa_idam_usergroups —
# the group-level twin of the user archival. check_mode: false on the read so --check
# still PREVIEWS (the delete below honours check mode → reports, deletes nothing).
- name: Read current nested groups of the managed-groups container
  ansible.builtin.command: "ipa group-show {{ freeipa_idam_managed_groups_group }} --all --raw"
  register: _freeipa_idam_managed_groups_show
  changed_when: false
  failed_when: false                     # container may not exist yet on a first --check
  check_mode: false
  when: freeipa_server_authoritative | bool

# Members come back as raw `member: cn=<group>,cn=groups,...` DN lines (user members
# are `uid=...` and are skipped). `^member: cn=` excludes the container's own
# `memberof:` lines. Orphan = enrolled in the container but NOT declared, NOT protected,
# and never the container/user-marker themselves. Same regex caveats as the user list
# above (folded scalar: literal text + [^,], no \s/\d classes).
- name: Build declarative group delete list (container orphans)
  ansible.builtin.set_fact:
    _freeipa_idam_groups_to_remove: >-
      {{ (_freeipa_idam_managed_groups_show.stdout_lines | default([]) | map('trim')
          | select('match', '^member: cn=')
          | map('regex_replace', '^member: cn=([^,]+),.*', '\1') | list)
         | difference(freeipa_idam_group_names)
         | difference(freeipa_idam_protected_groups)
         | difference([freeipa_idam_managed_groups_group, freeipa_idam_managed_group]) }}
  when:
    - not (freeipa_idam_reconcile_memberships_only | bool)
    - freeipa_server_authoritative | bool

- name: Report groups to delete (declarative group-existence reconcile)
  ansible.builtin.debug:
    msg: >-
      Group reconcile → deleting {{ _freeipa_idam_groups_to_remove | length }}
      orphaned managed group(s): {{ _freeipa_idam_groups_to_remove }}
  when:
    - not (freeipa_idam_reconcile_memberships_only | bool)
    - freeipa_server_authoritative | bool
    - (_freeipa_idam_groups_to_remove | default([])) | length > 0

# Hard-delete (groups can't be preserve-archived). One bulk ipagroup call; state: absent
# honours check mode so --check previews. Deleting a group auto-removes it from the
# container, so the marker self-heals.
- name: Delete groups removed from declarative config (no longer in freeipa_idam_usergroups)
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_principal: "{{ freeipa_server_admin_principal }}"
    ipaadmin_password: "{{ _freeipa_server_admin_password }}"
    name: "{{ _freeipa_idam_groups_to_remove }}"
    state: absent
  when:
    - not (freeipa_idam_reconcile_memberships_only | bool)
    - freeipa_server_authoritative | bool
    - (_freeipa_idam_groups_to_remove | default([])) | length > 0
  no_log: true

- name: Enforce password-expiration floor for listed users
  ansible.builtin.shell: |
    set -eu
    cur=$(ipa user-show "{{ item.user }}" --raw 2>/dev/null \
          | awk -F': ' '/krbPasswordExpiration:/ {print $2; exit}')
    if [ -z "$cur" ]; then echo "NO_EXPIRY_FIELD"; exit 0; fi
    cur_iso="${cur:0:4}-${cur:4:2}-${cur:6:2}T${cur:8:2}:${cur:10:2}:${cur:12:2}Z"
    cur_epoch=$(date -u -d "$cur_iso" +%s)
    now=$(date -u +%s)
    days_left=$(( (cur_epoch - now) / 86400 ))
    if [ "$days_left" -lt "{{ item.min_days_remaining | int }}" ]; then
      new=$(date -u -d "{{ item.bump_to_days | int }} days" +%Y%m%d%H%M%SZ)
      ipa user-mod "{{ item.user }}" --setattr=krbPasswordExpiration="$new" >/dev/null
      echo "BUMPED days_left=$days_left -> $new"
    else
      echo "OK days_left=$days_left"
    fi
  args:
    executable: /bin/bash
  register: _freeipa_idam_pwexp
  changed_when: "'BUMPED' in (_freeipa_idam_pwexp.stdout | default(''))"
  loop: "{{ freeipa_idam_password_expiration_floors }}"
  loop_control:
    label: "{{ item.user | default('missing-user') }}"
  when: freeipa_idam_password_expiration_floors | length > 0

- name: Destroy temporary Kerberos ticket
  ansible.builtin.command: kdestroy
  changed_when: false
  failed_when: false
  no_log: true
