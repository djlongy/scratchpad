---
# Thin RBAC overlay — a PURELY OPTIONAL add-on, compiled inside the desired-state
# phase (imported by idam_desired.yml). A native run (no freeipa_server_rbac_* vars,
# or empty/null ones) no-ops through this file — the role never requires the overlay.
# When declared, it generates ONLY role groups + their nesting into EXISTING
# policy groups + user→role-group membership, merged onto the native lists via
# freeipa_idam_merge (baseline wins on a name collision; the listed fields union).
# Runs AFTER the tenant load, so it composes with freeipa_idam_tenants_dir.
#
# Caveat: the merge lands via set_fact — freeipa_idam_users/_usergroups supplied as
# EXTRA-VARS outrank set_fact and would ignore the overlay (use group_vars/tenants).

- name: RBAC overlay | Reject removed schemas (fail fast)
  ansible.builtin.assert:
    that:
      - freeipa_server_rbac_role_sets is not defined
      - freeipa_server_rbac_user_assignments is not defined
      - freeipa_server_rbac_naming is not defined
      - (freeipa_server_rbac_roles | default([], true)) is not mapping
    fail_msg: >-
      The RBAC overlay is now WYSIWYG: freeipa_server_rbac_roles is a flat LIST — one
      entry per role group, carrying its LITERAL name, policy_groups (existing group
      names, pasted verbatim from the export) and members (the users granted the role).
      The nested tenant→environment tree, the separate freeipa_server_rbac_user_assignments
      dict and the freeipa_server_rbac_naming templates have been removed — scope lives
      in the names you declare (e.g. role-<tenant>-<env>-<name> by convention). Migrate
      per the role README.
    quiet: true

# Everything below is gated on a non-empty roles list (null-safe: a bare
# `freeipa_server_rbac_roles:` key arrives as None and still means "overlay off").
- name: RBAC overlay | Validate input (fail fast, names the culprit)
  ansible.builtin.set_fact:
    _freeipa_rbac_valid: >-
      {{ (freeipa_server_rbac_roles | default([], true))
         | freeipa_rbac_validate(
             freeipa_idam_usergroups,
             native_users=freeipa_idam_users,
             native_hbac_rules=freeipa_idam_hbac_rules,
             allow_unknown_users=freeipa_server_rbac_allow_unknown_users | bool,
             allow_missing_policy_groups=freeipa_server_rbac_allow_missing_policy_groups | bool) }}
  when: (freeipa_server_rbac_roles | default([], true)) | length > 0

- name: RBAC overlay | Compile role groups + nesting onto native usergroups
  ansible.builtin.set_fact:
    freeipa_idam_usergroups: >-
      {{ freeipa_idam_usergroups
         | freeipa_idam_merge((freeipa_server_rbac_roles | default([], true))
                              | freeipa_rbac_role_groups,
                              union_fields=['group']) }}
  when: (freeipa_server_rbac_roles | default([], true)) | length > 0

- name: RBAC overlay | Compile role members onto native users
  ansible.builtin.set_fact:
    freeipa_idam_users: >-
      {{ freeipa_idam_users
         | freeipa_idam_merge((freeipa_server_rbac_roles | default([], true))
                              | freeipa_rbac_memberships,
                              union_fields=['groups']) }}
  when: (freeipa_server_rbac_roles | default([], true)) | length > 0

# Role-scoped HBAC rules: explicit (WYSIWYG) rule names, usergroup: [<role>] injected
# by the compiler. Merged like the role groups (a native rule of the same name is
# rejected at validate — the overlay owns its rules); refs validated downstream.
- name: RBAC overlay | Compile role-scoped HBAC rules onto native rules
  ansible.builtin.set_fact:
    freeipa_idam_hbac_rules: >-
      {{ freeipa_idam_hbac_rules
         | freeipa_idam_merge((freeipa_server_rbac_roles | default([], true))
                              | freeipa_rbac_hbac_rules) }}
  when: (freeipa_server_rbac_roles | default([], true)) | length > 0
