---
# roles/freeipa_server/tasks/idam_desired.yml
#
# PHASE 1 of the declarative IDAM pipeline: ASSEMBLE + VALIDATE the desired state.
# Loads per-tenant files (freeipa_idam_tenants_dir), folds in service/break-glass
# accounts, builds the role->groups lookup, rejects deprecated schema, and runs the
# full shape + referential validation — producing the final freeipa_idam_* /
# freeipa_server_* desired lists that BOTH later phases consume:
#   * apply  (idam.yml) — creates/updates the declared objects
#   * prune  (reconcile.yml)           — deletes in-scope objects NOT declared here
#
# main.yml tags this [idam, reconcile, ...] so it runs for a full apply (-t idam) AND
# for a validate-and-prune-only run (-t reconcile). That is the whole point: reconcile
# MUST see the assembled desired set — otherwise every in-scope object looks undeclared
# and gets deleted. The sentinel fact set at the very end
# (_freeipa_idam_desired_assembled) is the interlock reconcile.yml asserts, so a run
# that somehow skips this phase HARD-ABORTS instead of pruning the whole scope.

- name: Run FreeIPA health check before IDAM operations
  ansible.builtin.include_tasks:
    file: idam_health_check.yml
    apply:
      tags: [freeipa_server, freeipa, idam, health_check]
  tags: [freeipa_server, freeipa, idam, health_check]

# Re-entry guard. The facts below are built with loop accumulators
# (set_fact: x = "{{ (x | default([])) + [item] }}"). If idam.yml is ever included
# twice in one play, a second pass would APPEND onto the first pass's list instead of
# rebuilding — duplicating every group/user and tripping the module's "X used more than
# once" check. Reset them to [] up front so each invocation rebuilds from empty; harmless
# on the normal single-include path. (The playbook should not include idam.yml twice;
# this makes the task file self-defending.)
- name: Reset IDAM accumulator facts (re-entry safe)
  ansible.builtin.set_fact:
    _freeipa_users_roled: []
    freeipa_idam_user_group_pairs: []
    freeipa_idam_usergroups_effective: []
    freeipa_idam_users_effective: []

# UNIFIED PER-REALM MODEL: when freeipa_idam_tenants_dir is set, load every per-tenant
# tenants/*.yml in one run and flatten into the freeipa_idam_* / freeipa_server_* object
# lists (users/groups stamped _owner/_shared). Empty tenants_dir = legacy mode (use the
# vars from group_vars directly) so existing inventories are unchanged. Runs before the
# type-validation below so the merged lists are what everything downstream validates and
# reconciles.
- name: Load + merge per-tenant files (unified per-realm model)
  ansible.builtin.import_tasks: load_tenants.yml
  when: freeipa_idam_tenants_dir | length > 0

# Fail fast on gross TYPE errors BEFORE any task consumes these vars — the RBAC
# expander, the service/break-glass merge, the role lookup and the item-level scan
# all iterate these and assume real lists. `is iterable` is NOT enough: a bare
# string and a dict are both iterable in Python, so `freeipa_idam_users: "oops"`
# (or a base list passed as `-e key=value`, which arrives as a STRING) would slip
# through and then blow up later with a cryptic, no_log-censored error. Require an
# actual list: a sequence that is neither a string nor a mapping. Runs BEFORE the
# expander so malformed BASE input is caught with a clear message first; the RBAC
# inputs are checked too (default([]) so undefined is fine). Reports all at once.
- name: Validate IDAM list variables are well-formed (must be lists)
  vars:
    _idam_typed_vars:
      freeipa_idam_users: "{{ freeipa_idam_users }}"
      freeipa_idam_usergroups: "{{ freeipa_idam_usergroups }}"
      freeipa_idam_roles: "{{ freeipa_idam_roles }}"
      freeipa_idam_hostgroups: "{{ freeipa_idam_hostgroups }}"
      freeipa_idam_hbacsvcs: "{{ freeipa_idam_hbacsvcs }}"
      freeipa_idam_hbacsvcgroups: "{{ freeipa_idam_hbacsvcgroups }}"
      freeipa_idam_hbac_rules: "{{ freeipa_idam_hbac_rules }}"
      freeipa_idam_sudo_commands: "{{ freeipa_idam_sudo_commands }}"
      freeipa_idam_sudocmdgroups: "{{ freeipa_idam_sudocmdgroups }}"
      freeipa_idam_sudo_rules: "{{ freeipa_idam_sudo_rules }}"
      freeipa_idam_permissions: "{{ freeipa_idam_permissions }}"
      freeipa_idam_privileges: "{{ freeipa_idam_privileges }}"
      freeipa_idam_iparoles: "{{ freeipa_idam_iparoles }}"
      freeipa_idam_pwpolicies: "{{ freeipa_idam_pwpolicies }}"
      freeipa_idam_service_accounts: "{{ freeipa_idam_service_accounts }}"
      freeipa_idam_breakglass_accounts: "{{ freeipa_idam_breakglass_accounts }}"
      freeipa_idam_password_expiration_floors: "{{ freeipa_idam_password_expiration_floors }}"
    # A real list = sequence AND NOT string AND NOT mapping. Collect the names of
    # any var that fails that (non-sequences via reject, strings + dicts via select).
    _idam_bad_types: >-
      {{ (
           (_idam_typed_vars | dict2items | rejectattr('value', 'sequence') | map(attribute='key') | list)
         + (_idam_typed_vars | dict2items | selectattr('value', 'string')   | map(attribute='key') | list)
         + (_idam_typed_vars | dict2items | selectattr('value', 'mapping')  | map(attribute='key') | list)
         ) | unique }}
  ansible.builtin.assert:
    that:
      - freeipa_idam_managed_group | length > 0
      - _idam_bad_types | length == 0
    fail_msg: >-
      These freeipa_idam_* variables must be LISTS but are not: {{ _idam_bad_types | join(', ') }}.
      A bare string or a single dict is the usual cause — wrap single items in a list ([ ... ]).
      Note: base lists passed via `-e key=value` arrive as strings; use group_vars/vars_files
      or JSON extra-vars (`-e '{"var": [ ... ]}'`).
    quiet: true

# Fail fast on REQUIRED inventory vars BEFORE the no_log payload builds consume them —
# else an undefined var (classically `domain`, via freeipa_idam_email_domain: "{{ domain }}")
# surfaces as a cryptic, no_log-CENSORED 'undefined variable' crash with no clue which var.
# List the missing ones plainly instead.
- name: Assert required IDAM connection/identity variables are defined
  vars:
    # Only check what can genuinely be undefined: freeipa_server_domain/realm/admin_principal
    # all carry defaults (is defined is always true), so they are not checked. `domain` has NO
    # default and derives freeipa_server_domain/realm AND freeipa_idam_email_domain — it is the
    # var that actually crashes when missing. Admin credentials are resolvable iff the password
    # is supplied directly OR a Vault path is given (the role's declared-first / Vault-fallback).
    _freeipa_required_vars:
      domain: "{{ domain is defined }}"
      admin_credentials: >-
        {{ (freeipa_server_admin_password | default('') | length > 0)
           or (freeipa_server_vault_secret is defined) }}
    _freeipa_missing_vars: "{{ _freeipa_required_vars | dict2items | rejectattr('value') | map(attribute='key') | list }}"
  ansible.builtin.assert:
    that: _freeipa_missing_vars | length == 0
    fail_msg: >-
      Required configuration missing: {{ _freeipa_missing_vars | join(', ') }}.
      'domain' must be set in the inventory (group_vars/all/) per the hostname convention —
      it derives freeipa_server_domain/realm and the IDAM email domain. 'admin_credentials'
      means set freeipa_server_admin_password OR freeipa_server_vault_secret so the role can
      obtain the IPA admin password. These feed no_log tasks, so asserting here turns a
      censored 'undefined variable' crash into this clear message.
    quiet: true

# Accept bare-string shorthand for the name-only object lists: a `cockpit` entry is
# normalized to `{name: cockpit}` so terse input (and older exports) work alongside the
# full `{name: ..., description: ...}` form — without crashing the downstream
# `map(attribute='name')` validation with "'str object' has no attribute 'name'".
# Runs AFTER the list-type guard above (so non-lists are already rejected) and BEFORE the
# validation/create tasks that read these by `.name`.
- name: Normalize name-only IDAM lists (accept bare-string shorthand)
  ansible.builtin.set_fact:
    freeipa_idam_hbacsvcs: "{{ freeipa_idam_hbacsvcs | freeipa_idam_named }}"
    freeipa_idam_sudo_commands: "{{ freeipa_idam_sudo_commands | freeipa_idam_named }}"

# OPTIONAL thin RBAC overlay — compiles freeipa_server_rbac_* (abstract user→role
# assignments) into the native usergroups/users lists. No-op when undeclared; runs
# after the tenant load so it composes with tenants_dir, and before the account fold
# + validation below so compiled objects are validated like everything else.
- name: Compile the RBAC overlay into the native lists (optional)
  ansible.builtin.import_tasks: rbac.yml

# Fold the separate account-type lists into the working user set so they flow
# through the SAME validation/create/group/marker pipeline — but with their
# distinguishing attributes. Service accounts get the nologin shell. Break-glass
# accounts stay login-enabled and are auto-added to freeipa_idam_protected_users
# (never deleted/archived). Kept as separate INPUT lists purely for explicit intent.
#
# Writes the INTERNAL fact _freeipa_idam_users_base (never the public
# freeipa_idam_users) so the merge holds even when users are supplied via
# extra-vars, which outrank set_fact — same robustness contract as the role-
# expanded _freeipa_idam_users below. Always defined (base == users when no
# service/break-glass accounts), so every downstream reader can rely on it.
- name: Merge service + break-glass accounts into the working user set
  ansible.builtin.set_fact:
    _freeipa_idam_users_base: >-
      {{ freeipa_idam_users
         + (freeipa_idam_service_accounts | map('combine', {'shell': freeipa_idam_nologin_shell}) | list)
         + freeipa_idam_breakglass_accounts }}
    freeipa_idam_protected_users: >-
      {{ (freeipa_idam_protected_users
          + (freeipa_idam_breakglass_accounts | map(attribute='name') | list)) | unique }}
  no_log: true

# Roles matrix: a role is a named bundle of groups, and a user references the
# roles it belongs to instead of a long flat group list. Here we expand each
# user's `roles` into concrete group memberships (merged with any direct
# `groups`) and drop the `roles` key, so every task below sees the familiar
# users-with-groups shape — no other change needed. A user's effective groups =
# the union of all its roles' groups.
- name: Build role -> groups lookup
  ansible.builtin.set_fact:
    _freeipa_role_groups: >-
      {{ dict(freeipa_idam_roles | map(attribute='name')
              | zip(freeipa_idam_roles | map(attribute='groups'))) }}
  when: freeipa_idam_roles | length > 0

# DEPRECATED-SCHEMA GUARD. The group/service/cmd field names were renamed to match
# the (unambiguous) community module params, and the top-level list is now
# freeipa_idam_usergroups. Fail LOUDLY on any old name so a stale snapshot can't
# silently drop HBAC/sudo members and change access. Re-export to migrate (the
# exporter now emits the new names), or rename in place per the fail_msg.
- name: Reject deprecated IDAM field/var names (renamed for disambiguation)
  ansible.builtin.assert:
    that:
      - freeipa_idam_groups is not defined
      - freeipa_idam_hbac_rules | selectattr('group', 'defined') | list | length == 0
      - freeipa_idam_hbac_rules | selectattr('hbacsvc', 'defined') | list | length == 0
      - freeipa_idam_hbac_rules | selectattr('hbacsvcgroup', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('group', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('allow_sudocmd', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('deny_sudocmd', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('allow_sudocmdgroup', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('deny_sudocmdgroup', 'defined') | list | length == 0
      - freeipa_idam_sudo_rules | selectattr('sudooption', 'defined') | list | length == 0
      - freeipa_idam_iparoles | selectattr('group', 'defined') | list | length == 0
    fail_msg: >-
      Deprecated FreeIPA IDAM field/var names detected. Schema was renamed to match
      the community module params (singular, unambiguous): top-level
      freeipa_idam_groups -> freeipa_idam_usergroups; rule fields group -> usergroup,
      hbacsvc -> service, hbacsvcgroup -> servicegroup, allow_sudocmd -> cmd,
      deny_sudocmd -> deny_cmd, allow_sudocmdgroup -> cmdgroup,
      deny_sudocmdgroup -> deny_cmdgroup, sudooption -> sudoopt. Re-export the
      snapshot or rename in place.

# SURGICAL VALIDATION: collect EVERY referential/structural problem in one pass and
# report them all at once at the end — so a bad item 2000 lines into a large dict
# shows up as a precise, complete bullet list, instead of one assert you have to
# scroll up through the log to find. Accepts first/givenname and last/sn (ipauser
# aliases); protected users (admin) are exempt from the first/last requirement
# because their attributes cannot be set (see the payload task below).
# LIVE mode (freeipa_server_idam_reference_validation: live): query the realm once
# for existing object names so a reference to an object that EXISTS but isn't
# declared in this (scoped) slice passes — only true typos fail. This is the
# Terraform "data source" idea. Needs a Kerberos ticket, so it can't run --check.
- name: Gather live realm object names for reference validation (live mode)
  when: freeipa_server_idam_reference_validation == 'live'
  no_log: true
  block:
    - name: live-validate | Resolve admin password (shared resolver)
      ansible.builtin.include_tasks: resolve_credentials.yml
      vars:
        _freeipa_resolve: [admin]

    - name: live-validate | Acquire Kerberos ticket
      ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}"
      args:
        stdin: "{{ _freeipa_admin_password }}"
      changed_when: false

    - name: live-validate | Find existing object names (pkey only)
      ansible.builtin.command: "ipa {{ item.cmd }} --pkey-only --sizelimit=0"
      register: _freeipa_live_finds
      changed_when: false
      failed_when: false
      loop:
        - { key: groups, cmd: group-find }
        - { key: roles, cmd: role-find }
        - { key: hbacsvcs, cmd: hbacsvc-find }
        - { key: hbacsvcgroups, cmd: hbacsvcgroup-find }
        - { key: sudocmds, cmd: sudocmd-find }
        - { key: sudocmdgroups, cmd: sudocmdgroup-find }
        - { key: hostgroups, cmd: hostgroup-find }
      loop_control:
        label: "{{ item.cmd }}"

    - name: live-validate | Destroy Kerberos ticket
      ansible.builtin.command: kdestroy
      changed_when: false
      failed_when: false

    - name: live-validate | Parse live names per object type
      ansible.builtin.set_fact:
        _freeipa_live: >-
          {{ _freeipa_live | default({}) | combine({
               item.item.key:
                 (item.stdout_lines | select('search', ':')
                  | map('regex_replace', '^\\s*[^:]+:\\s*', '') | map('trim') | select | list)
             }) }}
      loop: "{{ _freeipa_live_finds.results }}"
      loop_control:
        label: "{{ item.item.cmd }}"

# SHAPE problems (missing name, no groups/roles, duplicate user, protected-absent)
# ALWAYS hard-fail. REFERENCE problems (role→group, user→group/role, hbac→service,
# sudo→command) are governed by freeipa_server_idam_reference_validation. The engine
# lives in filter_plugins/freeipa_idam.py (freeipa_idam_validate — unit-tested); the
# known-name sets add the built-in allow-list and, in live mode, the live realm names,
# so a scoped slice can reference a global object it doesn't declare.
- name: Collect IDAM validation problems (shape + references)
  ansible.builtin.set_fact:
    _freeipa_idam_problems: >-
      {{ {
           'users': _freeipa_idam_users_base,
           'usergroups': freeipa_idam_usergroups,
           'roles': freeipa_idam_roles,
           'hostgroups': freeipa_idam_hostgroups,
           'hbacsvcs': freeipa_idam_hbacsvcs,
           'hbacsvcgroups': freeipa_idam_hbacsvcgroups,
           'hbac_rules': freeipa_idam_hbac_rules,
           'sudo_commands': freeipa_idam_sudo_commands,
           'sudocmdgroups': freeipa_idam_sudocmdgroups,
           'sudo_rules': freeipa_idam_sudo_rules,
           'iparoles': freeipa_idam_iparoles,
           'pwpolicies': freeipa_idam_pwpolicies,
           'automember_rules': freeipa_server_automember_rules | default([]),
           'unmodifiable_users': freeipa_idam_unmodifiable_users,
           'protected_groups': freeipa_idam_protected_groups,
           'builtin_groups': freeipa_server_idam_builtin_groups | default([]),
           'builtin_hostgroups': freeipa_server_idam_builtin_hostgroups | default([]),
           'stock_hbacsvcs': freeipa_server_export_hbacsvc_stock | default([]),
           'live': _freeipa_live | default({}),
         } | freeipa_idam_validate }}
  # Problem strings only (no secrets) — suppressed normally, shown at -vv.
  no_log: "{{ ansible_verbosity < 2 }}"

- name: Report IDAM shape problems (always hard-fail)
  ansible.builtin.assert:
    that: _freeipa_idam_problems.shape | length == 0
    quiet: true
    fail_msg: |-
      FreeIPA IDAM validation failed — fix these {{ _freeipa_idam_problems.shape | length }} item(s):
      {% for p in _freeipa_idam_problems.shape %}
        - {{ p }}
      {% endfor %}

- name: Report IDAM reference problems (strict / live → fail)
  ansible.builtin.assert:
    that: _freeipa_idam_problems.refs | length == 0
    quiet: true
    fail_msg: |-
      FreeIPA IDAM reference validation failed — fix these {{ _freeipa_idam_problems.refs | length }} item(s)
      (declare them, add to freeipa_server_idam_builtin_groups, or relax
       freeipa_server_idam_reference_validation to live/warn/off):
      {% for p in _freeipa_idam_problems.refs %}
        - {{ p }}
      {% endfor %}
  when: freeipa_server_idam_reference_validation in ['strict', 'live']

- name: Warn on IDAM reference problems (warn mode — continue)
  ansible.builtin.debug:
    msg: |-
      WARNING — {{ _freeipa_idam_problems.refs | length }} unresolved IDAM reference(s) (mode=warn, continuing):
      {% for p in _freeipa_idam_problems.refs %}
        - {{ p }}
      {% endfor %}
  when:
    - freeipa_server_idam_reference_validation == 'warn'
    - _freeipa_idam_problems.refs | length > 0

# Interlock sentinel — the LAST thing this phase does. reconcile.yml asserts this fact
# before computing/deleting orphans, so a run that reaches the prune phase without the
# desired state assembled aborts instead of treating every in-scope object as undeclared.
- name: desired | Mark IDAM desired-state assembly complete (reconcile interlock)
  ansible.builtin.set_fact:
    _freeipa_idam_desired_assembled: true
