---
# roles/freeipa_server/tasks/decommission.yml
# Declaratively remove THIS (package) server from the realm — runs when
# freeipa_server_state == absent. Set the flag on the host (host_vars) and run the play across
# the group; the server is deleted from topology and its FreeIPA install torn down, then the
# play ends for this host (no install/config).
#
# SAFETY (hard-fail, never bypassed silently):
#   * refuses to remove the LAST server (a surviving master must exist)
#   * refuses to remove the CA renewal master unless freeipa_server_decommission_transfer_renewal
#   * every ipa call on the survivor is `&&`-chained (rc reflects the REAL command, not the
#     trailing kdestroy) and the admin password is fed on STDIN (never on the argv/cmdline)
#   * survivors are filtered to the SAME realm (freeipa_server_domain) — never a foreign realm
# Topology queries + server-del run on a SURVIVING master (package or container, mode-aware).

- name: Decommission | Resolve admin credentials (shared resolver)
  ansible.builtin.include_tasks: resolve_credentials.yml
  vars:
    _freeipa_resolve: [admin]

# Surviving masters = the other realm hosts (same inventory groups this role derives topology
# from) that are (a) not themselves being removed and (b) in the SAME realm as this host.
- name: Decommission | Compute realm peers
  ansible.builtin.set_fact:
    _freeipa_decom_peers: >-
      {{ ((groups[freeipa_server_primary_group] | default([]))
          | union(groups['freeipa'] | default([]))
          | union(groups['idm'] | default([])) | unique)
         | difference([inventory_hostname]) }}

- name: Decommission | Reduce to surviving, SAME-realm masters
  ansible.builtin.set_fact:
    _freeipa_decom_survivors: "{{ _freeipa_decom_survivors | default([]) + [item] }}"
  loop: "{{ _freeipa_decom_peers }}"
  loop_control:
    label: "{{ item }}"
  when:
    - hostvars[item].freeipa_server_state | default('present') != 'absent'
    # Realm safety: only a peer whose domain matches this host's is a valid survivor. Guards
    # against mixed-realm inventory groups (e.g. a stale freeipa_primary from an old realm).
    - (hostvars[item].freeipa_server_domain | default('')) == freeipa_server_domain

- name: Decommission | Refuse to remove the last remaining same-realm server
  ansible.builtin.assert:
    that:
      - (_freeipa_decom_survivors | default([])) | length > 0
    fail_msg: >-
      Refusing to decommission {{ inventory_hostname }}: no surviving master in realm
      '{{ freeipa_server_domain }}' found in inventory. Removing the last server would destroy the
      realm. Keep at least one same-realm host with freeipa_server_state != absent.

- name: Decommission | Set the surviving master + its mode-aware ipa exec prefix
  ansible.builtin.set_fact:
    _freeipa_decom_target: "{{ _freeipa_decom_survivors | first }}"
    _freeipa_decom_exec: >-
      {{ ('docker exec -i ' + (hostvars[(_freeipa_decom_survivors | first)].freeipa_server_docker_container_name | default('freeipa')) + ' ')
         if (hostvars[(_freeipa_decom_survivors | first)].freeipa_server_deployment | default('package') == 'container')
         else '' }}

# Read the CA renewal master from the survivor. `&&`-chained (a failed kinit/config-show FAILS the
# task, not silently returns empty) and parsed from the human-readable field (the --raw attribute
# name is not exposed on IPA 4.13). Password on stdin.
- name: Decommission | Read the CA renewal master (from the surviving master)
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail; IFS= read -r _pw;
      printf '%s\n' "$_pw" | {{ _freeipa_decom_exec }}kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }} >/dev/null 2>&1
      && {{ _freeipa_decom_exec }}ipa config-show 2>/dev/null | awk -F': ' '/IPA CA renewal master:/{print $2}'
    executable: /bin/bash
  args:
    stdin: "{{ _freeipa_admin_password }}"
  delegate_to: "{{ _freeipa_decom_target }}"
  register: _freeipa_decom_renewal
  changed_when: false
  no_log: true

- name: Decommission | Assert the renewal-master read succeeded (a realm always has one)
  ansible.builtin.assert:
    that:
      - (_freeipa_decom_renewal.stdout | trim) | length > 0
    fail_msg: >-
      Could not read the CA renewal master from {{ _freeipa_decom_target }} — aborting before any
      removal. The query likely failed to authenticate/connect; do NOT proceed blind.

- name: Decommission | Am I the CA renewal master?
  ansible.builtin.set_fact:
    _freeipa_decom_is_renewal: "{{ (_freeipa_decom_renewal.stdout | trim) == freeipa_server_fqdn }}"

# Opt-in: move the CA renewal master (+ CRL) to the surviving master BEFORE removal. `&&`-chained
# so a failed move aborts the decommission before anything is removed (fail-safe). Password on stdin.
- name: Decommission | Transfer CA renewal master + CRL to {{ _freeipa_decom_target }} (opt-in)
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail; IFS= read -r _pw;
      printf '%s\n' "$_pw" | {{ _freeipa_decom_exec }}kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }} >/dev/null 2>&1
      && {{ _freeipa_decom_exec }}ipa config-mod --ca-renewal-master-server={{ _freeipa_decom_target }}.{{ freeipa_server_domain }}
      && {{ _freeipa_decom_exec }}ipa-crlgen-manage enable
      && {{ _freeipa_decom_exec }}kdestroy >/dev/null 2>&1
    executable: /bin/bash
  args:
    stdin: "{{ _freeipa_admin_password }}"
  delegate_to: "{{ _freeipa_decom_target }}"
  register: _freeipa_decom_xfer
  changed_when: "'CA renewal master' in (_freeipa_decom_xfer.stdout | default(''))"
  no_log: true
  when:
    - _freeipa_decom_is_renewal | bool
    - freeipa_server_decommission_transfer_renewal | bool

- name: Decommission | Refuse to remove the CA renewal master (unless transfer was requested)
  ansible.builtin.assert:
    that:
      - not (_freeipa_decom_is_renewal | bool)
    fail_msg: >-
      Refusing to decommission {{ inventory_hostname }}: it is the CA renewal master. Either set
      freeipa_server_decommission_transfer_renewal: true to move it to {{ _freeipa_decom_target }}
      automatically, or transfer it yourself first:
        ipa config-mod --ca-renewal-master-server={{ _freeipa_decom_target }}.{{ freeipa_server_domain }}
  when: not (freeipa_server_decommission_transfer_renewal | bool)

# server-del on the survivor. `&&`-chained so a genuine failure (auth/connectivity) FAILS the task
# instead of being masked by the trailing kdestroy. `--force` is idempotent (reports "Deleted" even
# for an already-absent server), so a re-run is safe; no stderr-tolerance needed.
- name: Decommission | Remove {{ freeipa_server_fqdn }} from topology (via the surviving master)
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail; IFS= read -r _pw;
      printf '%s\n' "$_pw" | {{ _freeipa_decom_exec }}kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }} >/dev/null 2>&1
      && {{ _freeipa_decom_exec }}ipa server-del {{ freeipa_server_fqdn }} --ignore-topology-disconnect --force
      && {{ _freeipa_decom_exec }}kdestroy >/dev/null 2>&1
    executable: /bin/bash
  args:
    stdin: "{{ _freeipa_admin_password }}"
  delegate_to: "{{ _freeipa_decom_target }}"
  register: _freeipa_decom_del
  changed_when: "'Deleted IPA server' in (_freeipa_decom_del.stdout | default(''))"
  no_log: true

- name: Decommission | Tear down the package FreeIPA install
  ansible.builtin.command:
    cmd: ipa-server-install --uninstall -U
    removes: /etc/ipa/default.conf
  register: _freeipa_decom_uninstall
  changed_when: "'successful' in (_freeipa_decom_uninstall.stdout | default(''))"

- name: Decommission | Wipe residual backup data (opt-in)
  ansible.builtin.file:
    path: /var/lib/ipa/backup
    state: absent
  when: freeipa_server_decommission_wipe_data | bool

- name: Decommission | Report
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} decommissioned (topology entry deleted via {{ _freeipa_decom_target }};
      package install removed). Remove it from inventory when convenient.

- name: Decommission | End the play for this decommissioned host
  ansible.builtin.meta: end_host
