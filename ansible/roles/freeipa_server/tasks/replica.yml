---
# roles/freeipa_server/tasks/replica.yml
# Point resolver at the primary for enrolment, then wrap
# freeipa.ansible_freeipa.ipareplica. Idempotent via the configured check.

- name: Check if IPA replica is already configured
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: _freeipa_server_replica_configured

# DNS repoint runs only when freeipa_server_replica_connection names an NM
# connection — without it, /etc/hosts (below) still carries enrolment resolution.
- name: Repoint replica DNS at the primary for enrolment
  when:
    - not _freeipa_server_replica_configured.stat.exists
    - freeipa_server_replica_connection | length > 0
  block:
    - name: Get active NetworkManager connection UUID for the primary interface
      ansible.builtin.command:
        cmd: nmcli -t -f UUID,DEVICE con show --active
      register: _freeipa_server_nm_cons
      changed_when: false

    - name: Match the declared replica connection among active connections
      ansible.builtin.set_fact:
        _freeipa_server_con_matches: >-
          {{ _freeipa_server_nm_cons.stdout_lines
             | select('search', ':' + freeipa_server_replica_connection + '$') | list }}

    # Fail with the actual nmcli output rather than an opaque "sequence was empty"
    # from `| first` when the device is renamed/down.
    - name: Assert the declared replica connection is active
      ansible.builtin.assert:
        that: _freeipa_server_con_matches | length > 0
        fail_msg: >-
          freeipa_server_replica_connection '{{ freeipa_server_replica_connection }}'
          matches NO active NetworkManager connection. Active connections (UUID:DEVICE):
          {{ _freeipa_server_nm_cons.stdout_lines }}. Fix the device name or bring the
          connection up before enrolment.
        quiet: true

    - name: Resolve the active connection UUID
      ansible.builtin.set_fact:
        _freeipa_server_con_uuid: "{{ (_freeipa_server_con_matches | first).split(':')[0] }}"

    - name: Point DNS at the primary IPA server for enrolment
      ansible.builtin.command:
        cmd: nmcli con mod {{ _freeipa_server_con_uuid }} ipv4.dns "{{ freeipa_server_primary_ip }}"
      changed_when: true

    - name: Reapply DNS settings without cycling the connection
      ansible.builtin.command:
        cmd: nmcli dev reapply {{ freeipa_server_replica_connection }}
      changed_when: true

- name: Ensure primary FQDN is in /etc/hosts for enrolment
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ freeipa_server_primary_ip }} {{ freeipa_server_primary_host }}"
    state: present
    mode: "0644"
  when: not _freeipa_server_replica_configured.stat.exists

# DNS options only for an integrated-DNS replica — upstream's ipareplica_test
# rejects them ("... without the --setup-dns option") when setup_dns is false,
# so they must stay UNDEFINED for a no-DNS install.
- name: Map ipareplica DNS inputs (integrated DNS only)
  ansible.builtin.set_fact:
    ipareplica_forwarders: "{{ freeipa_server_forwarders }}"
    ipareplica_forward_policy: "{{ freeipa_server_forward_policy }}"
    ipareplica_no_forwarders: "{{ freeipa_server_no_forwarders }}"
    # Replicas must NOT auto-create reverse zones — the primary already created
    # them and they replicate in. Auto-reverse here fails the install with
    # "DNS zone <reverse> already exists". Reverse zones are a primary concern.
    ipareplica_auto_reverse: false
  when: freeipa_server_setup_dns | bool

# Optional replica inputs are set ONLY when non-empty, leaving them undefined for
# upstream's own default handling — firewalld_zone must stay UNDEFINED when empty
# (upstream gates its zone-verify on `is defined`, and an empty zone fails the check),
# and ntp_pool must stay undefined so ipaclient falls back to its own default(omit).
- name: Map optional ipareplica inputs when provided
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: >-
    {{ {'ipareplica_firewalld_zone': freeipa_server_firewalld_zone,
        'ipaclient_ntp_pool': freeipa_server_ntp_pool}
       | dict2items | rejectattr('value', 'equalto', '') | list }}
  loop_control:
    label: "{{ item.key }}"

- name: Install FreeIPA replica via upstream ipareplica role
  ansible.builtin.include_role:
    name: freeipa.ansible_freeipa.ipareplica
  vars:  # upstream ipareplica/ipaclient role inputs, not this role's vars
    ipareplica_domain: "{{ freeipa_server_domain }}"
    ipareplica_realm: "{{ freeipa_server_realm }}"
    ipareplica_hostname: "{{ freeipa_server_fqdn }}"
    ipareplica_servers: ["{{ freeipa_server_primary_host }}"]
    ipareplica_ip_addresses: "{{ freeipa_server_ip_addresses }}"
    ipaadmin_password: "{{ _freeipa_admin_password }}"
    ipadm_password: "{{ _freeipa_dm_password }}"
    ipareplica_setup_ca: "{{ freeipa_server_ca_mode != 'ca-less' }}"
    ipareplica_setup_kra: "{{ freeipa_server_setup_kra }}"
    ipareplica_setup_dns: "{{ freeipa_server_setup_dns }}"
    ipareplica_setup_firewalld: "{{ freeipa_server_setup_firewalld }}"
    ipareplica_install_packages: "{{ freeipa_server_install_packages }}"
    ipareplica_no_pkinit: "{{ freeipa_server_no_pkinit }}"
    ipareplica_setup_adtrust: "{{ freeipa_server_setup_adtrust }}"
    ipaclient_mkhomedir: "{{ freeipa_server_mkhomedir }}"
    # ipareplica has no setup_ntp toggle; NTP is a client-side concern. The real gate
    # is ipaclient_no_ntp (inverse of the role's setup_ntp), with the same
    # ipaclient_ntp_servers / ipaclient_ntp_pool the primary uses.
    ipaclient_no_ntp: "{{ not (freeipa_server_setup_ntp | bool) }}"
    ipaclient_ntp_servers: "{{ freeipa_server_ntp_servers }}"

- name: Ensure IPA service is enabled and started
  ansible.builtin.service:
    name: ipa
    state: started
    enabled: true
