---
# Expand role-centric definitions into flat freeipa_idam_* variables.
#
# Input:  freeipa_rbac_roles (with users), freeipa_app_roles (with users), freeipa_users (identity)
# Output: freeipa_idam_usergroups, freeipa_idam_hostgroups, freeipa_idam_hbac_rules,
#         freeipa_idam_sudo_commands, freeipa_idam_sudo_rules, freeipa_idam_users

- name: Build RBAC security groups
  ansible.builtin.set_fact:
    freeipa_idam_usergroups: "{{ _rbac_groups + _app_groups }}"
  vars:
    _rbac_groups: >-
      [{% for role in (freeipa_rbac_roles | default([])) %}
        {"name": "role-{{ role.name }}", "description": "{{ role.description | default('RBAC role ' + role.name) }}"}
        {{ "," if not loop.last else "" }}
      {% endfor %}]
    _app_groups: >-
      [{% for grp in (freeipa_app_roles | default([])) %}
        {"name": "{{ grp.name }}", "description": "{{ grp.description | default('App group ' + grp.name) }}"}
        {{ "," if not loop.last else "" }}
      {% endfor %}]

- name: Build RBAC hostgroups
  ansible.builtin.set_fact:
    freeipa_idam_hostgroups: "{{ _hostgroups }}"
  vars:
    _hostgroups: >-
      [{% for role in (freeipa_rbac_roles | default([])) %}
        {% if role.hosts is defined and role.hosts | length > 0 %}
        {"name": "hosts-{{ role.name }}", "description": "Hosts for RBAC role {{ role.name }}"}
        {{ "," if not loop.last else "" }}
        {% endif %}
      {% endfor %}]

- name: Build RBAC HBAC rules
  ansible.builtin.set_fact:
    freeipa_idam_hbac_rules: "{{ _hbac_rules }}"
  vars:
    _hbac_rules: >-
      [
        {"name": "allow_all", "description": "Disable default permissive HBAC rule", "state": "disabled"},
        {% for role in (freeipa_rbac_roles | default([])) %}
        {% if role.hosts is defined and role.hosts | length > 0 %}
        {
          "name": "hbac-{{ role.name }}",
          "description": "HBAC for {{ role.name }}",
          "group": ["role-{{ role.name }}"],
          "hostgroup": ["hosts-{{ role.name }}"],
          "hbacsvc": {{ role.services | default(["sshd"]) | to_json }},
          "state": "enabled"
        }{{ "," if not loop.last else "" }}
        {% endif %}
        {% endfor %}
      ]

- name: Build RBAC sudo commands list
  ansible.builtin.set_fact:
    freeipa_idam_sudo_commands: "{{ freeipa_rbac_sudo_commands | default([]) }}"

- name: Build RBAC sudo rules
  ansible.builtin.set_fact:
    freeipa_idam_sudo_rules: "{{ _sudo_rules }}"
  vars:
    _sudo_rules: >-
      [{% for role in (freeipa_rbac_roles | default([])) %}
        {% if role.sudo_all | default(false) %}
        {
          "name": "sudo-{{ role.name }}",
          "description": "Full sudo for {{ role.name }}",
          "group": ["role-{{ role.name }}"],
          "hostgroup": ["hosts-{{ role.name }}"],
          "cmdcategory": "all",
          "runasusercategory": "all",
          "runasgroupcategory": "all",
          "state": "enabled"
        }{{ "," }}
        {% elif role.sudo_commands is defined and role.sudo_commands | length > 0 %}
        {
          "name": "sudo-{{ role.name }}",
          "description": "Limited sudo for {{ role.name }}",
          "group": ["role-{{ role.name }}"],
          "hostgroup": ["hosts-{{ role.name }}"],
          "allow_sudocmd": {{ role.sudo_commands | to_json }},
          "runasusercategory": "all",
          "runasgroupcategory": "all",
          "state": "enabled"
        }{{ "," }}
        {% endif %}
      {% endfor %}]

- name: Derive user identities with group memberships from role definitions
  ansible.builtin.set_fact:
    freeipa_idam_users: "{{ _users }}"
  vars:
    _users: >-
      [{% for user in (freeipa_users | default([])) %}
        {
          "name": "{{ user.name }}",
          "first": "{{ user.first }}",
          "last": "{{ user.last }}",
          {% if user.email is defined %}"email": {{ user.email | to_json }},{% endif %}
          {% if user.password is defined %}"password": "{{ user.password }}",{% endif %}
          "groups": [
            {% for role in (freeipa_rbac_roles | default([])) %}
              {% if user.name in (role.users | default([])) %}
                "role-{{ role.name }}",
              {% endif %}
            {% endfor %}
            {% for app_role in (freeipa_app_roles | default([])) %}
              {% if user.name in (app_role.users | default([])) %}
                "{{ app_role.name }}",
              {% endif %}
            {% endfor %}
          ]
        }{{ "," if not loop.last else "" }}
      {% endfor %}]

- name: Display RBAC expansion summary
  ansible.builtin.debug:
    msg: >-
      RBAC expanded: {{ freeipa_rbac_roles | length }} roles,
      {{ freeipa_app_roles | default([]) | length }} app roles →
      {{ freeipa_idam_usergroups | length }} groups,
      {{ freeipa_idam_hostgroups | length }} hostgroups,
      {{ freeipa_idam_hbac_rules | length }} HBAC rules,
      {{ freeipa_idam_sudo_rules | length }} sudo rules,
      {{ freeipa_idam_users | length }} users
