---
# Unified per-realm identity load. When freeipa_idam_source_dir is set, every
# per-tenant identity/*.yml in the realm is read in ONE run and flattened into the
# flat freeipa_idam_users / freeipa_idam_usergroups lists the engine consumes,
# stamped with _owner (tenant) and _shared. Seeing all tenants in one run is the
# precondition for a fully declarative, single-source membership reconcile.
#
# fileglob + file lookups run on the control node (where the inventory lives), so
# no delegation is needed. Empty source_dir never reaches here (gated by the caller).

- name: identity | Discover tenant identity files
  ansible.builtin.set_fact:
    _freeipa_identity_paths: "{{ query('ansible.builtin.fileglob', freeipa_idam_source_dir ~ '/*.yml') | sort }}"

# Render each file as a template with its OWN tenant/env in scope, so identity files
# can DRY-reference {{ tenant }} / {{ env }} (e.g. name: "{{ tenant }}-admins"). The
# header is read raw first to get tenant/env, then the file is rendered with them
# injected and parsed. Files with no templating render unchanged.
- name: identity | Read + render each tenant file (its own tenant/env in scope)
  ansible.builtin.set_fact:
    _freeipa_identity_raw: "{{ (_freeipa_identity_raw | default([])) + [lookup('ansible.builtin.template', item, template_vars=_tvars) | from_yaml] }}"
  vars:
    _hdr: "{{ lookup('ansible.builtin.file', item) | from_yaml }}"
    _tvars: "{{ {'tenant': _hdr.tenant | default(''), 'env': _hdr.env | default('')} }}"
  loop: "{{ _freeipa_identity_paths }}"
  loop_control:
    label: "{{ item | basename }}"
  no_log: true  # tenant files may carry inline user passwords

- name: identity | Flatten identity (object lists + ownership maps)
  ansible.builtin.set_fact:
    _freeipa_identity: "{{ _freeipa_identity_raw | default([]) | freeipa_idam_identity_merge }}"
  no_log: true  # tenant files may carry inline user passwords

# Dynamically set every object var the merge produced (freeipa_idam_users,
# freeipa_idam_usergroups, freeipa_idam_hbac_rules, freeipa_server_dns_zones, ...) —
# so a tenant file carries its WHOLE config (HBAC, sudo, roles, DNS, automember, ...),
# not just users/groups.
- name: identity | Populate IDAM/server object lists from merged identity
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ _freeipa_identity.objects | dict2items }}"
  loop_control:
    label: "{{ item.key }} ({{ item.value | length }})"
  no_log: true
