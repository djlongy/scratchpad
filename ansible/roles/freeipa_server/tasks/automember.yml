---
# roles/freeipa_server/tasks/automember.yml
# Declarative automember rules: auto-assign users/hosts to a group or hostgroup
# by attribute regex, via the upstream ipaautomember module. Primary only
# (replicates). Idempotent. The target group/hostgroup must already exist (manage
# it via IAM). Admin password from Vault.

- name: Automember | Resolve admin password (shared resolver)
  ansible.builtin.include_tasks: resolve_credentials.yml
  vars:
    _freeipa_resolve: [admin]

# ── Precheck: ONE find per declared automember type; the per-rule module loop
# then runs ONLY for rules that differ (each skipped iteration saves a full
# Python + ipalib bootstrap on the server). Fail open: a failed find yields raw
# "" and the full declared list runs exactly as before.
- name: Automember | Read current rules (one find per type)
  when: freeipa_server_automember_rules | length > 0
  block:
    - name: Automember | Acquire Kerberos ticket
      ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }}"
      args:
        stdin: "{{ _freeipa_admin_password }}"
      changed_when: false
      check_mode: false
      no_log: true

    - name: Automember | Read current rules per type
      ansible.builtin.command: "ipa automember-find --type={{ item | quote }} --all --raw"
      register: _freeipa_precheck_automember
      loop: "{{ freeipa_server_automember_rules | map(attribute='automember_type') | unique | list }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      check_mode: false
      failed_when: false

    - name: Automember | Destroy Kerberos ticket
      ansible.builtin.command: kdestroy
      changed_when: false
      check_mode: false
      failed_when: false

- name: Automember | Reconcile rules
  freeipa.ansible_freeipa.ipaautomember:
    name: "{{ item.name }}"
    automember_type: "{{ item.automember_type }}"
    description: "{{ item.description | default(omit) }}"
    inclusive: "{{ item.inclusive | default(omit) }}"
    exclusive: "{{ item.exclusive | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated per type: a rule name can exist for BOTH types, so each type's
  # declared subset is compared against ITS OWN find output only
  loop: "{{ _freeipa_automember_changed }}"
  loop_control:
    label: "{{ item.automember_type }}:{{ item.name }}"
  vars:
    _freeipa_automember_changed: >-
      {%- set changed = [] -%}
      {%- for find in (_freeipa_precheck_automember.results | default([])) -%}
        {%- set _ = changed.extend(
              freeipa_server_automember_rules
              | selectattr('automember_type', 'equalto', find.item)
              | list
              | freeipa_iam_changed_subset(find.stdout | default(''), 'automember')) -%}
      {%- endfor -%}
      {{ changed }}
  register: _freeipa_automember_result
  when: freeipa_server_automember_rules | length > 0

# A host that enrols AFTER its rule exists is placed automatically by the IPA
# automember plugin at host-create time — no rebuild needed. A rebuild only
# re-evaluates members that ALREADY existed when a rule was added or changed
# (e.g. hosts enrolled before the rule). So rebuild per type, but ONLY when a
# rule actually changed this run (or when forced) — a rebuild is a heavy
# directory-wide re-evaluation, not something to run every play.
- name: Automember | Rebuild membership after rule changes
  freeipa.ansible_freeipa.ipaautomember:
    automember_type: "{{ item }}"
    state: rebuilt
  loop: "{{ freeipa_server_automember_rules | map(attribute='automember_type') | unique | list }}"
  loop_control:
    label: "{{ item }}"
  when: (_freeipa_automember_result is changed) or (freeipa_server_automember_rebuild | bool)
