---
# roles/freeipa_server/tasks/automember.yml
# Declarative automember rules: auto-assign users/hosts to a group or hostgroup
# by attribute regex, via the upstream ipaautomember module. Primary only
# (replicates). Idempotent. The target group/hostgroup must already exist (manage
# it via IDAM). Admin password from Vault.

- name: Automember | Resolve admin password (shared resolver)
  ansible.builtin.include_tasks: resolve_credentials.yml
  vars:
    _freeipa_resolve: [admin]

- name: Automember | Reconcile rules
  freeipa.ansible_freeipa.ipaautomember:
    name: "{{ item.name }}"
    automember_type: "{{ item.automember_type }}"
    description: "{{ item.description | default(omit) }}"
    inclusive: "{{ item.inclusive | default(omit) }}"
    exclusive: "{{ item.exclusive | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_server_automember_rules }}"
  loop_control:
    label: "{{ item.automember_type }}:{{ item.name }}"
  register: _freeipa_automember_result

# A host that enrols AFTER its rule exists is placed automatically by the IPA
# automember plugin at host-create time — no rebuild needed. A rebuild only
# re-evaluates members that ALREADY existed when a rule was added or changed
# (e.g. hosts enrolled before the rule). So rebuild per type, but ONLY when a
# rule actually changed this run (or when forced) — a rebuild is a heavy
# directory-wide re-evaluation, not something to run every play.
- name: Automember | Rebuild membership after rule changes
  freeipa.ansible_freeipa.ipaautomember:
    automember_type: "{{ item }}"
    state: rebuilt
  loop: "{{ freeipa_server_automember_rules | map(attribute='automember_type') | unique | list }}"
  loop_control:
    label: "{{ item }}"
  when: (_freeipa_automember_result is changed) or (freeipa_server_automember_rebuild | bool)
