---
# roles/freeipa_server/tasks/primary.yml
# Wrap freeipa.ansible_freeipa.ipaserver for the first/primary server.
#
# IMPORTANT: `omit` does NOT work for include_role vars (it leaks the literal
# __omit_place_holder__ string, which upstream then treats as a real value —
# e.g. firewall-cmd --info-zone=<placeholder> → INVALID_ZONE). So required
# inputs are set via set_fact, and optional inputs are set ONLY when provided,
# leaving them undefined for upstream's own `| default(omit)` to handle.
# Idempotent: the upstream role no-ops when /etc/ipa/default.conf exists.

- name: Map required ipaserver inputs
  ansible.builtin.set_fact:
    ipaserver_domain: "{{ freeipa_server_domain }}"
    ipaserver_realm: "{{ freeipa_server_realm }}"
    ipaserver_hostname: "{{ freeipa_server_fqdn }}"
    ipaserver_ip_addresses: "{{ freeipa_server_ip_addresses }}"
    ipaadmin_password: "{{ freeipa_server_admin_password }}"
    ipadm_password: "{{ freeipa_server_dm_password }}"
    ipaserver_install_packages: "{{ freeipa_server_install_packages }}"
    ipaserver_setup_firewalld: "{{ freeipa_server_setup_firewalld }}"
    ipaserver_setup_ca: "{{ freeipa_server_ca_mode != 'ca-less' }}"
    ipaserver_external_ca: "{{ freeipa_server_ca_mode == 'external-ca' }}"
    ipaserver_external_cert_files: "{{ freeipa_server_external_cert_files }}"
    ipaserver_random_serial_numbers: "{{ freeipa_server_random_serial_numbers }}"
    ipaserver_setup_kra: "{{ freeipa_server_setup_kra }}"
    ipaserver_no_pkinit: "{{ freeipa_server_no_pkinit }}"
    ipaserver_setup_dns: "{{ freeipa_server_setup_dns }}"
    ipaserver_forwarders: "{{ freeipa_server_forwarders }}"
    ipaserver_forward_policy: "{{ freeipa_server_forward_policy }}"
    ipaserver_no_forwarders: "{{ freeipa_server_no_forwarders }}"
    ipaserver_auto_reverse: "{{ freeipa_server_auto_reverse }}"
    ipaserver_reverse_zones: "{{ freeipa_server_reverse_zones }}"
    ipaserver_no_dnssec_validation: "{{ freeipa_server_no_dnssec_validation }}"
    ipaserver_allow_zone_overlap: "{{ freeipa_server_allow_zone_overlap }}"
    ipaserver_no_hbac_allow: "{{ freeipa_server_no_hbac_allow }}"
    ipaclient_mkhomedir: "{{ freeipa_server_mkhomedir }}"
    ipaserver_setup_ntp: "{{ freeipa_server_setup_ntp }}"
    ipaclient_ntp_servers: "{{ freeipa_server_ntp_servers }}"
  no_log: true

- name: Map optional ipaserver firewalld zone when provided
  ansible.builtin.set_fact:
    ipaserver_firewalld_zone: "{{ freeipa_server_firewalld_zone }}"
  when: freeipa_server_firewalld_zone | default('') | length > 0

- name: Map optional ipaserver CA subject base when provided
  ansible.builtin.set_fact:
    ipaserver_subject_base: "{{ freeipa_server_subject_base }}"
  when: freeipa_server_subject_base | default('') | length > 0

- name: Map optional ipaserver CA subject when provided
  ansible.builtin.set_fact:
    ipaserver_ca_subject: "{{ freeipa_server_ca_subject }}"
  when: freeipa_server_ca_subject | default('') | length > 0

- name: Map optional ipaserver POSIX idstart when provided
  ansible.builtin.set_fact:
    ipaserver_idstart: "{{ freeipa_server_idstart | int }}"
  when: freeipa_server_idstart | int > 0

- name: Map optional ipaserver POSIX idmax when provided
  ansible.builtin.set_fact:
    ipaserver_idmax: "{{ freeipa_server_idmax | int }}"
  when: freeipa_server_idmax | int > 0

- name: Map optional NTP pool when provided
  ansible.builtin.set_fact:
    ipaclient_ntp_pool: "{{ freeipa_server_ntp_pool }}"
  when: freeipa_server_ntp_pool | default('') | length > 0

- name: Install FreeIPA primary via upstream ipaserver role
  ansible.builtin.include_role:
    name: freeipa.ansible_freeipa.ipaserver

- name: Ensure IPA service is enabled and started
  ansible.builtin.service:
    name: ipa
    state: started
    enabled: true
