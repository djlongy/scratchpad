---
# roles/freeipa_server/tasks/idam_api.yml
# ─────────────────────────────────────────────────────────────────────────────
# API variant of idam.yml — applies IDAM via community.general.ipa_* over the IPA
# REST API by FQDN, FROM THE CONTROL NODE (vs native idam.yml, which runs server-
# side via local ipalib + kinit). Selected by `freeipa_idam_apply_via_api: true`.
#
# ⚠️  BENCHMARK VERDICT — native idam.yml is the recommended default:
#   Same workload (20 usergroups, 10 users, 30 hostgroups, 5 HBAC, 5 sudo):
#     native 85s   vs   API 227s   →   native is 2.67x FASTER.
#   The gap is bulk: native creates groups/users in ONE ipalib call; the API has no
#   bulk, so it's one HTTP round-trip per object (usergroups 2.6s vs 32.7s).
#
# ⚠️  CAPABILITY — community.general ipa_* modules that EXIST: group, user,
#   hostgroup, hbacrule, sudocmd, sudocmdgroup, sudorule, role, pwpolicy, dns*.
#   NO module exists for: hbacsvc, hbacsvcgroup, privilege, permission, automember.
#   This file wires the cleanly-mapping core set; the guard below fails fast if any
#   object it can't handle is declared, pointing you at native idam.yml.
#
# ⚠️  CONSTRAINTS — needs DNS (connects by freeipa_server_fqdn; native works before
#   DNS, by IP) and is capped at community.general ≤ 11.4.8 on OL8/py3.6.
#
# Prefer native unless you specifically need control-node API execution.
# ─────────────────────────────────────────────────────────────────────────────

- name: IDAM-API | Resolve admin password (declared var first, Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_api_pw: >-
      {{ freeipa_server_admin_password
         if (freeipa_server_admin_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_idam_vault_secret + ':' + freeipa_idam_admin_password_field) }}
  no_log: true
  delegate_to: localhost
  become: false

- name: IDAM-API | Refuse objects this path can't manage (use native idam.yml)
  ansible.builtin.assert:
    that:
      # No community module exists for these:
      - (freeipa_idam_hbacsvcs | length == 0)
      - (freeipa_idam_hbacsvcgroups | length == 0)
      - (freeipa_idam_privileges | length == 0)
      - (freeipa_idam_permissions | length == 0)
      - (freeipa_server_automember_rules | default([]) | length == 0)
      # A module EXISTS but is not wired in this core variant — use native or extend:
      - (freeipa_idam_iparoles | length == 0)
      - (freeipa_idam_sudocmdgroups | length == 0)
      - (freeipa_idam_pwpolicies | length == 0)
    fail_msg: >-
      The API path cannot apply one of: hbacsvcs / hbacsvcgroups / privileges /
      permissions / automember (NO community module), or iparoles / sudocmdgroups /
      pwpolicies (module exists but not wired here). Apply via native idam.yml
      (freeipa_idam_apply_via_api: false) — also 2.67x faster.

# Every community.general.ipa_* task runs on the control node and shares the same
# connection (by FQDN). The YAML anchor avoids repeating it. Only modules that
# actually exist in the collection are listed (module_defaults validates names).
- name: IDAM-API | Apply core objects via community.general API modules
  delegate_to: localhost
  become: false
  module_defaults:
    community.general.ipa_group: &_ipa_conn
      ipa_host: "{{ freeipa_server_fqdn }}"
      ipa_user: "{{ freeipa_idam_admin_principal }}"
      ipa_pass: "{{ _freeipa_api_pw }}"
      validate_certs: "{{ freeipa_idam_api_validate_certs | default(true) }}"
    community.general.ipa_user: *_ipa_conn
    community.general.ipa_hostgroup: *_ipa_conn
    community.general.ipa_hbacrule: *_ipa_conn
    community.general.ipa_sudocmd: *_ipa_conn
    community.general.ipa_sudorule: *_ipa_conn
  block:
    # Field names already match community params (the schema was named after them);
    # only name→cn (hbac/sudo rule), name→uid (user), name→sudocmd differ.
    - name: "IDAM-API | usergroups (loop — no bulk)"
      community.general.ipa_group:
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        gidnumber: "{{ item.gidnumber | default(omit) }}"
        group: "{{ item.group | default(omit) }}"
      loop: "{{ freeipa_idam_usergroups }}"
      loop_control: {label: "{{ item.name }}"}
      when: freeipa_idam_usergroups | length > 0
      no_log: true

    - name: "IDAM-API | users (loop — no bulk)"
      community.general.ipa_user:
        uid: "{{ item.name }}"
        givenname: "{{ item.first | default(item.givenname) | default(omit) }}"
        sn: "{{ item.last | default(item.sn) | default(omit) }}"
        title: "{{ item.title | default(omit) }}"
      loop: "{{ freeipa_idam_users }}"
      loop_control: {label: "{{ item.name }}"}
      when: freeipa_idam_users | length > 0
      no_log: true

    - name: "IDAM-API | hostgroups (loop)"
      community.general.ipa_hostgroup:
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        host: "{{ item.host | default(omit) }}"
        hostgroup: "{{ item.hostgroup | default(omit) }}"
      loop: "{{ freeipa_idam_hostgroups }}"
      loop_control: {label: "{{ item.name }}"}
      when: freeipa_idam_hostgroups | length > 0
      no_log: true

    - name: "IDAM-API | HBAC rules (loop — custom service/servicegroup need native)"
      community.general.ipa_hbacrule:
        cn: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        usercategory: "{{ item.usercategory | default(omit) }}"
        hostcategory: "{{ item.hostcategory | default(omit) }}"
        servicecategory: "{{ item.servicecategory | default(omit) }}"
        user: "{{ item.user | default(omit) }}"
        usergroup: "{{ item.usergroup | default(omit) }}"
        host: "{{ item.host | default(omit) }}"
        hostgroup: "{{ item.hostgroup | default(omit) }}"
        service: "{{ item.service | default(omit) }}"
        servicegroup: "{{ item.servicegroup | default(omit) }}"
      loop: "{{ freeipa_idam_hbac_rules }}"
      loop_control: {label: "{{ item.name }}"}
      when: freeipa_idam_hbac_rules | length > 0
      no_log: true

    - name: "IDAM-API | sudo commands (loop)"
      community.general.ipa_sudocmd:
        sudocmd: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
      loop: "{{ freeipa_idam_sudo_commands }}"
      loop_control: {label: "{{ item.name }}"}
      when: freeipa_idam_sudo_commands | length > 0
      no_log: true

    - name: "IDAM-API | sudo rules (loop)"
      community.general.ipa_sudorule:
        cn: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        usercategory: "{{ item.usercategory | default(omit) }}"
        hostcategory: "{{ item.hostcategory | default(omit) }}"
        cmdcategory: "{{ item.cmdcategory | default(omit) }}"
        user: "{{ item.user | default(omit) }}"
        usergroup: "{{ item.usergroup | default(omit) }}"
        host: "{{ item.host | default(omit) }}"
        hostgroup: "{{ item.hostgroup | default(omit) }}"
        cmd: "{{ item.cmd | default(omit) }}"
        cmdgroup: "{{ item.cmdgroup | default(omit) }}"
        sudoopt: "{{ item.sudoopt | default(omit) }}"
      loop: "{{ freeipa_idam_sudo_rules }}"
      loop_control: {label: "{{ item.name }}"}
      when: freeipa_idam_sudo_rules | length > 0
      no_log: true
