---
# roles/freeipa_server/tasks/certs.yml
# Import third-party / other-domain CA certificates into the IPA trust store so
# IPA and its enrolled clients TRUST certificates issued by those CAs. This is
# ADDITIVE — it does not change the IPA CA (freeipa_server_ca_mode); it adds
# trusted roots alongside it via `ipa-cacert-manage install` + `ipa-certupdate`.
#
# Primary only (the trust store replicates to the rest of the cluster). Requires
# the IPA CA store, so the caller skips this file in ca-less mode. There is no
# ansible_freeipa module for cacert-manage, so we shell out:
#   - ipa-cacert-manage install  -> needs the Directory Manager password; fed on
#                                   STDIN (not argv) so it never lands in `ps`.
#   - ipa-certupdate             -> runs as root via the host keytab (no kinit).
# Rotation-aware idempotency: a per-nickname stamp under /etc/ipa/.trusted-ca-fingerprints/
# records the SHA-256 (canonical DER) fingerprint last installed for that nickname.
# A nickname is (re)installed when it is absent from `ipa-cacert-manage list` OR the
# declared PEM's fingerprint differs from its stamp (a rotated cert under an existing
# nickname). ipa-certupdate runs only when at least one install fired; steady state is
# a clean no-op. The fingerprint (not the raw PEM bytes) is the comparison key, so PEM
# whitespace/encoding differences never trigger a false rotation.

- name: Trusted CAs | Validate each entry has a name and a source
  ansible.builtin.assert:
    that:
      - item.name | default('') | length > 0
      - (item.src | default('') | length > 0)
        or (item.content | default('') | length > 0)
        or (item.url | default('') | length > 0)
    fail_msg: >-
      Each freeipa_server_trusted_external_cas entry needs 'name' and one of
      'src' (PEM on the control node), 'content' (inline PEM), or 'url'
      (PEM fetched by the server, e.g. from an internal artifact repo).
    quiet: true
  loop: "{{ freeipa_server_trusted_external_cas }}"
  loop_control:
    label: "{{ item.name | default('?') }}"

- name: Trusted CAs | Resolve Directory Manager password (shared resolver)
  ansible.builtin.include_tasks: resolve_credentials.yml
  vars:
    _freeipa_resolve: [dm]

- name: Trusted CAs | Ensure the staging directory exists
  ansible.builtin.file:
    path: "{{ freeipa_server_trusted_ca_staging_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

# Persistent (not removed with the staging dir): holds one fingerprint stamp per
# nickname so a rotated cert under an existing nickname is detected on later runs.
- name: Trusted CAs | Ensure the fingerprint stamp directory exists
  ansible.builtin.file:
    path: /etc/ipa/.trusted-ca-fingerprints
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Trusted CAs | Stage CA certificates on the primary (src/content)
  ansible.builtin.copy:
    src: "{{ item.src | default(omit) }}"
    content: "{{ item.content | default(omit) }}"
    dest: "{{ freeipa_server_trusted_ca_staging_dir }}/{{ item.name }}.pem"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ freeipa_server_trusted_external_cas | rejectattr('url', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"

# URL items are fetched BY THE SERVER (get_url on the primary) — the pattern for
# seeding trust from an internal artifact repo (Artifactory/Nexus) the server can
# reach. Optional per item: checksum ("sha256:<hex>"), validate_certs (default true).
- name: Trusted CAs | Fetch CA certificates from URL onto the primary
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ freeipa_server_trusted_ca_staging_dir }}/{{ item.name }}.pem"
    owner: root
    group: root
    mode: "0644"
    checksum: "{{ item.checksum | default(omit) }}"
    validate_certs: "{{ item.validate_certs | default(true) }}"
  loop: "{{ freeipa_server_trusted_external_cas | selectattr('url', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"

# PREFLIGHT: ipa-cacert-manage install REJECTS any PEM that is not a proper CA
# certificate — it must carry basicConstraints CA:TRUE (and keyUsage keyCertSign).
# A leaf/server cert, or a CA missing those, fails upstream with a cryptic "not a
# valid CA certificate / invalid / missing basic constraints". We validate the
# staged PEMs here FIRST so the operator gets an actionable message naming the
# offending entry instead of the opaque upstream error. Read-only (changed_when:false).
- name: Trusted CAs | Read basicConstraints/keyUsage of each staged certificate
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -in
      - "{{ freeipa_server_trusted_ca_staging_dir }}/{{ item.name }}.pem"
      - -noout
      - -ext
      - basicConstraints,keyUsage
  loop: "{{ freeipa_server_trusted_external_cas }}"
  loop_control:
    label: "{{ item.name }}"
  register: _freeipa_trusted_ca_bc
  changed_when: false
  failed_when: false

- name: Trusted CAs | Assert each staged certificate is a real CA (basicConstraints CA:TRUE)
  ansible.builtin.assert:
    that:
      - "'CA:TRUE' in (item.stdout | default(''))"
    fail_msg: >-
      freeipa_server_trusted_external_cas entry '{{ item.item.name }}' is NOT a CA
      certificate (needs basicConstraints CA:TRUE + keyUsage keyCertSign). You supplied
      a leaf/server cert, or a CA cert missing those constraints — ipa-cacert-manage
      install will reject it. Provide the issuing CA / root PEM (the certificate that
      SIGNS your certs), not the server/leaf certificate itself. openssl reported for
      '{{ freeipa_server_trusted_ca_staging_dir }}/{{ item.item.name }}.pem':
      {{ item.stdout | default('<no basicConstraints extension>') | trim }}
    quiet: true
  loop: "{{ _freeipa_trusted_ca_bc.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Trusted CAs | List currently trusted CA certificates
  ansible.builtin.command: ipa-cacert-manage list
  register: _freeipa_trusted_ca_list
  changed_when: false

# Canonical DER fingerprint of the declared PEM — the comparison key for rotation.
# Immune to PEM whitespace/encoding, so re-serialising the same cert never trips it.
- name: Trusted CAs | Fingerprint each staged certificate (SHA-256)
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -in
      - "{{ freeipa_server_trusted_ca_staging_dir }}/{{ item.name }}.pem"
      - -noout
      - -fingerprint
      - -sha256
  loop: "{{ freeipa_server_trusted_external_cas }}"
  loop_control:
    label: "{{ item.name }}"
  register: _freeipa_trusted_ca_fp
  changed_when: false

# The fingerprint last installed for each nickname (empty when the stamp is absent).
- name: Trusted CAs | Read the recorded fingerprint stamp for each nickname
  ansible.builtin.slurp:
    src: "/etc/ipa/.trusted-ca-fingerprints/{{ item.name }}"
  loop: "{{ freeipa_server_trusted_external_cas }}"
  loop_control:
    label: "{{ item.name }}"
  register: _freeipa_trusted_ca_stamp
  changed_when: false
  failed_when: false

# ROTATION ONLY: NSS refuses to add a DIFFERENT certificate under a nickname that
# already exists (certutil SEC_ERROR_ADDING_CERT / exit 255), so a rotated cert can
# only be installed after the old one under that nickname is removed. `ipa-cacert-manage
# delete <nickname>` takes the DM password on STDIN (same as install, kept off argv/ps)
# and removes the added trusted root without touching the IPA CA. Fires ONLY when the
# nickname is ALREADY trusted AND its stamp differs from the declared fingerprint — i.e.
# the rotation branch of the install condition below. The first-install path (nickname
# absent) never reaches here, so its cert is added directly with no delete.
- name: Trusted CAs | Remove the superseded certificate before installing a rotated one
  ansible.builtin.command:
    argv:
      - ipa-cacert-manage
      - delete
      - "{{ item.name }}"
    stdin: "{{ _freeipa_dm_password }}"
  loop: "{{ freeipa_server_trusted_external_cas }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: _idx
  when: >-
    (_freeipa_trusted_ca_list.stdout_lines | default([])
     | select('search', '(^|\s)' ~ (item.name | regex_escape) ~ '($|\s)')
     | list | length) > 0
    and ((_freeipa_trusted_ca_stamp.results[_idx].content | default('') | b64decode | trim)
         != (_freeipa_trusted_ca_fp.results[_idx].stdout | default('') | trim))
  changed_when: true
  no_log: true

- name: Trusted CAs | Install external CA certificates that are absent or rotated
  ansible.builtin.command:
    argv:
      - ipa-cacert-manage
      - install
      - -n
      - "{{ item.name }}"
      - "{{ freeipa_server_trusted_ca_staging_dir }}/{{ item.name }}.pem"
    stdin: "{{ _freeipa_dm_password }}"
  loop: "{{ freeipa_server_trusted_external_cas }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: _idx
  # Install when the nickname is not yet trusted OR the declared fingerprint differs
  # from the stamp (rotation). Word-bounded per-line match, not a substring test — a
  # plain `in stdout` would treat nickname 'corp' as already-trusted whenever
  # 'corp-root' is listed. An absent stamp decodes to '' and never equals a real
  # fingerprint, so it forces a reconcile install.
  when: >-
    (_freeipa_trusted_ca_list.stdout_lines | default([])
     | select('search', '(^|\s)' ~ (item.name | regex_escape) ~ '($|\s)')
     | list | length) == 0
    or ((_freeipa_trusted_ca_stamp.results[_idx].content | default('') | b64decode | trim)
        != (_freeipa_trusted_ca_fp.results[_idx].stdout | default('') | trim))
  register: _freeipa_trusted_ca_install
  changed_when: true
  no_log: true

- name: Trusted CAs | Distribute trust across the deployment (ipa-certupdate)
  ansible.builtin.command: ipa-certupdate
  when: _freeipa_trusted_ca_install is changed
  changed_when: true

# Record the declared fingerprint for every nickname after the store is reconciled,
# so the next run's rotation check has a baseline and steady state is a clean no-op.
- name: Trusted CAs | Record the installed fingerprint stamp per nickname
  ansible.builtin.copy:
    dest: "/etc/ipa/.trusted-ca-fingerprints/{{ item.item.name }}"
    content: "{{ item.stdout | trim }}\n"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ _freeipa_trusted_ca_fp.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Trusted CAs | Remove the staging directory
  ansible.builtin.file:
    path: "{{ freeipa_server_trusted_ca_staging_dir }}"
    state: absent
