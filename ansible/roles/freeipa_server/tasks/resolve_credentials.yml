---
# Shared credential resolution — the ONE copy of "declared var wins, HashiCorp Vault
# is the lazy fallback" (freeipa_server_vault_secret : *_field). Include with:
#   - ansible.builtin.include_tasks: resolve_credentials.yml
#     vars: { _freeipa_resolve: [admin] }          # any of: admin, dm
# Sets _freeipa_admin_password / _freeipa_dm_password; cached for the rest of the
# play so repeated phases don't re-hit Vault.

- name: Resolve IPA admin password (declared var first, Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_admin_password: >-
      {{ freeipa_server_admin_password
         if (freeipa_server_admin_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_server_vault_secret
            + ':' + freeipa_server_admin_password_field) }}
  when:
    - "'admin' in _freeipa_resolve"
    - _freeipa_admin_password is not defined
  no_log: true
  delegate_to: localhost
  become: false

- name: Resolve Directory Manager password (declared var first, Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_dm_password: >-
      {{ freeipa_server_dm_password
         if (freeipa_server_dm_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_server_vault_secret
            + ':' + freeipa_server_dm_password_field) }}
  when:
    - "'dm' in _freeipa_resolve"
    - _freeipa_dm_password is not defined
  no_log: true
  delegate_to: localhost
  become: false
