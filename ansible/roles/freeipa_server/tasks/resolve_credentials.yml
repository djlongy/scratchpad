---
# Shared credential resolution. Contract: Ansible Vault FIRST, HashiCorp Vault as an
# optional fallback — so the role runs in any environment, including one that only uses
# Ansible Vault (no HashiCorp Vault reachable).
#   1. A declared variable (freeipa_server_admin_password / _dm_password), typically set
#      from an Ansible-Vault-encrypted group_var, is the PRIMARY source and always wins.
#   2. HashiCorp Vault (freeipa_server_vault_secret) is used ONLY when that var is empty
#      AND a KV path is configured. The Jinja `A if C else B` is lazy, so when the var is
#      set the community.hashi_vault lookup is never evaluated and need not be installed.
#   3. If neither source is present the play fails with a clear, actionable message
#      instead of a cryptic HashiCorp Vault connection error.
# Include with:
#   - ansible.builtin.include_tasks: resolve_credentials.yml
#     vars: { _freeipa_resolve: [admin] }          # any of: admin, dm
# Sets _freeipa_admin_password / _freeipa_dm_password; cached for the rest of the
# play so repeated phases don't re-resolve.

- name: Assert an IPA admin password source is configured (Ansible Vault var or HashiCorp Vault path)
  ansible.builtin.assert:
    that:
      - >-
        (freeipa_server_admin_password | default('') | length > 0)
        or (freeipa_server_vault_secret | default('') | length > 0)
    fail_msg: >-
      No IPA admin password source configured. Set freeipa_server_admin_password
      (recommended: from an Ansible-Vault-encrypted group_var) or, to use HashiCorp Vault,
      set freeipa_server_vault_secret to the KV path holding it.
  when:
    - "'admin' in _freeipa_resolve"
    - _freeipa_admin_password is not defined

- name: Resolve IPA admin password (Ansible Vault var first, HashiCorp Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_admin_password: >-
      {{ freeipa_server_admin_password
         if (freeipa_server_admin_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_server_vault_secret
            + ':' + freeipa_server_admin_password_field) }}
  when:
    - "'admin' in _freeipa_resolve"
    - _freeipa_admin_password is not defined
  no_log: true
  delegate_to: localhost
  become: false

- name: Assert a Directory Manager password source is configured (Ansible Vault var or HashiCorp Vault path)
  ansible.builtin.assert:
    that:
      - >-
        (freeipa_server_dm_password | default('') | length > 0)
        or (freeipa_server_vault_secret | default('') | length > 0)
    fail_msg: >-
      No Directory Manager password source configured. Set freeipa_server_dm_password
      (recommended: from an Ansible-Vault-encrypted group_var) or, to use HashiCorp Vault,
      set freeipa_server_vault_secret to the KV path holding it.
  when:
    - "'dm' in _freeipa_resolve"
    - _freeipa_dm_password is not defined

- name: Resolve Directory Manager password (Ansible Vault var first, HashiCorp Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_dm_password: >-
      {{ freeipa_server_dm_password
         if (freeipa_server_dm_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_server_vault_secret
            + ':' + freeipa_server_dm_password_field) }}
  when:
    - "'dm' in _freeipa_resolve"
    - _freeipa_dm_password is not defined
  no_log: true
  delegate_to: localhost
  become: false
