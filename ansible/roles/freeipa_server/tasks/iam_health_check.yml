---
# health_check.yml — Ensure all FreeIPA services are running before IAM operations.
#
# Problem: After extended downtime or cold starts, `ipactl start` can time out
# waiting for Directory Service (389-ds), leaving dependent services (krb5kdc,
# kadmin, named, httpd, ipa-custodia, pki-tomcatd, ipa-otpd, ipa-dnskeysyncd)
# stopped. IAM operations (user/group/HBAC management) require a fully healthy
# FreeIPA stack.
#
# Approach: Check `ipactl status`, and if any services are STOPPED, start them
# individually via systemctl before falling back to `ipactl start --force`.

# named + ipa-dnskeysyncd only exist when IPA is installed with integrated DNS
# (--setup-dns). On a DNS-less server (freeipa_server_setup_dns: false) those
# units are absent, so enabling them errors — gate them on the DNS switch. The
# ipactl-status-driven steps below already self-scope (ipactl only reports the
# services this server actually runs), so only this hardcoded list needs gating.
- name: Ensure FreeIPA services are enabled at boot
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop: >-
    {{ ['krb5kdc', 'kadmin', 'httpd', 'ipa-custodia', 'ipa-otpd.socket']
       + (['named', 'ipa-dnskeysyncd'] if (freeipa_server_setup_dns | bool) else []) }}
  loop_control:
    label: "{{ item }}"

- name: Check FreeIPA service status
  ansible.builtin.command: ipactl status
  register: _freeipa_health_status
  changed_when: false
  failed_when: false

# An UNCONFIGURED server (scrubbed / never installed) makes ipactl print
# "IPA is not configured" — no "STOPPED" lines, so the parse below would read it
# as fully healthy and the run would die ~50 tasks later with a cryptic
# "Cannot find KDC" kinit error. Fail fast here instead.
- name: Fail fast when this host has no configured FreeIPA server
  ansible.builtin.assert:
    that:
      - (_freeipa_health_status.stdout | default('')) is not search('IPA is not configured')
      - (_freeipa_health_status.stderr | default('')) is not search('IPA is not configured')
    fail_msg: >-
      ipactl reports "IPA is not configured" — this host has NO FreeIPA server, so
      IAM operations cannot run. Install first (--tags install, or the signed_install
      two-phase flow for an external-CA realm), then re-run the IAM phase.
    quiet: true

- name: Parse stopped FreeIPA services
  ansible.builtin.set_fact:
    _freeipa_stopped_services: >-
      {{
        _freeipa_health_status.stdout_lines | default([])
        | select('search', 'STOPPED')
        | map('regex_replace', ':\s*STOPPED.*$', '')
        | map('trim')
        | list
      }}

- name: Display FreeIPA health status
  ansible.builtin.debug:
    msg: >-
      {{ (_freeipa_stopped_services | length == 0)
         | ternary('All FreeIPA services are running.',
                   'Stopped services detected: ' + (_freeipa_stopped_services | join(', '))) }}

- name: Start stopped FreeIPA services individually via systemctl
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  loop: "{{ _freeipa_stopped_services }}"
  loop_control:
    label: "{{ item }}"
  when: _freeipa_stopped_services | length > 0
  register: _freeipa_individual_start
  failed_when: false

- name: Run ipactl start --force if individual service starts had failures
  ansible.builtin.command: ipactl start --force
  when:
    - _freeipa_stopped_services | length > 0
    - _freeipa_individual_start.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list | length > 0
  changed_when: true
  register: _freeipa_force_start
  failed_when: false

- name: Wait for FreeIPA Directory Service to be responsive
  ansible.builtin.wait_for:
    port: 389
    host: 127.0.0.1
    timeout: 120
    delay: 5
  when: _freeipa_stopped_services | length > 0

- name: Verify FreeIPA is fully healthy after recovery
  ansible.builtin.command: ipactl status
  register: _freeipa_health_verify
  changed_when: false
  when: _freeipa_stopped_services | length > 0

- name: Fail if FreeIPA services are still not running
  ansible.builtin.assert:
    that:
      - _freeipa_health_verify.stdout is not search('STOPPED')
    fail_msg: >-
      FreeIPA services are still not fully running after recovery attempts.
      Output: {{ _freeipa_health_verify.stdout }}
    success_msg: "All FreeIPA services recovered successfully."
  when: _freeipa_stopped_services | length > 0
