---
# roles/freeipa_server/tasks/export_config.yml
#
# Snapshot the LIVE FreeIPA configuration into this role's flat declarative
# contract (freeipa_idam_* / freeipa_server_*), written as a YAML group_vars
# file on the control node. Lets you adopt an existing instance — capture it
# once, then reapply idempotently with this role instead of rebuilding from
# scratch.
#
# Read-only against FreeIPA (only *_find/*_show via the on-server ipalib). Opt-in:
# gated behind the `export` tag (main.yml tags it [never, export]), primary only.
# Auth reuses the IDAM admin credential from Vault, same as idam.yml.

- name: Export | Assert this is the primary
  ansible.builtin.assert:
    that:
      - freeipa_server_is_primary | bool
    fail_msg: "Config export runs on the FreeIPA primary only."

- name: Export | Assert a credential source is available
  ansible.builtin.assert:
    that:
      - (freeipa_server_admin_password | default('') | length > 0) or
        (freeipa_server_vault_secret | default('') | length > 0)
    fail_msg: >-
      No admin credential available. Either set freeipa_server_admin_password
      (no HashiCorp Vault needed), or configure freeipa_server_vault_secret for the
      Vault fallback.

- name: Export | Resolve admin password (declared var first, Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_export_admin_pw: >-
      {{ freeipa_server_admin_password
         if (freeipa_server_admin_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_server_vault_secret + ':' + freeipa_server_admin_password_field) }}
  no_log: true
  delegate_to: localhost
  become: false

- name: Export | Acquire Kerberos ticket
  ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}"
  args:
    stdin: "{{ _freeipa_export_admin_pw }}\n"
  changed_when: false
  no_log: true

- name: Export | Capture live configuration via ipalib
  ansible.builtin.script: >-
    freeipa_config_export.py
    {{ '--include-host-membership' if freeipa_server_export_include_host_membership | bool else '' }}
    {{ '--include-sshkeys' if freeipa_server_export_include_sshkeys | bool else '' }}
    --stock-hbacsvc {{ freeipa_server_export_hbacsvc_stock | to_json | quote }}
  args:
    executable: /usr/bin/python3
  register: _freeipa_export_raw
  changed_when: false

- name: Export | Destroy Kerberos ticket
  ansible.builtin.command: kdestroy
  changed_when: false
  failed_when: false
  no_log: true

- name: Export | Parse captured configuration
  ansible.builtin.set_fact:
    # Slice from the first '{' so any stray preamble on stdout (e.g. a library warning)
    # can never break from_json — the script emits one JSON object as its real output.
    _freeipa_export: "{{ _freeipa_export_raw.stdout[_freeipa_export_raw.stdout.find('{'):] | from_json }}"

- name: Export | Render the snapshot group_vars file on the control node
  ansible.builtin.template:
    src: freeipa.config.snapshot.yml.j2
    dest: "{{ freeipa_server_export_output }}"
    mode: "0640"
  delegate_to: localhost
  become: false

- name: Export | Report
  ansible.builtin.debug:
    msg: >-
      Captured {{ _freeipa_export.meta.realm }} from {{ _freeipa_export.meta.source }}
      → {{ freeipa_server_export_output }} ({{ _freeipa_export.meta.counts | to_json }}).
      Move it into an inventory group_vars to reapply with this role.
