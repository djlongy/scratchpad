---
# roles/freeipa_server/tasks/dns_records.yml
# Declarative DNS for IPA's integrated DNS: manage hosted zones, conditional
# forward zones, and records via the upstream ipadnszone / ipadnsforwardzone /
# ipadnsrecord modules. Primary only (replicates to the cluster). Idempotent —
# the modules reconcile to the declared state. Admin password from Vault.
#
# Only meaningful when IPA runs integrated DNS (freeipa_server_setup_dns: true).

- name: DNS | Resolve admin password (shared resolver)
  ansible.builtin.include_tasks: resolve_credentials.yml
  vars:
    _freeipa_resolve: [admin]

# Forward AND reverse zones in one task. Forward: set `name`. Reverse: set
# `name_from_ip` to a CIDR (e.g. 10.0.0.0/24) and IPA derives the in-addr.arpa
# zone name — pair with allow_sync_ptr (and create_reverse on records below) for
# automatic PTRs. skip_overlap_check helps when a reverse zone overlaps a parent.
- name: DNS | Manage hosted zones (forward + reverse)
  freeipa.ansible_freeipa.ipadnszone:
    name: "{{ item.name | default(omit) }}"
    name_from_ip: "{{ item.name_from_ip | default(omit) }}"
    dynamic_update: "{{ item.dynamic_update | default(omit) }}"
    allow_sync_ptr: "{{ item.allow_sync_ptr | default(omit) }}"
    allow_transfer: "{{ item.allow_transfer | default(omit) }}"
    skip_overlap_check: "{{ item.skip_overlap_check | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_server_dns_zones }}"
  loop_control:
    label: "{{ item.name | default(item.name_from_ip) | default('unnamed-zone') }}"

- name: DNS | Manage conditional forward zones
  freeipa.ansible_freeipa.ipadnsforwardzone:
    name: "{{ item.name }}"
    forwarders: "{{ item.forwarders | default(omit) }}"
    forwardpolicy: "{{ item.forwardpolicy | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ freeipa_server_dns_forward_zones }}"
  loop_control:
    label: "{{ item.name }}"

# ONE task for every record shape — record_value is list-typed upstream, so a
# single value and many values are the SAME field (no record_value/record_values
# split): record_value: 10.0.0.5  OR  record_value: [10.0.0.5, 10.0.0.6]. Two ways
# to drive it, pick per item (all optional via omit):
#   * flat   — name + record_type + record_value (+ create_reverse for auto-PTR)
#   * bulk   — zone_name + records: [ {record_name, a_record: [...], create_reverse}, ... ]
#              (one call per zone; record fields are list-typed too)
# create_reverse auto-builds the PTR — needs the matching reverse zone above +
# allow_sync_ptr. Great for vCenter/ESXi hosts sourced from inventory hostvars.
# GLOBAL default: freeipa_server_dns_create_reverse: true PTRs every A/AAAA
# record (flat items via _dns_flat_reverse; bulk `records:` entries via the
# freeipa_dns_reverse_defaulted filter). A per-record create_reverse always wins,
# and non-address records are never touched (create_reverse is A/AAAA-only).
- name: DNS | Manage records (single, multi, or bulk — one task)
  freeipa.ansible_freeipa.ipadnsrecord:
    zone_name: "{{ item.zone_name }}"
    name: "{{ item.name | default(omit) }}"
    record_type: "{{ item.record_type | default(omit) }}"
    record_value: "{{ item.record_value | default(omit) }}"
    record_ttl: "{{ item.record_ttl | default(omit) }}"
    create_reverse: "{{ item.create_reverse | default(_dns_flat_reverse) }}"
    records: "{{ item.records | default([]) | freeipa_dns_reverse_defaulted(freeipa_server_dns_create_reverse) | default(omit, true) }}"
    state: "{{ item.state | default('present') }}"
  vars:
    _dns_flat_reverse: >-
      {{ true if (freeipa_server_dns_create_reverse | bool
                  and (item.record_type | default('') | upper) in ['A', 'AAAA'])
         else omit }}
  loop: "{{ freeipa_server_dns_records }}"
  loop_control:
    label: "{{ item.zone_name }}/{{ item.name | default('(bulk)') }} {{ item.record_type | default('') }}"
