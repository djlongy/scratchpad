---
# roles/freeipa_server/tasks/iam.yml
#
# PHASE 2 (native) of the declarative IAM pipeline: APPLY. Creates/updates the declared
# FreeIPA objects (usergroups, users, hostgroups, HBAC, sudo, roles, privileges,
# permissions, ...) via server-side ansible_freeipa modules (local ipalib + kinit).
#
# CONSUMES the desired state assembled + validated by iam_desired.yml (imported
# immediately before this file by main.yml) — never run it standalone.
# (Prune variant: reconcile.yml.)

- name: Expand user roles into group memberships
  ansible.builtin.set_fact:
    _freeipa_users_roled: >-
      {{ (_freeipa_users_roled | default([])) + [
           (item | dict2items | rejectattr('key', 'equalto', 'roles') | items2dict)
           | combine({'groups': (
               (item.groups | default([]))
               + (item.roles | default([]) | map('extract', _freeipa_role_groups) | flatten)
             ) | unique })
         ] }}
  loop: "{{ _freeipa_iam_users_base | default([]) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_roles | length > 0
  no_log: true

# Internal fact (not the public freeipa_iam_users) so role expansion holds even under
# extra-vars, which outrank set_fact. NB: gate on freeipa_iam_roles LENGTH, not on
# `_freeipa_users_roled | default(...)` — the re-entry guard defines it as [], and
# default() only fires on UNDEFINED, so the default() form silently drops every user
# whenever no roles are declared.
- name: Resolve effective users (role-expanded when roles are used)
  ansible.builtin.set_fact:
    _freeipa_iam_users: "{{ _freeipa_users_roled if (freeipa_iam_roles | length > 0) else _freeipa_iam_users_base }}"

- name: Build desired FreeIPA username list
  ansible.builtin.set_fact:
    freeipa_iam_desired_usernames: "{{ _freeipa_iam_users | map(attribute='name') | list | unique }}"

- name: Build declarative FreeIPA group name list
  ansible.builtin.set_fact:
    freeipa_iam_group_names: "{{ freeipa_iam_usergroups | map(attribute='name') | list | unique }}"

- name: Build requested user->group memberships from user entries
  ansible.builtin.set_fact:
    freeipa_iam_user_group_pairs: "{{ (freeipa_iam_user_group_pairs | default([])) + [ {'user': item.0.name, 'group': item.1} ] }}"
  # default([]) matters: Ansible templates a task's loop even when the phase is
  # skipped by `when` (this role running on a REPLICA in a cluster play — the
  # primary-only desired phase never set _freeipa_iam_users there).
  loop: "{{ _freeipa_iam_users | default([]) | subelements('groups', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} -> {{ item.1 }}"
  # name pairs only (no secrets) — shown at -vv.
  no_log: "{{ ansible_verbosity < 2 }}"

# TENANT-ISOLATION BOUNDARY: a user->group membership is only applied when the
# GROUP is declared in THIS slice's freeipa_iam_usergroups (the effective-groups
# build below attaches members to declared groups only). A reference to a built-in
# or another slice's group passes validation but would NOT be reconciled here — so
# surface it loudly instead of dropping it silently. To actually apply such a
# membership, declare it in the inventory that owns the group (e.g. the global slice).
- name: Warn on memberships into groups this slice does not manage (not applied)
  ansible.builtin.debug:
    msg: |-
      WARNING — {{ _unmanaged | length }} membership(s) reference groups this slice does not
      manage; NOT applied (declare them where the group is owned, e.g. the global slice):
      {% for p in _unmanaged %}
        - {{ p.user }} -> {{ p.group }}
      {% endfor %}
  vars:
    _unmanaged: "{{ freeipa_iam_user_group_pairs | default([]) | rejectattr('group', 'in', freeipa_iam_group_names) | list }}"
  when: _unmanaged | length > 0

- name: Build effective FreeIPA groups with merged memberships
  ansible.builtin.set_fact:
    freeipa_iam_usergroups_effective: "{{ (freeipa_iam_usergroups_effective | default([])) + [item | combine(_freeipa_iam_group_user_block, recursive=True)] }}"
  vars:
    _freeipa_iam_users_from_group_entry: "{{ item.user | default([]) }}"
    _freeipa_iam_users_from_user_entries: >-
      {{
        (freeipa_iam_user_group_pairs | default([]))
        | selectattr('group', 'equalto', item.name)
        | map(attribute='user')
        | list
      }}
    _freeipa_iam_merged_users: "{{ (_freeipa_iam_users_from_group_entry + _freeipa_iam_users_from_user_entries) | unique }}"
    _freeipa_iam_group_user_block: "{{ {'user': _freeipa_iam_merged_users} if (_freeipa_iam_merged_users | length > 0) else {} }}"
  loop: "{{ freeipa_iam_usergroups }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_usergroups | length > 0
  # group dicts with member NAMES (no secrets) — shown at -vv.
  no_log: "{{ ansible_verbosity < 2 }}"

# Build the two BULK ipagroup payloads — one `groups:` list to create the group
# OBJECTS (name/description/gidnumber/posix), one to set MEMBERSHIP (user/group/
# membermanager). Splitting create from member keeps the dependency order intact
# (groups must exist before HBAC rules reference them; membership needs users to
# exist) while collapsing two per-group LOOPS into two single module calls — the
# speedup. gidnumber: a group's own value wins, else the freeipa_iam_group_gids
# map (deterministic GIDs), else IPA auto-assigns.
- name: Build bulk ipagroup create + membership payloads
  ansible.builtin.set_fact:
    _freeipa_iam_usergroups_create: "{{ (_fc_yaml | from_yaml) or [] }}"
    _freeipa_iam_usergroups_members: "{{ (_fm_yaml | from_yaml) or [] }}"
  vars:
    _fc_yaml: |-
      {% for g in (freeipa_iam_usergroups_effective | default([])) %}
      {% if (g.state | default('present')) != 'absent' %}
      {% set _gid = g.gidnumber | default(freeipa_iam_group_gids[g.name] | default('')) %}
      - {name: "{{ g.name }}"{% if g.description is defined %}, description: "{{ g.description }}"{% endif %}{% if _gid | string | length > 0 %}, gidnumber: {{ _gid }}{% endif %}{% if g.posix is defined %}, posix: {{ g.posix | to_json }}{% endif %}{% if g.nonposix is defined %}, nonposix: {{ g.nonposix | to_json }}{% endif %}}
      {% endif %}
      {% endfor %}
    _fm_yaml: |-
      {% for g in (freeipa_iam_usergroups_effective | default([])) %}
      {% if (g.state | default('present')) != 'absent' and ((g.user | default([]) | length > 0) or (g.group | default([]) | length > 0) or (g.membermanager_user | default([]) | length > 0) or (g.membermanager_group | default([]) | length > 0)) %}
      - {name: "{{ g.name }}"{% if g.user | default([]) | length > 0 %}, user: {{ g.user | to_json }}{% endif %}{% if g.group | default([]) | length > 0 %}, group: {{ g.group | to_json }}{% endif %}{% if g.membermanager_user | default([]) | length > 0 %}, membermanager_user: {{ g.membermanager_user | to_json }}{% endif %}{% if g.membermanager_group | default([]) | length > 0 %}, membermanager_group: {{ g.membermanager_group | to_json }}{% endif %}}
      {% endif %}
      {% endfor %}
  # ipagroup create/membership payloads — NAMES only (no secrets) — shown at -vv.
  no_log: "{{ ansible_verbosity < 2 }}"

# Protected/system users (admin) are EXCLUDED from the create/mod payload: the
# `admin` entry lacks the inetOrgPerson objectClass, so FreeIPA refuses to set
# givenName on it ("attribute givenName not allowed") and the whole ipauser task
# fails. Their GROUP memberships are still applied — that happens via the group
# tasks (ipagroup action: member), independent of user-mod — so you can still add
# admin to groups, you just never try to modify admin's identity attributes.
- name: Build FreeIPA users payload without local-only keys (skip protected users)
  ansible.builtin.set_fact:
    freeipa_iam_users_effective: >-
      {{ (freeipa_iam_users_effective | default([]))
         + [ (item | dict2items | rejectattr('key', 'equalto', 'groups')
                   | rejectattr('key', 'equalto', 'roles') | items2dict)
             | combine(_freeipa_iam_email_default) | combine(_freeipa_iam_pw_default) ] }}
  vars:
    # Default email = <name>@<email_domain> only when the user gave no explicit one.
    _freeipa_iam_email_default: >-
      {{ {} if (item.email is defined)
         else {'email': [item.name ~ '@' ~ freeipa_iam_email_domain]} }}
    # Default create-time password (update_password: on_create never resets existing).
    _freeipa_iam_pw_default: >-
      {{ {} if (item.password is defined or (freeipa_iam_default_user_password | length == 0))
         else {'password': freeipa_iam_default_user_password} }}
  loop: "{{ _freeipa_iam_users | default([]) | rejectattr('name', 'in', freeipa_iam_unmodifiable_users) | list }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  no_log: true

- name: IAM | Resolve admin password (shared resolver)
  ansible.builtin.include_tasks: resolve_credentials.yml
  vars:
    _freeipa_resolve: [admin]

# Reactivate (undel) any DECLARED user that currently exists only as a PRESERVED (archived)
# entry. Without this, re-declaring a previously-removed user is a no-op at create time (the
# name still "exists" in cn=deleted), and the later membership add fails hard with
# "no such entry" — blocking the whole run. Bounded + idempotent: only undeletes preserved
# users whose name is back in the desired set. Needs the IPA CLI, so a short kinit window.
- name: Reactivate declared-but-preserved users (re-onboard safety)
  when:
    - freeipa_iam_reactivate_preserved | bool
    - freeipa_iam_desired_usernames | length > 0
  block:
    - name: Acquire Kerberos ticket to find preserved users
      ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }}"
      args:
        stdin: "{{ _freeipa_admin_password }}"
      changed_when: false
      check_mode: false
      no_log: true

    - name: Find currently-preserved (archived) users
      ansible.builtin.command: "ipa user-find --preserved=true --pkey-only --sizelimit=0"
      register: _freeipa_iam_preserved_find
      changed_when: false
      check_mode: false
      failed_when: false

    - name: Compute declared users that are currently preserved
      ansible.builtin.set_fact:
        _freeipa_iam_to_reactivate: >-
          {{ (_freeipa_iam_preserved_find.stdout_lines | default([]) | map('trim')
              | select('match', '^User login:')
              | map('regex_replace', '^User login: ', '') | list)
             | intersect(freeipa_iam_desired_usernames) }}

    - name: Reactivate (undel) preserved users that are re-declared
      ansible.builtin.command: "ipa user-undel {{ item | quote }}"
      loop: "{{ _freeipa_iam_to_reactivate | default([]) }}"
      loop_control:
        label: "{{ item }}"
      changed_when: true

    - name: Destroy reactivation Kerberos ticket
      ansible.builtin.command: kdestroy
      changed_when: false
      check_mode: false
      failed_when: false

# ── Precheck: ONE find per remaining per-item object type; those loops then run
# ONLY for entries that differ from the realm (freeipa_iam_changed_subset — every
# skipped iteration saves a full Python + ipalib bootstrap on the server). Fail
# open: a failed/empty find yields raw "", the filter sees nothing current, and
# the full declared list runs exactly as before this optimisation. sudocmd is
# also read when only sudocmdgroups are declared — the group members carry
# ipaUniqueID leaves that resolve through the sudocmd output (aux_raw).
- name: Precheck | Read current realm objects (one find per object type)
  vars:
    _freeipa_precheck_specs:
      - {find: hostgroup, run: "{{ freeipa_iam_hostgroups | length > 0 }}"}
      - {find: hbacrule, run: "{{ (freeipa_iam_hbac_rules | length > 0) or (freeipa_iam_hbac_rules_disable | length > 0) }}"}
      - {find: hbacsvc, run: "{{ freeipa_iam_hbacsvcs | length > 0 }}"}
      - {find: hbacsvcgroup, run: "{{ freeipa_iam_hbacsvcgroups | length > 0 }}"}
      - {find: sudocmd, run: "{{ (freeipa_iam_sudo_commands | length > 0) or (freeipa_iam_sudocmdgroups | length > 0) }}"}
      - {find: sudocmdgroup, run: "{{ freeipa_iam_sudocmdgroups | length > 0 }}"}
      - {find: pwpolicy, run: "{{ freeipa_iam_pwpolicies | length > 0 }}"}
      - {find: permission, run: "{{ freeipa_iam_permissions | length > 0 }}"}
      - {find: privilege, run: "{{ freeipa_iam_privileges | length > 0 }}"}
      - {find: role, run: "{{ freeipa_iam_iparoles | length > 0 }}"}
  when: >-
    (freeipa_iam_hostgroups + freeipa_iam_hbac_rules + freeipa_iam_hbac_rules_disable
     + freeipa_iam_hbacsvcs + freeipa_iam_hbacsvcgroups + freeipa_iam_sudo_commands
     + freeipa_iam_sudocmdgroups + freeipa_iam_pwpolicies + freeipa_iam_permissions
     + freeipa_iam_privileges + freeipa_iam_iparoles) | length > 0
  block:
    - name: Precheck | Acquire Kerberos ticket
      ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }}"
      args:
        stdin: "{{ _freeipa_admin_password }}"
      changed_when: false
      check_mode: false
      no_log: true

    - name: Precheck | Read current objects (skips undeclared types)
      ansible.builtin.command: "ipa {{ item.find }}-find --all --raw --sizelimit=0"
      register: _freeipa_precheck_finds
      changed_when: false
      check_mode: false
      failed_when: false
      loop: "{{ _freeipa_precheck_specs }}"
      loop_control:
        label: "{{ item.find }}"
      when: item.run | bool

    - name: Precheck | Index find output by object type
      ansible.builtin.set_fact:
        _freeipa_precheck_raw: >-
          {{ dict(_freeipa_precheck_finds.results | map(attribute='item.find')
                  | zip(_freeipa_precheck_finds.results | map(attribute='stdout', default=''))) }}

    - name: Precheck | Destroy Kerberos ticket
      ansible.builtin.command: kdestroy
      changed_when: false
      check_mode: false
      failed_when: false

# BULK create — one ipagroup call for ALL groups (name/description/gidnumber/posix).
# Runs before HBAC/sudo so rules can reference groups. freeipa_iam_per_item_apply
# switches to one call per item (real-time feedback, per-invocation cost).
- name: Ensure declarative FreeIPA groups are present (bulk create)
  freeipa.ansible_freeipa.ipagroup:
    groups: "{{ _freeipa_iam_usergroups_create }}"
    state: present
  when:
    - not freeipa_iam_per_item_apply | bool
    - (_freeipa_iam_usergroups_create | default([])) | length > 0
  register: _freeipa_iam_changed_groups

- name: Ensure declarative FreeIPA groups are present (per item)
  freeipa.ansible_freeipa.ipagroup:
    groups: ["{{ item }}"]
    state: present
  loop: "{{ _freeipa_iam_usergroups_create | default([]) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_per_item_apply | bool
  register: _freeipa_iam_changed_groups_items

# Users are created HERE — before any HBAC/sudo rule-membership task that
# references them. On a fresh server they would otherwise not exist yet and the
# membership tasks fail with "user ...: no such entry". Group memberships are
# still applied later (once both users and groups exist).
- name: Ensure declarative users are present
  freeipa.ansible_freeipa.ipauser:
    users: "{{ freeipa_iam_users_effective | default([]) }}"
    update_password: on_create
    state: present
  when:
    - not freeipa_iam_per_item_apply | bool
    - (freeipa_iam_users_effective | default([])) | length > 0
  register: _freeipa_iam_changed_users

- name: Ensure declarative users are present (per item)
  freeipa.ansible_freeipa.ipauser:
    users: ["{{ item }}"]
    update_password: on_create
    state: present
  loop: "{{ freeipa_iam_users_effective | default([]) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_per_item_apply | bool
  register: _freeipa_iam_changed_users_items

- name: Ensure declarative FreeIPA password policies are present
  freeipa.ansible_freeipa.ipapwpolicy:
    name: "{{ item.name }}"
    maxlife: "{{ item.maxlife | default(omit) }}"
    minlife: "{{ item.minlife | default(omit) }}"
    history: "{{ item.history | default(omit) }}"
    minclasses: "{{ item.minclasses | default(omit) }}"
    minlength: "{{ item.minlength | default(omit) }}"
    priority: "{{ item.priority | default(omit) }}"
    maxfail: "{{ item.maxfail | default(omit) }}"
    failinterval: "{{ item.failinterval | default(omit) }}"
    lockouttime: "{{ item.lockouttime | default(omit) }}"
    gracelimit: "{{ item.gracelimit | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only policies that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_pwpolicies_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_pwpolicies_changed: >-
      {{ freeipa_iam_pwpolicies
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('pwpolicy', ''), 'pwpolicy') }}
  when: freeipa_iam_pwpolicies | length > 0

# TWO passes so a hostgroup that NESTS another (hostgroup: [child]) never races ahead of the
# child's creation. Pass 1 creates every hostgroup (name/description/host) with NO nested member;
# pass 2 then reconciles the nesting once all targets exist. A single combined call failed on a
# fresh realm with "hostgroup_add_member: hostgroup <child>: no such entry" when the parent was
# declared before the child (list order is not dependency order).
- name: Ensure declarative FreeIPA hostgroups exist (nesting added next)
  freeipa.ansible_freeipa.ipahostgroup:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    host: "{{ item.host | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only hostgroups that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_hostgroups_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_hostgroups_changed: >-
      {{ freeipa_iam_hostgroups
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('hostgroup', ''), 'hostgroup') }}
  when: freeipa_iam_hostgroups | length > 0

- name: Reconcile declarative FreeIPA hostgroup nesting (all hostgroups now exist)
  freeipa.ansible_freeipa.ipahostgroup:
    name: "{{ item.name }}"
    hostgroup: "{{ item.hostgroup }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ _freeipa_iam_hostgroups_nesting_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_hostgroups_nesting_changed: >-
      {{ freeipa_iam_hostgroups | selectattr('hostgroup', 'defined') | list
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('hostgroup', ''), 'hostgroup') }}
  when: (freeipa_iam_hostgroups | selectattr('hostgroup', 'defined') | list | length) > 0

# Seed CUSTOM HBAC services before any rule membership references them. Stock
# services (sshd, sudo, …) already exist on every server; custom ones do not, so
# on a fresh server the membership task would fail with "hbacsvc ...: no such
# entry". Idempotent — re-declaring an existing service is a no-op.
- name: Ensure custom HBAC services are present
  freeipa.ansible_freeipa.ipahbacsvc:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only services that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_hbacsvcs_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_hbacsvcs_changed: >-
      {{ freeipa_iam_hbacsvcs
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('hbacsvc', ''), 'hbacsvc') }}
  when: freeipa_iam_hbacsvcs | length > 0

# HBAC service GROUPS — bundle custom/stock services (e.g. docker + xrdp-sesman +
# sshd → "remote-access") so an HBAC rule can grant a whole bundle via servicegroup
# instead of listing each service. Created AFTER the services above, BEFORE the
# rules below that reference them. Rich-dict: name + hbacsvc members in one call;
# default action reconciles membership (declarative). Field names = ipahbacsvcgroup
# params (hbacsvc).
- name: Ensure declarative HBAC service groups are present (group + members in one pass)
  freeipa.ansible_freeipa.ipahbacsvcgroup:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    hbacsvc: "{{ item.hbacsvc | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only groups that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_hbacsvcgroups_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_hbacsvcgroups_changed: >-
      {{ freeipa_iam_hbacsvcgroups
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('hbacsvcgroup', ''), 'hbacsvcgroup') }}
  when: freeipa_iam_hbacsvcgroups | length > 0

# ONE rich-dict call per rule: state:present creates AND declaratively reconciles
# members (add+del lists). Category rules omit member lists; member principals were
# created in earlier tasks. Enabled/disabled is a separate pass — the module forbids
# member params alongside those states. state: absent accepts ONLY the name —
# ipahbacrule hard-fails if description/categories/members ride along ("... can not
# be used with state absent") — so an absent rule is stripped to its name here.
- name: Ensure declarative HBAC rules are present (rule + members in one pass)
  freeipa.ansible_freeipa.ipahbacrule:
    name: "{{ item.name }}"
    description: "{{ omit if _hbac_absent | bool else (item.description | default(omit)) }}"
    usercategory: "{{ omit if _hbac_absent | bool else (item.usercategory | default(omit)) }}"
    hostcategory: "{{ omit if _hbac_absent | bool else (item.hostcategory | default(omit)) }}"
    servicecategory: "{{ omit if _hbac_absent | bool else (item.servicecategory | default(omit)) }}"
    user: "{{ omit if _hbac_absent | bool else (item.user | default(omit)) }}"
    group: "{{ omit if _hbac_absent | bool else (item.usergroup | default(omit)) }}"
    host: "{{ omit if _hbac_absent | bool else (item.host | default(omit)) }}"
    hostgroup: "{{ omit if _hbac_absent | bool else (item.hostgroup | default(omit)) }}"
    hbacsvc: "{{ omit if _hbac_absent | bool else (item.service | default(omit)) }}"
    hbacsvcgroup: "{{ omit if _hbac_absent | bool else (item.servicegroup | default(omit)) }}"
    state: "{{ 'absent' if _hbac_absent | bool else 'present' }}"
  # precheck-gated: only rules that differ from the realm invoke the module.
  # NOTE: enabled/disabled entries compare on their OTHER keys here (state itself
  # is the op-state pass's job below, gated on the realm's ipaenabledflag).
  loop: "{{ _freeipa_iam_hbac_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _hbac_absent: "{{ (item.state | default('present')) == 'absent' }}"
    _freeipa_iam_hbac_changed: >-
      {{ freeipa_iam_hbac_rules
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('hbacrule', ''), 'hbacrule') }}
  when: freeipa_iam_hbac_rules | length > 0

- name: Ensure declarative HBAC rule operational states
  freeipa.ansible_freeipa.ipahbacrule:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
  # precheck-gated: only rules whose realm ipaenabledflag mismatches the declared
  # state (rules created THIS run are conservatively included — they start enabled)
  loop: "{{ _freeipa_iam_hbac_state_mismatch }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_hbac_state_mismatch: >-
      {{ freeipa_iam_hbac_rules
         | freeipa_iam_hbac_state_mismatch((_freeipa_precheck_raw | default({})).get('hbacrule', '')) }}
  when:
    - freeipa_iam_hbac_rules | length > 0
    - item.state is defined
    - item.state in ['enabled', 'disabled']

# Disable named HBAC rules (e.g. the stock allow_all / allow_all_hosts) — agnostic,
# list-driven, reversible (state: disabled, not deleted). Runs AFTER the declarative
# rules above so required access exists first. Lockout guard: refuses if no managed
# policy is declared (disabling the default allow rules on an empty policy locks
# everyone out). To EMPTY a rule's members instead, declare it with user: [] above.
- name: Disable named HBAC rules (opt-in hardening)
  when: freeipa_iam_hbac_rules_disable | length > 0
  block:
    - name: Refuse to disable HBAC rules without a declared access policy
      ansible.builtin.assert:
        that:
          - freeipa_iam_hbac_rules | length > 0
        fail_msg: >-
          Refusing to disable {{ freeipa_iam_hbac_rules_disable | join(', ') }}:
          no HBAC rules are declared in freeipa_iam_hbac_rules, so disabling the
          stock allow rules would lock everyone out. Declare your access policy first.
    - name: Disable each listed HBAC rule (reversible — state disabled)
      freeipa.ansible_freeipa.ipahbacrule:
        name: "{{ item.name }}"
        state: disabled
      # precheck-gated: an already-disabled rule (realm ipaenabledflag FALSE)
      # skips its module call; rules absent from the find are included
      loop: "{{ _freeipa_iam_hbac_disable_pending }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        _freeipa_iam_hbac_disable_pending: >-
          {{ freeipa_iam_hbac_rules_disable
             | map('community.general.dict_kv', 'name')
             | map('combine', {'state': 'disabled'}) | list
             | freeipa_iam_hbac_state_mismatch((_freeipa_precheck_raw | default({})).get('hbacrule', '')) }}

- name: Ensure declarative sudo commands are present
  freeipa.ansible_freeipa.ipasudocmd:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only commands that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_sudo_commands_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_sudo_commands_changed: >-
      {{ freeipa_iam_sudo_commands
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('sudocmd', ''), 'sudocmd') }}
  when: freeipa_iam_sudo_commands | length > 0

# Sudo command GROUPS — bundle commands so a sudo rule can grant a whole set via
# cmdgroup/deny_cmdgroup instead of listing each. Created AFTER the commands above,
# BEFORE the rules below that reference them. Rich-dict: name + sudocmd members in
# one call (declarative reconcile). Field names = ipasudocmdgroup params (sudocmd).
- name: Ensure declarative sudo command groups are present (group + members in one pass)
  freeipa.ansible_freeipa.ipasudocmdgroup:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    sudocmd: "{{ item.sudocmd | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: member ipaUniqueID leaves resolve through the sudocmd find
  # (aux_raw) — unresolvable members keep the group included (conservative)
  loop: "{{ _freeipa_iam_sudocmdgroups_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_sudocmdgroups_changed: >-
      {{ freeipa_iam_sudocmdgroups
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('sudocmdgroup', ''),
                                       'sudocmdgroup',
                                       (_freeipa_precheck_raw | default({})).get('sudocmd', '')) }}
  when: freeipa_iam_sudocmdgroups | length > 0

# BULK calls: the compiled `sudorules:` payload creates every rule AND reconciles
# its members (hosts, users, allow/deny cmds, options, runas) in ONE module
# invocation — each invocation on the server costs a full Python + ipalib
# bootstrap, so N rules per call is what keeps the CPU down. cmds referenced via
# allow/deny_sudocmd are created in the sudo-commands task above, so they resolve
# here. Key renames + unknown-key fail-fast: freeipa_iam_sudorules_payload.
- name: Compile bulk sudo-rule payloads (present/absent/enabled/disabled)
  ansible.builtin.set_fact:
    _freeipa_iam_sudorules: "{{ freeipa_iam_sudo_rules | freeipa_iam_sudorules_payload }}"
  when: freeipa_iam_sudo_rules | length > 0

- name: Ensure declarative sudo rules are present (rules + members, one bulk call)
  freeipa.ansible_freeipa.ipasudorule:
    sudorules: "{{ _freeipa_iam_sudorules.present }}"
    state: present
  when:
    - not freeipa_iam_per_item_apply | bool
    - ((_freeipa_iam_sudorules | default({})).present | default([])) | length > 0

- name: Ensure declarative sudo rules are present (per item)
  freeipa.ansible_freeipa.ipasudorule:
    sudorules: ["{{ item }}"]
    state: present
  loop: "{{ (_freeipa_iam_sudorules | default({})).present | default([]) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_per_item_apply | bool

- name: Remove sudo rules declared state absent (one bulk call)
  freeipa.ansible_freeipa.ipasudorule:
    sudorules: "{{ _freeipa_iam_sudorules.absent }}"
    state: absent
  when:
    - not freeipa_iam_per_item_apply | bool
    - ((_freeipa_iam_sudorules | default({})).absent | default([])) | length > 0

- name: Remove sudo rules declared state absent (per item)
  freeipa.ansible_freeipa.ipasudorule:
    sudorules: ["{{ item }}"]
    state: absent
  loop: "{{ (_freeipa_iam_sudorules | default({})).absent | default([]) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_per_item_apply | bool

- name: Ensure declarative sudo rule operational states (one bulk call per state)
  freeipa.ansible_freeipa.ipasudorule:
    sudorules: "{{ _freeipa_iam_sudorules[item] }}"
    state: "{{ item }}"
  loop: [enabled, disabled]
  when:
    - not freeipa_iam_per_item_apply | bool
    - ((_freeipa_iam_sudorules | default({}))[item] | default([])) | length > 0

- name: Ensure enabled sudo rule operational states (per item)
  freeipa.ansible_freeipa.ipasudorule:
    sudorules: ["{{ item }}"]
    state: enabled
  loop: "{{ (_freeipa_iam_sudorules | default({})).enabled | default([]) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_per_item_apply | bool

- name: Ensure disabled sudo rule operational states (per item)
  freeipa.ansible_freeipa.ipasudorule:
    sudorules: ["{{ item }}"]
    state: disabled
  loop: "{{ (_freeipa_iam_sudorules | default({})).disabled | default([]) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_per_item_apply | bool

- name: Ensure managed marker group exists
  freeipa.ansible_freeipa.ipagroup:
    name: "{{ freeipa_iam_managed_group }}"
    description: "Users managed declaratively from Git"
    state: present

# DECLARATIVE GROUP-EXISTENCE reconcile (opt-in: freeipa_server_authoritative). The
# additive `ipagroup state: present` create above never deletes a group you remove from
# freeipa_iam_usergroups. To make group existence declarative we nest every declared
# group into a CONTAINER marker group here; later (in the kinit window below) we read the
# container's members and delete any that are no longer declared — exactly mirroring the
# user-marker archival. Enrollment excludes protected built-ins (never tracked/deleted).
- name: Ensure managed-groups container exists (group-existence reconcile marker)
  freeipa.ansible_freeipa.ipagroup:
    name: "{{ freeipa_iam_managed_groups_group }}"
    description: "Container marker — groups managed declaratively from Git (group-existence reconcile)"
    state: present
  when: freeipa_server_authoritative | bool

- name: Enroll declared groups into the managed-groups container (membership marker)
  freeipa.ansible_freeipa.ipagroup:
    name: "{{ freeipa_iam_managed_groups_group }}"
    action: member
    group: "{{ _freeipa_iam_enrollable_groups }}"
    state: present
  vars:
    _freeipa_iam_enrollable_groups: "{{ freeipa_iam_group_names | difference(freeipa_iam_protected_groups) }}"
  when:
    - freeipa_server_authoritative | bool
    - _freeipa_iam_enrollable_groups | length > 0

# Membership reconcile. Default = ADDITIVE (action: member — never strips, so
# out-of-band/system memberships are safe). freeipa_server_authoritative: true (or
# reconcile_memberships_only: true, the deletion-suppressing nightly mode) switches
# non-protected managed groups to DECLARATIVE: membership becomes exactly what is
# declared (zero declared members = emptied). Protected/built-ins stay additive.
# The declarative payload omits membermanager, so managers are never stripped.
- name: Build membership reconcile payloads (additive / declarative)
  ansible.builtin.set_fact:
    # Strip undeclared members when EITHER authoritative OR the membership-only mode is on.
    _freeipa_iam_strip_memberships: "{{ (freeipa_server_authoritative | bool) or (freeipa_iam_reconcile_memberships_only | bool) }}"
    _freeipa_members_protected: >-
      {{ _freeipa_iam_usergroups_members
         | selectattr('name', 'in', freeipa_iam_protected_groups | default([])) | list }}
    _freeipa_members_declarative: "{{ (_mdecl_yaml | from_yaml) or [] }}"
  vars:
    _mdecl_yaml: |-
      {% for g in (freeipa_iam_usergroups_effective | default([])) %}
      {% if (g.state | default('present')) != 'absent' and g.name not in (freeipa_iam_protected_groups | default([])) %}
      - {name: "{{ g.name }}", user: {{ g.user | default([]) | to_json }}, group: {{ g.group | default([]) | to_json }}}
      {% endif %}
      {% endfor %}
  # membership reconcile payload — NAMES only (no secrets) — shown at -vv.
  no_log: "{{ ansible_verbosity < 2 }}"

- name: Ensure group memberships present — ADDITIVE (protected always; all when not declarative)
  freeipa.ansible_freeipa.ipagroup:
    groups: "{{ _members_additive }}"
    action: member
    state: present
  vars:
    _members_additive: "{{ _freeipa_iam_strip_memberships | ternary(_freeipa_members_protected, _freeipa_iam_usergroups_members) }}"
  when:
    - not freeipa_iam_per_item_apply | bool
    - _members_additive | length > 0
  register: _freeipa_iam_changed_members_add

- name: Ensure group memberships present — ADDITIVE (per item)
  freeipa.ansible_freeipa.ipagroup:
    groups: ["{{ item }}"]
    action: member
    state: present
  loop: "{{ _freeipa_iam_strip_memberships | ternary(_freeipa_members_protected, _freeipa_iam_usergroups_members) }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when: freeipa_iam_per_item_apply | bool
  register: _freeipa_iam_changed_members_add_items

- name: Reconcile group memberships DECLARATIVELY — non-protected managed groups (removes undeclared)
  freeipa.ansible_freeipa.ipagroup:
    groups: "{{ _freeipa_members_declarative }}"
    # default action (group) → gen_add_del_lists reconciles user + nested-group membership
    state: present
  when:
    - not freeipa_iam_per_item_apply | bool
    - _freeipa_iam_strip_memberships
    - _freeipa_members_declarative | length > 0
  register: _freeipa_iam_changed_members_decl

- name: Reconcile group memberships DECLARATIVELY (per item)
  freeipa.ansible_freeipa.ipagroup:
    groups: ["{{ item }}"]
    state: present
  loop: "{{ _freeipa_members_declarative }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  when:
    - freeipa_iam_per_item_apply | bool
    - _freeipa_iam_strip_memberships
  register: _freeipa_iam_changed_members_decl_items

# RBAC daisychain bottom-up: permission → privilege → role. Custom PERMISSIONS
# first (the atomic "can do X to Y" grants), then PRIVILEGES that bundle them, then
# the delegation roles below reference the privileges. Field names = ipapermission /
# ipaprivilege params. Built-in permissions/privileges are never declared here —
# only custom ones you define.
- name: Ensure declarative IPA permissions are present
  freeipa.ansible_freeipa.ipapermission:
    name: "{{ item.name }}"
    right: "{{ item.right | default(omit) }}"
    attrs: "{{ item.attrs | default(omit) }}"
    bindtype: "{{ item.bindtype | default(omit) }}"
    object_type: "{{ item.object_type | default(omit) }}"
    subtree: "{{ item.subtree | default(omit) }}"
    extra_target_filter: "{{ item.extra_target_filter | default(omit) }}"
    memberof: "{{ item.memberof | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only permissions that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_permissions_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_permissions_changed: >-
      {{ freeipa_iam_permissions
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('permission', ''), 'permission') }}
  when: freeipa_iam_permissions | length > 0

- name: Ensure declarative IPA privileges are present (privilege + permissions in one pass)
  freeipa.ansible_freeipa.ipaprivilege:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    permission: "{{ item.permission | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only privileges that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_privileges_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_privileges_changed: >-
      {{ freeipa_iam_privileges
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('privilege', ''), 'privilege') }}
  when: freeipa_iam_privileges | length > 0

# Native IPA DELEGATION roles (privileges + members) — distinct from the group-
# bundle freeipa_iam_roles. One iparole call per role (the module has no bulk
# `roles:` list), but delegation roles are few so the loop is cheap. Runs AFTER
# users + groups so user/group members resolve.
- name: Ensure native IPA delegation roles are present
  freeipa.ansible_freeipa.iparole:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    privilege: "{{ item.privilege | default(omit) }}"
    user: "{{ item.user | default(omit) }}"
    group: "{{ item.usergroup | default(omit) }}"
    host: "{{ item.host | default(omit) }}"
    hostgroup: "{{ item.hostgroup | default(omit) }}"
    service: "{{ item.service | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  # precheck-gated: only roles that differ from the realm invoke the module
  loop: "{{ _freeipa_iam_iparoles_changed }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  vars:
    _freeipa_iam_iparoles_changed: >-
      {{ freeipa_iam_iparoles
         | freeipa_iam_changed_subset((_freeipa_precheck_raw | default({})).get('role', ''), 'role') }}
  when: freeipa_iam_iparoles | length > 0

# Break-glass accounts join the break-glass group (default: admins) for full access.
# Done as a direct membership add (the group is a built-in, not in freeipa_iam_usergroups)
# so it bypasses the declared-group validation. They stay login-enabled + protected.
- name: Add break-glass accounts to the break-glass group
  freeipa.ansible_freeipa.ipagroup:
    name: "{{ freeipa_iam_breakglass_group }}"
    action: member
    user: "{{ freeipa_iam_breakglass_accounts | map(attribute='name') | list }}"
    state: present
  when: freeipa_iam_breakglass_accounts | length > 0

# Account state controls: nologin_accounts (shell off, API/kinit stays) and
# disabled_accounts (fully off). Lockout guards: admin can never be disabled, and
# admin→nologin requires an existing break-glass account.
- name: Manage account login / enabled state (opt-in, list-driven)
  vars:
    _freeipa_iam_nologin_effective: "{{ freeipa_iam_nologin_accounts | default([]) | unique }}"
  when: (_freeipa_iam_nologin_effective | length > 0)
        or ((freeipa_iam_disabled_accounts | default([])) | length > 0)
  block:
    - name: Guard account-state changes against admin lockout
      ansible.builtin.assert:
        that:
          - "'admin' not in (freeipa_iam_disabled_accounts | default([]))"
          - >-
            ('admin' not in _freeipa_iam_nologin_effective)
            or ((freeipa_iam_breakglass_accounts | default([])) | length > 0)
        fail_msg: >-
          Refusing account-state change — never fully DISABLE 'admin' (you'd lose API
          admin), and only set 'admin' to nologin once at least one
          freeipa_iam_breakglass_account is declared (else interactive admin is locked
          out with no alternative).
        quiet: true

    - name: Force existing accounts to a nologin shell (login off, account active)
      freeipa.ansible_freeipa.ipauser:
        name: "{{ item }}"
        shell: "{{ freeipa_iam_nologin_shell }}"
        state: present
      loop: "{{ _freeipa_iam_nologin_effective | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: _freeipa_iam_nologin_effective | length > 0

    - name: Disable accounts entirely (cannot authenticate)
      freeipa.ansible_freeipa.ipauser:
        name: "{{ item }}"
        state: disabled
      loop: "{{ freeipa_iam_disabled_accounts | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: (freeipa_iam_disabled_accounts | default([])) | length > 0

- name: Ensure managed users are members of marker group
  freeipa.ansible_freeipa.ipagroup:
    name: "{{ freeipa_iam_managed_group }}"
    action: member
    user: "{{ freeipa_iam_desired_usernames }}"
    state: present
  when: freeipa_iam_desired_usernames | length > 0

- name: Acquire Kerberos ticket for current membership discovery
  ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }}"
  args:
    stdin: "{{ _freeipa_admin_password }}\n"
  changed_when: false
  no_log: true

- name: Read current members of marker group
  ansible.builtin.command: "ipa group-show {{ freeipa_iam_managed_group }} --all --raw"
  register: _freeipa_iam_managed_group
  changed_when: false

# `ipa group-show --all --raw` returns members as raw LDAP `member:` DN lines
# (member: uid=<user>,cn=users,...), NOT a `member_user:` attribute — matching the
# latter silently selects nothing. Select user DNs by the literal `uid=` (skips
# nested cn=...,cn=groups members) and pull out the uid. NB: avoid `\s`/`\d`-style
# regex classes here — a folded (>-) scalar does not unescape them, so they reach
# the regex as a literal backslash; stick to literal text + `[^,]`.
- name: Build current marker-group user list
  ansible.builtin.set_fact:
    freeipa_iam_current_managed_users: >-
      {{ _freeipa_iam_managed_group.stdout_lines | map('trim')
         | select('search', 'uid=')
         | map('regex_replace', '.*uid=([^,]+).*', '\1') | list }}

# ── Managed-subset membership eviction (WYSIWYG snap-back) ────────────────────
# Evict MANAGED users who are current members of a declared group but no longer
# declare it (e.g. GUI self-add). freeipa_iam_evictions returns only
# (current ∩ managed) − desired, so unmanaged/out-of-band members are never touched;
# automember-target groups and the marker containers are excluded.
- name: Eviction | Build candidate groups (declared, not automember-populated)
  ansible.builtin.set_fact:
    _freeipa_iam_evict_candidates: >-
      {{ _freeipa_iam_usergroups_members | default([])
         | rejectattr('name', 'in', (freeipa_server_automember_rules | default([]) | map(attribute='name') | list))
         | list }}
    _freeipa_iam_evict_payload: []
  no_log: "{{ ansible_verbosity < 2 }}"

# ONE group-find covers every group's current members, and the payload compiles in
# a single filter call — per-group queries/accumulation would cost one full ipa CLI
# bootstrap per group.
# A failure here must be LOUD — a blanket failed_when: false silently skipped eviction
# enforcement forever. ipa exit codes (verified live on package IPA 4.12.2, 2026/07/12):
# rc=0 matches; rc=1 for BOTH zero-matches (benign, ipa writes nothing to stderr) AND
# real errors ('ipa: ERROR: did not receive Kerberos credentials', API down) — rc alone
# cannot distinguish, so also gate on 'ipa: ERROR' in stderr. no_log hides the detail on
# failure: rerun the command manually on the server (README 'Raw-output parsing drift'
# has the drill).
- name: Eviction | Read current members of all groups (one query)
  ansible.builtin.command: "ipa group-find --all --raw --sizelimit=0"
  register: _freeipa_iam_evict_current
  changed_when: false
  failed_when: >-
    _freeipa_iam_evict_current.rc not in [0, 1]
    or ('ipa: ERROR' in (_freeipa_iam_evict_current.stderr | default('')))
  no_log: true
  when: (_freeipa_iam_evict_candidates | default([])) | length > 0

- name: Eviction | Compute managed-subset payload (evict managed droppers only)
  ansible.builtin.set_fact:
    _freeipa_iam_evict_payload: >-
      {{ (_freeipa_iam_evict_current.stdout | default(''))
         | freeipa_iam_evict_payload(_freeipa_iam_evict_candidates | default([]),
                                      freeipa_iam_current_managed_users) }}
  when: (_freeipa_iam_evict_candidates | default([])) | length > 0
  no_log: "{{ ansible_verbosity < 2 }}"

- name: Eviction | Remove managed users from groups they no longer declare
  freeipa.ansible_freeipa.ipagroup:
    groups: "{{ _freeipa_iam_evict_payload }}"
    action: member
    state: absent
  when: (_freeipa_iam_evict_payload | default([])) | length > 0
  register: _freeipa_iam_changed_members_evict

# EMPTY-DESIRED-STATE circuit breaker: with zero desired users, EVERY managed user
# is "removed" — a wiped realm from a typo'd tenants dir or hollow group_vars, not a
# plausible intent. The tenants loader has its own guards; this one covers every
# route to an empty desired set on a destructive run.
- name: Refuse destructive reconcile against an EMPTY desired user set
  ansible.builtin.assert:
    that: freeipa_iam_desired_usernames | length > 0
    fail_msg: >-
      freeipa_server_authoritative is enabled but ZERO users are declared — the
      reconcile would archive every managed user and delete every managed object on
      the realm. Refusing. Check the identity source (tenants dir path, group_vars)
      actually loaded.
    quiet: true
  when:
    - freeipa_server_authoritative | bool
    - freeipa_iam_current_managed_users | default([]) | length > 0

- name: Build declarative user delete list
  ansible.builtin.set_fact:
    freeipa_iam_users_to_remove: >-
      {{
        freeipa_iam_current_managed_users
        | difference(freeipa_iam_desired_usernames)
        | difference(freeipa_iam_protected_users)
      }}
  when: not (freeipa_iam_reconcile_memberships_only | bool)   # membership-only mode never archives users

# Archive (don't destroy) users removed from declarative config: bulk ipauser with
# preserve=true → user-del --preserve (deactivated + retained, recoverable). Set
# freeipa_iam_preserve_archived=false to hard-delete instead. One bulk call.
- name: Archive (preserve) users removed from declarative config
  freeipa.ansible_freeipa.ipauser:
    name: "{{ freeipa_iam_users_to_remove }}"
    state: absent
    preserve: "{{ freeipa_iam_preserve_archived | bool }}"
  when:
    - not (freeipa_iam_reconcile_memberships_only | bool)
    - freeipa_iam_users_to_remove | default([]) | length > 0

# ── Declarative GROUP-EXISTENCE reconcile (opt-in) ───────────────────────────
# Same ticket as the user-marker discovery above. Read the container's nested-group
# members, then DELETE any that are no longer declared in freeipa_iam_usergroups —
# the group-level twin of the user archival. check_mode: false on the read so --check
# still PREVIEWS (the delete below honours check mode → reports, deletes nothing).
- name: Read current nested groups of the managed-groups container
  ansible.builtin.command: "ipa group-show {{ freeipa_iam_managed_groups_group }} --all --raw"
  register: _freeipa_iam_managed_groups_show
  changed_when: false
  failed_when: false                     # container may not exist yet on a first --check
  check_mode: false
  when: freeipa_server_authoritative | bool

# Members come back as raw `member: cn=<group>,cn=groups,...` DN lines (user members
# are `uid=...` and are skipped). `^member: cn=` excludes the container's own
# `memberof:` lines. Orphan = enrolled in the container but NOT declared, NOT protected,
# and never the container/user-marker themselves. Same regex caveats as the user list
# above (folded scalar: literal text + [^,], no \s/\d classes).
- name: Build declarative group delete list (container orphans)
  ansible.builtin.set_fact:
    _freeipa_iam_groups_to_remove: >-
      {{ (_freeipa_iam_managed_groups_show.stdout_lines | default([]) | map('trim')
          | select('match', '^member: cn=')
          | map('regex_replace', '^member: cn=([^,]+),.*', '\1') | list)
         | difference(freeipa_iam_group_names)
         | difference(freeipa_iam_protected_groups)
         | difference([freeipa_iam_managed_groups_group, freeipa_iam_managed_group]) }}
  when:
    - not (freeipa_iam_reconcile_memberships_only | bool)
    - freeipa_server_authoritative | bool

- name: Report groups to delete (declarative group-existence reconcile)
  ansible.builtin.debug:
    msg: >-
      Group reconcile → deleting {{ _freeipa_iam_groups_to_remove | length }}
      orphaned managed group(s): {{ _freeipa_iam_groups_to_remove }}
  when:
    - not (freeipa_iam_reconcile_memberships_only | bool)
    - freeipa_server_authoritative | bool
    - (_freeipa_iam_groups_to_remove | default([])) | length > 0

# Hard-delete (groups can't be preserve-archived). One bulk ipagroup call; state: absent
# honours check mode so --check previews. Deleting a group auto-removes it from the
# container, so the marker self-heals.
- name: Delete groups removed from declarative config (no longer in freeipa_iam_usergroups)
  freeipa.ansible_freeipa.ipagroup:
    name: "{{ _freeipa_iam_groups_to_remove }}"
    state: absent
  when:
    - not (freeipa_iam_reconcile_memberships_only | bool)
    - freeipa_server_authoritative | bool
    - (_freeipa_iam_groups_to_remove | default([])) | length > 0

# Password-expiration FLOOR: no module implements the conditional (only bump when
# fewer than min_days_remaining are left), but the read is ONE user-find and the
# write is the NATIVE ipauser passwordexpiration option in one bulk call — this
# replaced a per-user shell read-compare-set loop (GNU-date dependent).
- name: Read current password expirations (one query)
  ansible.builtin.command: "ipa user-find --all --raw --sizelimit=0"
  register: _freeipa_iam_pwexp_find
  changed_when: false
  check_mode: false
  failed_when: false
  no_log: true
  when: freeipa_iam_password_expiration_floors | length > 0

- name: Enforce password-expiration floor for listed users (native bulk call)
  freeipa.ansible_freeipa.ipauser:
    users: "{{ _freeipa_iam_pwexp_bumps }}"
  vars:
    _freeipa_iam_pwexp_bumps: >-
      {{ freeipa_iam_password_expiration_floors
         | freeipa_iam_pwexp_bumps(_freeipa_iam_pwexp_find.stdout | default('')) }}
  when:
    - freeipa_iam_password_expiration_floors | length > 0
    - _freeipa_iam_pwexp_bumps | length > 0

- name: Destroy temporary Kerberos ticket
  ansible.builtin.command: kdestroy
  changed_when: false
  failed_when: false
  no_log: true
