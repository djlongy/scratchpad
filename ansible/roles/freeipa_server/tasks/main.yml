---
# roles/freeipa_server/tasks/main.yml
#
# Phase order (a no-tag run executes everything):
#   preflight  → dependency-ordering guards (FIPS, time, FQDN/DNS, primary-up)
#   install    → upstream ipaserver/ipareplica (packages, firewall, install)
#   resilience → cold-start timeout override + recovery timer
#   certs      → import trusted external CAs (primary only; opt-in)
#   hardening  → opt-in post-install hardening
#   backup     → Borg-readable backup timer + opt-in controller offload (primary)
#   idam       → declarative IDAM reconciliation (primary only)
#   dns        → declarative DNS zones/forward-zones/records (primary; opt-in)
#   automember → auto group/hostgroup membership rules (primary; opt-in)
#   adtrust    → Active Directory trust(s) (primary; opt-in)
#   restore    → break-glass restore from backup (never tag; opt-in)

# Make the role self-sufficient about facts. preflight.yml and hardening.yml key
# on ansible_os_family; the deploy playbooks gather_facts, but the idam-only
# playbook runs gather_facts: false and leans on the (smart/jsonfile) fact cache —
# which fails the moment the cache is cold or expired (fresh control node, >TTL,
# or any caller that simply forgot gather_facts). Gather a minimal fact set here
# when it is missing, so no phase ever hits an undefined ansible_* fact. No-op when
# facts are already present; tagged `always` so it still runs under --tags filters.
- name: Gather minimal facts when the play skipped them (cold cache safety)
  ansible.builtin.setup:
    gather_subset: ["min"]
  when: ansible_os_family is not defined
  tags: [always]

- name: Run FreeIPA dependency-ordering preflight guards
  ansible.builtin.import_tasks: preflight.yml
  tags: [preflight]

- name: Install FreeIPA (upstream primary or replica)
  ansible.builtin.import_tasks: install.yml
  tags: [install]

- name: Apply FreeIPA cold-start resilience fixes
  ansible.builtin.import_tasks: resilience.yml
  tags: [configure, resilience]

- name: Import trusted external CA certificates (primary only)
  ansible.builtin.import_tasks: certs.yml
  when:
    - freeipa_server_is_primary | bool
    - freeipa_server_trusted_external_cas | length > 0
    - freeipa_server_ca_mode != 'ca-less'
  tags: [certs, ca]

- name: Apply FreeIPA post-install hardening (opt-in)
  ansible.builtin.import_tasks: hardening.yml
  when: freeipa_server_is_primary | bool
  tags: [hardening]

- name: Configure FreeIPA backup (primary only)
  ansible.builtin.import_tasks: backup.yml
  when: freeipa_server_is_primary | bool
  tags: [backup]

# IDAM apply path. NATIVE (idam.yml, server-side ipalib) is the default and the
# recommendation: it is 2.67x faster than the API variant on the same workload
# (bulk groups/users), manages the full object set (iparole/privilege/permission/
# hbacsvcgroup/sudocmdgroup have NO community module), and bootstraps before DNS
# (connects by IP). Set freeipa_idam_apply_via_api: true ONLY to force the
# control-node API path (idam_api.yml) on a provisioned, DNS-resolvable server.
# Dynamic include (not import) so the runtime flag cleanly selects exactly one path
# — import_tasks + a runtime `when` does not gate reliably.
- name: Reconcile declarative IDAM data (primary only — native or API path)
  ansible.builtin.include_tasks:
    file: "{{ 'idam_api.yml' if (freeipa_idam_apply_via_api | default(false) | bool) else 'idam.yml' }}"
    apply:
      tags: [idam, users, groups, hbac, sudo]
  when: freeipa_server_is_primary | bool
  tags: [idam, users, groups, hbac, sudo]

# DECLARATIVE OBJECT reconcile — DELETE matrix-managed objects in this scope no longer
# declared (orphans left after removing an app/grant): sudo rules, HBAC rules, hostgroups,
# groups, AND automember rules. Runs AFTER idam so the desired set is fully applied before
# orphans are computed. Driven by the ONE authoritative switch (freeipa_idam_authoritative_
# objects = freeipa_server_authoritative OR the deprecated freeipa_idam_reconcile_objects).
# Tightly scoped + safe: only objects whose NAME contains freeipa_idam_reconcile_match are
# eligible, and only those not in this run's freeipa_idam_* lists / not protected are
# removed. Gated on a NON-blank match, so an authoritative run without a scope marker
# simply skips object pruning (never considers the whole realm). Sibling of the group-
# existence reconcile inside idam.yml (which uses the container marker for baseline groups).
- name: Reconcile orphaned matrix-managed objects (primary only; authoritative + scoped)
  ansible.builtin.import_tasks: reconcile.yml
  when:
    - freeipa_server_is_primary | bool
    - freeipa_idam_authoritative_objects | bool
    - (freeipa_idam_reconcile_match | default('')) | length > 0
  tags: [idam, reconcile]

# End-of-run summary of what IDAM managed/changed/removed. Runs AFTER idam + reconcile so it
# can report the object-reconcile prunes too. Reads facts from both (all defaulted), primary
# only, on by default (set freeipa_idam_report: false to silence).
- name: Report IDAM run summary (primary only)
  ansible.builtin.import_tasks: idam_report.yml
  when:
    - freeipa_server_is_primary | bool
    - freeipa_idam_report | default(true) | bool
  tags: [idam, report]

- name: Manage declarative DNS zones/records (primary only)
  ansible.builtin.import_tasks: dns_records.yml
  when:
    - freeipa_server_is_primary | bool
    - (freeipa_server_dns_zones | length > 0) or
      (freeipa_server_dns_forward_zones | length > 0) or
      (freeipa_server_dns_records | length > 0)
  tags: [dns]

- name: Reconcile automember rules (primary only)
  ansible.builtin.import_tasks: automember.yml
  when:
    - freeipa_server_is_primary | bool
    - freeipa_server_automember_rules | length > 0
  tags: [idam, automember]

- name: Establish Active Directory trust(s) (primary only)
  ansible.builtin.import_tasks: adtrust.yml
  when:
    - freeipa_server_is_primary | bool
    - freeipa_server_ad_trusts | length > 0
  tags: [adtrust, trust]

- name: Restore FreeIPA from a backup (break-glass; primary only)
  ansible.builtin.import_tasks: restore.yml
  when:
    - freeipa_server_is_primary | bool
    - freeipa_server_restore_name | length > 0
  tags: [never, restore]

- name: Export live config to declarative group_vars (opt-in; primary only)
  ansible.builtin.import_tasks: export_config.yml
  when: freeipa_server_is_primary | bool
  tags: [never, export]

# HARD-DELETE every declared freeipa_idam_* object (for mock/test runs). DOUBLE-
# GATED: the `never` tag means it only runs with `--tags delete`, AND it does nothing
# unless freeipa_idam_delete is true (default false; set it only in a mock inventory).
# Real inventories therefore never delete, even if someone passes --tags delete.
- name: Delete (HARD-DELETE) declared IDAM objects — mock/test cleanup only
  ansible.builtin.import_tasks: delete.yml
  when:
    - freeipa_server_is_primary | bool
    - freeipa_idam_delete | default(false) | bool
  tags: [never, delete]
