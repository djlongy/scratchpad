---
# Declarative OBJECT reconcile — DELETE managed objects that are no longer declared (orphans).
# Imported from main.yml only when freeipa_server_authoritative is true. DESTRUCTIVE. Two modes:
#   * SCOPED (default): only objects whose NAME contains freeipa_iam_reconcile_scope (e.g.
#     "acme-") are eligible — other tenants/environments are never touched.
#   * ALL-UNDECLARED (freeipa_iam_reconcile_all: true, double-gated): EVERY managed object not
#     declared this run is eligible — the whole-realm prune. The effective match becomes "*".
# In BOTH modes an object is deleted only if it is NOT in this run's freeipa_iam_* lists AND
# NOT in the protected set. Protection is built ENTIRELY from the role's own declared lists
# (builtin_groups/hostgroups, protected_groups/users, unmodifiable_users, markers,
# builtin_hbac_rules, stock hbacsvcs) — it NEVER assumes a tenant file (e.g. global.yml) is
# present, so admins/editors/ipausers/trust admins/admin/ipaservers, allow_all/
# allow_systemd-user, and the stock HBAC services always survive, even with an empty desired set.
# A blank scope with reconcile_all off deletes NOTHING (fail-safe, asserted below).
# Types covered: sudo rules, HBAC rules, HBAC service groups, sudo command groups, HBAC
# services, sudo commands, hostgroups, groups, automember rules — deleted in reverse-dependency
# order (rules → member-groups → services/commands → hostgroups → groups).
# NOT covered: iparoles, privileges, permissions (large IPA built-in sets, no safe allow-list)
# and pwpolicies (keyed by group; global_policy must never be touched) — use --tags delete
# (delete-declared) for those. Users are handled by the marker archival.

- name: Reconcile | Refuse to run without a scope marker OR explicit all-undeclared mode
  ansible.builtin.assert:
    that:
      - ((freeipa_iam_reconcile_scope | default('')) | length > 0)
        or (freeipa_iam_reconcile_all | default(false) | bool)
    fail_msg: >-
      Object reconcile is active (freeipa_server_authoritative) but neither
      freeipa_iam_reconcile_scope is set NOR freeipa_iam_reconcile_all is true — refusing to
      reconcile without a scope (would consider the WHOLE realm). Set a scope marker
      (e.g. '<tenant>-<env>'), or opt into whole-realm pruning with
      freeipa_iam_reconcile_all: true + freeipa_iam_reconcile_all_confirm: true.

# INTERLOCK — the desired-state assembly phase (iam_desired.yml) MUST have run this play. It
# builds the freeipa_iam_* lists that define what is DECLARED; without it every object looks
# undeclared and the orphan pass would delete everything eligible. Sentinel set at the end of
# iam_desired.yml.
- name: Reconcile | Refuse to prune unless the desired state was assembled this play (interlock)
  ansible.builtin.assert:
    that:
      - _freeipa_iam_desired_assembled | default(false) | bool
    fail_msg: >-
      Reconcile requires the IAM desired-state assembly phase (iam_desired.yml) to have run
      first in THIS play — the sentinel _freeipa_iam_desired_assembled is unset, so the
      freeipa_iam_* desired lists were NOT built. Computing orphans now would treat every
      object as undeclared and DELETE it. Run with -t reconcile or -t iam (both include the
      assembly phase), never a selection that skips it.

# ALL-UNDECLARED is the whole-realm nuke — double-gated so it can't fire by accident. Both
# freeipa_iam_reconcile_all AND freeipa_iam_reconcile_all_confirm must be true.
- name: Reconcile | Require explicit confirmation for all-undeclared mode (nuke gate)
  ansible.builtin.assert:
    that:
      - freeipa_iam_reconcile_all_confirm | default(false) | bool
    fail_msg: >-
      freeipa_iam_reconcile_all is true (delete EVERY undeclared managed object realm-wide)
      but freeipa_iam_reconcile_all_confirm is not set. Set
      freeipa_iam_reconcile_all_confirm: true (ideally via -e on the command line) to proceed.
  when: freeipa_iam_reconcile_all | default(false) | bool

# Effective match: '*' (every found object eligible) in all-undeclared mode, else the scope
# substring. Protection is built ENTIRELY from the role's own declared lists (so it holds with
# an empty desired set): built-in groups/hostgroups/HBAC-rules, stock HBAC services, protected +
# unmodifiable users, and the role's own marker containers.
- name: Reconcile | Resolve effective match + protection set
  ansible.builtin.set_fact:
    _reconcile_match: "{{ '*' if (freeipa_iam_reconcile_all | default(false) | bool) else freeipa_iam_reconcile_scope }}"
    _reconcile_protected: >-
      {{ (freeipa_iam_protected_groups | default([]))
         + (freeipa_iam_builtin_groups | default([]))
         + (freeipa_iam_builtin_hostgroups | default([]))
         + (freeipa_iam_builtin_hbac_rules | default([]))
         + (freeipa_server_export_stock_hbacsvcs | default([]))
         + (freeipa_iam_builtin_hbacsvcgroups | default([]))
         + (freeipa_iam_protected_users | default([]))
         + (freeipa_iam_unmodifiable_users | default([]))
         + [freeipa_iam_managed_group, freeipa_iam_managed_groups_group] }}

- name: Reconcile | Resolve admin password (shared resolver)
  ansible.builtin.include_tasks: resolve_credentials.yml
  vars:
    _freeipa_resolve: [admin]

- name: Reconcile | Acquire Kerberos ticket
  ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}@{{ freeipa_server_realm }}"
  args:
    stdin: "{{ _freeipa_admin_password }}"
  changed_when: false
  check_mode: false
  no_log: true

- name: Reconcile | Find + prune orphans (Kerberos ticket always destroyed)
  block:
    # find criteria is EMPTY in all-undeclared mode ('*' → list everything), else the scope substring.
    - name: Reconcile | Find managed objects in scope (one query per type)
      ansible.builtin.command: "ipa {{ item }}-find {{ '' if _reconcile_match == '*' else _reconcile_match }} --pkey-only --sizelimit=0"
      register: _reconcile_find
      changed_when: false
      check_mode: false                      # run the read-only find even in --check (preview)
      failed_when: false                     # ipa *-find returns rc=1 on zero matches
      loop: [sudorule, hbacrule, hbacsvcgroup, sudocmdgroup, hbacsvc, sudocmd, hostgroup, group]

    - name: Reconcile | Parse found object names per type
      ansible.builtin.set_fact:
        _reconcile_found: "{{ _reconcile_found | default({}) | combine({item.item: _names}) }}"
      vars:
        _names: "{{ item.stdout_lines | select('match', '^  [A-Z]') | map('regex_replace', '^  [^:]+: ', '') | list }}"
      loop: "{{ _reconcile_find.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"

    # Shield externally-managed objects (e.g. pam_* groups + per-tenant PIM hbac/sudo
    # rules) from orphan deletion: any FOUND name matching ANY freeipa_iam_reconcile_protect_regexes
    # entry joins the protection set, so neither a name-colliding scoped reconcile NOR reconcile_all
    # can delete it. Empty/whitespace patterns are dropped; an empty effective list degrades to a
    # never-matching regex so nothing extra is shielded. See defaults for the rationale.
    - name: Reconcile | Shield externally-managed objects (protect regexes)
      ansible.builtin.set_fact:
        _reconcile_protected: >-
          {{ _reconcile_protected + (_reconcile_found.values() | list | flatten
             | select('search', _freeipa_iam_protect_re) | list) }}
      vars:
        _freeipa_iam_protect_re: >-
          {{ ('(' + (freeipa_iam_reconcile_protect_regexes | reject('equalto', '') | join(')|(')) + ')')
             if (freeipa_iam_reconcile_protect_regexes | reject('equalto', '') | list | length > 0)
             else '(?!)' }}

    - name: Reconcile | Compute orphans (managed-but-undeclared, protected-safe)
      ansible.builtin.set_fact:
        _reconcile_orphans: >-
          {{ _reconcile_found
             | freeipa_iam_orphans(_reconcile_desired, _reconcile_match, _reconcile_protected) }}
      vars:
        _reconcile_desired:
          sudorule: "{{ freeipa_iam_sudo_rules    | default([]) | map(attribute='name') | list }}"
          hbacrule: "{{ freeipa_iam_hbac_rules    | default([]) | map(attribute='name') | list }}"
          hbacsvcgroup: "{{ freeipa_iam_hbacsvcgroups | default([]) | map(attribute='name') | list }}"
          sudocmdgroup: "{{ freeipa_iam_sudocmdgroups | default([]) | map(attribute='name') | list }}"
          hbacsvc: "{{ freeipa_iam_hbacsvcs      | default([]) | map(attribute='name') | list }}"
          sudocmd: "{{ freeipa_iam_sudo_commands | default([]) | map(attribute='name') | list }}"
          hostgroup: "{{ freeipa_iam_hostgroups    | default([]) | map(attribute='name') | list }}"
          group: "{{ freeipa_iam_usergroups    | default([]) | map(attribute='name') | list }}"

    - name: Reconcile | Report what will be deleted
      ansible.builtin.debug:
        msg: >-
          Reconcile [{{ _reconcile_match }}] orphans to delete —
          sudo_rules: {{ _reconcile_orphans.sudorule | default([]) }},
          hbac_rules: {{ _reconcile_orphans.hbacrule | default([]) }},
          hbacsvcgroups: {{ _reconcile_orphans.hbacsvcgroup | default([]) }},
          sudocmdgroups: {{ _reconcile_orphans.sudocmdgroup | default([]) }},
          hbacsvcs: {{ _reconcile_orphans.hbacsvc | default([]) }},
          sudo_commands: {{ _reconcile_orphans.sudocmd | default([]) }},
          hostgroups: {{ _reconcile_orphans.hostgroup | default([]) }},
          groups: {{ _reconcile_orphans.group | default([]) }}

    # Automember rules — `ipa automember-find/-del` are TYPE-scoped (--type group|hostgroup) and
    # keyed by rule name (= target group/hostgroup). Same match + protected guards. Deleted BEFORE
    # the groups below so a rule never outlives its target. Desired = freeipa_server_automember_rules.
    - name: Reconcile | Find managed automember rules in scope (per type)
      ansible.builtin.command: "ipa automember-find {{ '' if _reconcile_match == '*' else _reconcile_match }} --type={{ item }} --pkey-only"
      register: _reconcile_am_find
      changed_when: false
      check_mode: false
      failed_when: false
      loop: [group, hostgroup]

    - name: Reconcile | Parse found automember rule names per type
      ansible.builtin.set_fact:
        _reconcile_am_found: "{{ _reconcile_am_found | default({}) | combine({item.item: _names}) }}"
      vars:
        _names: "{{ item.stdout_lines | select('match', '^  [A-Z]') | map('regex_replace', '^  [^:]+: ', '') | list }}"
      loop: "{{ _reconcile_am_find.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Reconcile | Compute automember orphans (protected-safe)
      ansible.builtin.set_fact:
        _reconcile_am_orphans: >-
          {{ _reconcile_am_found
             | freeipa_iam_orphans(_reconcile_am_desired, _reconcile_match, _reconcile_protected) }}
      vars:
        _reconcile_am_desired:
          group: "{{ freeipa_server_automember_rules | default([]) | selectattr('automember_type', 'equalto', 'group')     | map(attribute='name') | list }}"
          hostgroup: "{{ freeipa_server_automember_rules | default([]) | selectattr('automember_type', 'equalto', 'hostgroup') | map(attribute='name') | list }}"

    - name: Reconcile | Report automember rules to delete
      ansible.builtin.debug:
        msg: >-
          Reconcile [{{ _reconcile_match }}] automember orphans to delete —
          group: {{ _reconcile_am_orphans.group | default([]) }},
          hostgroup: {{ _reconcile_am_orphans.hostgroup | default([]) }}

    - name: Reconcile | Delete orphaned automember rules (no longer declared)
      ansible.builtin.command: "ipa automember-del {{ item.1 | quote }} --type={{ item.0.key }}"
      loop: "{{ _reconcile_am_orphans | default({}) | dict2items | subelements('value') }}"
      loop_control:
        label: "{{ item.0.key }} → {{ item.1 }}"
      changed_when: true

    - name: Reconcile | Delete orphaned objects (no longer declared)
      ansible.builtin.command: "ipa {{ item.0.key }}-del {{ item.1 | quote }}"
      loop: "{{ _reconcile_orphans | default({}) | dict2items | subelements('value') }}"
      loop_control:
        label: "{{ item.0.key }} → {{ item.1 }}"
      changed_when: true
  always:
    - name: Reconcile | Destroy Kerberos ticket
      ansible.builtin.command: kdestroy
      changed_when: false
      check_mode: false
      failed_when: false
