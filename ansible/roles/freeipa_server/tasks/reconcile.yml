---
# Declarative OBJECT reconcile — DELETE matrix-managed objects in THIS scope that are no
# longer declared (orphans). Imported from idam.yml only when
# freeipa_server_authoritative is true. DESTRUCTIVE but tightly scoped:
#   * only objects whose NAME contains freeipa_idam_reconcile_scope (the scope marker,
#     e.g. "example-mgt") are eligible — other tenants/environments are never touched;
#   * an object is deleted only if it is NOT in this run's freeipa_idam_* lists (orphan)
#     AND not in freeipa_idam_protected_groups;
#   * a blank marker deletes NOTHING (fail-safe), enforced by the assert below.
# Deletes in reverse-dependency order: sudo rules → HBAC rules → hostgroups → groups.

- name: Reconcile | Refuse to run without a scope marker (fail-safe)
  ansible.builtin.assert:
    that:
      - (freeipa_idam_reconcile_scope | default('')) | length > 0
    fail_msg: >-
      Object reconcile is active (freeipa_server_authoritative) but freeipa_idam_reconcile_scope
      is empty. The matrix sets it to '<tenant>-<environment>'; refusing to reconcile without a
      scope marker (would consider the WHOLE realm). NB: main.yml already skips this phase on a
      blank scope — this assert is belt-and-suspenders.

# INTERLOCK — the desired-state assembly phase (idam_desired.yml) MUST have run this play.
# It builds the freeipa_idam_* lists that define what is DECLARED; without it every in-scope
# object looks undeclared and the orphan pass below would delete the entire scope. The sentinel
# _freeipa_idam_desired_assembled is set at the end of idam_desired.yml. This is the guard for
# the classic footgun of running the prune with a tag/selection that skipped assembly.
- name: Reconcile | Refuse to prune unless the desired state was assembled this play (interlock)
  ansible.builtin.assert:
    that:
      - _freeipa_idam_desired_assembled | default(false) | bool
    fail_msg: >-
      Reconcile requires the IDAM desired-state assembly phase (idam_desired.yml) to have run
      first in THIS play — the sentinel _freeipa_idam_desired_assembled is unset, so the
      freeipa_idam_* desired lists were NOT built. Computing orphans now would treat EVERY
      in-scope object as undeclared and DELETE it. Run with -t reconcile or -t idam (both
      include the assembly phase), never a selection that skips it.

- name: Reconcile | Resolve admin password (declared var first, Vault fallback)
  ansible.builtin.set_fact:
    _freeipa_server_admin_password: >-
      {{ freeipa_server_admin_password
         if (freeipa_server_admin_password | default('') | length > 0)
         else lookup('community.hashi_vault.hashi_vault',
            'secret=' + freeipa_server_vault_secret + ':' + freeipa_server_admin_password_field) }}
  no_log: true
  delegate_to: localhost
  become: false

- name: Reconcile | Acquire Kerberos ticket
  ansible.builtin.command: "kinit {{ freeipa_server_admin_principal }}"
  args:
    stdin: "{{ _freeipa_server_admin_password }}"
  changed_when: false
  check_mode: false
  no_log: true

- name: Reconcile | Find managed objects in this scope (one query per type)
  ansible.builtin.command: "ipa {{ item }}-find {{ freeipa_idam_reconcile_scope }} --pkey-only --sizelimit=0"
  register: _reconcile_find
  changed_when: false
  check_mode: false                      # run the read-only find even in --check (preview)
  failed_when: false                     # ipa *-find returns rc=1 on zero matches
  loop: [sudorule, hbacrule, hostgroup, group]

- name: Reconcile | Parse found object names per type
  ansible.builtin.set_fact:
    _reconcile_found: "{{ _reconcile_found | default({}) | combine({item.item: _names}) }}"
  vars:
    _names: "{{ item.stdout_lines | select('match', '^  [A-Z]') | map('regex_replace', '^  [^:]+: ', '') | list }}"
  loop: "{{ _reconcile_find.results }}"
  loop_control:
    label: "{{ item.item }}"

# Protected set = the built-in protected groups PLUS this role's own marker containers
# (the user marker + the group-existence container). Without excluding the markers, an
# object reconcile whose scope marker happens to be a substring of a marker name (e.g. a
# test scope "test-" vs a "test-idam-managed-*" marker) would delete the role's own
# bookkeeping groups. Real deployments don't collide (markers don't contain the tenant-env
# scope), but excluding them is correct defense regardless.
- name: Reconcile | Compute orphans (managed-but-undeclared, scoped, protected-safe)
  ansible.builtin.set_fact:
    _reconcile_orphans: >-
      {{ _reconcile_found
         | freeipa_idam_orphans(_reconcile_desired, freeipa_idam_reconcile_scope,
                                _reconcile_protected) }}
  vars:
    _reconcile_protected: >-
      {{ (freeipa_idam_protected_groups | default([]))
         + [freeipa_idam_managed_group, freeipa_idam_managed_groups_group] }}
    _reconcile_desired:
      sudorule:  "{{ freeipa_idam_sudo_rules  | default([]) | map(attribute='name') | list }}"
      hbacrule:  "{{ freeipa_idam_hbac_rules  | default([]) | map(attribute='name') | list }}"
      hostgroup: "{{ freeipa_idam_hostgroups  | default([]) | map(attribute='name') | list }}"
      group:     "{{ freeipa_idam_usergroups  | default([]) | map(attribute='name') | list }}"

- name: Reconcile | Report what will be deleted
  ansible.builtin.debug:
    msg: >-
      Reconcile [{{ freeipa_idam_reconcile_scope }}] orphans to delete —
      sudo: {{ _reconcile_orphans.sudorule | default([]) }},
      hbac: {{ _reconcile_orphans.hbacrule | default([]) }},
      hostgroups: {{ _reconcile_orphans.hostgroup | default([]) }},
      groups: {{ _reconcile_orphans.group | default([]) }}

# Automember rules are reconciled separately — `ipa automember-find/-del` are TYPE-scoped
# (--type group|hostgroup) and keyed by the rule name (= its target group/hostgroup name),
# so they don't fit the generic <type>-del loop. Same scope-marker + protected guards via
# the shared freeipa_idam_orphans filter. Deleted BEFORE the groups below so a rule never
# outlives its target group. Desired set comes from freeipa_server_automember_rules.
- name: Reconcile | Find managed automember rules in this scope (per type)
  ansible.builtin.command: "ipa automember-find {{ freeipa_idam_reconcile_scope }} --type={{ item }} --pkey-only"
  register: _reconcile_am_find
  changed_when: false
  check_mode: false
  failed_when: false
  loop: [group, hostgroup]

- name: Reconcile | Parse found automember rule names per type
  ansible.builtin.set_fact:
    _reconcile_am_found: "{{ _reconcile_am_found | default({}) | combine({item.item: _names}) }}"
  vars:
    _names: "{{ item.stdout_lines | select('match', '^  [A-Z]') | map('regex_replace', '^  [^:]+: ', '') | list }}"
  loop: "{{ _reconcile_am_find.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Reconcile | Compute automember orphans (scoped, protected-safe)
  ansible.builtin.set_fact:
    _reconcile_am_orphans: >-
      {{ _reconcile_am_found
         | freeipa_idam_orphans(_reconcile_am_desired, freeipa_idam_reconcile_scope,
                                freeipa_idam_protected_groups | default([])) }}
  vars:
    _reconcile_am_desired:
      group:     "{{ freeipa_server_automember_rules | default([]) | selectattr('automember_type', 'equalto', 'group')     | map(attribute='name') | list }}"
      hostgroup: "{{ freeipa_server_automember_rules | default([]) | selectattr('automember_type', 'equalto', 'hostgroup') | map(attribute='name') | list }}"

- name: Reconcile | Report automember rules to delete
  ansible.builtin.debug:
    msg: >-
      Reconcile [{{ freeipa_idam_reconcile_scope }}] automember orphans to delete —
      group: {{ _reconcile_am_orphans.group | default([]) }},
      hostgroup: {{ _reconcile_am_orphans.hostgroup | default([]) }}

- name: Reconcile | Delete orphaned automember rules (no longer in the matrix)
  ansible.builtin.command: "ipa automember-del {{ item.1 | quote }} --type={{ item.0.key }}"
  loop: "{{ _reconcile_am_orphans | dict2items | subelements('value') }}"
  loop_control:
    label: "{{ item.0.key }} → {{ item.1 }}"
  changed_when: true

- name: Reconcile | Delete orphaned objects (no longer in the matrix)
  ansible.builtin.command: "ipa {{ item.0.key }}-del {{ item.1 | quote }}"
  loop: "{{ _reconcile_orphans | dict2items | subelements('value') }}"
  loop_control:
    label: "{{ item.0.key }} → {{ item.1 }}"
  changed_when: true

- name: Reconcile | Destroy Kerberos ticket
  ansible.builtin.command: kdestroy
  changed_when: false
  check_mode: false
  failed_when: false
