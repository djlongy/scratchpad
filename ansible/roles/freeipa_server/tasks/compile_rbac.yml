---
# Compile the THIN RBAC overlay (filter_plugins/freeipa_rbac.py) into the native
# freeipa_idam_usergroups list, BEFORE idam.yml reconciles it. Generates ONLY role
# groups + their nesting into existing ug-* policy groups + user→role-group membership
# (see defaults/main.yml "RBAC overlay"). HBAC/sudo/hostgroups/etc. stay native.
# Runs only when freeipa_server_rbac_role_sets is non-empty; gated [idam, rbac] in main.yml.

# validate raises AnsibleFilterError (naming culprit) on any rule break, else returns true —
# a set_fact so that error surfaces directly, before any object is touched (plan §7.1).
- name: Validate RBAC overlay input (fail fast, before any apply)
  ansible.builtin.set_fact:
    _freeipa_rbac_valid: >-
      {{ freeipa_server_rbac_role_sets | default([])
         | freeipa_rbac_validate(
             freeipa_server_rbac_user_assignments | default({}),
             freeipa_idam_usergroups | default([]),
             freeipa_server_rbac_naming | default({}),
             native_users=freeipa_idam_users | default([]),
             allow_unknown_users=freeipa_server_rbac_allow_unknown_users | default(false),
             allow_missing_policy_groups=freeipa_server_rbac_allow_missing_policy_groups | default(false)) }}

# (a) Generated role groups + policy-group nesting → merged onto native usergroups
# (baseline wins on name; the `group:` nesting list is UNIONED so native nesting is kept).
- name: Compile + merge RBAC role groups (+ nesting) into native usergroups
  ansible.builtin.set_fact:
    freeipa_idam_usergroups: >-
      {{ freeipa_idam_usergroups | default([])
         | freeipa_idam_merge(freeipa_server_rbac_role_sets | default([])
                              | freeipa_rbac_role_groups(freeipa_server_rbac_naming | default({})),
                              union_fields=['group']) }}

# (b) User→role-group membership shaped as native user `groups` additions → merged onto
# freeipa_idam_users (union of groups), so each assigned user joins their role group via the
# role's normal user-membership pipeline (and passes its "user must belong to a group" check).
- name: Compile + merge RBAC user→role-group memberships into native users
  ansible.builtin.set_fact:
    freeipa_idam_users: >-
      {{ freeipa_idam_users | default([])
         | freeipa_idam_merge(freeipa_server_rbac_user_assignments | default({})
                              | freeipa_rbac_memberships(freeipa_server_rbac_role_sets | default([]),
                                                         freeipa_server_rbac_naming | default({})),
                              union_fields=['groups']) }}

- name: Report the compiled RBAC overlay
  ansible.builtin.debug:
    msg: >-
      RBAC overlay → {{ (freeipa_server_rbac_role_sets | default([])) | length }} role set(s)
      compiled into freeipa_idam_usergroups
      ({{ freeipa_server_rbac_user_assignments | default({}) | length }} user assignment(s)).
