---
# Load ONE tenant file as native vars (single parse) and append its resolved object
# set to _freeipa_tenants_raw. A bare include_vars injects the file's keys into scope,
# so values reference the file's OWN vars (hg_prefix: "hg-{{ tenant }}-{{ env_local }}")
# plus group_vars — exactly like any inventory vars file. The registered result hands
# back the file's resolved dict in the same parse; the transient key injection is inert
# (the merge in load_tenants.yml overwrites the freeipa_* vars, nothing reads the rest).

- name: tenants | Load {{ _freeipa_tenant_file | basename }} (native scope, single parse)
  ansible.builtin.include_vars:
    file: "{{ _freeipa_tenant_file }}"
  register: _freeipa_tenant_inc
  no_log: true  # tenant files may carry inline user passwords

# Snapshot this file's resolved vars before the next include overwrites them;
# empty / fully-commented files contribute nothing.
- name: tenants | Capture {{ _freeipa_tenant_file | basename }} (resolved; own vars in scope)
  ansible.builtin.set_fact:
    _freeipa_tenants_raw: "{{ (_freeipa_tenants_raw | default([])) + [_freeipa_tenant_inc.ansible_facts] }}"
  when: _freeipa_tenant_inc.ansible_facts | length > 0
  no_log: true
