---
# roles/freeipa_server/defaults/main.yml
#
# Portable FreeIPA server role. Behavioural defaults live here; env-specific
# values (IPs, vault paths) are commented out for discoverability and set in
# inventory group_vars. All inputs are prefixed freeipa_server_*.
#
# Install/replica options map 1:1 to upstream freeipa.ansible_freeipa
# (ipaserver_* / ipareplica_*) at the include_role call in tasks/primary.yml
# and tasks/replica.yml.

# ── Identity (derived; override in inventory only to break convention) ───────
freeipa_server_domain: "{{ domain }}"
freeipa_server_realm: "{{ freeipa_server_domain | upper }}"

# This host's FQDN — replaces the ansible_fqdn anti-pattern (repo convention).
freeipa_server_fqdn: "{{ inventory_hostname }}.{{ freeipa_server_domain }}"

# Topology derived from inventory groups (supports single-server + clusters).
# A single host in the `freeipa` group → it is the primary, replica path never
# dispatches. Add a 2nd host (optionally to freeipa_replica) to grow a cluster.
freeipa_server_primary_group: "freeipa_primary"
freeipa_server_primary_host_name: >-
  {{ (groups[freeipa_server_primary_group] | default(groups['freeipa']))[0] }}
freeipa_server_primary_host: "{{ freeipa_server_primary_host_name }}.{{ freeipa_server_domain }}"
freeipa_server_primary_ip: "{{ hostvars[freeipa_server_primary_host_name].ansible_host }}"
freeipa_server_is_primary: "{{ inventory_hostname == freeipa_server_primary_host_name }}"
# True only when more than one FreeIPA server is defined in inventory.
freeipa_server_has_replicas: "{{ (groups['freeipa'] | default([])) | length > 1 }}"

# This host's IP address (passed to the installer).
freeipa_server_ip_addresses:
  - "{{ ansible_host }}"

# ── Credentials: declared Ansible vars FIRST, HashiCorp Vault as fallback ────
# Resolution order for every secret this role needs:
#   1. a declared Ansible var (these two below) — set via group_vars, an
#      Ansible-Vault file, or -e. If non-empty it is used verbatim.
#   2. otherwise a HashiCorp Vault lookup at freeipa_*_vault_secret : *_field.
# Supplying the password(s) directly means NO HashiCorp Vault is required — e.g.
# you can run `--tags export` with just freeipa_server_admin_password. The Vault
# lookup is evaluated lazily, so it never fires when the password is provided.
freeipa_server_admin_password: ""        # IPA admin password (used for kinit/admin ops)
freeipa_server_dm_password: ""           # Directory Manager password

# HashiCorp Vault fallback location (ENV-SPECIFIC — set in inventory group_vars).
# Only needed when the passwords above are left empty.
# freeipa_server_vault_secret: "kv-<env>/data/platform/freeipa/runtime"
freeipa_server_admin_password_field: "admin_password"
freeipa_server_dm_password_field: "dm_password"

# ── Packaging / firewall (upstream owns these) ──────────────────────────────
freeipa_server_install_packages: true
freeipa_server_setup_firewalld: true
freeipa_server_firewalld_zone: ""        # "" → upstream default zone

# ── Airgap / offline install (default online) ───────────────────────────────
freeipa_server_offline: false
# When offline, point to a pre-staged internal repo (handled in preflight):
# freeipa_server_package_repo:
#   name: "idm-local"
#   baseurl: "https://repo.internal/idm/$releasever/$basearch"
#   gpgcheck: true

# ── CA design ───────────────────────────────────────────────────────────────
# self-signed | external-ca | ca-less
freeipa_server_ca_mode: "self-signed"
freeipa_server_subject_base: ""          # "" → upstream derives O=<REALM>
freeipa_server_ca_subject: ""            # "" → upstream default
freeipa_server_random_serial_numbers: false
# external-ca (two-phase: 1st run emits CSR, sign, 2nd run consumes certs):
freeipa_server_external_cert_files: []
# ca-less (provide HTTP/LDAP cert files via upstream vars when chosen):
# documented in README; not defaulted.

# ── Trusted external CAs (ADDITIVE to the IPA CA) ────────────────────────────
# Import third-party / other-domain CA certs into the IPA trust store so IPA and
# its enrolled clients (via ipa-certupdate) TRUST certificates issued by them.
# This does NOT change the IPA CA chosen by freeipa_server_ca_mode — it adds
# trusted roots alongside it. Primary only; replicates to the rest of the cluster.
# Each item: { name: <trust-store nickname>, src: <PEM on the control node> }
#         or { name: <nickname>, content: "<inline PEM text>" }
# Idempotent (skips nicknames already present). Needs the IPA CA store, so it is
# skipped in ca-less mode. Auth uses the Directory Manager password from
# freeipa_server_vault_secret + freeipa_server_dm_password_field (fed on stdin).
freeipa_server_trusted_external_cas: []
freeipa_server_trusted_ca_staging_dir: "/root/.freeipa-trusted-cas"

# ── Backup restore / offload (wraps upstream freeipa.ansible_freeipa.ipabackup) ─
# Our scheduled backup.yml runs `ipa-backup` on a timer; these add the missing
# restore + controller-offload paths by delegating to the upstream ipabackup role.
#
# RESTORE is DESTRUCTIVE and break-glass: gated behind the `never` tag (runs ONLY
# with `--tags restore`) AND requires this to name a backup present on the server
# (e.g. "ipa-data-2026-06-22-12-00-00" or "ipa-full-..."). DM password from Vault.
freeipa_server_restore_name: ""
# OFFLOAD (non-destructive): copy server backups to the Ansible controller during
# a normal backup run. Set to a backup name, or "all" for every backup.
freeipa_server_backup_fetch_name: ""
freeipa_server_backup_controller_path: "./freeipa-backups"

# ── KRA / PKINIT ────────────────────────────────────────────────────────────
freeipa_server_setup_kra: false
freeipa_server_no_pkinit: false

# ── Active Directory trust (cross-forest identity) ───────────────────────────
# Trust an AD forest so AD users authenticate against IPA-managed resources.
# Requires the AD trust controller (set freeipa_server_setup_adtrust: true so the
# install passes --setup-adtrust) PLUS reachable AD DCs + working DNS both ways.
# Each trust is established via the upstream ipatrust module; the IPA admin and
# each AD admin password come from Vault. Opt-in, default off.
# NOTE: not exercised in this lab (no AD); shipped as a capability.
freeipa_server_setup_adtrust: false
freeipa_server_ad_trusts: []
#  - realm: "AD.EXAMPLE.COM"
#    admin: "Administrator"               # AD admin user authorizing the trust
#    password_field: "ad_trust_password"  # field in freeipa_server_vault_secret
#    two_way: true                        # bidirectional trust
#    trust_type: "ad"

# ── DNS ─────────────────────────────────────────────────────────────────────
freeipa_server_setup_dns: true
freeipa_server_forwarders: []            # ENV-SPECIFIC: e.g. ["10.0.0.1"]
freeipa_server_forward_policy: "only"    # only | first
freeipa_server_no_forwarders: false
freeipa_server_auto_reverse: true
freeipa_server_reverse_zones: []
freeipa_server_no_dnssec_validation: true
freeipa_server_allow_zone_overlap: true

# Declarative DNS (primary only; needs integrated DNS). Manages IPA-hosted zones,
# conditional forward zones, and records via the upstream ipadns* modules.
# Idempotent. Records use the generic record_type/record_value form.
freeipa_server_dns_zones: []
#  - { name: "internal.example.com", dynamic_update: true, allow_sync_ptr: true }
freeipa_server_dns_forward_zones: []
#  - { name: "corp.example.com", forwarders: ["10.0.0.53"], forwardpolicy: "first" }
freeipa_server_dns_records: []
#  - { zone_name: "internal.example.com", name: "app1", record_type: "A", record_value: "10.0.0.20" }

# ── Automember (auto group/hostgroup membership rules) ───────────────────────
# Primary only. Each rule auto-assigns users/hosts to a group by attribute regex
# via the upstream ipaautomember module. Idempotent.
freeipa_server_automember_rules: []
#  - name: linux-hosts            # the target group/hostgroup (must already exist)
#    automember_type: hostgroup   # group | hostgroup
#    inclusive:
#      - { key: "fqdn", expression: ".*\\.example\\.com$" }
#  - name: contractors
#    automember_type: group
#    inclusive:
#      - { key: "title", expression: "Contractor" }

# Re-evaluate EXISTING members after a rule changes, so hosts that enrolled BEFORE
# their rule existed get placed (a newly-enrolling host is placed automatically by
# IPA at host-create — no rebuild needed). The rebuild runs only when a rule
# changed this run; set true to force a one-off rebuild on demand.
freeipa_server_automember_rebuild: false

# ── POSIX ID range / HBAC / homedirs ────────────────────────────────────────
freeipa_server_idstart: 0                 # 0 → upstream/random default
freeipa_server_idmax: 0
freeipa_server_no_hbac_allow: false       # keep allow_all at install; tear down in hardening
freeipa_server_mkhomedir: true

# ── Time (replaces the old hardcoded --no-ntp) ──────────────────────────────
freeipa_server_setup_ntp: true
freeipa_server_ntp_servers: []            # e.g. ["ntp1.internal", "ntp2.internal"]
freeipa_server_ntp_pool: ""

# ── FIPS (preflight assertion only — never auto-enabled) ────────────────────
freeipa_server_fips_required: false

# ── Preflight tolerances ────────────────────────────────────────────────────
freeipa_server_preflight_time_tolerance_sec: 120   # Kerberos fails > 300s skew
freeipa_server_preflight_wait_primary_timeout: 600  # replica waits for primary LDAP

# ── Post-install hardening (ALL opt-in; default = no behaviour change) ───────
freeipa_server_harden_anonymous_bind: false        # true → set rootdse (not full off)
freeipa_server_search_size_limit: 0                 # 0 → leave as-is
freeipa_server_search_time_limit: 0                 # 0 → leave as-is
freeipa_server_require_otp_groups: []               # admin groups to force OTP on
freeipa_server_disable_allow_all: false             # true → tear down allow_all (guarded)
freeipa_server_crypto_policy: ""                    # "" → report only; e.g. "FIPS", "DEFAULT"

# ── Cold-start resilience tuning (behavioural — sensible defaults) ───────────
freeipa_server_dirsrv_timeout_sec: 600
freeipa_server_recovery_initial_delay: 6min
freeipa_server_recovery_periodic_interval: 10min
freeipa_server_recovery_max_retries: 1
freeipa_server_recovery_retry_delay_seconds: 30
freeipa_server_recovery_ipactl_timeout_sec: 90
freeipa_server_recovery_ldap_wait_attempts: 30
freeipa_server_recovery_service_timeout: 1800
freeipa_server_recovery_restart_sec: 2min
freeipa_server_recovery_start_limit_interval: 30min
freeipa_server_recovery_start_limit_burst: 10
freeipa_server_recovery_chrony_max_correction: "0.5"

# ── HTTPD ccache cleanup (behavioural — sensible defaults) ──────────────────
freeipa_server_ccache_max_age: "4h"
freeipa_server_tmpfiles_clean_interval: "1h"

# ── Declarative IDAM data contract (UNCHANGED names — see spec §5) ───────────
# freeipa_idam_vault_secret: "kv-<env>/data/platform/freeipa/runtime"
freeipa_idam_admin_principal: "admin"
freeipa_idam_admin_password_field: "admin_password"
freeipa_idam_managed_group: "idam-managed-users"
freeipa_idam_groups: []
# Roles matrix — a role is a named bundle of groups; users reference roles
# (user `roles: [...]`) instead of long flat group lists. At reconcile, each
# user's roles expand to the union of their groups (merged with any direct
# `groups`). Distinct from freeipa_rbac_roles (which generates groups/hostgroups/
# HBAC/sudo) — this just bridges users <-> existing groups for cleaner RBAC.
freeipa_idam_roles: []
#  - name: platform-admin
#    groups: [app-gitlab-admin, app-harbor-admin]
freeipa_idam_users: []
freeipa_idam_hostgroups: []
freeipa_idam_hbacsvcs: []                  # custom HBAC services (seeded before HBAC rule members)
freeipa_idam_hbac_rules: []
freeipa_idam_sudo_commands: []
freeipa_idam_sudo_rules: []
freeipa_idam_pwpolicies: []

# Native FreeIPA RBAC DELEGATION roles (`ipa role`) — a different layer from the
# group-bundle freeipa_idam_roles above. A native role bundles PRIVILEGES (manage
# users, reset passwords, read schema, ...) and is assigned to members. Use this to
# delegate IPA-management powers (helpdesk, operators), NOT app/host access (that's
# groups + HBAC). Applied via freeipa.ansible_freeipa.iparole AFTER users + groups
# exist so members resolve. Each item: { name, privilege: [...], user: [...],
# group: [...], host: [...], hostgroup: [...], service: [...], state: present }.
freeipa_idam_iparoles: []
#  - name: helpdesk-l1
#    privilege: ["Modify Users and Reset passwords", "Unlock user accounts"]
#    group: [it-helpdesk]
freeipa_idam_password_expiration_floors: []

# Email is built as <name>@<freeipa_idam_email_domain> when a user has no explicit
# `email:` — the mail domain is often NOT the realm domain, so it is its own var.
# An explicit per-user email always overrides this.
freeipa_idam_email_domain: "{{ domain }}"

# Initial password set on user CREATE (update_password: on_create, so existing
# users are never reset). Empty = create users with no password. Set this from
# Vault in inventory (e.g. a lookup on freeipa_idam_vault_secret). A per-user
# `password:` overrides it.
freeipa_idam_default_user_password: ""

# Deterministic group GIDs (Infrastructure-as-Code): name -> gidnumber. Groups
# whose name is in this map are created with the fixed GID, so POSIX permissions
# (/etc/group, SSSD/NSS) stay consistent across environments + DR rebuilds. A
# group's own `gidnumber:` still wins if set; otherwise the map; otherwise IPA
# auto-assigns. User UIDs stay auto-assigned (no cross-host constraint).
freeipa_idam_group_gids: {}
#  docker: 89600115
#  ansible: 89600116

# Archive (preserve) removed users instead of hard-deleting them. preserve=true →
# user-del --preserve: account deactivated + retained (recoverable), not destroyed.
freeipa_idam_preserve_archived: true
# Users the reconcile must never DELETE (prune/archive). Break-glass accounts are
# auto-added to this list. Append any system/service accounts you want shielded from
# removal. (These ARE still created/updated — see unmodifiable_users for the opposite.)
freeipa_idam_protected_users:
  - admin

# Users the role must never CREATE or user-mod (their attributes can't be set):
# `admin` lacks the inetOrgPerson objectClass so its givenName/sn are rejected.
# These are skipped in the user-create payload (group membership is still applied,
# and a dedicated task can still set admin's shell). Distinct from protected_users:
# protected = never removed; unmodifiable = never have attributes written.
freeipa_idam_unmodifiable_users:
  - admin

# FreeIPA BUILT-IN groups the role must never delete (state: absent is refused for
# these, so an accidental `state: absent` can't tear down core schema). Membership
# can still be managed if you list them; deletion is what's blocked.
freeipa_idam_protected_groups:
  - admins
  - editors
  - ipausers
  - trust admins

# ── Account types beyond human users ────────────────────────────────────────
# SERVICE ACCOUNTS — non-human, no interactive login. Same item shape as a user
# (name, givenname, sn, groups, ...) but the role forces shell = the nologin shell.
# Kept a SEPARATE list (not mixed into freeipa_idam_users) so intent is explicit;
# they otherwise flow through the same create/group/marker/archive pipeline.
freeipa_idam_service_accounts: []
freeipa_idam_nologin_shell: "/sbin/nologin"

# BREAK-GLASS — real named emergency accounts (NOT the built-in admin). Login STAYS
# enabled (that is the point of break-glass); each is auto-added to
# freeipa_idam_breakglass_group and auto-PROTECTED from the prune (never archived).
# Pair with disable_admin_login below: day-to-day admin via named accounts, the
# emergency path via these. Give each a strong password (per-account or the default).
freeipa_idam_breakglass_accounts: []
freeipa_idam_breakglass_group: "admins"

# Best practice: disable INTERACTIVE login for the built-in `admin` by setting its
# shell to the nologin shell (admin keeps its powers for API/kinit, just no shell
# login). OPT-IN (default off) — only enable once break-glass accounts exist, or you
# risk locking out interactive admin entirely.
freeipa_idam_disable_admin_login: false

# ── Config export / snapshot (opt-in; tags: export) ─────────────────────────
# Snapshot a LIVE FreeIPA into this role's declarative contract so you can adopt
# an existing instance instead of rebuilding it. Read-only against FreeIPA.
# Output path on the control node (move it into an inventory group_vars to apply).
freeipa_server_export_output: "freeipa.config.snapshot.yml"
# Pin static hostgroup host rosters (default off — enrolment + automember own them).
freeipa_server_export_include_host_membership: false
# Emit per-user SSH public keys.
freeipa_server_export_include_sshkeys: false
# Derive a roles matrix (freeipa_idam_roles) so users reference roles, not long
# group lists. Set false to export a flat `groups` list per user instead.
freeipa_server_export_roles: true
# Groups whose name matches ANY of these case-insensitive regexes are NOT mined
# into roles — they belong to a layer that already owns them (your role-* groups,
# or an external PAM/JIT that manages its own groups). They stay as
# direct group memberships. Add your own patterns; [] mines everything.
freeipa_server_export_role_exclude:
  - role
# A co-occurrence bundle becomes a role only with at least this many groups;
# smaller bundles stay as direct groups (no 1-group "roles").
freeipa_server_export_role_min_groups: 2
# Stock HBAC services that ship with FreeIPA — skipped by the export (only CUSTOM
# services are captured). APPEND to this list if a newer FreeIPA version ships
# additional stock services, so they aren't mis-captured as custom.
freeipa_server_export_hbacsvc_stock:
  - crond
  - ftp
  - gdm
  - gdm-password
  - gssftp
  - kdm
  - login
  - proftpd
  - pure-ftpd
  - sshd
  - su
  - su-l
  - sudo
  - sudo-i
  - systemd-user
  - vsftpd

# ── IPA-to-IPA realm migration (opt-in; via playbooks/L2_identity/freeipa_migrate.yml) ──
# Runs ipa-migrate ON this (new-realm) primary, pulling identities from a source
# (old) realm. Passwords are NOT migrated (Kerberos keys are realm-salted).
freeipa_migrate_dryrun: true                    # SAFE default — set false to actually write
freeipa_migrate_mode: "prod-mode"               # prod-mode (preserve SIDs/DNA) | stage-mode
freeipa_migrate_bind_dn: "cn=Directory Manager"
freeipa_migrate_bind_pw: ""                      # declared var first; else Vault fallback below
freeipa_migrate_bind_pw_field: "dm_password"
freeipa_migrate_source_ca_path: "/etc/ipa/ca.crt"   # CA cert path on the source host
freeipa_migrate_log: "/var/log/ipa-migrate.log"
freeipa_migrate_restart_sssd: true
freeipa_migrate_disable_mode_after: false       # keep migration mode ON for the password campaign
# ENV-SPECIFIC — set in inventory (see group_vars/idm.yml):
# freeipa_migrate_source: "idm01.example.com"   # source IPA FQDN (ipa-migrate arg)
# freeipa_migrate_source_host: "idm01"       # inventory host for CA slurp
# freeipa_migrate_bind_pw_vault: "kv/data/platform/freeipa/runtime"  # source DM pw path
# Internal staged paths (behavioural):
freeipa_migrate_ca_dest: "/root/.freeipa-migrate-src-ca.crt"
freeipa_migrate_bind_pw_file: "/root/.freeipa-migrate-bind-pw"
freeipa_migrate_ccache: "FILE:/root/.freeipa-migrate-ccache"
