---
# roles/freeipa_server/defaults/main.yml
#
# Portable FreeIPA server role. Behavioural defaults live here; env-specific values
# (IPs, vault paths) are commented out for discoverability and set in inventory
# group_vars. All inputs are prefixed freeipa_server_* / freeipa_idam_*. Install and
# replica options map 1:1 to upstream freeipa.ansible_freeipa (ipaserver_* / ipareplica_*)
# at the include_role calls in tasks/primary.yml and tasks/replica.yml.

# ── Identity (derived; override in inventory only to break convention) ───────
freeipa_server_domain: "{{ domain }}"
freeipa_server_realm: "{{ freeipa_server_domain | upper }}"
# This host's FQDN — replaces the ansible_fqdn anti-pattern (repo convention).
freeipa_server_fqdn: "{{ inventory_hostname }}.{{ freeipa_server_domain }}"

# Topology derived from inventory groups: first host of freeipa_server_primary_group,
# else of `freeipa`, else this host (single-server needs NO group setup at all).
# Add hosts (optionally to freeipa_primary) to cluster; non-primaries become replicas.
freeipa_server_primary_group: "freeipa_primary"
freeipa_server_primary_host_name: >-
  {{ (groups[freeipa_server_primary_group]
      | default(groups['freeipa'] | default([inventory_hostname], true), true))[0] }}
freeipa_server_primary_host: "{{ freeipa_server_primary_host_name }}.{{ freeipa_server_domain }}"
freeipa_server_primary_ip: "{{ hostvars[freeipa_server_primary_host_name].ansible_host }}"
freeipa_server_is_primary: "{{ inventory_hostname == freeipa_server_primary_host_name }}"

# This host's IP address (passed to the installer). ansible_host must be the IP
# (repo convention); override this list if you address hosts by name.
freeipa_server_ip_addresses:
  - "{{ ansible_host }}"

# NetworkManager connection on a REPLICA whose DNS is repointed at the primary for
# enrolment. Empty (and no legacy `connection_name` inventory var) → the repoint is
# skipped and /etc/hosts alone carries enrolment resolution.
freeipa_server_replica_connection: "{{ connection_name | default('') }}"

# ── Credentials: declared Ansible var FIRST, HashiCorp Vault as fallback ─────
# For every secret: use the declared var below if non-empty, else look it up at
# freeipa_server_vault_secret : *_field. The Vault lookup is lazy, so supplying the
# password directly means no Vault is needed (e.g. `--tags export`). These vars are the
# SINGLE credential source for the WHOLE role — there are no separate freeipa_idam_* ones.
freeipa_server_admin_principal: "admin"  # IPA admin principal for kinit + ipaadmin ops
freeipa_server_admin_password: ""        # IPA admin password
freeipa_server_dm_password: ""           # Directory Manager password
# Vault fallback location (ENV-SPECIFIC — set in inventory). Only used when passwords empty.
# freeipa_server_vault_secret: "kv-<env>/data/platform/freeipa/runtime"
freeipa_server_admin_password_field: "admin_password"
freeipa_server_dm_password_field: "dm_password"

# ── Packaging / firewall (upstream owns these) ──────────────────────────────
freeipa_server_install_packages: true
freeipa_server_setup_firewalld: true
freeipa_server_firewalld_zone: ""        # "" → upstream default zone

# ── Airgap / offline install (default online) ───────────────────────────────
# When offline, point freeipa_server_package_repo at a pre-staged internal repo
# (handled in preflight): { name, baseurl, gpgcheck }.
freeipa_server_offline: false

# ── CA design: self-signed | external-ca | ca-less ──────────────────────────
freeipa_server_ca_mode: "self-signed"
freeipa_server_subject_base: ""          # "" → upstream derives O=<REALM>
freeipa_server_ca_subject: ""            # "" → upstream default
freeipa_server_random_serial_numbers: false
# external-ca is two-phase: 1st run emits a CSR, you sign it, 2nd run consumes the certs.
freeipa_server_external_cert_files: []
# ca-less: provide HTTP/LDAP cert files via upstream vars (see README); not defaulted.

# ── Trusted external CAs (ADDITIVE to the IPA CA) ────────────────────────────
# Import third-party CA certs into the IPA trust store so IPA + enrolled clients (via
# ipa-certupdate) trust certs they issue. Does NOT change the CA from ca_mode — adds roots
# alongside it. Primary only, replicates cluster-wide; idempotent; skipped in ca-less mode.
# Auth uses the DM password (vault_secret + dm_password_field, fed on stdin). Each item
# needs `name` (trust-store nickname) + ONE source:
#   src:     PEM file on the control node
#   content: inline PEM
#   url:     PEM the SERVER fetches (internal artifact repo pattern);
#            optional checksum: "sha256:<hex>", validate_certs: false
freeipa_server_trusted_external_cas: []
#  - { name: corp-root, src: files/corp-root.pem }
#  - { name: partner-root, url: "https://artifacts.example.com/pki/partner-root.pem" }
freeipa_server_trusted_ca_staging_dir: "/root/.freeipa-trusted-cas"

# ── Backup restore / offload (wraps upstream ipabackup; backup.yml runs ipa-backup) ─
# RESTORE is DESTRUCTIVE break-glass: `never`-tagged (runs only with --tags restore) and
# must name a backup on the server (e.g. "ipa-full-2026-06-22-12-00-00"). DM password from Vault.
freeipa_server_restore_name: ""
# OFFLOAD (non-destructive): during a normal backup run, copy backups to the controller.
# Set a backup name, or "all" for every backup.
freeipa_server_backup_fetch_name: ""
freeipa_server_backup_controller_path: "./freeipa-backups"
# Backup pipeline (freeipa-backup.timer wraps `ipa-backup --data --online` + retention prune).
freeipa_backup_dir: "/var/lib/ipa/backup"
freeipa_backup_retention_days: 14
freeipa_backup_script_path: "/usr/local/bin/freeipa-backup.sh"
# Group granted read access to the backup dir (setgid 2750) for an external backup
# agent (e.g. a Borg/restic reader account). Default keeps it root-only.
freeipa_backup_reader_group: "root"
# Prometheus node_exporter textfile dir — metrics are written ONLY if it already
# exists on the host (no monitoring stack -> silently skipped, never a failure).
freeipa_backup_metrics_dir: "/var/lib/node_exporter/textfile_collector"

# ── KRA / PKINIT ────────────────────────────────────────────────────────────
freeipa_server_setup_kra: false
freeipa_server_no_pkinit: false

# ── Active Directory trust (cross-forest identity; opt-in, default off) ──────
# Trust an AD forest so AD users authenticate against IPA resources. Needs setup_adtrust
# (passes --setup-adtrust), reachable AD DCs, and two-way DNS. Each trust → upstream ipatrust;
# IPA admin + each AD admin password from Vault. Not exercised in this lab (no AD).
freeipa_server_setup_adtrust: false
freeipa_server_ad_trusts: []
#  - { realm: "AD.EXAMPLE.COM", admin: "Administrator", password_field: "ad_trust_password", two_way: true, trust_type: "ad" }

# ── DNS ─────────────────────────────────────────────────────────────────────
# With setup_dns: false the role maps NONE of the DNS options below to the
# installer (upstream rejects them without --setup-dns) — leave them as-is.
freeipa_server_setup_dns: true
freeipa_server_forwarders: []            # ENV-SPECIFIC: e.g. ["192.0.2.1"]
freeipa_server_forward_policy: "only"    # only | first
freeipa_server_no_forwarders: false
freeipa_server_auto_reverse: true
freeipa_server_reverse_zones: []
freeipa_server_no_dnssec_validation: true
freeipa_server_allow_zone_overlap: true

# Declarative DNS (primary only; needs integrated DNS) via upstream ipadns* modules; idempotent.
# Zones — forward (name) OR reverse (name_from_ip: CIDR → IPA derives in-addr.arpa). To REMOVE
# a reverse zone use its explicit name (state: absent + name: "0.0.10.in-addr.arpa."), not name_from_ip.
freeipa_server_dns_zones: []
#  - { name: "internal.example.com", dynamic_update: true, allow_sync_ptr: true }
#  - { name_from_ip: "10.0.0.0/24", allow_sync_ptr: true, skip_overlap_check: true }  # reverse
freeipa_server_dns_forward_zones: []
#  - { name: "corp.example.com", forwarders: ["10.0.0.53"], forwardpolicy: "first" }
# Records — record_value is list-typed (single or many, same field). create_reverse auto-builds
# the PTR (needs the reverse zone + allow_sync_ptr). Or drive a whole zone via `records:`.
freeipa_server_dns_records: []
#  - { zone_name: "internal.example.com", name: "app1", record_type: "A", record_value: "10.0.0.20" }
#  - { zone_name: "internal.example.com", name: "vip",  record_type: "A", record_value: ["10.0.0.21", "10.0.0.22"] }
#  - { zone_name: "internal.example.com", name: "vcenter", record_type: "A", record_value: "10.0.0.30", create_reverse: true }  # + PTR
#  - { zone_name: "internal.example.com", records: [ { record_name: "esx01", a_record: ["10.0.0.31"], create_reverse: true } ] }  # bulk per zone

# ── Automember (auto group/hostgroup membership by attribute regex; primary only) ──
# Each rule → upstream ipaautomember; idempotent. The target group/hostgroup must already exist.
freeipa_server_automember_rules: []
#  - { name: linux-hosts, automember_type: hostgroup, inclusive: [{ key: "fqdn", expression: ".*\\.example\\.com$" }] }
#  - { name: contractors, automember_type: group,     inclusive: [{ key: "title", expression: "Contractor" }] }
# Re-evaluate EXISTING members after a rule changes (new hosts are placed at enrol time, so no
# rebuild needed for them). Runs only when a rule changed this run; set true to force a one-off.
freeipa_server_automember_rebuild: false

# ── POSIX ID range / HBAC / homedirs ────────────────────────────────────────
freeipa_server_idstart: 0                 # 0 → upstream/random default
freeipa_server_idmax: 0
freeipa_server_no_hbac_allow: false       # keep allow_all at install; tear down in hardening
freeipa_server_mkhomedir: true

# ── Time (replaces the old hardcoded --no-ntp) ──────────────────────────────
freeipa_server_setup_ntp: true
freeipa_server_ntp_servers: []            # e.g. ["ntp1.internal", "ntp2.internal"]
freeipa_server_ntp_pool: ""

# ── FIPS (preflight assertion only — never auto-enabled) ────────────────────
freeipa_server_fips_required: false

# ── Preflight tolerances ────────────────────────────────────────────────────
freeipa_server_preflight_time_tolerance_sec: 120    # Kerberos fails > 300s skew
freeipa_server_preflight_wait_primary_timeout: 600  # replica waits for primary LDAP

# ── Post-install hardening (ALL opt-in; default = no behaviour change) ───────
freeipa_server_harden_anonymous_bind: false        # true → set rootdse (not full off)
freeipa_server_search_size_limit: 0                 # 0 → leave as-is
freeipa_server_search_time_limit: 0                 # 0 → leave as-is
freeipa_server_require_otp_groups: []               # admin groups to force OTP on
freeipa_server_disable_allow_all: false             # true → tear down allow_all (guarded)
freeipa_server_crypto_policy: ""                    # "" → report only; e.g. "FIPS", "DEFAULT"

# ── Declarative IDAM data contract ────────────────────────────────────────────
# Two role-like inputs, both optional conveniences over the group baseline:
#   freeipa_idam_roles    — GROUP-BUNDLE matrix: a role is a named set of groups; a user's
#                           `roles: [...]` expands to the union of those groups. Ansible-side
#                           only, creates NO IPA object.
#   freeipa_idam_iparoles — NATIVE IPA delegation role objects (`ipa role`): bundle PRIVILEGES
#                           and assign to members. Delegates IPA-management powers (helpdesk).
#
# OPTIONAL thin RBAC overlay ("assign a user to an abstract role, not many groups") is compiled
# BY the role itself (tasks/rbac.yml + filter_plugins/freeipa_rbac.py) from the
# freeipa_server_rbac_* vars below. Drop the vars and you're back to raw native dicts.
#
# Tenants (optional): a directory of per-tenant .yml files, each {tenant, shared?, <object lists>}.
# The role reads + flattens ALL of them in one run so a single reconcile sees every tenant. A file
# can carry its whole config (short keys like users/groups/hbac_rules/dns_records, or full
# freeipa_idam_*/freeipa_server_* straight from an export). Lists concatenate across files by target
# var; users/groups are stamped _owner (tenant) + _shared. Loaded via a single include_vars, so a
# file behaves like any inventory YAML: a value can reference ANY other var the file defines
# (native self-reference, e.g. name: "{{ hg_prefix }}-all") plus group_vars, and can pull a whole
# list from a group_var. {{ env }} = inventory env; define your own scalar for a per-file variant.
# Empty = legacy mode (set the lists directly in group_vars). Inventory sets "{{ inventory_dir }}/tenants".
# See tasks/load_tenants.yml + load_one_tenant.yml.
freeipa_idam_tenants_dir: ""
freeipa_idam_managed_group: "idam-managed-users"
freeipa_idam_usergroups: []
# Group-bundle roles matrix (see above). Each user's roles expand to the union of their groups.
freeipa_idam_roles: []
#  - { name: platform-admin, groups: [app-gitlab-admin, app-harbor-admin] }
freeipa_idam_users: []
freeipa_idam_hostgroups: []
freeipa_idam_hbacsvcs: []                  # custom HBAC services (e.g. docker, xrdp-sesman)
freeipa_idam_hbacsvcgroups: []             # bundle services → grant via servicegroup on a rule
#  - { name: remote-access, description: "Interactive remote login", hbacsvc: [sshd, xrdp-sesman] }
freeipa_idam_hbac_rules: []
freeipa_idam_sudo_commands: []
freeipa_idam_sudocmdgroups: []             # bundle sudo cmds → grant via cmdgroup on a rule
#  - { name: pkg-mgmt, description: "Package management", sudocmd: ["/usr/bin/dnf", "/usr/bin/yum"] }
freeipa_idam_sudo_rules: []
freeipa_idam_pwpolicies: []

# ── Thin RBAC overlay (OPTIONAL; compiled inside the desired phase when declared) ──
# Assign a user an abstract ROLE instead of many granular policy groups. The overlay
# generates ONLY: the role group, its nesting into EXISTING policy groups, and
# user→role-group membership — merged onto the native lists (baseline wins).
# WYSIWYG flat list, same shape as freeipa_idam_usergroups: every name is used
# VERBATIM (no naming templates) — paste policy group names straight from the export.
# Scope lives in the names you declare; role-<tenant>-<env>-<name> is convention, not
# code. Empty = pure baseline, zero behaviour change. Compiled AFTER the tenant load,
# so it composes with freeipa_idam_tenants_dir. See tasks/rbac.yml.
freeipa_server_rbac_roles: []
#  - name: role-acme-prod-platform-admin       # the role group, created exactly as declared
#    description: "acme/prod platform admins"
#    policy_groups:                            # EXISTING groups, pasted from the export
#      - ug-acme-prod-gitlab-admins
#      - ug-acme-prod-docker-operators
#    members: [alice, bob]                     # users granted the role (membership added automatically)
freeipa_server_rbac_allow_unknown_users: false           # permit assigning users not in freeipa_idam_users
freeipa_server_rbac_allow_missing_policy_groups: false   # permit nesting onto undeclared ug-* groups

# Custom RBAC building blocks for delegation roles: permission (atomic right) → privilege
# (bundle of permissions) → iparole (bundle of privileges, below). Built-ins are never declared.
# Field names = ipapermission / ipaprivilege params.
freeipa_idam_permissions: []
#  - { name: "Read Docker Hostgroups", right: [read, search], object_type: hostgroup, attrs: [cn, member] }
freeipa_idam_privileges: []
#  - { name: "Docker Fleet Operators", description: "Manage docker hostgroups", permission: ["Read Docker Hostgroups"] }

# Native FreeIPA RBAC DELEGATION roles (`ipa role`) — bundle PRIVILEGES and assign to members, to
# delegate IPA-management powers (helpdesk/operators), NOT app/host access (that's groups + HBAC).
# Applied via iparole AFTER users + groups exist. Each item: { name, privilege: [...], user/group/
# host/hostgroup/service: [...], state: present }.
freeipa_idam_iparoles: []
#  - { name: helpdesk-l1, privilege: ["Modify Users and Reset passwords", "Unlock user accounts"], group: [it-helpdesk] }
freeipa_idam_password_expiration_floors: []

# Email = <name>@<email_domain> when a user has no explicit `email:` (the mail domain is often
# not the realm domain, hence its own var). A per-user email always overrides this.
freeipa_idam_email_domain: "{{ domain }}"

# Initial password on user CREATE only (update_password: on_create — existing users never reset).
# Empty = create with no password. Set from Vault in inventory. A per-user `password:` overrides.
freeipa_idam_default_user_password: ""

# Deterministic group GIDs (name → gidnumber) so POSIX perms stay consistent across environments +
# DR rebuilds. Precedence: a group's own `gidnumber:` > this map > IPA auto-assign. UIDs stay auto.
freeipa_idam_group_gids: {}
#  docker: 89600115

# Archive (preserve) removed users instead of hard-deleting: user-del --preserve deactivates +
# retains the account (recoverable) rather than destroying it.
freeipa_idam_preserve_archived: true

# ── Pruning control ───────────────────────────────────────────────────────────
# THE authoritative switch (spec §8) — the sole pruning control (no legacy per-mechanism flags).
# false (default) = additive-safe: create/update declared objects + memberships, add users/groups,
# but never strip undeclared members or delete undeclared objects. true = compiled desired-state is
# authoritative: undeclared group members removed, undeclared in-scope matrix objects (groups,
# hostgroups, HBAC/sudo/automember rules) deleted, users dropped from config archived. REALM-SCOPED:
# only run authoritative against a COMPLETE assembled desired-state, never a partial tenant file, or
# it prunes another tenant's objects (spec §9).
freeipa_server_authoritative: false

# Membership-only reconcile — the SAFE nightly drift-revoke mode. Strips undeclared group members
# (like authoritative) but SUPPRESSES all object/user deletion (no group delete, no user archival,
# no object reconcile). Safe per-tenant against a partial file. Enables the membership strip on its
# own (no need for authoritative); if both are set, this wins and deletions stay suppressed.
freeipa_idam_reconcile_memberships_only: false

# End-of-run IDAM summary (managed users/groups, what changed / archived / deleted / pruned).
freeipa_idam_report: true

# Scope marker for object pruning under authoritative — only objects whose NAME contains this
# substring are deletion-eligible (the matrix sets '<tenant>-<environment>'). Blank = object pruning
# deletes NOTHING and is skipped (fail-safe — never considers the whole realm).
freeipa_idam_reconcile_scope: ""

# WHOLE-REALM prune — the match-everything override of reconcile_scope (delete ALL undeclared managed
# objects). DOUBLE-GATED: needs BOTH reconcile_all AND reconcile_all_confirm true (set confirm via -e).
# The role's own declared lists always protect built-ins (builtin_groups/hostgroups, protected/
# unmodifiable users, builtin_hbac_rules, stock hbacsvcs, markers). iparoles/privileges/permissions
# are NOT pruned here (huge IPA built-in sets) — use --tags delete for those.
freeipa_idam_reconcile_all: false
freeipa_idam_reconcile_all_confirm: false

# Built-ins never pruned by reconcile (whole-realm mode).
freeipa_server_idam_builtin_hbac_rules: ["allow_all", "allow_systemd-user"]
freeipa_server_idam_builtin_hbacsvcgroups: ["Sudo", "ftp"]

# Container-marker group for GROUP-EXISTENCE reconcile: every declared group is nested here during
# apply; under authoritative any container member no longer in freeipa_idam_usergroups (and not
# protected) is DELETED — so removing a group from the dict deletes it from IPA. Only touches groups
# WE enrolled; unmanaged/out-of-band groups and protected built-ins are never considered.
freeipa_idam_managed_groups_group: "idam-managed-groups"

# ── Hard-delete: ONE gate (freeipa_idam_delete), the operation chosen by tag ──
# freeipa_idam_delete is THE single hard-delete (ipa *-del, irrecoverable) permission gate — set it
# ONCE. Default OFF; MOCK/lab realms only (never a production realm). With it true, pick the operation
# by `never`-tag; --check turns any into a read-only dry-run:
#   --tags delete          — hard-delete every object DECLARED in this run's freeipa_idam_* lists
#                            (protected users/groups excluded). Cleanup for a mock/demo run.
#   --tags prune_preserved — hard-delete ORPHANED preserved (archived) users the reconcile left behind
#                            (no longer in any freeipa_idam_* list, so --tags delete can't reach them).
# The SOFT, recoverable counterpart (archive users + reconcile undeclared objects) is the "prune"
# case — gated by freeipa_server_authoritative above, not here.
freeipa_idam_delete: false
# Scope selectors for --tags prune_preserved — which preserved logins to SHIELD (not gates):
freeipa_idam_prune_preserved_keep: []                 # explicit extra keeps, on top of protected_users
freeipa_idam_prune_preserved_keep_regex: "^svc-"      # regex shield (default protects svc-* accounts); "" = none

# Users the reconcile must never DELETE/archive (break-glass accounts auto-added). Still
# created/updated — cf. unmodifiable_users, the opposite.
freeipa_idam_protected_users:
  - admin

# Users the role must never CREATE or user-mod (attributes can't be set — e.g. `admin` lacks
# inetOrgPerson so givenName/sn are rejected). Skipped in the create payload; group membership
# still applied. Distinct from protected_users (never removed).
freeipa_idam_unmodifiable_users:
  - admin

# FreeIPA BUILT-IN groups the role must never delete (state: absent is refused, so an accidental
# absent can't tear down core schema). Membership can still be managed; only deletion is blocked.
freeipa_idam_protected_groups:
  - admins
  - editors
  - ipausers
  - trust admins

# ── IDAM reference-integrity validation ──────────────────────────────────────
# References (role→group, user→group/role, hbac→service, sudo→command) are checked so a typo fails
# loudly. Shape/typo checks (missing name, no groups/roles, duplicate user) ALWAYS hard-fail; this
# governs only cross-object REFERENCE checks (so a scoped tenant slice can reference a global object
# it doesn't own):
#   strict (default) — reference must be DECLARED here or a known built-in
#   warn             — report unknown references, continue
#   off              — skip reference checks
#   live             — also accept any reference already on the realm (ipa *-find queries; not under --check)
freeipa_server_idam_reference_validation: strict
# Built-ins that always exist → always-valid reference targets (so a scoped slice needn't declare them):
freeipa_server_idam_builtin_groups: ["admins", "editors", "ipausers", "trust admins"]
freeipa_server_idam_builtin_hostgroups: ["ipaservers"]   # for hbac/sudo/nested/automember hostgroup: refs

# ── Account types beyond human users ────────────────────────────────────────
# SERVICE ACCOUNTS — non-human, no interactive login. Same item shape as a user, but the role forces
# shell = nologin. Kept a SEPARATE list (not in freeipa_idam_users) so intent is explicit; otherwise
# flows through the same create/group/marker/archive pipeline.
freeipa_idam_service_accounts: []
freeipa_idam_nologin_shell: "/sbin/nologin"

# BREAK-GLASS — real named emergency accounts (NOT built-in admin). Login STAYS enabled (the point);
# each is auto-added to breakglass_group and auto-PROTECTED from delete/archive. Pair with
# nologin/disabled controls below: day-to-day admin via named accounts, emergency via these.
freeipa_idam_breakglass_accounts: []
#  - { name: bg-breakglass, givenname: Break, sn: Glass, groups: [admins] }
freeipa_idam_breakglass_group: "admins"

# ── Account login / enabled state for EXISTING accounts (default empty → no change) ──
#   nologin_accounts  — force to the nologin shell. Login OFF, account stays ACTIVE (API/kinit still
#                       work — e.g. admin keeps its powers, just no shell). Shell = nologin_shell.
#   disabled_accounts — `ipa user-disable`. Account fully OFF, cannot authenticate at all.
#                       ('admin' is refused — you'd lose API admin.)
# Lockout guard: setting 'admin' to nologin requires at least one break-glass account.
freeipa_idam_nologin_accounts: []
freeipa_idam_disabled_accounts: []

# Reactivate (undel) a DECLARED user that exists only as a PRESERVED/archived entry, so re-adding a
# removed user RESTORES them instead of failing (preserved name is in cn=deleted → create no-ops and
# membership add would fail "no such entry"). Bounded to declared names; default on.
freeipa_idam_reactivate_preserved: true

# Existing HBAC rules to DISABLE (state: disabled — reversible, not deleted), e.g. the stock
# allow-all rules: [allow_all, allow_all_hosts]. Applied AFTER declarative rules so required access
# exists first. Lockout guard: refuses if freeipa_idam_hbac_rules is empty. To EMPTY a rule's members
# instead, declare it with `user: []` (members reconcile declaratively).
freeipa_idam_hbac_rules_disable: []

# ── Config export / snapshot (opt-in; tags: export) ─────────────────────────
# Snapshot a LIVE FreeIPA into this role's declarative contract (read-only) to adopt an existing
# instance. Output path on the control node (move into inventory group_vars to apply).
freeipa_server_export_output: "freeipa.config.snapshot.yml"
freeipa_server_export_include_host_membership: false  # pin static hostgroup rosters (default: enrol/automember own them)
freeipa_server_export_include_sshkeys: false          # emit per-user SSH public keys
# Group gidnumber capture — default OFF (portable snapshots; IPA re-assigns GIDs on
# rebuild). Set true to pin GIDs for a same-realm DR rebuild where /etc/group + NSS
# consistency across hosts matters.
freeipa_server_export_include_gids: false
# Also export the STOCK HBAC service groups (Sudo, ftp) — normally skipped since they
# ship on every fresh server; enable to capture a realm that customised their members.
freeipa_server_export_stock_hbacsvcgroups: false
# List rendering in the snapshot (cosmetic — all reload identically): block | json | yaml_flow.
# json/yaml_flow keep one item per line so groups/memberships scan easily.
freeipa_server_export_list_style: yaml_flow
# Export scope filter — carve a monolithic realm into per-tenant/env slices. Matches objects by NAME
# substring (DNS by zone_name): include (default) keeps names containing any scope; exclude keeps
# names containing none (the global outliers). Empty = no filter (full snapshot). Server identity
# (realm/domain/fqdn/forwarders) is omitted from a scoped slice. Scope is a list of substrings:
#   per tenant/env :  -e '{"freeipa_server_export_scope":["acme-prod-"]}'
#   outliers/global:  -e '{"freeipa_server_export_scope":["acme-prod-"],"freeipa_server_export_scope_mode":"exclude"}'
freeipa_server_export_scope: []
freeipa_server_export_scope_mode: include
# Stock HBAC services that ship with FreeIPA — skipped by the export (only CUSTOM services captured).
# APPEND here if a newer FreeIPA ships more stock services, so they aren't mis-captured as custom.
freeipa_server_export_hbacsvc_stock:
  - crond
  - ftp
  - gdm
  - gdm-password
  - gssftp
  - kdm
  - login
  - proftpd
  - pure-ftpd
  - sshd
  - su
  - su-l
  - sudo
  - sudo-i
  - systemd-user
  - vsftpd

# ── IPA-to-IPA realm migration (opt-in; via playbooks/L2_identity/freeipa_migrate.yml) ──
# Runs ipa-migrate on this (new-realm) primary, pulling identities from a source (old) realm.
# Passwords are NOT migrated (Kerberos keys are realm-salted).
freeipa_migrate_dryrun: true                    # SAFE default — set false to actually write
freeipa_migrate_mode: "prod-mode"               # prod-mode (preserve SIDs/DNA) | stage-mode
freeipa_migrate_bind_dn: "cn=Directory Manager"
freeipa_migrate_bind_pw: ""                     # declared var first, else Vault fallback
freeipa_migrate_bind_pw_field: "dm_password"
freeipa_migrate_source_ca_path: "/etc/ipa/ca.crt"   # CA cert path on the source host
freeipa_migrate_log: "/var/log/ipa-migrate.log"
freeipa_migrate_restart_sssd: true
freeipa_migrate_disable_mode_after: false       # keep migration mode ON for the password campaign
# ENV-SPECIFIC — set in inventory (see group_vars/idm.yml):
# freeipa_migrate_source: "ipa-source-01.example.com"  # source IPA FQDN (ipa-migrate arg)
# freeipa_migrate_source_host: "ipa-source-01"         # inventory host for CA slurp
# freeipa_migrate_bind_pw_vault: "kv-<env>/data/platform/freeipa/runtime"  # source DM pw path
# Internal staged paths (behavioural):
freeipa_migrate_ca_dest: "/root/.freeipa-migrate-src-ca.crt"
freeipa_migrate_bind_pw_file: "/root/.freeipa-migrate-bind-pw"
freeipa_migrate_ccache: "FILE:/root/.freeipa-migrate-ccache"

# ── Cold-start resilience tuning (behavioural — sensible defaults) ───────────
# Master toggle for the whole resilience phase (recovery timer, ccache cleanup,
# SSSD self-heal). Recommended on; disable wholesale if you manage these yourself.
freeipa_server_resilience_enabled: true
freeipa_server_dirsrv_timeout_sec: 600
freeipa_server_recovery_initial_delay: 6min
freeipa_server_recovery_periodic_interval: 10min
freeipa_server_recovery_max_retries: 1
freeipa_server_recovery_retry_delay_seconds: 30
freeipa_server_recovery_ipactl_timeout_sec: 90
freeipa_server_recovery_ldap_wait_attempts: 30
freeipa_server_recovery_service_timeout: 1800
freeipa_server_recovery_restart_sec: 2min
freeipa_server_recovery_start_limit_interval: 30min
freeipa_server_recovery_start_limit_burst: 10
freeipa_server_recovery_chrony_max_correction: "0.5"

# ── HTTPD ccache cleanup (behavioural — sensible defaults) ──────────────────
freeipa_server_ccache_max_age: "4h"
freeipa_server_tmpfiles_clean_interval: "1h"

# ── SSSD identity-resolution self-heal (resilience.yml) ──────────────────────
# Watchdog: expires the SSSD cache + restarts sssd if identity resolution is wedged (which sshd/sudo/
# login block on, and which a reboot does NOT clear — the cache is persistent on disk). Acts only
# after N consecutive failed checks and at most once per min_interval seconds.
freeipa_server_sssd_selfheal: true
freeipa_server_sssd_selfheal_canary: "admin"          # IPA user that must always resolve via SSSD
freeipa_server_sssd_selfheal_strikes: 2               # consecutive failed checks before acting
freeipa_server_sssd_selfheal_interval: "5min"         # how often the timer probes
freeipa_server_sssd_selfheal_boot_delay: "3min"       # first probe after boot
freeipa_server_sssd_selfheal_min_interval: 900        # min seconds between restarts (anti-storm)
freeipa_server_sssd_selfheal_start_limit_interval: "30min"
freeipa_server_sssd_selfheal_start_limit_burst: 5
