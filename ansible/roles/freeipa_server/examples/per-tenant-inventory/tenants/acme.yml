---
# acme — a tenant written as LITERAL data: exactly what `--tags export` drops out of a live
# realm (same root keys, same entry fields), so adopting an export is just adding the
# `tenant:` header. A user is declared ONCE with their COMPLETE group list — tenant groups +
# any built-in/global groups (which are owned in global.yml). One run sees both files and
# reconciles the membership.
tenant: acme
env_local: dev
freeipa_idam_usergroups:
  - { name: acme-admins, description: Acme admins }
  - { name: acme-editors, description: Acme editors }
  - { name: acme-viewers, description: Acme read-only }
  # granular ug-* policy groups — HBAC/sudo target these; the RBAC overlay below nests
  # role groups INTO them (policy groups must exist natively, so they live right here)
  - { name: ug-acme-dev-docker-operators, description: 'Operators on Docker hosts [acme/dev]' }
  - { name: ug-acme-dev-artifactory-readers, description: 'Readers on Artifactory [acme/dev]' }
  - { name: ug-acme-test-grafana-readers, description: 'Readers on Grafana [acme/test]' }
freeipa_idam_hostgroups:
  - { name: hg-acme, description: Acme hosts }
freeipa_idam_users:
  - { name: acme.dave, givenname: Dave, sn: Dunn, email: [acme.dave@example.com], groups: [acme-admins, admins] }   # also a built-in admin
  - { name: acme.erin, givenname: Erin, sn: Ellis, email: [acme.erin@example.com], groups: [acme-viewers] }
freeipa_idam_hbac_rules:
  - { name: hbac-acme-ssh, usergroup: [acme-admins], hostgroup: [hg-acme], service: [sshd] }
  - { name: hbac-acme-docker, usergroup: [ug-acme-dev-docker-operators], hostgroup: [hg-acme], service: [sshd] }

# This tenant's OWN slice of the RBAC overlay. Every tenants/*.yml may carry one;
# the loader CONCATENATES freeipa_server_rbac_roles across all tenant files and the
# role compiles the merged list AFTER the tenant load — see the globex.yml slice for
# the other half of the realm-wide merge.
freeipa_server_rbac_roles:
  - name: role-acme-dev-platform-admin       # the role group, created exactly as declared
    description: "acme/dev platform admins"
    policy_groups:                           # EXISTING ug-* groups from this file, verbatim
      - ug-acme-dev-docker-operators
      - ug-acme-dev-artifactory-readers
    members: [acme.erin, acme.dave]          # granted users → indirect ug-* members
  - name: role-acme-test-observer
    policy_groups: [ug-acme-test-grafana-readers]
    # members resolve against the realm-wide MERGED user list — ops.editor is declared
    # in global.yml (shared slice), not in this file
    members: [acme.dave, ops.editor]
