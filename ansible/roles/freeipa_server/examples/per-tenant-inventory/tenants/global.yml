---
# global — the shared / realm-wide slice: built-in groups ANY tenant may reference, the
# platform-ops users, custom HBAC services, and the realm-stock HBAC rules. `shared: true`
# (optional; default false) stamps this slice's groups as realm-shared rather than
# tenant-owned — ownership bookkeeping for reporting/scoping, nothing is blocked today.
#
# TEMPLATE: every object root key `--tags export` emits is listed below, IN EXPORT ORDER,
# as an empty placeholder where this example has no data — after an export you can walk the
# snapshot top-down and copy each list straight over. (The export's header vars — domain/
# realm/forwarders and the export_scope pair — belong in group_vars/all/realm.yml, not in
# a tenant file.) Root keys and entry fields match the export exactly.
tenant: global
shared: true

# ── Authored keys (not exported) ──────────────────────────────────────────────
# The RBAC overlay is authored by hand (see acme.yml / globex.yml slices).
freeipa_server_rbac_roles: []

# BREAK-GLASS: a named emergency admin. Login stays ENABLED; auto-added to
# freeipa_iam_breakglass_group (default: admins) and auto-protected from
# delete/archive. Sequence: 1) apply, then VERIFY — `kinit bg-emergency` (the
# create-time password must be changed on first use; do it now, not mid-incident);
# 2) only then enable the admin lockdown below.
freeipa_iam_breakglass_accounts:
  - { name: bg-emergency, givenname: Break, sn: Glass, groups: [admins], password: "<set-from-vault>" }

# Keep the break-glass password from silently expiring (bump when <30 days left) —
# an expired break-glass password is the classic emergency-day failure.
freeipa_iam_password_expiration_floors:
  - { user: bg-emergency, min_days_remaining: 30, bump_to_days: 180 }

# Admin lockdown — shell login off, account stays ACTIVE (API/kinit/Web UI still
# work). The role REFUSES this until a break-glass account is declared, and always
# refuses fully DISABLING admin (it would kill API admin). Enable after step 1 above.
# freeipa_iam_nologin_accounts: [admin]

freeipa_iam_usergroups:
  - { name: admins, description: Account administrators }
  - { name: editors, description: Editors }
  - { name: ipausers, description: Default user group }

freeipa_iam_users:
  - { name: ops.root, givenname: Ops, sn: Root, email: [ops.root@example.com], groups: [admins] }
  - { name: ops.editor, givenname: Ops, sn: Editor, email: [ops.editor@example.com], groups: [editors] }

# Non-human accounts — shell is FORCED to nologin (API/kinit still work: exactly what
# an automation bind account needs). svc-* names are shielded from --tags
# prune_preserved by default. To retire the built-in admin from automation entirely,
# point freeipa_server_admin_principal: svc-freeipa-automation (+ its password /
# Vault field) once this account exists and holds admins.
freeipa_iam_service_accounts:
  - { name: svc-freeipa-automation, givenname: FreeIPA, sn: Automation, groups: [admins], password: "<set-from-vault>" }

freeipa_iam_hostgroups: []

freeipa_iam_iparoles: []

freeipa_iam_privileges: []

freeipa_iam_permissions: []

# Custom HBAC services (stock sshd/sudo/… ship with FreeIPA and are never declared).
# Declared realm-wide here so every tenant's rules can reference them.
freeipa_iam_hbacsvcs:
  - { name: cockpit, description: Cockpit web console }
  - { name: docker, description: Docker daemon access }
  - { name: xrdp-sesman, description: xrdp session manager }

freeipa_iam_hbacsvcgroups: []

# Realm-stock rules — owned realm-wide, not by any tenant.
freeipa_iam_hbac_rules:
  - { name: allow_all, description: Allow all users to access any host from any host, usercategory: all, hostcategory: all, servicecategory: all, state: disabled }
  - { name: allow_systemd-user, description: Allow pam_systemd to run user@.service to create a system user session, usercategory: all, hostcategory: all, service: [systemd-user] }

freeipa_iam_sudo_commands: []

freeipa_iam_sudocmdgroups: []

freeipa_iam_sudo_rules: []

freeipa_iam_pwpolicies: []

# DNS minimal form — the reverse path is DERIVED, never hand-written: reverse zones by
# name_from_ip (IPA computes in-addr.arpa), PTRs by create_reverse: true on the A record
# (ADD-TIME only — never retro-created for existing records), and DDNS hosts get PTRs
# synced by dynamic_update + allow_sync_ptr with nothing declared. When copying an
# export in: DROP the realm zone's installer-owned plumbing (SRV / _kerberos TXT /
# ipa-ca / the servers' own A records) and replace raw PTRs with create_reverse.
freeipa_server_dns_zones: []
#  - { name: "apps.example.com", dynamic_update: true, allow_sync_ptr: true }
#  - { name_from_ip: "10.0.0.0/24", allow_sync_ptr: true }   # reverse — name derived

freeipa_server_dns_forward_zones: []
#  - { name: "corp.example.com", forwarders: ["10.0.0.53"], forwardpolicy: "first" }

freeipa_server_dns_records: []
#  - { zone_name: "apps.example.com", name: "app1", record_type: "A", record_value: "10.0.0.20", create_reverse: true }

freeipa_server_automember_rules: []
