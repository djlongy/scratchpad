---
# global — the shared / built-in groups ANY tenant may reference, plus the platform-ops
# users. `shared: true` marks this slice's groups as grantable from any tenant (under the
# opt-in tenant boundary, only these and a tenant's OWN groups are grantable without a
# boundary failure). Built-ins are declared here ONCE; tenants just reference them.
tenant: global
shared: true
groups:
  - { name: admins, description: "Account administrators" }
  - { name: editors, description: "Editors" }
  - { name: ipausers, description: "Default user group" }
  - { name: trust admins, description: "Trust administrators" }
users:
  - { name: ops.root, first: Ops, last: Root, groups: [admins] }
  - { name: ops.editor, first: Ops, last: Editor, groups: [editors] }
