---
# global — the shared / realm-wide slice: built-in groups ANY tenant may reference, the
# platform-ops users, custom HBAC services, and the realm-stock HBAC rules. `shared: true`
# marks this slice's groups as grantable from any tenant.
#
# TEMPLATE: every object root key `--tags export` emits is listed below, IN EXPORT ORDER,
# as an empty placeholder where this example has no data — after an export you can walk the
# snapshot top-down and copy each list straight over. (The export's header vars — domain/
# realm/forwarders and the export_scope pair — belong in group_vars/all/realm.yml, not in
# a tenant file.) Root keys and entry fields match the export exactly.
tenant: global
shared: true

# Not exported — the RBAC overlay is authored by hand (see acme.yml / globex.yml slices).
freeipa_server_rbac_roles: []

freeipa_idam_usergroups:
  - { name: admins, description: Account administrators }
  - { name: editors, description: Editors }
  - { name: ipausers, description: Default user group }

freeipa_idam_users:
  - { name: ops.root, givenname: Ops, sn: Root, email: [ops.root@example.com], groups: [admins] }
  - { name: ops.editor, givenname: Ops, sn: Editor, email: [ops.editor@example.com], groups: [editors] }

freeipa_idam_service_accounts: []

freeipa_idam_hostgroups: []

freeipa_idam_iparoles: []

freeipa_idam_privileges: []

freeipa_idam_permissions: []

# Custom HBAC services (stock sshd/sudo/… ship with FreeIPA and are never declared).
# Declared realm-wide here so every tenant's rules can reference them.
freeipa_idam_hbacsvcs:
  - { name: cockpit, description: Cockpit web console }
  - { name: docker, description: Docker daemon access }
  - { name: xrdp-sesman, description: xrdp session manager }

freeipa_idam_hbacsvcgroups: []

# Realm-stock rules — owned realm-wide, not by any tenant.
freeipa_idam_hbac_rules:
  - { name: allow_all, description: Allow all users to access any host from any host, usercategory: all, hostcategory: all, servicecategory: all, state: disabled }
  - { name: allow_systemd-user, description: Allow pam_systemd to run user@.service to create a system user session, usercategory: all, hostcategory: all, service: [systemd-user] }

freeipa_idam_sudo_commands: []

freeipa_idam_sudocmdgroups: []

freeipa_idam_sudo_rules: []

freeipa_idam_pwpolicies: []

freeipa_server_dns_zones: []

freeipa_server_dns_forward_zones: []

freeipa_server_dns_records: []

freeipa_server_automember_rules: []
