---
# ═════════════════════════════════════════════════════════════════════════════
# THE THIN RBAC OVERLAY — assign users to an abstract ROLE instead of hand-adding
# them to many policy groups. The role's compile step (filter_plugins/freeipa_rbac.py)
# turns each entry into: the role group itself, its NESTING into the EXISTING ug-*
# policy groups from 00_native.yml, and user→role-group membership (from members:).
# It generates NOTHING else.
#
# WYSIWYG: one flat list, same visual shape as freeipa_iam_usergroups. Every name is
# used VERBATIM — no naming templates. Paste policy group names straight from the
# --tags export snapshot / 00_native.yml, zero renaming. Scope (tenant/environment)
# lives in the names you declare — role-<tenant>-<env>-<name> is the recommended
# convention, and because every role is its own literal name, a grant can never
# bleed into another tenant or environment.
#
# Granting a role = adding the user to that entry's members: — a one-line diff.
# The user's own groups: list in 00_native.yml is never touched.
# ═════════════════════════════════════════════════════════════════════════════
freeipa_server_rbac_roles:
  - name: role-acme-prod-platform-admin
    description: "Platform admin (acme/prod)"
    member_of: [ug-acme-prod-gitlab-admins]
    members: [alice.smith]
    # OPTIONAL role-scoped HBAC rules: the rule NAME is declared explicitly (WYSIWYG);
    # the compiler injects usergroup: [<this role group>] — everything else verbatim.
    hbac_rules:
      - { name: hbac-acme-prod-platform-ssh, description: "Platform admins ssh", hostgroup: [hg-acme-prod], service: [sshd] }
  - name: role-globex-prod-viewer
    description: "Grafana viewer (globex/prod)"
    member_of: [ug-globex-prod-grafana-readers]
    members: [bob.ng, carol.fox]
  - name: role-initech-prod-db-admin           # defined, nobody granted yet — a valid entry;
    description: "DB admin (initech/prod)"     # granting later is a one-line members: diff
    member_of: [ug-initech-prod-postgres-admins]
