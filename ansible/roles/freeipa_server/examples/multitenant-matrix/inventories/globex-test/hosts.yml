---
# The shared FreeIPA realm — IDENTICAL across all inventories (one realm, many
# tenants/environments). Point ansible_host at your realm to run it.
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ansible
  children:
    freeipa:
      hosts:
        idm01:
          ansible_host: 10.0.0.11
    freeipa_primary:
      hosts:
        idm01:
