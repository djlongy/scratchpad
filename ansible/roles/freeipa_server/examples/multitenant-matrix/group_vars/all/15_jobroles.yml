---
# ═════════════════════════════════════════════════════════════════════════════
# JOB ROLES — a named superset of grants. Assign by NAME in the roster
# (`jobroles: [sysadmin]`) instead of re-listing apps per person.
#
# Three ways to define what a jobrole grants — prefer the REFERENCE forms (apps:,
# includes:) so you spell privileges/jobroles ONCE, in their source dict, and let
# them resolve at load time:
#
#   grants:   [{app, privilege}]   explicit pairs. Freehand, but VALIDATED against
#                                   freeipa_access — a typo stops the run.
#   apps:     [postgres, web]       → ALL privileges of each app, read live from the
#                                     catalog (freeipa_access). Add a privilege to the
#                                     catalog and every "apps:" jobrole picks it up. No
#                                     privilege names typed here at all.
#   includes: [appdev]              → inherit another jobrole's grants by reference
#                                     (one level). Compose; never copy-paste grants.
#
# All three UNION. Resolution is auto-intersecting: a jobrole is the SUPERSET it would
# grant where every app exists; assigned in a tenancy missing an app, those pairs just
# drop. So the SAME sysadmin lands linux+docker+postgres in acme, linux+docker in globex.
# ═════════════════════════════════════════════════════════════════════════════
freeipa_jobroles:
  sysadmin:                          # full-estate admin — explicit pairs
    grants:
      - { app: linux,    privilege: sysadmin }
      - { app: docker,   privilege: admin }
      - { app: postgres, privilege: dba }

  dba:                               # REFERENCE: every privilege the catalog gives postgres
    apps: [postgres]                 #   (today: dba + readonly — no privilege typed here)

  appdev:                            # application developer — explicit pairs
    grants:
      - { app: docker, privilege: readonly }
      - { app: web,    privilege: admin }

  auditor:                           # read-only across the stack
    grants:
      - { app: docker,   privilege: readonly }
      - { app: postgres, privilege: readonly }

  lead:                              # REFERENCE: appdev's grants + dba's (postgres) + extra
    includes: [appdev, dba]          #   inherits by name; no grant is copied
    grants:
      - { app: web, privilege: admin }
