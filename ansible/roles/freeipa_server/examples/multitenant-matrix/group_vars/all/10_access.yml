---
# ═════════════════════════════════════════════════════════════════════════════
# THE ACCESS CATALOG — what each (app, privilege) can DO. Defined ONCE, shared by
# every tenancy, so you never repeat sshd/sudo lines per tenant.
#   login    : HBAC services this privilege may authenticate with
#   sudo     : exact sudo commands it may run         (creates ipasudocmd objects)
#   sudo_all : true  → full sudo (cmdcategory all)    (instead of `sudo`)
# A privilege named in the matrix MUST appear here (20_generate fails loudly if not).
# ═════════════════════════════════════════════════════════════════════════════
freeipa_access:
  docker:
    admin: { login: [sshd], sudo: ["/usr/bin/docker", "/usr/bin/systemctl restart docker"] }
    readonly: { login: [sshd], sudo: ["/usr/bin/docker ps", "/usr/bin/docker logs"] }
  postgres:
    dba: { login: [sshd], sudo: ["/usr/bin/systemctl restart postgresql", "/usr/bin/su - postgres"] }
    readonly: { login: [sshd], sudo: ["/usr/bin/systemctl status postgresql"] }
  web:
    admin: { login: [sshd], sudo: ["/usr/bin/systemctl restart nginx", "/usr/sbin/nginx -t"] }
  linux:
    sysadmin: { login: [sshd, cockpit], sudo_all: true }

# Stock HBAC services that ship with every FreeIPA — NOT re-created as custom
# (20_generate filters login services against this). `cockpit` is deliberately NOT
# here, so it IS created as a custom service. Self-contained on purpose.
freeipa_stock_hbacsvcs:
  - sshd
  - sudo
  - sudo-i
  - su
  - su-l
  - login
  - crond
  - ftp
  - gdm
  - gdm-password
