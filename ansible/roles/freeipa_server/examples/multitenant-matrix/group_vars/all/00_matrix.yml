---
# ═════════════════════════════════════════════════════════════════════════════
# THE MATRIX — your single source of truth. Hand-authored, flat, obvious.
# Everything else is derived from this by 20_generate.yml (which you can read).
# ═════════════════════════════════════════════════════════════════════════════

# ── Name prefixes (CONFIGURABLE; "" = no prefix, still WYSIWYG) ──────────────
# Object names are: <prefix><tenancy>-<environment>-<app>[-<privilege>]
# Set freeipa_role_prefix: "" and your role groups become tenancy-env-app-privilege.
freeipa_role_prefix: "role-"
freeipa_hostgroup_prefix: "hosts-"
freeipa_hbac_prefix: "hbac-"
freeipa_sudo_prefix: "sudo-"

# ── The matrix: tenancy → { environments, apps: app → [privilege levels] } ───
# Each tenancy declares its OWN environments — they need NOT match (acme runs
# dev/qa/stg/prod, globex dev/test/prod, initech just dev). Apps also differ per
# tenancy. Define once; the cross-product (tenancy's envs × its apps × privileges)
# is DERIVED — never copy-pasted. Add a tenancy/env/app/privilege here and all its
# groups/hostgroups/HBAC/sudo appear automatically.
freeipa_matrix:
  acme:
    environments: [dev, qa, stg, prod]
    apps:
      docker: [admin, readonly]
      postgres: [dba]
      web: [admin]
  globex:
    environments: [dev, test, prod]
    apps:
      docker: [admin]
      linux: [sysadmin]
  initech:
    environments: [dev]
    apps:
      web: [admin]
      linux: [sysadmin]
      postgres: [dba, readonly]

# ── Optional SCOPE — shrink a run's blast radius (unset = the whole matrix) ──
# Set it PER INVENTORY only (inventories/<tenancy>-<env>/group_vars/all/scope.yml) so
# a run touches only that tenancy+environment's groups. It is deliberately NOT given a
# default here: playbook group_vars/all outranks inventory group_vars, so a default in
# this file would clobber the inventory's scope. 20_generate.yml reads it with
# `| default('')`, so leaving it unset simply means "the whole matrix".
