---
# site.yml — apply ONE tenancy in ONE environment (derived from the matrix), or
# clean up a mock run with --tags prune.
#
#   ansible-playbook -i inventories/acme-dev  site.yml --tags idam     # create
#   ansible-playbook -i inventories/acme-qa   site.yml --tags idam
#   ansible-playbook -i inventories/acme-dev  site.yml --tags prune    # HARD-DELETE (mock only)
#   …  add --check --diff to preview
#
# Each inventory's scope.yml narrows the shared matrix to one tenancy + one of ITS
# environments (environments differ per tenancy — see 00_matrix.yml). The tenancy's
# people come from tenancy_rosters/<tenancy>.yml. Uses include_role tasks_from so
# ONLY idam/prune run — never the whole server role.
- name: FreeIPA multi-tenant RBAC from a matrix
  hosts: freeipa
  gather_facts: false
  become: true
  vars_files:
    - "tenancy_rosters/{{ freeipa_scope_tenancy }}.yml"
  tasks:
    - name: Sanity — scope set, valid for the tenancy, and matrix consistent with access
      ansible.builtin.assert:
        that:
          - freeipa_scope_tenancy | default('') | length > 0
          - freeipa_scope_environment | default('') | length > 0
          - freeipa_matrix_problems | length == 0
        fail_msg: >-
          {{ 'Point -i at a scoped inventory, e.g. -i inventories/acme-dev.'
             if (freeipa_scope_tenancy | default('') | length == 0)
             else (freeipa_matrix_problems | join('; ')) }}
        success_msg: >-
          {{ freeipa_scope_tenancy }}/{{ freeipa_scope_environment }} →
          {{ freeipa_idam_usergroups | length }} groups, {{ freeipa_idam_users | length }} users,
          marker {{ freeipa_idam_managed_group }}.

    - name: Apply the derived baseline IDAM (create)
      ansible.builtin.include_role:
        name: freeipa_server
        tasks_from: idam.yml
        apply: { tags: [idam] }
      tags: [idam]

    # HARD-DELETE everything this scope declared — for MOCK realms only. Double-gated:
    # needs --tags prune AND freeipa_idam_prune: true (set it in the inventory's
    # scope.yml only on a throwaway realm). Never deletes protected users/groups.
    - name: Prune (HARD-DELETE) — mock cleanup only
      ansible.builtin.include_role:
        name: freeipa_server
        tasks_from: prune.yml
        apply: { tags: [never, prune] }
      when: freeipa_idam_prune | default(false) | bool
      tags: [never, prune]
