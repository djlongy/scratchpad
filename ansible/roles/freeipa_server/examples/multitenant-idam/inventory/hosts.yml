---
# Example identity inventory for ONE environment. dev/test are sibling inventories
# that reuse the SAME tenant_*.yml files; only `env` (group_vars/all/00_naming.yml)
# differs — that is environment scaling without duplicating tenant data.
#
# There is ONE FreeIPA host. All tenant data is composed onto it via group_vars/all/
# (see 10_aggregate.yml), so the role's prune step sees the UNION of all tenants in
# one pass — the correct, safe shape. Do NOT run per-tenant with --limit: the single
# marker group would treat the other tenants' users as "removed".
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ansible
  children:
    freeipa:                       # the role targets this group
      hosts:
        idm01:                     # inventory_hostname → host FQDN idm01.example.com
          ansible_host: 10.0.0.11
    # freeipa_primary / freeipa_replica are optional sub-groups the role honours to
    # grow a cluster. Single host here ⇒ it is the primary; the replica path never
    # dispatches.
    freeipa_primary:
      hosts:
        idm01:
