---
# 10_aggregate.yml — composes every tenant_*_spec into the role's flat IDAM lists.
#
# THIS is what makes multi-inventory multitenancy work. Each tenant file sets a
# `tenant_<code>_spec` dict (data only). Ansible would NOT merge three separate
# `freeipa_idam_users` definitions — highest precedence simply wins, the rest are
# silently lost — so every tenant uses a DISTINCT var name, and here we discover
# them all with the `varnames` lookup and render the convention over them.
#
# Drop a new tenant_<code>.yml into group_vars/all/ → it is picked up
# automatically. No edits here, ever. That is the scalability property.
#
# The freeipa_server role consumes freeipa_idam_groups / _roles / _users /
# _hostgroups unchanged — so NO role change is required for this pattern.
#
# Three layers, smallest grain up:
#   groups  = atomic permissions   <tenant>-<app>-<tier>      (tenant × app × tier)
#   roles   = personas bundling groups   <tenant>-<persona>   (a role = many groups)
#   users   = people assigned roles (and/or direct groups)

# ── tenant SELECTOR — the speed lever for routine changes ───────────────────
# By default a run composes EVERY tenant (the full, slow reconcile). Pass
# idam_tenants to scope the run to one (or a few) teams so the role only iterates
# those items — "someone joined team A" goes from minutes to seconds, and the
# other tenants are never composed, queried, or pruned:
#
#   ansible-playbook ... site.yml --tags idam -e '{"idam_tenants":["acme"]}'
#
# A bare string is accepted too (-e idam_tenants=acme). Empty = all tenants.
idam_tenants: []
_idam_tenant_filter: "{{ [idam_tenants] if (idam_tenants is string and idam_tenants) else idam_tenants }}"

# All tenant specs, sorted for deterministic output, then narrowed by the selector.
_all_tenant_specs: >-
  {{ q('varnames', '^tenant_[a-z0-9]+_spec$') | sort
     | map('extract', vars) | list }}
_tenant_specs: >-
  {{ _all_tenant_specs if (_idam_tenant_filter | length == 0)
     else (_all_tenant_specs | selectattr('code', 'in', _idam_tenant_filter) | list) }}

# ── per-tenant marker group — makes the prune SAFE when scoping to one team ──
# The role reconciles ONE marker group (freeipa_idam_managed_group): it deletes
# managed users not in the desired list. With a single global marker, running
# only team A would treat every OTHER team's users as "removed" and delete them.
# Deriving the marker per selected tenant isolates the prune: an acme run only
# reconciles idam-managed-acme; globex's marker is never read or touched.
# (For a full run over all tenants, see README — loop the role per tenant so each
#  gets its own marker; a single run cannot carry multiple markers.)
freeipa_idam_managed_group: >-
  {{ ('idam-managed-' ~ _tenant_specs[0].code)
     if (_tenant_specs | length == 1) else 'idam-managed-users' }}

# ── LAYER 1 — groups: every tenant × app × tier ─────────────────────────────
# Flow-style YAML per line keeps from_yaml robust regardless of loop indentation.
freeipa_idam_groups: "{{ _idam_groups_yaml | from_yaml }}"
_idam_groups_yaml: |-
  {% for t in _tenant_specs %}
  {% for app in t.apps %}
  {% for tier in (t.tiers | default(identity_access_tiers)) %}
  - {name: "{{ t.code }}-{{ app }}-{{ tier }}", description: "{{ t.code }} {{ app }} {{ tier }} (managed)"}
  {% endfor %}{% endfor %}{% endfor %}

# ── LAYER 2 — roles: a persona that bundles several (app,tier) groups ────────
# Each tenant role becomes "role-<code>-<persona>" whose groups are the rendered
# grants. The `role-` prefix is a TYPE MARKER: the first token says "this is a
# role", so roles are visually distinct from plain permission groups in any list.
# Users reference these instead of long flat group lists; the role expands them.
freeipa_idam_roles: "{{ _idam_roles_yaml | from_yaml }}"
_idam_roles_yaml: |-
  {% for t in _tenant_specs %}
  {% for r in (t.roles | default([])) %}
  - {name: "role-{{ t.code }}-{{ r.name }}", groups: [{% for g in r.grants %}"{{ t.code }}-{{ g.app }}-{{ g.tier }}"{% if not loop.last %}, {% endif %}{% endfor %}]}
  {% endfor %}{% endfor %}

# ── hostgroups: every tenant × app ──────────────────────────────────────────
freeipa_idam_hostgroups: "{{ _idam_hostgroups_yaml | from_yaml }}"
_idam_hostgroups_yaml: |-
  {% for t in _tenant_specs %}
  {% for app in t.apps %}
  - {name: "{{ t.code }}-{{ app }}", description: "{{ t.code }} {{ app }} hosts"}
  {% endfor %}{% endfor %}

# ── LAYER 3 — users: assigned ROLES and/or direct GROUPS ────────────────────
# A member lists `roles: [persona, ...]` (preferred) and/or a direct group via
# {app|apps, tier}. Names are generated, never hand-typed. The role requires each
# user resolve to >=1 group (via roles or groups), so a roles-only user is valid.
freeipa_idam_users: "{{ _idam_users_yaml | from_yaml }}"
_idam_users_yaml: |-
  {% for t in _tenant_specs %}
  {% for m in t.members %}
  - {name: "{{ m.name }}", first: "{{ m.first }}", last: "{{ m.last }}"{% if m.roles is defined %}, roles: [{% for r in m.roles %}"role-{{ t.code }}-{{ r }}"{% if not loop.last %}, {% endif %}{% endfor %}]{% endif %}{% if (m.app is defined) or (m.apps is defined) %}, groups: [{% for a in (m.apps | default([m.app])) %}"{{ t.code }}-{{ a }}-{{ m.tier }}"{% if not loop.last %}, {% endif %}{% endfor %}]{% endif %}}
  {% endfor %}{% endfor %}

# ── safety: detect a tenant file that silently failed to load ───────────────
# Because the role's prune step deletes managed users not in the desired set, a
# tenant whose file is missing/broken would have its users REMOVED. Expose the live
# count + a boolean so the play can assert BEFORE idam runs (see site.yml). Bump
# the expected count whenever you add a tenant file.
#
# NB: this checks _all_tenant_specs (how many LOADED), NOT _tenant_specs (how many
# the selector picked) — so a targeted run (-e idam_tenants=acme) still verifies
# every tenant file parsed before it prunes anything.
identity_expected_tenant_count: 2
identity_tenant_count_ok: "{{ (_all_tenant_specs | length) == identity_expected_tenant_count }}"
