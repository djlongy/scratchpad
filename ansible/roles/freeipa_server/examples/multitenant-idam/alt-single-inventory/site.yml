---
# site.yml — apply the composed multi-tenant IDAM to the realm.
#
#   ansible-playbook -i inventory/hosts.yml site.yml --tags idam
#
# Scope to one team for a fast, isolated change (see README "the selector"):
#   ansible-playbook -i inventory/hosts.yml site.yml --tags idam -e idam_tenants=acme
#
# The assert only catches a mistyped selector (a tenant name that matches no
# tenant_*.yml). Adding a tenant is just dropping a new file — nothing to bump.
- name: FreeIPA multi-tenant IDAM
  hosts: freeipa
  become: true
  tasks:
    - name: Refuse to run if the selector names an unknown tenant
      ansible.builtin.assert:
        that: identity_selector_ok
        fail_msg: >-
          idam_tenants names unknown tenant(s): {{ identity_unknown_tenants }} —
          check the spelling against the tenant_*.yml files
          ({{ identity_known_tenants }}).
        success_msg: >-
          Applying {{ _tenant_specs | map(attribute='code') | list }}
          (of {{ identity_known_tenants }}).

    - name: Apply declarative identity (groups, roles, users, hostgroups)
      ansible.builtin.import_role:
        name: freeipa_server
      # Provide the realm admin/DM passwords via group_vars + HashiCorp Vault
      # (freeipa_server_vault_secret) — see the
      # role README and inventories/example/group_vars/freeipa.yml.
      tags: [idam]
