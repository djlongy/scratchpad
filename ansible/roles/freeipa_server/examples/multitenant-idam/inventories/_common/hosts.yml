---
# _common/hosts.yml — the realm itself + connection details, shared by ALL tenants.
# This is the ONLY place the FreeIPA host is defined. A tenant inventory carries no
# host; you always pass _common plus one (or more) tenant dirs:
#
#   ansible-playbook -i inventories/_common -i inventories/acme site.yml --tags idam
#   ./apply.sh acme            # the same thing, less typing
#
# Ansible natively merges multiple -i sources, so the tenant dir's group_vars apply
# to this host. Pass several tenant dirs to compose a union (audit) run.
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ansible
  children:
    freeipa:                       # the role targets this group
      hosts:
        idm01:                     # inventory_hostname → host FQDN idm01.example.com
          ansible_host: 10.0.0.11
    freeipa_primary:
      hosts:
        idm01:
