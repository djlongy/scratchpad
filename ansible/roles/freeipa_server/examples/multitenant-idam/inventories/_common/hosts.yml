---
# _common/hosts.yml — JUST the realm host + connection details. This is now the
# ONLY thing _common provides: the naming convention + generators moved to the
# playbook's group_vars/all/ (auto-loaded, no -i needed). A host cannot live in
# playbook group_vars, so this minimal inventory must still be passed:
#
#   ansible-playbook -i inventories/_common -i inventories/acme site.yml --tags idam
#   ./apply.sh acme            # the same thing, less typing
#
# Ansible merges multiple -i sources, so the tenant dir's group_vars apply to this
# host and the playbook group_vars generate the IDAM lists. Pass several tenant
# dirs to compose a union (audit) run.
#
# To drop the explicit -i _common, either set `inventory = inventories/_common` in
# ansible.cfg as the default, or duplicate this one host block into each tenant
# inventory (trades one -i for repeating the host — drift risk if the IP changes).
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ansible
  children:
    freeipa:                       # the role targets this group
      hosts:
        idm01:                     # inventory_hostname → host FQDN idm01.example.com
          ansible_host: 10.0.0.11
    freeipa_primary:
      hosts:
        idm01:
