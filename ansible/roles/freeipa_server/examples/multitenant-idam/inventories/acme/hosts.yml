---
# inventories/acme/hosts.yml — the FreeIPA realm THIS inventory applies to.
#
# The host is defined per inventory ON PURPOSE. Each tenancy/environment can point
# at its OWN FreeIPA while reusing the identical naming + generation: a dev/test
# tenancy gets its own server, so you just change ansible_host here (and `env` in
# group_vars) — nothing else. Tenants that SHARE one realm repeat the same host
# block (identical), and a union run merges them harmlessly.
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ansible
  children:
    freeipa:                       # the role targets this group
      hosts:
        idm01:                     # inventory_hostname → host FQDN idm01.example.com
          ansible_host: 10.0.0.11  # ← a dev/test tenancy would point this elsewhere
    freeipa_primary:
      hosts:
        idm01:
