---
# inventories/acme/ — team ACME's inventory (its host in hosts.yml + this data).
# Run it:  ansible-playbook -i inventories/acme site.yml --tags idam
#
# The var is named tenant_acme_spec (not tenant_spec) so a union/audit run can load
# several tenants at once without colliding — see group_vars/all/10_generate.yml.
# access_levels is optional — omit to inherit identity_access_levels (access/priv-access).
tenant_acme_spec:
  code: acme
  services:
    - payments
    - ledger

  # LAYER 2 — personas: a role bundles several (service, level) groups. Name becomes
  # "role-acme-<persona>"; users reference it instead of listing many groups.
  roles:
    - name: lead                 # -> role-acme-lead
      grants:
        - {service: payments, level: priv-access}
        - {service: ledger, level: priv-access}

  # LAYER 3 — members. `name` is the UNIQUE username (explicit, not derived);
  # email is entered explicitly (a human sets it; not built from name). givenname/
  # sn/title are the person's details. Assign roles, and/or a direct group via
  # {service|services, level}.
  members:
    - {name: alice.smith, title: "Payments Lead", givenname: Alice, sn: Smith, email: alice.smith@example.com, roles: [lead]}
    - {name: bob.ng, title: "Ledger Clerk", givenname: Bob, sn: Ng, email: bob.ng@example.com, service: ledger, level: access}
    - {name: carol.jones, title: "Analyst", givenname: Carol, sn: Jones, email: carol.jones@example.com, services: [payments, ledger], level: access}
