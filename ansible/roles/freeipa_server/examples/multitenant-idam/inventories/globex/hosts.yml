---
# inventories/globex/hosts.yml — the FreeIPA realm THIS inventory applies to.
#
# Here GLOBEX shares the same production realm as ACME, so the host block is
# identical (idm01 @ 10.0.0.11). If GLOBEX had its own dev/test FreeIPA instead,
# this is the single line you'd change — same structure, different IP.
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ansible
  children:
    freeipa:
      hosts:
        idm01:
          ansible_host: 10.0.0.11
    freeipa_primary:
      hosts:
        idm01:
