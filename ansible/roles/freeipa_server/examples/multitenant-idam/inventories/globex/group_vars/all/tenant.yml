---
# inventories/globex/ — team GLOBEX's inventory (its host in hosts.yml + this data).
# Run it:  ansible-playbook -i inventories/globex site.yml --tags idam
# GLOBEX has a single service and overrides access_levels to regular `access` only
# (no privileged tier) — a per-tenant override that still flows through the shared
# convention.
tenant_globex_spec:
  code: globex
  services:
    - search
  access_levels: [access]          # regular access only — no priv-access for this tenant

  roles:
    - name: analyst                # -> role-globex-analyst
      grants:
        - {service: search, level: access}

  members:
    - {name: dee.fox, title: "Search Analyst", givenname: Dee, sn: Fox, email: dee.fox@example.com, roles: [analyst]}
    - {name: eli.mak, title: "Search User", givenname: Eli, sn: Mak, email: eli.mak@example.com, service: search, level: access}
