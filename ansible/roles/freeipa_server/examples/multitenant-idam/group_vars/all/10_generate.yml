---
# group_vars/all/10_generate.yml — turns whatever tenant specs are LOADED into the
# role's flat IDAM lists. Lives next to the playbook (always auto-loaded), so it is
# never passed as an inventory and never edited when adding a team.
#
# Selection is by INVENTORY COMPOSITION, not a flag. Each tenant inventory is
# self-contained (its own host + a DISTINCTLY-named tenant_<code>_spec):
#   -i inventories/acme                       → ACME only
#   -i inventories/acme -i inventories/globex → both specs loaded → union (audit)
#
# Convention (env + domain come from the tenant inventory's 00_env.yml):
#   group      <tenant>-<env>-<service>-<level>   acme-prod-payments-access / -priv-access
#   role       role-<tenant>-<persona>            role-acme-lead
#   hostgroup  <tenant>-<env>-<service>           acme-prod-payments
#   user       name = <first>.<last> (lower)      ann.lee   (override with name:)
#              email = <name>@<domain>            ann.lee@example.com

# Every tenant spec currently loaded (one per tenant inventory passed via -i).
_tenant_specs: >-
  {{ q('varnames', '^tenant_[a-z0-9]+_spec$') | sort
     | map('extract', vars) | list }}

# ── per-tenant marker → makes the role's prune SAFE under isolation ─────────
freeipa_idam_managed_group: >-
  {{ ('idam-managed-' ~ _tenant_specs[0].code)
     if (_tenant_specs | length == 1) else 'idam-managed-users' }}

# ── LAYER 1 — groups: every tenant × service × access-level ─────────────────
freeipa_idam_groups: "{{ (_gen_groups | from_yaml) or [] }}"
_gen_groups: |-
  {% for t in _tenant_specs %}
  {% for svc in t.services %}
  {% for lvl in (t.access_levels | default(identity_access_levels)) %}
  - {name: "{{ t.code }}-{{ env }}-{{ svc }}-{{ lvl }}", description: "{{ t.code }} {{ env }} {{ svc }} {{ lvl }} (managed)"}
  {% endfor %}{% endfor %}{% endfor %}

# ── LAYER 2 — roles: a persona bundling several (service, level) groups ──────
freeipa_idam_roles: "{{ (_gen_roles | from_yaml) or [] }}"
_gen_roles: |-
  {% for t in _tenant_specs %}
  {% for r in (t.roles | default([])) %}
  - {name: "role-{{ t.code }}-{{ r.name }}", groups: [{% for g in r.grants %}"{{ t.code }}-{{ env }}-{{ g.service }}-{{ g.level }}"{% if not loop.last %}, {% endif %}{% endfor %}]}
  {% endfor %}{% endfor %}

# ── hostgroups: every tenant × service ──────────────────────────────────────
freeipa_idam_hostgroups: "{{ (_gen_hostgroups | from_yaml) or [] }}"
_gen_hostgroups: |-
  {% for t in _tenant_specs %}
  {% for svc in t.services %}
  - {name: "{{ t.code }}-{{ env }}-{{ svc }}", description: "{{ t.code }} {{ env }} {{ svc }} hosts"}
  {% endfor %}{% endfor %}

# ── LAYER 3 — users: RICH dicts (name, givenname, sn, title, email + roles/groups)
# name      = the UNIQUE username, set explicitly (NOT derived — usernames are not
#             a reliable function of a person's name)
# givenname/sn/title = first name / surname / job title (ipauser accepts givenname &
#             sn as aliases for first/last)
# email     = ["<name>@<domain>"] (a list — ipauser's email is multi-valued; domain
#             from the tenant inventory)
# A member lists `roles: [persona, ...]` and/or a direct group via {service|services,
# level}. Loop freeipa_idam_users and use item.name / item.email / item.title / …
freeipa_idam_users: "{{ (_gen_users | from_yaml) or [] }}"
_gen_users: |-
  {% for t in _tenant_specs %}
  {% for m in t.members %}
  - {name: "{{ m.name }}", givenname: "{{ m.givenname }}", sn: "{{ m.sn }}"{% if m.title is defined %}, title: "{{ m.title }}"{% endif %}, email: ["{{ m.name }}@{{ domain }}"]{% if m.roles is defined %}, roles: [{% for r in m.roles %}"role-{{ t.code }}-{{ r }}"{% if not loop.last %}, {% endif %}{% endfor %}]{% endif %}{% if (m.service is defined) or (m.services is defined) %}, groups: [{% for s in (m.services | default([m.service])) %}"{{ t.code }}-{{ env }}-{{ s }}-{{ m.level }}"{% if not loop.last %}, {% endif %}{% endfor %}]{% endif %}}
  {% endfor %}{% endfor %}

# ── LAYER 4 — HBAC rules: per tenant × service, that service's access groups get
#    SSH to its hostgroup. Prefixed `hbac-`. sshd is a stock realm-global service.
freeipa_idam_hbac_rules: "{{ (_gen_hbac | from_yaml) or [] }}"
_gen_hbac: |-
  {% for t in _tenant_specs %}
  {% for svc in t.services %}
  - {name: "hbac-{{ t.code }}-{{ env }}-{{ svc }}", description: "{{ t.code }} {{ env }} {{ svc }} SSH", group: [{% for lvl in (t.access_levels | default(identity_access_levels)) %}"{{ t.code }}-{{ env }}-{{ svc }}-{{ lvl }}"{% if not loop.last %}, {% endif %}{% endfor %}], hostgroup: ["{{ t.code }}-{{ env }}-{{ svc }}"], hbacsvc: ["sshd"]}
  {% endfor %}{% endfor %}

# ── REFERENCE INDEX — refer to a generated group/role by INTENT, not a literal ─
# Key is env-PORTABLE (<tenant>.<service>.<level>); the value carries the env, so
# the same key yields the env-correct name in dev/test/prod. A typo'd key fails
# fast (undefined) instead of silently building a non-existent group name.
#   freeipa_group_ref['acme.payments.priv-access']  -> "acme-prod-payments-priv-access"
#   freeipa_role_ref['acme.lead']                   -> "role-acme-lead"
freeipa_group_ref: "{{ (_gen_group_ref | from_yaml) or {} }}"
_gen_group_ref: |-
  {% for t in _tenant_specs %}
  {% for svc in t.services %}
  {% for lvl in (t.access_levels | default(identity_access_levels)) %}
  "{{ t.code }}.{{ svc }}.{{ lvl }}": "{{ t.code }}-{{ env }}-{{ svc }}-{{ lvl }}"
  {% endfor %}{% endfor %}{% endfor %}
freeipa_role_ref: "{{ (_gen_role_ref | from_yaml) or {} }}"
_gen_role_ref: |-
  {% for t in _tenant_specs %}
  {% for r in (t.roles | default([])) %}
  "{{ t.code }}.{{ r.name }}": "role-{{ t.code }}-{{ r.name }}"
  {% endfor %}{% endfor %}
freeipa_users_by_tenant: "{{ (_gen_users_by_tenant | from_yaml) or {} }}"
_gen_users_by_tenant: |-
  {% for t in _tenant_specs %}
  "{{ t.code }}": [{% for m in t.members %}"{{ m.name }}"{% if not loop.last %}, {% endif %}{% endfor %}]
  {% endfor %}

# ── FLAT NAME LISTS — loop to act on EVERY object in the LOADED scope ────────
# "Every" = all tenants you passed via -i (one, or several on a union run). There is
# no realm-wide "all" var — a run only sees the inventories you pass. For the whole
# realm regardless of inventory, query FreeIPA (`ipa user-find`).
freeipa_all_group_names: "{{ freeipa_idam_groups | map(attribute='name') | list }}"
freeipa_all_role_names: "{{ freeipa_idam_roles | map(attribute='name') | list }}"
freeipa_all_hostgroup_names: "{{ freeipa_idam_hostgroups | map(attribute='name') | list }}"
freeipa_all_usernames: "{{ freeipa_idam_users | map(attribute='name') | list }}"
