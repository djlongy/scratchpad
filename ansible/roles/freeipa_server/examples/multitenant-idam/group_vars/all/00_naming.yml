---
# group_vars/all/00_naming.yml — shared naming inputs + the documented convention.
#
# This sits next to the PLAYBOOK (site.yml), so Ansible auto-loads it on every run
# WITHOUT it being named as an inventory — group_vars/host_vars adjacent to a
# playbook are always loaded. Tenant inventories carry DATA only.
# In a real repo this lives at playbooks/group_vars/all/ next to the idam playbook.
#
# Only two things here are CONSUMED: `env`/`domain` (read by the freeipa_server role
# for FQDNs/realm) and `identity_access_tiers` (read by 10_generate.yml). The naming
# PATTERNS are documented in the comment block below; the live source of truth that
# actually builds the names is the generator in 10_generate.yml (it has to encode
# both which fields combine AND their format, so the pattern can't be pure data).
#
# ── env / domain scaling ─────────────────────────────────────────────────────
# Each tenant inventory is self-contained, so a dev/test tenancy is just another
# inventory dir pointing its hosts.yml at that environment's FreeIPA IP, with `env`
# set per inventory (group_vars there). The identical convention + generators below
# apply unchanged — only the host IP and env label differ.
#
# These two defaults are shown here for a self-contained example; in practice set
# `env` (and `domain` if it differs) in each tenant inventory's group_vars, not in
# this shared file, so dev/test/prod can diverge.
env: "prod"                       # dev | test | prod  (Ansible reserves `environment`)
domain: "example.com"

# ── Naming patterns (documented convention — generators in 10_generate.yml) ───
#   group       <tenant>-<app>-<tier>              acme-payments-admin
#   role        role-<tenant>-<persona>            role-acme-developer  (bundle of groups)
#   hostgroup   <tenant>-<app>                      acme-payments
#   host FQDN   <env>-<tenant>-<app>-<NN>.<domain>  prod-acme-payments-01.example.com
#   service URL <app>.<tenant>.<env>.<domain>       payments.acme.prod.example.com
#
# Type marker: roles are prefixed `role-` so the FIRST token tells you the kind —
# scan any list and `role-*` = a role, everything else = a plain permission group,
# without parsing segments to guess whether `admin` is an app tier or a role.
# (`role-*` also matches the export tool's default exclude, so roles are never
# re-mined into groups.) Permission groups keep the plain <tenant>-<app>-<tier> name.
#
# (If you change a pattern, change it in 10_generate.yml — that is where the names
# are actually built. This comment is the human reference for that code.)

# Access tiers a tenant gets per app unless its spec overrides `tiers:`. These are
# the ATOMIC permission groups; roles (personas) bundle them.
identity_access_tiers: [admin, operator, viewer]
