---
# group_vars/all/00_naming.yml — ENVIRONMENT-AGNOSTIC naming inputs only.
#
# This sits next to the PLAYBOOK (site.yml), so Ansible auto-loads it on every run
# WITHOUT it being named as an inventory. CRUCIAL CONSEQUENCE: playbook group_vars/all
# OUTRANKS inventory group_vars/all in Ansible's precedence — so anything here CANNOT
# be overridden by an inventory's group_vars/all. Therefore ONLY put values that are
# the same in every environment here. Environment-specific values (env, domain) live
# in each tenant inventory (inventories/<tenant>/group_vars/all/), NOT here — putting
# `env: prod` here would force prod onto a test inventory.
#
# The only thing CONSUMED from this file is `identity_access_tiers` (read by
# 10_generate.yml). The naming PATTERNS are documented in the comment block below;
# the live source of truth that actually builds the names is the generator in
# 10_generate.yml (it encodes both which fields combine AND their format, so the
# pattern can't be pure data). env/domain are read by the freeipa_server role and
# are supplied per-inventory.
#
# ── Naming patterns (documented convention — generators in 10_generate.yml) ───
#   group       <tenant>-<app>-<tier>              acme-payments-admin
#   role        role-<tenant>-<persona>            role-acme-developer  (bundle of groups)
#   hostgroup   <tenant>-<app>                      acme-payments
#   host FQDN   <env>-<tenant>-<app>-<NN>.<domain>  prod-acme-payments-01.example.com
#   service URL <app>.<tenant>.<env>.<domain>       payments.acme.prod.example.com
#
# Type marker: roles are prefixed `role-` so the FIRST token tells you the kind —
# scan any list and `role-*` = a role, everything else = a plain permission group,
# without parsing segments to guess whether `admin` is an app tier or a role.
# (`role-*` also matches the export tool's default exclude, so roles are never
# re-mined into groups.) Permission groups keep the plain <tenant>-<app>-<tier> name.
#
# (If you change a pattern, change it in 10_generate.yml — that is where the names
# are actually built. This comment is the human reference for that code.)

# Access tiers a tenant gets per app unless its spec overrides `tiers:`. These are
# the ATOMIC permission groups; roles (personas) bundle them.
identity_access_tiers: [admin, operator, viewer]
