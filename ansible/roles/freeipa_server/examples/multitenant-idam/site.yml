---
# site.yml — apply identity to the realm. WHICH tenants are applied is decided by
# which inventories you pass (not a flag): one tenant dir = isolated, fast; several
# = a union/audit run.
#
#   ./apply.sh acme                 # team ACME only — seconds, GLOBEX untouched
#   ./apply.sh acme globex          # union/audit — reconcile both at once
#   ansible-playbook -i inventories/_common -i inventories/acme site.yml --tags idam
- name: FreeIPA multi-tenant IDAM
  hosts: freeipa
  become: true
  tasks:
    # The only foot-gun is forgetting to pass a tenant inventory (just _common),
    # which would load zero specs. Catch it explicitly — no counts, no registry.
    - name: Refuse to run without a tenant inventory
      ansible.builtin.assert:
        that: _tenant_specs | length > 0
        fail_msg: >-
          No tenant specs loaded — pass at least one tenant inventory alongside
          _common, e.g. `-i inventories/_common -i inventories/acme`
          (or `./apply.sh acme`).
        success_msg: >-
          Applying {{ _tenant_specs | map(attribute='code') | list }}
          → marker {{ freeipa_idam_managed_group }}.

    - name: Apply declarative identity (groups, roles, users, hostgroups)
      ansible.builtin.import_role:
        name: freeipa_server
      # Realm admin/DM passwords come from group_vars + HashiCorp Vault
      # (freeipa_idam_vault_secret) — see the role README. Put shared secrets in
      # _common/group_vars/freeipa.yml.
      tags: [idam]
