---
# People — one flat list. Each person carries identity + a list of grant names in
# `grants`. A grant is either a role_set (expands to its access_grants) or a single
# access_grant. The freeipa_idam_user_grants filter resolves them to the scoped
# environment's role-… groups and strips matrix-only keys, leaving a clean,
# module-safe user object ({name, first, last, email, groups}).
#
# Each access_grant carries its own tenant/env scope, so a grant lands wherever it is
# defined (and only within the run's scope). One list serves the estate.
freeipa_people:
  - { name: alice.smith,  first: Alice,  last: Smith, email: ["alice.smith@example.com"],  grants: [platform_admin] }              # a role_set (3 grants)
  - { name: bob.ng,       first: Bob,    last: Ng,    email: ["bob.ng@example.com"],        grants: [observability] }               # a role_set (1 grant)
  - { name: charlie.fox,  first: Charlie, last: Fox,  email: ["charlie.fox@example.com"],   grants: [docker_deployers, grafana_readers] }  # loose access_grants

# BASELINE: put any hand-written or EXPORTED objects directly under their native
# freeipa_idam_* keys (here, or in a snapshot group_vars file). site.yml MERGES the
# matrix-generated objects onto them, unique by name — the baseline wins on a name
# collision, and users keep the union of their groups. Greenfield = leave them unset.
# Example baseline (uncomment to see it survive alongside the generated groups):
# freeipa_idam_usergroups:
#   - { name: legacy-admins, description: hand-managed, kept alongside the matrix }
