---
# ═════════════════════════════════════════════════════════════════════════════
# THE ACCESS MATRIX — one declarative dict. Two Python filter plugins compile it
# into the role's baseline freeipa_idam_* object lists (see ../../filter_plugins/
# freeipa_idam.py). You edit this; the relationships + naming are handled in Python.
#
# Vocabulary (every key says what it is):
#   object_naming    – names of the 5 generated object types (prefixes + templates)
#   tenants          – tenant → environments         (the single source of truth)
#   applications     – the apps you protect
#   privilege_levels – the access tiers (admins / readers / …) + what they can do
#   host_automember  – optional: auto-wire hosts into hostgroups by FQDN
#   access_grants    – a named, scoped grant: an application + privilege_level + where
#   role_sets        – a role = a named set of access_grants (a super-set)
# ═════════════════════════════════════════════════════════════════════════════
freeipa_idam_access_matrix:

  # ── object_naming: the FIVE generated object types. The keys are a FIXED set
  #    (you can't add new types — the compiler emits exactly these five); you edit
  #    the prefix VALUE (the literal string prepended to names) and/or the template.
  object_naming:
    prefixes:
      role_group: role        # the grant group users are members of
      user_group: ug          # the policy group (nests the role group; HBAC/sudo target it)
      host_group: hg          # the hostgroup the rules are scoped to
      hbac_rule:  hbac        # the HBAC (login) rule
      sudo_rule:  sudo        # the sudo rule
    # How each name is assembled — rearrange the {placeholders} freely. Available:
    #   {role_group_prefix} {user_group_prefix} {host_group_prefix} {hbac_rule_prefix}
    #   {sudo_rule_prefix} {tenant} {environment} {application} {privilege_level}
    templates:
      role_group: "{role_group_prefix}-{tenant}-{environment}-{application}-{privilege_level}"
      user_group: "{user_group_prefix}-{tenant}-{environment}-{application}-{privilege_level}"
      host_group: "{host_group_prefix}-{tenant}-{environment}-{application}-{privilege_level}"
      hbac_rule:  "{hbac_rule_prefix}-{tenant}-{environment}-{application}-{privilege_level}"
      sudo_rule:  "{sudo_rule_prefix}-{tenant}-{environment}-{application}-{privilege_level}"

  # ── OPTIONAL descriptions — enriched object descriptions. Omit this block to use the
  #    enriched DEFAULTS (which already pull in the application + privilege_level
  #    descriptions, e.g. "Grafana — Read-only (login + dashboards) [acme/dev]"). Override
  #    any of the six object types here. Placeholders: {tenant} {environment} {application}
  #    {privilege_level} {application_description} {privilege_level_description}.
  # descriptions:
  #   role_group: "{application_description} — {privilege_level_description} [{tenant}/{environment}]"
  #   user_group: "Policy group: {application_description} / {privilege_level} [{tenant}/{environment}]"
  #   host_group: "Hosts for {application_description} [{tenant}/{environment}]"
  #   hbac_rule:  "HBAC — {privilege_level} login to {application_description} [{tenant}/{environment}]"
  #   sudo_rule:  "Sudo — {privilege_level} on {application_description} [{tenant}/{environment}]"
  #   automember: "Auto-membership: {application_description} hosts [{tenant}/{environment}]"

  # ── tenants → their environments (the SINGLE source of truth for what exists).
  #    An inventory's freeipa_scope_* SELECTS one slice; it never re-declares these.
  tenants:
    acme:    { environments: [dev, qa, stg, prod] }
    globex:  { environments: [dev, test, prod] }
    initech: { environments: [dev] }

  # ── applications. An app may OVERRIDE a privilege_level's hbac/sudo for app needs.
  applications:
    grafana:  { description: Grafana access }
    docker:   { description: Docker host access }
    postgres:
      description: PostgreSQL access
      privilege_overrides:                # override the global tier for THIS app
        admins:
          sudo_commands:
            - "/usr/bin/systemctl restart postgresql"
            - "/usr/bin/su - postgres"

  # ── privilege_levels: the global access tiers. "ALL" → full sudo; [] → no sudo rule.
  privilege_levels:
    admins:
      description: Administrator access
      hbac_services: [sshd]
      sudo_commands: [ALL]
    readers:
      description: Read-only access
      hbac_services: [sshd, cockpit]      # cockpit is non-stock → created as custom
      sudo_commands: []
    deployers:
      description: Deployment access
      hbac_services: [sshd]
      sudo_commands: ["/usr/bin/systemctl", "/usr/bin/journalctl"]

  # ── OPTIONAL host_automember: auto-generate one hostgroup automember rule per hg-…
  #    so enrolled hosts wire THEMSELVES in by FQDN. Omit to manage hosts yourself.
  #    Placeholders: {tenant} {environment} {application} {domain} (literal, escaped)
  #    + {instance} (raw regex, default [0-9]+). The compiler anchors ^…$ + escapes dots.
  host_automember:
    fqdn_pattern: "{tenant}-{application}-{instance}.{environment}.example.com"
    # domain: example.com        # only if you use the {domain} placeholder
    # instance: "[0-9]+"         # regex for the {instance} token (default)

  # ── access_grants: a named, scoped grant = application + privilege_level + where.
  #    People are granted these by NAME. include: all | [list]; optional exclude.
  access_grants:
    grafana_admins:
      application: grafana
      privilege_level: admins
      tenants:
        acme: { environments: { include: all } }
    grafana_readers:
      application: grafana
      privilege_level: readers
      tenants:
        acme:   { environments: { include: all, exclude: [prod] } }
        globex: { environments: { include: [dev, test] } }
    postgres_admins:
      application: postgres
      privilege_level: admins
      tenants:
        acme: { environments: { include: [stg, prod] } }
    docker_deployers:
      application: docker
      privilege_level: deployers
      tenants:
        acme:    { environments: { include: [dev, qa] } }
        globex:  { environments: { include: [dev, test] } }
        initech: { environments: { include: all } }

  # ── role_sets: a ROLE is a named super-set of access_grants. People grant the role
  #    by name and get all its access_grants at once. (grants: may mix role_sets and
  #    loose access_grants.) Each member keeps its own tenant/env scope.
  role_sets:
    platform_admin: [grafana_admins, postgres_admins, docker_deployers]
    observability:  [grafana_readers]
