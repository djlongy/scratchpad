---
galaxy_info:
  role_name: freeipa_server
  author: longy
  description: >-
    Install and configure a FreeIPA server cluster (primary + replicas) on
    EL-family or Debian/Ubuntu by wrapping freeipa.ansible_freeipa, with
    cold-start resilience, scheduled backups, declarative IDAM
    reconciliation, and an opt-in post-install hardening baseline.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: [all]
    - name: Fedora
      versions: [all]
    - name: Ubuntu
      versions: [all]
    - name: Debian
      versions: [all]
  galaxy_tags:
    - freeipa
    - identity
    - idam
    - kerberos
    - ldap

# Collections this role needs installed (roles cannot hard-depend on
# collections — declare them in your requirements.yml):
#   freeipa.ansible_freeipa    — install roles + all ipa* modules (always)
#   community.general          — ldap_attrs (hardening anonymous-bind only)
#   community.hashi_vault      — ONLY if you use the Vault password fallback
# Not listed as role dependencies to avoid implicit pre-run; the upstream
# install roles are invoked explicitly via include_role.
dependencies: []
