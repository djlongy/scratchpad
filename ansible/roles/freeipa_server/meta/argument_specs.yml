---
argument_specs:
  main:
    short_description: Install and configure a FreeIPA server cluster.
    options:
      freeipa_server_domain:
        type: str
        required: true
        description: FreeIPA primary DNS domain (lowercase).
      freeipa_server_realm:
        type: str
        required: true
        description: Kerberos realm (uppercase domain).
      freeipa_server_vault_secret:
        type: str
        required: true
        description: HashiCorp Vault KV path holding admin_password + dm_password.
      freeipa_server_is_primary:
        type: bool
        required: false
        description: Whether this host is the primary (first) server. Derived from inventory groups.
      freeipa_server_primary_host:
        type: str
        required: false
        description: FQDN of the primary server (replica enrolment target).
      freeipa_server_forwarders:
        type: list
        elements: str
        required: false
        description: Upstream DNS forwarders for the IPA-managed zone.
      freeipa_server_ca_mode:
        type: str
        required: false
        choices: [self-signed, external-ca, ca-less]
        description: Certificate authority deployment model.
      freeipa_server_trusted_external_cas:
        type: list
        elements: dict
        required: false
        description: External/third-party CA certs to import into the IPA trust store (additive to the IPA CA).
        options:
          name:
            type: str
            required: true
            description: Nickname for the CA in the IPA trust store.
          src:
            type: str
            required: false
            description: Path to a PEM CA cert on the control node (use this or content).
          content:
            type: str
            required: false
            description: Inline PEM CA cert text (use this or src).
      freeipa_server_trusted_ca_staging_dir:
        type: str
        required: false
        description: Temp directory on the primary for staging CA certs before import.
      freeipa_server_restore_name:
        type: str
        required: false
        description: Backup name to restore (break-glass, `never` tag; wraps upstream ipabackup state=restored).
      freeipa_server_backup_fetch_name:
        type: str
        required: false
        description: Backup name (or "all") to copy to the Ansible controller during a backup run.
      freeipa_server_backup_controller_path:
        type: str
        required: false
        description: Controller-side directory for offloaded backups.
      freeipa_server_dns_zones:
        type: list
        elements: dict
        required: false
        description: IPA-hosted DNS zones to manage (ipadnszone). Each item needs name.
      freeipa_server_dns_forward_zones:
        type: list
        elements: dict
        required: false
        description: Conditional forward zones to manage (ipadnsforwardzone). Each item needs name.
      freeipa_server_dns_records:
        type: list
        elements: dict
        required: false
        description: DNS records to manage (ipadnsrecord). Each item needs zone_name, name, record_type, record_value.
      freeipa_server_automember_rules:
        type: list
        elements: dict
        required: false
        description: Automember rules (ipaautomember). Each item needs name + automember_type (group|hostgroup).
      freeipa_server_automember_rebuild:
        type: bool
        required: false
        description: Force a one-off automember rebuild even when no rule changed (re-evaluates existing members; newly-enrolling hosts are placed automatically without it).
      freeipa_server_export_output:
        type: str
        required: false
        description: Control-node path for the config snapshot written by the export task (tags-export).
      freeipa_server_export_include_host_membership:
        type: bool
        required: false
        description: Export task — pin static hostgroup host rosters (default off; enrolment + automember own them).
      freeipa_server_export_include_sshkeys:
        type: bool
        required: false
        description: Export task — emit per-user SSH public keys in the snapshot.
      freeipa_server_setup_adtrust:
        type: bool
        required: false
        description: Enable the AD trust controller at install (ipa-server-install --setup-adtrust).
      freeipa_server_ad_trusts:
        type: list
        elements: dict
        required: false
        description: Active Directory trusts to establish (ipatrust). Each item needs realm, admin, password_field.
      freeipa_server_forward_policy:
        type: str
        required: false
        choices: [only, first]
        description: DNS forward policy.
      freeipa_server_setup_kra:
        type: bool
        required: false
        description: Install the Key Recovery Authority.
      freeipa_server_no_hbac_allow:
        type: bool
        required: false
        description: Skip creating the permissive allow_all HBAC rule at install.
      freeipa_server_fips_required:
        type: bool
        required: false
        description: Assert the host is in FIPS mode before install (never auto-enables).
      freeipa_server_disable_allow_all:
        type: bool
        required: false
        description: Tear down allow_all HBAC (guarded — requires replacement rules).
