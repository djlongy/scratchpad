---
# roles/freeipa_server/vars/main.yml
# Non-overridable derived constants (high precedence — do not put env values here).

freeipa_server_realm_systemd_instance: "{{ freeipa_server_realm | replace('.', '-') }}"
freeipa_server_dirsrv_service_name: "dirsrv@{{ freeipa_server_realm_systemd_instance }}.service"

# Fixed platform paths probed/verified by the self-heal phase (tasks/heal.yml).
freeipa_server_heal_pki_proxy_conf: "/etc/httpd/conf.d/ipa-pki-proxy.conf"
freeipa_server_heal_pki_server_xml: "/etc/pki/pki-tomcat/server.xml"

# The other installer-generated IPA httpd config files (RPM %ghost — the package
# owns the paths but ships them empty; the installer renders them from
# /usr/share/ipa/*.template). A configured server can lose these too; the heal
# re-renders each MISSING one from FreeIPA's own template (files/ipa_httpd_render.py)
# — ipa-server-upgrade is proven NOT to regenerate them (it aborts "ipa.conf not
# found"), and dnf reinstall restores only the templates, not the rendered output.
freeipa_server_heal_ipa_conf: "/etc/httpd/conf.d/ipa.conf"
freeipa_server_heal_ipa_rewrite_conf: "/etc/httpd/conf.d/ipa-rewrite.conf"
# ipa-kdc-proxy.conf in conf.d is a SYMLINK to the file under /etc/ipa/kdcproxy.
freeipa_server_heal_kdcproxy_symlink: "/etc/httpd/conf.d/ipa-kdc-proxy.conf"
freeipa_server_heal_kdcproxy_target: "/etc/ipa/kdcproxy/ipa-kdc-proxy.conf"
# The served CA certificate (published by the installer from /etc/ipa/ca.crt).
freeipa_server_heal_ca_cert_served: "/usr/share/ipa/html/ca.crt"
freeipa_server_heal_ca_cert_source: "/etc/ipa/ca.crt"
# nss.conf: mod_nss is LEGACY (gone on EL9/RHEL9 — FreeIPA uses mod_ssl). When
# present it is package-owned (mod_nss), NEVER IPA-rendered — the heal only
# REPORTS on it, it never fabricates it. Probed for diagnostics only.
freeipa_server_heal_nss_conf: "/etc/httpd/conf.d/nss.conf"

# The full set of installer-generated IPA httpd files whose absence the heal
# treats as "configured but broken" (each re-rendered from its own template).
freeipa_server_heal_ipa_httpd_files:
  - "{{ freeipa_server_heal_ipa_conf }}"
  - "{{ freeipa_server_heal_ipa_rewrite_conf }}"
  - "{{ freeipa_server_heal_kdcproxy_symlink }}"
  - "{{ freeipa_server_heal_kdcproxy_target }}"
