[defaults]
# Make the ssh_agent_key role discoverable from this example dir.
roles_path = ../../../
inventory = inventory.yml
host_key_checking = False

[ssh_connection]
# Keep the key off disk end-to-end. Without pipelining, Ansible writes its module
# payload — which embeds task args, including the key fed via `stdin:` — to a temp
# file under ~/.ansible/tmp before executing it. Pipelining pipes that payload to
# the interpreter instead, so the private key never lands on disk.
pipelining = True
