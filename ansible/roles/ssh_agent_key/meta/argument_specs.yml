---
argument_specs:
  main:
    short_description: "Unlock a private SSH key into your ssh-agent from memory (alias of unlock)"
    description:
      - "Default entry point — identical to the unlock entry point."
    options: &unlock_options
      ssh_agent_key_content:
        description:
          - "The private SSH key text (PEM or OpenSSH format)."
          - "REQUIRED. Wire from a vaulted variable at the play level; never hardcode."
        type: str
        required: true
      ssh_agent_key_passphrase:
        description:
          - "Passphrase for an encrypted key, handed to ssh-add via its SSH_ASKPASS hook."
          - "Never written to disk or a command line. Empty means the key is unencrypted."
        type: str
        default: ""
      ssh_agent_key_lifetime:
        description:
          - "Key lifetime in the agent, in seconds."
          - "0 persists until locked or the agent restarts; a value > 0 passes ssh-add -t <seconds>."
        type: int
        default: 0
  unlock:
    short_description: "Load the SSH key into your ssh-agent (memory-only)"
    description:
      - "Feeds the private key to ssh-add over stdin — never written to disk, never on a command line."
      - "Uses the agent the play inherited (SSH_AUTH_SOCK); fails with guidance when none is running."
      - "run_once + delegate_to localhost are baked in — call bare from pre_tasks."
    options: *unlock_options
  lock:
    short_description: "Remove the key unlock added"
    description:
      - "Deletes the key unlock loaded, by its public key over stdin. Skips when unlock added nothing."
      - "run_once + delegate_to localhost are baked in — call bare from post_tasks."
    options:
      ssh_agent_key_public:
        description:
          - "Public key line of an identity to remove ('ssh-ed25519 AAAA... comment')."
          - "Only needed to lock a key that was NOT added by unlock in this play."
        type: str
        default: ""
