---
argument_specs:
  main:
    short_description: "Unlock a private SSH key into ssh-agent from memory (alias of unlock)"
    description:
      - "Default entry point — identical to the unlock entry point."
    options: &unlock_options
      ssh_agent_key_content:
        description:
          - "The private SSH key text (PEM or OpenSSH format)."
          - "REQUIRED. Wire from a vaulted variable at the play level; never hardcode."
        type: str
        required: true
      ssh_agent_key_passphrase:
        description:
          - "Passphrase to unlock the private key, if it has one. Empty = raw key."
          - "Handed to ssh-add via its SSH_ASKPASS hook — never on disk or a command line."
        type: str
        default: ""
      ssh_agent_key_lifetime:
        description:
          - "Key lifetime in the agent, in seconds."
          - "0 persists until locked or the agent stops; a value > 0 passes ssh-add -t <seconds>."
        type: int
        default: 0
      ssh_agent_key_public:
        description:
          - "The key's public line ('ssh-ed25519 AAAA... comment'). OPTIONAL for unlock."
          - "When set, the already-loaded check uses it directly and the ssh_agent_key_pubkey filter is never invoked — pass it (and to lock) to bypass the filter plugin entirely."
        type: str
        default: ""
  unlock:
    short_description: "Load the SSH key into ssh-agent (memory-only)"
    description:
      - "Feeds the private key to ssh-add over stdin — never written to disk, never on a command line."
      - "Uses the agent the play inherited; if none is running, spawns one (it persists after the run) and retries."
      - "run_once + delegate_to localhost are baked in — call from pre_tasks."
    options: *unlock_options
  lock:
    short_description: "Remove the SSH key from the agent (independent of unlock)"
    description:
      - "Give lock the same vaulted key: it derives the public half in memory and deletes exactly that."
      - "No state is carried from unlock — lock works in any play, playbook or run. Already-gone is ok."
      - "run_once + delegate_to localhost are baked in — call from post_tasks or its own playbook."
    options:
      ssh_agent_key_content:
        description:
          - "The same private key text unlock uses — lock derives the public key from it."
          - "Required unless ssh_agent_key_public is set."
        type: str
        default: ""
      ssh_agent_key_passphrase:
        description:
          - "The key's passphrase, needed to derive the public key from an encrypted key."
        type: str
        default: ""
      ssh_agent_key_public:
        description:
          - "Explicit public key line to remove ('ssh-ed25519 AAAA... comment') — overrides derivation."
        type: str
        default: ""
