---
argument_specs:
  main:
    short_description: "Load a private SSH key into a running ssh-agent from memory"
    description:
      - "Feeds a private SSH key to ssh-add over stdin so it is never written to disk."
      - "Loads into the caller's inherited ssh-agent when reachable; otherwise spawns a throwaway agent for the current run."
      - "Idempotent: reports changed only when the agent's identity set actually changes."
    options:
      ssh_agent_key_content:
        description:
          - "The private SSH key text (PEM or OpenSSH format)."
          - "REQUIRED. Wire from a vaulted variable at the play level; never hardcode."
        type: str
        required: true
      ssh_agent_key_auth_sock:
        description:
          - "ssh-agent socket to load the key into."
          - "Defaults to the caller's inherited SSH_AUTH_SOCK (the launchd agent on macOS)."
        type: str
        default: "{{ lookup('env', 'SSH_AUTH_SOCK') }}"
      ssh_agent_key_comment:
        description: "Cosmetic label used in the completion message."
        type: str
        default: "ansible"
      ssh_agent_key_lifetime:
        description:
          - "Key lifetime in the agent, in seconds."
          - "0 persists until the agent restarts; a value > 0 passes ssh-add -t <seconds>."
        type: int
        default: 0
