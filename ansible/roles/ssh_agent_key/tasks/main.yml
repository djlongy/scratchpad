---
# roles/ssh_agent_key/tasks/main.yml
#
# Default action = unlock (load the key). The pair is designed for explicit
# tasks_from calls around a play:
#   pre_tasks:  import_role {name: ssh_agent_key, tasks_from: unlock}
#   post_tasks: import_role {name: ssh_agent_key, tasks_from: lock}

- name: Unlock the SSH key (default action)
  ansible.builtin.import_tasks: unlock.yml
