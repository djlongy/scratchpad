---
# roles/ssh_agent_key/tasks/main.yml
#
# Load ssh_agent_key_content into a running ssh-agent from memory. The key is fed
# to `ssh-add` over stdin, so it is never written to disk and never appears in argv
# or (with no_log) in task output.

- name: Assert the SSH key material was provided
  ansible.builtin.assert:
    that:
      - ssh_agent_key_content | length > 0
    fail_msg: >-
      ssh_agent_key_content is empty. Wire it from a vaulted key variable at the
      play level, e.g. ssh_agent_key_content: "{{ '{{' }} vault_ssh_private_key {{ '}}' }}".
    quiet: true

# --- Acquire a reachable ssh-agent -----------------------------------------------
# Prefer the caller's inherited agent (persists to the interactive shell on macOS).
# Fall back to spawning a throwaway agent so headless / CI runs stay self-sufficient.
- name: Ensure an ssh-agent is available
  block:
    - name: Probe the inherited ssh-agent
      ansible.builtin.command:
        cmd: ssh-add -l
      environment:
        SSH_AUTH_SOCK: "{{ ssh_agent_key_auth_sock }}"
      register: _ssh_agent_probe
      changed_when: false
      # rc 0 = agent reachable, has keys; rc 1 = reachable, empty; rc 2 = no agent.
      failed_when: _ssh_agent_probe.rc == 2

    - name: Use the inherited agent socket
      ansible.builtin.set_fact:
        _ssh_agent_sock: "{{ ssh_agent_key_auth_sock }}"

  rescue:
    - name: Spawn a throwaway ssh-agent for this run
      ansible.builtin.command:
        cmd: ssh-agent -s
      register: _ssh_agent_spawn
      changed_when: true

    - name: Capture the spawned agent socket
      ansible.builtin.set_fact:
        _ssh_agent_sock: >-
          {{ _ssh_agent_spawn.stdout
             | regex_search('SSH_AUTH_SOCK=([^;]+);', '\1') | first }}

    - name: Warn that a spawned agent is not visible to the interactive shell
      ansible.builtin.debug:
        msg: >-
          No inherited ssh-agent was reachable, so a throwaway one was started for
          this run only. Its key is NOT available to your terminal after the play
          ends. On macOS your login shell shares a persistent launchd agent, so this
          path should not normally fire — if it did, run `eval $(ssh-agent)` in your
          shell first, then re-run this playbook.

# --- Load the key (idempotent via before/after diff) -----------------------------
# We can't cheaply fingerprint the private key to pre-check: `ssh-keygen -lf -`
# rejects a private key on stdin, and `ssh-keygen -y` needs a *seekable* file
# (Ansible feeds stdin over a pipe), so deriving the public key would force the
# key onto disk. Instead, snapshot the agent, always re-add (a no-op when the key
# is already present — the agent dedupes), then report `changed` only if the
# agent's identity set actually changed.
- name: Snapshot agent identities before load
  ansible.builtin.command:
    cmd: ssh-add -l
  environment:
    SSH_AUTH_SOCK: "{{ _ssh_agent_sock }}"
  register: _ssh_agent_before
  changed_when: false
  failed_when: false

- name: Load the SSH key into the agent from memory (never written to disk)
  ansible.builtin.command:
    cmd: "ssh-add{{ (' -t ' ~ ssh_agent_key_lifetime) if (ssh_agent_key_lifetime | int) > 0 else '' }} -"
    stdin: "{{ ssh_agent_key_content if ssh_agent_key_content.endswith('\n') else ssh_agent_key_content ~ '\n' }}"
  environment:
    SSH_AUTH_SOCK: "{{ _ssh_agent_sock }}"
  changed_when: false
  no_log: true

- name: Snapshot agent identities after load
  ansible.builtin.command:
    cmd: ssh-add -l
  environment:
    SSH_AUTH_SOCK: "{{ _ssh_agent_sock }}"
  register: _ssh_agent_after
  changed_when: _ssh_agent_after.stdout != _ssh_agent_before.stdout
  failed_when: false

- name: Report the loaded key
  ansible.builtin.debug:
    msg: >-
      SSH key '{{ ssh_agent_key_comment }}' is loaded in the agent
      ({{ 'until the agent restarts' if (ssh_agent_key_lifetime | int) == 0
          else 'for ' ~ ssh_agent_key_lifetime ~ 's' }}).
