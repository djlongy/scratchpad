---
# roles/ssh_agent_key/tasks/unlock.yml
#
# Load the private key into the play's ssh-agent, from memory — the key reaches
# ssh-add over stdin and never touches disk. Uses the agent your shell already
# exports (SSH_AUTH_SOCK); the role never spawns agents or reads/overrides env.
# See the README for a plain-English walkthrough of every task below.
#
# run_once + delegate_to localhost are baked in — call it bare from pre_tasks:
#   - ansible.builtin.import_role: {name: ssh_agent_key, tasks_from: unlock}

- name: Unlock | Load the SSH key into your ssh-agent
  run_once: true
  delegate_to: localhost
  become: false
  block:
    - name: Unlock | Check the key material was provided
      ansible.builtin.assert:
        that:
          - ssh_agent_key_content | length > 0
        fail_msg: >-
          ssh_agent_key_content is empty — wire it from your vaulted key
          variable in the calling play.
        quiet: true

    - name: Unlock | List the agent's current keys
      ansible.builtin.command:
        cmd: ssh-add -L
      register: _ssh_agent_key_before
      changed_when: false
      failed_when: false  # rc 1 just means the agent is empty; rc 2 is caught next

    - name: Unlock | Check an ssh-agent is reachable
      ansible.builtin.assert:
        that:
          - _ssh_agent_key_before.rc != 2
        fail_msg: >-
          No ssh-agent is reachable. Start one in your shell first
          (eval "$(ssh-agent)") or wrap the run: ssh-agent ansible-playbook site.yml
        quiet: true

    # The key text goes in over stdin. If it is passphrase-protected, ssh-add
    # (having no terminal) asks the SSH_ASKPASS helper, which echoes the vaulted
    # passphrase we place in this task's process environment — with an
    # unencrypted key the helper is simply never called. no_log because the
    # task args contain the key and passphrase.
    - name: Unlock | Add the key to the agent (from memory, over stdin)
      ansible.builtin.command:
        cmd: "ssh-add{{ (' -t ' ~ ssh_agent_key_lifetime) if (ssh_agent_key_lifetime | int) > 0 else '' }} -"
        stdin: "{{ ssh_agent_key_content }}"
      environment:
        SSH_ASKPASS: "{{ role_path }}/files/askpass.sh"
        SSH_ASKPASS_REQUIRE: force
        DISPLAY: ":0"
        SSH_AGENT_KEY_PASSPHRASE: "{{ ssh_agent_key_passphrase }}"
      changed_when: false
      no_log: true

    # Re-adding an already-loaded key is a no-op (the agent dedupes), so the
    # honest "changed" signal is: did the agent's key list actually change?
    - name: Unlock | List keys again — changed only if the key was new
      ansible.builtin.command:
        cmd: ssh-add -L
      register: _ssh_agent_key_after
      changed_when: _ssh_agent_key_after.stdout != _ssh_agent_key_before.stdout

    # The agent deletes keys BY PUBLIC KEY, so remember the public line our add
    # introduced. lock.yml removes exactly this — and nothing, if the key was
    # already in the agent before we ran. A re-run adds nothing new (empty
    # diff), so keep whatever an earlier unlock in this play already recorded.
    - name: Unlock | Remember the key we added (lock removes exactly this)
      ansible.builtin.set_fact:
        _ssh_agent_key_added: >-
          {{ _ssh_agent_key_after.stdout_lines
             | difference(_ssh_agent_key_before.stdout_lines)
             | first | default(_ssh_agent_key_added | default('')) }}
