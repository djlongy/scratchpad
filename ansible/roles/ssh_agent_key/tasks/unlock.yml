---
# roles/ssh_agent_key/tasks/unlock.yml
#
# Load the private key into an ssh-agent, from memory — the key reaches ssh-add
# over stdin and never touches disk. The agent the play inherited is used when
# reachable; when the probe says "no agent" (ssh-add -L rc 2), one is spawned
# (it persists after the run). Add failures — bad passphrase, invalid key —
# fail loudly; they are never mistaken for "no agent". A passphrase-protected
# key is unlocked with ssh_agent_key_passphrase (via ssh's SSH_ASKPASS hook).
# See the README for a plain-English walkthrough of every task.
#
# run_once + delegate_to localhost are baked in — call it bare from pre_tasks:
#   - ansible.builtin.import_role: {name: ssh_agent_key, tasks_from: unlock}

- name: Unlock | Load the SSH key into your ssh-agent
  run_once: true
  delegate_to: localhost
  become: false
  vars:
    # Once the rescue has spawned an agent, ssh_agent_key_sock points every later
    # ssh-add at it; before that it is unset and this resolves to {} = "use the
    # agent the play inherited".
    _ssh_agent_env: >-
      {{ {'SSH_AUTH_SOCK': ssh_agent_key_sock}
         if (ssh_agent_key_sock | default('') | length > 0) else {} }}
    # Passphrase plumbing (only matters when ssh_agent_key_passphrase is set):
    # ssh-add has no terminal here, so it asks the SSH_ASKPASS helper for the
    # passphrase; the helper echoes the value we place in the task's process
    # environment. An unencrypted key never invokes the helper.
    _ssh_askpass_env:
      SSH_ASKPASS: "{{ role_path }}/files/askpass.sh"
      SSH_ASKPASS_REQUIRE: force
      DISPLAY: ":0"
      SSH_AGENT_KEY_PASSPHRASE: "{{ ssh_agent_key_passphrase }}"
    _ssh_add_cmd: "ssh-add{{ (' -t ' ~ ssh_agent_key_lifetime) if (ssh_agent_key_lifetime | int) > 0 else '' }} -"
    # The key's public half (derived in memory) — how we tell whether the key
    # was ALREADY in the agent, so re-runs honestly report "ok" not "changed".
    _ssh_pub_blob: "{{ (ssh_agent_key_content | ssh_agent_key_pubkey(ssh_agent_key_passphrase)).split(' ')[1] }}"
  block:
    - name: Unlock | Check the key material was provided
      ansible.builtin.assert:
        that:
          - ssh_agent_key_content | length > 0
        fail_msg: >-
          ssh_agent_key_content is empty — wire it from your vaulted key
          variable in the calling play.
        quiet: true

    # This listing doubles as the agent PROBE: rc 0/1 = agent reachable
    # (with/without keys), rc 2 = no usable agent. Branching on that rc is
    # deliberate — a broad block/rescue would treat EVERY add failure (bad
    # passphrase, invalid key) as "no agent" and spawn a pointless orphan.
    - name: Unlock | List the agent's current keys
      ansible.builtin.command:
        cmd: ssh-add -L
      environment: "{{ _ssh_agent_env }}"
      register: _ssh_agent_key_before
      changed_when: false
      failed_when: false

    - name: Unlock | No usable agent — spawn one (persists after the run)
      when: _ssh_agent_key_before.rc == 2
      block:
        - name: Unlock | Start the agent
          ansible.builtin.command:
            cmd: ssh-agent -s
          register: _ssh_agent_key_spawn
          changed_when: true

        - name: Unlock | Point this play at the spawned agent
          ansible.builtin.set_fact:
            ssh_agent_key_sock: "{{ _ssh_agent_key_spawn.stdout | regex_search('SSH_AUTH_SOCK=([^;]+);', '\\1') | first }}"

        # Ansible's own SSH connections inherit ansible-playbook's environment,
        # not a task's — without this line they could never see the new agent.
        # Guarded so re-runs can't stack duplicate IdentityAgent options.
        - name: Unlock | Let the play's SSH connections use the spawned agent
          ansible.builtin.set_fact:
            ansible_ssh_common_args: >-
              {{ (hostvars[item].ansible_ssh_common_args | default(''))
                 ~ ' -o IdentityAgent="' ~ ssh_agent_key_sock ~ '"' }}
          when: ssh_agent_key_sock not in (hostvars[item].ansible_ssh_common_args | default(''))
          delegate_to: "{{ item }}"
          delegate_facts: true
          loop: "{{ ansible_play_hosts_all }}"

        - name: Unlock | Tell the operator how to reuse the spawned agent
          ansible.builtin.debug:
            msg: >-
              Spawned a new ssh-agent (it keeps running after this play). To use
              it from your shell or your next run:
              export SSH_AUTH_SOCK={{ ssh_agent_key_sock }}

    # A bad passphrase or invalid key fails HERE, loudly — it can no longer be
    # mistaken for "no agent". _ssh_agent_env resolves to the spawned agent's
    # socket when the branch above ran, or {} = the inherited agent.
    - name: Unlock | Add the key to the agent (from memory, over stdin)
      ansible.builtin.command:
        cmd: "{{ _ssh_add_cmd }}"
        stdin: "{{ ssh_agent_key_content }}"
      environment: "{{ _ssh_askpass_env | combine(_ssh_agent_env) }}"
      changed_when: _ssh_pub_blob not in _ssh_agent_key_before.stdout
      no_log: true
