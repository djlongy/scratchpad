---
# roles/ssh_agent_key/defaults/main.yml
#
# Load a private SSH key into a running ssh-agent, straight from memory — the key
# is never written to disk. Behavioural defaults only; the key material itself is
# a required input wired from a vaulted variable at the playbook level.

# REQUIRED. Private key text (PEM / OpenSSH). Wire this from a vaulted variable in
# the calling play, e.g. ssh_agent_key_content: "{{ vault_ssh_private_key }}".
# Never hardcode a key here.
ssh_agent_key_content: ""

# The ssh-agent socket to load the key into. Defaults to the caller's inherited
# agent (on macOS, the persistent launchd agent). If empty / unreachable, the role
# spawns a throwaway agent for this run only (see tasks/main.yml rescue block).
ssh_agent_key_auth_sock: "{{ lookup('env', 'SSH_AUTH_SOCK') }}"

# Cosmetic label used in the completion message.
ssh_agent_key_comment: "ansible"

# Key lifetime in the agent, in seconds. 0 = persist until the agent restarts.
# A value > 0 passes `ssh-add -t <seconds>` so the key auto-expires.
ssh_agent_key_lifetime: 0
