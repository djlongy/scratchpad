---
# Deploy — render config, bring up the container, wait until the API answers.

- name: "Template the Vault HCL config"
  become: true  # root: writes the root-owned vault.hcl on the data mount
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ hashicorp_vault_config_dir }}/vault.hcl"
    owner: root
    group: root
    mode: "0644"
  notify: Restart vault container

- name: "Template the docker-compose file"
  become: true  # root: writes the root-owned docker-compose.yml on the data mount
  # No restart handler: compose-file changes are applied by the `docker compose up -d`
  # below; a vault.hcl change in the same run still restarts via its own handler.
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ hashicorp_vault_data_mount }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

# Raft node_id is inventory_hostname (vault.hcl). After a host rename the HCL
# picks up the new id, but the on-disk Raft configuration still lists the OLD
# id — the node then logs "not part of stable configuration, aborting election"
# and stays standby forever with no active leader (list-peers returns 500).
# peers.json recovery is the HashiCorp-supported rebind for that case. Stamp the
# last applied id so we only rewrite when it actually changes. Standalone only:
# HA renames need a planned peer-replace, not automatic peers.json.
- name: "Standalone | Check for existing Raft data"
  become: true  # root: data dir is vault-owned under the mount
  ansible.builtin.stat:
    path: "{{ hashicorp_vault_data_dir }}/vault.db"
  register: _hashicorp_vault_raft_db
  when: not (hashicorp_vault_is_ha | bool)

- name: "Standalone | Read the last applied Raft node_id stamp"
  become: true  # root: stamp lives next to vault-owned data
  ansible.builtin.slurp:
    src: "{{ hashicorp_vault_data_dir }}/.ansible_raft_node_id"
  register: _hashicorp_vault_raft_stamp
  failed_when: false
  when:
    - not (hashicorp_vault_is_ha | bool)
    - _hashicorp_vault_raft_db.stat.exists | default(false)

- name: "Standalone | Stage peers.json when Raft node_id drifted (host rename)"
  become: true  # root: writes under the raft data directory
  when:
    - not (hashicorp_vault_is_ha | bool)
    - _hashicorp_vault_raft_db.stat.exists | default(false)
    - >-
      (_hashicorp_vault_raft_stamp.content | default('') | b64decode | trim
       if (_hashicorp_vault_raft_stamp.content is defined)
       else '') != inventory_hostname
  block:
    - name: "Standalone | Write peers.json recovery (current node_id + cluster addr)"
      ansible.builtin.copy:
        dest: "{{ hashicorp_vault_data_dir }}/raft/peers.json"
        owner: "{{ hashicorp_vault_uid }}"
        group: "{{ hashicorp_vault_gid }}"
        mode: "0600"
        content: |
          [
            {
              "id": "{{ inventory_hostname }}",
              "address": "{{ hashicorp_vault_advertise_addr }}:{{ hashicorp_vault_cluster_port }}",
              "non_voter": false
            }
          ]
      notify: Restart vault container

    - name: "Standalone | Stamp the applied Raft node_id"
      ansible.builtin.copy:
        dest: "{{ hashicorp_vault_data_dir }}/.ansible_raft_node_id"
        owner: root
        group: root
        mode: "0644"
        content: "{{ inventory_hostname }}\n"

- name: "Ensure the Vault container is running"
  become: true  # root: docker CLI needs the root-owned docker socket
  ansible.builtin.command:
    cmd: "docker compose up -d"
    chdir: "{{ hashicorp_vault_data_mount }}"
  register: _hashicorp_vault_up
  changed_when: >-
    (['Started', 'Created', 'Recreated'] | select('in', _hashicorp_vault_up.stderr) | list | length > 0)
    or (['Started', 'Created', 'Recreated'] | select('in', _hashicorp_vault_up.stdout) | list | length > 0)

- name: "Apply any pending config changes (restart)"
  ansible.builtin.meta: flush_handlers

- name: "Wait for the Vault API to respond"
  become: false  # localhost/API — API reachability probe, no host privilege
  ansible.builtin.uri:
    url: "{{ hashicorp_vault_scheme }}://127.0.0.1:{{ hashicorp_vault_api_port }}/v1/sys/health"
    validate_certs: false
    # 200 active · 429 standby · 501 not-initialized · 503 sealed — all mean
    # the API is up. We only need the listener answering here.
    status_code: [200, 429, 472, 473, 501, 503]
  register: _hashicorp_vault_health
  retries: 20
  delay: 5
  until: _hashicorp_vault_health.status in [200, 429, 472, 473, 501, 503]
