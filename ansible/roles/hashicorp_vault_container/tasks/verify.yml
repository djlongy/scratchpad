---
# Verify — confirm each node is unsealed and, for HA, that all peers joined.

- name: "Wait for every node to be unsealed (active or standby)"
  become: false  # localhost/API — API reachability probe, no host privilege
  ansible.builtin.uri:
    url: "{{ hashicorp_vault_scheme }}://127.0.0.1:{{ hashicorp_vault_api_port }}/v1/sys/health"
    validate_certs: false
    status_code: [200, 429]
  register: _hashicorp_vault_final_health
  until: _hashicorp_vault_final_health.status in [200, 429]
  retries: 30
  delay: 5

# Peer verification runs for BOTH standalone and HA. Raft always keeps a peer
# list — even a single node has one — so checking it standalone catches the
# shrink without remove-peers: hosts leave the play while Raft still lists them;
# operator never ran `raft remove-peer`, leaving GHOST peers that still count
# toward quorum and silently break availability.
- name: "Verify | Read the root token from the first node"
  become: true  # root: reads the root-only root_token.txt
  ansible.builtin.slurp:
    src: "{{ hashicorp_vault_keys_dir }}/root_token.txt"
  register: _verify_tok
  delegate_to: "{{ hashicorp_vault_first_node }}"
  run_once: true
  no_log: true

- name: "Verify | Set the token fact"
  ansible.builtin.set_fact:
    _verify_root_token: "{{ _verify_tok.content | b64decode | trim }}"
  run_once: true
  no_log: true

- name: "List Raft peers on the leader"
  become: true  # root: docker exec needs the root-owned docker socket
  ansible.builtin.command:
    cmd: >-
      docker exec -e VAULT_TOKEN {{ hashicorp_vault_name }}
      vault operator raft list-peers -format=json
  environment:
    VAULT_TOKEN: "{{ _verify_root_token }}"
  register: _hashicorp_vault_peers
  # Retry: a legitimate restart (e.g. a cert/config change earlier in the run)
  # can trigger a Raft re-election, and list-peers needs an active leader — ride
  # out the election window rather than fail spuriously.
  until: _hashicorp_vault_peers.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  failed_when: false
  no_log: true
  run_once: true
  delegate_to: "{{ hashicorp_vault_first_node }}"

- name: "Verify | Derive the Raft peer set vs the desired node set"
  ansible.builtin.set_fact:
    # node_id is the inventory_hostname (see vault.hcl.j2), so these compare
    # directly against hashicorp_vault_nodes.
    _hashicorp_vault_raft_peer_ids: >-
      {{ (_hashicorp_vault_peers.stdout | from_json).data.config.servers
         | map(attribute='node_id') | list }}
  run_once: true
  when: _hashicorp_vault_peers.rc == 0

- name: "Assert the leader answered and every desired node joined Raft"
  ansible.builtin.assert:
    that:
      - _hashicorp_vault_peers.rc == 0
      - hashicorp_vault_nodes | difference(_hashicorp_vault_raft_peer_ids) | length == 0
    fail_msg: >-
      {{ 'Raft list-peers failed — no active leader? Check the cluster is up and
      unsealed on ' ~ hashicorp_vault_first_node ~ '.'
         if _hashicorp_vault_peers.rc != 0 else
         'Desired nodes missing from Raft: '
         ~ (hashicorp_vault_nodes | difference(_hashicorp_vault_raft_peer_ids)) ~
         '. They did not join — check unseal + retry_join on those hosts.' }}
    quiet: true
  run_once: true

# GHOST-PEER GUARD — raft members that are NOT in the play's desired node set.
# Stale peers still count toward quorum. Cluster is unhealthy until
# `raft remove-peer` (or --tags remove_peers) drops them.
- name: "Assert there are no stale Raft peers outside the desired node set"
  ansible.builtin.assert:
    that:
      - _hashicorp_vault_raft_peer_ids | difference(hashicorp_vault_nodes) | length == 0
    fail_msg: >-
      Stale Raft peers not in the play:
      {{ _hashicorp_vault_raft_peer_ids | difference(hashicorp_vault_nodes) }}.
      They still count toward quorum. Remove them (the role can do it for you):
        ansible-playbook ... --tags remove_peers
      or manually on {{ hashicorp_vault_first_node }}, e.g.:
      {% for id in (_hashicorp_vault_raft_peer_ids | difference(hashicorp_vault_nodes)) %}
      docker exec {{ hashicorp_vault_name }} vault operator raft remove-peer {{ id }}
      {% endfor %}
    success_msg: >-
      Raft membership matches the desired {{ hashicorp_vault_node_count }}-node set —
      no stale peers.
    quiet: true
  run_once: true
  when: _hashicorp_vault_peers.rc == 0

- name: "Report cluster status"
  ansible.builtin.debug:
    msg: >-
      hashicorp_vault_container ready:
      {{ hashicorp_vault_node_count }}-node
      {{ 'Raft HA cluster' if hashicorp_vault_is_ha | bool else 'standalone Vault' }}.
      Init material on {{ hashicorp_vault_first_node }}:{{ hashicorp_vault_keys_dir }}/vault_init.json
  run_once: true

# ── Enterprise license assurance (license_enabled only) ──────────────────────
# File-in-place is not license-in-effect: a wrong (Community) image, a stale
# container, or a failed hot-reload all leave license.hclic looking correct
# while Vault runs unlicensed — and then refuses to START on the next restart.
# Ask the running binary what it actually loaded.
- name: "Verify | Read the autoloaded license status (license get)"
  become: true  # root: docker exec needs the root-owned docker socket
  ansible.builtin.command:
    cmd: >-
      docker exec -e VAULT_TOKEN {{ hashicorp_vault_name }}
      vault license get -format=json
  environment:
    VAULT_TOKEN: "{{ _verify_root_token }}"
  register: _hashicorp_vault_license_status
  changed_when: false
  failed_when: false
  no_log: true  # output carries license identifiers; token is in env
  run_once: true
  delegate_to: "{{ hashicorp_vault_first_node }}"
  when: hashicorp_vault_license_enabled | bool

- name: "Verify | Assert the running Vault autoloaded the license"
  ansible.builtin.assert:
    that:
      - _hashicorp_vault_license_status.rc == 0
      - "'autoloaded' in ((_hashicorp_vault_license_status.stdout | from_json).data | default({}))"
    fail_msg: >-
      hashicorp_vault_license_enabled is true but the running Vault reports no
      autoloaded license. Check on {{ hashicorp_vault_first_node }}:
      (1) the image is Enterprise (*-ent tag) — docker inspect -f
      {% raw %}'{{.Config.Image}}'{% endraw %} {{ hashicorp_vault_name }};
      (2) license.hclic is visible in the container — docker exec
      {{ hashicorp_vault_name }} cat /vault/config/license.hclic;
      (3) the container restarted since the file landed — docker exec
      {{ hashicorp_vault_name }} vault license get.
    quiet: true
  run_once: true
  when: hashicorp_vault_license_enabled | bool

- name: "Verify | Report the license expiry"
  ansible.builtin.debug:
    msg: >-
      Enterprise license autoloaded; expires
      {{ (_hashicorp_vault_license_status.stdout | from_json).data.autoloaded.expiration_time
         | default('unknown') }}
  run_once: true
  when:
    - hashicorp_vault_license_enabled | bool
    - _hashicorp_vault_license_status.rc | default(1) == 0

# ── Served-certificate assurance (onhost/certmonger TLS only) ────────────────
# The whole point of the sync hook is that what Vault SERVES tracks what
# certmonger ISSUES. Nothing proved that until now: the publish task can report
# "unchanged", the container can be healthy, and the served cert can still be a
# stale copy from an earlier build — every run green, TLS quietly wrong.
# Compare fingerprints; they are exact and cheap.
# Probe the PUBLISHED address, not 127.0.0.1: docker publishes the listener via
# docker-proxy on 0.0.0.0 and loopback is not reachable through it, so a
# 127.0.0.1 probe gets ECONNREFUSED on a perfectly healthy Vault. The FQDN also
# exercises SNI + hostname matching against the certificate.
#
# Prefer canonical_fqdn (environment host identity: vault-01.dev.example.com) over
# inventory_hostname.domain (vCenter object: dev-vault-01.example.com). Certmonger
# SANs and FreeIPA principal follow the OS FQDN, not the inventory key.
- name: "Verify | Resolve the address to probe"
  ansible.builtin.set_fact:
    _hashicorp_vault_probe_host: >-
      {{ canonical_fqdn
         if (canonical_fqdn is defined and (canonical_fqdn | string | length) > 0)
         else ((inventory_hostname ~ '.' ~ hashicorp_vault_domain)
               if (hashicorp_vault_domain | length > 0)
               else ansible_host) }}
  when: hashicorp_vault_tls_onhost | bool

- name: "Verify | Fingerprint the certmonger-issued certificate"
  become: true  # root: reads the root-owned on-host cert
  ansible.builtin.command:
    cmd: "openssl x509 -in {{ hashicorp_vault_tls_onhost_cert }} -noout -fingerprint -sha256"
  register: _hashicorp_vault_disk_fp
  changed_when: false
  when: hashicorp_vault_tls_onhost | bool

- name: "Verify | Fingerprint the certificate Vault actually serves"
  become: true  # root: docker/openssl against the local listener
  ansible.builtin.shell:
    cmd: >-
      echo | openssl s_client -connect {{ _hashicorp_vault_probe_host }}:{{ hashicorp_vault_api_port }}
      -servername {{ _hashicorp_vault_probe_host }} 2>/dev/null
      | openssl x509 -noout -fingerprint -sha256
  register: _hashicorp_vault_served_fp
  changed_when: false
  when: hashicorp_vault_tls_onhost | bool

- name: "Verify | Assert Vault serves the certmonger-issued certificate"
  ansible.builtin.assert:
    that:
      - (_hashicorp_vault_served_fp.stdout | trim) == (_hashicorp_vault_disk_fp.stdout | trim)
    fail_msg: >-
      Vault is serving a DIFFERENT certificate than certmonger issued — the
      published copy under {{ hashicorp_vault_certs_dir }} is stale.
      certmonger: {{ _hashicorp_vault_disk_fp.stdout | trim }}
      served:     {{ _hashicorp_vault_served_fp.stdout | trim }}
      Run {{ hashicorp_vault_tls_sync_script }} on the host, or --tags tls.
    success_msg: "Served certificate matches the certmonger-issued one."
    quiet: true
  when: hashicorp_vault_tls_onhost | bool

# A leaf-only chain still validates against a client that already has the CA, so
# this must check DEPTH, not just trust — otherwise a missing intermediate only
# shows up on someone else's laptop.
- name: "Verify | Assert the served chain validates against the issuing CA"
  become: true  # root: reads the root-owned CA bundle
  ansible.builtin.shell:
    cmd: >-
      echo | openssl s_client -connect {{ _hashicorp_vault_probe_host }}:{{ hashicorp_vault_api_port }}
      -CAfile {{ hashicorp_vault_tls_onhost_ca }} 2>/dev/null
      | grep -E '^(Verify return code|    Verify return code)'
  register: _hashicorp_vault_chain_ok
  changed_when: false
  failed_when: "'Verify return code: 0' not in _hashicorp_vault_chain_ok.stdout"
  when: hashicorp_vault_tls_onhost | bool

# Closes the cross-file convention gap: the inventory's certmonger postsave and
# this role's script path agree only by naming convention. If they drift, the
# hook silently stops running and the cert goes stale at the next renewal.
- name: "Verify | Assert certmonger's post-save hook points at the sync script"
  become: true  # root: certmonger's tracking db
  ansible.builtin.command:
    cmd: "getcert list -f {{ hashicorp_vault_tls_onhost_cert }}"
  register: _hashicorp_vault_getcert_wiring
  changed_when: false
  failed_when: >-
    _hashicorp_vault_getcert_wiring.rc != 0
    or ('post-save command: ' ~ hashicorp_vault_tls_sync_script) not in _hashicorp_vault_getcert_wiring.stdout
  when: hashicorp_vault_tls_onhost | bool
