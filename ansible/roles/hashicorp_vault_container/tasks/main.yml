---
# hashicorp_vault_container — self-contained, auto-scaling containerized Vault.
#
# Deploys HashiCorp Vault as a Docker container with all state on a persistent
# second disk. Topology scales with the play's host count:
#   * 1 host  -> standalone Raft (single server)
#   * N hosts -> Raft HA joining all N nodes
#
# Self-contained: imports NO tasks from hashicorp_vault (the native role).
# Prerequisites (Docker engine + the mounted second disk) are composed at the
# PLAYBOOK level (see README) and asserted here in preflight.
#
# Phases (run with no tags = everything; tags refine for fast iteration):
#   preflight — validate mount, docker, topology; derive scaling facts
#   prereqs   — directories, firewall
#   tls       — self-signed CA + server cert, distributed to nodes
#   license   — optional Enterprise license file (off unless enabled)
#   deploy    — template vault.hcl + compose, start container, wait healthy
#   init      — initialize (once), unseal all nodes, form the Raft cluster
#   verify    — health + Raft peer / seal assertions

- name: "Preflight — validate prerequisites and derive topology"
  ansible.builtin.import_tasks: preflight.yml
  tags: [preflight, always]

- name: "Prerequisites — directories and firewall"
  ansible.builtin.import_tasks: prereqs.yml
  tags: [prereqs]

- name: "TLS — CA and server certificate"
  ansible.builtin.import_tasks: tls.yml
  when: hashicorp_vault_tls_enabled | bool
  tags: [tls]

- name: "License — Enterprise license file (optional; off unless enabled)"
  ansible.builtin.import_tasks: license.yml
  when: hashicorp_vault_license_enabled | bool
  tags: [license]

- name: "Deploy — config, compose, start container"
  ansible.builtin.import_tasks: deploy.yml
  tags: [deploy]

- name: "Init — initialize the cluster (first run only)"
  ansible.builtin.import_tasks: init.yml
  tags: [init]

- name: "Unseal — unseal all nodes (also standalone after a reboot: --tags unseal)"
  ansible.builtin.import_tasks: unseal.yml
  tags: [init, unseal]

- name: "Auto-unseal — optional systemd unseal-on-boot (hashicorp_vault_auto_unseal)"
  ansible.builtin.import_tasks: autounseal.yml
  tags: [autounseal]

- name: "Verify — cluster health"
  ansible.builtin.import_tasks: verify.yml
  tags: [verify]

- name: "Policies — multi-tenant, environment-scoped ACL policies"
  ansible.builtin.import_tasks: policies.yml
  when: hashicorp_vault_manage_policies | bool
  tags: [policies]

- name: "LDAP — auth method + group->policy mappings (FreeIPA)"
  ansible.builtin.import_tasks: ldap.yml
  when: hashicorp_vault_ldap_enabled | bool
  tags: [ldap]

- name: "Identity — cross-auth-method groups (external + nested internal)"
  ansible.builtin.import_tasks: identity.yml
  when: hashicorp_vault_identity_groups | length > 0
  tags: [identity]

- name: "Userpass — human operator accounts (data-driven, optional)"
  ansible.builtin.import_tasks: userpass.yml
  when: hashicorp_vault_userpass_accounts | length > 0
  tags: [userpass]

- name: "AppRole — automation service accounts (data-driven, optional)"
  ansible.builtin.import_tasks: approle.yml
  when: hashicorp_vault_approles | length > 0
  tags: [approle]

- name: "GitLab CI JWT — pipeline JWT->token exchange via the jwt auth method (optional)"
  ansible.builtin.import_tasks: gitlab_jwt.yml
  when: hashicorp_vault_gitlab_jwt_enabled | bool
  tags: [gitlab_jwt]

- name: "Transit — Transit secrets engine + signing/encryption keys (Cosign) (optional)"
  ansible.builtin.import_tasks: transit.yml
  when: hashicorp_vault_transit_enabled | bool
  tags: [transit, cosign]

- name: "PKI — secrets engine mount + tune + issuing roles (optional)"
  ansible.builtin.import_tasks: pki.yml
  when: hashicorp_vault_pki_enabled | bool
  tags: [pki]

- name: "PKI-issuer — import an escrowed issuing CA + set default issuer (optional)"
  ansible.builtin.import_tasks: pki_issuer.yml
  when: hashicorp_vault_pki_issuer_import | bool
  tags: [pki_issuer]

- name: "Audit — enable the file audit device (optional)"
  ansible.builtin.import_tasks: audit.yml
  when: hashicorp_vault_audit_enabled | bool
  tags: [audit]

- name: "Backup — scheduled Raft snapshots"
  ansible.builtin.import_tasks: backup.yml
  when: hashicorp_vault_backup_enabled | bool
  tags: [backup]

- name: "Remove-peers — evict stale Raft peers after a scale-down (opt-in)"
  ansible.builtin.import_tasks: remove_peers.yml
  tags: [never, remove_peers]

- name: "Backup-now — force an on-demand Raft snapshot (opt-in; for nightly CI)"
  ansible.builtin.import_tasks: backup_run.yml
  tags: [never, backup_now]

- name: "Restore — roll back to a Raft snapshot (opt-in, destructive)"
  ansible.builtin.import_tasks: restore.yml
  tags: [never, restore]

# Non-destructive, but forces a real certificate re-issue, so it is opt-in
# rather than part of a normal converge.
- name: "Renew-drill — prove the certmonger renewal path today, not in 90 days (opt-in)"
  ansible.builtin.import_tasks: renew_drill.yml
  tags: [never, renew_drill]
