---
# roles/hashicorp_vault_container/tasks/backup_run.yml
# Force an on-demand Raft snapshot NOW — for a nightly CI/CD job.
#
# Triggers the already-deployed vault-container-backup.service (Type=oneshot)
# SYNCHRONOUSLY: `systemctl start` on a oneshot unit blocks until the script
# exits and returns non-zero if it failed, so a backup failure fails this task
# → fails the play → turns the pipeline red (visible on the morning dashboard).
# It reuses the exact scheduled backup script (leader-only Raft snapshot save +
# copy-out + retention prune), so a forced run and the 02:00 timer run are
# byte-for-byte identical.
#
# Runs on EVERY node, mirroring the timer: the script self-selects the active
# Raft leader (is_self) and takes exactly one snapshot; unsealed standbys exit 0
# ("skipping"), while an unreachable/sealed node or an empty snapshot exits
# non-zero so the failure surfaces. No need to pick the leader in the play.
#
# `never`-tagged: runs ONLY with an explicit `--tags backup_now`, never on a
# normal converge. Requires the unit to already exist (deployed by `--tags
# backup`); asserts that with an actionable message.
#
#   ansible-playbook -i inventories/<env>/hosts.yml <vault play> --tags backup_now

- name: "Backup-now | Stat the backup service unit"
  ansible.builtin.stat:
    path: /etc/systemd/system/vault-container-backup.service
  register: _hashicorp_vault_backup_unit

- name: "Backup-now | Assert the backup unit is deployed"
  ansible.builtin.assert:
    that:
      - _hashicorp_vault_backup_unit.stat.exists
    fail_msg: >-
      vault-container-backup.service is not deployed on {{ inventory_hostname }} —
      run the role once with `--tags backup` first (it installs the script,
      service and timer, and mints the scoped token), then `--tags backup_now`
      can force a run.
    quiet: true

- name: "Backup-now | Force a Raft snapshot and fail loudly on error"
  block:
    # Deliberate command-over-module: we are INVOKING a oneshot batch job and need
    # its exit code as the CI failure signal, not converging a service to a desired
    # state. `systemctl start` on a oneshot blocks until ExecStart exits and returns
    # non-zero on failure; the systemd module's contract is state, not
    # "run-and-surface-rc", so command is the honest tool.
    - name: "Backup-now | Trigger vault-container-backup.service (synchronous)"  # noqa: command-instead-of-module
      become: true  # root: starts a systemd unit
      ansible.builtin.command:
        cmd: systemctl start vault-container-backup.service
      changed_when: true

    - name: "Backup-now | Report the newest snapshot on this node"
      become: true  # root: lists the root-only (0750) backup dir
      ansible.builtin.command:
        cmd: >-
          find {{ hashicorp_vault_backup_dir }} -maxdepth 1 -type f
          -name 'vault-snapshot-*.snap'
          -printf '%TY-%Tm-%Td %TH:%TM  %p\n'
      register: _hashicorp_vault_backup_list
      changed_when: false

    - name: "Backup-now | Show the latest snapshot"
      ansible.builtin.debug:
        msg: >-
          Vault backup ran OK on {{ inventory_hostname }} — latest snapshot:
          {{ (_hashicorp_vault_backup_list.stdout_lines | sort | last)
             if _hashicorp_vault_backup_list.stdout_lines | length > 0
             else '(none on this node — a standby skips; the leader holds the snapshot)' }}

  rescue:
    - name: "Backup-now | Backup failed — capture the service journal"
      become: true  # root: reads the systemd journal for a system unit
      ansible.builtin.command:
        cmd: journalctl -u vault-container-backup.service -n 40 --no-pager
      register: _hashicorp_vault_backup_journal
      changed_when: false
      failed_when: false

    - name: "Backup-now | Re-raise with the failure log inline"
      ansible.builtin.fail:
        msg: |-
          Vault Raft snapshot FAILED on {{ inventory_hostname }}.
          Recent vault-container-backup.service journal:
          {{ _hashicorp_vault_backup_journal.stdout | default('(journal unavailable)') }}
