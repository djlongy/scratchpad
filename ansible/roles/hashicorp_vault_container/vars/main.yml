---
# hashicorp_vault_container — non-overridable constants.

base_task_name: "hashicorp_vault_container"

# Fixed in-container paths (the official hashicorp/vault image layout).
hashicorp_vault_container_config_dir: "/vault/config"
hashicorp_vault_container_data_dir: "/vault/data"
hashicorp_vault_container_certs_dir: "/vault/certs"
hashicorp_vault_container_logs_dir: "/vault/logs"

# uid:gid of the `vault` user inside the official image. The container runs
# AS this user (see docker-compose template) so bind-mount permissions on
# the host data directory line up.
hashicorp_vault_uid: "100"
hashicorp_vault_gid: "1000"
