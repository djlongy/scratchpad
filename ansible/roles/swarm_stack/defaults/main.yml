---
# swarm_stack — generic compose-first Docker Swarm stack deployer.
#
# A thin <app>_swarm wrapper role supplies a compose template + a manifest
# (the variables below) and calls `include_role: swarm_stack`. This engine:
#   1. mkdir each NFS subpath / bind path (delegated)
#   2. (optional) bootstrap missing Vault secrets with auto-generated passphrases
#   3. docker secret create (external, rolling versions, value via stdin, no_log)
#   4. docker config create (external, rolling versions, content-hashed name)
#   5. docker_network per overlay (attachable + encrypted IPSec)
#   6. docker_volume on every candidate host (NFS-backed local driver)
#   7. render compose.yml.j2 with resolved object names injected
#   8. docker stack deploy -c (prune + resolve-image + optional registry auth)
#   9. prune obsolete labeled secret/config versions
#
# SECRETS ARE CONSUMED VIA /run/secrets — HARD RULE
# ──────────────────────────────────────────────────────────────────────
# The engine NEVER reads a plaintext secret value into an Ansible var for
# templating, nor bakes one into the rendered compose file. Containers
# read their secret from /run/secrets/<logical_name> (native *_FILE env
# var, or an entrypoint shim that exports from the tmpfs file at start).
#
# COMPOSE TEMPLATE CONTRACT
# ──────────────────────────────────────────────────────────────────────
# deploy.yml renders swarm_stack_compose_template with three dicts in
# scope so the compose file references the resolved (versioned) names:
#   secret_names[<logical>]   → external docker secret name (e.g. pg_password_v0003)
#   config_names[<logical>]   → external docker config name
#   network_names[<logical>]  → overlay network name
# Reference them in the compose `secrets:` / `configs:` / `networks:`
# top-level maps as `external: true` + `name: "{{ secret_names.x }}"`.

# ── Stack identity ────────────────────────────────────────────────────
swarm_stack_name: ""
swarm_stack_dir: "/opt/swarm-stacks/{{ swarm_stack_name }}"

# Absolute path to the stack's compose template (set by the wrapper role,
# typically "{{ role_path }}/templates/compose.yml.j2").
swarm_stack_compose_template: ""

# Keep the rendered compose file on the manager (0640, no secrets inside)
# for auditability/debugging. Set false to render-and-remove.
swarm_stack_keep_rendered: true

# Pass --with-registry-auth so swarm workers can pull from a private
# registry using the manager's stored credentials. Enable for Harbor etc.
swarm_stack_with_registry_auth: false

# ── NFS shared backend ────────────────────────────────────────────────
#   host:   inventory_hostname of the NFS server (used for delegate_to
#           mkdir on each volume's subpath)
#   server: IP/host the swarm workers will mount the share from. Use an
#           IP — overlay-attached containers may not resolve names.
#   base:   export root on the NFS host (e.g. /srv/nfs)
swarm_stack_nfs:
  host: ""
  server: ""
  base: /srv/nfs

# ── Volume list ───────────────────────────────────────────────────────
# Each entry is one of three types:
#   type: volume (default) — NFS-backed local-driver docker volume.
#     name, subpath, [uid=0], [gid=0], [mode="0755"]
#   type: bind             — host path bind mount.
#     name, source, [bind_hosts=swarm_stack_volume_hosts], [uid], [gid], [mode]
#   type: tmpfs            — RAM-only; nothing pre-created here.
#     name
swarm_stack_volumes: []

# Hosts on which the NFS-backed volumes get pre-created. Defaults to every
# swarm worker (where stateful services typically run).
swarm_stack_volume_hosts: "{{ groups['swarm_workers'] | default(groups['swarm_cluster'] | default([])) }}"

# ── Overlay networks ──────────────────────────────────────────────────
# Pre-created via docker_network with attachable+encrypted (IPSec) before
# deploy. Encrypted overlays wrap VXLAN in ESP (protocol 50): every swarm
# host's firewalld must allow ESP + UDP 4500 (NAT-T).
#   - name:       docker network name (also the compose external name)
#     attachable: bool, default true
#     encrypted:  bool, default true
#     subnet:     CIDR (pin via swarm_overlay_subnets registry; omit to
#                 let swarm auto-pick from its default pool)
#     gateway:    optional gateway IP inside subnet
#     ip_range:   optional restriction within subnet
swarm_stack_networks: []

# ── Docker configs ────────────────────────────────────────────────────
# Rendered from a Jinja template, hashed for versioning, created via
# community.docker.docker_config (rolling_versions=true). Resolved name
# lands in config_names[name] for the compose template.
#   - name: logical key
#     src:  absolute path to the template file
swarm_stack_configs: []

# ── Docker secrets (declared value, or HashiCorp Vault-backed) ────────
# Each value is resolved declared-value-first, then created via
# community.docker.docker_secret (rolling_versions=true). Resolved name
# lands in secret_names[name] for the compose template. The plaintext
# value is NEVER retained — see the /run/secrets hard rule above.
#   - name:           logical key (required)
#     value:          the secret value supplied directly (e.g. from an
#                     ansible-vault var). When set it WINS and no HashiCorp
#                     Vault read happens for this entry — this is the
#                     portable, HashiCorp-free path.
#     vault_path:     full KV path, e.g. kv/apps/mattermost/runtime
#                     (HashiCorp Vault FALLBACK — used only when `value` is unset)
#     vault_field:    field within that path (with vault_path)
#     auto_generate:  true → generate passphrase + write to Vault if missing
#                     false → fail if missing (caller must seed it or set `value`)
# Supply `value` for every secret to run with no HashiCorp Vault at all; mix
# the two freely per entry otherwise.
swarm_stack_secrets: []

# Vault address the control node uses to read/write Vault-backed secrets. Only
# consulted for entries that omit `value`; irrelevant when every secret declares
# a value. Defaults to the VAULT_ADDR in the operator's environment, falling back
# to a placeholder — set this in inventory (or export VAULT_ADDR) for your site.
swarm_stack_vault_addr: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') | default('https://vault.example.com:8200', true) }}"

# Number of old hashed secret/config versions to retain for rollback.
# (prune_objects.yml drops anything not in the resolved-name registry.)
swarm_stack_keep_versions: 2
