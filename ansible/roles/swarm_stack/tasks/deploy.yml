---
# Render the stack's compose template with resolved (versioned) docker
# object names injected, then deploy via `docker stack deploy -c`.
#
# WHY THIS PRESERVES ROLLING SECRET ROTATION
# ──────────────────────────────────────────────────────────────────────
# Secrets/configs are created with rolling_versions=true, so their real
# names carry a _vNNN suffix. The compose template references them as
# `external: true` + `name: "{{ secret_names.<logical> }}"`. Rotating a
# value in Vault → new version → new name → compose diff → swarm rolls
# the service. No plaintext value is rendered into the compose file;
# containers read /run/secrets/<name>.

- name: Ensure stack staging dir exists
  ansible.builtin.file:
    path: "{{ swarm_stack_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Render compose file
  ansible.builtin.template:
    src: "{{ swarm_stack_compose_template }}"
    dest: "{{ swarm_stack_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0640"
  vars:
    secret_names: "{{ swarm_stack_secret_names | default({}) }}"
    config_names: "{{ swarm_stack_config_names | default({}) }}"
    network_names: "{{ swarm_stack_network_names | default({}) }}"

- name: Deploy the stack
  community.docker.docker_stack:
    name: "{{ swarm_stack_name }}"
    compose:
      - "{{ swarm_stack_dir }}/compose.yml"
    prune: true
    resolve_image: always
    with_registry_auth: "{{ swarm_stack_with_registry_auth | bool }}"
    state: present
  register: _swarm_stack_deploy

- name: Summarise deployed services
  ansible.builtin.command:
    cmd: "docker stack services {{ swarm_stack_name }} --format '{% raw %}{{.Name}}\t{{.Replicas}}\t{{.Image}}{% endraw %}'"
  register: _swarm_stack_summary
  changed_when: false

- name: Service summary
  ansible.builtin.debug:
    msg: "{{ _swarm_stack_summary.stdout_lines }}"

# The rendered compose file holds no secrets (only external references),
# so it's kept at 0640 for auditability by default. Set
# swarm_stack_keep_rendered=false to render-and-remove (zero footprint).
- name: Remove rendered compose file when keep-rendered is disabled
  ansible.builtin.file:
    path: "{{ swarm_stack_dir }}/compose.yml"
    state: absent
  when: not (swarm_stack_keep_rendered | bool)
