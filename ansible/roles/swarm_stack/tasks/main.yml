---
# Compose-first orchestrator. A no-tag run does the full idempotent
# deploy: validate → secrets → configs → networks → volumes → deploy →
# prune. Teardown only fires on --tags redeploy or --tags teardown.
# Tags are refinement (narrow a converge for fast iteration), except the
# `never`-gated ops: teardown / wipe-data (destructive) and stop / start
# (non-destructive scale-to-0 and back, for host maintenance).
#
# COMPOSE-FIRST CONTRACT
# ──────────────────────────────────────────────────────────────────────
# The caller (a thin <app>_swarm role) supplies:
#   - swarm_stack_name
#   - swarm_stack_compose_template  (path to its templates/compose.yml.j2)
#   - swarm_stack_secrets / _configs / _networks / _volumes / _nfs  (manifest)
# This engine pre-creates the external docker objects from Vault/templates,
# then renders the compose template with the RESOLVED (versioned) object
# names injected as secret_names / config_names / network_names, and runs
# `docker stack deploy -c`. Secrets are consumed by containers via
# /run/secrets/<name> — no plaintext value is ever read into a var or
# baked into the rendered compose file.

- name: Validate inputs and classify volumes
  ansible.builtin.import_tasks: validate.yml
  tags: [always]

- name: Tear down existing stack + labeled docker objects
  ansible.builtin.import_tasks: teardown.yml
  tags: [never, redeploy, teardown]

# Non-destructive stop / start for host maintenance — scales services to 0
# (and back) without removing the stack or any data. `never`-gated so a
# normal converge never stops a live stack.
- name: Stop / start stack services non-destructively
  ansible.builtin.import_tasks: scale.yml
  tags: [never, stop, start]

- name: Bootstrap missing Vault secrets
  ansible.builtin.import_tasks: bootstrap_secrets.yml
  when: swarm_stack_secrets | length > 0
  tags: [swarm_stack, secrets, redeploy]

- name: Create docker secrets (external, rolling versions)
  ansible.builtin.import_tasks: docker_secrets.yml
  when: swarm_stack_secrets | length > 0
  tags: [swarm_stack, secrets, redeploy]

- name: Create docker configs (external, rolling versions)
  ansible.builtin.import_tasks: configs.yml
  when: swarm_stack_configs | length > 0
  tags: [swarm_stack, configs, redeploy]

- name: Pre-create overlay networks (attachable + encrypted)
  ansible.builtin.import_tasks: networks.yml
  when: swarm_stack_networks | length > 0
  tags: [swarm_stack, networks, redeploy]

- name: Ensure volume host paths and pre-create NFS volumes
  ansible.builtin.import_tasks: volumes.yml
  when: swarm_stack_volumes | length > 0
  tags: [swarm_stack, volumes, redeploy]

- name: Render compose and deploy the stack
  ansible.builtin.import_tasks: deploy.yml
  tags: [swarm_stack, deploy, redeploy]

- name: Prune obsolete secret/config versions
  ansible.builtin.import_tasks: prune_objects.yml
  tags: [swarm_stack, prune, redeploy]
