---
# Pre-create overlay networks (attachable + encrypted) so each service
# can attach by name in the compose file. Encryption (IPSec) is opt-in
# for swarm overlays — without `--opt encrypted` the east-west VXLAN
# traffic between swarm hosts is in the clear.
#
# Runs on the swarm manager — overlay networks are swarm-wide objects in
# raft, so creating once on a manager is sufficient.
#
# IPAM: if `subnet` is set on the entry, the network is created with an
# explicit IPAM config (subnet + optional gateway + ip_range). Without
# it, swarm picks from the default pool, which can collide unpredictably
# between stacks. Best practice is to pin subnets via the
# swarm_overlay_subnets registry in group_vars/all.yml.

- name: Create overlay networks for the stack
  community.docker.docker_network:
    name: "{{ item.name }}"
    driver: overlay
    attachable: "{{ item.attachable | default(true) }}"
    driver_options:
      encrypted: "{{ (item.encrypted | default(true)) | string | lower }}"
    ipam_config: >-
      {{ [{
            'subnet':   item.subnet,
            'gateway':  item.gateway   | default(omit),
            'iprange':  item.ip_range  | default(omit)
          }]
         if (item.subnet is defined and (item.subnet | length) > 0)
         else omit }}
    labels:
      swarm_stack: "{{ swarm_stack_name }}"
  loop: "{{ swarm_stack_networks }}"
  loop_control:
    label: >-
      {{ item.name }}
      (encrypted={{ item.encrypted | default(true) }},
      subnet={{ item.subnet | default('auto') }})

# Overlay names are stable (not versioned like secrets/configs), but
# publish a name registry anyway so the compose template references all
# external objects through the same injected-dict pattern.
- name: Build resolved network-name registry
  ansible.builtin.set_fact:
    swarm_stack_network_names: >-
      {{ dict(swarm_stack_networks | map(attribute='name')
              | zip(swarm_stack_networks | map(attribute='name'))) }}
