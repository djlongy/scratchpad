---
# Read each secret value from Vault on the control node, then create the
# docker secret on the swarm manager via community.docker.docker_secret.
#
# rolling_versions=true means the module appends _vNNN — a content change
# creates a new version, services on the old version keep working until
# their update rolls them. The actual versioned name lands in
# result.secret_name and is published in swarm_stack_secret_names for the
# compose template to reference (secrets: external + name: <versioned>).
#
# NOTE (compose-first / security): the plaintext value is NEVER retained
# in an Ansible var. Containers read it from /run/secrets/<logical_name>.
# There is deliberately no swarm_stack_secret_values registry here.

- name: Read secret values from Vault
  ansible.builtin.command:
    argv:
      - vault
      - kv
      - get
      - "-mount={{ item.vault_path.split('/')[0] }}"
      - "-field={{ item.vault_field }}"
      - "{{ '/'.join(item.vault_path.split('/')[1:]) }}"
  environment:
    VAULT_ADDR: "{{ swarm_stack_vault_addr }}"
  delegate_to: localhost
  become: false
  loop: "{{ swarm_stack_secrets }}"
  loop_control:
    label: "{{ item.name }}"
  register: _swarm_stack_secret_reads
  changed_when: false
  no_log: true

- name: Create docker secrets (rolling versions)
  community.docker.docker_secret:
    name: "{{ item.0.name }}"
    data: "{{ item.1.stdout }}"
    rolling_versions: true
    state: present
    labels:
      swarm_stack: "{{ swarm_stack_name }}"
      swarm_stack_service: "{{ item.0.name }}"
  loop: "{{ swarm_stack_secrets | zip(_swarm_stack_secret_reads.results) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  register: _swarm_stack_secret_results
  no_log: true

- name: Build resolved secret-name registry
  ansible.builtin.set_fact:
    swarm_stack_secret_names: >-
      {{ dict(swarm_stack_secrets | map(attribute='name')
              | zip(_swarm_stack_secret_results.results | map(attribute='secret_name'))) }}
