---
# Auto-generate any declared secret that is missing from Vault.
# All Vault interaction runs on the control node (where ~/.vault-token
# lives). Secret values are passed via env vars, never command line, and
# every task that touches them sets no_log.

- name: Read declared secrets from Vault
  ansible.builtin.command:
    argv:
      - vault
      - kv
      - get
      - "-mount={{ item.vault_path.split('/')[0] }}"
      - "-field={{ item.vault_field }}"
      - "{{ '/'.join(item.vault_path.split('/')[1:]) }}"
  environment:
    VAULT_ADDR: "{{ swarm_stack_vault_addr }}"
  delegate_to: localhost
  become: false
  loop: "{{ swarm_stack_secrets }}"
  loop_control:
    label: "{{ item.name }}"
  register: _swarm_stack_vault_reads
  changed_when: false
  failed_when: false
  no_log: true

# Build a list of secrets that need to be generated. Each entry pairs
# the original spec with whatever was on Vault (empty string if missing).
- name: Compute which secrets need generating
  ansible.builtin.set_fact:
    _swarm_stack_to_generate: >-
      {{ swarm_stack_secrets
         | zip(_swarm_stack_vault_reads.results)
         | selectattr('1.rc', 'ne', 0)
         | map(attribute='0')
         | selectattr('auto_generate', 'defined')
         | selectattr('auto_generate')
         | list }}

- name: Fail when a non-auto-generate secret is missing
  ansible.builtin.assert:
    that:
      - item.0.rc == 0 or (item.1.auto_generate | default(false))
    fail_msg: >-
      Secret '{{ item.1.name }}' is missing at
      {{ item.1.vault_path }}:{{ item.1.vault_field }} and auto_generate
      is not enabled. Seed it manually or set auto_generate: true.
  loop: "{{ _swarm_stack_vault_reads.results | zip(swarm_stack_secrets) | list }}"
  loop_control:
    label: "{{ item.1.name }}"
  no_log: true

- name: Generate + write missing secrets to Vault
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -euo pipefail
      VAL=$(python3 "{{ role_path }}/files/passphrase.py")
      MOUNT="{{ item.vault_path.split('/')[0] }}"
      REL="{{ '/'.join(item.vault_path.split('/')[1:]) }}"
      FIELD="{{ item.vault_field }}"
      if vault kv metadata get -mount="$MOUNT" "$REL" >/dev/null 2>&1; then
          vault kv patch -mount="$MOUNT" "$REL" "$FIELD=$VAL" >/dev/null
      else
          vault kv put -mount="$MOUNT" "$REL" "$FIELD=$VAL" >/dev/null
      fi
  environment:
    VAULT_ADDR: "{{ swarm_stack_vault_addr }}"
  delegate_to: localhost
  become: false
  loop: "{{ _swarm_stack_to_generate }}"
  loop_control:
    label: "{{ item.name }} → {{ item.vault_path }}:{{ item.vault_field }}"
  no_log: true
  register: _swarm_stack_vault_writes
  changed_when: true
