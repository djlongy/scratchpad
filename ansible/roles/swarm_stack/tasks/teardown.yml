---
# Tear down everything this stack owns: services first (they hold
# references to the secrets/configs/networks/volumes), then sweep
# labeled secrets/configs, then networks, then per-host local volumes.
#
# NFS data on disk is preserved by default. To also wipe data, run with
# `--tags wipe-data` in addition to redeploy/teardown.
#
# Service discovery uses three filters and dedupes:
#   - by our own `swarm_stack=<name>` label (services this role created)
#   - by the legacy `app_swarm_stack=<name>` label (transition support
#     for stacks deployed before the rename — safe to remove once every
#     stack has been redeployed under the new label)
#   - by name prefix `<stack>_` (services left over from a legacy stack
#     deploy that didn't carry either label)

# Explicit `docker stack rm` — the community.docker.docker_stack state=absent
# path can report changed without actually removing the stack on newer
# docker/community.docker combos, so we shell out (verified reliable).
- name: Remove the stack (all its services at once)
  ansible.builtin.command:
    cmd: "docker stack rm {{ swarm_stack_name }}"
  register: _swarm_stack_rm
  changed_when: "'Removing' in (_swarm_stack_rm.stdout + _swarm_stack_rm.stderr)"
  failed_when:
    - _swarm_stack_rm.rc != 0
    - "'nothing found' not in (_swarm_stack_rm.stderr | lower)"

- name: Wait for the stack's services to drain
  ansible.builtin.command:
    cmd: >-
      docker service ls
      --filter label=com.docker.stack.namespace={{ swarm_stack_name }}
      --format '{% raw %}{{.Name}}{% endraw %}'
  register: _swarm_stack_drain
  until: _swarm_stack_drain.stdout | trim | length == 0
  retries: 30
  delay: 2
  changed_when: false

# Belt-and-braces: sweep any stragglers left under the stack's labels or
# name prefix (e.g. services from a legacy per-service deploy that didn't
# go through `docker stack deploy`, so `docker stack rm` doesn't see them).
- name: Discover any straggler services for this stack
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ( docker service ls --format '{% raw %}{{.Name}}{% endraw %}' --filter label=swarm_stack={{ swarm_stack_name }};
        docker service ls --format '{% raw %}{{.Name}}{% endraw %}' --filter label=app_swarm_stack={{ swarm_stack_name }};
        docker service ls --format '{% raw %}{{.Name}}{% endraw %}' --filter name={{ swarm_stack_name }}_ ) | sort -u
    executable: /bin/bash
  register: _swarm_stack_existing_services
  changed_when: false

- name: Remove straggler services
  community.docker.docker_swarm_service:
    name: "{{ item }}"
    state: absent
  loop: "{{ _swarm_stack_existing_services.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Discover existing configs for this stack
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      ( docker config ls --format '{% raw %}{{.Name}}{% endraw %}' --filter label=swarm_stack={{ swarm_stack_name }};
        docker config ls --format '{% raw %}{{.Name}}{% endraw %}' --filter label=app_swarm_stack={{ swarm_stack_name }} ) | sort -u
    executable: /bin/bash
  register: _swarm_stack_existing_configs
  changed_when: false

- name: Remove all stack configs
  community.docker.docker_config:
    name: "{{ item }}"
    state: absent
    force: true
  loop: "{{ _swarm_stack_existing_configs.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Discover existing secrets for this stack
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      ( docker secret ls --format '{% raw %}{{.Name}}{% endraw %}' --filter label=swarm_stack={{ swarm_stack_name }};
        docker secret ls --format '{% raw %}{{.Name}}{% endraw %}' --filter label=app_swarm_stack={{ swarm_stack_name }} ) | sort -u
    executable: /bin/bash
  register: _swarm_stack_existing_secrets
  changed_when: false

- name: Remove all stack secrets
  community.docker.docker_secret:
    name: "{{ item }}"
    state: absent
    force: true
  loop: "{{ _swarm_stack_existing_secrets.stdout_lines | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Remove overlay networks
  community.docker.docker_network:
    name: "{{ item.name }}"
    state: absent
    force: true
  loop: "{{ swarm_stack_networks | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

# Kill any leftover stopped/exited containers on each candidate worker
# that still hold a reference to the local-driver NFS volumes —
# otherwise docker_volume(state=absent) hits 409 "volume is in use".
- name: Prune stopped containers on each candidate worker
  ansible.builtin.command:
    cmd: "docker container prune -f"
  delegate_to: "{{ item }}"
  loop: "{{ swarm_stack_volume_hosts }}"
  loop_control:
    label: "{{ item }}"
  register: _swarm_stack_container_prune
  changed_when: "'Total reclaimed space' in _swarm_stack_container_prune.stdout and 'Deleted Containers' in _swarm_stack_container_prune.stdout"

- name: Remove local-driver NFS volumes from each candidate host
  community.docker.docker_volume:
    name: "{{ item.0.name }}"
    state: absent
  delegate_to: "{{ item.1 }}"
  # Only the NFS-backed `volume` entries get a docker_volume — bind and
  # tmpfs entries are host-path / RAM-only and have no docker_volume
  # to remove. Iterating them here would be a wasteful no-op per host,
  # and would surface confusing "no such volume" log lines.
  loop: "{{ _swarm_stack_nfs_volumes | default([]) | product(swarm_stack_volume_hosts | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }} on {{ item.1 }}"
  register: _swarm_stack_volume_rm
  retries: 6
  delay: 5
  until: _swarm_stack_volume_rm is not failed

# DESTRUCTIVE — only fires when explicitly tagged. Wipes the on-disk NFS
# data so the next deploy starts from empty.
#
# Belt-and-braces gating: the [never, wipe-data] tags would normally be
# enough to keep this task quiet on a default run, but Ansible merges
# tags from the parent `import_tasks` directive (which is tagged
# [never, redeploy, teardown] in main.yml). The merge means a user
# running `--tags redeploy` accidentally matches on `redeploy` here
# too, overriding the `never` and silently nuking their NFS data. The
# explicit `when` on ansible_run_tags makes wipe-data's gate
# inheritance-proof: it fires ONLY when the user explicitly types
# `wipe-data`, regardless of how tags inherit.
- name: Wipe NFS data directories (DESTRUCTIVE)
  ansible.builtin.file:
    path: "{{ swarm_stack_nfs.base }}/{{ item.subpath }}"
    state: absent
  # Only NFS-backed volume entries have a `subpath` field. Bind entries
  # carry a `source` (host path that's outside the role's lifecycle) and
  # tmpfs entries have nothing on disk. Iterating swarm_stack_volumes
  # here would dereference an undefined item.subpath on bind/tmpfs and
  # raise AnsibleUndefinedError mid-loop.
  loop: "{{ _swarm_stack_nfs_volumes | default([]) }}"
  loop_control:
    label: "{{ item.subpath }}"
  delegate_to: "{{ swarm_stack_nfs.host }}"
  become: true
  when: "'wipe-data' in ansible_run_tags"
  tags: [never, wipe-data]
