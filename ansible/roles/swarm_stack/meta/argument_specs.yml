---
argument_specs:
  main:
    short_description: Generic compose-first Docker Swarm stack deployer.
    description:
      - Pre-creates external docker secrets, configs, overlay networks and
        NFS/bind volumes, then renders the stack's compose template with the
        resolved (versioned) object names injected and runs
        C(docker stack deploy -c).
      - Secrets are consumed by containers via C(/run/secrets/<name>); the
        engine never reads a plaintext value into a variable for templating.
    options:
      swarm_stack_name:
        type: str
        required: true
        description: Stack name (becomes the docker stack name and label).
      swarm_stack_compose_template:
        type: str
        required: true
        description: >-
          Absolute path to the stack's compose.yml.j2 on the control node,
          typically "{{ role_path }}/templates/compose.yml.j2".
      swarm_stack_dir:
        type: str
        default: /opt/swarm-stacks/<name>
        description: Staging dir on the manager for the rendered compose + configs.
      swarm_stack_keep_rendered:
        type: bool
        default: true
        description: Keep the rendered compose file on disk (it holds no secrets).
      swarm_stack_with_registry_auth:
        type: bool
        default: false
        description: Pass --with-registry-auth for private-registry pulls.
      swarm_stack_secrets:
        type: list
        elements: dict
        default: []
        description: >-
          List of {name, value?, vault_path?, vault_field?, auto_generate?}.
          Value is resolved declared-value-first (`value`, e.g. an ansible-vault
          var) with a HashiCorp Vault read (vault_path:vault_field) as fallback,
          so the role is portable to sites without HashiCorp Vault. Created as
          external rolling-version docker secrets; resolved versioned name is
          exposed to the compose template as secret_names[<name>].
      swarm_stack_configs:
        type: list
        elements: dict
        default: []
        description: >-
          List of {name, src[, target, mode]} docker configs. Resolved name
          exposed as config_names[<name>].
      swarm_stack_networks:
        type: list
        elements: dict
        default: []
        description: >-
          Overlay networks [{name, encrypted, attachable, subnet, gateway,
          ip_range}]. Name exposed as network_names[<name>].
      swarm_stack_volumes:
        type: list
        elements: dict
        default: []
        description: >-
          Volumes [{name, type: volume|bind|tmpfs, subpath|source, bind_hosts,
          uid, gid, mode}].
      swarm_stack_volume_hosts:
        type: list
        elements: str
        default: "groups['swarm_workers']"
        description: Hosts on which NFS-backed local-driver volumes are pre-created.
      swarm_stack_nfs:
        type: dict
        default: {}
        description: >-
          NFS backend {host, server, base}. Required when any NFS-backed
          (type=volume) entry is declared in swarm_stack_volumes.
      swarm_stack_keep_versions:
        type: int
        default: 2
        description: Old hashed secret/config versions to retain for rollback.
