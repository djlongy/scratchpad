---
argument_specs:
  main:
    short_description: "Deploy a stack of services onto an existing Docker Swarm"
    description:
      - >-
        Generic Swarm service deployer. The caller passes a complete
        swarm_stack_* spec (services, volumes, networks, configs, secrets);
        the role creates each object and one docker_swarm_service per entry.
      - >-
        Inputs load eagerly, so swarm_stack_services entries must be scalars
        or references to vars defined OUTSIDE this role. Late-bound values
        (secret values, hashed config names) belong in env_template.
      - >-
        Phase-tagged: a no-tag run deploys; --tags redeploy does a full
        teardown+recreate; --tags teardown only tears down.

    options:
      swarm_stack_name:
        type: str
        required: true
        description: "Stack name. Final swarm service name = <stack>_<service>."
      swarm_stack_dir:
        type: str
        description: "Staging dir on the manager. Default /opt/swarm-stacks/<name>."
      swarm_stack_nfs:
        type: dict
        description: >-
          NFS backend: host (inventory host for delegate_to), server (mount
          IP/host), base (export root). Required when NFS-backed volumes are
          declared.
      swarm_stack_volumes:
        type: list
        elements: dict
        description: >-
          Volume specs. Each: name, type (volume|bind|tmpfs), subpath or
          source, uid, gid, mode, bind_hosts. Per-type schema in
          defaults/main.yml.
      swarm_stack_volume_hosts:
        type: list
        elements: str
        description: >-
          Hosts to pre-create NFS-backed local-driver volumes on. Defaults to
          the swarm_workers inventory group.
      swarm_stack_networks:
        type: list
        elements: dict
        description: >-
          Overlay networks. Each: name, attachable, encrypted, subnet,
          gateway, ip_range.
      swarm_stack_configs:
        type: list
        elements: dict
        description: >-
          Docker configs rendered from Jinja templates. Each: name, src,
          target, mode.
      swarm_stack_secrets:
        type: list
        elements: dict
        description: >-
          Docker secrets. Each: name, var — value read from the named Ansible
          variable (e.g. ansible-vault). Swap the read step in
          create_secrets.yml for a live secret store.
      swarm_stack_services:
        type: list
        elements: dict
        description: >-
          Service specs: name, image, replicas, networks, mounts, publish,
          secrets, placement, placement_max_replicas_per_node, limits,
          restart, update, healthcheck, env_template/env_static. Full schema
          in defaults/main.yml.
      swarm_stack_keep_versions:
        type: int
        default: 2
        description: "Old hashed secret/config versions to retain (informational)."
