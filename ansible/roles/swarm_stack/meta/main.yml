---
galaxy_info:
  role_name: swarm_stack
  author: lab
  description: >-
    Generic Docker Swarm stack engine — reconciles networks, configs, secrets
    (with Vault-backed bootstrap), volumes, bind/NFS subpaths, and deploys a
    compose stack, with prune/teardown. Consumed via include_role by service
    roles (e.g. mattermost_swarm). Stack name, compose, and resources are inputs.
  license: MIT
  min_ansible_version: "2.14"
  galaxy_tags:
    - swarm
    - docker
    - stack
    - deploy
dependencies: []
