---
galaxy_info:
  role_name: swarm_stack
  author: longy
  description: >-
    Generic Docker Swarm service deployer. The caller supplies a list of
    services, an NFS-backed volume layout, encrypted overlay networks,
    optional docker-config templates, and secrets read from Ansible
    variables; the role creates the networks, volumes, configs, and
    secrets, deploys one docker_swarm_service per entry, then prunes
    obsolete labelled objects. Fully agnostic — all values come from the
    caller / inventory.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: [all]
  galaxy_tags:
    - docker
    - swarm
    - container
    - orchestration
    - deploy

dependencies: []
