---
# Thin compose-first wrapper over swarm_stack. Loads the manifest
# (swarm_stack_* spec), appends the conditional LDAP secret + config when
# mattermost_ldap_enabled, then hands off to the generic engine.
#
# The engine pre-creates the external docker secrets/configs/networks/
# volumes and renders templates/compose.yml.j2 with the resolved object
# names injected. Secrets are consumed by containers via /run/secrets/<name>
# — no plaintext value is read into a var or baked into the compose file.
#
# LDAP: the bind password is NOT auto-generated (auto_generate: false) —
# playbooks/mattermost_freeipa_prep.yml seeds it into Vault
# first, against the same FreeIPA user it sets. That ordering keeps
# password creation co-located with the directory it authenticates against.

# Anchor the manifest's template paths on the caller role's own path. After
# swarm_stack is imported, `role_path` refers to the engine, so a bare
# `{{ role_path }}` in the manifest would resolve to swarm_stack/templates
# and the compose file would not be found.
- name: Resolve caller role path for manifest path references
  ansible.builtin.set_fact:
    swarm_stack_caller_role: "{{ role_path }}"
  tags: [always]

- name: Load mattermost_swarm manifest
  ansible.builtin.include_vars:
    file: manifest.yml
  tags: [always]

- name: Append LDAP bind-password secret when LDAP is enabled
  ansible.builtin.set_fact:
    swarm_stack_secrets: "{{ swarm_stack_secrets + [_mm_ldap_bind_secret] }}"
  vars:
    _mm_ldap_bind_secret:
      name: mm_ldap_bind_password
      vault_path: "{{ mattermost_vault_path }}"
      vault_field: ldap_bind_password
      auto_generate: false
  when: mattermost_ldap_enabled | bool
  tags: [always]

- name: Append FreeIPA CA docker config when LDAP is enabled
  ansible.builtin.set_fact:
    swarm_stack_configs: "{{ swarm_stack_configs + [_mm_ldap_ca_config] }}"
  vars:
    _mm_ldap_ca_config:
      name: mm_ldap_ca
      src: "{{ swarm_stack_caller_role }}/templates/mm-freeipa-ca-cert.j2"
  when: mattermost_ldap_enabled | bool
  tags: [always]

# NOT tagged [always]: import_role propagates its tags to every engine task
# at compile time, so [always] here would force the whole engine to run on
# every invocation and defeat --tags stop/start/teardown/deploy refinement.
# Untagged, each engine task's own tags govern (validate is [always], the
# deploy phases run on a no-tag converge, scale/teardown on their opt-in tags).
- name: Deploy Mattermost via the swarm_stack engine
  ansible.builtin.import_role:
    name: swarm_stack
