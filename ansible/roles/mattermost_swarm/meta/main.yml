---
galaxy_info:
  role_name: mattermost_swarm
  author: longy
  description: >-
    Deploy Mattermost (app + PostgreSQL) as a Docker Swarm stack. Thin
    compose-first wrapper over the swarm_stack engine — ships a compose.yml.j2
    plus a manifest of docker secrets/configs/network/NFS volumes. Secrets are
    consumed via /run/secrets. Image, DB, and FreeIPA/LDAP settings are
    defaults/main.yml overrides. Swarm counterpart to the standalone mattermost
    role.
  license: MIT
  min_ansible_version: "2.14"
  galaxy_tags:
    - mattermost
    - swarm
    - docker
    - chat
dependencies: []
