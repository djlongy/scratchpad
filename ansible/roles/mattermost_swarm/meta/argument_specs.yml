---
argument_specs:
  main:
    short_description: "Deploy Mattermost (PostgreSQL + app) onto Docker Swarm"
    description:
      - >-
        Thin wrapper over the swarm_stack role: deploys a single-replica
        PostgreSQL plus N Mattermost app replicas, with optional FreeIPA/LDAP
        SSO. Secrets are read from Ansible variables (ansible-vault).
      - >-
        Requires the swarm_stack role on the roles path (invoked via
        include_role). Secret vars must be defined: vault_mm_pg_password,
        vault_mm_at_rest_key, vault_mm_public_link_salt,
        vault_mm_admin_password, and vault_mm_ldap_bind_password when LDAP
        is enabled.

    options:
      mattermost_swarm_stack_name:
        type: str
        description: "Stack name. Default mattermost."
      mattermost_swarm_stack_dir:
        type: str
        description: "Manager staging dir. Default /opt/swarm-stacks/mattermost."
      mattermost_swarm_nfs_host:
        type: str
        description: "Inventory hostname of the NFS server (for delegate_to mkdir)."
      mattermost_swarm_nfs_server:
        type: str
        description: "IP/host the workers mount the NFS share from (prefer an IP)."
      mattermost_swarm_nfs_base:
        type: str
        description: "NFS export root. Default /srv/nfs."
      mattermost_swarm_pgdata_subpath:
        type: str
        description: "Subpath under the NFS base for the postgres data volume."
      mattermost_swarm_data_subpath:
        type: str
        description: "Subpath under the NFS base for the app data volume."
      mattermost_swarm_pg_uid:
        type: int
        description: "postgres image uid (alpine=70, debian=999). Match the image variant."
      mattermost_swarm_pg_gid:
        type: int
        description: "postgres image gid (alpine=70, debian=999)."
      mattermost_swarm_app_uid:
        type: int
        description: "Mattermost app uid (team-edition=2000)."
      mattermost_swarm_app_gid:
        type: int
        description: "Mattermost app gid (team-edition=2000)."
      mattermost_swarm_pg_db:
        type: str
        description: "PostgreSQL database name. Default mattermost."
      mattermost_swarm_pg_user:
        type: str
        description: "PostgreSQL user. Default mmuser."
      mattermost_swarm_postgres_image:
        type: str
        description: "PostgreSQL image. Default postgres:17-alpine."
      mattermost_swarm_app_image:
        type: str
        description: "Mattermost image. Default mattermost/mattermost-team-edition:9.11."
      mattermost_swarm_replicas:
        type: int
        description: "Number of app replicas. Default 3."
      mattermost_swarm_max_per_node:
        type: int
        description: "Max app replicas per node. Default 1."
      mattermost_swarm_published_port:
        type: int
        description: "Published ingress port. Default 8065."
      mattermost_swarm_site_url:
        type: str
        description: "Mattermost SiteURL (e.g. https://mattermost.example.com)."
      mattermost_swarm_timezone:
        type: str
        description: "Container timezone. Default UTC."
      mattermost_swarm_pg_pinned_node:
        type: str
        description: "Pin postgres to this node.hostname. Empty = unpinned (external HA PG)."
      mattermost_swarm_app_placement_constraints:
        type: list
        elements: str
        description: "App placement constraints. Default [node.role == worker]."
      mattermost_swarm_pg_limit_memory:
        type: str
        description: "postgres memory limit. Default 512M."
      mattermost_swarm_app_limit_memory:
        type: str
        description: "app memory limit. Default 1G."
      mattermost_swarm_ldap_enabled:
        type: bool
        default: false
        description: "Enable FreeIPA/LDAP SSO + ship the FreeIPA CA as a docker config."
      mattermost_swarm_ldap_host:
        type: str
        description: "LDAP/LDAPS host (e.g. freeipa-01.example.com)."
      mattermost_swarm_ldap_port:
        type: int
        description: "LDAP port. Default 636 (LDAPS)."
      mattermost_swarm_ldap_connection_security:
        type: str
        description: "TLS (LDAPS), STARTTLS, or empty for plain."
      mattermost_swarm_ldap_skip_certificate_verification:
        type: bool
        description: "Skip LDAPS cert verification (self-signed CA on a closed network)."
      mattermost_swarm_ldap_base_dn:
        type: str
        description: "LDAP base DN (e.g. dc=example,dc=com)."
      mattermost_swarm_ldap_bind_username:
        type: str
        description: "Bind DN for the service account."
      mattermost_swarm_ldap_user_filter:
        type: str
        description: "LDAP user search filter."
      mattermost_swarm_ldap_group_filter:
        type: str
        description: "LDAP group search filter."
      mattermost_swarm_ldap_id_attribute:
        type: str
        description: "LDAP attribute mapped to the Mattermost ID field."
      mattermost_swarm_ldap_login_id_attribute:
        type: str
        description: "LDAP attribute users log in with."
      mattermost_swarm_ldap_username_attribute:
        type: str
        description: "LDAP attribute mapped to username."
      mattermost_swarm_ldap_email_attribute:
        type: str
        description: "LDAP attribute mapped to email."
      mattermost_swarm_ldap_first_name_attribute:
        type: str
        description: "LDAP attribute mapped to first name."
      mattermost_swarm_ldap_last_name_attribute:
        type: str
        description: "LDAP attribute mapped to last name."
      mattermost_swarm_ldap_nickname_attribute:
        type: str
        description: "LDAP attribute mapped to nickname (optional)."
      mattermost_swarm_ldap_position_attribute:
        type: str
        description: "LDAP attribute mapped to position/title."
      mattermost_swarm_ldap_ca_cert_path:
        type: str
        description: "Path the FreeIPA CA cert lands at inside the app container."
      mattermost_swarm_freeipa_ca_cert_src:
        type: str
        description: "Path to slurp the FreeIPA CA cert FROM. Default /etc/ipa/ca.crt."
