---
# allow_duplicates: the same play may list this role more than once under
# roles: (e.g. mid-list accumulate + final ship with backends). Without this,
# Ansible skips every inclusion after the first.
allow_duplicates: true

galaxy_info:
  role_name: audit_logging
  author: automation
  description: >-
    Portable, backend-agnostic audit logging for ansible-playbook runs.
    Captures run metadata (user, control node, hosts, roles, CLI args, git
    state) and ships one structured JSON record to any combination of file,
    syslog, rsyslog, Fluentd, Elasticsearch, Splunk HEC, or CloudWatch Logs.
  min_ansible_version: "2.14"
  galaxy_tags:
    - audit
    - logging
    - compliance
    - observability
    - splunk
    - elasticsearch
    - cloudwatch

dependencies: []
