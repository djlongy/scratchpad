---
# roles/audit_logging/tasks/main.yml
#
# Portable Ansible Audit Logging.
# Collects execution metadata and routes one structured record to every
# backend listed in `audit_logging_backends` (when mode is `ship`).
#
# ── Mode (audit_logging_mode) ────────────────────────────────────────────
#   ship       — buffer this play, then ship one consolidated record (default)
#   accumulate — buffer this play only; do not ship
#
# Always buffers first (via accumulate.yml), then ships only when mode is
# `ship`. That means intermediate multi-play plays and final ship inclusions
# share one code path — list the role under `roles:` with a mode/backends
# var, no post_tasks or tasks_from required.
#
# ── Ships exactly once per play host-loop ────────────────────────────────
# The body runs for the FIRST host of the whole play only
# (ansible_play_hosts_all | first) — stable across `serial:` batches and the
# `free` strategy, where `run_once` fires once *per batch* and over-ships — and
# all work is delegated to the control node.
#
# ── Single-play (inline roles:) ──────────────────────────────────────────
#   roles:
#     - nginx
#     - role: audit_logging
#       vars:
#         audit_logging_backends: [splunk]
#
# ── Multi-play (inline roles:) ───────────────────────────────────────────
#   - hosts: db
#     roles:
#       - postgresql
#       - { role: audit_logging, vars: { audit_logging_mode: accumulate } }
#   - hosts: web
#     roles:
#       - nginx
#       - { role: audit_logging, vars: { audit_logging_backends: [splunk] } }
#
# Legacy: tasks_from: accumulate still works; mode=accumulate is preferred.
#
# Do NOT use meta: end_host for accumulate mode — that would skip later roles
# on the first host of the play.

- name: Ansible audit logging — buffer this play
  ansible.builtin.include_tasks: accumulate.yml
  # accumulate.yml self-gates to first host of the play.

- name: Ansible audit logging — ship consolidated record
  delegate_to: localhost
  become: false
  # Exactly-once gate: only the FIRST host of the whole play enters. Unlike
  # run_once (which fires once per serial batch and is unreliable under the
  # free strategy), ansible_play_hosts_all is the stable full play host list,
  # so this ships exactly once under linear, serial, and free alike.
  when:
    - inventory_hostname == (ansible_play_hosts_all | first)
    - (audit_logging_mode | default('ship')) == 'ship'
  block:

    # ── Gather ship-time metadata ────────────────────────────────────────

    - name: Get ansible-playbook CLI arguments and git state
      get_cli_args:
      register: _audit_cli_args
      changed_when: false
      # Role-local action plugin (action_plugins/get_cli_args.py). Returns:
      # ansible_playbook_argv, ansible_playbook_cmd, semaphore_vars, git_status

    # Username + hostname are read from configurable binaries, each with a
    # POSIX fallback so the role survives minimal CI/runner images that lack
    # /usr/bin/hostname or whoami.
    - name: Get local username (preferred binary)
      ansible.builtin.command: "{{ audit_logging_whoami_command }}"
      register: _audit_user_primary
      changed_when: false
      failed_when: false

    - name: Fall back to 'id -un' when the username binary is unavailable
      ansible.builtin.command: id -un
      register: _audit_user_fallback
      changed_when: false
      failed_when: false
      when: (_audit_user_primary.rc | default(1)) != 0 or
            (_audit_user_primary.stdout | default('') | trim) == ''

    - name: Get control node hostname (preferred binary)
      ansible.builtin.command: "{{ audit_logging_hostname_command }}"
      register: _audit_hostname_primary
      changed_when: false
      failed_when: false

    - name: Fall back to 'uname -n' when the hostname binary is unavailable
      ansible.builtin.command: uname -n
      register: _audit_hostname_fallback
      changed_when: false
      failed_when: false
      when: (_audit_hostname_primary.rc | default(1)) != 0 or
            (_audit_hostname_primary.stdout | default('') | trim) == ''

    - name: Resolve control-node identity (with fallbacks)
      ansible.builtin.set_fact:
        _audit_user: "{{ (_audit_user_primary.stdout | default('') | trim)
          or (_audit_user_fallback.stdout | default('') | trim) or 'unknown' }}"
        _audit_hostname: "{{ (_audit_hostname_primary.stdout | default('') | trim)
          or (_audit_hostname_fallback.stdout | default('') | trim) or 'unknown' }}"

    # ── Resolve multi-play buffer ────────────────────────────────────────
    # Buffer always includes the current play (we accumulate above). Use it
    # as the sole source so ship never double-appends the current play.
    - name: Resolve accumulated play buffer
      ansible.builtin.set_fact:
        _audit_plays: "{{ hostvars['localhost']['audit_logging_buffer_plays'] | default([]) }}"
        _audit_roles_all: >-
          {{
            (hostvars['localhost']['audit_logging_buffer_roles'] | default([]))
            | unique | sort
          }}

    - name: Build consolidated hosts list
      ansible.builtin.set_fact:
        _audit_hosts_all: >-
          {{
            _audit_plays | map(attribute='hosts') | flatten | unique | sort | list
          }}

    # ── Build structured audit record ──────────────────────────────────────

    - name: Build JSON audit record
      ansible.builtin.set_fact:
        audit_logging_event: "{{ _audit_event }}"
        audit_logging_event_json: "{{ _audit_event | to_json }}"
      vars:
        _audit_event:
          # Uses ansible_date_time when facts are gathered, else a shell lookup
          # so the role works under gather_facts: false.
          timestamp: "{{ ansible_date_time.iso8601 if ansible_date_time is defined else lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
          user: "{{ _audit_user }}"
          control_node: "{{ _audit_hostname }}"
          # playbook: name of the first (or single) play
          playbook: "{{ (_audit_plays | default([{}]))[0].play_name | default('unnamed') }}"
          # plays: full per-play breakdown — name, hosts, roles for each play
          plays: "{{ _audit_plays }}"
          play_count: "{{ _audit_plays | length }}"
          # roles: deduplicated union of all roles across all plays
          roles: "{{ _audit_roles_all | join(', ') }}"
          # hosts: deduplicated union of all target hosts across all plays
          hosts: "{{ _audit_hosts_all }}"
          status: "{{ audit_logging_status | default('success') }}"
          ansible_command: "{{ _audit_cli_args.ansible_playbook_cmd | default('unknown') }}"
          semaphore_vars: "{{ _audit_cli_args.semaphore_vars | default(omit) }}"
          run_tags: "{{ ansible_run_tags | default('all') }}"
          skip_tags: "{{ ansible_skip_tags | default([]) | join(', ') }}"
          git_branch: "{{ _audit_cli_args.git_status.branch | default('unknown') }}"
          git_commit: "{{ _audit_cli_args.git_status.commit | default('unknown') }}"
          git_tag: "{{ _audit_cli_args.git_status.tag | default('unknown') }}"
          git_is_clean: "{{ _audit_cli_args.git_status.is_clean | default(true) }}"
          git_modified_files: "{{ _audit_cli_args.git_status.modified | default([]) }}"
          git_staged_files: "{{ _audit_cli_args.git_status.staged | default([]) }}"
          git_untracked_files: "{{ _audit_cli_args.git_status.untracked | default([]) }}"

    # ── Backend dispatch ───────────────────────────────────────────────────

    - name: Ship audit record to local file
      ansible.builtin.include_tasks: loggers/file.yml
      when: "'file' in audit_logging_backends"

    - name: Ship audit record to syslog
      ansible.builtin.include_tasks: loggers/syslog.yml
      when: "'syslog' in audit_logging_backends"

    - name: Ship audit record to remote rsyslog
      ansible.builtin.include_tasks: loggers/rsyslog.yml
      when: "'rsyslog' in audit_logging_backends"

    - name: Ship audit record to Fluentd
      ansible.builtin.include_tasks: loggers/fluentd.yml
      when: "'fluentd' in audit_logging_backends"

    - name: Ship audit record to Elasticsearch
      ansible.builtin.include_tasks: loggers/elasticsearch.yml
      when: "'elasticsearch' in audit_logging_backends"

    - name: Ship audit record to Splunk HEC
      ansible.builtin.include_tasks: loggers/splunk.yml
      when: "'splunk' in audit_logging_backends"

    - name: Ship audit record to CloudWatch Logs
      ansible.builtin.include_tasks: loggers/cloudwatch.yml
      when: "'cloudwatch' in audit_logging_backends"
  # no_log: true   # uncomment if a play handles sensitive data in its vars
