---
# Remove-peers — reconcile Raft membership to the play's desired node set by
# evicting STALE peers (raft members not in hashicorp_vault_nodes). Opt-in and gated
# by the `never` tag: only runs with `--tags remove_peers`.
#
# This is the automated half of a SCALE-DOWN. The safe procedure is:
#   1. Shrink the desired node set to the survivors — either drop the retiring
#      hosts from the group, or pass -e hashicorp_vault_nodes='[survivors…]'.
#   2. Run `--tags remove_peers` WHILE the surviving cluster is up and unsealed
#      (remove-peer needs an active leader / quorum among what remains).
#   3. Decommission the retired VMs. A normal run then verifies clean.
#
#   ansible-playbook ... --tags remove_peers -e '{"hashicorp_vault_nodes":["node-a"]}'
#
# All Vault calls run on the first SURVIVING node (hashicorp_vault_first_node). Vault
# forwards leader-only operations (list-peers, remove-peer) from any unsealed
# member to the active node, so we never need to hunt for the leader — and it
# works even when the current leader is one of the nodes being evicted (removing
# it just triggers a leadership transfer to a survivor). Never removes a node
# that IS in hashicorp_vault_nodes — only genuine strays.

- name: "Remove-peers | Check the executor (first surviving node) is up"
  become: true  # root: docker exec needs the root-owned docker socket
  ansible.builtin.command:
    cmd: "docker exec {{ hashicorp_vault_name }} vault status -format=json"
  register: _rmp_status
  changed_when: false
  failed_when: false
  run_once: true
  delegate_to: "{{ hashicorp_vault_first_node }}"

- name: "Remove-peers | Assert the executor is up and unsealed"
  ansible.builtin.assert:
    that:
      - _rmp_status.rc in [0, 2]
      - not ((_rmp_status.stdout | default('{}') | from_json).sealed | default(true))
    fail_msg: >-
      {{ hashicorp_vault_first_node }} (first desired node) is not up+unsealed. It is
      the executor for remove-peer — Vault forwards the operation from any
      unsealed member to the active node. Bring the surviving cluster up and
      unsealed first (a normal run / --tags unseal), then retry --tags remove_peers.
    quiet: true
  run_once: true

- name: "Remove-peers | Read the root token from the first node"
  become: true  # root: reads the root-only root_token.txt
  ansible.builtin.slurp:
    src: "{{ hashicorp_vault_keys_dir }}/root_token.txt"
  register: _rmp_tok
  delegate_to: "{{ hashicorp_vault_first_node }}"
  run_once: true
  no_log: true

- name: "Remove-peers | Set the token fact"
  ansible.builtin.set_fact:
    _rmp_root_token: "{{ _rmp_tok.content | b64decode | trim }}"
  run_once: true
  no_log: true

- name: "Remove-peers | List current Raft peers"
  become: true  # root: docker exec needs the root-owned docker socket
  ansible.builtin.command:
    cmd: >-
      docker exec -e VAULT_TOKEN {{ hashicorp_vault_name }}
      vault operator raft list-peers -format=json
  environment:
    VAULT_TOKEN: "{{ _rmp_root_token }}"
  register: _rmp_peers
  until: _rmp_peers.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: "{{ hashicorp_vault_first_node }}"

- name: "Remove-peers | Compute the stale peers to evict"
  ansible.builtin.set_fact:
    # difference([1,2,3] survivors-desired) preserves raft order, so a stale
    # LEADER sorts by its raft position; leader-removal is handled by forwarding.
    _rmp_stale: >-
      {{ (_rmp_peers.stdout | from_json).data.config.servers
         | map(attribute='node_id') | list | difference(hashicorp_vault_nodes) }}
  run_once: true

- name: "Remove-peers | Report the plan"
  ansible.builtin.debug:
    msg: >-
      {{ ('Evicting stale peers ' ~ _rmp_stale ~ ' (executor ' ~ hashicorp_vault_first_node ~ ')')
         if (_rmp_stale | length > 0)
         else 'No stale peers — Raft membership already matches the desired node set.' }}
  run_once: true

- name: "Remove-peers | Evict each stale peer"
  become: true  # root: docker exec needs the root-owned docker socket
  ansible.builtin.command:
    cmd: >-
      docker exec -e VAULT_TOKEN {{ hashicorp_vault_name }}
      vault operator raft remove-peer {{ item }}
  environment:
    VAULT_TOKEN: "{{ _rmp_root_token }}"
  loop: "{{ _rmp_stale }}"
  changed_when: true
  no_log: true
  run_once: true
  delegate_to: "{{ hashicorp_vault_first_node }}"
  when: _rmp_stale | length > 0

- name: "Remove-peers | Re-list peers and confirm the strays are gone"
  become: true  # root: docker exec needs the root-owned docker socket
  ansible.builtin.command:
    cmd: >-
      docker exec -e VAULT_TOKEN {{ hashicorp_vault_name }}
      vault operator raft list-peers -format=json
  environment:
    VAULT_TOKEN: "{{ _rmp_root_token }}"
  register: _rmp_recheck
  until: _rmp_recheck.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: "{{ hashicorp_vault_first_node }}"
  when: _rmp_stale | length > 0

- name: "Remove-peers | Assert the reconciled membership matches the desired set"
  ansible.builtin.assert:
    that:
      - (_rmp_recheck.stdout | from_json).data.config.servers
        | map(attribute='node_id') | list | difference(hashicorp_vault_nodes) | length == 0
    fail_msg: >-
      Stale peers remain after remove-peer:
      {{ (_rmp_recheck.stdout | from_json).data.config.servers
         | map(attribute='node_id') | list | difference(hashicorp_vault_nodes) }}.
      Inspect `vault operator raft list-peers` on {{ hashicorp_vault_first_node }}.
    success_msg: "Raft membership reconciled to {{ hashicorp_vault_nodes | length }} desired node(s)."
    quiet: true
  run_once: true
  when: _rmp_stale | length > 0
