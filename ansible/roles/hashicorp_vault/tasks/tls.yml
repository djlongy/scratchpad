---
# TLS — a self-signed CA + multi-SAN server certificate.
#
# Generated ONCE on the controller (the Ansible venv is guaranteed to have
# `cryptography`), persisted in hashicorp_vault_tls_local_dir so re-runs reuse the
# same CA, then distributed to every node's certs dir. Set
# hashicorp_vault_tls_generate=false to supply your own cert/key/CA instead.

# ── Derive SAN entries (identical on every host; no run_once needed) ──────
- name: "Assemble certificate SAN hostnames and IPs"
  ansible.builtin.set_fact:
    _hashicorp_vault_san_dns: "{{ ['localhost'] + hashicorp_vault_nodes + _hashicorp_vault_fqdns }}"
    _hashicorp_vault_san_ip: >-
      {{ ['127.0.0.1'] + (hashicorp_vault_nodes | map('extract', hostvars, 'ansible_host') | list) }}
  vars:
    _hashicorp_vault_fqdns: >-
      {{ [] if (hashicorp_vault_domain | length == 0)
         else (hashicorp_vault_nodes | product(['.' + hashicorp_vault_domain]) | map('join', '') | list) }}

- name: "Build the final SAN list"
  ansible.builtin.set_fact:
    hashicorp_vault_tls_sans: >-
      {{ ((_hashicorp_vault_san_dns | map('regex_replace', '^', 'DNS:') | list)
          + (_hashicorp_vault_san_ip | map('regex_replace', '^', 'IP:') | list)
          + hashicorp_vault_tls_extra_sans) | unique }}

# ── Self-signed generation (controller side) ─────────────────────────────
- name: "Generate self-signed CA + server certificate on the controller"
  when:
    - hashicorp_vault_tls_generate | bool
    - not (hashicorp_vault_tls_onhost | bool)
  delegate_to: localhost
  become: false
  run_once: true
  block:
    - name: "Ensure the local TLS directory exists"
      ansible.builtin.file:
        path: "{{ hashicorp_vault_tls_local_dir }}"
        state: directory
        mode: "0700"

    - name: "Generate the CA private key"
      community.crypto.openssl_privatekey:
        path: "{{ hashicorp_vault_tls_local_dir }}/ca.key"
        type: RSA
        size: 4096
        mode: "0600"

    - name: "Generate the CA signing request"
      community.crypto.openssl_csr:
        path: "{{ hashicorp_vault_tls_local_dir }}/ca.csr"
        privatekey_path: "{{ hashicorp_vault_tls_local_dir }}/ca.key"
        common_name: "hashicorp_vault CA"
        basic_constraints:
          - "CA:TRUE"
        basic_constraints_critical: true
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: true
        mode: "0644"

    - name: "Self-sign the CA certificate"
      community.crypto.x509_certificate:
        path: "{{ hashicorp_vault_tls_local_dir }}/ca.crt"
        csr_path: "{{ hashicorp_vault_tls_local_dir }}/ca.csr"
        privatekey_path: "{{ hashicorp_vault_tls_local_dir }}/ca.key"
        provider: selfsigned
        selfsigned_not_after: "+{{ hashicorp_vault_tls_validity_days }}d"
        mode: "0644"

    - name: "Generate the server private key"
      community.crypto.openssl_privatekey:
        path: "{{ hashicorp_vault_tls_local_dir }}/vault.key"
        type: RSA
        size: 2048
        mode: "0600"

    - name: "Generate the server signing request (multi-SAN)"
      community.crypto.openssl_csr:
        path: "{{ hashicorp_vault_tls_local_dir }}/vault.csr"
        privatekey_path: "{{ hashicorp_vault_tls_local_dir }}/vault.key"
        common_name: "{{ hashicorp_vault_tls_cn }}"
        subject_alt_name: "{{ hashicorp_vault_tls_sans }}"
        key_usage:
          - digitalSignature
          - keyEncipherment
        extended_key_usage:
          - serverAuth
          - clientAuth
        mode: "0644"

    - name: "Sign the server certificate with the CA"
      community.crypto.x509_certificate:
        path: "{{ hashicorp_vault_tls_local_dir }}/vault.crt"
        csr_path: "{{ hashicorp_vault_tls_local_dir }}/vault.csr"
        ownca_path: "{{ hashicorp_vault_tls_local_dir }}/ca.crt"
        ownca_privatekey_path: "{{ hashicorp_vault_tls_local_dir }}/ca.key"
        provider: ownca
        ownca_not_after: "+{{ hashicorp_vault_tls_validity_days }}d"
        mode: "0644"

- name: "Assert provided certificate paths when not generating"
  ansible.builtin.assert:
    that:
      - hashicorp_vault_tls_ca_cert | length > 0
      - hashicorp_vault_tls_server_cert | length > 0
      - hashicorp_vault_tls_server_key | length > 0
    fail_msg: >-
      hashicorp_vault_tls_generate is false but one of hashicorp_vault_tls_ca_cert /
      _server_cert / _server_key is unset.
    quiet: true
  when:
    - not (hashicorp_vault_tls_generate | bool)
    - not (hashicorp_vault_tls_onhost | bool)

# ══ Controller-sourced certs (generate OR provided): distribute to every node ══
- name: "Distribute controller-sourced certificates"
  when: not (hashicorp_vault_tls_onhost | bool)
  block:
    - name: "Resolve certificate source paths (controller)"
      ansible.builtin.set_fact:
        _hashicorp_vault_src_ca: "{{ (hashicorp_vault_tls_local_dir ~ '/ca.crt') if (hashicorp_vault_tls_generate | bool) else hashicorp_vault_tls_ca_cert }}"
        _hashicorp_vault_src_cert: "{{ (hashicorp_vault_tls_local_dir ~ '/vault.crt') if (hashicorp_vault_tls_generate | bool) else hashicorp_vault_tls_server_cert }}"
        _hashicorp_vault_src_key: "{{ (hashicorp_vault_tls_local_dir ~ '/vault.key') if (hashicorp_vault_tls_generate | bool) else hashicorp_vault_tls_server_key }}"

    - name: "Distribute the CA certificate to nodes"
      become: true  # root: writes to the root-owned certs dir
      ansible.builtin.copy:
        src: "{{ _hashicorp_vault_src_ca }}"
        dest: "{{ hashicorp_vault_certs_dir }}/ca.crt"
        owner: "{{ hashicorp_vault_uid }}"
        group: "{{ hashicorp_vault_gid }}"
        mode: "0644"
      notify: Restart vault container

    - name: "Distribute the server certificate to nodes"
      become: true  # root: writes to the root-owned certs dir
      ansible.builtin.copy:
        src: "{{ _hashicorp_vault_src_cert }}"
        dest: "{{ hashicorp_vault_certs_dir }}/vault.crt"
        owner: "{{ hashicorp_vault_uid }}"
        group: "{{ hashicorp_vault_gid }}"
        mode: "0644"
      notify: Restart vault container

    - name: "Distribute the server private key to nodes"
      become: true  # root: writes the private key to the root-owned certs dir
      ansible.builtin.copy:
        src: "{{ _hashicorp_vault_src_key }}"
        dest: "{{ hashicorp_vault_certs_dir }}/vault.key"
        owner: "{{ hashicorp_vault_uid }}"
        group: "{{ hashicorp_vault_gid }}"
        mode: "0600"
      no_log: true
      notify: Restart vault container

# ══ On-host certs (issued on the node by certmonger/ipa-getcert): use in place ══
# The cert/key/CA already exist at hashicorp_vault_tls_onhost_* on the node — do
# NOT generate or copy from the controller. Assert they exist, then own/perm them
# for the container uid (SELinux relabel is handled by the :Z bind mount).
- name: "Use on-host (certmonger) certificates"
  when: hashicorp_vault_tls_onhost | bool
  block:
    - name: "Stat the on-host certificate material"
      become: true  # root: stats root-owned on-host cert/key material
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ hashicorp_vault_tls_onhost_ca }}"
        - "{{ hashicorp_vault_tls_onhost_cert }}"
        - "{{ hashicorp_vault_tls_onhost_key }}"
      register: _hashicorp_vault_onhost_stat

    - name: "Assert the on-host certificate material exists"
      ansible.builtin.assert:
        that:
          - _hashicorp_vault_onhost_stat.results | map(attribute='stat.exists') | select | list | length == 3
        fail_msg: >-
          hashicorp_vault_tls_onhost is true but one of hashicorp_vault_tls_onhost_ca /
          _cert / _key is missing on {{ inventory_hostname }}. certmonger/ipa-getcert
          must issue them into {{ hashicorp_vault_certs_dir }} BEFORE this role runs.
        quiet: true

    # ca.crt (the issuing CA chain) + vault.key are placed verbatim.
    - name: "Place the CA chain + private key into the container certs dir"
      become: true  # root: reads root-owned on-host certs, writes the certs dir
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ hashicorp_vault_certs_dir }}/{{ item.dest }}"
        remote_src: true
        owner: "{{ hashicorp_vault_uid }}"
        group: "{{ hashicorp_vault_gid }}"
        mode: "{{ item.mode }}"
      loop:
        - {src: "{{ hashicorp_vault_tls_onhost_ca }}", dest: ca.crt, mode: "0644"}
        - {src: "{{ hashicorp_vault_tls_onhost_key }}", dest: vault.key, mode: "0600"}
      loop_control:
        label: "{{ item.dest }}"
      no_log: true
      notify: Restart vault container

    # certmonger issues the LEAF only — a leaf-only tls_cert_file makes clients see
    # just "vault-01" with no chain. ASSEMBLE vault.crt = leaf + CA so Vault
    # SERVES the full chain (a client that trusts the FreeIPA CA then builds/displays
    # FreeIPA-CA -> vault-01). Idempotent: copy compares the assembled content.
    - name: "Read the on-host leaf cert + CA chain (to assemble the served fullchain)"
      become: true  # root: reads the root-owned on-host cert + CA
      ansible.builtin.slurp:
        src: "{{ item }}"
      loop:
        - "{{ hashicorp_vault_tls_onhost_cert }}"
        - "{{ hashicorp_vault_tls_onhost_ca }}"
      register: _hashicorp_vault_onhost_pem
      no_log: true

    - name: "Assemble vault.crt = leaf + CA chain (full chain served to clients)"
      become: true  # root: writes the assembled cert into the certs dir
      ansible.builtin.copy:
        content: "{{ (_hashicorp_vault_onhost_pem.results[0].content | b64decode | trim) ~ '\n'
                     ~ (_hashicorp_vault_onhost_pem.results[1].content | b64decode | trim) ~ '\n' }}"
        dest: "{{ hashicorp_vault_certs_dir }}/vault.crt"
        owner: "{{ hashicorp_vault_uid }}"
        group: "{{ hashicorp_vault_gid }}"
        mode: "0644"
      no_log: true
      notify: Restart vault container
