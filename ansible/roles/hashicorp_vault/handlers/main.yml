---
# Restart reloads the bind-mounted vault.hcl. Compose-file changes (image,
# ports, volumes) are applied by `docker compose up -d` in deploy.yml.
- name: Restart vault container
  become: true  # root: docker CLI needs the root-owned docker socket
  ansible.builtin.command:
    cmd: "docker compose restart"
    chdir: "{{ hashicorp_vault_data_mount }}"
  changed_when: true

- name: Reload systemd
  become: true  # root: systemd daemon-reload
  ansible.builtin.systemd_service:
    daemon_reload: true
