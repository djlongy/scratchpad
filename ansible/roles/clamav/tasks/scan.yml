---
# clamav/tasks/scan.yml — scheduled scan systemd units (tagged: scan)
# Only imported when clamav_scan_enabled is true.

- name: Deploy clamav-scan.service unit
  ansible.builtin.template:
    src: clamav-scan.service.j2
    dest: /etc/systemd/system/clamav-scan.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd daemon

- name: Deploy clamav-scan.timer unit
  ansible.builtin.template:
    src: clamav-scan.timer.j2
    dest: /etc/systemd/system/clamav-scan.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd daemon

- name: Enable and start clamav-scan.timer
  ansible.builtin.systemd:
    name: clamav-scan.timer
    state: started
    enabled: true
    daemon_reload: true
