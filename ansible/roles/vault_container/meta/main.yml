---
galaxy_info:
  role_name: vault_container
  author: homelab
  description: >-
    Self-contained, auto-scaling containerized HashiCorp Vault. Runs Vault as
    a Docker container with all state on a persistent second disk, deriving a
    standalone-Raft (1 host) or Raft-HA (N hosts) topology from the play.
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: EL
      versions:
        - "8"
        - "9"
    - name: Ubuntu
      versions:
        - jammy
        - noble
  galaxy_tags:
    - vault
    - hashicorp
    - docker
    - secrets
    - raft

# Self-contained by design: no role dependencies. The Docker engine and the
# mounted second disk are composed at the playbook level (see README).
dependencies: []
