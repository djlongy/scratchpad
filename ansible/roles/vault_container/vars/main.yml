---
# vault_container — non-overridable constants.

base_task_name: "vault_container"

# Fixed in-container paths (the official hashicorp/vault image layout).
vault_ctr_container_config_dir: "/vault/config"
vault_ctr_container_data_dir: "/vault/data"
vault_ctr_container_certs_dir: "/vault/certs"
vault_ctr_container_logs_dir: "/vault/logs"

# uid:gid of the `vault` user inside the official image. The container runs
# AS this user (see docker-compose template) so bind-mount permissions on
# the host data directory line up.
vault_ctr_uid: "100"
vault_ctr_gid: "1000"
