---
# Init — initialize the cluster ONCE (first node only, first run only) and
# persist the init material. Unsealing is a SEPARATE phase (unseal.yml, tag
# `unseal`) so operators can re-unseal after a reboot without touching init.
# init is a strict no-op on an already-initialized cluster — it never wipes.

# ── Initialize (first node only, first run only) ─────────────────────────
- name: "Check whether Vault is already initialized"
  ansible.builtin.command:
    cmd: "docker exec {{ vault_ctr_name }} vault status -format=json"
  register: _vault_ctr_status
  changed_when: false
  failed_when: false
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"

- name: "Record initialization state"
  ansible.builtin.set_fact:
    _vault_ctr_initialized: >-
      {{ (_vault_ctr_status.stdout | from_json).initialized | default(false)
         if _vault_ctr_status.rc in [0, 1, 2] else false }}
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"

- name: "Initialize Vault"
  ansible.builtin.command:
    cmd: >-
      docker exec {{ vault_ctr_name }} vault operator init
      -key-shares={{ vault_ctr_key_shares }}
      -key-threshold={{ vault_ctr_key_threshold }}
      -format=json
  register: _vault_ctr_init
  changed_when: true
  no_log: true
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"
  when: not _vault_ctr_initialized

- name: "Persist the init material on the first node"
  ansible.builtin.copy:
    content: "{{ _vault_ctr_init.stdout }}"
    dest: "{{ vault_ctr_keys_dir }}/vault_init.json"
    owner: root
    group: root
    mode: "0400"
  no_log: true
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"
  when: _vault_ctr_init is changed
# Unsealing + cluster formation continue in unseal.yml (tag `unseal`).
