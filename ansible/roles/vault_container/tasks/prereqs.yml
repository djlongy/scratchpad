---
# Prerequisites — host directories on the second disk, and firewall.

- name: "Create Vault directories on the persistent disk"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ vault_ctr_config_dir }}"
    - "{{ vault_ctr_certs_dir }}"
    - "{{ vault_ctr_logs_dir }}"

- name: "Create the Vault data directory (owned by the in-container vault user)"
  ansible.builtin.file:
    path: "{{ vault_ctr_data_dir }}"
    state: directory
    owner: "{{ vault_ctr_uid }}"
    group: "{{ vault_ctr_gid }}"
    mode: "0750"

- name: "Create the keys directory (root-only)"
  ansible.builtin.file:
    path: "{{ vault_ctr_keys_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "Gather service facts (for the firewall gate below)"
  ansible.builtin.service_facts:
  when: vault_ctr_manage_firewall | bool

- name: "Open firewall ports for Vault API and cluster"
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ vault_ctr_api_port }}/tcp"
    - "{{ vault_ctr_cluster_port }}/tcp"
  when:
    - vault_ctr_manage_firewall | bool
    - ansible_facts.services is defined
    - "'firewalld.service' in ansible_facts.services"
