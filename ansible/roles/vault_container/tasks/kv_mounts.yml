---
# Create KV v2 mounts. List comes from vault_kv_mounts.
# `_vault_root_token` is set by main.yml's post_setup preamble.
# Vault returns 400 "path is already in use" if a mount exists; treat
# as success.

- name: Enable KV v2 mounts
  ansible.builtin.shell:
    cmd: >-
      VAULT_ADDR=https://127.0.0.1:{{ vault_api_port }} VAULT_SKIP_VERIFY=true
      VAULT_TOKEN={{ _vault_root_token }}
      vault secrets enable -path={{ item.mount }} -description={{ (item.description | default('')) | quote }} kv-v2
  args:
    executable: /bin/bash
  loop: "{{ vault_kv_mounts }}"
  loop_control:
    label: "{{ item.mount }}"
  delegate_to: "{{ groups['vault_leader'][0] }}"
  run_once: true
  register: _kv_enable
  changed_when: "'Success! Enabled' in _kv_enable.stdout"
  failed_when:
    - _kv_enable.rc != 0
    - "'path is already in use' not in (_kv_enable.stderr | default(''))"
  no_log: true
