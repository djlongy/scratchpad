---
# Backup — scheduled Raft snapshots via a systemd timer.
#
# The timer runs on every node; the script snapshots ONLY on the active leader
# (is_self), copies the snapshot out of the container to vault_ctr_backup_dir
# on the host, and prunes by age. The backup dir can be a local path or an NFS
# mount (set vault_ctr_backup_nfs_server/_export to have the role mount it).

# ── Optional NFS backup target ───────────────────────────────────────────
- name: "Ensure NFS client packages (NFS backup target)"
  ansible.builtin.package:
    name: nfs-utils
    state: present
  when: vault_ctr_backup_nfs_server | length > 0

- name: "Mount the NFS backup share at the backup dir"
  ansible.posix.mount:
    path: "{{ vault_ctr_backup_dir }}"
    src: "{{ vault_ctr_backup_nfs_server }}:{{ vault_ctr_backup_nfs_export }}"
    fstype: nfs
    opts: "{{ vault_ctr_backup_nfs_opts }}"
    state: mounted
  when:
    - vault_ctr_backup_nfs_server | length > 0
    - vault_ctr_backup_nfs_export | length > 0

- name: "Ensure the backup directory exists"
  ansible.builtin.file:
    path: "{{ vault_ctr_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

# ── Auth: a SCOPED periodic token (NOT the root token) ───────────────────────
# The leader can be any node, so every node needs a token — but only a
# snapshot-read-only one. Minted on the first node with the root token, re-minted
# only when the current one is missing/invalid (self-heals after a rollback to a
# pre-mint snapshot), then distributed to every node. Root stays on node 1 only.
# Token passed via the process ENV (not argv) so it never hits a ps/proc table.
- name: "Read the root token (to mint the scoped token)"
  ansible.builtin.slurp:
    src: "{{ vault_ctr_keys_dir }}/root_token.txt"
  register: _vault_ctr_root_slurp
  delegate_to: "{{ vault_ctr_first_node }}"
  run_once: true
  no_log: true

- name: "Set the root token fact"
  ansible.builtin.set_fact:
    _vault_ctr_root: "{{ _vault_ctr_root_slurp.content | b64decode | trim }}"
  run_once: true
  no_log: true

- name: "Write the scoped backup policy (snapshot read-only)"
  ansible.builtin.shell:
    cmd: >-
      docker exec -i -e VAULT_TOKEN {{ vault_ctr_name }}
      vault policy write {{ vault_ctr_backup_policy_name }} -
    stdin: |
      path "sys/storage/raft/snapshot" {
        capabilities = ["read"]
      }
  environment:
    VAULT_TOKEN: "{{ _vault_ctr_root }}"
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"
  changed_when: true
  no_log: true

- name: "Read the existing backup token, if any"
  ansible.builtin.slurp:
    src: "{{ vault_ctr_backup_token_file }}"
  register: _vault_ctr_bt_slurp
  delegate_to: "{{ vault_ctr_first_node }}"
  run_once: true
  failed_when: false
  no_log: true

- name: "Determine whether the existing backup token still works"
  ansible.builtin.command:
    cmd: "docker exec -i -e VAULT_TOKEN {{ vault_ctr_name }} vault token lookup"
  environment:
    VAULT_TOKEN: "{{ (_vault_ctr_bt_slurp.content | b64decode | trim) if (_vault_ctr_bt_slurp.content is defined) else '' }}"
  register: _vault_ctr_bt_check
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"
  changed_when: false
  failed_when: false
  no_log: true

- name: "Mint a fresh scoped periodic token when none is valid"
  ansible.builtin.command:
    cmd: >-
      docker exec -i -e VAULT_TOKEN {{ vault_ctr_name }}
      vault token create -orphan -policy={{ vault_ctr_backup_policy_name }}
      -period={{ vault_ctr_backup_token_period }} -field=token
  environment:
    VAULT_TOKEN: "{{ _vault_ctr_root }}"
  register: _vault_ctr_bt_new
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"
  changed_when: true
  no_log: true
  when: _vault_ctr_bt_check.rc != 0

- name: "Resolve the effective backup token"
  ansible.builtin.set_fact:
    _vault_ctr_backup_token: >-
      {{ _vault_ctr_bt_new.stdout | trim
         if (_vault_ctr_bt_new is not skipped)
         else (_vault_ctr_bt_slurp.content | b64decode | trim) }}
  run_once: true
  no_log: true

- name: "Distribute the scoped backup token to every node"
  ansible.builtin.copy:
    content: "{{ _vault_ctr_backup_token }}\n"
    dest: "{{ vault_ctr_backup_token_file }}"
    owner: root
    group: root
    mode: "0400"
  no_log: true

# ── Install the backup script + systemd timer ────────────────────────────
- name: "Install the backup script"
  ansible.builtin.template:
    src: vault-backup.sh.j2
    dest: "{{ vault_ctr_backup_script_path }}"
    owner: root
    group: root
    mode: "0750"

- name: "Install the backup systemd service"
  ansible.builtin.template:
    src: vault-backup.service.j2
    dest: /etc/systemd/system/vault-container-backup.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: "Install the backup systemd timer"
  ansible.builtin.template:
    src: vault-backup.timer.j2
    dest: /etc/systemd/system/vault-container-backup.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: "Reload systemd now so the timer picks up changes"
  ansible.builtin.meta: flush_handlers

- name: "Enable and start the backup timer"
  ansible.builtin.systemd_service:
    name: vault-container-backup.timer
    enabled: true
    state: started
