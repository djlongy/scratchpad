---
# Optional: enable + configure auth/ldap, then create group→policy
# mappings. Runs only on the leader (the API call replicates to
# followers via raft).
#
# Inputs (defaults/main.yml):
#   vault_container_ldap_enabled       — toggle (default false)
#   vault_container_ldap_url           — e.g. ldaps://freeipa.example.com:636
#   vault_container_ldap_userdn        — base DN for user lookups
#   vault_container_ldap_groupdn       — base DN for group lookups
#   vault_container_ldap_userattr      — attr that maps usernames (FreeIPA: uid)
#   vault_container_ldap_groupattr     — attr that names groups   (FreeIPA: cn)
#   vault_container_ldap_groupfilter   — LDAP filter to find a user's groups
#   vault_container_ldap_binddn        — service account DN for the bind
#   vault_container_ldap_bindpass      — bind password (encrypt in vault.yml)
#   vault_container_ldap_insecure_tls  — skip server cert verification
#   vault_container_ldap_group_policies — dict of <group>: [<policy>, ...]

- name: Enable ldap auth method
  ansible.builtin.shell:
    cmd: >-
      VAULT_ADDR=https://127.0.0.1:{{ vault_container_api_port }} VAULT_SKIP_VERIFY=true
      VAULT_TOKEN={{ _vault_root_token }}
      vault auth enable ldap || true
  args:
    executable: /bin/bash
  delegate_to: "{{ groups['vault_leader'][0] }}"
  run_once: true
  register: _ldap_enable
  changed_when: "'Enabled ldap' in _ldap_enable.stdout"
  no_log: true

- name: Configure ldap auth
  ansible.builtin.shell:
    cmd: >-
      VAULT_ADDR=https://127.0.0.1:{{ vault_container_api_port }} VAULT_SKIP_VERIFY=true
      VAULT_TOKEN={{ _vault_root_token }}
      vault write auth/ldap/config
        url={{ vault_container_ldap_url | quote }}
        userdn={{ vault_container_ldap_userdn | quote }}
        userattr={{ vault_container_ldap_userattr | quote }}
        groupdn={{ vault_container_ldap_groupdn | quote }}
        groupattr={{ vault_container_ldap_groupattr | quote }}
        groupfilter={{ vault_container_ldap_groupfilter | quote }}
        binddn={{ vault_container_ldap_binddn | quote }}
        bindpass={{ vault_container_ldap_bindpass | quote }}
        insecure_tls={{ vault_container_ldap_insecure_tls | string | lower }}
  args:
    executable: /bin/bash
  delegate_to: "{{ groups['vault_leader'][0] }}"
  run_once: true
  changed_when: true
  no_log: true

- name: Map LDAP groups to vault policies
  ansible.builtin.shell:
    cmd: >-
      VAULT_ADDR=https://127.0.0.1:{{ vault_container_api_port }} VAULT_SKIP_VERIFY=true
      VAULT_TOKEN={{ _vault_root_token }}
      vault write auth/ldap/groups/{{ item.key }}
        policies={{ item.value | join(',') }}
  args:
    executable: /bin/bash
  loop: "{{ vault_container_ldap_group_policies | dict2items }}"
  loop_control:
    label: "{{ item.key }} → {{ item.value | join(',') }}"
  delegate_to: "{{ groups['vault_leader'][0] }}"
  run_once: true
  changed_when: true
  no_log: true
