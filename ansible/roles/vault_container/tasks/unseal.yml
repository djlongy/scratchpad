---
# Unseal — unseal every node using the stored keys. Self-contained so it can be
# run on its OWN with `--tags unseal` to bring a node (or the whole cluster)
# back after a reboot / container restart, WITHOUT re-running init (which only
# touches an uninitialized cluster and never wipes an existing one, but the
# `unseal` tag makes the safe, non-destructive intent unambiguous).
#
#   ansible-playbook ... --tags unseal          # unseal whatever is sealed
#
# For hands-off recovery after a reboot, enable vault_ctr_auto_unseal instead
# (a systemd unit does this on boot) — see autounseal.yml.

- name: "Unseal | Read the persisted init material"
  ansible.builtin.slurp:
    src: "{{ vault_ctr_keys_dir }}/vault_init.json"
  register: _vault_ctr_init_slurp
  delegate_to: "{{ vault_ctr_first_node }}"
  no_log: true

- name: "Unseal | Extract unseal keys and root token"
  ansible.builtin.set_fact:
    _vault_ctr_unseal_keys: >-
      {{ (_vault_ctr_init_slurp.content | b64decode | from_json).unseal_keys_b64[:vault_ctr_key_threshold | int] }}
    _vault_ctr_root_token: >-
      {{ (_vault_ctr_init_slurp.content | b64decode | from_json).root_token }}
  no_log: true

- name: "Unseal | Save the root token for operator convenience (first node)"
  ansible.builtin.copy:
    content: "{{ _vault_ctr_root_token }}\n"
    dest: "{{ vault_ctr_keys_dir }}/root_token.txt"
    owner: root
    group: root
    mode: "0400"
  no_log: true
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"

# ── Unseal the first node, then wait for it to come up ────────────────────
- name: "Unseal | Check the first node's seal status"
  ansible.builtin.command:
    cmd: "docker exec {{ vault_ctr_name }} vault status -format=json"
  register: _vault_ctr_leader_seal
  changed_when: false
  failed_when: false
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"

- name: "Unseal | Unseal the first node"
  ansible.builtin.command:
    cmd: "docker exec {{ vault_ctr_name }} vault operator unseal {{ item }}"
  loop: "{{ _vault_ctr_unseal_keys }}"
  changed_when: true
  no_log: true
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"
  when: (_vault_ctr_leader_seal.stdout | default('{}') | from_json).sealed | default(true)

# standbyok=true so this passes whether the first node is the active leader
# (fresh init) OR a healthy unsealed STANDBY (re-run after Raft leadership
# migrated off node 1). A sealed node still returns 503, so the wait still
# guarantees the node is up AND unsealed.
- name: "Unseal | Wait for the first node to be unsealed (active or standby)"
  ansible.builtin.uri:
    url: "{{ vault_ctr_scheme }}://127.0.0.1:{{ vault_ctr_api_port }}/v1/sys/health?standbyok=true"
    validate_certs: false
    status_code: [200]
  register: _vault_ctr_leader_active
  until: _vault_ctr_leader_active.status == 200
  retries: 30
  delay: 5
  run_once: true
  delegate_to: "{{ vault_ctr_first_node }}"

# ── Unseal the remaining nodes (HA only) ──────────────────────────────────
- name: "Unseal | Check the other nodes' seal status"
  ansible.builtin.command:
    cmd: "docker exec {{ vault_ctr_name }} vault status -format=json"
  register: _vault_ctr_node_seal
  changed_when: false
  failed_when: false
  when:
    - vault_ctr_is_ha | bool
    - inventory_hostname != vault_ctr_first_node

- name: "Unseal | Unseal the other nodes"
  ansible.builtin.command:
    cmd: "docker exec {{ vault_ctr_name }} vault operator unseal {{ item }}"
  loop: "{{ _vault_ctr_unseal_keys }}"
  changed_when: true
  no_log: true
  when:
    - vault_ctr_is_ha | bool
    - inventory_hostname != vault_ctr_first_node
    - (_vault_ctr_node_seal.stdout | default('{}') | from_json).sealed | default(true)
