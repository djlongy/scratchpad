---
# vault_container — self-contained, auto-scaling containerized Vault.
#
# Deploys HashiCorp Vault as a Docker container with all state on a persistent
# second disk. Topology scales with the play's host count:
#   * 1 host  -> standalone Raft (single server)
#   * N hosts -> Raft HA joining all N nodes
#
# Self-contained: imports NO tasks from hashicorp_vault / hashicorp_vault_docker.
# Prerequisites (Docker engine + the mounted second disk) are composed at the
# PLAYBOOK level (see README) and asserted here in preflight.
#
# Phases (run with no tags = everything; tags refine for fast iteration):
#   preflight — validate mount, docker, topology; derive scaling facts
#   prereqs   — directories, firewall
#   tls       — self-signed CA + server cert, distributed to nodes
#   deploy    — template vault.hcl + compose, start container, wait healthy
#   init      — initialize (once), unseal all nodes, form the Raft cluster
#   verify    — health + Raft peer / seal assertions

- name: "Preflight — validate prerequisites and derive topology"
  ansible.builtin.import_tasks: preflight.yml
  tags: [preflight, always]

- name: "Prerequisites — directories and firewall"
  ansible.builtin.import_tasks: prereqs.yml
  tags: [prereqs]

- name: "TLS — CA and server certificate"
  ansible.builtin.import_tasks: tls.yml
  when: vault_ctr_tls_enabled | bool
  tags: [tls]

- name: "Deploy — config, compose, start container"
  ansible.builtin.import_tasks: deploy.yml
  tags: [deploy]

- name: "Init — initialize the cluster (first run only)"
  ansible.builtin.import_tasks: init.yml
  tags: [init]

- name: "Unseal — unseal all nodes (also standalone after a reboot: --tags unseal)"
  ansible.builtin.import_tasks: unseal.yml
  tags: [init, unseal]

- name: "Auto-unseal — optional systemd unseal-on-boot (vault_ctr_auto_unseal)"
  ansible.builtin.import_tasks: autounseal.yml
  tags: [autounseal]

- name: "Verify — cluster health"
  ansible.builtin.import_tasks: verify.yml
  tags: [verify]

- name: "Policies — multi-tenant, environment-scoped ACL policies"
  ansible.builtin.import_tasks: policies.yml
  when: vault_ctr_manage_policies | bool
  tags: [policies]

- name: "LDAP — auth method + group->policy mappings (FreeIPA)"
  ansible.builtin.import_tasks: ldap.yml
  when: vault_ctr_ldap_enabled | bool
  tags: [ldap]

- name: "Backup — scheduled Raft snapshots"
  ansible.builtin.import_tasks: backup.yml
  when: vault_ctr_backup_enabled | bool
  tags: [backup]

- name: "Remove-peers — evict stale Raft peers after a scale-down (opt-in)"
  ansible.builtin.import_tasks: remove_peers.yml
  tags: [never, remove_peers]

- name: "Restore — roll back to a Raft snapshot (opt-in, destructive)"
  ansible.builtin.import_tasks: restore.yml
  tags: [never, restore]
