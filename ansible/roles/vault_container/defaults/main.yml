---
# vault_container — behavioural defaults (all overridable).
#
# Env-specific values (node IPs, domains, VIPs) are NOT set here — they come
# from inventory. The topology auto-scales from the hosts in the play, so a
# single-host run yields a standalone Vault and an N-host run yields Raft HA.

# ── Container image ──────────────────────────────────────────────────────
# Pin an EXACT version — never a floating tag like hashicorp/vault:1.19 (it drifts
# and breaks reproducibility). 1.19.5 is the latest 1.19.x Community image and is
# LDAP-verified against FreeIPA (direct-bind AND binddn/search, dev + live cluster,
# 10/10 logins). NOTE for future debuggers: an earlier persistent "failed to bind
# as user" here was NOT a version bug and NOT a FreeIPA bug — it was stuck runtime
# state in a long-lived container (from heavy re-config/lockout churn during
# debugging); recreating the container fixed it. Every clean 1.19.3/1.19.5/1.20.4/
# 1.21.3 container authenticates fine. Newer 1.19.x are Enterprise-only; the
# Community upgrade path is a newer minor (1.20.x/1.21.x) — re-verify LDAP on bump.
vault_ctr_image: "hashicorp/vault:1.19.5"
vault_ctr_name: "vault"

# ── Persistent storage (SECOND DISK) ─────────────────────────────────────
# vault_ctr_data_mount MUST be the mount point of a persistent second disk,
# provisioned + mounted BEFORE this role (e.g. by the universal `storage`
# role). All Vault state lives under it so it survives host/container
# rebuilds. Preflight refuses to run if it is not a real mountpoint.
vault_ctr_data_mount: "/opt/vault"
vault_ctr_require_mounted: true

# Derived host paths under the mount — override only to relocate.
vault_ctr_config_dir: "{{ vault_ctr_data_mount }}/config"
vault_ctr_data_dir: "{{ vault_ctr_data_mount }}/data"
vault_ctr_certs_dir: "{{ vault_ctr_data_mount }}/certs"
vault_ctr_keys_dir: "{{ vault_ctr_data_mount }}/keys"
vault_ctr_logs_dir: "{{ vault_ctr_data_mount }}/logs"

# ── Networking ───────────────────────────────────────────────────────────
vault_ctr_api_port: 8200
vault_ctr_cluster_port: 8201
# Address peers/clients use to reach THIS node. IP by default so the role
# works with no DNS; set to an FQDN in inventory when DNS resolves.
vault_ctr_advertise_addr: "{{ ansible_host }}"

# ── Cluster topology (AUTO-SCALING) ──────────────────────────────────────
# Derived from the hosts in the current play: 1 host -> standalone Raft,
# N hosts -> Raft HA joining all N. Pin an explicit list to decouple the
# cluster from --limit. Do NOT --limit a subset during deploy/init.
vault_ctr_nodes: "{{ ansible_play_hosts_all }}"

# ── Seal / init ──────────────────────────────────────────────────────────
# Homelab default: single unseal key for playbook-driven unseal. Raise for
# a shared-custody unseal ceremony.
vault_ctr_key_shares: 1
vault_ctr_key_threshold: 1

# ── Auto-unseal on boot (OPTIONAL) ───────────────────────────────────────
# false (default): a rebooted node stays SEALED until you run `--tags unseal`.
# true: a systemd unit unseals each node on boot using an on-disk key copy —
# self-healing, but the unseal key is then present on every node (see
# autounseal.yml's security note). Toggling back to false removes it + the keys.
vault_ctr_auto_unseal: false
vault_ctr_autounseal_keys_file: "{{ vault_ctr_keys_dir }}/unseal_keys"
vault_ctr_autounseal_script_path: "/usr/local/bin/vault-container-unseal.sh"

# ── TLS ──────────────────────────────────────────────────────────────────
vault_ctr_tls_enabled: true
# true  -> role self-signs a CA + multi-SAN server cert (portable default)
# false -> supply the three controller-side paths below instead
vault_ctr_tls_generate: true
# Where the generated CA/key persist on the CONTROLLER so re-runs reuse the
# same CA (stable trust). Kept outside the repo — never commit it.
vault_ctr_tls_local_dir: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/share/vault_container/tls"
vault_ctr_tls_ca_cert: ""      # consulted only when vault_ctr_tls_generate=false
vault_ctr_tls_server_cert: ""
vault_ctr_tls_server_key: ""
vault_ctr_tls_cn: "vault"
vault_ctr_tls_validity_days: 3650
# Extra SANs. Node IPs + short hostnames are added automatically; add FQDNs
# / VIPs here, e.g. ["DNS:vault.dev.example.com", "IP:10.0.0.55"].
vault_ctr_tls_extra_sans: []
# Optional domain: when set, "<inventory_hostname>.<domain>" is added to the
# cert SANs for every node.
vault_ctr_domain: ""

# ── Vault server config ──────────────────────────────────────────────────
vault_ctr_ui: true
vault_ctr_log_level: "info"
vault_ctr_log_format: "json"
vault_ctr_disable_mlock: true          # containers frequently cannot mlock
vault_ctr_telemetry_enabled: true

# ── Firewall ─────────────────────────────────────────────────────────────
vault_ctr_manage_firewall: true

# ── Multi-tenant policies (optional) ─────────────────────────────────────
# Environment == a KV mount (kv-<env>); tenant == a path prefix inside it. Each
# {tenant, env} pair yields a policy "<tenant>-<env>" that grants access to ONLY
# kv-<env>/data/<tenant>/* — so a user attached (via an LDAP group) to their
# tenant+env sees just their slice. The role ensures each kv-<env> mount exists.
vault_ctr_manage_policies: false
vault_ctr_kv_mount_prefix: "kv"
vault_ctr_tenants: []
#   - {tenant: acme,   env: prod}
#   - {tenant: globex, env: dev}
# Extra, non-tenant policies: {name, template} where template is under
# templates/policies/ (ship your own or use the bundled admin.hcl.j2).
vault_ctr_policies: []
#   - {name: vault-admin, template: admin.hcl.j2}
# admin.hcl.j2 grants full CRUD on these mounts + auth/policy mgmt.
vault_ctr_admin_kv_mounts: []
#   - kv-dev
#   - kv-prod

# ── LDAP auth (optional; FreeIPA in this homelab) ────────────────────────
# Group naming: a tenant's LDAP group defaults to "vault-<tenant>-<env>", mapped
# to policies [default, <tenant>-<env>]. Add non-tenant groups via _extra_groups.
vault_ctr_ldap_enabled: false
vault_ctr_ldap_url: ""                     # e.g. ldaps://ldap.example.com
vault_ctr_ldap_binddn: ""
vault_ctr_ldap_bindpass: ""                # declared-var-first (ansible-vault)
vault_ctr_ldap_bindpass_vault_path: ""     # HC-Vault fallback: "mount/path:field"
vault_ctr_ldap_userdn: ""
vault_ctr_ldap_userattr: "uid"
vault_ctr_ldap_groupdn: ""
vault_ctr_ldap_groupattr: "cn"
vault_ctr_ldap_groupfilter: "(&(objectClass=posixgroup)(memberUid={{ '{{.Username}}' }}))"
vault_ctr_ldap_starttls: false
vault_ctr_ldap_insecure_tls: true          # self-signed FreeIPA CA in the lab
vault_ctr_ldap_group_pattern: "vault-{tenant}-{env}"
vault_ctr_ldap_extra_groups: []
#   - {group: vault-admins, policies: [default, vault-admin]}
# Per-user authorisation — authorises a specific directory user directly
# (auth/ldap/users/<name>), independent of group membership resolution.
vault_ctr_ldap_users: []
#   - {user: long, policies: [default, vault-admin]}

# ── Backup (scheduled Raft snapshots) ────────────────────────────────────
# A systemd timer runs on every node; only the active leader snapshots. The
# snapshot is copied out of the container to vault_ctr_backup_dir on the host.
vault_ctr_backup_enabled: true
vault_ctr_backup_dir: "{{ vault_ctr_data_mount }}/backups"   # the "given path"
vault_ctr_backup_schedule: "*-*-* 02:00:00"                  # systemd OnCalendar
vault_ctr_backup_retention_days: 7
vault_ctr_backup_script_path: "/usr/local/bin/vault-container-backup.sh"
# Backup auth = a SCOPED periodic token (policy: read on sys/storage/raft/snapshot)
# minted on the leader and distributed to nodes — avoids spreading the root token.
# The backup script renews it each run; backup setup re-mints it if it's gone
# (self-heals after a rollback to a pre-mint snapshot). Restore still uses root.
vault_ctr_backup_policy_name: "vault-backup"
vault_ctr_backup_token_period: "768h"
vault_ctr_backup_token_file: "{{ vault_ctr_keys_dir }}/backup_token"
# Optional NFS backup target — the "mount NFS as the backup location" pattern.
# Set BOTH to have the role mount <server>:<export> at vault_ctr_backup_dir
# (else the backup dir is a plain local path). Point vault_ctr_backup_dir at a
# dedicated mountpoint (e.g. /mnt/vault-backups) when using NFS.
vault_ctr_backup_nfs_server: ""
vault_ctr_backup_nfs_export: ""
vault_ctr_backup_nfs_opts: "rw,hard,nfsvers=4.1,_netdev,nofail"

# ── Restore (opt-in via --tags restore; DESTRUCTIVE) ─────────────────────
# Which snapshot to roll back to: "latest" (or empty) = newest in the backup
# dir on the leader; otherwise an absolute path to a .snap on the leader.
vault_ctr_restore_snapshot: "latest"
