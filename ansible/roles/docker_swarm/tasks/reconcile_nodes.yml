---
# Remove nodes in the `Down` state from the swarm. The explicit, opt-in
# replacement for the work role's unconditional "remove old nodes" step —
# made safe: it ONLY removes Down nodes, never Ready/active ones, and runs
# on the bootstrap manager.
#
# Tagged `[never, reconcile_nodes]` in main.yml — standalone, never chained.

- name: Read current swarm membership state (reconcile)
  ansible.builtin.command: "docker info --format '{% raw %}{{.Swarm.LocalNodeState}}{% endraw %}'"
  register: _recon_state
  changed_when: false

- name: Compute set of managers currently running an active swarm (reconcile)
  ansible.builtin.set_fact:
    _recon_active_managers: >-
      {{ groups[docker_swarm_managers_group]
         | map('extract', hostvars)
         | selectattr('_recon_state', 'defined')
         | selectattr('_recon_state.stdout', 'equalto', 'active')
         | map(attribute='inventory_hostname')
         | list }}

- name: Compute bootstrap host (reconcile)
  ansible.builtin.set_fact:
    _recon_bootstrap: >-
      {{ docker_swarm_bootstrap_host
         if (docker_swarm_bootstrap_host | length > 0)
         else (_recon_active_managers | first
               | default(groups[docker_swarm_managers_group][0])) }}

- name: Find Down nodes
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      docker node ls --format '{% raw %}{{.ID}} {{.Status}}{% endraw %}' | awk '$2 == "Down" { print $1 }'
    executable: /bin/bash
  register: _recon_down
  changed_when: false
  delegate_to: "{{ _recon_bootstrap }}"
  run_once: true

- name: Remove Down nodes from the swarm
  ansible.builtin.command: "docker node rm {{ item }}"
  loop: "{{ _recon_down.stdout_lines }}"
  delegate_to: "{{ _recon_bootstrap }}"
  run_once: true
  changed_when: true
