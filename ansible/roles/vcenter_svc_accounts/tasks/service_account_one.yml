---
# roles/vcenter_svc_accounts/tasks/service_account_one.yml
#
# Provision ONE svc account (loop var: _svc). Idempotent:
#   - the SSO user is created once and never rotated on re-run
#   - the password is written to Vault BEFORE the user is created, so a live
#     credential never exists without being in Vault
#   - the custom Role + permission grant converge every run
#
# Secrets flow through here; every task that touches one sets no_log: true.

- name: "Svc {{ _svc.account }} | Check whether the SSO user already exists"
  ansible.builtin.shell:
    cmd: |
      sshpass -p '{{ vcenter_svc_vcsa_ssh_password }}' \
        ssh -o StrictHostKeyChecking=no -T \
        {{ vcenter_svc_vcsa_ssh_user }}@{{ vcenter_svc_vcsa_ssh_host }} "shell" <<'SSHEOF'
      if /usr/lib/vmware-vmafd/bin/dir-cli user find-by-name \
        --account '{{ _svc.account }}' \
        --login '{{ vcenter_svc_admin_username }}' \
        --password '{{ vcenter_svc_admin_password }}' >/dev/null 2>&1; then
        echo "SVC_USER_EXISTS"
      else
        echo "SVC_USER_MISSING"
      fi
      SSHEOF
  register: _svc_find
  changed_when: false
  failed_when: >-
    ('SVC_USER_EXISTS' not in _svc_find.stdout)
    and ('SVC_USER_MISSING' not in _svc_find.stdout)
  no_log: true

- name: "Svc {{ _svc.account }} | Create user + store credential (first run only)"
  when: "'SVC_USER_MISSING' in _svc_find.stdout"
  block:
    - name: "Svc {{ _svc.account }} | Generate a strong password"
      ansible.builtin.set_fact:
        _svc_password: >-
          {{ lookup('community.general.random_string',
                    length=vcenter_svc_password_length,
                    override_special='-_=+.',
                    min_lower=2, min_upper=2, min_numeric=2, min_special=2) }}
      no_log: true

    # Non-negotiable: the secret lands in Vault BEFORE the account is usable.
    - name: "Svc {{ _svc.account }} | Write credential to HashiCorp Vault"
      community.hashi_vault.vault_kv2_write:
        url: "{{ vcenter_svc_vault_addr }}"
        engine_mount_point: "{{ vcenter_svc_vault_mount }}"
        path: "{{ vcenter_svc_vault_path_prefix }}/{{ _svc.account }}"
        data:
          username: "{{ _svc.account }}@{{ vcenter_sso_domain }}"
          password: "{{ _svc_password }}"
      no_log: true

    - name: "Svc {{ _svc.account }} | Create the SSO user via dir-cli (no expiry)"
      ansible.builtin.shell:
        cmd: |
          sshpass -p '{{ vcenter_svc_vcsa_ssh_password }}' \
            ssh -o StrictHostKeyChecking=no -T \
            {{ vcenter_svc_vcsa_ssh_user }}@{{ vcenter_svc_vcsa_ssh_host }} "shell" <<'SSHEOF'
          set -e
          # dir-cli reads the admin password from /dev/tty, not stdin — supply it
          # non-interactively with --password (kept out of logs via no_log).
          /usr/lib/vmware-vmafd/bin/dir-cli user create \
            --account '{{ _svc.account }}' \
            --user-password '{{ _svc_password }}' \
            --first-name 'svc' --last-name '{{ _svc.account }}' \
            --login '{{ vcenter_svc_admin_username }}' \
            --password '{{ vcenter_svc_admin_password }}' 2>&1
          /usr/lib/vmware-vmafd/bin/dir-cli user modify \
            --account '{{ _svc.account }}' \
            --password-never-expires \
            --login '{{ vcenter_svc_admin_username }}' \
            --password '{{ vcenter_svc_admin_password }}' 2>&1
          echo "SVC_USER_CREATED"
          SSHEOF
      register: _svc_create
      changed_when: "'SVC_USER_CREATED' in _svc_create.stdout"
      failed_when: "'SVC_USER_CREATED' not in _svc_create.stdout"
      no_log: true

- name: "Svc {{ _svc.account }} | Converge custom vCenter Role '{{ _svc.role_name }}'"
  community.vmware.vmware_local_role_manager:
    hostname: "{{ vcenter_svc_hostname }}"
    username: "{{ vcenter_svc_admin_username }}"
    password: "{{ vcenter_svc_admin_password }}"
    validate_certs: "{{ vcenter_svc_validate_certs }}"
    local_role_name: "{{ _svc.role_name }}"
    local_privilege_ids: "{{ _svc.privileges }}"
    action: "{{ vcenter_svc_privilege_action }}"
    state: present
  no_log: true

- name: "Svc {{ _svc.account }} | Grant Role to {{ _svc.account }}@{{ vcenter_sso_domain }} at root"
  community.vmware.vmware_object_role_permission:
    hostname: "{{ vcenter_svc_hostname }}"
    username: "{{ vcenter_svc_admin_username }}"
    password: "{{ vcenter_svc_admin_password }}"
    validate_certs: "{{ vcenter_svc_validate_certs }}"
    role: "{{ _svc.role_name }}"
    principal: "{{ _svc.account }}@{{ vcenter_sso_domain }}"
    object_name: "{{ vcenter_svc_permission_object }}"
    recursive: "{{ vcenter_svc_permission_recursive }}"
    state: present
  no_log: true
