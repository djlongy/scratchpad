# ═══════════════════════════════════════════════════════════════════════════
# Config-as-code engine (vDS, dvPortGroups, folders, …)
# ═══════════════════════════════════════════════════════════════════════════
vcenter_config: {}

# ── Export (--tags export) — full re-importable multi-dict snapshot ────────
# Bundles (separate dicts = separate blast radius on re-import):
#   vcenter_config      → group_vars + --tags topology
#   vcenter_esxi_hosts  → group_vars host list for day-2 gates
#   esxi_host_configs   → host_vars / roles/esxi (vSS, NTP, DNS, SSH state)
#
# Serialisation (same contract as roles/artifactory + freeipa_server):
#   vcenter_export_format      yaml | json
#   vcenter_export_list_style  block | json | yaml_flow   (yaml only; cosmetic)
#   vcenter_export_pretty_gap_depth  — blank-line gaps for list_style=block
#   vcenter_export_omit_empty        — drop null/''/[]/{} keys (lossless for apply)
#   vcenter_export_split             — false (default): one file only; true adds
#                                      .topology.yml + .esxi.yml beside it
#   vcenter_export_topology_only     — skip per-host ESXi walk (faster)
vcenter_export_output: "{{ playbook_dir }}/../vcenter.config.snapshot.yml"
vcenter_export_format: yaml
vcenter_export_list_style: block
vcenter_export_pretty_gap_depth: 2
vcenter_export_pretty_gap_blocks_only: true
vcenter_export_omit_empty: true
vcenter_export_include_stock: false
vcenter_export_split: false
vcenter_export_topology_only: false

vcenter_authoritative: false
vcenter_reconcile_scope: ""

vcenter_builtin_roles:
  - Admin
  - ReadOnly
  - NoAccess
  - NoCryptographyAdmin
  - View
  - Anonymous
  - VirtualMachinePowerUser
  - VirtualMachineUser
  - ResourcePoolAdministrator
  - DatastoreConsumer
  - NetworkAdministrator
  - Tagging Admin
vcenter_builtin_portgroups: []
vcenter_builtin_clusters: []
vcenter_builtin_vds: []
vcenter_builtin_resource_pools:
  - Resources
