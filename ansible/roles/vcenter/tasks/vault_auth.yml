# >>> BEGIN OPTIONAL ACME + CLOUDFLARE <<<
# Air-gap: delete this whole block + tasks/optional/acme_cloudflare/ + the
# matching blocks in defaults/main.yml and certs_main.yml.
# ═══════════════════════════════════════════════════════════════════════════
- name: Resolve Cloudflare ACME DNS-01 token when ACME package is enabled
  when:
    - vcenter_manage_certs | bool
    - vcenter_cert_replace | default(false) | bool
    - vcenter_cert_issue_acme | default(false) | bool
    - (vcenter_acme_dns_provider | default('cloudflare')) == 'cloudflare'
  block:
    - name: Assert a Cloudflare API token source is configured
      ansible.builtin.assert:
        that:
          - >-
            (vcenter_cloudflare_api_token | default('') | length > 0)
            or (vcenter_use_hashicorp_vault | bool)
        fail_msg: >-
          Cloudflare API token required when vcenter_cert_issue_acme and
          DNS-01 provider is cloudflare. Set vcenter_cloudflare_api_token or
          enable Vault fallback. Air-gap: strip tasks/optional/acme_cloudflare/
          and set vcenter_cert_issue_acme=false (see defaults markers).

    - name: Resolve Cloudflare API token (declared var first, Vault fallback)
      ansible.builtin.set_fact:
        vcenter_cloudflare_api_token: >-
          {{ vcenter_cloudflare_api_token
             if (vcenter_cloudflare_api_token | default('') | length > 0)
             else (lookup(
                   'community.hashi_vault.hashi_vault',
                   'secret=' ~ vcenter_vault_mount ~ '/data/'
                   ~ vcenter_cloudflare_vault_secret ~ ':'
                   ~ vcenter_cloudflare_vault_token_field
                 )
                 if vcenter_use_hashicorp_vault | bool else '') }}
      no_log: true
