---
# roles/vcenter/tasks/domains/hosts.yml
#
# Host MEMBERSHIP in vCenter only (not per-host ESXi config — that's
# roles/esxi). This is deliberately scoped to datacenter/cluster registration;
# it does NOT cover attaching ESXi vmnics to a vDS uplink (the old
# roles/vds/tasks/hosts.yml concern via vmware_dvs_host) — that data is not
# part of the vcenter_config schema in Phase 1 and has no domain equivalent
# here (see docs/designs/2026-07-12-vcenter-config-as-code-phase1-plan.md
# self-review: "hosts=membership"). If vDS uplink attachment is still needed,
# it must be re-added as a new domain in a later phase.
- name: Hosts | Ensure ESXi hosts registered in their cluster
  become: false  # localhost/API — no host privilege
  community.vmware.vmware_host:
    datacenter: "{{ _vcenter_desired.datacenter.name }}"
    cluster: "{{ item.cluster }}"
    esxi_hostname: "{{ item.hostname }}"
    # Same ESXi root creds vault_auth.yml already fetched for the legacy
    # tasks/hosts.yml phase — reuse the alias, don't invent a second unset var
    # (Task 9 found this domain always omitted creds via a never-defined
    # vcenter_esxi_username/vcenter_esxi_password, breaking every apply).
    esxi_username: "{{ _esxi_root_username | default(omit) }}"
    esxi_password: "{{ _esxi_root_password | default(omit) }}"
    state: present
  loop: "{{ _vcenter_desired.hosts | default([]) }}"
  loop_control: { label: "{{ item.hostname }}" }
