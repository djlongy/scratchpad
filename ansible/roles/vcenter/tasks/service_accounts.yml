---
# roles/vcenter/tasks/service_accounts.yml
#
# Data-driven RBAC for automation / LDAP principals:
#   1. (optional) create local SSO user via dir-cli — needs VCSA SSH
#   2. converge custom vCenter Role privilege list (API)
#   3. grant Role to principal (API — works for LDAP users/groups once
#      identity source is linked)
#
# Default: vcenter_svc_create_local_sso_users=false and VCSA SSH off.
# Work estates grant roles to LDAP principals without appliance SSH.
#
# Run surgically with:  --tags svc_accounts

- name: Service accounts | Validate required inputs are present
  ansible.builtin.assert:
    that:
      - vcenter_service_accounts | length > 0
      - _vcenter_username | default('') | length > 0
      - _vcenter_password | default('') | length > 0
    fail_msg: >-
      Service-account / RBAC provisioning needs admin SSO credentials
      (vcenter_admin_username/password from ansible-vault preferred) and a
      non-empty vcenter_service_accounts list.
    quiet: true

- name: Service accounts | Assert VCSA SSH when creating local SSO users
  ansible.builtin.assert:
    that:
      - vcenter_vcsa_ssh_enabled | bool
      - vcenter_vcsa_ssh_user | default('') | length > 0
      - vcenter_vcsa_ssh_password | default('') | length > 0
    fail_msg: >-
      vcenter_svc_create_local_sso_users=true requires a temporary VCSA SSH
      window: set vcenter_vcsa_ssh_enabled=true and provide
      vcenter_vcsa_ssh_user/password (ansible-vault). Prefer leaving local SSO
      create off and granting roles to LDAP principals instead.
    quiet: true
  when: vcenter_svc_create_local_sso_users | default(false) | bool

- name: Service accounts | Provision each account / role / permission
  ansible.builtin.include_tasks: service_account_one.yml
  loop: "{{ vcenter_service_accounts }}"
  loop_control:
    loop_var: _svc
    label: "{{ _svc.account | default(_svc.principal) }} → role {{ _svc.role_name }}"
