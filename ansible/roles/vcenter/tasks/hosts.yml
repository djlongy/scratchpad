---
- name: Add ESXi hosts to vCenter
  become: false  # localhost/API — no host privilege
  community.vmware.vmware_host:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ _vcenter_username }}"
    password: "{{ _vcenter_password }}"
    validate_certs: false
    datacenter_name: "{{ vcenter_datacenter }}"
    cluster_name: "{{ vcenter_cluster | default(omit) }}"
    esxi_hostname: "{{ item.hostname }}"
    esxi_username: "{{ _esxi_root_username }}"
    esxi_password: "{{ _esxi_root_password }}"
    esxi_ssl_thumbprint: "{{ item.ssl_thumbprint | default(omit) }}"
    force_connection: true
    state: present
  loop: "{{ vcenter_esxi_hosts }}"
  loop_control:
    label: "{{ item.hostname }}"
  no_log: true
