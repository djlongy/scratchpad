---
# roles/vcenter/tasks/service_account_one.yml
#
# Provision ONE entry (loop var: _svc).
#
# Entry shape:
#   account: svc-ansible          # local SSO short name (when creating users)
#   principal: "NEWEN\\admins"    # optional override for permission grant
#   group: admins                 # optional group name (mutually with principal)
#   role_name: svc-automation
#   privileges: [...]
#   object_name / object_type / recursive — optional permission target
#
# Local SSO user create (dir-cli over VCSA SSH) runs only when
# vcenter_svc_create_local_sso_users is true. Role + permission always use API.

- name: "Svc | Resolve permission principal for {{ _svc.role_name }}"
  ansible.builtin.set_fact:
    _svc_principal: >-
      {{
        _svc.principal
        | default(
            (_svc.account ~ '@' ~ vcenter_sso_domain)
            if (_svc.account is defined)
            else ''
          )
      }}
    _svc_group: "{{ _svc.group | default('') }}"
  no_log: true

# ── Optional: local SSO user via dir-cli (VCSA SSH) ─────────────────────────
- name: "Svc {{ _svc.account | default(_svc.role_name) }} | Local SSO user lifecycle"
  when:
    - vcenter_svc_create_local_sso_users | default(false) | bool
    - _svc.account is defined
    - _svc.account | length > 0
  block:
    - name: "Svc {{ _svc.account }} | Check whether the SSO user already exists"
      become: false
      ansible.builtin.shell:
        cmd: |
          sshpass -p '{{ vcenter_vcsa_ssh_password }}' \
            ssh -o StrictHostKeyChecking=no -T \
            {{ vcenter_vcsa_ssh_user }}@{{ vcenter_vcsa_hostname }} "shell" <<'SSHEOF'
          if /usr/lib/vmware-vmafd/bin/dir-cli user find-by-name \
            --account '{{ _svc.account }}' \
            --login '{{ _vcenter_username }}' \
            --password '{{ _vcenter_password }}' >/dev/null 2>&1; then
            echo "SVC_USER_EXISTS"
          else
            echo "SVC_USER_MISSING"
          fi
          SSHEOF
      register: _svc_find
      changed_when: false
      failed_when: >-
        ('SVC_USER_EXISTS' not in _svc_find.stdout)
        and ('SVC_USER_MISSING' not in _svc_find.stdout)
      no_log: true

    - name: "Svc {{ _svc.account }} | Create user + store credential (first run only)"
      become: false
      when: "'SVC_USER_MISSING' in _svc_find.stdout"
      block:
        - name: "Svc {{ _svc.account }} | Generate a strong password"
          ansible.builtin.set_fact:
            _svc_password: >-
              {{ lookup('community.general.random_string',
                        length=vcenter_svc_password_length,
                        override_special='-_=+.',
                        min_lower=2, min_upper=2, min_numeric=2, min_special=2) }}
          no_log: true

        - name: "Svc {{ _svc.account }} | Write credential to HashiCorp Vault"
          community.hashi_vault.vault_kv2_write:
            url: "{{ vcenter_svc_vault_addr }}"
            engine_mount_point: "{{ vcenter_svc_vault_mount }}"
            path: "{{ vcenter_svc_vault_path_prefix }}/{{ _svc.account }}"
            data:
              username: "{{ _svc.account }}@{{ vcenter_sso_domain }}"
              password: "{{ _svc_password }}"
          when:
            - vcenter_use_hashicorp_vault | bool
            - vcenter_svc_vault_addr | length > 0
          no_log: true

        - name: "Svc {{ _svc.account }} | Ensure credential dir exists (ansible-vault workflow)"
          ansible.builtin.file:
            path: "{{ vcenter_svc_credential_dir }}"
            state: directory
            mode: "0700"
          when: not (vcenter_use_hashicorp_vault | bool)
          delegate_to: localhost
          become: false

        - name: "Svc {{ _svc.account }} | Write credential file for ansible-vault (no HashiCorp)"
          ansible.builtin.copy:
            dest: "{{ vcenter_svc_credential_dir }}/{{ _svc.account }}.yml"
            mode: "0600"
            content: |
              # Generated by roles/vcenter — encrypt before committing:
              #   ansible-vault encrypt {{ vcenter_svc_credential_dir }}/{{ _svc.account }}.yml
              vcenter_svc_{{ _svc.account | replace('-', '_') }}:
                username: "{{ _svc.account }}@{{ vcenter_sso_domain }}"
                password: "{{ _svc_password }}"
          when: not (vcenter_use_hashicorp_vault | bool)
          no_log: true
          delegate_to: localhost
          become: false

        - name: "Svc {{ _svc.account }} | Create the SSO user via dir-cli (no expiry)"
          ansible.builtin.shell:
            cmd: |
              sshpass -p '{{ vcenter_vcsa_ssh_password }}' \
                ssh -o StrictHostKeyChecking=no -T \
                {{ vcenter_vcsa_ssh_user }}@{{ vcenter_vcsa_hostname }} "shell" <<'SSHEOF'
              set -e
              /usr/lib/vmware-vmafd/bin/dir-cli user create \
                --account '{{ _svc.account }}' \
                --user-password '{{ _svc_password }}' \
                --first-name 'svc' --last-name '{{ _svc.account }}' \
                --login '{{ _vcenter_username }}' \
                --password '{{ _vcenter_password }}' 2>&1
              /usr/lib/vmware-vmafd/bin/dir-cli user modify \
                --account '{{ _svc.account }}' \
                --password-never-expires \
                --login '{{ _vcenter_username }}' \
                --password '{{ _vcenter_password }}' 2>&1
              echo "SVC_USER_CREATED"
              SSHEOF
          register: _svc_create
          changed_when: "'SVC_USER_CREATED' in _svc_create.stdout"
          failed_when: "'SVC_USER_CREATED' not in _svc_create.stdout"
          no_log: true

# ── Always: Role + permission via vCenter API (no SSH) ─────────────────────
- name: "Svc | Converge custom vCenter Role '{{ _svc.role_name }}'"
  become: false
  community.vmware.vmware_local_role_manager:
    hostname: "{{ vcenter_hostname | default(vcenter_hostname) }}"
    username: "{{ _vcenter_username }}"
    password: "{{ _vcenter_password }}"
    validate_certs: "{{ vcenter_validate_certs | default(vcenter_cert_validate_certs) | default(false) }}"
    local_role_name: "{{ _svc.role_name }}"
    local_privilege_ids: "{{ _svc.privileges }}"
    action: "{{ vcenter_svc_privilege_action }}"
    state: present
  when: _svc.privileges is defined
  no_log: true

- name: "Svc | Grant Role '{{ _svc.role_name }}' on object"
  become: false
  community.vmware.vmware_object_role_permission:
    hostname: "{{ vcenter_hostname | default(vcenter_hostname) }}"
    username: "{{ _vcenter_username }}"
    password: "{{ _vcenter_password }}"
    validate_certs: "{{ vcenter_validate_certs | default(vcenter_cert_validate_certs) | default(false) }}"
    role: "{{ _svc.role_name }}"
    principal: "{{ _svc_principal if (_svc_group | length == 0) else omit }}"
    group: "{{ _svc_group if (_svc_group | length > 0) else omit }}"
    object_name: "{{ _svc.object_name | default(vcenter_svc_permission_object) }}"
    object_type: "{{ _svc.object_type | default('Folder') }}"
    recursive: "{{ _svc.recursive | default(vcenter_svc_permission_recursive) }}"
    state: present
  when: >-
    (_svc_principal | length > 0) or (_svc_group | length > 0)
  no_log: true
