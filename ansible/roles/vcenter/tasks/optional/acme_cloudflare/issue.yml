---
# optional/acme_cloudflare — ACME order + DNS-01 handoff.
# AIR-GAP: delete entire optional/acme_cloudflare/ — see README.md

- name: Generate ACME account key
  become: false
  community.crypto.openssl_privatekey:
    path: "{{ vcenter_cert_dir }}/account.key"
    type: RSA
    size: "{{ vcenter_acme_account_key_size }}"
  when: vcenter_cert_renewal_needed | bool
  no_log: true

- name: Generate domain private key
  become: false
  community.crypto.openssl_privatekey:
    path: "{{ vcenter_cert_dir }}/{{ vcenter_hostname }}.key"
    type: RSA
    size: "{{ vcenter_cert_key_size }}"
  when: vcenter_cert_renewal_needed | bool
  no_log: true

- name: Generate certificate signing request
  become: false
  community.crypto.openssl_csr:
    path: "{{ vcenter_cert_dir }}/{{ vcenter_hostname }}.csr"
    privatekey_path: "{{ vcenter_cert_dir }}/{{ vcenter_hostname }}.key"
    common_name: "{{ vcenter_hostname }}"
    subject_alt_name:
      - "DNS:{{ vcenter_hostname }}"
  when: vcenter_cert_renewal_needed | bool

- name: Submit ACME certificate order (pass 1 — get challenge)
  become: false
  community.crypto.acme_certificate:
    account_key_src: "{{ vcenter_cert_dir }}/account.key"
    account_email: "{{ vcenter_acme_email | default(omit, true) }}"
    csr: "{{ vcenter_cert_dir }}/{{ vcenter_hostname }}.csr"
    cert: "{{ vcenter_cert_dir }}/{{ vcenter_hostname }}.crt"
    fullchain: "{{ vcenter_cert_dir }}/{{ vcenter_hostname }}-fullchain.crt"
    chain: "{{ vcenter_cert_dir }}/{{ vcenter_hostname }}-chain.crt"
    challenge: dns-01
    acme_directory: "{{ vcenter_acme_directory }}"
    acme_version: 2
    terms_agreed: true
    remaining_days: "{{ vcenter_cert_remaining_days }}"
  register: vcenter_acme_challenge
  when: vcenter_cert_renewal_needed | bool

- name: Fulfill ACME DNS-01 challenge (Cloudflare — same package)
  become: false
  when:
    - vcenter_cert_renewal_needed | bool
    - vcenter_acme_challenge is changed
  block:
    - name: Assert this package only supports Cloudflare DNS-01
      ansible.builtin.assert:
        that:
          - (vcenter_acme_dns_provider | default('cloudflare')) == 'cloudflare'
        fail_msg: >-
          vcenter_acme_dns_provider={{ vcenter_acme_dns_provider }} is not
          implemented. This optional package is ACME+Cloudflare only.
          Air-gap: delete tasks/optional/acme_cloudflare/ and set
          vcenter_cert_issue_acme=false.

    - name: Cloudflare DNS-01 challenge
      ansible.builtin.include_tasks: dns01_challenge.yml
      when: (vcenter_acme_dns_provider | default('cloudflare')) == 'cloudflare'
