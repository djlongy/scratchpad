---
# roles/docker/tasks/install.yml
# Install Docker CE packages. Supports:
#   - Official upstream Docker repo (default)
#   - Air-gapped Artifactory (or any custom) repo via docker_repo_baseurl
# Portable: EL (RHEL/AlmaLinux) + Debian/Ubuntu.

- name: Install Docker CE on EL
  when: ansible_os_family == "RedHat"
  block:
    - name: Install Docker CE dnf prerequisites
      ansible.builtin.dnf:
        name:
          - dnf-plugins-core
          - ca-certificates
        state: present

    # ── GPG key trust ──────────────────────────────────────────────────────
    # Import the GPG key so RPM can verify package signatures.
    # When docker_repo_gpgkey is set (air-gap), import from that URL.
    # Otherwise fall back to the official Docker upstream key.
    - name: Import Docker CE repo GPG key (EL)
      ansible.builtin.rpm_key:
        key: >-
          {{
            docker_repo_gpgkey
            if docker_repo_gpgkey
            else 'https://download.docker.com/linux/centos/gpg'
          }}
        state: present
        validate_certs: "{{ docker_repo_sslverify | bool }}"

    # ── Repo configuration ─────────────────────────────────────────────────
    # When docker_repo_baseurl is set, use it (air-gap / custom mirror).
    # Otherwise configure the official Docker CE stable repo.
    - name: Configure Docker CE repo (EL)
      ansible.builtin.yum_repository:
        name: docker-ce-stable
        description: "Docker CE Stable"
        baseurl: >-
          {{
            docker_repo_baseurl
            if docker_repo_baseurl
            else 'https://download.docker.com/linux/centos/' ~ ansible_distribution_major_version ~ '/$basearch/stable'
          }}
        gpgcheck: "{{ docker_repo_gpgcheck | bool }}"
        gpgkey: >-
          {{
            docker_repo_gpgkey
            if docker_repo_gpgkey
            else 'https://download.docker.com/linux/centos/gpg'
          }}
        sslverify: "{{ docker_repo_sslverify | bool }}"
        enabled: true
        state: present

    # ── Package install ────────────────────────────────────────────────────
    - name: Install Docker CE packages (EL)
      ansible.builtin.dnf:
        name: >-
          {{
            docker_packages
            if not docker_version
            else docker_packages | map('regex_replace', '^(docker-ce|docker-ce-cli|containerd\.io)$', '\1-' ~ docker_version) | list
          }}
        state: present

- name: Install Docker CE on Debian/Ubuntu
  when: ansible_os_family == "Debian"
  block:
    - name: Install Docker CE apt prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    # ── GPG key trust ──────────────────────────────────────────────────────
    # Save the GPG key to the keyrings dir so apt can validate packages.
    # Uses the custom URL when set (air-gap), otherwise the official key.
    - name: Download Docker CE repo GPG key (Debian/Ubuntu)
      ansible.builtin.get_url:
        url: >-
          {{
            docker_repo_gpgkey
            if docker_repo_gpgkey
            else 'https://download.docker.com/linux/' ~ ansible_distribution | lower ~ '/gpg'
          }}
        dest: /etc/apt/keyrings/docker.asc
        owner: root
        group: root
        mode: "0644"
        validate_certs: "{{ docker_repo_sslverify | bool }}"
        force: false

    # ── Repo configuration ─────────────────────────────────────────────────
    - name: Configure Docker CE apt repository (Debian/Ubuntu)
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          {{
            docker_repo_baseurl
            if docker_repo_baseurl
            else 'https://download.docker.com/linux/' ~ ansible_distribution | lower
          }}
          {{ ansible_distribution_release }} stable
        filename: docker-ce
        state: present

    # ── Package install ────────────────────────────────────────────────────
    - name: Install Docker CE packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name: >-
          {{
            docker_packages
            if not docker_version
            else docker_packages | map('regex_replace', '^(docker-ce|docker-ce-cli|containerd\.io)$', '\1=' ~ docker_version) | list
          }}
        state: present
        update_cache: true
