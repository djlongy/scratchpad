---
galaxy_info:
  role_name: docker
  author: lab
  description: >-
    Install and configure Docker CE on EL (RHEL/AlmaLinux) and Debian/Ubuntu —
    internet-connected or air-gapped (Artifactory / custom mirror). Renders a
    fully-variable daemon.json (data-root, bridge/IPAM, registries, log driver,
    ulimits), enables the service, and optionally adds users to the docker group.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions:
        - "8"
        - "9"
    - name: Ubuntu
      versions:
        - all
    - name: Debian
      versions:
        - all
  galaxy_tags:
    - docker
    - container
    - runtime
dependencies: []
