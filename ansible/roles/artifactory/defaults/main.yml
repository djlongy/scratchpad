---
# roles/artifactory/defaults/main.yml
#
# Portable, API-driven configuration of a JFrog Artifactory **Enterprise**
# instance. Desired state lives in GROUP_VARS; captures are reference-only.
#
#   mode: apply    →  reconcile the desired state from group_vars into the
#                     instance (create-or-update; also provision-from-scratch).
#   mode: backup   →  GET every setting over the REST API and write per-env
#                     REFERENCE files (never applied).
#   mode: compare  →  diff live state against the group_vars desired state.
#
# A capture's section shapes match these vars exactly, so copying a section from
# a reference file into group_vars is valid input — no translation.
#
# API shapes target JFrog Artifactory / Xray Enterprise; see docs/api-reference.md
# for the endpoint surface. Verify against your version if it differs materially.

# ── Mode ──────────────────────────────────────────────────────────────────
# apply | backup | compare.
#   backup  -> capture live state to REFERENCE files (never applied).
#   apply   -> reconcile the desired state from GROUP_VARS into the instance.
#   compare -> diff live state against the desired state in group_vars (drift).
# Desired state is ALWAYS group_vars; captures are reference-only. apply is the
# default, so only backup/compare are passed explicitly.
artifactory_mode: apply

# ── Environment & reference files ──────────────────────────────────────────
# Environment label — keeps each environment's reference capture in its own
# folder. Set it per environment in inventory, e.g.  artifactory_env: prod
artifactory_env: default

# Base directory for the per-environment REFERENCE captures (one sub-folder per
# env). These files are written by `mode: backup` for human reference / diffing
# and are NEVER applied — desired state lives in group_vars.
artifactory_state_dir: "{{ role_path }}/files/state"

# Serialisation format of the reference capture: yaml | json.
artifactory_export_format: yaml

# THE bundled reference file, resolved as <state_dir>/<env>/artifactory.config.reference.<ext>.
# Written by `mode: backup` (reference only). Per-env sidecars alongside it:
#   <env>/artifactory.system-config.reference.yml   (system config, reference)
#   <env>/artifactory.drift.yml                      (mode: compare output)
# Override only for a one-off non-standard location.
artifactory_state_file: >-
  {{ artifactory_state_dir }}/{{ artifactory_env }}/artifactory.config.reference.{{ 'json' if artifactory_export_format == 'json' else 'yml' }}

# ── Backup shaping ─────────────────────────────────────────────────────────
# Omit keys with an "empty" value (null, '', [], {}) from the export, so the
# As-Built vars stay small and free of noise like `description: ''` or
# `propertySets: []`. Absent == empty == API default on apply, so this is
# lossless for round-trip. Falsy-but-real settings (false, 0) are always kept.
# Set false for a fully faithful dump that records every field explicitly.
artifactory_export_omit_empty: true

# On `mode: backup`, write the captured system config to its own reference file
# (<env>/artifactory.system-config.reference.yml) — a descriptor_to_config
# transform under a named root (artifactory_system_config_yaml:). Reference only;
# to manage system config, copy the dict into group_vars. Needs `xmltodict` on
# the controller; skipped with a note if absent.
artifactory_export_system_config_files: true

# ── Compare (drift detection) ──────────────────────────────────────────────
# compare: capture live state, diff it against the desired state in group_vars,
# print a per-section summary, and write a structured diff sidecar
# (<env>/artifactory.drift.yml). Set true to fail on drift (a CI gate).
artifactory_compare_fail_on_drift: false

# ── Prune safety ───────────────────────────────────────────────────────────
# Apply is ADDITIVE by default (artifactory_prune=false, below): create-or-update
# only — it never deletes objects present in the instance but absent from the
# desired group_vars. Deletion is always deliberate: per-item `state: absent`, or
# opt-in bulk artifactory_prune.
#
# Environments treated as protected: a prune against one of these FAILS unless
# artifactory_confirm_prune is true, so a destructive prune on prod is a
# conscious act.
artifactory_protected_envs:
  - prod
artifactory_confirm_prune: false

# ── Connection ────────────────────────────────────────────────────────────
# Base platform URL, no trailing slash. Works for on-prem or SaaS.
#   e.g. https://artifactory.dev.example.com   or   https://acme.jfrog.io
artifactory_url: ""

# Auth — an admin **access token** is preferred (scoped, revocable). If set it
# is used as a Bearer token; otherwise basic admin user/password is used.
# Supply via --extra-vars, environment, or a vault lookup in inventory. Never
# commit real values.
artifactory_access_token: "{{ lookup('ansible.builtin.env', 'ARTIFACTORY_TOKEN') | default('', true) }}"
artifactory_admin_username: "{{ lookup('ansible.builtin.env', 'ARTIFACTORY_USER') | default('admin', true) }}"
artifactory_admin_password: "{{ lookup('ansible.builtin.env', 'ARTIFACTORY_PASSWORD') | default('', true) }}"

artifactory_validate_certs: true
artifactory_request_timeout: 30
artifactory_health_retries: 30
artifactory_health_delay: 10

# Run the API calls from the controller by default (the role talks HTTP, it
# doesn't need to live on the Artifactory host). Override to "" to run on the
# target host instead.
artifactory_delegate_to: localhost

# ── Bootstrap: automatic admin token (fresh instance, hands-off) ───────────
# When NO artifactory_access_token is supplied, self-provision a durable admin
# token via JFrog's "automatic admin token" mechanism (Access >= 7.38.4) instead
# of failing — a blank instance becomes fully configured with no manual UI login
# and no hand-minted token. See tasks/bootstrap.yml for the flow.
#
# It RESTARTS Access (the bootstrap file is read at startup), so it needs
# host/container access (self-hosted). It cannot run against SaaS (jfrog.io) or a
# pure-localhost API target — supply artifactory_access_token there. The minted
# token is stored to Vault, so the NEXT run supplies it (via an inventory lookup)
# and this phase is skipped entirely — fully idempotent.
#
# Basic auth is NEVER used for token creation (the Access API rejects it), and
# allow-basic-auth is left FALSE — no permanent security downgrade.
artifactory_bootstrap_enabled: true
# Confirmation required before auto-bootstrap (and its Access restart) on a
# protected env — guards against a forgotten token bouncing prod.
artifactory_confirm_bootstrap: false
# Self-heal a SUPPLIED-but-rejected token. Default OFF = fail-secure: a 401/403
# from an invalid/expired/revoked token hard-fails so you fix the credential.
# Set true (e.g. in a fresh-install pipeline) to instead discard the bad token,
# mint a fresh one via bootstrap, and continue. Still honours the protected-env
# confirmation and needs host access.
artifactory_bootstrap_on_auth_failure: false
# How the instance runs.
#   docker = talk to a container via docker exec/restart (portable across compose
#            bind-mount layouts; needs the docker CLI + docker-group membership).
#   native = package/systemd install — write the trigger file straight to disk,
#            restart Access via systemd, read token.json via slurp. Needs root on
#            the Artifactory host (artifactory_bootstrap_native_become).
# The JFROG_HOME var paths below are the SAME for both (e.g. package install
# JFROG_HOME=/opt/jfrog/artifactory), so keys_dir/token_file need no change.
artifactory_bootstrap_method: docker
# docker method:
artifactory_bootstrap_container: artifactory
artifactory_bootstrap_container_user: artifactory
# native method (package/systemd):
artifactory_bootstrap_service: artifactory        # systemd unit that runs Access
artifactory_bootstrap_service_user: artifactory   # owner of the on-disk Access files
artifactory_bootstrap_native_become: true         # root needed to write/read + restart
# In-container paths (stable in the official image; override for custom installs).
artifactory_bootstrap_keys_dir: /opt/jfrog/artifactory/var/bootstrap/etc/access/keys
artifactory_bootstrap_token_file: /opt/jfrog/artifactory/var/etc/access/keys/token.json
# Set true only when the trigger file was placed BEFORE the container's first
# boot (install-time) — then first boot generates the token and no restart is
# needed here.
artifactory_bootstrap_skip_restart: false
# Poll for token.json: retries x delay seconds. token.json self-deletes ~1 min
# after creation, so keep the delay short enough to catch it.
artifactory_bootstrap_token_retries: 60
artifactory_bootstrap_token_delay: 3
# Durable token minted from the transient one. 0 = non-expiring (rotate by
# clearing the Vault field and re-running). Set seconds to force rotation.
artifactory_bootstrap_token_expires_in: 0
artifactory_bootstrap_token_description: "ansible-managed admin bootstrap token"
# Store the minted token to HashiCorp Vault immediately (read-merge-write, no
# clobber of sibling fields). Set the mount/path in inventory (env-specific).
artifactory_bootstrap_vault_store: false
artifactory_bootstrap_vault_mount: ""
artifactory_bootstrap_vault_path: ""
artifactory_bootstrap_vault_field: admin_access_token
# Also write the token to the local 0600 sidecar (a break-glass record). This is
# a DEDICATED file, separate from artifactory_generated_tokens_file (which
# security/tokens.yml full-overwrites when artifactory_manage_tokens is on) so the
# admin break-glass record can never be clobbered by a token-minting apply run.
artifactory_bootstrap_write_sidecar: true
artifactory_bootstrap_sidecar_file: "{{ playbook_dir }}/artifactory-bootstrap-admin-token.yml"

# ── Apply behaviour ───────────────────────────────────────────────────────
# When true, objects that already exist are PATCHed/POSTed to match desired
# state. When false, existing objects are left as-is (create-if-absent) — the
# safe choice against an instance with hand-tuned settings you don't manage.
artifactory_reconcile_existing: true

# Per-section master switches. Combine with --tags for finer control. Every
# section is also a no-op when its data structure is empty, so a partial
# backup file applies cleanly.
artifactory_manage_system_config: true   # self-hosted only (blocked on SaaS)
artifactory_manage_repositories: true
artifactory_manage_groups: true
artifactory_manage_users: true
artifactory_manage_permissions: true
artifactory_manage_projects: true
artifactory_manage_environments: true    # global lifecycle stages
artifactory_manage_vault: true           # HashiCorp Vault connections (Access)
artifactory_manage_ldap: true            # LDAP integration (Access)
artifactory_manage_sso: true             # SAML / OAuth / Crowd
artifactory_manage_xray: true            # policies / watches / ignore rules
artifactory_manage_replications: true
artifactory_manage_webhooks: true
artifactory_manage_tokens: false         # opt-in: mints NEW secrets, can't round-trip

# Stop the whole run if any single object fails to apply. False = best-effort
# (log the failure, continue) which is usually what you want for a bulk import.
artifactory_fail_fast: false

# ── Removal / prune ───────────────────────────────────────────────────────
# Two ways to remove things:
#   1. Surgical: add `state: absent` to any object in the lists below → DELETE.
#      (Run against just that object for a precise removal.)
#   2. Prune: artifactory_prune=true deletes server objects of a managed type
#      that are NOT present in the desired list — a full reconcile. DANGEROUS,
#      so it is OFF by default, honours --check (dry-run), and never touches the
#      protected built-ins in artifactory_prune_protect (vars/main.yml). Limit
#      which sections prune acts on with artifactory_prune_sections.
artifactory_prune: false
artifactory_prune_sections: [repositories, groups, users, permissions, projects, environments, vault, webhooks, xray]

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║ DESIRED STATE  —  set these in GROUP_VARS                                 ║
# ║ Empty here so a bare run is a safe no-op. Put real values in inventory    ║
# ║ group_vars; `mode: backup` writes reference files you can copy from.      ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ── System / global configuration ─────────────────────────────────────────
# artifactory_system_config_yaml — declarative config in the YAML-PATCH schema,
# applied PER-BLOCK and fail-soft (PATCH /api/system/configuration,
# application/yaml). Keys mirror the descriptor element names flattened; named
# collections are KEYED MAPS (by key/name). NOTE: there is NO `general:`
# wrapper — baseUrl/serverName/… are top-level. A backup writes a reference copy
# (artifactory.system-config.reference.yml); copy the dict here to manage it.
artifactory_system_config_yaml: {}
#   urlBase: "https://artifactory.dev.example.com"
#   serverName: artifactory.dev.example.com
#   fileUploadMaxSizeMb: 100
#   trashcanConfig:
#     enabled: true
#     retentionPeriodDays: 14
#   backups:
#     backup-daily:                 # keyed map — the key IS the backup's `key`
#       enabled: true
#       cronExp: "0 0 2 ? * MON-FRI"
#       excludeNewRepositories: false

# Per-environment overrides, deep-merged onto the shared config before PATCH.
# This is how you run ONE shared desired-state across dev/test/prod without
# copying per-machine files: keep the common config in group_vars/all
# (artifactory_system_config_yaml), and put ONLY the keys that differ per env
# (urlBase, serverName, a mail host, …) in inventories/<env>/group_vars here.
# Recursive merge, so a nested override touches one leaf and keeps its siblings.
#   # inventories/prod/group_vars/all/artifactory.yml
#   artifactory_system_config_yaml_overrides:
#     urlBase: "https://artifactory.prod.example.com/artifactory/"
#     serverName: artifactory-prod
artifactory_system_config_yaml_overrides: {}

# Re-supply secrets the backup stripped (master-key encrypted — cannot port):
# deep-merged into the desired config before PATCH. Same shape as the config but
# secrets only, ideally from Vault. Example:
#   artifactory_system_config_secrets:
#     mailServer: {password: "{{ lookup('community.hashi_vault.hashi_vault', '…') }}"}
artifactory_system_config_secrets: {}

# ── Repositories ──────────────────────────────────────────────────────────
# Each entry is the FULL repo config object the /api/repositories API accepts
# for that rclass/packageType. Only `key` is required by the role; everything
# else is passed through verbatim, so any repo option Artifactory supports is
# expressible without changing the role. Apply order: local → remote → virtual
# → federated (virtuals/federated reference the others).
artifactory_local_repositories: []
artifactory_remote_repositories: []
artifactory_virtual_repositories: []
artifactory_federated_repositories: []

# ── Security: groups, users, permission targets ───────────────────────────
artifactory_groups: []
#   - name: dev-team
#     description: "Developers"
#     autoJoin: false
#     adminPrivileges: false

# NOTE: GET /api/security/users never returns passwords (hashed in the DB), so
# backup captures users WITHOUT a password. On apply, a user missing a password
# is created with a generated one (written to artifactory_generated_users_file)
# unless `password` is supplied. Existing users keep their password if omitted.
artifactory_users: []

# Users whose `realm` is not "internal" (ldap / saml / crowd / oauth) are
# provisioned by their identity provider on first login — recreating them from
# a backup would turn them into INTERNAL accounts with a generated password,
# breaking the integration. They are therefore skipped on apply (still listed
# in backups, and never pruned). Set false only if you know what you're doing.
artifactory_users_skip_external_realms: true
#   - name: alice
#     email: alice@example.com
#     admin: false
#     profileUpdatable: true
#     groups: [dev-team]
#     # password: "{{ vault_alice_password }}"   # optional

# Permission targets — v2 JSON shape (repo / build / releaseBundle sections,
# each: repositories + actions.{users,groups} with read/write/annotate/delete/manage).
artifactory_permissions: []
#   - name: dev-rw
#     repo:
#       repositories: [dev-docker-local]
#       actions:
#         groups:
#           dev-team: [read, write, annotate, delete]

# ── Projects (Access API) + roles + members ───────────────────────────────
artifactory_projects: []
#   - project_key: acme
#     display_name: ACME
#     description: "ACME tenant"
#     admin_privileges:
#       manage_members: true
#       manage_resources: true
#       index_resources: true
#     storage_quota_bytes: -1
#     # custom roles beyond the built-ins:
#     roles:
#       - name: release-manager
#         type: CUSTOM
#         environments: [DEV, PROD]
#         actions: [READ_REPOSITORY, DEPLOY_CACHE_REPOSITORY, MANAGE_XRAY_MD_REPOSITORY]
#     members:
#       users:
#         - name: alice
#           roles: [Developer]
#       groups:
#         - name: dev-team
#           roles: [Contributor]
#     # repositories to assign into the project (by key):
#     repositories: [acme-docker-dev-local]

# ── Lifecycle stages / global environments ────────────────────────────────
# Promotion stages projects assign repos to. DEV and PROD are built in.
artifactory_environments: []
#   - name: STAGING
#   - name: QA

# ── HashiCorp Vault connections (Access) ──────────────────────────────────
# Let JFrog source secrets (signing keys, remote creds) from HashiCorp Vault.
artifactory_vault_configs: []
#   - key: corp-vault
#     vault:
#       url: "https://vault.example.com:8200"
#       auth:
#         type: token            # token | appRole | ...
#         # token: "{{ vault_jfrog_token }}"   # supply at apply time
#       mounts:
#         - path: secret
#           type: kv2

# ── LDAP integration (Access) ─────────────────────────────────────────────
artifactory_ldap_settings: []
#   - key: corp-ldap
#     enabled: true
#     ldap_url: "ldap://ldap.example.com:389/dc=example,dc=com"
#     search:
#       search_filter: "(uid={0})"
#       search_base: "ou=people"
#       search_sub_tree: true
#       manager_dn: "cn=binduser,dc=example,dc=com"
#       # manager_password: never put it here — see the map below

# LDAP bind password(s). The API only ever returns search.manager_password
# MASKED (asterisks), rejects the masked value if sent back, and WIPES the
# stored password if the field is omitted on update — so a backup file cannot
# round-trip it. Supply the real secret at apply time, ideally from Vault.
#
# Single LDAP setting (the common case) — just one scalar, no dict, no keys:
#   artifactory_ldap_manager_password: "{{ enc_svc_bind_artifactory_password }}"
#
# Multiple LDAP settings — key each password to its setting; a map entry
# overrides the scalar fallback for that setting:
#   artifactory_ldap_manager_passwords:
#     corp-ldap: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=…:corp') }}"
#     partner-ldap: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=…:partner') }}"
#
# Resolution per setting: map[<setting key>] first, else the scalar. Settings
# with a manager_dn but no password from either source (and only the masked
# value in the body) are SKIPPED on apply, with a warning — never applied broken.
artifactory_ldap_manager_password: ""
artifactory_ldap_manager_passwords: {}

artifactory_ldap_groups: []
#   - name: corp-ldap-groups
#     enabled_ldap: corp-ldap           # key of the ldap setting above
#     group_base_dn: "ou=groups"
#     group_name_attribute: cn
#     group_member_attribute: uniqueMember
#     filter: "(objectClass=groupOfUniqueNames)"
#     strategy: STATIC
#     sub_tree: true

# ── SSO singletons (SAML / OAuth / Crowd) ─────────────────────────────────
# Each is a single config object. Leave empty to skip. Backup captures the
# live config; apply POSTs it back. Secrets (client secrets, certs) are NOT
# fully returned by GET — supply them at apply time via vars/Vault.
artifactory_saml_config: {}
artifactory_oauth_config: {}
artifactory_crowd_config: {}

# ── Xray: policies, watches, ignore rules, indexed repos ──────────────────
artifactory_xray_policies: []
#   - name: block-critical
#     type: security
#     rules:
#       - name: crit
#         priority: 1
#         criteria: {min_severity: Critical}
#         actions: {block_download: {active: true, unscanned: false}, fail_build: true}
artifactory_xray_watches: []
#   - general_data: {name: all-repos-watch, active: true}
#     project_resources: {resources: [{type: all-repos, name: All Repositories}]}
#     assigned_policies: [{name: block-critical, type: security}]
artifactory_xray_ignore_rules: []
# Repos Xray should index (binary manager id usually "default").
artifactory_xray_indexed_repos: []
artifactory_xray_binmgr_id: default

# ── Xray reports ──────────────────────────────────────────────────────────
# Scheduled/on-demand reports. Idempotent by name (create-if-absent), since a
# report id is generated per run. Each: {name, type, resources, filters} where
# type ∈ vulnerabilities | licenses | violations | operationalRisks.
artifactory_xray_reports: []
#   - name: critical-vulns-docker
#     type: vulnerabilities
#     resources:
#       repositories:
#         - name: docker-local
#     filters:
#       severities: [High, Critical]

# ── Replications (Enterprise) ─────────────────────────────────────────────
# Keyed by source repo. Each entry is the replication config for that repo.
artifactory_replications: []
#   - repoKey: my-local
#     url: "https://dr.example.com/artifactory/my-local"
#     cronExp: "0 0 12 * * ?"
#     enabled: true
#     # username/password supplied at apply time

# ── Webhooks (event service) ──────────────────────────────────────────────
artifactory_webhooks: []
#   - key: ci-notify
#     event_filter:
#       domain: artifact
#       event_types: [deployed]
#     handlers:
#       - handler_type: webhook
#         url: https://ci.example.com/hooks/artifactory

# ── Access tokens (opt-in; mints NEW secrets — never exported) ─────────────
# Only created when artifactory_manage_tokens is true. Generated tokens are
# written to artifactory_generated_tokens_file (mode 0600) for you to store in
# a secret manager — they are no_log everywhere else.
artifactory_tokens: []
#   - subject: ci-acme
#     scope: "applied-permissions/groups:dev-team"
#     expires_in: 0           # seconds; 0 = non-expiring
#     description: "GitLab CI token"

# Sidecar output files for secrets that can't round-trip.
artifactory_generated_users_file: "{{ playbook_dir }}/artifactory-generated-users.yml"
artifactory_generated_tokens_file: "{{ playbook_dir }}/artifactory-generated-tokens.yml"
