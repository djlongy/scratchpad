---
# roles/artifactory/tasks/merge.yml
# Surgically merge selected sections from the live "As-Built" state into the
# saved IaC YAML, writing a merged file for review (MR-driven IaC). This NEVER
# applies anything — it produces a candidate IaC file a human reviews and
# commits, after which `apply` reconciles it.
#
#   ansible-playbook playbooks/artifactory.yml -e artifactory_url=$AF \
#     -e artifactory_mode=merge -e artifactory_env=prod \
#     -e '{"artifactory_merge_sections": ["artifactory_local_repositories","artifactory_xray_policies"]}'
#   (baseline = that env's saved state file; candidate written to <state>.merged.yml)

- name: "Merge | Require sections to merge"
  ansible.builtin.assert:
    that: artifactory_merge_sections | length > 0
    fail_msg: >-
      Set artifactory_merge_sections to the state-var name(s) to pull from
      As-Built, e.g. [artifactory_local_repositories, artifactory_xray_policies].
    quiet: true

- name: "Merge | Capture live As-Built state"
  ansible.builtin.import_tasks: backup.yml

- name: "Merge | Load saved IaC baseline"
  ansible.builtin.set_fact:
    _af_saved: "{{ lookup('ansible.builtin.file', artifactory_state_file) | from_yaml }}"
  delegate_to: localhost
  run_once: true

- name: "Merge | Produce merged IaC (saved + As-Built[sections])"
  ansible.builtin.set_fact:
    _af_merged: "{{ _af_saved | merge_sections(_af_state, artifactory_merge_sections) }}"

- name: "Merge | Show what each merged section now contains vs the baseline"
  ansible.builtin.debug:
    msg: "{{ (_af_saved | config_diff(_af_merged) | diff_summary) }}"

- name: "Merge | Write merged IaC candidate"
  ansible.builtin.copy:
    content: "{{ _af_merged | to_pretty_yaml(indent=2, width=200, gap_depth=2, gap_blocks_only=true) }}"
    dest: "{{ _af_merged_file }}"
    mode: "0640"
  delegate_to: localhost
  run_once: true

- name: "Merge | Done"
  ansible.builtin.debug:
    msg: >-
      Merged {{ artifactory_merge_sections | join(', ') }} from As-Built into
      {{ artifactory_state_file }} → {{ _af_merged_file }}. Review it as an MR;
      once approved, replace the state file with it
      (mv {{ _af_merged_file }} {{ artifactory_state_file }}) and run
      artifactory_mode=apply.
