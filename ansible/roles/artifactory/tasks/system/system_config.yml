---
# roles/artifactory/tasks/system/system_config.yml
# Apply global/system configuration via the YAML PATCH (the supported,
# version-tolerant path). Desired state comes ONLY from group_vars:
#   base      = artifactory_system_config_yaml            (group_vars/all)
#   overrides = artifactory_system_config_yaml_overrides  (inventories/<env>/group_vars)
#   secrets   = artifactory_system_config_secrets         (Vault)
# These are deep-merged, then PATCHed PER-BLOCK and fail-soft: a block this
# Artifactory version rejects is reported and skipped instead of sinking the
# whole apply. A backup writes artifactory.system-config.reference.yml as a
# REFERENCE — it is never auto-loaded; copy the dict into group_vars to manage it.

# Build the effective desired config in an INTERNAL fact, so the merge result is
# never shadowed by the precedence of its inputs (e.g. a base passed via
# --extra-vars would otherwise out-rank a set_fact that re-set the same name).
- name: "System_config | Compose desired config (base ◁ per-env overrides)"
  ansible.builtin.set_fact:
    _af_syscfg: "{{ artifactory_system_config_yaml | default({}) | combine(artifactory_system_config_yaml_overrides | default({}), recursive=true) }}"

- name: "System_config | Layer re-supplied secrets onto the desired config"
  ansible.builtin.set_fact:
    _af_syscfg: "{{ _af_syscfg | combine(artifactory_system_config_secrets, recursive=true) }}"
  when: artifactory_system_config_secrets | default({}) | length > 0
  no_log: true

- name: "System_config | Apply YAML config per-block, dropping version-unknown keys"
  # Version-adaptive: PATCHes each top-level block and, on a 400 that names a key
  # the target's schema doesn't accept ("Key <x> is not part of the
  # configuration"), drops that key and retries — so the maximal version-
  # compatible subset applies and every dropped/rejected key is reported. This is
  # what makes the same desired config apply across Artifactory up/downgrades.
  artifactory_config_apply:
    url: "{{ artifactory_ep.system_config }}"
    config: "{{ _af_syscfg }}"
    token: "{{ artifactory_access_token | default('', true) }}"
    username: "{{ artifactory_admin_username if (_af_use_basic | default(false)) else omit }}"
    password: "{{ artifactory_admin_password if (_af_use_basic | default(false)) else omit }}"
    validate_certs: "{{ artifactory_validate_certs }}"
    timeout: "{{ artifactory_request_timeout }}"
  register: _ap_sysyaml
  changed_when: _ap_sysyaml.applied | default([]) | length > 0
  failed_when: false
  when: _af_syscfg | default({}) | length > 0

- name: "System_config | Report dropped / rejected config keys"
  ansible.builtin.debug:
    msg: >-
      system-config: {{ _ap_sysyaml.applied | default([]) | length }} block(s) applied.
      {{ ('Dropped version-incompatible keys: ' ~ _ap_sysyaml.dropped) if (_ap_sysyaml.dropped | default({})) else '' }}
      {{ ('REJECTED blocks (review): ' ~ _ap_sysyaml.rejected) if (_ap_sysyaml.rejected | default({})) else '' }}
  when:
    - _ap_sysyaml is defined
    - (_ap_sysyaml.dropped | default({})) or (_ap_sysyaml.rejected | default({}))

- name: "System_config | Fail if blocks were rejected and fail-fast is set"
  ansible.builtin.fail:
    msg: "System-config blocks rejected on this target: {{ _ap_sysyaml.rejected.keys() | list | join(', ') }} (artifactory_fail_fast is true)."
  when:
    - artifactory_fail_fast | bool
    - _ap_sysyaml.rejected | default({}) | length > 0
