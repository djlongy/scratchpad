---
# roles/artifactory/tasks/security/users.yml
# Users need a password on creation, but GET never returns one (so a backup
# can't carry it). Per user: create with the supplied password, or a generated
# passphrase recorded to artifactory_generated_users_file for you to distribute
# / store in a secret manager. Existing users are updated without touching their
# password unless one is supplied.
#
# External-realm users (realm: ldap/saml/crowd/oauth) are provisioned by their
# identity provider on first login — applying them from a backup would create
# INTERNAL accounts with generated passwords and break the integration, so by
# default they are skipped (artifactory_users_skip_external_realms).

- name: "Users | Note external-realm users left to their identity provider"
  ansible.builtin.debug:
    msg: >-
      Skipping {{ _af_external_users | length }} external-realm user(s)
      ({{ _af_external_users | map(attribute='name') | join(', ') }}) — they are
      provisioned by LDAP/SSO on first login. Set
      artifactory_users_skip_external_realms=false to force-manage them.
  vars:
    _af_external_users: >-
      {{ artifactory_users | selectattr('realm', 'defined')
         | rejectattr('realm', 'eq', 'internal') | list }}
  when:
    - artifactory_users_skip_external_realms | bool
    - _af_external_users | length > 0

- name: "Users | Reconcile each user"
  ansible.builtin.include_tasks: user_item.yml
  loop: "{{ _af_managed_users }}"
  loop_control:
    loop_var: _user
    label: "{{ _user.name }}"
  vars:
    _af_managed_users: >-
      {{ artifactory_users if not (artifactory_users_skip_external_realms | bool)
         else (artifactory_users | rejectattr('realm', 'defined') | list
               + (artifactory_users | selectattr('realm', 'defined')
                  | selectattr('realm', 'eq', 'internal') | list)) }}

- name: "Users | Persist generated passwords (if any)"
  ansible.builtin.copy:
    content: "{{ _af_generated_users | to_nice_yaml(indent=2) }}"
    dest: "{{ artifactory_generated_users_file }}"
    mode: "0600"
  delegate_to: localhost
  when: _af_generated_users | default([]) | length > 0
  no_log: true

- name: "Users | Prune unmanaged"
  ansible.builtin.include_tasks: ../shared/prune.yml
  vars:
    _prune_section: users
    _prune_endpoint: "{{ artifactory_ep.users }}"
    _prune_id: name
    # Deliberately the FULL desired list (external-realm users included), so
    # prune never deletes identity-provider accounts that apply skipped.
    _prune_desired: "{{ artifactory_users | map(attribute='name') | list }}"
    _prune_list_url: "{{ artifactory_ep.users }}"
  when:
    - artifactory_prune | bool
    - "'users' in artifactory_prune_sections"
