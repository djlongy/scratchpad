---
# roles/artifactory/tasks/preflight.yml
# Resolve auth, confirm the instance is reachable, and derive the per-env output
# paths used by backup/compare.
#
# Desired state comes ONLY from group_vars (the section vars + the system-config
# dict). This role never loads a capture as desired state — captures are
# reference-only. So there is no promote-from / state-file-load machinery here.

- name: Assert a base URL was provided
  ansible.builtin.assert:
    that:
      - artifactory_url | length > 0
    fail_msg: "artifactory_url must be set (e.g. https://artifactory.example.com)."
    quiet: true

# Resolve the effective token into an INTERNAL fact. bootstrap.yml sets _af_token
# to the token it minted; if bootstrap was skipped, fall back to the supplied
# artifactory_access_token. Using an internal fact (never an extra-var) means the
# minted token can't be shadowed by a higher-precedence artifactory_access_token
# on the command line.
- name: Resolve the effective access token
  ansible.builtin.set_fact:
    _af_token: "{{ _af_token | default(artifactory_access_token | default('')) }}"
  no_log: true

- name: Assert credentials are present
  ansible.builtin.assert:
    that:
      - (_af_token | length > 0) or (artifactory_admin_password | length > 0)
    fail_msg: >-
      No usable credential. Provide artifactory_access_token (preferred) or
      artifactory_admin_password (ARTIFACTORY_TOKEN / ARTIFACTORY_PASSWORD in the
      environment, or --extra-vars). On a fresh self-hosted instance you can
      instead leave the token empty and let the bootstrap phase mint one
      (artifactory_bootstrap_enabled, needs container access) — if you are seeing
      this, bootstrap was disabled or produced no token.
    quiet: true

- name: Decide auth scheme (token Bearer vs basic)
  ansible.builtin.set_fact:
    _af_use_basic: "{{ _af_token | length == 0 }}"
    _af_headers: >-
      {{
        {'Authorization': 'Bearer ' + _af_token}
        if (_af_token | length > 0) else {}
      }}
  no_log: true

# JSON header bundle reused by write tasks (auth + content-type).
- name: Build reusable JSON request headers
  ansible.builtin.set_fact:
    _af_json_headers: "{{ _af_headers | combine({'Content-Type': 'application/json'}) }}"
  no_log: true

# Health-gate the instance, but FAIL FAST on auth rejection. A revoked /
# invalid / expired token returns 401 (403 if forbidden) even from the
# otherwise-anonymous ping endpoint — retrying that for artifactory_health_retries
# rounds just burns ~5 min before failing with a generic timeout. Accept the auth
# codes here so the retry loop doesn't spin on them, then hard-fail immediately
# below. Genuine "not up yet" conditions (connection refused, 502/503) are NOT in
# the accept list, so they still fail the task and drive the retry/backoff loop.
- name: Ping Artifactory until it responds (retry transient errors only)
  ansible.builtin.uri:
    url: "{{ artifactory_ep.ping }}"
    method: GET
    headers: "{{ _af_headers }}"
    status_code: [200, 401, 403]
  check_mode: false
  register: _af_ping
  retries: "{{ artifactory_health_retries }}"
  delay: "{{ artifactory_health_delay }}"
  until: _af_ping.status in [200, 401, 403]
  changed_when: false

- name: Fail fast on an unauthorized / revoked token
  ansible.builtin.fail:
    msg: >-
      Artifactory rejected the credentials at {{ artifactory_url }}
      (HTTP {{ _af_ping.status }}). The access token or admin password is
      invalid, expired, or revoked — fix the credential rather than retrying.
  when: _af_ping.status in [401, 403]

- name: Read Artifactory version
  ansible.builtin.uri:
    url: "{{ artifactory_ep.version }}"
    method: GET
    headers: "{{ _af_headers }}"
    status_code: [200]
  check_mode: false
  register: _af_version
  changed_when: false
  failed_when: false

- name: Report target instance
  ansible.builtin.debug:
    msg: >-
      Artifactory {{ (_af_version.json.version | default('unknown')) }}
      ({{ (_af_version.json.license | default('license n/a')) }})
      at {{ artifactory_url }} — mode={{ artifactory_mode }}

# ── Per-env output paths (backup writes them, compare reads only the drift) ──
# All derive from the per-env directory that holds the bundled reference file.
- name: Resolve the per-env output directory and reference paths
  ansible.builtin.set_fact:
    _af_state_dir_env: "{{ artifactory_state_file | dirname }}"
    _af_drift_file: "{{ artifactory_state_file | dirname }}/artifactory.drift.yml"
    _af_syscfg_ref: "{{ artifactory_state_file | dirname }}/artifactory.system-config.reference.yml"

# ── Prune safety (apply only) ─────────────────────────────────────────────
# prune deletes server objects of a managed type not present in the desired
# group_vars — dangerous, so on a PROTECTED env it needs explicit confirmation.
- name: Prune guard — pruning a protected environment needs confirmation
  ansible.builtin.assert:
    that:
      - artifactory_confirm_prune | bool
    fail_msg: >-
      Refusing to prune protected environment '{{ artifactory_env }}'
      (artifactory_prune=true) — pruning DELETES unmanaged objects. Review the
      drift (mode: compare) first, then re-run with
      -e artifactory_confirm_prune=true.
    quiet: true
  when:
    - artifactory_mode == 'apply'
    - artifactory_prune | bool
    - artifactory_env in artifactory_protected_envs
