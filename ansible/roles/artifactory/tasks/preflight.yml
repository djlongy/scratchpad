---
# roles/artifactory/tasks/preflight.yml
# Resolve auth, confirm the instance is reachable, and (apply mode) load any
# import file as desired state.

- name: Assert a base URL was provided
  ansible.builtin.assert:
    that:
      - artifactory_url | length > 0
    fail_msg: "artifactory_url must be set (e.g. https://artifactory.example.com)."
    quiet: true

- name: Assert credentials are present
  ansible.builtin.assert:
    that:
      - (artifactory_access_token | length > 0) or (artifactory_admin_password | length > 0)
    fail_msg: >-
      Provide either artifactory_access_token (preferred) or
      artifactory_admin_password. Set ARTIFACTORY_TOKEN / ARTIFACTORY_PASSWORD
      in the environment, or pass --extra-vars.
    quiet: true

- name: Decide auth scheme (token Bearer vs basic)
  ansible.builtin.set_fact:
    _af_use_basic: "{{ artifactory_access_token | length == 0 }}"
    _af_headers: >-
      {{
        {'Authorization': 'Bearer ' + artifactory_access_token}
        if (artifactory_access_token | length > 0) else {}
      }}
  no_log: true

# JSON header bundle reused by write tasks (auth + content-type).
- name: Build reusable JSON request headers
  ansible.builtin.set_fact:
    _af_json_headers: "{{ _af_headers | combine({'Content-Type': 'application/json'}) }}"
  no_log: true

- name: Ping Artifactory until it responds
  ansible.builtin.uri:
    url: "{{ artifactory_ep.ping }}"
    method: GET
    headers: "{{ _af_headers }}"
    status_code: [200]
  check_mode: false
  register: _af_ping
  retries: "{{ artifactory_health_retries }}"
  delay: "{{ artifactory_health_delay }}"
  until: _af_ping.status == 200
  changed_when: false

- name: Read Artifactory version
  ansible.builtin.uri:
    url: "{{ artifactory_ep.version }}"
    method: GET
    headers: "{{ _af_headers }}"
    status_code: [200]
  check_mode: false
  register: _af_version
  changed_when: false
  failed_when: false

- name: Report target instance
  ansible.builtin.debug:
    msg: >-
      Artifactory {{ (_af_version.json.version | default('unknown')) }}
      ({{ (_af_version.json.license | default('license n/a')) }})
      at {{ artifactory_url }} — mode={{ artifactory_mode }}

# ── Resolve the one state file + derived sidecar paths (every mode) ───────
- name: Resolve the state file stem (basis for all sidecars)
  ansible.builtin.set_fact:
    _af_state_stem: "{{ artifactory_state_file | regex_replace('\\.(ya?ml|json)$', '') }}"

- name: Derive sidecar paths from the state file stem
  ansible.builtin.set_fact:
    _af_drift_file: "{{ _af_state_stem }}.drift.yml"

# ── Resolve the apply desired-state source + existence checks ─────────────
# For apply, desired state comes from artifactory_promote_from's env file when
# promoting (resolved against the ABSOLUTE state_dir, so it never depends on a
# fragile relative path), otherwise from this env's own state file.
- name: Resolve the apply desired-state source file
  ansible.builtin.set_fact:
    _af_source_file: >-
      {{ (artifactory_state_dir ~ '/' ~ artifactory_promote_from ~ '/artifactory.'
          ~ ('json' if artifactory_export_format == 'json' else 'yml'))
         if (artifactory_promote_from | length > 0) else artifactory_state_file }}

- name: Check whether this env's state file exists (compare baseline)
  ansible.builtin.stat:
    path: "{{ artifactory_state_file }}"
  register: _af_state_stat
  delegate_to: localhost
  run_once: true

- name: Check whether the apply source file exists
  ansible.builtin.stat:
    path: "{{ _af_source_file }}"
  register: _af_source_stat
  delegate_to: localhost
  run_once: true

- name: Require a saved baseline for compare
  ansible.builtin.assert:
    that: _af_state_stat.stat.exists
    fail_msg: >-
      mode: {{ artifactory_mode }} needs a saved baseline at
      {{ artifactory_state_file }}, but none exists. Run mode: backup for
      environment '{{ artifactory_env }}' first.
    quiet: true
  when: artifactory_mode == 'compare'

- name: Require the promotion source to exist
  ansible.builtin.assert:
    that: _af_source_stat.stat.exists
    fail_msg: >-
      artifactory_promote_from='{{ artifactory_promote_from }}' but no captured
      state exists at {{ _af_source_file }}. Run mode: backup for environment
      '{{ artifactory_promote_from }}' first.
    quiet: true
  when:
    - artifactory_mode == 'apply'
    - artifactory_promote_from | length > 0

- name: Prune guard — pruning a protected environment needs confirmation
  ansible.builtin.assert:
    that:
      - artifactory_confirm_promote | bool
    fail_msg: >-
      Refusing to prune protected environment '{{ artifactory_env }}'
      (artifactory_prune=true) — pruning DELETES unmanaged objects. Review the
      drift (mode: compare) first, then re-run with
      -e artifactory_confirm_promote=true.
    quiet: true
  when:
    - artifactory_mode == 'apply'
    - artifactory_prune | bool
    - artifactory_env in artifactory_protected_envs

- name: Apply — load desired state + promotion guard
  when:
    - artifactory_mode == 'apply'
    - _af_source_stat.stat.exists
  block:
    - name: Load the source state file into a fact (for provenance + guard)
      ansible.builtin.set_fact:
        _af_loaded: "{{ lookup('ansible.builtin.file', _af_source_file) | from_yaml }}"
      delegate_to: localhost
      run_once: true

    - name: Promotion guard — cross-env apply onto a protected environment needs confirmation
      ansible.builtin.assert:
        that:
          - artifactory_confirm_promote | bool
        fail_msg: >-
          Refusing to apply state captured from environment
          '{{ _af_loaded._meta.environment | default("?") }}' onto protected
          environment '{{ artifactory_env }}'. This is a promotion (e.g.
          dev -> prod). Review the drift (mode: compare) first, then re-run with
          -e artifactory_confirm_promote=true.
        success_msg: "Promotion into protected environment '{{ artifactory_env }}' confirmed."
        quiet: true
      when:
        - artifactory_env in artifactory_protected_envs
        - (_af_loaded._meta.environment | default(artifactory_env)) != artifactory_env

    - name: Load desired state from the source state file
      ansible.builtin.include_vars:
        file: "{{ _af_source_file }}"

- name: Note when applying with no saved state file (provision-from-scratch)
  ansible.builtin.debug:
    msg: >-
      No saved state at {{ _af_source_file }} — applying the inline role
      variables (provision-from-scratch). Run mode: backup first to capture an
      environment's As-Built.
  when:
    - artifactory_mode == 'apply'
    - not _af_source_stat.stat.exists
    - artifactory_promote_from | length == 0
