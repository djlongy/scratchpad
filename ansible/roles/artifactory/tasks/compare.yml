---
# roles/artifactory/tasks/compare.yml
# Report drift between the live "As-Built" state and the DESIRED state declared
# in group_vars. Captures are reference-only, so drift is "live vs what you've
# declared", not "live vs a saved file". Reuses backup.yml to capture the live
# state into _af_state (its write tasks self-skip outside mode: backup), builds
# the desired state from the section group_vars, diffs section-by-section via the
# config_diff filter, prints a summary, writes a structured diff sidecar, and
# optionally fails on drift (CI gate).
#
#   ansible-playbook playbooks/artifactory.yml -i inventories/<env> \
#     -e artifactory_mode=compare
#   (desired = that env's group_vars; drift written to <env>/artifactory.drift.yml)

- name: "Compare | Capture live As-Built state"
  ansible.builtin.import_tasks: backup.yml

- name: "Compare | Assemble desired state from group_vars"
  ansible.builtin.set_fact:
    _af_desired: "{{ _af_desired_raw | drop_empty if artifactory_export_omit_empty | bool else _af_desired_raw }}"
  vars:
    _af_desired_raw:
      artifactory_local_repositories: "{{ artifactory_local_repositories | default([]) }}"
      artifactory_remote_repositories: "{{ artifactory_remote_repositories | default([]) }}"
      artifactory_virtual_repositories: "{{ artifactory_virtual_repositories | default([]) }}"
      artifactory_federated_repositories: "{{ artifactory_federated_repositories | default([]) }}"
      artifactory_groups: "{{ artifactory_groups | default([]) }}"
      artifactory_users: "{{ artifactory_users | default([]) }}"
      artifactory_permissions: "{{ artifactory_permissions | default([]) }}"
      artifactory_environments: "{{ artifactory_environments | default([]) }}"
      artifactory_projects: "{{ artifactory_projects | default([]) }}"
      artifactory_ldap_settings: "{{ artifactory_ldap_settings | default([]) }}"
      artifactory_ldap_groups: "{{ artifactory_ldap_groups | default([]) }}"
      artifactory_saml_config: "{{ artifactory_saml_config | default({}) }}"
      artifactory_oauth_config: "{{ artifactory_oauth_config | default({}) }}"
      artifactory_crowd_config: "{{ artifactory_crowd_config | default({}) }}"
      artifactory_vault_configs: "{{ artifactory_vault_configs | default([]) }}"
      artifactory_xray_policies: "{{ artifactory_xray_policies | default([]) }}"
      artifactory_xray_watches: "{{ artifactory_xray_watches | default([]) }}"
      artifactory_xray_ignore_rules: "{{ artifactory_xray_ignore_rules | default([]) }}"
      artifactory_replications: "{{ artifactory_replications | default([]) }}"
      artifactory_webhooks: "{{ artifactory_webhooks | default([]) }}"

- name: "Compare | Diff As-Built vs desired group_vars (section by section)"
  ansible.builtin.set_fact:
    _af_diff: "{{ _af_desired | config_diff(_af_state, ignore=artifactory_compare_ignore_keys) }}"

- name: "Compare | Drift summary"
  ansible.builtin.debug:
    msg: "{{ ['As-Built vs group_vars desired  (+added ~changed -removed):'] + (_af_diff | diff_summary) }}"

- name: "Compare | Write structured diff report"
  ansible.builtin.copy:
    content: "{{ _af_diff | to_nice_yaml(indent=2) }}"
    dest: "{{ _af_drift_file }}"
    mode: "0640"
  delegate_to: localhost
  become: false  # controller write — never sudo on the operator's machine
  run_once: true

- name: "Compare | Drift gate"
  ansible.builtin.assert:
    that: _af_diff | length == 0
    fail_msg: >-
      Drift detected in section(s): {{ _af_diff.keys() | list | join(', ') }}.
      See {{ _af_drift_file }}
    success_msg: "No drift — live state matches the desired group_vars."
    quiet: true
  when: artifactory_compare_fail_on_drift | bool
