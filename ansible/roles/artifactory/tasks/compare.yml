---
# roles/artifactory/tasks/compare.yml
# Compare the live "As-Built" state against the saved IaC YAML and report drift.
# Reuses backup.yml to capture the live state into _af_state (and write the
# As-Built export), loads the saved baseline, diffs section-by-section via the
# config_diff filter, prints a summary, and optionally writes a structured diff
# file and/or fails on drift (CI gate).
#
#   ansible-playbook playbooks/artifactory.yml -e artifactory_url=$AF \
#     -e artifactory_mode=compare -e artifactory_env=prod
#   (baseline = that env's saved state file; drift written to <state>.drift.yml)

- name: "Compare | Capture live As-Built state"
  ansible.builtin.import_tasks: backup.yml

- name: "Compare | Load saved IaC baseline"
  ansible.builtin.set_fact:
    _af_saved: "{{ lookup('ansible.builtin.file', artifactory_state_file) | from_yaml }}"
  delegate_to: localhost
  run_once: true

- name: "Compare | Diff As-Built vs saved (section by section)"
  ansible.builtin.set_fact:
    _af_diff: "{{ _af_saved | config_diff(_af_state, ignore=artifactory_compare_ignore_keys) }}"

- name: "Compare | Drift summary"
  ansible.builtin.debug:
    msg: "{{ ['As-Built vs ' + artifactory_state_file + '  (+added ~changed -removed):'] + (_af_diff | diff_summary) }}"

- name: "Compare | Write structured diff report"
  ansible.builtin.copy:
    content: "{{ _af_diff | to_nice_yaml(indent=2) }}"
    dest: "{{ _af_drift_file }}"
    mode: "0640"
  delegate_to: localhost
  run_once: true

- name: "Compare | Drift gate"
  ansible.builtin.assert:
    that: _af_diff | length == 0
    fail_msg: >-
      Drift detected in section(s): {{ _af_diff.keys() | list | join(', ') }}.
      See {{ _af_drift_file }}
    success_msg: "No drift — As-Built matches the saved IaC baseline."
    quiet: true
  when: artifactory_compare_fail_on_drift | bool
