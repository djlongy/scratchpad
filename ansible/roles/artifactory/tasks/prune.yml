---
# roles/artifactory/tasks/prune.yml
# Generic: delete server objects of a section that are not in the desired list
# and not protected. DANGEROUS — only runs under artifactory_prune. Honours
# --check (reports without deleting). Reusable via vars:
#   _prune_section   section name (key into artifactory_prune_protect)
#   _prune_endpoint  base URL for DELETE (…/{id} appended)
#   _prune_id        attribute holding the object id (e.g. name, key)
#   _prune_desired   list of ids the caller manages (kept)
#   _prune_list_url  URL returning the current server objects
#   _prune_list_attr optional dotted attr to dig the list out of the response

- name: "Prune | List current server objects"
  ansible.builtin.uri:
    url: "{{ _prune_list_url }}"
    method: GET
    headers: "{{ _af_headers }}"
    status_code: [200, 403, 404]
  register: _prune_get
  changed_when: false

- name: "Prune | Compute deletions"
  ansible.builtin.set_fact:
    _prune_targets: >-
      {{ (_prune_get.json | default([]) if (_prune_list_attr | default('') | length == 0)
          else (_prune_get.json[_prune_list_attr] | default([])))
         | map(attribute=_prune_id) | list
         | difference(_prune_desired)
         | difference(artifactory_prune_protect[_prune_section] | default([])) }}
  when: _prune_get.status | default(0) == 200

- name: "Prune | Report"
  ansible.builtin.debug:
    msg: "PRUNE {{ _prune_section }}: would delete {{ _prune_targets | default([]) }}"
  when: _prune_targets | default([]) | length > 0

- name: "Prune | Delete unmanaged objects"
  ansible.builtin.uri:
    url: "{{ _prune_endpoint }}/{{ item | urlencode }}"
    method: DELETE
    headers: "{{ _af_headers }}"
    status_code: [200, 204, 404]
  register: _prune_del
  changed_when: _prune_del.status in [200, 204]
  loop: "{{ _prune_targets | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when: not ansible_check_mode
