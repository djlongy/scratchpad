---
argument_specs:
  main:
    short_description: Configure JFrog Artifactory Enterprise over the REST API (backup + apply).
    description:
      - Two modes share one schema. C(backup) reads the live configuration via
        GET requests and writes it to a file; C(apply) reconciles that same
        schema into a (possibly empty) instance via create/update requests.
    options:
      artifactory_mode:
        type: str
        choices: [backup, apply, compare]
        default: apply
        description: >-
          Operation mode. apply = reconcile the group_vars desired state into
          the instance; backup = write live state to reference files (not
          applied); compare = diff live state vs the group_vars desired (drift).
      artifactory_url:
        type: str
        required: true
        description: Base platform URL with no trailing slash (e.g. https://acme.jfrog.io).
      artifactory_access_token:
        type: str
        required: false
        description: Admin access token (Bearer). Preferred over basic auth when set.
      artifactory_admin_username:
        type: str
        default: admin
        description: Admin username for basic auth (used when no access token).
      artifactory_admin_password:
        type: str
        required: false
        description: Admin password for basic auth.
      artifactory_bootstrap_enabled:
        type: bool
        default: true
        description: >-
          When no access token is supplied, self-provision a durable admin token
          via JFrog's automatic-admin-token mechanism (Access >= 7.38.4) instead
          of failing. Needs host/container access (self-hosted); the minted token
          is stored to Vault so subsequent runs skip bootstrap.
      artifactory_confirm_bootstrap:
        type: bool
        default: false
        description: >-
          Explicit acknowledgement required to auto-bootstrap (which RESTARTS
          Access) on a protected environment without a token.
      artifactory_bootstrap_on_auth_failure:
        type: bool
        default: false
        description: >-
          When a SUPPLIED token is rejected (401/403), discard it and mint a fresh
          one via bootstrap instead of hard-failing. Default false = fail-secure.
      artifactory_bootstrap_method:
        type: str
        choices: [docker, native]
        default: docker
        description: >-
          How to drive the instance for bootstrap. docker = docker exec/restart;
          native = package/systemd install (write file to disk, systemd restart,
          slurp token.json — needs root on the host).
      artifactory_bootstrap_container:
        type: str
        default: artifactory
        description: "[docker] Name of the container running Artifactory/Access."
      artifactory_bootstrap_container_user:
        type: str
        default: artifactory
        description: "[docker] In-container user that owns the Access var tree."
      artifactory_bootstrap_service:
        type: str
        default: artifactory
        description: "[native] systemd unit that runs Access (restarted to trigger generation)."
      artifactory_bootstrap_service_user:
        type: str
        default: artifactory
        description: "[native] On-disk owner of the Access bootstrap/token files."
      artifactory_bootstrap_native_become:
        type: bool
        default: true
        description: "[native] Use become (root) for the on-disk file ops + systemd restart."
      artifactory_bootstrap_keys_dir:
        type: str
        default: /opt/jfrog/artifactory/var/bootstrap/etc/access/keys
        description: In-container Access bootstrap keys dir where generate.token.json is placed.
      artifactory_bootstrap_token_file:
        type: str
        default: /opt/jfrog/artifactory/var/etc/access/keys/token.json
        description: In-container path Access writes the transient admin token to.
      artifactory_bootstrap_skip_restart:
        type: bool
        default: false
        description: >-
          Skip the Access restart (set true only when the trigger file was placed
          before the container's first boot, so first boot already generated it).
      artifactory_bootstrap_token_retries:
        type: int
        default: 60
        description: Poll count for token.json (x delay seconds).
      artifactory_bootstrap_token_delay:
        type: int
        default: 3
        description: Delay in seconds between token.json polls.
      artifactory_bootstrap_token_expires_in:
        type: int
        default: 0
        description: TTL (seconds) of the minted durable token; 0 = non-expiring.
      artifactory_bootstrap_token_description:
        type: str
        default: "ansible-managed admin bootstrap token"
        description: Description recorded on the minted durable token.
      artifactory_bootstrap_vault_store:
        type: bool
        default: false
        description: >-
          Store the minted token to HashiCorp Vault immediately
          (read-merge-write, no clobber). Set the mount/path in inventory.
      artifactory_bootstrap_vault_mount:
        type: str
        default: ""
        description: KV v2 mount for the stored token (e.g. kv-example).
      artifactory_bootstrap_vault_path:
        type: str
        default: ""
        description: KV v2 path for the stored token (e.g. apps/artifactory/runtime).
      artifactory_bootstrap_vault_field:
        type: str
        default: admin_access_token
        description: Field name under the Vault path to write the token to.
      artifactory_bootstrap_write_sidecar:
        type: bool
        default: true
        description: Also write the minted token to the local 0600 sidecar file.
      artifactory_bootstrap_sidecar_file:
        type: str
        required: false
        description: >-
          Dedicated 0600 file for the bootstrap admin token (separate from
          artifactory_generated_tokens_file so a token-minting apply cannot clobber
          the break-glass record). Defaults under playbook_dir.
      artifactory_validate_certs:
        type: bool
        default: true
        description: Verify TLS certificates on API calls.
      artifactory_env:
        type: str
        default: default
        description: >-
          Environment label that keys the reference capture folder (set per
          environment in inventory, e.g. prod/dev/test). Keeps each
          environment's reference files separate so they never collide.
      artifactory_state_dir:
        type: str
        default: "{{ role_path }}/files/state"
        description: Base directory holding per-environment state (one sub-folder per env).
      artifactory_state_file:
        type: str
        required: false
        description: >-
          The single state file. backup WRITES it; apply/compare READ it.
          Resolved automatically as <state_dir>/<env>/artifactory.<ext>; override
          only for a one-off non-standard path.
      artifactory_export_format:
        type: str
        choices: [yaml, json]
        default: yaml
        description: "[backup] Serialisation format of the reference capture."
      artifactory_protected_envs:
        type: list
        elements: str
        default: [prod]
        description: >-
          Environments for which a prune requires artifactory_confirm_prune=true.
      artifactory_confirm_prune:
        type: bool
        default: false
        description: >-
          Explicit acknowledgement required to prune a protected environment.
      artifactory_reconcile_existing:
        type: bool
        default: true
        description: "[apply] Update objects that already exist (vs create-if-absent)."
      artifactory_manage_system_config:
        type: bool
        default: true
        description: Toggle the system/global configuration section.
      artifactory_manage_repositories:
        type: bool
        default: true
        description: Toggle the repositories section.
      artifactory_manage_groups:
        type: bool
        default: true
        description: Toggle the groups section.
      artifactory_manage_users:
        type: bool
        default: true
        description: Toggle the users section.
      artifactory_manage_permissions:
        type: bool
        default: true
        description: Toggle the permission-targets section.
      artifactory_manage_projects:
        type: bool
        default: true
        description: Toggle the projects section (Access API).
      artifactory_manage_environments:
        type: bool
        default: true
        description: Toggle the global lifecycle environments (stages) section.
      artifactory_manage_vault:
        type: bool
        default: true
        description: Toggle the HashiCorp Vault connections section (Access).
      artifactory_manage_ldap:
        type: bool
        default: true
        description: Toggle the LDAP integration section (Access).
      artifactory_manage_sso:
        type: bool
        default: true
        description: Toggle the SSO section (SAML / OAuth / Crowd).
      artifactory_manage_xray:
        type: bool
        default: true
        description: Toggle the Xray section (policies / watches / ignore rules / reports).
      artifactory_manage_replications:
        type: bool
        default: true
        description: Toggle the replications section.
      artifactory_manage_webhooks:
        type: bool
        default: true
        description: Toggle the webhooks section (event service).
      artifactory_manage_tokens:
        type: bool
        default: false
        description: Toggle access-token creation (mints new secrets; never exported).
      artifactory_system_config_yaml:
        type: dict
        default: {}
        description: >-
          Global/system config in the YAML-PATCH schema (keys mirror the
          descriptor flattened; named collections are keyed maps). Applied
          per-block, fail-soft. Set in group_vars; a backup writes a reference
          copy you can paste from. The resilient, version-tolerant config path.
      artifactory_system_config_yaml_overrides:
        type: dict
        default: {}
        description: >-
          Per-environment overrides deep-merged onto artifactory_system_config_yaml
          before PATCH. Keep shared config in group_vars/all and put only the keys
          that differ per env (urlBase, serverName, …) here in
          inventories/<env>/group_vars — one shared desired-state, no per-machine
          files.
      artifactory_system_config_secrets:
        type: dict
        default: {}
        description: >-
          Secrets the backup stripped (master-key encrypted) to re-supply,
          deep-merged into artifactory_system_config_yaml before PATCH. Same
          shape as the config but secrets only — ideally from Vault.
      artifactory_local_repositories:
        type: list
        elements: dict
        default: []
        description: Local repository config objects (full /api/repositories shape; key required).
      artifactory_remote_repositories:
        type: list
        elements: dict
        default: []
        description: Remote repository config objects.
      artifactory_virtual_repositories:
        type: list
        elements: dict
        default: []
        description: Virtual repository config objects.
      artifactory_federated_repositories:
        type: list
        elements: dict
        default: []
        description: Federated repository config objects.
      artifactory_groups:
        type: list
        elements: dict
        default: []
        description: Group definitions.
      artifactory_users:
        type: list
        elements: dict
        default: []
        description: User definitions (password optional; never captured by backup).
      artifactory_permissions:
        type: list
        elements: dict
        default: []
        description: Permission targets (v2 JSON shape).
      artifactory_projects:
        type: list
        elements: dict
        default: []
        description: Projects with optional roles, members and repository assignments.
      artifactory_webhooks:
        type: list
        elements: dict
        default: []
        description: Webhook subscriptions.
      artifactory_tokens:
        type: list
        elements: dict
        default: []
        description: Access tokens to mint on apply (opt-in).
