---
argument_specs:
  main:
    short_description: openclaw bot local-admin account.
    options:
      openclaw_enabled:
        type: bool
        required: false
        description: Manage the openclaw bot admin account.
      openclaw_user:
        type: str
        required: false
        description: openclaw bot username.
      openclaw_comment:
        type: str
        required: false
        description: GECOS comment for the bot account.
      openclaw_shell:
        type: str
        required: false
        description: Login shell for the bot account.
      openclaw_pubkey_file:
        type: str
        required: false
        description: Path on the control node to the bot's authorized public key.
      openclaw_sudo:
        type: bool
        required: false
        description: Grant the bot passwordless sudo.
