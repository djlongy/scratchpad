---
# roles/openclaw/defaults/main.yml
#
# openclaw bot local-admin account — a portable, distro-aware site role layered
# on top of the generic `baseline` OS setup (moved out of baseline so baseline
# stays a pure OS baseline).
#
# Behavioural defaults here; env-specific values commented out for discoverability.

openclaw_enabled: true
openclaw_user: "openclawbot"
openclaw_comment: "OpenClawBot local admin"
openclaw_shell: "/bin/bash"
# Public key authorized for the bot. ENV-SPECIFIC — set in inventory to the path
# of the bot's public key on the control node.
# openclaw_pubkey_file: "~/.ssh/id_ed25519_openclawbot.pub"
openclaw_sudo: true   # grant passwordless sudo via /etc/sudoers.d/<user>
