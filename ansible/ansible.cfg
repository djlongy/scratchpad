[defaults]
# ─── Relative path resolution ────────────────────────────────────────────
# Relative paths in ansible.cfg are resolved against the directory
# CONTAINING this file (not the CWD), so the values below work no matter
# where ansible-playbook is invoked from. Verified on ansible-core 2.16
# through 2.19+.
roles_path     = ./roles
action_plugins = ./plugins/action
collections_path = ./collections:~/.ansible/collections
library        = ./plugins/modules
filter_plugins = ./plugins/filter
# Inventory is intentionally NOT set here — pass `-i inventories/<env>/`
# explicitly so each environment is opt-in. The inventories/vmware/
# directory contains inventory PLUGIN configs that need their plugins
# enabled before they'll parse.

# ─── Human-readable output ───────────────────────────────────────────────
# Modern form: keep the `default` callback for play/task headers and ask
# it to render task RESULTS as YAML (multi-line strings, dicts, lists all
# stay readable). Available since ansible-core 2.13, still current in
# 2.19+. The older `stdout_callback = yaml` shortcut is deprecated.
stdout_callback             = default
callback_result_format      = yaml
bin_ansible_callbacks       = True
callbacks_enabled           = profile_tasks, timer
# Hide noise on big plays — flip back to True when debugging.
display_skipped_hosts       = False
display_ok_hosts            = True
display_args_to_stdout      = False
nocows                      = True
deprecation_warnings        = True
interpreter_python          = auto_silent

# ─── Run-time behaviour ──────────────────────────────────────────────────
forks                       = 20
gathering                   = smart
fact_caching                = jsonfile
fact_caching_connection     = ~/.ansible/facts
fact_caching_timeout        = 86400
host_key_checking           = False
retry_files_enabled         = False
force_handlers              = True
timeout                     = 30

# ─── Vault password (opt-in) ─────────────────────────────────────────────
# Not set here — pass `--vault-password-file scripts/vault-env-client.sh`
# (or export ANSIBLE_VAULT_PASSWORD_FILE) when you need it. Setting it
# globally would make non-interactive runs fail when ANSIBLE_VAULT is
# unset. See docs/vault-env-unlock.md for the unlock-ansible workflow.

# Suppress *.pyc next to .py files in this tree.
# Alternatively: export PYTHONDONTWRITEBYTECODE=1


[inventory]
# Enable inventory plugins used by inventories/vmware/. The vmware.yml
# example uses community.vmware; vsphere-vms-dynamic/vmware_vms.yml uses
# the official vmware.vmware collection. Both load lazily — listed here
# so Ansible recognises them as inventory sources rather than YAML host
# files.
enable_plugins = host_list, script, auto, yaml, ini, toml, constructed, community.vmware.vmware_vm_inventory, vmware.vmware.vms

# Repo-wide inventory cache defaults. Individual inventory YAMLs can
# override any of these in their own file. Persistent location under
# $HOME so cache survives reboots and /tmp janitors. The vmware/ configs
# pin their own cache_prefix so they don't collide.
cache             = True
cache_plugin      = jsonfile
cache_connection  = ~/.ansible/tmp/inventory_cache
cache_timeout     = 3600


[ssh_connection]
# Pipelining + ControlPersist together typically cut play runtime by
# 30–50 % over default SSH. Pipelining requires `requiretty` to be off
# in the target's sudoers (it is, on every common modern distro).
pipelining   = True
ssh_args     = -C -o ControlMaster=auto -o ControlPersist=600s -o PreferredAuthentications=publickey,password -o ServerAliveInterval=30
control_path = %(directory)s/%%h-%%r
retries      = 3


[persistent_connection]
connect_timeout      = 30
command_timeout      = 60


[diff]
# Show diffs on every run; users can suppress with --no-diff.
always   = True
context  = 3
