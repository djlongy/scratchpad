---
# playbooks/audit_multi_logger.yml
#
# Multi-backend example: ship the same audit record to Elasticsearch, syslog,
# and a local file. Enable only the backends you need.

- name: Example deployment with multi-backend audit logging
  hosts: webservers
  gather_facts: true

  roles:
    - your_role_here
    - role: audit_logging
      vars:
        audit_logging_backends: [elasticsearch, syslog, file]

        # Elasticsearch
        audit_logging_elasticsearch_url: https://elasticsearch.example.com:9200
        audit_logging_elasticsearch_index: ansible-audit
        audit_logging_elasticsearch_user: ansible
        audit_logging_elasticsearch_password: "{{ vault_elastic_password }}"
        audit_logging_elasticsearch_validate_certs: true

        # Syslog
        audit_logging_syslog_facility: local1
        audit_logging_syslog_priority: notice

        # File fallback
        audit_logging_file_path: /var/log/ansible/audit.jsonl
