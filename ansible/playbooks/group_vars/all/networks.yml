---
# ── Estate network catalog (single source of truth) ─────────────────────────
# Loaded for every play under playbooks/ (playbook-adjacent group_vars/all).
# Do NOT redeclare these roots in inventory group_vars/all — they drift.
#
# Hybrid multi-tenancy:
#   • Global catalog — platform sees ALL tenants × ALL envs (fabric SoT).
#   • Inventory selects identity (tenancy × env) + one segment key.
#   • Soft isolation (default): share platform env segments (mgt/dev/prod);
#     tenancy lives in IAM/Vault/tags, not L2.
#   • Hard isolation: dedicated underlay.<tenancy>_<env> with scope: tenant.
#
# Inventory selection pattern:
#
#   env: prod
#   tenancy: acme                    # soft or hard — always set
#   network_segment: prod            # soft share  OR  acme_prod for hard L2
#   network_gateway:    "{{ underlay[network_segment].gateway }}"
#   network_netmask:    "{{ underlay[network_segment].netmask }}"
#   vsphere_vm_network: "{{ underlay[network_segment].portgroup }}"
#   vsphere_vm_gateway: "{{ underlay[network_segment].gateway }}"
#   vsphere_vm_dns:     "{{ underlay[network_segment].dns }}"
#
# Legacy direct keys still work (e.g. underlay.mgt.gateway).
#
# Roots:
#   underlay.<segment>     L2/L3 estate segment (VLAN + subnet + portgroup)
#   vcenter.portgroups     dvPortGroup / ESXi port-group list
#   dell.vlans / .trunks   switch VLAN objects + trunk allowed-lists
#   palo.zones / .ifaces   firewall zones + L3 subinterfaces
#   docker_swarm.<stack>   Swarm encrypted overlay per app stack
#
# All addresses below are lab/mock RFC1918 examples — replace for production.
# Query anywhere: underlay.<seg>.subnet (CIDR) + underlay.<seg>.netmask (dotted).
# Supports non-/24 ranges (/25 /26 /27) — keep subnet and netmask in lockstep.

# Fallback only — inventory should set network_netmask from underlay.<seg>.netmask.
underlay_netmask: "255.255.255.0"
network_netmask: "{{ underlay_netmask }}"

# ═══════════════════════════════════════════════════════════════════════════
# 1. underlay — L2/L3 segments
# ═══════════════════════════════════════════════════════════════════════════
# Schema (every segment):
#   Fabric:    vlan_id, portgroup, name, subnet, netmask, gateway, dns
#   Placement: site, zone
#   Ownership: scope (platform|tenant), env (mgt|dev|prod|null), tenancy (str|null)
#   Ops:       purpose (string), admin (bool → candidate for underlay_admin_cidrs)
#
#   subnet   — network prefix in CIDR form (e.g. 192.168.10.0/26)
#   netmask  — dotted mask for that prefix (e.g. 255.255.255.192)
#   scope    — platform = shared/operator fabric; tenant = hard-isolated customer L2
#   env      — environment this segment serves; null = not env-scoped
#   tenancy  — owning org; null = shared (platform segments only)
#   admin    — true → operator/admin source CIDR candidate
#
# Rules:
#   scope:platform + tenancy:null  → soft multi-tenancy underlay (default)
#   scope:tenant   + tenancy:<org> → hard L2 isolation for that org
#   Key convention hard: <tenancy>_<env>  (e.g. acme_prod)

underlay: &underlay
  # ── Site infrastructure (platform, not env-scoped) ───────────────────────
  infra:
    vlan_id: 0
    portgroup: "VLAN00-INFRA"
    name: "VLAN00-INFRA"
    subnet: "192.168.0.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.0.1"
    dns: ["192.168.0.1"]
    site: site-a
    zone: infra
    scope: platform
    env: null
    tenancy: null
    purpose: "site infrastructure / ESXi mgmt adjacency"
    admin: true

  site_b:
    vlan_id: 1
    portgroup: "VLAN01-SITE-B"
    name: "VLAN01-SITE-B"
    subnet: "192.168.1.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.1.1"
    dns: ["192.168.1.1"]
    site: site-b
    zone: infra
    scope: platform
    env: null
    tenancy: null
    purpose: "site-b infrastructure"
    admin: true

  # ── DMZ (platform, not env-scoped) ───────────────────────────────────────
  dmz:
    vlan_id: 9
    portgroup: "VLAN09-DMZ"
    name: "VLAN09-DMZ"
    subnet: "192.168.9.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.9.1"
    dns: ["192.168.9.1"]
    site: site-a
    zone: dmz
    scope: platform
    env: null
    tenancy: null
    purpose: "edge / public-facing"
    admin: false

  # ── Management control plane (platform env — soft multi-tenant default) ──
  mgt:
    vlan_id: 10
    portgroup: "VLAN10-MGT-SVC"
    name: "VLAN10-MGT-SVC"
    subnet: "192.168.10.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.10.1"
    dns: ["192.168.10.1"]
    site: site-a
    zone: mgt
    scope: platform
    env: mgt
    tenancy: null
    purpose: "shared management control plane"
    admin: true

  mgt_k3s:
    vlan_id: 11
    portgroup: "VLAN11-MGT-K3S"
    name: "VLAN11-MGT-K3S"
    subnet: "192.168.11.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.11.1"
    dns: ["192.168.11.1"]
    site: site-a
    zone: mgt
    scope: platform
    env: mgt
    tenancy: null
    purpose: "mgt k3s plane"
    admin: true

  # ── Dev (platform env — soft multi-tenant default) ───────────────────────
  dev:
    vlan_id: 20
    portgroup: "VLAN20-DEV-SVC"
    name: "VLAN20-DEV-SVC"
    subnet: "192.168.20.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.20.1"
    dns: ["192.168.20.1"]
    site: site-a
    zone: dev
    scope: platform
    env: dev
    tenancy: null
    purpose: "shared dev workloads (soft multi-tenant)"
    admin: false

  # Lab cluster (swarm / vault labs share this L2)
  dev_cluster:
    vlan_id: 21
    portgroup: "VLAN21-DEV-CLUSTER"
    name: "VLAN21-DEV-CLUSTER"
    subnet: "192.168.21.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.21.1"
    dns: ["192.168.21.1"]
    site: site-a
    zone: dev
    scope: platform
    env: dev
    tenancy: null
    purpose: "lab/swarm/cluster on dev L2"
    admin: false

  # ── Production (platform env — soft multi-tenant default) ────────────────
  prod:
    vlan_id: 30
    portgroup: "VLAN30-PROD-SVC"
    name: "VLAN30-PROD-SVC"
    subnet: "192.168.30.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.30.1"
    dns: ["192.168.30.1"]
    site: site-a
    zone: prod
    scope: platform
    env: prod
    tenancy: null
    purpose: "shared prod workloads (soft multi-tenant)"
    admin: false

  prod_k3s:
    vlan_id: 31
    portgroup: "VLAN31-PROD-K3S"
    name: "VLAN31-PROD-K3S"
    subnet: "192.168.31.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.31.1"
    dns: ["192.168.31.1"]
    site: site-a
    zone: prod
    scope: platform
    env: prod
    tenancy: null
    purpose: "prod k3s plane"
    admin: false

  # ── Other platform zones ─────────────────────────────────────────────────
  iot:
    vlan_id: 40
    portgroup: "VLAN40-IOT"
    name: "VLAN40-IOT"
    subnet: "192.168.40.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.40.1"
    dns: ["192.168.40.1"]
    site: site-a
    zone: iot
    scope: platform
    env: null
    tenancy: null
    purpose: "IoT / constrained devices"
    admin: false

  # Legacy multi-tenant parking L2 (shared fabric, not one customer).
  # Prefer named hard-tenant segments (acme_prod / acme_dev) for real isolation.
  tenants:
    vlan_id: 50
    portgroup: "VLAN50-TENANTS"
    name: "VLAN50-TENANTS"
    subnet: "192.168.50.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.50.1"
    dns: ["192.168.50.1"]
    site: site-a
    zone: tenant
    scope: platform
    env: null
    tenancy: null
    purpose: "legacy multi-tenant parking L2 (prefer hard segments)"
    admin: false

  lab:
    vlan_id: 120
    portgroup: "VLAN120-LAB"
    name: "VLAN120-LAB"
    subnet: "192.168.120.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.120.1"
    dns: ["192.168.120.1"]
    site: site-b
    zone: lab
    scope: platform
    env: null
    tenancy: null
    purpose: "scratch / throwaway lab"
    admin: false

  # ── Hard-tenant examples (scope: tenant) ─────────────────────────────────
  # Only for L2 isolation. Soft path: tenancy=acme + network_segment=prod.
  # Inventory hard path: tenancy=acme, env=prod, network_segment=acme_prod
  acme_prod:
    vlan_id: 60
    portgroup: "VLAN60-ACME-PROD"
    name: "VLAN60-ACME-PROD"
    subnet: "192.168.60.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.60.1"
    dns: ["192.168.60.1"]
    site: site-a
    zone: tenant
    scope: tenant
    env: prod
    tenancy: acme
    purpose: "acme production hard isolation"
    admin: false

  acme_dev:
    vlan_id: 61
    portgroup: "VLAN61-ACME-DEV"
    name: "VLAN61-ACME-DEV"
    subnet: "192.168.61.0/24"
    netmask: "255.255.255.0"
    gateway: "192.168.61.1"
    dns: ["192.168.61.1"]
    site: site-a
    zone: tenant
    scope: tenant
    env: dev
    tenancy: acme
    purpose: "acme development hard isolation"
    admin: false

# Legacy alias — prefer underlay.* in new code.
networks: *underlay

# Segments with admin: true (operator/admin source CIDRs).
underlay_admin_cidrs:
  - "{{ underlay.mgt.subnet }}"
  - "{{ underlay.infra.subnet }}"
  - "{{ underlay.site_b.subnet }}"
network_admin_cidrs: "{{ underlay_admin_cidrs }}"

# ═══════════════════════════════════════════════════════════════════════════
# 2. vcenter — port-groups (hypervisor L2 plane)
# ═══════════════════════════════════════════════════════════════════════════
vcenter:
  vds_name: "vDS-Lab"
  portgroups:
    - { name: TRUNK, vlan_id: "0-4094", trunk: true, description: "edge router VLAN trunk" }

    # Site infrastructure
    - { name: VLAN00-INFRA, vlan_id: 0 }
    - { name: VLAN01-SITE-B, vlan_id: 1 }

    # Mock residential / tenant L2 (names only — no underlay L3 entries)
    - { name: VLAN02-RES-A, vlan_id: 2 }
    - { name: VLAN03-RES-B, vlan_id: 3 }
    - { name: VLAN04-RES-C, vlan_id: 4 }
    - { name: VLAN05-SHARED, vlan_id: 5 }
    - { name: VLAN06-TENANT1, vlan_id: 6 }
    - { name: VLAN07-TENANT2, vlan_id: 7 }
    - { name: VLAN08-RES-IOT, vlan_id: 8 }

    # DMZ + management + K3s planes
    - { name: VLAN09-DMZ, vlan_id: 9 }
    - { name: VLAN10-MGT-SVC, vlan_id: 10 }
    - { name: VLAN11-MGT-K3S-CP, vlan_id: 11 }
    - { name: VLAN12-MGT-K3S-WKR, vlan_id: 12 }
    - { name: VLAN13-MGT-K3S-LB, vlan_id: 13 }

    # Development + cluster lab + K3s planes
    - { name: VLAN20-DEV-SVC, vlan_id: 20 }
    - { name: VLAN21-DEV-CLUSTER, vlan_id: 21 }
    - { name: VLAN21-DEV-K3S-CP, vlan_id: 21 }
    - { name: VLAN22-DEV-K3S-WKR, vlan_id: 22 }
    - { name: VLAN23-DEV-K3S-LB, vlan_id: 23 }

    # Production + K3s planes
    - { name: VLAN30-PROD-SVC, vlan_id: 30 }
    - { name: VLAN31-PROD-K3S, vlan_id: 31 }
    - { name: VLAN31-PROD-K3S-CP, vlan_id: 31 }
    - { name: VLAN32-PROD-K3S-WKR, vlan_id: 32 }
    - { name: VLAN33-PROD-K3S-LB, vlan_id: 33 }

    # IoT / tenants / lab
    - { name: VLAN40-IOT, vlan_id: 40 }
    - { name: VLAN50-TENANTS, vlan_id: 50 }
    - { name: VLAN120-LAB, vlan_id: 120 }

    # Hard-tenant examples (underlay.acme_prod / underlay.acme_dev)
    - { name: VLAN60-ACME-PROD, vlan_id: 60 }
    - { name: VLAN61-ACME-DEV, vlan_id: 61 }

    # Mock PoC sandboxes (trunk range 500-599)
    - { name: VLAN501-SANDBOX01-INSIDE, vlan_id: 501 }
    - { name: VLAN502-SANDBOX02-INSIDE, vlan_id: 502 }

# ═══════════════════════════════════════════════════════════════════════════
# 3. dell — switch VLANs + trunks (physical L2 plane)
# ═══════════════════════════════════════════════════════════════════════════
dell:
  vlans:
    - { id: 0, name: INFRA }
    - { id: 1, name: SITE-B }
    - { id: 2, name: RES-A }
    - { id: 3, name: RES-B }
    - { id: 4, name: RES-C }
    - { id: 5, name: SHARED }
    - { id: 6, name: TENANT1 }
    - { id: 7, name: TENANT2 }
    - { id: 8, name: RES-IOT }
    - { id: 9, name: DMZ }
    - { id: 10, name: MGT-SVC }
    - { id: 11, name: MGT-K3S-CP }
    - { id: 12, name: MGT-K3S-WKR }
    - { id: 13, name: MGT-K3S-LB }
    - { id: 20, name: DEV-SVC }
    - { id: 21, name: DEV-CLUSTER }
    - { id: 22, name: DEV-K3S-WKR }
    - { id: 23, name: DEV-K3S-LB }
    - { id: 30, name: PROD-SVC }
    - { id: 31, name: PROD-K3S }
    - { id: 32, name: PROD-K3S-WKR }
    - { id: 33, name: PROD-K3S-LB }
    - { id: 40, name: IOT }
    - { id: 50, name: TENANTS }
    - { id: 60, name: ACME-PROD }
    - { id: 61, name: ACME-DEV }
    - { id: 120, name: LAB }
    - { id: 501, name: SANDBOX01 }
    - { id: 502, name: SANDBOX02 }

  trunks:
    - name: esxi-01
      description: "ESXi-01 uplink(s)"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: all
      peer: "192.168.0.11"

    - name: esxi-02
      description: "ESXi-02 uplink(s)"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: all
      peer: "192.168.0.12"

    - name: edge-trunk
      description: "Edge firewall VLAN trunk"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: all
      peer: edge-fw

    - name: esxi-poc-sandbox-range
      description: "Extra allowed range for PoC sandboxes"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: "500-599"
      peer: esxi-all

# ═══════════════════════════════════════════════════════════════════════════
# 4. palo — zones + subinterfaces (security plane scaffold)
# ═══════════════════════════════════════════════════════════════════════════
palo:
  device_group: "lab"
  vsys: "vsys1"
  template: "lab-template"

  zones:
    infra: { name: "infra", mode: layer3 }
    dmz: { name: "dmz", mode: layer3 }
    mgt: { name: "mgt", mode: layer3 }
    dev: { name: "dev", mode: layer3 }
    prod: { name: "prod", mode: layer3 }
    iot: { name: "iot", mode: layer3 }
    tenant: { name: "tenant", mode: layer3 }
    lab: { name: "lab", mode: layer3 }
    edge: { name: "edge", mode: layer3 }

  interfaces:
    - name: ethernet1/1.10
      vlan_id: "{{ underlay.mgt.vlan_id }}"
      subnet: "{{ underlay.mgt.subnet }}"
      zone: mgt
      ip: ""
    - name: ethernet1/1.11
      vlan_id: "{{ underlay.mgt_k3s.vlan_id }}"
      subnet: "{{ underlay.mgt_k3s.subnet }}"
      zone: mgt
      ip: ""
    - name: ethernet1/1.20
      vlan_id: "{{ underlay.dev.vlan_id }}"
      subnet: "{{ underlay.dev.subnet }}"
      zone: dev
      ip: ""
    - name: ethernet1/1.21
      vlan_id: "{{ underlay.dev_cluster.vlan_id }}"
      subnet: "{{ underlay.dev_cluster.subnet }}"
      zone: dev
      ip: ""
    - name: ethernet1/1.30
      vlan_id: "{{ underlay.prod.vlan_id }}"
      subnet: "{{ underlay.prod.subnet }}"
      zone: prod
      ip: ""
    - name: ethernet1/1.31
      vlan_id: "{{ underlay.prod_k3s.vlan_id }}"
      subnet: "{{ underlay.prod_k3s.subnet }}"
      zone: prod
      ip: ""
    - name: ethernet1/1.9
      vlan_id: "{{ underlay.dmz.vlan_id }}"
      subnet: "{{ underlay.dmz.subnet }}"
      zone: dmz
      ip: ""
    - name: ethernet1/1.50
      vlan_id: "{{ underlay.tenants.vlan_id }}"
      subnet: "{{ underlay.tenants.subnet }}"
      zone: tenant
      ip: ""
    - name: ethernet1/1.60
      vlan_id: "{{ underlay.acme_prod.vlan_id }}"
      subnet: "{{ underlay.acme_prod.subnet }}"
      zone: tenant
      ip: ""
    - name: ethernet1/1.61
      vlan_id: "{{ underlay.acme_dev.vlan_id }}"
      subnet: "{{ underlay.acme_dev.subnet }}"
      zone: tenant
      ip: ""

# ═══════════════════════════════════════════════════════════════════════════
# 5. docker_swarm — encrypted overlay subnets (east-west app plane)
# ═══════════════════════════════════════════════════════════════════════════
# Isolated from underlay RFC1918 (192.168.x). Mock pool 10.40.0.0/16, /24 per stack.

docker_swarm:
  default_addr_pool: "10.40.0.0/16"
  default_addr_pool_subnet_size: 24

  mattermost:
    subnet: "10.40.10.0/24"
    netmask: "255.255.255.0"
    name: "mm_overlay"
    encrypted: true
    attachable: true

  splunk:
    subnet: "10.40.11.0/24"
    netmask: "255.255.255.0"
    name: "splunk_overlay"
    encrypted: true
    attachable: true

  elk:
    subnet: "10.40.12.0/24"
    netmask: "255.255.255.0"
    name: "elk_overlay"
    encrypted: true
    attachable: true

  # next free: 10.40.13.0/24

swarm_overlay_subnets:
  mattermost: "{{ docker_swarm.mattermost.subnet }}"
  splunk: "{{ docker_swarm.splunk.subnet }}"
  elk: "{{ docker_swarm.elk.subnet }}"
