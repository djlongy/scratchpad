---
# ── Estate network catalog (single source of truth) ─────────────────────────
# Loaded for every play under playbooks/ (playbook-adjacent group_vars/all).
# Do NOT redeclare these roots in inventory group_vars/all — they drift.
#
# ONE dict — network_underlays — drives every platform config (ESXi port
# groups, firewall interfaces/zones, switch VLANs) through DERIVED vars.
# No set_fact, no runtime loops for derivation: Ansible templates vars
# lazily at reference time, so the projections below re-evaluate wherever
# they are consumed.
#
# Controller dependencies:
#   pip:         jmespath (json_query), netaddr (ansible.utils.ipaddr)
#   collections: community.general, ansible.utils
#
# ansible-core 2.16 compatibility: every statement-loop var ends with
# `{{ ... | to_json }}` and every consumer starts with `| from_json`.
# The old templating engine would otherwise hand stage 2 a STRING repr of
# the list. (Alternative: jinja2_native=true — default-forced from 2.19+ —
# but the to_json/from_json bridge works on every core version.)
#
# Hybrid multi-tenancy:
#   • Global catalog — platform sees ALL tenants × ALL envs (fabric SoT).
#   • Inventory selects identity (tenancy × env) + one segment key.
#   • Soft isolation (default): share platform env segments (mgt/dev/prod);
#     tenancy lives in IAM/Vault/tags, not L2.
#   • Hard isolation: dedicated <tenancy>_<env> key with scope: tenant.
#
# Inventory selection pattern:
#
#   env: prod
#   tenancy: acme                    # soft or hard — always set
#   network_segment: prod            # soft share  OR  acme_prod for hard L2
#   network_gateway:    "{{ network_underlays[network_segment].gateway }}"
#   network_netmask:    "{{ network_underlays[network_segment].subnet | ansible.utils.ipaddr('netmask') }}"
#   vsphere_vm_network: "{{ (network_underlays_names | from_json)[network_segment] }}"
#   vsphere_vm_gateway: "{{ network_underlays[network_segment].gateway }}"
#   vsphere_vm_dns:     "{{ network_underlays[network_segment].dns }}"
#
# All addresses below are lab/mock RFC1918 examples — replace for production.

# ============================================================
# Source of truth – static underlay
# ============================================================
# The dict KEY is the segment's short name (inventory selector); the
# display name is DERIVED as VLAN<id>-<TENANCY>-<NETWORK_ROLE>.
#
# Schema (every segment):
#   Fabric:    vlan_id, subnet, gateway, dns[]
#   Naming:    network_role (display-name component; key stays the selector)
#   Platforms: targets[] (esxi|firewall|switches), vswitch, insecure,
#              promiscuous_mode, forged_transmits,
#              management_profile (firewall; '' = none)
#   Placement: site, zone
#   Ownership: scope (platform|tenant), env (mgt|dev|prod|null), tenancy
#   Ops:       description (string), admin (bool → underlay_admin_cidrs)
#
#   targets          — which platform projections pick this segment up; each
#                      derived list filters selectattr('targets', 'contains', …)
#   insecure         — true relaxes the whole vSphere port-group security policy;
#                      it is the DEFAULT for the two granular knobs below.
#   promiscuous_mode — vSphere allow-promiscuous flag (default: insecure)
#   forged_transmits — vSphere allow-forged-transmits flag (default: insecure)
#                      Set either explicitly to relax just that knob while
#                      leaving insecure false (customer-tunable per segment).
#
# Rules:
#   scope:platform + tenancy:platform → soft multi-tenancy underlay (default)
#   scope:tenant   + tenancy:<org>    → hard L2 isolation for that org
#   Key convention hard: <tenancy>_<env>  (e.g. acme_prod)

network_underlays:
  # ── Site infrastructure (platform, not env-scoped) ───────────────────────
  infra:
    vlan_id: 0
    network_role: infra
    subnet: "192.168.0.0/24"
    gateway: "192.168.0.1"
    dns: ["192.168.0.1"]
    targets: [esxi, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: ""
    site: site-a
    zone: infra
    scope: platform
    env: null
    tenancy: platform
    description: "site infrastructure / ESXi mgmt adjacency"
    admin: true

  site_b:
    vlan_id: 1
    network_role: site-b
    subnet: "192.168.1.0/24"
    gateway: "192.168.1.1"
    dns: ["192.168.1.1"]
    targets: [esxi, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: ""
    site: site-b
    zone: infra
    scope: platform
    env: null
    tenancy: platform
    description: "site-b infrastructure"
    admin: true

  # ── DMZ (platform, not env-scoped) ───────────────────────────────────────
  dmz:
    vlan_id: 9
    network_role: dmz
    subnet: "192.168.9.0/24"
    gateway: "192.168.9.1"
    dns: ["192.168.9.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "default"
    site: site-a
    zone: dmz
    scope: platform
    env: null
    tenancy: platform
    description: "edge / public-facing"
    admin: false

  # ── Management control plane (platform env — soft multi-tenant default) ──
  mgt:
    vlan_id: 10
    network_role: mgt-svc
    subnet: "192.168.10.0/24"
    gateway: "192.168.10.1"
    dns: ["192.168.10.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "allow-ping"
    site: site-a
    zone: mgt
    scope: platform
    env: mgt
    tenancy: platform
    description: "shared management control plane"
    admin: true

  mgt_cluster:
    vlan_id: 11
    network_role: mgt-cluster
    subnet: "192.168.11.0/24"
    gateway: "192.168.11.1"
    dns: ["192.168.11.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "allow-ping"
    site: site-a
    zone: mgt
    scope: platform
    env: mgt
    tenancy: platform
    description: "mgt cluster plane"
    admin: true

  # ── Dev (platform env — soft multi-tenant default) ───────────────────────
  dev:
    vlan_id: 20
    network_role: dev-svc
    subnet: "192.168.20.0/24"
    gateway: "192.168.20.1"
    dns: ["192.168.20.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "allow-ping"
    site: site-a
    zone: dev
    scope: platform
    env: dev
    tenancy: platform
    description: "shared dev workloads (soft multi-tenant)"
    admin: false

  # Lab cluster (swarm / vault labs share this L2)
  dev_cluster:
    vlan_id: 21
    network_role: dev-cluster
    subnet: "192.168.21.0/24"
    gateway: "192.168.21.1"
    dns: ["192.168.21.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "allow-ping"
    site: site-a
    zone: dev
    scope: platform
    env: dev
    tenancy: platform
    description: "lab/swarm/cluster on dev L2"
    admin: false

  # ── Production (platform env — soft multi-tenant default) ────────────────
  prod:
    vlan_id: 30
    network_role: prod-svc
    subnet: "192.168.30.0/24"
    gateway: "192.168.30.1"
    dns: ["192.168.30.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "allow-ping"
    site: site-a
    zone: prod
    scope: platform
    env: prod
    tenancy: platform
    description: "shared prod workloads (soft multi-tenant)"
    admin: false

  prod_cluster:
    vlan_id: 31
    network_role: prod-cluster
    subnet: "192.168.31.0/24"
    gateway: "192.168.31.1"
    dns: ["192.168.31.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "allow-ping"
    site: site-a
    zone: prod
    scope: platform
    env: prod
    tenancy: platform
    description: "prod cluster plane"
    admin: false

  # ── Other platform zones ─────────────────────────────────────────────────
  iot:
    vlan_id: 40
    network_role: iot
    subnet: "192.168.40.0/24"
    gateway: "192.168.40.1"
    dns: ["192.168.40.1"]
    targets: [esxi, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: ""
    site: site-a
    zone: iot
    scope: platform
    env: null
    tenancy: platform
    description: "IoT / constrained devices"
    admin: false

  # Legacy multi-tenant parking L2 (shared fabric, not one customer).
  # Prefer named hard-tenant segments (acme_prod / acme_dev) for isolation.
  tenants:
    vlan_id: 50
    network_role: tenants
    subnet: "192.168.50.0/24"
    gateway: "192.168.50.1"
    dns: ["192.168.50.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "default"
    site: site-a
    zone: tenant
    scope: platform
    env: null
    tenancy: platform
    description: "legacy multi-tenant parking L2 (prefer hard segments)"
    admin: false

  # insecure: true relaxes the port-group security policy — scratch lab only.
  lab:
    vlan_id: 120
    network_role: lab
    subnet: "192.168.120.0/24"
    gateway: "192.168.120.1"
    dns: ["192.168.120.1"]
    targets: [esxi, switches]
    vswitch: "vDS-Lab"
    insecure: true
    management_profile: ""
    site: site-b
    zone: lab
    scope: platform
    env: null
    tenancy: platform
    description: "scratch / throwaway lab"
    admin: false

  # ── Hard-tenant examples (scope: tenant) ─────────────────────────────────
  # Only for L2 isolation. Soft path: tenancy=acme + network_segment=prod.
  # Inventory hard path: tenancy=acme, env=prod, network_segment=acme_prod
  acme_prod:
    vlan_id: 60
    network_role: prod
    subnet: "192.168.60.0/24"
    gateway: "192.168.60.1"
    dns: ["192.168.60.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "default"
    site: site-a
    zone: tenant
    scope: tenant
    env: prod
    tenancy: acme
    description: "acme production hard isolation"
    admin: false

  acme_dev:
    vlan_id: 61
    network_role: dev
    subnet: "192.168.61.0/24"
    gateway: "192.168.61.1"
    dns: ["192.168.61.1"]
    targets: [esxi, firewall, switches]
    vswitch: "vDS-Lab"
    insecure: false
    management_profile: "default"
    site: site-a
    zone: tenant
    scope: tenant
    env: dev
    tenancy: acme
    description: "acme development hard isolation"
    admin: false

# ============================================================
# Stage 1a – static items (pure)
# ============================================================
# Normalises every entry to one fixed field set; display_name is
# VLAN<id>-<TENANCY>-<NETWORK_ROLE>; gateway_cidr only when the segment
# targets the firewall AND declares gateway + subnet.
network_underlays_items: |
  {% set items = [] %}
  {% for key, net in network_underlays.items() %}
  {%   set tenant = (net.tenancy | default('') | upper | trim) %}
  {%   set role   = (net.network_role | default('') | upper | trim) %}
  {%   set display_name = 'VLAN' ~ net.vlan_id ~ '-' ~ tenant ~ '-' ~ role %}
  {%   set gateway_cidr = '' %}
  {%   if 'firewall' in (net.targets | default([])) and net.gateway is defined and net.subnet is defined %}
  {%     set gateway_cidr = net.gateway ~ '/' ~ (net.subnet | ansible.utils.ipaddr('prefix')) %}
  {%   endif %}
  {%   set _ = items.append({
          'original_key': key,
          'display_name': display_name,
          'vlan_id': net.vlan_id,
          'tenancy': tenant,
          'network_role': role,
          'zone': net.zone | default(''),
          'targets': net.targets | default([]),
          'vswitch': net.vswitch | default(''),
          'insecure': net.insecure | default(false) | bool,
          'promiscuous_mode': net.promiscuous_mode
                              | default(net.insecure | default(false)) | bool,
          'forged_transmits': net.forged_transmits
                              | default(net.insecure | default(false)) | bool,
          'gateway': net.gateway | default(''),
          'subnet': net.subnet | default(''),
          'gateway_cidr': gateway_cidr,
          'management_profile': net.management_profile | default(''),
          'description': net.description | default(''),
          'dns': net.dns | default('')
        }) %}
  {% endfor %}
  {{ items | to_json }}

# ============================================================
# Stage 1b – generated pools (spec-driven)
# ============================================================
# Each pool declares its own shape; the generator emits sets × roles items.
#
# VLAN math (set n = 1..sets, per role):
#   base = vlan_base + (n - 1) * vlan_stride
#   vlan = base + role_offset
# vlan_stride defaults to the role count, so an unset stride tight-packs sets
# back-to-back (the historical behaviour). Set it larger than the role count to
# leave a numbering gap between sets for later expansion — e.g. stride 10 over
# 5 roles yields 2000-2004, 2010-2014, 2020-2024, … with 2005-2009 free.
#
# roles may be EITHER form:
#   list  — [app, monitor]              role_offset = list position (0,1,2,…)
#   dict  — app: {offset: 0}            role_offset = explicit offset (default
#           monitor: {offset: 4,          declaration order); the value map is
#                     insecure: true}     per-role metadata inherited by every
#                                         generated instance of that role.
# Per-role keys override the pool-level default for that role only. Overridable:
#   offset · insecure · promiscuous_mode · forged_transmits · targets · vswitch
#   · zone · management_profile
#
# NAMING = an ORDERED LIST of var tokens joined by '-'. No format strings, no
# literals — just the vars you pick, in the order you pick (or the default).
# Two optional per-pool lists choose which vars appear and in what order:
#   name_parts (default [vlan, tenant, env, role, nn]) -> display_name
#   key_parts  (default [prefix, n, role])             -> original_key (lower)
# name_case (default upper) = upper | lower | keep ('keep' = source casing, may
# be mixed). The KEY is ALWAYS lowercase (vars are referenced lowercase). e.g.
#   name_case: lower  -> vlan2200-tenant_x-dev-endpoint-01
# Tokens (value):
#   prefix (pool.prefix|key) · pool (key) · tenant · env (pool.env; '' if unset)
#   role · vlan (label+id, e.g. VLAN2200) · vlan_label (just 'VLAN') · vid (id
#   only, e.g. 2200) · base · offset · n · nn (2-digit set number)
# The VLAN label comes from pool.vlan_prefix (default 'VLAN'). Since parts join
# on '-', pick vlan for glued (VLAN2200) or vlan_label + vid for a separator.
# Empty tokens are dropped, so env is silently skipped when a pool omits it —
# no doubled '-'. Reorder / trim to taste, e.g.
#   name_parts: [vlan, tenant, role]             -> VLAN2200-TENANT_X-ENDPOINT
#   name_parts: [tenant, env, role, nn]          -> TENANT_X-DEV-ENDPOINT-01
#   name_parts: [vlan_label, vid, tenant, role]  -> VLAN-2200-TENANT_X-ENDPOINT
# display_name feeds every projection, so the order flows to ESXi/firewall/
# switch consumers automatically; duplicate_display_names / duplicate_vlans
# below still guard against a parts list too short to stay unique.
#
# DESCRIPTION (free-form prose): unlike the NAME, desc_template IS a str.format
# string — literals + {tokens} are welcome, because a description is prose, not
# an identifier. Same token names as naming (source casing here; vlan='VLAN'+id,
# vid=id). A per-role desc_template overrides the pool default; unset -> ''. e.g.
#   desc_template: "{tenant} {env} {role} (VLAN {vid}, set {nn})"
#     -> "tenant_x dev endpoint (VLAN 2200, set 01)"
# Static network_underlays entries instead carry a plain per-entry `description`
# string. Both paths land in the item's `description` field, uniform across
# static + pool.

network_pools:
  # ── Defaults + KEY control ───────────────────────────────────────────────
  # Name takes every default (name_parts [vlan, tenant, env, role, nn], UPPER);
  # env is unset so it drops out -> VLAN2000-ACME-APP-01.
  # Demonstrates key_parts on the ORIGINAL_KEY only (name untouched; keys are
  # always lowercase):  key_parts: [tenant, vid, role] -> acme-2000-app
  acme_lab:
    prefix: acme-dev
    tenancy: acme
    zone: pool
    vlan_base: 2000
    sets: 2
    roles: [app, monitor]
    targets: [esxi, switches]
    vswitch: vDS-Lab
    key_parts: [tenant, vid, role]

  # ── NAME knobs: VLAN-XX separator + custom label + lower-case + order ─────
  # vlan_label + vid split the label from the id (VLAN-XX style); vlan_prefix
  # renames the label; name_case lowercases the whole joined name:
  #   vlan_prefix: net, name_parts [vlan_label, vid, tenant, role, nn],
  #   name_case: lower  ->  net-2100-globex-dev-sandbox-01
  globex_lab:
    prefix: lab
    tenancy: globex
    zone: pool
    vlan_base: 2100
    sets: 2
    roles: [sandbox, tap, mgmt]
    targets: [esxi, switches]
    vswitch: vDS-Lab
    vlan_prefix: net
    name_parts: [vlan_label, vid, tenant, role, nn]
    name_case: lower

  # ── BEHAVIOUR knobs: stride + dict offsets + env + per-role security ──────
  # vlan_stride 10 spaces each set's block; dict roles give explicit offsets
  # (need not be contiguous — endpoint sits at +9, target at +7); env: dev
  # feeds the DEFAULT tenant-env-role-nn order; the monitor role relaxes just
  # promiscuous_mode + forged_transmits (a SPAN / sniffer port), no blanket
  # insecure.  ->  VLAN2209-TENANT_X-DEV-ENDPOINT-01, VLAN2204-…-MONITOR-01, …
  tenant_x_lab:
    prefix: tenant-x
    tenancy: tenant_x
    env: dev
    zone: pool
    vlan_base: 2200
    vlan_stride: 10
    sets: 3
    targets: [esxi, switches]
    vswitch: vDS-Lab
    # Dynamic per-network description (str.format, literals allowed). The
    # monitor role overrides it for the SPAN port.
    #   endpoint -> "tenant_x dev endpoint net (VLAN 2209, set 01)"
    #   monitor  -> "tenant_x dev SPAN/sniffer port (VLAN 2204, set 01)"
    desc_template: "{tenant} {env} {role} net (VLAN {vid}, set {nn})"
    roles:
      endpoint: { offset: 9 }
      sensor: { offset: 1 }
      management: { offset: 2 }
      target: { offset: 7 }
      monitor:
        offset: 4
        promiscuous_mode: true
        forged_transmits: true
        desc_template: "{tenant} {env} SPAN/sniffer port (VLAN {vid}, set {nn})"

network_pool_items: |
  {% set items = [] %}
  {% for pool_key, pool in network_pools.items() %}
  {%   set tenant = (pool.tenancy | default(pool_key) | upper | trim) %}
  {%   set roles_raw = pool.roles | default(['set']) %}
  {#   Normalise roles to [{name, offset, meta}]: list form -> positional
       offset + empty meta; dict form -> explicit offset (default declaration
       order) + the value map as per-role metadata. #}
  {%   set role_specs = [] %}
  {%   if roles_raw is mapping %}
  {%     for rname, rmeta_raw in roles_raw.items() %}
  {%       set rmeta = rmeta_raw | default({}, true) %}
  {%       set _ = role_specs.append({'name': rname,
                     'offset': rmeta.offset | default(loop.index0),
                     'meta': rmeta}) %}
  {%     endfor %}
  {%   else %}
  {%     for rname in roles_raw %}
  {%       set _ = role_specs.append({'name': rname,
                     'offset': loop.index0, 'meta': {}}) %}
  {%     endfor %}
  {%   endif %}
  {#   Stride defaults to the role count -> unset stride tight-packs sets. #}
  {%   set stride = pool.vlan_stride | default(role_specs | length) %}
  {%   for n in range(1, (pool.sets | default(1)) + 1) %}
  {%     set base = (pool.vlan_base | default(1000)) + ((n - 1) * stride) %}
  {%     for rs in role_specs %}
  {%       set role_name = rs.name %}
  {%       set rmeta = rs.meta %}
  {%       set vlan = base + rs.offset %}
  {#       Effective security default: role insecure -> pool insecure -> false.
           The two granular knobs fall back to it when unset. #}
  {%       set eff_insecure = rmeta.insecure | default(pool.insecure | default(false)) %}
  {#       Naming = an ORDERED list of var tokens joined by '-' (no templates).
           display_name uppercases + drops empty tokens (e.g. env when unset);
           original_key lowercases. Override order/selection per pool with
           name_parts / key_parts; otherwise the defaults below apply. #}
  {%       set vlan_prefix = pool.vlan_prefix | default('VLAN') %}
  {%       set vals = {'prefix': pool.prefix | default(pool_key),
                       'pool': pool_key,
                       'tenant': tenant,
                       'env': pool.env | default(''),
                       'role': role_name,
                       'vlan': vlan_prefix ~ vlan,
                       'vlan_label': vlan_prefix,
                       'vid': vlan,
                       'base': base, 'offset': rs.offset,
                       'n': n, 'nn': '%02d' | format(n)} %}
  {%       set name_parts = pool.name_parts
                            | default(['vlan', 'tenant', 'env', 'role', 'nn']) %}
  {%       set key_parts = pool.key_parts | default(['prefix', 'n', 'role']) %}
  {#       name_case is a per-pool choice (default UPPER), applied to the whole
           joined string (dashes unaffected) so lower gives a clean lowercase
           name; 'keep' leaves the source casing as-is. The KEY is ALWAYS
           lowercase — vars are referenced lowercase, no exceptions. #}
  {%       set name_case = pool.name_case | default('upper') %}
  {%       set _name = name_parts | map('extract', vals) | map('string')
                       | select | join('-') %}
  {%       set item_name = (_name | upper) if name_case == 'upper'
                           else ((_name | lower) if name_case == 'lower' else _name) %}
  {%       set item_key = key_parts | map('extract', vals) | map('string')
                          | map('lower') | select | join('-') %}
  {#       description is FREE-FORM prose, so unlike names it IS a str.format
           template — literals are welcome. Same token names as naming (source
           casing here; vlan = 'VLAN'+id, vid = id). Per-role desc_template
           overrides the pool default; unset -> '' (no description). #}
  {%       set desc_tmpl = rmeta.desc_template
                           | default(pool.desc_template | default('')) %}
  {%       set desc_ctx = {'prefix': pool.prefix | default(pool_key),
                           'pool': pool_key, 'tenant': pool.tenancy | default(pool_key),
                           'env': pool.env | default(''), 'role': role_name,
                           'vlan': 'VLAN' ~ vlan, 'vid': vlan,
                           'vlan_label': vlan_prefix, 'base': base, 'offset': rs.offset,
                           'n': n, 'nn': '%02d' | format(n)} %}
  {%       set item_desc = desc_tmpl.format(**desc_ctx) %}
  {%       set _ = items.append({
              'original_key': item_key,
              'display_name': item_name,
              'vlan_id': vlan,
              'tenancy': tenant,
              'network_role': role_name | upper,
              'zone': rmeta.zone | default(pool.zone | default('pool')),
              'targets': rmeta.targets
                         | default(pool.targets | default(['esxi', 'switches'])),
              'vswitch': rmeta.vswitch | default(pool.vswitch | default('')),
              'insecure': eff_insecure | bool,
              'promiscuous_mode': rmeta.promiscuous_mode
                          | default(pool.promiscuous_mode | default(eff_insecure)) | bool,
              'forged_transmits': rmeta.forged_transmits
                          | default(pool.forged_transmits | default(eff_insecure)) | bool,
              'gateway': '',
              'subnet': '',
              'gateway_cidr': '',
              'management_profile': rmeta.management_profile
                                    | default(pool.management_profile | default('')),
              'description': item_desc,
              'dns': ''
            }) %}
  {%     endfor %}
  {%   endfor %}
  {% endfor %}
  {{ items | to_json }}

# ============================================================
# Stage 1 – final union (static + pool)
# ============================================================
network_all_items: >-
  {{ ((network_underlays_items | from_json)
      + (network_pool_items | from_json)) | to_json }}

# ============================================================
# Validation – missing / empty fields (conditional on targets)
# Fix B applied – no loop scoping issue
# ============================================================
# Preflight task consuming all three validation vars:
#   - name: Validate network_underlays + pool
#     ansible.builtin.assert:
#       that:
#         - (missing_required_fields | from_json | length) == 0
#         - duplicate_display_names | length == 0
#         - duplicate_vlans | length == 0
#       fail_msg: >-
#         Network validation failed!
#         Missing/empty fields: {{ missing_required_fields | from_json }}
#         Duplicate names: {{ duplicate_display_names }}
#         Duplicate VLAN IDs: {{ duplicate_vlans }}
#       quiet: true
#     run_once: true
missing_required_fields: |
  {% set req_common = ['vlan_id', 'tenancy', 'network_role', 'zone', 'targets'] %}
  {% set req_by_target = {
        'esxi': ['vswitch', 'insecure'],
        'firewall': ['gateway', 'subnet', 'management_profile']
     } %}
  {% set bad = [] %}
  {% for key, net in network_underlays.items() %}
  {%   set targets = net.targets | default([]) %}
  {%   if targets | length == 0 %}
  {%     set _ = bad.append(key ~ ': targets list is empty') %}
  {%   endif %}
  {%   set required = (req_common
          + (targets | map('extract', req_by_target)
             | select('defined') | flatten | list)) | unique | list %}
  {%   for f in required %}
  {%     if f not in net or net[f] is none
            or (net[f] is string and net[f] | trim == '')
            or (net[f] is sequence and net[f] | length == 0) %}
  {%       set _ = bad.append(key ~ ': missing or empty ' ~ f) %}
  {%     endif %}
  {%   endfor %}
  {% endfor %}
  {{ bad | to_json }}

# ============================================================
# Validation – duplicates across the FULL union
# ============================================================
duplicate_display_names: >-
  {{ network_all_items | from_json
     | map(attribute='display_name')
     | community.general.counter
     | dict2items
     | selectattr('value', '>', 1)
     | map(attribute='key')
     | list }}

duplicate_vlans: >-
  {{ network_all_items | from_json
     | map(attribute='vlan_id')
     | community.general.counter
     | dict2items
     | selectattr('value', '>', 1)
     | map(attribute='key')
     | list }}

# key → display_name convenience map (inventory selection / vsphere_vm_network).
network_underlays_names: |
  {% set out = {} %}
  {% for it in network_all_items | from_json %}
  {%   set _ = out.update({it.original_key: it.display_name}) %}
  {% endfor %}
  {{ out | to_json }}

# Segments with admin: true (operator/admin source CIDRs) — derived from
# the source dict (admin is an ownership field, not projected into items).
underlay_admin_cidrs: >-
  {{ network_underlays | dict2items
     | selectattr('value.admin', 'defined') | selectattr('value.admin')
     | map(attribute='value.subnet') | list }}
network_admin_cidrs: "{{ underlay_admin_cidrs }}"

# ============================================================
# Platform projections – filter by targets FIRST, then reshape
# ============================================================

# ── ESXi port groups (dynamic SSOT + custom leftovers) ──────────────────────
# ~90% dynamic (every matrix segment that targets esxi) + ~10% custom (hand rows
# with no matrix pattern) → ONE combined list the consumer loops. Every row
# shares the shape { name, switch, vlan, insecure, promiscuous_mode,
# forged_transmits, trunk? }. Consume the COMBINED list only:
#   loop: "{{ esxi_port_groups }}"
#   loop_control: { loop_var: pg, label: "{{ pg.name }}" }

# 1) Dynamic — matrix-backed segments, projected to the row shape.
esxi_port_groups_dynamic: >-
  {{ network_all_items | from_json
     | selectattr('targets', 'contains', 'esxi')
     | map('community.general.json_query',
           '{name: display_name, switch: vswitch, vlan: vlan_id, insecure: insecure,
             promiscuous_mode: promiscuous_mode, forged_transmits: forged_transmits}')
     | list }}

# 2) Custom — ONLY rows with no matrix pattern: trunk, residential/tenant
#    L2-only, extra cluster planes, PoC sandboxes. Keep this short; do NOT push
#    one-offs into the SSOT matrix. Names/VLANs here stay OUTSIDE the matrix
#    ranges, so the concat below needs no dedupe. This is also the single
#    source for the vCenter custom rows (reshaped in network_vcenter_* below).
esxi_port_groups_custom:
  - { name: TRUNK, switch: vDS-Lab, vlan: "0-4094", insecure: false, trunk: true }
  - { name: VLAN02-RES-A, switch: vDS-Lab, vlan: 2, insecure: false }
  - { name: VLAN03-RES-B, switch: vDS-Lab, vlan: 3, insecure: false }
  - { name: VLAN04-RES-C, switch: vDS-Lab, vlan: 4, insecure: false }
  - { name: VLAN05-SHARED, switch: vDS-Lab, vlan: 5, insecure: false }
  - { name: VLAN06-TENANT1, switch: vDS-Lab, vlan: 6, insecure: false }
  - { name: VLAN07-TENANT2, switch: vDS-Lab, vlan: 7, insecure: false }
  - { name: VLAN08-RES-IOT, switch: vDS-Lab, vlan: 8, insecure: false }
  - { name: VLAN12-MGT-CLUSTER-WKR, switch: vDS-Lab, vlan: 12, insecure: false }
  - { name: VLAN13-MGT-CLUSTER-LB, switch: vDS-Lab, vlan: 13, insecure: false }
  - { name: VLAN22-DEV-CLUSTER-WKR, switch: vDS-Lab, vlan: 22, insecure: false }
  - { name: VLAN23-DEV-CLUSTER-LB, switch: vDS-Lab, vlan: 23, insecure: false }
  - { name: VLAN32-PROD-CLUSTER-WKR, switch: vDS-Lab, vlan: 32, insecure: false }
  - { name: VLAN33-PROD-CLUSTER-LB, switch: vDS-Lab, vlan: 33, insecure: false }
  - { name: VLAN501-SANDBOX01-INSIDE, switch: vDS-Lab, vlan: 501, insecure: false }
  - { name: VLAN502-SANDBOX02-INSIDE, switch: vDS-Lab, vlan: 502, insecure: false }

# 3) Combined — the ONLY list consumers loop. Dynamic first, custom last.
esxi_port_groups: "{{ esxi_port_groups_dynamic + esxi_port_groups_custom }}"

# ── vCenter distributed port groups (roles/vcenter config-as-code) ──────────
# Same dynamic+custom pattern, but in the shape roles/vcenter's
# domains/portgroups.yml loops over (_vcenter_desired.portgroups →
# vcenter_config.portgroups):
#   { vds, name, vlan_id, vlan_trunk?, security?: {allow_promiscuous,
#     allow_forged_transmits, allow_mac_change} }
# Wire it in inventory:  vcenter_config.portgroups: "{{ network_vcenter_portgroups }}"
# The role's loop var is unchanged — only the data source moves to the SSOT.
#
# security is emitted ONLY for a segment that relaxes a knob, so every other
# port group keeps network_policy.inherited=true (inherits the vDS policy) —
# preserving today's behaviour where nothing sets item.security.

# 1) Dynamic — matrix-backed segments, reshaped for the vCenter dvs module.
network_vcenter_portgroups_from_ssot: |
  {% set out = [] %}
  {% for it in network_all_items | from_json
              | selectattr('targets', 'contains', 'esxi') %}
  {%   set pg = {'vds': it.vswitch, 'name': it.display_name,
                 'vlan_id': it.vlan_id} %}
  {%   if it.insecure or it.promiscuous_mode or it.forged_transmits %}
  {%     set _ = pg.update({'security': {
              'allow_promiscuous': it.promiscuous_mode | bool,
              'allow_forged_transmits': it.forged_transmits | bool,
              'allow_mac_change': it.insecure | bool}}) %}
  {%   endif %}
  {%   set _ = out.append(pg) %}
  {% endfor %}
  {{ out | to_json }}

# 2) Custom — DERIVED from esxi_port_groups_custom (single source for the
#    leftovers) and reshaped: switch->vds, vlan->vlan_id, trunk->vlan_trunk,
#    flat security flags -> nested security map (emitted only when relaxed).
network_vcenter_portgroups_static: |
  {% set out = [] %}
  {% for pg in esxi_port_groups_custom %}
  {%   set row = {'vds': pg.switch, 'name': pg.name, 'vlan_id': pg.vlan} %}
  {%   if pg.trunk | default(false) | bool %}
  {%     set _ = row.update({'vlan_trunk': true}) %}
  {%   endif %}
  {%   if pg.insecure | default(false) or pg.promiscuous_mode | default(false)
          or pg.forged_transmits | default(false) %}
  {%     set _ = row.update({'security': {
              'allow_promiscuous':
                  pg.promiscuous_mode | default(pg.insecure | default(false)) | bool,
              'allow_forged_transmits':
                  pg.forged_transmits | default(pg.insecure | default(false)) | bool,
              'allow_mac_change': pg.insecure | default(false) | bool}}) %}
  {%   endif %}
  {%   set _ = out.append(row) %}
  {% endfor %}
  {{ out | to_json }}

# 3) Combined — wire this into vcenter_config.portgroups. Dynamic first.
network_vcenter_portgroups: >-
  {{ (network_vcenter_portgroups_from_ssot | from_json)
     + (network_vcenter_portgroups_static | from_json) }}

# ── Firewall L3 subinterfaces (paloaltonetworks.panos) ──────────────────────
# ip = gateway_cidr: the firewall subinterface IS the segment gateway.
palo_interfaces: >-
  {{ network_all_items | from_json
     | selectattr('targets', 'contains', 'firewall')
     | map('community.general.json_query',
           '{name: display_name, tag: vlan_id, ip: gateway_cidr,
             management_profile: management_profile,
             zone_name: zone, comment: tenancy}')
     | list }}

# ── Switch VLAN ids (physical L2 plane) ─────────────────────────────────────
switch_vlans: >-
  {{ network_all_items | from_json
     | selectattr('targets', 'contains', 'switches')
     | map(attribute='vlan_id')
     | unique
     | sort }}

# L2-only VLANs with no underlay entry (residential/tenant + PoC sandboxes).
# NOT auto-appended — concatenate where a play needs them:
#   "{{ (switch_vlans + switch_vlans_static) | unique | sort }}"
switch_vlans_static: [2, 3, 4, 5, 6, 7, 8, 12, 13, 22, 23, 32, 33, 501, 502]

# ============================================================
# Non-derivable platform data (kept as-is)
# ============================================================

# Firewall device metadata + zones (zones are policy anchors, not per-VLAN).
palo:
  device_group: "lab"
  vsys: "vsys1"
  template: "lab-template"
  zones:
    infra: { name: "infra", mode: layer3 }
    dmz: { name: "dmz", mode: layer3 }
    mgt: { name: "mgt", mode: layer3 }
    dev: { name: "dev", mode: layer3 }
    prod: { name: "prod", mode: layer3 }
    iot: { name: "iot", mode: layer3 }
    tenant: { name: "tenant", mode: layer3 }
    lab: { name: "lab", mode: layer3 }
    edge: { name: "edge", mode: layer3 }

# Switch trunk ports — hand-curated (physical cabling, not derivable).
dell:
  trunks:
    - name: esxi-01
      description: "ESXi-01 uplink(s)"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: all
      peer: "192.168.0.11"

    - name: esxi-02
      description: "ESXi-02 uplink(s)"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: all
      peer: "192.168.0.12"

    - name: edge-trunk
      description: "Edge firewall VLAN trunk"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: all
      peer: edge-fw

    - name: esxi-poc-sandbox-range
      description: "Extra allowed range for PoC sandboxes"
      interfaces: []
      mode: trunk
      native_vlan: 0
      allowed_vlans: "500-599"
      peer: esxi-all

# ============================================================
# docker_swarm — encrypted overlay subnets (east-west app plane)
# ============================================================
# Isolated from underlay RFC1918 (192.168.x). Mock pool 10.40.0.0/16, /24 per stack.

docker_swarm:
  default_addr_pool: "10.40.0.0/16"
  default_addr_pool_subnet_size: 24

  mattermost:
    subnet: "10.40.10.0/24"
    netmask: "255.255.255.0"
    name: "mm_overlay"
    encrypted: true
    attachable: true

  splunk:
    subnet: "10.40.11.0/24"
    netmask: "255.255.255.0"
    name: "splunk_overlay"
    encrypted: true
    attachable: true

  elk:
    subnet: "10.40.12.0/24"
    netmask: "255.255.255.0"
    name: "elk_overlay"
    encrypted: true
    attachable: true

  # next free: 10.40.13.0/24

swarm_overlay_subnets:
  mattermost: "{{ docker_swarm.mattermost.subnet }}"
  splunk: "{{ docker_swarm.splunk.subnet }}"
  elk: "{{ docker_swarm.elk.subnet }}"

# ============================================================
# Legacy aliases — prefer network_underlays.* / the projections in new code
# ============================================================
# NOTE: per-entry portgroup/name/netmask fields are GONE — use display_name
# (derived), network_underlays_names, or subnet | ansible.utils.ipaddr('netmask').
underlay: "{{ network_underlays }}"
networks: "{{ network_underlays }}"

# Fallback only — inventory should derive from the selected segment's subnet.
network_netmask: "255.255.255.0"
