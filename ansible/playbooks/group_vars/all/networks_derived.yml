---
# ── Estate network catalog — DERIVED (machinery, do not edit per-estate) ────
# Everything here is computed from the VALUES in networks.yml next door.
# Users configure networks.yml; this file only changes when the derivation
# logic itself evolves.
#
# NAMING TIERS — an underscore means "dynamically calculated, never set by a
# user"; the count says whether you may read it:
#   (none)  raw user config — lives ONLY in networks.yml (fabric_underlays,
#           fabric_pools, fabric_name_parts/_name_case, esxi_port_groups_custom,
#           switch_vlans_static, palo, dell, docker_swarm)
#   _one    derived + EXPOSED — the contract below; safe to consume anywhere
#   __two   derived + INTERNAL — pipeline stages; never consume, shape may
#           change without notice
#
# ══════════════════════ EXPOSED CONTRACT ══════════════════════
# JSON-string outputs (2.16 bridge — always decode with | from_json):
#   _fabric_names            dict  key → display_name
#                            e.g. vsphere_vm_network: "{{ (_fabric_names | from_json)[network_segment] }}"
#   _fabric_config_errors    list  config-shape problems (missing/mistyped
#                            roots, unknown naming tokens, malformed roles)
#   _fabric_missing_fields   list  per-segment required-field gaps
# Native outputs (use directly):
#   _esxi_port_groups        list of {name, switch, vlan, insecure,
#                            promiscuous_mode, forged_transmits, trunk?}
#                            → loop for ESXi port-group reconciliation
#   _fabric_vcenter_portgroups  list of {vds, name, vlan_id, vlan_trunk?,
#                            security?{allow_promiscuous, allow_forged_transmits,
#                            allow_mac_change}}
#                            → vcenter_config.portgroups: "{{ _fabric_vcenter_portgroups }}"
#   _palo_interfaces         list of {name, tag, ip, management_profile,
#                            zone_name, comment} → panos subinterface loop
#   _switch_vlans            sorted unique VLAN ids targeting switches
#                            (+ switch_vlans_static where a play needs the
#                            L2-only extras)
#   _fabric_admin_cidrs      list of operator/admin source subnets
#   _fabric_duplicate_names  list of colliding display names (want: empty)
#   _fabric_duplicate_vlans  list of colliding VLAN ids   (want: empty)
# Protection: these are DATA — nothing fails by itself. Run the preflight
# assert (documented above _fabric_missing_fields; live copy in
# playbooks/fabric_info.yml) first in every consuming play.
# ══════════════════════════════════════════════════════════════
#
# GRACEFUL DEGRADATION: every stage guards its inputs (fabric_underlays /
# fabric_pools / esxi_port_groups_custom default to empty), so a missing root
# dict renders empty outputs instead of a mid-template crash whose only symptom
# is a generic JSON-decode error downstream. Unknown name_parts/key_parts
# tokens render as dropped-empty instead of raising. WHAT went missing is
# reported by _fabric_config_errors — assert it first (see the preflight task
# below _fabric_missing_fields).
#
# No set_fact, no runtime loops for derivation: Ansible templates vars lazily
# at reference time, so these projections re-evaluate wherever consumed.
#
# ansible-core 2.16 compatibility: every statement-loop var ends with
# `{{ ... | to_json }}` and every consumer starts with `| from_json`.
# The old templating engine would otherwise hand stage 2 a STRING repr of
# the list. (Alternative: jinja2_native=true — default-forced from 2.19+ —
# but the to_json/from_json bridge works on every core version.)

# ============================================================
# Stage 1a – static items (pure)
# ============================================================
# Normalises every entry to one fixed field set. display_name uses the same
# ordered-token mechanism as the pools: name_parts (per-segment override →
# estate default fabric_name_parts) joined by '-', empty tokens
# dropped, name_case applied to the joined string. The KEY is always the
# literal dict key. gateway_cidr only when the segment targets the firewall
# AND declares gateway + subnet.
__fabric_underlay_items: |
  {% set items = [] %}
  {% for key, net in (fabric_underlays | default({}, true)).items() %}
  {%   set tenant = (net.tenancy | default('') | upper | trim) %}
  {%   set role   = (net.network_role | default('') | upper | trim) %}
  {%   set vlan_prefix = net.vlan_prefix | default('VLAN') %}
  {%   set vals = {'key': key,
                   'tenant': net.tenancy | default('', true) | trim,
                   'role': net.network_role | default('', true) | trim,
                   'env': net.env | default('', true),
                   'site': net.site | default('', true),
                   'zone': net.zone | default('', true),
                   'scope': net.scope | default('', true),
                   'vlan': vlan_prefix ~ net.vlan_id,
                   'vlan_label': vlan_prefix,
                   'vid': net.vlan_id} %}
  {%   set name_parts = net.name_parts
                        | default(fabric_name_parts
                                  | default(['vlan', 'tenant', 'role'])) %}
  {%   set name_case = net.name_case
                       | default(fabric_name_case | default('upper')) %}
  {#   vals.get(t, '') instead of extract: an unknown token renders as a
       dropped-empty part (no crash); _fabric_config_errors names the typo. #}
  {%   set parts = [] %}
  {%   for t in name_parts %}{% set _ = parts.append(vals.get(t, '') | string) %}{% endfor %}
  {%   set _name = parts | select | join('-') %}
  {%   set display_name = (_name | upper) if name_case == 'upper'
                          else ((_name | lower) if name_case == 'lower' else _name) %}
  {%   set gateway_cidr = '' %}
  {%   if 'firewall' in (net.targets | default([])) and net.gateway is defined and net.subnet is defined %}
  {%     set gateway_cidr = net.gateway ~ '/' ~ (net.subnet | ansible.utils.ipaddr('prefix')) %}
  {%   endif %}
  {%   set _ = items.append({
          'original_key': key,
          'display_name': display_name,
          'vlan_id': net.vlan_id,
          'tenancy': tenant,
          'network_role': role,
          'zone': net.zone | default(''),
          'targets': net.targets | default([]),
          'vswitch': net.vswitch | default(''),
          'insecure': net.insecure | default(false) | bool,
          'promiscuous_mode': net.promiscuous_mode
                              | default(net.insecure | default(false)) | bool,
          'forged_transmits': net.forged_transmits
                              | default(net.insecure | default(false)) | bool,
          'gateway': net.gateway | default(''),
          'subnet': net.subnet | default(''),
          'gateway_cidr': gateway_cidr,
          'management_profile': net.management_profile | default(''),
          'description': net.description | default(''),
          'dns': net.dns | default('')
        }) %}
  {% endfor %}
  {{ items | to_json }}

# ============================================================
# Stage 1b – generated pools (spec-driven)
# ============================================================
# Spec + naming/roles documentation: networks.yml (fabric_pools).
__fabric_pool_items: |
  {% set items = [] %}
  {% for pool_key, pool in (fabric_pools | default({}, true)).items() %}
  {%   set tenant = (pool.tenancy | default(pool_key) | upper | trim) %}
  {%   set roles_raw = pool.roles | default(['set']) %}
  {#   Normalise roles to [{name, offset, meta}]:
       list form -> positional offset; a plain entry is a bare role name, a
       single-key map entry ({role: {…}}) attaches per-role metadata inline
       (meta.offset overrides the position).
       dict form -> explicit offset (default declaration order) + the value
       map as per-role metadata. #}
  {%   set role_specs = [] %}
  {%   if roles_raw is mapping %}
  {%     for rname, rmeta_raw in roles_raw.items() %}
  {%       set rmeta = rmeta_raw | default({}, true) %}
  {%       set _ = role_specs.append({'name': rname,
                     'offset': rmeta.offset | default(loop.index0),
                     'meta': rmeta}) %}
  {%     endfor %}
  {%   else %}
  {%     for rentry in roles_raw %}
  {%       if rentry is mapping %}
  {%         set rname = rentry.keys() | list | first %}
  {%         set rmeta = rentry[rname] | default({}, true) %}
  {%       else %}
  {%         set rname = rentry %}
  {%         set rmeta = {} %}
  {%       endif %}
  {%       set _ = role_specs.append({'name': rname,
                     'offset': rmeta.offset | default(loop.index0),
                     'meta': rmeta}) %}
  {%     endfor %}
  {%   endif %}
  {#   Stride defaults to the role count -> unset stride tight-packs sets. #}
  {%   set stride = pool.vlan_stride | default(role_specs | length) %}
  {%   for n in range(1, (pool.sets | default(1)) + 1) %}
  {%     set base = (pool.vlan_base | default(1000)) + ((n - 1) * stride) %}
  {%     for rs in role_specs %}
  {%       set role_name = rs.name %}
  {%       set rmeta = rs.meta %}
  {%       set vlan = base + rs.offset %}
  {#       Effective security default: role insecure -> pool insecure -> false.
           The two granular knobs fall back to it when unset. #}
  {%       set eff_insecure = rmeta.insecure | default(pool.insecure | default(false)) %}
  {#       Naming = an ORDERED list of var tokens joined by '-' (no templates).
           display_name uppercases + drops empty tokens (e.g. env when unset);
           original_key lowercases. Override order/selection per pool with
           name_parts / key_parts; otherwise the defaults below apply. #}
  {%       set vlan_prefix = pool.vlan_prefix | default('VLAN') %}
  {%       set vals = {'prefix': pool.prefix | default(pool_key),
                       'pool': pool_key,
                       'tenant': tenant,
                       'env': pool.env | default(''),
                       'role': role_name,
                       'vlan': vlan_prefix ~ vlan,
                       'vlan_label': vlan_prefix,
                       'vid': vlan,
                       'base': base, 'offset': rs.offset,
                       'n': n, 'nn': '%02d' | format(n)} %}
  {%       set name_parts = pool.name_parts
                            | default(['vlan', 'tenant', 'env', 'role', 'nn']) %}
  {%       set key_parts = pool.key_parts | default(['prefix', 'n', 'role']) %}
  {#       name_case is a per-pool choice (default UPPER), applied to the whole
           joined string (dashes unaffected) so lower gives a clean lowercase
           name; 'keep' leaves the source casing as-is. The KEY is ALWAYS
           lowercase — vars are referenced lowercase, no exceptions. #}
  {%       set name_case = pool.name_case | default('upper') %}
  {#       vals.get(t, '') instead of extract: an unknown token renders as a
           dropped-empty part (no crash); _fabric_config_errors names the typo. #}
  {%       set nparts = [] %}
  {%       for t in name_parts %}{% set _ = nparts.append(vals.get(t, '') | string) %}{% endfor %}
  {%       set _name = nparts | select | join('-') %}
  {%       set item_name = (_name | upper) if name_case == 'upper'
                           else ((_name | lower) if name_case == 'lower' else _name) %}
  {%       set kparts = [] %}
  {%       for t in key_parts %}{% set _ = kparts.append(vals.get(t, '') | string | lower) %}{% endfor %}
  {%       set item_key = kparts | select | join('-') %}
  {#       description is FREE-FORM prose, so unlike names it IS a str.format
           template — literals are welcome. Same token names as naming (source
           casing here; vlan = 'VLAN'+id, vid = id). Per-role desc_template
           overrides the pool default; unset -> '' (no description). #}
  {%       set desc_tmpl = rmeta.desc_template
                           | default(pool.desc_template | default('')) %}
  {%       set desc_ctx = {'prefix': pool.prefix | default(pool_key),
                           'pool': pool_key, 'tenant': pool.tenancy | default(pool_key),
                           'env': pool.env | default(''), 'role': role_name,
                           'vlan': 'VLAN' ~ vlan, 'vid': vlan,
                           'vlan_label': vlan_prefix, 'base': base, 'offset': rs.offset,
                           'n': n, 'nn': '%02d' | format(n)} %}
  {%       set item_desc = desc_tmpl.format(**desc_ctx) %}
  {%       set _ = items.append({
              'original_key': item_key,
              'display_name': item_name,
              'vlan_id': vlan,
              'tenancy': tenant,
              'network_role': role_name | upper,
              'zone': rmeta.zone | default(pool.zone | default('pool')),
              'targets': rmeta.targets
                         | default(pool.targets | default(['esxi', 'switches'])),
              'vswitch': rmeta.vswitch | default(pool.vswitch | default('')),
              'insecure': eff_insecure | bool,
              'promiscuous_mode': rmeta.promiscuous_mode
                          | default(pool.promiscuous_mode | default(eff_insecure)) | bool,
              'forged_transmits': rmeta.forged_transmits
                          | default(pool.forged_transmits | default(eff_insecure)) | bool,
              'gateway': '',
              'subnet': '',
              'gateway_cidr': '',
              'management_profile': rmeta.management_profile
                                    | default(pool.management_profile | default('')),
              'description': item_desc,
              'dns': ''
            }) %}
  {%     endfor %}
  {%   endfor %}
  {% endfor %}
  {{ items | to_json }}

# ============================================================
# Stage 1 – final union (static + pool)
# ============================================================
__fabric_all_items: >-
  {{ ((__fabric_underlay_items | from_json)
      + (__fabric_pool_items | from_json)) | to_json }}

# ============================================================
# Validation – missing / empty fields (conditional on targets)
# ============================================================
# Preflight task consuming all four validation vars — put this FIRST in any
# play that consumes the fabric, so a broken config fails with a NAMED reason
# instead of a downstream JSON/undefined error:
#   - name: Validate fabric config
#     ansible.builtin.assert:
#       that:
#         - (_fabric_config_errors | from_json | length) == 0
#         - (_fabric_missing_fields | from_json | length) == 0
#         - _fabric_duplicate_names | length == 0
#         - _fabric_duplicate_vlans | length == 0
#       fail_msg: >-
#         Fabric validation failed!
#         Config errors: {{ _fabric_config_errors | from_json }}
#         Missing/empty fields: {{ _fabric_missing_fields | from_json }}
#         Duplicate names: {{ _fabric_duplicate_names }}
#         Duplicate VLAN IDs: {{ _fabric_duplicate_vlans }}
#       quiet: true
#     run_once: true

# Config-SHAPE errors: missing root dicts, wrong types, unknown naming tokens,
# malformed role entries. These are the cases that used to surface as a
# generic 'json decoder' crash — now they render empty (guarded) and this var
# says exactly what is wrong.
_fabric_config_errors: |
  {% set errs = [] %}
  {% set tokens_underlay = ['key', 'tenant', 'role', 'env', 'site', 'zone',
                            'scope', 'vlan', 'vlan_label', 'vid'] %}
  {% set tokens_pool = ['prefix', 'pool', 'tenant', 'env', 'role', 'vlan',
                        'vlan_label', 'vid', 'base', 'offset', 'n', 'nn'] %}
  {% if fabric_underlays is not defined %}
  {%   set _ = errs.append('fabric_underlays is not defined — declare the segment matrix in networks.yml') %}
  {% elif fabric_underlays is not mapping %}
  {%   set _ = errs.append('fabric_underlays must be a dict of segments, got ' ~ (fabric_underlays | type_debug)) %}
  {% else %}
  {%   for t in fabric_name_parts | default([]) %}
  {%     if t not in tokens_underlay %}
  {%       set _ = errs.append("fabric_name_parts: unknown token '" ~ t ~ "' (allowed: " ~ (tokens_underlay | join(', ')) ~ ')') %}
  {%     endif %}
  {%   endfor %}
  {%   for key, net in fabric_underlays.items() %}
  {%     if net is not mapping %}
  {%       set _ = errs.append('fabric_underlays.' ~ key ~ ' must be a dict, got ' ~ (net | type_debug)) %}
  {%     else %}
  {%       if net.vlan_id is not defined %}
  {%         set _ = errs.append('fabric_underlays.' ~ key ~ ': vlan_id is required') %}
  {%       endif %}
  {%       for t in net.name_parts | default([]) %}
  {%         if t not in tokens_underlay %}
  {%           set _ = errs.append('fabric_underlays.' ~ key ~ ": unknown name_parts token '" ~ t ~ "' (allowed: " ~ (tokens_underlay | join(', ')) ~ ')') %}
  {%         endif %}
  {%       endfor %}
  {%     endif %}
  {%   endfor %}
  {% endif %}
  {% if fabric_pools is defined and fabric_pools is not mapping and fabric_pools is not none %}
  {%   set _ = errs.append('fabric_pools must be a dict of pool specs, got ' ~ (fabric_pools | type_debug)) %}
  {% elif fabric_pools is defined and fabric_pools is mapping %}
  {%   for pkey, pool in fabric_pools.items() %}
  {%     if pool is not mapping %}
  {%       set _ = errs.append('fabric_pools.' ~ pkey ~ ' must be a dict, got ' ~ (pool | type_debug)) %}
  {%     else %}
  {%       for t in (pool.name_parts | default([])) + (pool.key_parts | default([])) %}
  {%         if t not in tokens_pool %}
  {%           set _ = errs.append('fabric_pools.' ~ pkey ~ ": unknown name_parts/key_parts token '" ~ t ~ "' (allowed: " ~ (tokens_pool | join(', ')) ~ ')') %}
  {%         endif %}
  {%       endfor %}
  {%       if pool.roles is defined and pool.roles is not mapping %}
  {%         for rentry in pool.roles %}
  {%           if rentry is mapping and (rentry.keys() | list | length) != 1 %}
  {%             set _ = errs.append('fabric_pools.' ~ pkey ~ ': a list-form role map entry needs exactly ONE key ({role: {...}}), got keys [' ~ (rentry.keys() | list | join(', ')) ~ ']') %}
  {%           endif %}
  {%         endfor %}
  {%       endif %}
  {%     endif %}
  {%   endfor %}
  {% endif %}
  {% if esxi_port_groups_custom is defined and (esxi_port_groups_custom is mapping or esxi_port_groups_custom is string) %}
  {%   set _ = errs.append('esxi_port_groups_custom must be a LIST of port-group rows, got ' ~ (esxi_port_groups_custom | type_debug)) %}
  {% endif %}
  {{ errs | to_json }}

_fabric_missing_fields: |
  {% set req_common = ['vlan_id', 'tenancy', 'network_role', 'zone', 'targets'] %}
  {% set req_by_target = {
        'esxi': ['vswitch', 'insecure'],
        'firewall': ['gateway', 'subnet', 'management_profile']
     } %}
  {% set bad = [] %}
  {% for key, net in (fabric_underlays | default({}, true)).items() %}
  {%   set targets = net.targets | default([]) %}
  {%   if targets | length == 0 %}
  {%     set _ = bad.append(key ~ ': targets list is empty') %}
  {%   endif %}
  {%   set required = (req_common
          + (targets | map('extract', req_by_target)
             | select('defined') | flatten | list)) | unique | list %}
  {%   for f in required %}
  {%     if f not in net or net[f] is none
            or (net[f] is string and net[f] | trim == '')
            or (net[f] is sequence and net[f] | length == 0) %}
  {%       set _ = bad.append(key ~ ': missing or empty ' ~ f) %}
  {%     endif %}
  {%   endfor %}
  {% endfor %}
  {{ bad | to_json }}

# ============================================================
# Validation – duplicates across the FULL union
# ============================================================
_fabric_duplicate_names: >-
  {{ __fabric_all_items | from_json
     | map(attribute='display_name')
     | community.general.counter
     | dict2items
     | selectattr('value', '>', 1)
     | map(attribute='key')
     | list }}

_fabric_duplicate_vlans: >-
  {{ __fabric_all_items | from_json
     | map(attribute='vlan_id')
     | community.general.counter
     | dict2items
     | selectattr('value', '>', 1)
     | map(attribute='key')
     | list }}

# key → display_name convenience map (inventory selection / vsphere_vm_network).
_fabric_names: |
  {% set out = {} %}
  {% for it in __fabric_all_items | from_json %}
  {%   set _ = out.update({it.original_key: it.display_name}) %}
  {% endfor %}
  {{ out | to_json }}

# Segments with admin: true (operator/admin source CIDRs) — derived from
# the source dict (admin is an ownership field, not projected into items).
_fabric_admin_cidrs: >-
  {{ fabric_underlays | default({}, true) | dict2items
     | selectattr('value.admin', 'defined') | selectattr('value.admin')
     | map(attribute='value.subnet') | list }}

# ============================================================
# Platform projections – filter by targets FIRST, then reshape
# ============================================================

# ── ESXi port groups (dynamic SSOT + custom leftovers) ──────────────────────
# ~90% dynamic (every matrix segment that targets esxi) + ~10% custom
# (esxi_port_groups_custom in networks.yml) → ONE combined list the consumer
# loops. Every row shares the shape { name, switch, vlan, insecure,
# promiscuous_mode, forged_transmits, trunk? }. Consume the COMBINED list only:
#   loop: "{{ _esxi_port_groups }}"
#   loop_control: { loop_var: pg, label: "{{ pg.name }}" }

# 1) Dynamic — matrix-backed segments, projected to the row shape.
__fabric_esxi_dynamic: >-
  {{ __fabric_all_items | from_json
     | selectattr('targets', 'contains', 'esxi')
     | map('community.general.json_query',
           '{name: display_name, switch: vswitch, vlan: vlan_id, insecure: insecure,
             promiscuous_mode: promiscuous_mode, forged_transmits: forged_transmits}')
     | list }}

# 2) Combined — the ONLY list consumers loop. Dynamic first, custom last.
_esxi_port_groups: "{{ __fabric_esxi_dynamic + (esxi_port_groups_custom | default([], true)) }}"

# ── vCenter distributed port groups (roles/vcenter config-as-code) ──────────
# Same dynamic+custom pattern, but in the shape roles/vcenter's
# domains/portgroups.yml loops over (_vcenter_desired.portgroups →
# vcenter_config.portgroups):
#   { vds, name, vlan_id, vlan_trunk?, security?: {allow_promiscuous,
#     allow_forged_transmits, allow_mac_change} }
# Wire it in inventory:  vcenter_config.portgroups: "{{ _fabric_vcenter_portgroups }}"
# The role's loop var is unchanged — only the data source moves to the SSOT.
#
# security is emitted ONLY for a segment that relaxes a knob, so every other
# port group keeps network_policy.inherited=true (inherits the vDS policy) —
# preserving today's behaviour where nothing sets item.security.

# 1) Dynamic — matrix-backed segments, reshaped for the vCenter dvs module.
__fabric_vcenter_dynamic: |
  {% set out = [] %}
  {% for it in __fabric_all_items | from_json
              | selectattr('targets', 'contains', 'esxi') %}
  {%   set pg = {'vds': it.vswitch, 'name': it.display_name,
                 'vlan_id': it.vlan_id} %}
  {%   if it.insecure or it.promiscuous_mode or it.forged_transmits %}
  {%     set _ = pg.update({'security': {
              'allow_promiscuous': it.promiscuous_mode | bool,
              'allow_forged_transmits': it.forged_transmits | bool,
              'allow_mac_change': it.insecure | bool}}) %}
  {%   endif %}
  {%   set _ = out.append(pg) %}
  {% endfor %}
  {{ out | to_json }}

# 2) Custom — DERIVED from esxi_port_groups_custom (single source for the
#    leftovers) and reshaped: switch->vds, vlan->vlan_id, trunk->vlan_trunk,
#    flat security flags -> nested security map (emitted only when relaxed).
__fabric_vcenter_static: |
  {% set out = [] %}
  {% for pg in (esxi_port_groups_custom | default([], true)) %}
  {%   set row = {'vds': pg.switch, 'name': pg.name, 'vlan_id': pg.vlan} %}
  {%   if pg.trunk | default(false) | bool %}
  {%     set _ = row.update({'vlan_trunk': true}) %}
  {%   endif %}
  {%   if pg.insecure | default(false) or pg.promiscuous_mode | default(false)
          or pg.forged_transmits | default(false) %}
  {%     set _ = row.update({'security': {
              'allow_promiscuous':
                  pg.promiscuous_mode | default(pg.insecure | default(false)) | bool,
              'allow_forged_transmits':
                  pg.forged_transmits | default(pg.insecure | default(false)) | bool,
              'allow_mac_change': pg.insecure | default(false) | bool}}) %}
  {%   endif %}
  {%   set _ = out.append(row) %}
  {% endfor %}
  {{ out | to_json }}

# 3) Combined — wire this into vcenter_config.portgroups. Dynamic first.
_fabric_vcenter_portgroups: >-
  {{ (__fabric_vcenter_dynamic | from_json)
     + (__fabric_vcenter_static | from_json) }}

# ── Firewall L3 subinterfaces (paloaltonetworks.panos) ──────────────────────
# ip = gateway_cidr: the firewall subinterface IS the segment gateway.
_palo_interfaces: >-
  {{ __fabric_all_items | from_json
     | selectattr('targets', 'contains', 'firewall')
     | map('community.general.json_query',
           '{name: display_name, tag: vlan_id, ip: gateway_cidr,
             management_profile: management_profile,
             zone_name: zone, comment: tenancy}')
     | list }}

# ── Switch VLAN ids (physical L2 plane) ─────────────────────────────────────
# L2-only extras: switch_vlans_static in networks.yml (NOT auto-appended).
_switch_vlans: >-
  {{ __fabric_all_items | from_json
     | selectattr('targets', 'contains', 'switches')
     | map(attribute='vlan_id')
     | unique
     | sort }}
