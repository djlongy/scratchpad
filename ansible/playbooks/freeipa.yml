---
# Deploy a FreeIPA server cluster (primary + replicas) with the freeipa_server role.
# Topology, realm, and options come from inventory (see inventories/example/).
#
#   ansible-playbook -i inventories/example/hosts.yml playbooks/freeipa.yml
#   ansible-playbook -i inventories/example/hosts.yml playbooks/freeipa.yml --tags idam
#
# Single host in the `freeipa` group → single-server. Two+ → primary + replicas.

- name: Deploy FreeIPA server
  hosts: freeipa
  gather_facts: true
  # No play-level become: the freeipa_server role self-escalates per phase (least
  # privilege) — its remote-host phases carry become: true while localhost-delegated
  # credential lookups keep become: false. This lets the same play also run
  # localhost-delegated roles (e.g. vsphere_vm) without sudo-ing on the control node.
  roles:
    - role: freeipa_server
