---
# playbooks/audit_single_logger.yml
#
# Minimal example: ship one audit record to a local JSON Lines file after the
# run. List the audit_logging role last under roles: (preferred) or include
# it from post_tasks.

- name: Example deployment with file audit logging
  hosts: webservers
  gather_facts: true

  roles:
    - your_role_here
    - role: audit_logging
      vars:
        audit_logging_backends: [file]
        audit_logging_file_path: /var/log/ansible/audit.jsonl
