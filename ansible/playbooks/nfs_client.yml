---
# Mount the NFS network drive on hosts in the `nfs_clients` group. Assumes the host
# is already FreeIPA-enrolled (local homes) by the site/enrolment play.
#
#   ansible-playbook -i inventories/example/hosts.yml playbooks/nfs_client.yml

- name: Mount the NFS network drive
  hosts: nfs_clients
  gather_facts: true
  become: true
  become_user: root
  become_method: ansible.builtin.sudo
  roles:
    - role: nfs_client
