---
# playbooks/audit_semaphore.yml
#
# Example for Semaphore CI/CD: captures Semaphore task metadata
# (project ID, task ID, username) automatically via the role-local
# get_cli_args action plugin. No extra configuration needed —
# semaphore_vars are auto-extracted from the CLI.

- name: Example Semaphore-triggered deployment with audit logging
  hosts: all
  gather_facts: true

  roles:
    - your_role_here
    - role: audit_logging
      vars:
        audit_logging_backends: [file, syslog]
        audit_logging_file_path: /var/log/ansible/audit.jsonl
