---
# playbooks/audit_multi_play.yml
#
# Multi-play playbook with ONE consolidated audit record for the whole run.
#
# Pattern (inline under roles: — preferred):
#   - Intermediate plays: audit_logging_mode: accumulate
#   - Final play: audit_logging_backends: [...]  (mode defaults to ship)
#
# The role always buffers the current play first (idempotent per play name),
# then ships only when mode is ship. The resulting record includes:
#   plays[]     — per-play breakdown (name, hosts, roles)
#   play_count  — total number of plays in the run
#   roles       — deduplicated union of all roles across all plays
#   hosts       — deduplicated union of all target hosts

- name: Play 1 - Network Configuration
  hosts: webservers
  gather_facts: true

  roles:
    - mock_network
    - role: audit_logging
      vars:
        audit_logging_mode: accumulate

- name: Play 2 - Application Deployment
  hosts: appservers
  gather_facts: false

  roles:
    - mock_app
    - role: audit_logging
      vars:
        audit_logging_mode: accumulate

- name: Play 3 - Post-Deploy Verification
  hosts: webservers:appservers
  gather_facts: false

  roles:
    - mock_checks
    - role: audit_logging
      vars:
        audit_logging_backends: [file]
        audit_logging_file_path: /var/log/ansible/audit.jsonl
