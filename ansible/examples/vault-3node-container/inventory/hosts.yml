---
# Sample inventory for the 3-node containerised Vault cluster.
# Replace IPs and hostnames with your environment.

all:
  vars:
    ansible_user: ansible

  children:
    vault:
      hosts:
        vault-01: { ansible_host: 10.0.0.51 }
        vault-02: { ansible_host: 10.0.0.52 }
        vault-03: { ansible_host: 10.0.0.53 }

    # First entry of `vault` is the bootstrap leader (init runs here).
    vault_leader:
      hosts:
        vault-01:
