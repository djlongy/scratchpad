---
# ensure_secrets.yml — for each entry in `managed_secrets`, ensure a
# value exists in Ansible's variable scope by either:
#   1. using a value that's already defined and non-empty in scope
#      (vault.yml, group_vars, host_vars, extra-vars, …), or
#   2. reading an existing value from HashiCorp Vault, or
#   3. generating a fresh passphrase via generate_passphrase.yml,
#      writing it to HashiCorp Vault, and using that.
#
# Final value lands as a fact under the entry's `var` name (defaults
# to `name`). Subsequent tasks/templates can reference it directly.
#
# ENTRY SHAPE
# ────────────────────────────────────────────────────────────────────
#   - name: <logical key>          # required — used for log labels and
#                                  # as default for `var` and `vault_field`
#     var: <ansible_var_name>      # optional — defaults to `name`. The
#                                  # variable scope is searched for this
#                                  # name; the resolved value is also
#                                  # exposed under this name.
#     vault_path: <path>           # required — KV v2 path WITHIN the mount
#                                  # (e.g. "apps/myapp/runtime")
#     vault_mount: <mount>         # optional — KV v2 mount point. Default "kv".
#     vault_field: <field>         # optional — field within the secret.
#                                  # Defaults to `name`.
#
# RESOLUTION ORDER
# ────────────────────────────────────────────────────────────────────
#   scope  >  HashiCorp Vault  >  generate
#
#   - "in scope" means: vars[var] is defined AND non-empty.
#   - Vault reads use community.hashi_vault.vault_kv2_get; missing
#     paths/fields are treated as "not present" (failed_when:false).
#   - Vault writes preserve other fields at the path (read-merge-write
#     with cas, so concurrent runs don't clobber each other silently).
#
# USAGE
# ────────────────────────────────────────────────────────────────────
#   - hosts: ...
#     vars:
#       managed_secrets:
#         - name: mm_pg_password
#           var: vault_mm_pg_password
#           vault_mount: kv-mgt
#           vault_path: apps/mattermost/runtime
#           vault_field: pg_password
#         - name: mm_at_rest_key
#           var: vault_mm_at_rest_key
#           vault_mount: kv-mgt
#           vault_path: apps/mattermost/runtime
#           vault_field: at_rest_key
#     tasks:
#       - ansible.builtin.include_tasks: ensure_secrets.yml
#
#   # After the include, vault_mm_pg_password and vault_mm_at_rest_key
#   # are guaranteed defined and non-empty.
#
# REQUIREMENTS
# ────────────────────────────────────────────────────────────────────
#   - community.hashi_vault collection on the control node.
#   - VAULT_ADDR + valid auth (token in env / ~/.vault-token / approle)
#     resolvable from the control node.
#   - generate_passphrase.yml co-located in the same directory (or
#     adjust the include path below).

- name: Ensure each managed secret resolves to a value
  ansible.builtin.include_tasks: _ensure_one_secret.yml
  loop: "{{ managed_secrets }}"
  loop_control:
    loop_var: _msec
    label: "{{ _msec.name }}"
