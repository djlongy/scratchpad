# EL9 Hardened Kickstart — GNOME + fapolicyd + STIG + FIPS
#
# Tested with Oracle Linux 9.7. Also works with RHEL 9, AlmaLinux 9, Rocky Linux 9.
# Boot with: inst.ks=http://<server>:8080/ks-el9-hardened.cfg
#
# Customise: search for "CHANGEME" to find values you must set before use.

### Install from the attached ISO.
cdrom

### Text-mode install.
text

### Accept EULA.
eula --agreed

### Locale — CHANGEME
lang en_US.UTF-8
keyboard us
timezone UTC --utc

### Network — DHCP on first NIC.
network --bootproto=dhcp --onboot=on --activate
network --hostname=el9-vm

### Root password — CHANGEME (use --iscrypted with a SHA-512 hash in production).
rootpw --plaintext changeme

### Create an admin user — CHANGEME
user --name=admin --groups=wheel --password=changeme --plaintext

### Firewall & SELinux.
firewall --enabled --ssh
selinux --enforcing

### Auth.
authselect select sssd

### Disk — wipe and use LVM on the first available disk.
clearpart --all --initlabel --disklabel=gpt
autopart --type=lvm

### Bootloader (UEFI) — enable FIPS at boot.
bootloader --append="crashkernel=auto fips=1"

### Services.
services --enabled=NetworkManager,sshd,fapolicyd

### Package selection.
%packages --ignoremissing --excludedocs
@core
@standard
@gnome-desktop
@guest-desktop-agents
bash-completion
curl
fapolicyd
firefox
gdm
git
open-vm-tools
openscap-scanner
perl
python3
scap-security-guide
sudo
tar
vim-enhanced
wget
-iwl*firmware
%end

### Post-install.
%post --erroronfail --log=/root/ks-post.log

# --- Hypervisor tools ---
systemctl enable vmtoolsd.service

# --- EPEL (Oracle Linux) ---
# For RHEL: dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
dnf install -y oracle-epel-release-el9 2>/dev/null || true
dnf config-manager --enable ol9_developer_EPEL 2>/dev/null || true
dnf makecache

# --- VS Code (example third-party app) ---
rpm --import https://packages.microsoft.com/keys/microsoft.asc
cat > /etc/yum.repos.d/vscode.repo <<VSCEOF
[code]
name=Visual Studio Code
baseurl=https://packages.microsoft.com/yumrepos/vscode
enabled=1
gpgcheck=1
gpgkey=https://packages.microsoft.com/keys/microsoft.asc
VSCEOF
dnf install -y code

# Allow VS Code in fapolicyd (installed after initial DB build)
cat > /etc/fapolicyd/rules.d/31-vscode.rules <<FAPEOF
allow perm=any all : dir=/usr/share/code/
FAPEOF
chown root:fapolicyd /etc/fapolicyd/rules.d/31-vscode.rules
chmod 0644 /etc/fapolicyd/rules.d/31-vscode.rules

# --- Desktop ---
systemctl set-default graphical.target
systemctl enable fapolicyd.service

# --- Sudo ---
echo "%wheel ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/wheel-nopasswd
chmod 0440 /etc/sudoers.d/wheel-nopasswd

# --- VMware Fusion: force Xorg (Wayland keyboard input broken) ---
sed -i 's/^#WaylandEnable=false/WaylandEnable=false/' /etc/gdm/custom.conf

# --- VMware Fusion: USBGuard allow virtual devices (STIG enables USBGuard) ---
mkdir -p /etc/usbguard/rules.d
cat > /etc/usbguard/rules.d/vmware.conf <<USBEOF
allow id 0e0f:* name "VMware Virtual USB*" with-interface one-of { 03:00:00 03:01:01 09:00:00 0e:01:00 0e:02:00 }
USBEOF

# --- SSH hardening ---
sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

# --- FIPS ---
fips-mode-setup --enable --no-bootcfg 2>/dev/null || true

# --- STIG hardening (OpenSCAP remediation) ---
# Available profiles: stig, stig_gui, ospp, e8, hipaa, pci-dss
# For Oracle Linux, use ssg-ol9-ds.xml
# For RHEL, use ssg-rhel9-ds.xml
SCAP_CONTENT=$(ls /usr/share/xml/scap/ssg/content/ssg-ol9-ds.xml \
                  /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml 2>/dev/null | head -1)
if [ -n "$SCAP_CONTENT" ]; then
  oscap xccdf eval \
    --remediate \
    --profile xccdf_org.ssgproject.content_profile_stig_gui \
    --results /root/stig-results.xml \
    --report /root/stig-report.html \
    "$SCAP_CONTENT" || true
fi

# Re-ensure wheel nopasswd survives STIG remediation
echo "%wheel ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/wheel-nopasswd
chmod 0440 /etc/sudoers.d/wheel-nopasswd

%end

### Reboot when done, eject media.
reboot --eject
