---
# Thin wrapper over app_swarm_stack. Captures this role's path up front
# (role_path inside the include_role vars block lazily resolves to the
# *included* role's path), then hands a complete swarm_stack_* spec to
# the generic role.
#
# RESILIENCE: every value in swarm_stack_services below is a top-level
# scalar or a reference to a wrapper-defaults / inventory variable. No
# entry references swarm_stack_secret_values or swarm_stack_config_names
# — those late-bound values are baked in via env_template instead. See
# the resilience note at the top of app_swarm_stack/defaults/main.yml.
#
# Secret values are read from Ansible variables defined in your
# ansible-vault-encrypted YAML file (e.g. group_vars/swarm/vault.yml):
#
#   ---
#   $ANSIBLE_VAULT;1.1;AES256
#   <encrypted blob>
#
#   # Decrypted contents:
#   vault_mm_pg_password:        "..."
#   vault_mm_at_rest_key:        "..."             # >= 32 chars
#   vault_mm_public_link_salt:   "..."             # >= 32 chars
#   vault_mm_admin_password:     "..."

- name: Capture wrapper role path
  ansible.builtin.set_fact:
    _mm_role_path: "{{ role_path }}"
  tags: [always]

# When mattermost_ldap_enabled, we extend the secrets list and turn
# swarm_stack_configs from [] into a one-entry list (the FreeIPA CA
# cert). Composing via set_fact instead of inline-conditionals keeps
# the literal lists in include_role's vars block readable.
- name: Compose swarm_stack_secrets list
  ansible.builtin.set_fact:
    _mm_swarm_stack_secrets: >-
      {{
        [
          {'name': 'mm_pg_password',      'var': 'vault_mm_pg_password'},
          {'name': 'mm_at_rest_key',      'var': 'vault_mm_at_rest_key'},
          {'name': 'mm_public_link_salt', 'var': 'vault_mm_public_link_salt'},
          {'name': 'mm_admin_password',   'var': 'vault_mm_admin_password'}
        ]
        + (
          [{'name': 'mm_ldap_bind_password', 'var': 'vault_mm_ldap_bind_password'}]
          if mattermost_ldap_enabled else []
        )
      }}
  tags: [always]

- name: Compose swarm_stack_configs list
  ansible.builtin.set_fact:
    _mm_swarm_stack_configs: >-
      {{
        (
          [{'name':   'mm_freeipa_ca_cert',
            'src':    _mm_role_path + '/templates/mm-freeipa-ca-cert.j2',
            'target': mattermost_ldap_ca_cert_path,
            'mode':   '0444'}]
          if mattermost_ldap_enabled else []
        )
      }}
  tags: [always]

- name: Compose mm-app config refs
  ansible.builtin.set_fact:
    _mm_app_configs: >-
      {{ ['mm_freeipa_ca_cert'] if mattermost_ldap_enabled else [] }}
  tags: [always]

# Slurp the FreeIPA CA cert at deploy time from a FreeIPA server's
# canonical path. The cert is public (LDAPS verifiers need it), so it
# doesn't belong in ansible-vault. The fact then feeds the
# mm-freeipa-ca-cert.j2 template, which app_swarm_stack renders on the
# manager and ships as a docker config to mm-app.
- name: Slurp FreeIPA CA cert
  ansible.builtin.slurp:
    src: "{{ mattermost_freeipa_ca_cert_src }}"
  delegate_to: "{{ groups['freeipa'][0] }}"
  become: true
  register: _mm_freeipa_ca_cert_slurp
  when: mattermost_ldap_enabled
  tags: [always]

- name: Decode CA cert into a fact
  ansible.builtin.set_fact:
    _mm_freeipa_ca_cert_pem: "{{ _mm_freeipa_ca_cert_slurp.content | b64decode }}"
  when: mattermost_ldap_enabled
  tags: [always]

- name: Deploy mattermost via app_swarm_stack
  ansible.builtin.include_role:
    name: app_swarm_stack
  tags: [always]
  vars:
    swarm_stack_name: "{{ mattermost_stack_name }}"
    swarm_stack_dir: "{{ mattermost_stack_dir }}"

    swarm_stack_nfs:
      host: "{{ mattermost_nfs_host }}"
      server: "{{ mattermost_nfs_server }}"
      base: "{{ mattermost_nfs_base }}"

    # Centralised image map. Swap registry/tag here once and every
    # service that references the key picks it up.
    swarm_stack_images:
      mm_postgres: "{{ mattermost_postgres_image }}"
      mm_app: "{{ mattermost_app_image }}"

    # Subnet pinned via the swarm_overlay_subnets registry in
    # group_vars/all.yml — single source of truth so collisions are
    # caught at PR review, not at runtime.
    swarm_stack_networks:
      - name: mm_overlay
        attachable: true
        encrypted: true
        subnet: "{{ swarm_overlay_subnets[mattermost_stack_name] }}"

    swarm_stack_volumes:
      - name: mm_pgdata
        subpath: "{{ mattermost_pgdata_subpath }}"
        uid: "{{ mattermost_pg_uid }}"
        gid: "{{ mattermost_pg_gid }}"
        mode: "0700"
      - name: mm_app_data
        subpath: "{{ mattermost_data_subpath }}"
        uid: "{{ mattermost_app_uid }}"
        gid: "{{ mattermost_app_gid }}"
        mode: "0750"

    # Mattermost mutates config.json at runtime (writes version stamp
    # on first boot) so we can't ship config.json itself as a docker
    # config. We DO ship the FreeIPA CA cert as a docker config when
    # LDAP is on — Mattermost only reads that file, never writes it.
    swarm_stack_configs: "{{ _mm_swarm_stack_configs }}"

    # Postgres reads its password via the *_FILE pattern (native).
    # The other secrets are templated into MM_* env vars in the
    # mm-app.env.yml.j2 template via swarm_stack_secret_values. Each
    # `var` references a variable defined in your ansible-vault-
    # encrypted YAML. The LDAP bind password joins that list when
    # mattermost_ldap_enabled.
    swarm_stack_secrets: "{{ _mm_swarm_stack_secrets }}"

    swarm_stack_services:
      - name: mm-postgres
        image_key: mm_postgres
        hostname: mm-postgres
        replicas: 1
        networks: [mm_overlay]
        mounts:
          - source: mm_pgdata
            target: /var/lib/postgresql/data
            type: volume
        secrets: [mm_pg_password]
        placement: "{{ ['node.role == worker']
                       + (['node.hostname == ' ~ mattermost_pg_pinned_node]
                          if (mattermost_pg_pinned_node | length > 0) else []) }}"
        restart:
          condition: any
          delay: 10s
        limits:
          memory: 512M
        env_template: "{{ _mm_role_path }}/templates/mm-postgres.env.yml.j2"

      - name: mm-app
        image_key: mm_app
        hostname: mm-app
        replicas: "{{ mattermost_replicas }}"
        networks: [mm_overlay]
        mounts:
          - source: mm_app_data
            target: /mattermost/data
            type: volume
        configs: "{{ _mm_app_configs }}"
        publish:
          - target_port: 8065
            published_port: "{{ mattermost_published_port }}"
            protocol: tcp
            mode: ingress
        placement: "{{ mattermost_app_placement_constraints }}"
        placement_max_replicas_per_node: "{{ mattermost_max_per_node }}"
        update:
          parallelism: 1
          delay: 30s
          order: stop-first
          failure_action: rollback
        restart:
          condition: any
          delay: 15s
          max_attempts: 5
        limits:
          memory: 1G
        env_template: "{{ _mm_role_path }}/templates/mm-app.env.yml.j2"
