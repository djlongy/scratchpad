---
# Defaults for app_mattermost_swarm — thin wrapper over app_swarm_stack.
# Override any of these via inventory group_vars/host_vars.

mattermost_stack_name: mattermost
mattermost_stack_dir: /opt/swarm-stacks/mattermost

# NFS backend.
#   _host:   inventory hostname of the NFS server (used for
#            delegate_to mkdir on subpath ensure)
#   _server: address the swarm workers use to mount the share —
#            typically an IP, since DNS may not resolve from inside
#            overlay-attached containers.
#   _base:   export root on that host.
mattermost_nfs_host: ""
mattermost_nfs_server: ""
mattermost_nfs_base: /srv/nfs

# IMPORTANT: postgres image uid varies BY VARIANT.
#   - postgres:*-alpine                  → uid/gid 70    (the busybox/postgres user)
#   - postgres:* (Debian)                → uid/gid 999
# The role chowns the NFS subpath to {pg_uid:pg_gid} on the NFS server,
# so this MUST match the variant in mattermost_postgres_image. Setting
# the wrong one usually still "works" because postgres's entrypoint
# self-chowns on init, but that's a brittle accident — image hardening
# (or a future entrypoint change) breaks it silently. Match it
# explicitly here.
# Mattermost team-edition runs as uid 2000.
mattermost_pgdata_subpath: mattermost-postgres
mattermost_data_subpath: mattermost-data
mattermost_pg_uid: 70
mattermost_pg_gid: 70
mattermost_app_uid: 2000
mattermost_app_gid: 2000

# Postgres connection
mattermost_pg_db: mattermost
mattermost_pg_user: mmuser

# ── Image URLs ────────────────────────────────────────────────────────
# Override these in inventory to swap registry (e.g. pull through your
# internal registry instead of Docker Hub).
# Mattermost requires PostgreSQL 14.0+ (per
# https://docs.mattermost.com/deployment-guide/software-hardware-requirements.html)
# and follows the postgres community 5y/major support window — no
# upper bound. Default to the latest GA major (17). Bump as new GAs
# land. Stick to the alpine variant; uid stays 70 across alpine major
# bumps.
mattermost_postgres_image: "postgres:17-alpine"
mattermost_app_image: "mattermost/mattermost-team-edition:9.11"

# ── Service tuning ────────────────────────────────────────────────────
mattermost_replicas: 3
mattermost_max_per_node: 1
mattermost_published_port: 8065
mattermost_site_url: "https://mattermost.example.com"
mattermost_timezone: "UTC"

# Postgres can't safely run multi-replica on shared NFS — pin to a
# single worker node. Empty = no pin (assumes external HA postgres).
mattermost_pg_pinned_node: ""

# Worker placement constraint. Empty list = any worker.
mattermost_app_placement_constraints:
  - "node.role == worker"

# ── LDAP / FreeIPA integration ────────────────────────────────────────
# Disabled by default; flip in inventory when wiring up SSO.
#
# Secret pattern matches the rest of this template: the bind password
# is supplied via `vault_mm_ldap_bind_password` in your ansible-vault
# YAML file (NOT auto-generated by the role). The companion playbook
# playbooks/mattermost_freeipa_prep.yml takes that same value and sets
# it on the FreeIPA `svc-mattermost` user, so the bind end and the
# directory end always agree.
#
# CA cert for LDAPS is read from `vault_freeipa_ca_cert` (PEM string,
# multi-line) and shipped as a docker config mounted into mm-app.
# Pointing Mattermost at a self-managed cert avoids
# InsecureSkipVerify, which the FIPS edition treats as a misconfig.
mattermost_ldap_enabled: false
mattermost_ldap_host: "freeipa-01.example.com"
mattermost_ldap_port: 636
mattermost_ldap_connection_security: "TLS"      # TLS = LDAPS, STARTTLS, or empty for plain
mattermost_ldap_skip_certificate_verification: false
mattermost_ldap_base_dn: "dc=example,dc=com"
mattermost_ldap_bind_username: "uid=svc-mattermost,cn=users,cn=accounts,dc=example,dc=com"
mattermost_ldap_user_filter: "(objectClass=person)"
mattermost_ldap_group_filter: "(objectClass=groupOfNames)"
mattermost_ldap_id_attribute: "uid"
mattermost_ldap_login_id_attribute: "uid"
mattermost_ldap_username_attribute: "uid"
mattermost_ldap_email_attribute: "mail"
mattermost_ldap_first_name_attribute: "givenName"
mattermost_ldap_last_name_attribute: "sn"
mattermost_ldap_nickname_attribute: ""
mattermost_ldap_position_attribute: "title"
# Where the CA cert lands inside the mm-app container.
mattermost_ldap_ca_cert_path: "/mattermost/ldap-ca.crt"
# Where the role slurps the CA cert FROM on the FreeIPA host. Override
# only if you've moved it; FreeIPA installs put it here by default.
mattermost_freeipa_ca_cert_src: "/etc/ipa/ca.crt"
