---
# Resolve each secret's value from Ansible's variable scope (typically
# loaded from an ansible-vault-encrypted YAML file like
# group_vars/<group>/vault.yml), then create the docker secret on the
# manager via community.docker.docker_secret.
#
# rolling_versions=true means the module appends _vNNN — value change
# creates a new version, services on the old version keep working until
# their update rolls them. Resolved versioned name lands in
# result.secret_name.

- name: Validate that referenced vault variables are defined
  ansible.builtin.assert:
    that:
      - item.var in vars
      - vars[item.var] is defined
      - vars[item.var] | length > 0
    fail_msg: >-
      Secret '{{ item.name }}' references variable '{{ item.var }}'
      which is not defined or empty. Define it in your ansible-vault
      file (e.g. group_vars/swarm/vault.yml) or pass via --extra-vars.
  loop: "{{ swarm_stack_secrets }}"
  loop_control:
    label: "{{ item.name }} ← {{ item.var }}"
  no_log: true

- name: Create docker secrets (rolling versions)
  community.docker.docker_secret:
    name: "{{ item.name }}"
    data: "{{ vars[item.var] }}"
    rolling_versions: true
    state: present
    labels:
      app_swarm_stack: "{{ swarm_stack_name }}"
      app_swarm_stack_role: "{{ item.name }}"
  loop: "{{ swarm_stack_secrets }}"
  loop_control:
    label: "{{ item.name }}"
  register: _swst_secret_results
  no_log: true

- name: Build resolved secret-name registry
  ansible.builtin.set_fact:
    swarm_stack_secret_names: >-
      {{ dict(swarm_stack_secrets | map(attribute='name')
              | zip(_swst_secret_results.results | map(attribute='secret_name'))) }}

# Plaintext values for caller's config templates that bake credentials
# in (apps that don't read /run/secrets directly). no_log keeps the
# dict out of any task display; rendered files land mode 0640 on the
# manager, owned by root.
- name: Build secret-value registry for template use
  ansible.builtin.set_fact:
    swarm_stack_secret_values: >-
      {{ dict(swarm_stack_secrets | map(attribute='name')
              | zip(swarm_stack_secrets
                    | map(attribute='var')
                    | map('extract', vars) | list)) }}
  no_log: true
