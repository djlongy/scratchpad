---
# Orchestrator. Each step is in its own file and tagged so callers can
# target a single phase. The full chain runs by default and on
# `--tags redeploy`; teardown only fires on `--tags redeploy` or
# `--tags teardown`.

- name: Validate caller inputs (top-level scalars only)
  ansible.builtin.assert:
    that:
      - swarm_stack_name | length > 0
      - swarm_stack_services | length > 0
    fail_msg: >-
      app_swarm_stack requires swarm_stack_name and at least one entry
      in swarm_stack_services.
  tags: [always]

- name: Validate each service references an image_key in swarm_stack_images
  ansible.builtin.assert:
    that:
      - item.name is string
      - item.name | length > 0
      - item.image_key is defined
      - item.image_key in swarm_stack_images
    fail_msg: >-
      service '{{ item.name | default("?") }}': name must be a non-empty
      string and image_key must reference a key in swarm_stack_images.
      Got image_key='{{ item.image_key | default("?") }}',
      available keys={{ swarm_stack_images.keys() | list }}.
  loop: "{{ swarm_stack_services }}"
  loop_control:
    label: "{{ item.name | default('?') }}"
  tags: [always]

- name: Initialise resolved-name registers
  ansible.builtin.set_fact:
    swarm_stack_config_names: {}
    swarm_stack_secret_names: {}
    swarm_stack_secret_values: {}
  tags: [always]

# Classify volume entries by mount type. Untyped entries default to
# 'volume' (NFS-backed local-driver) for back-compat with wrappers
# written before the type field existed. ensure_nfs_subpaths.yml,
# ensure_bind_paths.yml and create_volumes.yml all loop on the
# resulting sub-lists, so this MUST run before any of them.
- name: Classify volume entries by mount type
  ansible.builtin.set_fact:
    _swst_vols_volume: >-
      {{ (swarm_stack_volumes | rejectattr('type', 'defined') | list)
         + (swarm_stack_volumes | selectattr('type', 'defined')
            | selectattr('type', 'eq', 'volume') | list) }}
    _swst_vols_bind: >-
      {{ swarm_stack_volumes | selectattr('type', 'defined')
         | selectattr('type', 'eq', 'bind') | list }}
    _swst_vols_tmpfs: >-
      {{ swarm_stack_volumes | selectattr('type', 'defined')
         | selectattr('type', 'eq', 'tmpfs') | list }}
  tags: [always]

- name: Validate volume types are supported
  ansible.builtin.assert:
    that:
      - item.type | default('volume') in ['volume', 'bind', 'tmpfs']
    fail_msg: >-
      swarm_stack_volumes entry '{{ item.name | default('?') }}' has
      unsupported type '{{ item.type | default('volume') }}'. Allowed:
      volume (NFS-backed local-driver), bind, tmpfs.
  loop: "{{ swarm_stack_volumes }}"
  loop_control:
    label: "{{ item.name | default('?') }}"
  tags: [always]

# Teardown — gated behind tags so default runs don't destroy state.
- name: Tear down existing services + labeled docker objects
  ansible.builtin.import_tasks: teardown.yml
  tags: [never, redeploy, teardown]

- name: Ensure NFS subpaths
  ansible.builtin.import_tasks: ensure_nfs_subpaths.yml
  when: _swst_vols_volume | length > 0
  tags: [swarm_stack, nfs, redeploy]

- name: Ensure bind-mount host paths
  ansible.builtin.import_tasks: ensure_bind_paths.yml
  when: _swst_vols_bind | length > 0
  tags: [swarm_stack, volumes, redeploy]

# Secrets must be created BEFORE configs so config templates can
# reference swarm_stack_secret_values to bake values into rendered
# config files.
- name: Create docker secrets
  ansible.builtin.import_tasks: create_secrets.yml
  when: swarm_stack_secrets | length > 0
  tags: [swarm_stack, secrets, redeploy]

- name: Create docker configs
  ansible.builtin.import_tasks: create_configs.yml
  when: swarm_stack_configs | length > 0
  tags: [swarm_stack, configs, redeploy]

- name: Pre-create overlay networks (attachable + encrypted)
  ansible.builtin.import_tasks: create_networks.yml
  when: swarm_stack_networks | length > 0
  tags: [swarm_stack, networks, redeploy]

- name: Pre-create NFS-backed volumes on every candidate host
  ansible.builtin.import_tasks: create_volumes.yml
  when: _swst_vols_volume | length > 0
  tags: [swarm_stack, volumes, redeploy]

- name: Deploy services
  ansible.builtin.import_tasks: deploy.yml
  tags: [swarm_stack, deploy, redeploy]

- name: Prune old hashed objects
  ansible.builtin.import_tasks: prune.yml
  tags: [swarm_stack, prune, redeploy]
