---
# Sample inventory for the swarm-stack template.
#
# Replace the IPs and hostnames with your environment. The structure
# below is the minimum the role needs:
#   - swarm_managers + swarm_workers + swarm_nfs groups
#   - swarm_bootstrap = the single manager you target deploy plays at
#   - ansible_host on each entry so the role can SSH in and so the
#     stack template knows what IP to feed the NFS mount option

all:
  vars:
    ansible_user: ansible

  children:
    swarm_cluster:
      children:
        swarm_managers:
          hosts:
            swarm-mgr-01: { ansible_host: 10.0.0.21 }
            swarm-mgr-02: { ansible_host: 10.0.0.22 }
            swarm-mgr-03: { ansible_host: 10.0.0.23 }
        swarm_workers:
          hosts:
            swarm-wkr-01: { ansible_host: 10.0.0.31 }
            swarm-wkr-02: { ansible_host: 10.0.0.32 }
            swarm-wkr-03: { ansible_host: 10.0.0.33 }

    # Single NFS server backing the cluster's shared volumes.
    swarm_nfs:
      hosts:
        swarm-nfs-01: { ansible_host: 10.0.0.40 }

    # The role runs against ONE manager (the role does its own
    # delegate_to for NFS-server tasks). swarm_bootstrap picks that
    # manager.
    swarm_bootstrap:
      hosts:
        swarm-mgr-01:

    # FreeIPA host(s) — only needed when mattermost_ldap_enabled is true.
    # mattermost_freeipa_prep.yml delegates the `ipauser` task to
    # groups['freeipa'][0]. The host must be enrolled in FreeIPA AND
    # have the `freeipa.ansible_freeipa` collection installed (any
    # FreeIPA server will). If you run FreeIPA out of this inventory's
    # scope, define this group in a separate inventory and pass two
    # `-i` flags, or move the prep play to an inventory of its own.
    freeipa:
      hosts:
        freeipa-01: { ansible_host: 10.0.0.50 }
