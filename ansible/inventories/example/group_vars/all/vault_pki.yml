---
# Vault PKI signer for the FreeIPA signed install (control-node API calls).
# The mount's default issuer is the offline-ca issuing CA imported into pki/
# (see docs/offline-root-vault-freeipa.md). Vault is the ONLY signer — the
# file-based certificate_authority branch was deprecated and removed from
# playbooks/freeipa_signed_install.yml.
vault_pki_addr: "https://vault.{{ env }}.{{ domain }}:8200"
vault_pki_mount: "pki"
