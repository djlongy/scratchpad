---
# inventories/example/group_vars/all/main.yml
#
# Everything that is true for EVERY host in THIS inventory.
# Estate constants (domain, canonical_*, underlay catalog, primary_interface)
# live in playbooks/group_vars/all/ — do not redeclare them here.
#
# When you copy this inventory for another env, change the four blocks below.

# ── 1. Identity ─────────────────────────────────────────────────────────────
# env      → DNS subdomain + trust label:  mgt | dev | prod
# tenancy  → org/customer (override estate default if multi-tenant)
# vault_kv_env → HashiCorp KV mount selector (usually == env)
env: "prod"
tenancy: "example"
vault_kv_env: "prod"

# ── 2. Primary underlay segment ─────────────────────────────────────────────
# Pick ONE key from playbooks/group_vars/all/networks.yml → network_underlay
#   mgt (VLAN10) | dev (VLAN20) | prod (VLAN30) | dev_cluster (VLAN21)
#   hard tenant: acme_prod (VLAN60) / acme_dev (VLAN61)
# Port-group name and netmask are DERIVED — no per-entry portgroup/netmask.
network_segment: "prod"
network_gateway: "{{ network_underlay[network_segment].gateway }}"
network_netmask: "{{ network_underlay[network_segment].subnet | ansible.utils.ipaddr('netmask') }}"
vsphere_vm_network: "{{ (network_underlay_names | from_json)[network_segment] }}"
vsphere_vm_gateway: "{{ network_underlay[network_segment].gateway }}"
vsphere_vm_dns: "{{ network_underlay[network_segment].dns }}"

# ── 3. VM naming (inherited by every group unless overridden) ───────────────
# Prefix = ${env}${distro_letter}  →  mgta | deva | proda
# Prefer short inventory keys (vault-01); put env only in the prefix.
vsphere_vm_name_prefix: "proda"
vsphere_vm_name: "{{ vsphere_vm_name_prefix }}-{{ canonical_hostname }}"
vsphere_vm_hostname: "{{ vsphere_vm_name }}"

# ── 4. Optional host-level network identity (baseline / NetworkManager) ─────
connection_name: "{{ primary_interface }}"
dns_nameserver: "{{ network_gateway }}"
search_domain: "{{ canonical_domain }}"
