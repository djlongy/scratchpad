---
# Minimal declarative topology example (sanitised).
vcenter_config:
  datacenter:
    name: Datacenter
  clusters:
    - { name: Cluster, ha_enabled: false, drs_enabled: true, drs_default_behaviour: fullyAutomated }
  hosts: []
  vds:
    - { name: vDS-Lab, version: "8.0.0", mtu: 9000, uplink_quantity: 2 }
  # Dynamic SSOT (matrix segments) + custom leftovers, from
  # playbooks/group_vars/all/networks.yml. Replaces the old hand list; the
  # role's loop (_vcenter_desired.portgroups) is unchanged. All rows reference
  # the vDS-Lab declared above, so vcenter_config_validate stays green.
  portgroups: "{{ fabric_vcenter_portgroups }}"
  resource_pools: []
  folders:
    - { name: platform, folder_type: vm }
    - { name: templates, folder_type: vm, parent: platform }
    - { name: tenants, folder_type: vm }
    - { name: corp, folder_type: vm, parent: tenants }
    - { name: acme, folder_type: vm, parent: tenants }
    - { name: beta, folder_type: vm, parent: tenants }
