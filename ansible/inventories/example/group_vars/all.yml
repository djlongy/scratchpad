---
# Base domain — the realm derives as its upper-case form (EXAMPLE.COM).
# FreeIPA server FQDNs become <inventory_hostname>.<domain>, e.g. idm01.example.com.
domain: "example.com"

# HashiCorp Vault: the freeipa_server role reads admin/DM passwords via the
# community.hashi_vault lookup, which needs VAULT_ADDR + a token in the
# environment. For example:
#   export VAULT_ADDR=https://vault.example.com:8200
#   export VAULT_TOKEN=...        # or a valid ~/.vault-token

# ── Primary NIC, derived per-host from facts (NOT a hardcoded NIC name) ──
# The NIC-naming scheme varies across distros on a hypervisor (eth0 / ens192 /
# ens160 / enp0s3…), so never hardcode `interface: ens192` in firewalld
# bindings — point them at `{{ primary_interface }}` and let each host resolve
# its own name.
#
# Resolution order (each host, at loop time — lazy Jinja, not set_fact):
#   1. the NIC carrying THIS host's management IP (ansible_host) — correct even
#      on multi-homed / no-default-route boxes (storage, cluster nodes);
#   2. else the NIC owning the default route;
#   3. else `omit` — the firewalld bind is skipped rather than failing on a
#      host that gathered no facts.
# A host that genuinely needs a different NIC can override in its host_vars.
#
# The `| default([])` / `| default('')` guards matter: the firewalld role's
# argument-spec validation runs at role ENTRY, BEFORE the role's own network-fact
# self-heal task. Under a cold `gather_facts: false` run those facts are absent,
# so without the guards this expression would raise "'dict object' has no
# attribute 'interfaces'" at arg-spec time. With them it resolves to `omit`,
# arg-spec passes, the self-heal gathers facts, and the lazy re-eval at bind time
# fills in the real NIC.
primary_interface: >-
  {{ ((ansible_facts.interfaces | default([]))
      | map('extract', ansible_facts)
      | selectattr('ipv4.address', 'defined')
      | selectattr('ipv4.address', 'eq', ansible_host | default(''))
      | map(attribute='device') | first)
      | default(ansible_default_ipv4.interface | default(omit), true) }}
