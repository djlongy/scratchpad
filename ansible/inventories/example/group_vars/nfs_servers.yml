---
# Example NFS server config. Per-user dirs can be hand-listed or templated from an
# IPA group at the playbook level. Kerberized exports require FreeIPA enrolment.
nfs_server_kerberos: true
nfs_server_users:
  - {name: alice}
  - {name: bob}
nfs_server_shares:
  - {name: ops, group: ops-admins}
# Host-trust alternative (no IPA): set nfs_server_kerberos=false and:
# nfs_server_sys_networks: ["192.0.2.0/24"]
