---
# inventories/example/hosts.yml
#
# THE reference inventory. Clone the whole folder for another environment:
#
#   cp -a inventories/example inventories/mgt
#   # then edit: env, vault_kv_env, underlay selection, vsphere_vm_name_prefix, IPs
#
# Host keys are service names WITHOUT env baked in (preferred):
#   inventory key  vault-01
#   OS short name  vault-01          ← canonical_hostname
#   vCenter name   proda-vault-01    ← vsphere_vm_name_prefix + canonical_hostname
#   FQDN           vault-01.prod.example.com
#
# Groups are pure resource nouns (what the host is), not verbs or phases.

all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519

  children:

    # ── Jump host (entry point onto this env's primary VLAN) ───────────────
    bastion:
      hosts:
        bastion-01:
          ansible_host: 192.168.30.2

    # ── Secrets / PKI (Raft HA = odd count) ────────────────────────────────
    vault:
      hosts:
        vault-01:
          ansible_host: 192.168.30.21
        vault-02:
          ansible_host: 192.168.30.22
        vault-03:
          ansible_host: 192.168.30.23

    # ── Identity (optional — uncomment when you stand up IdM) ──────────────
    # freeipa:
    #   hosts:
    #     idm-01:
    #       ansible_host: 192.168.30.11
    #     idm-02:
    #       ansible_host: 192.168.30.12
    # freeipa_primary:
    #   hosts:
    #     idm-01:
    # freeipa_replica:
    #   hosts:
    #     idm-02:

    # ── Example app group (add real groups as pure nouns) ─────────────────
    # gitlab:
    #   hosts:
    #     gitlab-01:
    #       ansible_host: 192.168.30.31
