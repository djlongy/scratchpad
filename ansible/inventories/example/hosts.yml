---
# Example inventory for the freeipa_server + freeipa_client roles (sanitised).
# - Single server: leave only idm01 in the `freeipa`/`freeipa_primary` groups.
# - Cluster: keep idm02 (and add more) in `freeipa` + `freeipa_replica`.
# - Clients: add hosts to `freeipa_clients` (config in group_vars/freeipa_clients.yml).

all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ansible
  children:

    freeipa:
      hosts:
        idm01:
          ansible_host: 10.0.0.11
        idm02:
          ansible_host: 10.0.0.12

    freeipa_primary:
      hosts:
        idm01:

    freeipa_replica:
      hosts:
        idm02:

    # Hosts to enrol as FreeIPA clients (example).
    freeipa_clients:
      hosts:
        webnode01:
          ansible_host: 10.0.0.21
        nfs01:
          ansible_host: 10.0.0.31

    # Dedicated NFS storage server(s). Also enrolled as clients (for sec=krb5p).
    nfs_servers:
      hosts:
        nfs01:

    # Hosts that mount the /net network drive.
    nfs_clients:
      hosts:
        webnode01:
