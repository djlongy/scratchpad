---
# inventories/vaultsolo — single-node containerized Vault lab inventory.
#
# Host naming pattern (recommended):
#   inventory key / vCenter  = <env-prefix>-<service>-<nn>  →  dev-vault-01
#   OS hostname              = service short name           →  vault-01
#   host FQDN                = vault-01.dev.example.com
#
# 1 host in the play → hashicorp_vault_container runs STANDALONE (single-node Raft).
# Grow to HA later by adding odd-count peers to vault_container.

all:
  vars:
    ansible_user: ansible

  children:
    vault_container:
      hosts:
        dev-vault-01:
          ansible_host: 10.0.21.54
