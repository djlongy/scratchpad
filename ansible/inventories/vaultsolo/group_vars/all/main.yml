---
# inventories/vaultsolo/group_vars/all/main.yml
# Portable defaults for a single-node Vault lab. Replace every placeholder
# before running against a real environment.

env: "dev"
domain: "example.com"

# Optional estate helpers (strip env-prefix from inventory_hostname).
# If your control repo already defines these, remove the block below.
canonical_env_tokens: ["dev", "deva", "mgt", "mgta", "prod", "proda", "lab"]
_canonical_hostname_sanitized: >-
  {{ inventory_hostname | lower
     | regex_replace('[^a-z0-9]+', '-')
     | regex_replace('^-+', '') | regex_replace('-+$', '') }}
_canonical_hostname_stripped: >-
  {{ _canonical_hostname_sanitized
     | regex_replace('^(' ~ (canonical_env_tokens | join('|')) ~ ')-', '')
     | regex_replace('-(' ~ (canonical_env_tokens | join('|')) ~ ')$', '')
     | regex_replace('^-+', '') | regex_replace('-+$', '') }}
canonical_hostname: >-
  {{ _canonical_hostname_stripped
     if (_canonical_hostname_stripped | regex_search('[a-z]'))
     else _canonical_hostname_sanitized }}
canonical_domain: "{{ env }}.{{ domain }}"
canonical_fqdn: "{{ canonical_hostname }}.{{ canonical_domain }}"

# vSphere (vsphere_vm) — set server/credentials via inventory or Vault lookup.
vsphere_vm_name: "{{ inventory_hostname }}"
vsphere_vm_hostname: "{{ canonical_hostname }}"
vsphere_vm_cpu: 2
vsphere_vm_memory: 4096
vsphere_vm_disk:
  - {size_gb: 40, type: thin}
  - {size_gb: 20, type: thin}

# Second disk → /opt/vault (pair with a storage profile or explicit volumes).
storage_provision: true
# storage_profile: vault   # if your storage role catalog defines it
# storage_volumes:         # or declare volumes explicitly

# Baseline — full hardening is optional; start lighter for a greenfield seed.
baseline_allow_reboot: false
baseline_selinux_state: "enforcing"
fips_enabled: false
baseline_cis_hardening: false
baseline_fapolicyd_enabled: false

# FreeIPA client — only used when vault_tls_mode=freeipa.
freeipa_client_servers: ["idm-01.example.com"]
freeipa_client_fqdn: "{{ canonical_fqdn }}"
freeipa_client_force_join: true
freeipa_client_service_certs:
  - cert_path: /etc/pki/tls/vault/vault.crt
    key_path: /etc/pki/tls/vault/vault.key
    dnsname: "{{ canonical_fqdn }}"
    postsave: /usr/local/libexec/vault-tls-sync

# ── hashicorp_vault_container ──────────────────────────────────────────────
# freeipa | selfsigned
vault_tls_mode: selfsigned

hashicorp_vault_data_mount: /opt/vault
hashicorp_vault_domain: "{{ domain }}"
hashicorp_vault_tls_generate: "{{ vault_tls_mode == 'selfsigned' }}"
hashicorp_vault_tls_onhost: "{{ vault_tls_mode == 'freeipa' }}"
hashicorp_vault_tls_onhost_cert: /etc/pki/tls/vault/vault.crt
hashicorp_vault_tls_onhost_key: /etc/pki/tls/vault/vault.key
hashicorp_vault_tls_onhost_ca: /etc/ipa/ca.crt

# Multi-tenant KV mounts + policies (example).
hashicorp_vault_manage_policies: true
hashicorp_vault_tenants:
  - {tenant: acme, env: prod, wide: true}
  - {tenant: globex, env: prod}
  - {env: mgt}
hashicorp_vault_admin_kv_mounts: [kv-acme-prod, kv-globex-prod, kv-mgt]
hashicorp_vault_policies:
  - {policy_name: vault-admin, template: admin.hcl.j2}
  - {policy_name: vault-superadmin, template: all-kv.hcl.j2}

# LDAP (optional — requires a reachable directory).
hashicorp_vault_ldap_enabled: false
# hashicorp_vault_ldap_url: "ldaps://10.0.10.11"
# hashicorp_vault_ldap_binddn: "uid=admin,cn=users,cn=accounts,dc=example,dc=com"
# hashicorp_vault_ldap_bindpass_vault_path: "kv-ops/data/platform/freeipa/runtime:admin_password"
# hashicorp_vault_ldap_userdn: "cn=users,cn=accounts,dc=example,dc=com"
# hashicorp_vault_ldap_groupdn: "cn=groups,cn=accounts,dc=example,dc=com"
# hashicorp_vault_ldap_insecure_tls: true
# hashicorp_vault_ldap_users:
#   - {ldap_username: operator, policies: [default, vault-admin]}

# PKI secrets engine (mount only by default; issuer import is opt-in).
hashicorp_vault_pki_enabled: true
hashicorp_vault_pki_roles: []

# Operators / automation accounts (replace secrets before use).
hashicorp_vault_userpass_accounts: []
hashicorp_vault_approles:
  - {role_name: svc-automation, policies: [default, vault-admin], token_ttl: 4h, token_max_ttl: 12h}

hashicorp_vault_audit_enabled: true
